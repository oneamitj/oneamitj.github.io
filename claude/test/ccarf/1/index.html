g every one manually.", "options": ["A detected_pattern field recording the specific textual signal, such as first-person language or no named author, that triggered each reliability flag, enabling grouped analysis across the historical log", "A higher-precision reliability score that reports more decimal places", "A requirement that the subagent flag each source twice before the flag counts, to reduce noise", "A field capturing the subagent's self-reported confidence in its own flag"], "correct": [0], "explanation": "Recording the specific signal that triggered each flag as a structured, queryable detected_pattern turns 'a disproportionate share of flags are wrong' into an answerable question: the team can group the historical log by pattern and see that first-person language or informal tone accounts for most of the false flags, which is exactly the false-positive analysis being requested. Adding more decimal places to a reliability score doesn't reveal why any given flag fired; it only makes an already-unreliable number look more precise. Requiring the same subagent to flag twice mostly reproduces the same bias, since the underlying signal it's reacting to, tone, hasn't changed. A self-reported confidence field suffers the same problem as other self-reported confidence measures: it reflects the model's own certainty, not the actual cause of the flag, so it doesn't identify the pattern driving the false positives."}, {"id": "F-D4-B2-18", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "An extraction tool pulls a customer's callback_number from support chat transcripts. Customers type their numbers inconsistently, such as '(555) 123-4567', '555.123.4567', and '5551234567', and the schema currently just types the field as a plain string with no further guidance, so all three variants pass through unchanged into a dialer system that expects one consistent digit format.", "options": ["Add a format-normalization instruction specifying the exact target format that callback_number must always be converted to, regardless of source formatting", "Change the field's type from string to number", "Reject any message where the customer's phone number isn't already in the dialer's expected format", "Have the dialer system guess the customer's number from caller ID instead of using the extracted field"], "correct": [0], "explanation": "Specifying the exact target format the field must always be normalized to gives Claude a single unambiguous conversion rule to apply regardless of how the source text formatted the number, which directly solves the inconsistency. Changing the type to a number would strip meaningful characters like parentheses and still leaves the target digit arrangement unspecified. Rejecting messages that aren't already correctly formatted would reject the overwhelming majority of real customer input, since none of the observed examples matches the dialer's expected format. Relying on caller ID sidesteps the extraction problem rather than fixing it, and isn't available in every channel, such as chat."}, {"id": "F-D4-B2-19", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A tool extracts structured test-run summaries from CI logs: a list of per-suite results, each with a pass_count and fail_count, plus overall totals, total_pass and total_fail. On a sample of logs, the overall totals sometimes don't match the sum of the per-suite numbers, usually because a suite that crashed mid-run was silently excluded from the per-suite list but still counted in the overall totals.", "options": ["Have the extraction step sum the per-suite pass and fail counts and compare that sum to the extracted overall totals, flagging any mismatch for review rather than accepting the totals at face value", "Trust the overall totals fields and stop extracting the per-suite list, since the totals are what matters for reporting", "Run the same extraction prompt twice and average the two reported totals", "Add a free-text comment field where Claude can note if anything seemed off"], "correct": [0], "explanation": "Comparing the computed sum of per-suite numbers against the extracted overall totals is a concrete, deterministic check that will catch exactly the described failure (a crashed suite missing from the per-suite list but still reflected in the totals) and surface it for review. Dropping the per-suite list removes the very data needed to perform this cross-check and also removes detail teams may need to debug which suite failed. Averaging two independent runs doesn't target the specific inconsistency between totals and per-suite data and could average together two differently wrong numbers. An optional comment field depends on Claude noticing and choosing to mention the discrepancy unprompted, which is a hope rather than a systematic check."}, {"id": "F-D4-B2-20", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A developer-productivity tool scans build logs and converts each detected error into a structured ticket object (title, file_path, error_type, suggested_fix) via a single create_ticket tool. The pipeline is single-purpose (this is the only tool exposed to the model in this context), but Claude occasionally responds with a plain-text explanation of the error instead of calling create_ticket, which the ticketing system can't ingest.", "options": ["Leave tool_choice as 'auto' since there is only one tool, so Claude should naturally call it every time", "Force tool_choice to the create_ticket tool specifically, since this pipeline exists only to produce structured tickets and free-text responses have no valid use here", "Add a second, unrelated tool so Claude has more options and is less likely to fall back to text", "Add a long paragraph to the system prompt about the importance of calling the tool"], "correct": [1], "explanation": "Since this pipeline has exactly one valid outcome (a structured ticket), forcing tool_choice to that specific tool removes the possibility of a plain-text response entirely, matching the pipeline's single purpose. The 'auto' setting still permits Claude to end the turn with text instead of a tool call, which is precisely the failure being observed, so leaving it as-is doesn't fix anything. Adding a second, unrelated tool doesn't address the root cause and only gives Claude more ways to avoid producing the one output the pipeline actually needs. A longer prompt explanation is still a probabilistic nudge and doesn't provide the structural guarantee that forcing the tool choice does."}, {"id": "F-D4-B2-21", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "An extraction pipeline validates each tool_use response against a JSON schema. On the first attempt, a response fails because the amount field was returned as the string '1,200.50' instead of a number. The retry prompt includes the specific error: amount must be numeric, received a string. The second attempt fixes that (amount is now a correct number) but fails for a new reason: the currency field, also required, is missing entirely.", "options": ["The retry mechanism is working as intended: each retry is being informed by a genuinely new and different validation error, so continuing to append the specific new error each time is likely to converge to a valid result within a few attempts", "The retry loop has clearly failed and the pipeline should abandon structured extraction for this document", "Since two attempts have failed, the system should stop appending specific errors and instead just tell Claude to output valid JSON going forward", "The failures prove the schema is too strict and every field should be made optional to guarantee validation passes"], "correct": [0], "explanation": "Each attempt fixed the specific problem it was told about and then surfaced a distinct new violation, which indicates the specific-error-feedback approach is working correctly turn by turn, and continuing to feed each new specific error is the appropriate way to converge on a fully valid response rather than a sign of failure. Two failed attempts on a multi-field schema isn't evidence the approach doesn't work; it just means there was more than one problem to fix, and each retry is making genuine progress. Reverting to a vague 'output valid JSON' message would throw away the more effective specific-error approach right after it demonstrated it was working. Making every field optional to force validation to pass would let genuinely required data like currency go missing silently instead of actually fixing the extraction."}, {"id": "F-D4-B2-22", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An insurance-claims extraction schema requires claim_resolution_date for every claim record pulled from adjuster notes. Many claims are still under active investigation with no resolution yet, but because the field is required, Claude has started inserting either today's date or a plausible-looking future date to satisfy the schema, which makes open claims appear closed in downstream reporting.", "options": ["Make claim_resolution_date nullable/optional, and add a separate claim_status field, such as open or resolved, so an active claim can be represented accurately instead of forcing a fabricated resolution date", "Keep claim_resolution_date required, but instruct Claude to write 'pending' as a string whenever a claim is still open", "Remove claim_resolution_date from the schema entirely", "Require that only fully resolved claims be processed by the extraction pipeline"], "correct": [0], "explanation": "A nullable resolution date paired with an explicit status field lets the schema represent an open claim accurately and structurally, instead of pressuring Claude to invent a date that isn't in the source and that actively misrepresents whether the claim is still active. Keeping the field required and asking for the literal string 'pending' mixes date values and non-date text in the same field, breaking any downstream code that expects a parseable date, and doesn't fix the underlying mismatch between a required field and cases with no true value. Removing the field entirely discards genuinely useful resolution-date data for the large share of claims that are actually closed. Restricting the pipeline to only fully resolved claims would mean the open, active claims (likely the ones needing the most active tracking) are never processed at all."}, {"id": "F-D4-B2-23", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI reporting tool extracts a structured coverage_report object from test-runner output, including a required field new_lines_covered_percent. For one PR, the underlying test runner crashed before generating any coverage data at all: there is no coverage information anywhere in the log. The validation-retry loop keeps failing because new_lines_covered_percent is missing, and has now retried 8 times without success, each attempt burning additional latency and cost.", "options": ["Keep retrying indefinitely, since eventually a correctly formatted percentage should appear", "Recognize that retrying cannot recover data the test runner never generated; make the field nullable and have the pipeline emit a null/absent coverage result with an explanatory status rather than continuing to retry", "Have the retry prompt tell Claude to estimate a reasonable coverage percentage based on typical PRs of similar size", "Switch to a more capable model tier for the retries, since a stronger model is more likely to eventually produce the missing number"], "correct": [1], "explanation": "No retry can produce a coverage percentage that the test runner never generated in the first place, so the correct fix is architectural (make the field nullable and let the pipeline explicitly represent 'coverage unavailable') rather than continuing a retry loop that is guaranteed to keep failing. Retrying indefinitely just keeps paying latency and cost for a result that cannot appear, since the underlying source data doesn't exist. Asking Claude to estimate a plausible-sounding percentage would fabricate data that looks like real coverage but isn't, which is worse than clearly reporting that it's missing. A more capable model doesn't have access to information the test runner never produced, so upgrading model tier doesn't change the outcome: it only makes the same failed attempts more expensive."}, {"id": "F-D4-B2-24", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A team is designing the JSON schema for extracting invoices. Each invoice has a variable number of purchased items, sometimes 1 and sometimes 40+, each with its own description, quantity, and unit_price, plus invoice-level fields like vendor_name and total_amount. An engineer proposes flattening everything into a single object with fields like item_1_description, item_1_price, item_2_description, item_2_price, and so on, up to a fixed maximum.", "options": ["A flat schema with numbered fields caps the number of items at whatever fixed maximum was chosen and produces a sprawling, inconsistent schema, whereas a nested items array naturally handles any number of line items with one repeated object shape", "Flat schemas are always invalid JSON, so this design would fail schema validation outright", "Nested arrays cannot be validated against a JSON schema at all, so the flat approach is actually required", "There is no practical difference; both designs produce identical downstream data"], "correct": [0], "explanation": "A nested array of line-item objects naturally scales to any number of items using one consistent, repeated shape, while a flattened numbered-field design forces an arbitrary cap and produces dozens of near-duplicate optional fields that get unwieldy and still fail on the 41st item of a large invoice. Flat schemas with many optional fields are still syntactically valid JSON, so that claim about validity is incorrect. JSON schema fully supports nested arrays of objects; this is a standard, well-supported pattern, not a limitation that forces a flat design. The two designs are not equivalent: the flat version loses items beyond its fixed cap and is much harder for both Claude and downstream code to work with consistently."}, {"id": "F-D4-B2-25", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "After several weeks of logging a detected_pattern field on every CI finding, the data shows that 60% of false-positive 'SQL injection risk' flags share the same detected_pattern value: string concatenation inside a query-builder helper function. Non-false-positive SQL injection flags rarely show this pattern.", "options": ["Update the review logic so findings matching that specific pattern (string concatenation inside a query-builder helper) are down-weighted or routed differently, since it's now a data-backed predictor of false positives", "Delete the detected_pattern field, since it has served its purpose and is no longer needed", "Tell Claude in the system prompt to be more careful about SQL injection false positives", "Disable SQL injection detection entirely until the false-positive rate can be manually reviewed case by case"], "correct": [0], "explanation": "The logged detected_pattern data has identified a specific, concrete signal that reliably predicts false positives, so the appropriate next step is to act on that specific finding by building it into the review logic as a distinguishing signal, which is a targeted, data-driven fix. Deleting the field discards the exact instrument that produced this actionable insight and would prevent tracking whether the fix actually reduces this failure mode going forward. A vague instruction to 'be more careful' is precisely the kind of non-specific guidance that doesn't reliably change model behavior, especially when a much more specific, evidence-backed signal is already available. Disabling the check entirely overcorrects by throwing away true positives too, when the data points to one narrow, specific pattern that can be addressed directly."}, {"id": "F-D4-B2-26", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A support-ticket triage tool needs to assign each incoming ticket a category for routing to the right team. An engineer is deciding between making the category field a completely free-text string or a constrained enum with a defined set of category values.", "options": ["A constrained enum, because routing logic needs a small, predictable set of values it can match against reliably; free text would produce inconsistent wording that's hard to route on programmatically", "Free text, because it captures more nuance than any fixed list of categories ever could", "Free text, because enums cannot be validated by a JSON schema", "Neither matters, since the routing system can be built to handle any input format equally well"], "correct": [0], "explanation": "Routing logic needs to match against a small, known set of values, which is exactly what a constrained enum guarantees; free text could come back as 'billing issue,' 'billing problem,' or 'account charge question' for what should be the same category, none of which are reliably matchable by simple routing code. Free text's extra nuance isn't useful here because the routing system only cares about the category bucket, not creative phrasing, and that nuance actively works against reliable automated routing. JSON schema fully supports enum validation, so that claim about enums is factually wrong. Claiming the format doesn't matter ignores that the entire point of the field is programmatic routing, which is dramatically harder against free text than against a constrained set of values."}, {"id": "F-D4-B2-27", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A contract-extraction tool captures effective_date and expiration_date as separate fields. For one contract, Claude extracts an expiration_date that falls before the effective_date: a logically impossible combination, since a contract cannot expire before it takes effect. Both individual date values are correctly formatted, and each, in isolation, passes schema validation.", "options": ["A conflict-detection check comparing the two related fields is needed, because schema validation checks each field's format independently and has no mechanism to verify that logically related fields are consistent with each other", "Nothing further is needed, since both fields already passed schema validation individually", "The schema should be changed so that expiration_date is no longer required, avoiding the conflict", "The fields should be merged into a single free-text 'contract term' field to avoid date-ordering issues altogether"], "correct": [0], "explanation": "Schema validation operates field by field, checking that each date is a validly formatted date, but it has no built-in concept of the relationship between two fields, so a dedicated conflict-detection check (expiration must not precede effective date) is needed to catch this class of logical inconsistency. Concluding nothing further is needed misses exactly the gap the scenario illustrates: individually valid fields that are jointly nonsensical. Making expiration_date optional doesn't fix the underlying extraction error and would just as easily suppress a genuinely well-extracted expiration date as an incorrect one, hiding the problem rather than catching it. Merging both dates into a free-text field would eliminate the crisp structured values that automated systems, like renewal reminders, rely on, trading a fixable extraction problem for a much less usable data shape."}, {"id": "F-D4-B2-28", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "An extraction schema defines total_amount as a required number. On one document, Claude's raw tool_use response returns total_amount as the string '$1,204.99' instead of a numeric value. The schema validation step rejects this response.", "options": ["It catches structural/type errors, like a number field receiving a string with a currency symbol and thousands separator, before invalid data ever reaches downstream systems", "It proves the model fundamentally cannot extract dollar amounts and a different task should be used instead", "It demonstrates that schema validation also verifies the dollar figure itself is the economically correct amount for the invoice", "It shows that schema validation is unnecessary overhead, since the string still contains the right digits"], "correct": [0], "explanation": "This is exactly the kind of error strict schema validation is built to catch (a type mismatch, where a field defined as a number instead received a string with extra characters like a currency symbol and comma separator), stopping it before it reaches downstream code expecting a clean numeric type. The model extracting the right digits in the wrong format is a formatting slip, not evidence it fundamentally cannot extract amounts. Schema validation only confirms the value is a syntactically valid number; it has no way to confirm that number is the economically correct total for the invoice, which would be a semantic check. Calling the validation unnecessary overhead ignores that it just successfully prevented malformed data, a string instead of a number, from silently flowing into a system that expects numeric arithmetic."}, {"id": "F-D4-B2-29", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A CI pipeline extracts structured review findings and retries on validation failure with specific error feedback appended each time. For one particular field, priority_score, close to 90% of first attempts fail validation because Claude keeps returning a float like 3.7 when the schema requires an integer. Retries with specific error feedback do eventually succeed, but this single field is responsible for the vast majority of all retries across the whole pipeline.", "options": ["Keep relying on retries indefinitely, since they do eventually succeed for this field", "Investigate whether the schema or prompt guidance around priority_score is a poor fit for how Claude naturally reasons about priority, and adjust it, for example by allowing a float or making the integer requirement more explicit, so most requests succeed on the first attempt instead of routinely needing a retry", "Remove priority_score from the schema entirely since it causes most of the retries", "Switch the whole pipeline to plain-text output and parse priority_score out with a regular expression afterward"], "correct": [1], "explanation": "When one specific field is responsible for the large majority of retries and the failure mode is consistent (a float instead of an integer), that's a signal to fix the root cause, either relaxing the schema to match how the model naturally represents the value or making the integer requirement more explicit, so most requests succeed on the first try instead of routinely paying for a retry round-trip. Continuing to rely on retries because they eventually succeed accepts an ongoing, avoidable latency and cost tax instead of fixing a fixable, well-understood pattern. Removing the field entirely discards data the pipeline actually needs just because of a formatting mismatch. Reverting to unstructured text and regex parsing gives up the reliability benefits of structured tool_use output entirely and reintroduces exactly the kind of brittle parsing structured output was adopted to avoid."}, {"id": "F-D4-B2-30", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "medium", "question": "An architect is designing a JSON schema for extracting structured data from customer-submitted support forms, where fields vary widely in how often the source material actually contains them, and where some classification fields don't always map cleanly onto a fixed set of options. Which of the following are appropriate structured-output design practices for this situation?", "options": ["Mark fields optional/nullable when the source form may legitimately omit them, instead of requiring every field and forcing a guess", "Add an 'unclear'/'other' enum value plus a paired detail field for classification fields where the input doesn't always fit the predefined categories", "Force every field, including ones the form frequently leaves blank, to be required so that no response can ever have missing data", "Force tool_choice to the extraction tool (or 'any') so the response is guaranteed to be a schema-conforming tool call rather than free text", "Avoid enums altogether and make every classification field free text, since that removes the risk of a value not fitting a category"], "correct": [0, 1, 3], "explanation": "Making genuinely-absent-source fields optional/nullable, adding an 'unclear'/'other' escape hatch with a detail field for imperfect categorical fits, and forcing tool_choice so every response is a guaranteed schema-conforming call are all established techniques for making structured extraction robust to real-world source variability. Forcing every field to be required regardless of whether the source form actually contains that information just reproduces the exact hallucination problem these techniques exist to prevent, since Claude will fabricate values to satisfy required fields it has no real data for. Removing enums entirely for classification fields sacrifices the consistent, aggregable categories that make the data usable for routing and reporting, throwing away the benefit of structure rather than solving the edge-case problem that the 'other' plus detail pattern already solves without abandoning enums."}, {"id": "F-D4-B2-31", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "hard", "question": "A team is redesigning the validation-retry loop for a CI tool that produces structured review output. They want the loop to be both effective at fixing genuinely correctable errors and honest about errors that retrying cannot fix. Which of the following should be part of a well-designed validation-retry loop for this pipeline?", "options": ["When schema validation fails, append the specific validation error, such as which field failed and what constraint was violated, to the retry prompt rather than a generic 'invalid output' message", "Recognize that if a required piece of information is genuinely absent from the source material, no amount of retrying will produce it, and design the schema with nullable/optional fields or 'unclear' values to represent that case instead of retrying indefinitely", "Keep retrying with the exact same unmodified prompt every time, since eventually random variation should produce a valid response", "Add self-correction checks such as comparing a calculated total against an extracted total, or checking that logically related fields like two dates don't conflict, and treat mismatches as signals to flag or retry", "Suppress all validation errors from ever reaching the retry prompt, since showing the model its own mistakes can bias it toward repeating them"], "correct": [0, 1, 3], "explanation": "Appending the specific validation failure, recognizing that retries cannot manufacture information that was never in the source and designing the schema to represent that honestly, and adding calculated-total or cross-field conflict checks as self-correction signals are all concrete, well-grounded techniques for a retry loop that is both effective and honest. Retrying with an identical, unmodified prompt provides no new information for the model to act on and relies on chance rather than correction, which is far less reliable than feeding back the specific error. Hiding validation errors from the retry prompt removes the exact signal the model needs to fix its mistake: showing the model what went wrong is what makes a targeted retry more effective than a blind one, not a source of bias."}, {"id": "F-D4-B2-32", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "medium", "question": "A synthesis subagent in a multi-agent research system extracts structured facts from source articles into fields including publication_date, which needs a single consistent format across sources that write dates differently; source_type, a classification field with values news_article, academic_paper, blog_post, press_release; and author_name, present in most but not all sources. Which schema design decisions are appropriate for these three fields?", "options": ["Specify an explicit target format that publication_date must always be normalized to, regardless of how the source article originally presented the date", "Add an 'other'/'unclear' enum value with a paired detail field to source_type, since some sources, such as a government report or a forum post, won't cleanly fit the four listed categories", "Make author_name optional/nullable, since some legitimate sources, such as wire-service reports or anonymous posts, genuinely have no listed author", "Require author_name on every record and instruct Claude to write 'Unknown Author' as a placeholder string when none is found, since a required field guarantees more complete-looking data", "Leave publication_date as an unconstrained free-text string so each source's original date format is preserved exactly as written"], "correct": [0, 1, 2], "explanation": "Normalizing publication_date to one explicit target format, giving source_type an 'other'/'unclear' escape value with a detail field for sources outside the four known categories, and making author_name nullable for the sources that genuinely have none are all applications of the same underlying principle: matching the schema to what the source material actually contains rather than forcing every field into a shape it doesn't fit. Requiring author_name and substituting a placeholder string like 'Unknown Author' hides genuine absence behind text that looks like real data, which is worse for downstream consumers than an honest null and contradicts the more appropriate nullable-field approach. Leaving publication_date unconstrained free text reintroduces the exact inconsistent-format problem that normalization is meant to solve, making the field unreliable for any date-based sorting or filtering downstream."}, {"id": "F-D4-B2-33", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A billing-dispute intake tool extracts a structured case object from a customer's message and account history: disputed_charges (an array of individual charge amounts), total_disputed_amount, dispute_start_date, and account_creation_date. On one case, total_disputed_amount doesn't equal the sum of the disputed_charges array, and separately, dispute_start_date is extracted as a date before account_creation_date, which would mean the customer disputed a charge before their account existed.", "options": ["A calculated-total check comparing the sum of disputed_charges to total_disputed_amount, and a separate cross-field conflict check comparing dispute_start_date to account_creation_date", "A single check that only verifies total_disputed_amount is a positive number", "A calculated-total check on the charges, but no date comparison, since dates rarely contain extraction errors", "Neither check is necessary, since both fields individually satisfy the schema's type and format requirements"], "correct": [0], "explanation": "The two problems are independent and need independent checks: comparing the summed disputed_charges against the extracted total catches an arithmetic or extraction mismatch, while comparing dispute_start_date against account_creation_date catches a logically impossible date ordering, and both are exactly the kind of calculated-total and conflict-detection self-correction the pipeline needs before routing the case onward. Only checking that the total is positive would miss both the specific mismatch with the line items and the impossible date ordering entirely. Skipping the date comparison on the assumption that dates rarely have extraction errors is exactly the kind of unverified assumption this scenario contradicts, since the date conflict is a genuine issue in the case described. Both fields being individually valid by type and format is precisely why schema validation alone doesn't catch this class of error: it says nothing about whether logically related values are jointly consistent, which is the entire reason self-correction checks like these exist."}, {"id": "F-D4-B3-01", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A financial-operations team needs to extract vendor, amount, and category from 25,000 archived expense reports before a quarterly audit scheduled for next week. None of the 25,000 reports need to be processed today. Which approach best fits this workload?", "options": ["Submit all 25,000 requests through the Message Batches API, since the deadline is days away and cost efficiency matters more than immediate turnaround", "Call the standard synchronous Messages API once per report in a simple sequential loop", "Call the standard synchronous Messages API but fire the requests from many parallel threads", "Treat the job as urgent and prioritize the fastest possible response path regardless of cost, since deadlines should always be handled that way"], "correct": [0], "explanation": "With a multi-day buffer before the reports are due, this is exactly the profile the Message Batches API is designed for: large volume, latency-tolerant, non-interactive work at roughly half the cost of standard requests. Looping through the synchronous API one request at a time pays full price for a speed benefit the team doesn't need. Firing the same synchronous calls from parallel threads only buys speed, which this deadline doesn't require, while still forgoing the batch discount. Treating every deadline as maximally urgent ignores the actual turnaround requirement and leads to paying for speed that provides no business value here."}, {"id": "F-D4-B3-02", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A live chat widget sends each customer message to Claude and streams the reply back while the customer watches a typing indicator in real time. An engineer proposes rerouting this call through the Message Batches API to cut inference cost. What is the main problem with this proposal?", "options": ["The Message Batches API has no latency SLA and can take up to 24 hours to return a result, which is incompatible with a customer waiting in a live chat window", "The Message Batches API cannot return responses formatted as structured JSON", "The Message Batches API charges more per request than the standard synchronous endpoint", "The Message Batches API cannot be used anywhere in a customer support workflow under any circumstances"], "correct": [0], "explanation": "Batch processing trades a guaranteed response time for a lower price, which makes it a poor fit for any interaction where a person is watching a live indicator and expects a reply within seconds. Structured JSON output and reduced pricing are strengths of the batch endpoint, not problems, so those options misstate its behavior. The concern isn't that batch can never touch a support workflow at all (analyzing a backlog of closed tickets overnight is a great use of it); the issue is applying it to this specific synchronous, in-the-moment turn."}, {"id": "F-D4-B3-03", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A legal-ops team submits 5,000 contract PDFs to the Message Batches API in a single job to extract key clauses. When results come back, they are not in the same order the requests were submitted, and several requests appear to have completed well before others. How should the team reliably match each response to the contract it came from?", "options": ["Assign a unique custom_id to each request at submission time and use that identifier to look up which contract each response belongs to", "Assume responses are returned in submission order and align them positionally with the original file list", "Ask Claude to restate the contract's file name inside its structured JSON response so it can be parsed back out", "Split the 5,000 contracts into 5,000 separate batch jobs so each job's single result is unambiguous"], "correct": [0], "explanation": "The Message Batches API is built around a custom_id supplied with each request, which is the mechanism for correlating asynchronous, out-of-order results back to their source documents. Assuming positional ordering is unsafe once the team has already observed results returning out of sequence. Relying on the model to echo the filename inside the response content is fragile and duplicates work the platform already handles natively. Submitting one contract per job abandons the batching structure entirely and would erase the cost and operational benefits that made batch attractive in the first place."}, {"id": "F-D4-B3-04", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A developer-productivity team wants to process 300 files from a legacy repository overnight using the Message Batches API. For each file, their intended workflow is: run a linter tool, read the lint results, run a symbol-search tool based on those results, and then have Claude produce a refactor suggestion informed by both tool outputs, all within a single submitted request per file. What is the core problem with this plan as described?", "options": ["A single batch request cannot execute a multi-turn tool-calling loop, so the lint-then-search-then-suggest sequence can't happen automatically inside one submitted request the way it would in a live conversation", "The Message Batches API cannot include tool definitions in a request under any circumstances", "Batch jobs cap out at far fewer than 300 requests per submission, so the file count itself is the blocker", "The 24-hour turnaround window is too short to run three sequential tool calls per file"], "correct": [0], "explanation": "Batch requests don't support the same in-request, multi-turn tool-execution loop that the synchronous agentic loop relies on: there's no mechanism for the platform to pause a submitted request, run a tool, feed the result back, and continue within that same request. The fix is to restructure the workflow, for example by running the multi-turn tool loop through the standard synchronous API per file, or by pre-computing the lint and search outputs and folding them into a single-turn batch prompt. Tool definitions themselves aren't banned from batch requests, so ruling out tools entirely overstates the limitation, and neither request volume nor the 24-hour window is the actual obstacle here: the issue is architectural, not a capacity or scheduling limit."}, {"id": "F-D4-B3-05", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A support-operations analyst has two tasks today: generating trend summaries for 60,000 tickets closed last quarter for a report due in two weeks, and pulling a summary of one VIP customer's escalation history before a call that starts in twenty minutes. Which pairing of approaches best matches each task to the right API?", "options": ["Use the Message Batches API for the 60,000-ticket trend summary, and the standard synchronous Messages API for the twenty-minute VIP lookup", "Use the Message Batches API for both tasks, since batch processing is cheaper regardless of urgency", "Use the standard synchronous Messages API for both tasks, since it is the only endpoint guaranteed to work correctly", "Use the Message Batches API for the VIP lookup because it prioritizes single urgent requests ahead of large jobs, and the standard API for the bulk trend summary"], "correct": [0], "explanation": "The historical trend summary is large-volume with a two-week runway, exactly the profile that benefits from the batch endpoint's cost savings and tolerance for delayed turnaround. The VIP lookup has a hard, minutes-away deadline, so it needs the standard synchronous endpoint's immediate response rather than a job with no latency guarantee. Sending both through batch saves money but would leave the analyst without an answer before the call starts. Assuming batch requests get expedited ahead of large jobs misunderstands the endpoint: batch offers no such priority ordering, and applying it to the urgent lookup risks missing the deadline entirely."}, {"id": "F-D4-B3-06", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A team plans to generate docstrings for 12,000 functions across a codebase using the Message Batches API. Before submitting the full job, a teammate suggests first running the exact prompt against 25 representative functions through the standard synchronous API and manually checking the output. Why is this a good idea?", "options": ["It surfaces prompt or formatting problems while iteration is still cheap, since a flawed prompt discovered only after the full batch completes could mean waiting up to a day to find out and redo the whole run", "It guarantees that none of the 12,000 batch requests will fail once submitted", "It is required by the Message Batches API before any job above a certain size can be submitted", "It reduces the per-request cost of the eventual batch job"], "correct": [0], "explanation": "Because batch turnaround has no fixed SLA and can take up to a day, discovering a systemic prompt problem only after the full 12,000-function job completes is expensive in elapsed time, even though the batch requests themselves are cheap. Validating the prompt on a small, fast, synchronous sample catches formatting or instruction issues while fixing them is still inexpensive. A clean sample run doesn't guarantee zero failures at scale, since individual requests can still fail for document-specific reasons. Nothing about batch submission mandates a prior sample run, and running one has no effect on the discounted per-request pricing of the eventual batch."}, {"id": "F-D4-B3-07", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A healthcare-intake team submits 8,000 scanned patient forms to the Message Batches API for structured extraction. When the job completes, 7,850 requests succeeded and 150 failed, mostly due to a handful of forms with corrupted scans. What is the most efficient way to handle the failures?", "options": ["Use the custom_id values to identify the 150 failed requests and resubmit only those, after addressing the scan issues where possible", "Resubmit the entire set of 8,000 forms as a new batch job to keep the dataset consistent", "Discard the failed 150 forms permanently and proceed only with the 7,850 successful extractions", "Re-run the whole job through the standard synchronous API instead of batch, one request at a time, to avoid further failures"], "correct": [0], "explanation": "Because each request carries its own custom_id, the failed subset can be identified precisely and resubmitted on its own, avoiding re-paying for and re-waiting on the 7,850 requests that already succeeded. Resubmitting the full 8,000-form batch wastes both money and time reprocessing records that don't need it. Simply dropping the 150 failed forms loses real patient data rather than recovering it. Switching the entire remaining workload to the synchronous API abandons the batch discount for records that had nothing to do with the scan-quality problem."}, {"id": "F-D4-B3-08", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI pipeline currently calls Claude synchronously to leave an automated review comment on every pull request, and this comment must post before the merge button unlocks. To reduce LLM spend, a team proposes rerouting this call through the Message Batches API. What is the strongest reason this change would hurt the pipeline?", "options": ["The batch endpoint has no latency SLA and can take up to 24 hours, so a merge-blocking gate built on it could stall indefinitely with no guaranteed completion time", "The batch endpoint cannot produce output formatted as JSON for the review comment", "The batch endpoint would produce a less accurate review comment than the synchronous endpoint would for the same prompt", "The batch endpoint would increase the total cost of running CI compared to the synchronous endpoint"], "correct": [0], "explanation": "A merge gate is by definition something a developer is actively blocked on, and routing it through an endpoint with no guaranteed turnaround time (up to a full day in the worst case) turns a routine PR into an unpredictable wait. Structured JSON output isn't a differentiator here, since the batch endpoint doesn't restrict that in a way that breaks this use case, and there's no basis for the same underlying model producing a less accurate answer just because the request went through batch. Cost is actually the opposite problem: batch would lower spend, not raise it, but that saving isn't worth adopting if it comes at the expense of a working merge gate."}, {"id": "F-D4-B3-09", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "medium", "question": "A new engineer on a data-extraction team is evaluating whether to route a large document-processing job through the Message Batches API and asks a colleague to summarize how it actually behaves. Which of the following statements about the Message Batches API are accurate?", "options": ["Processing through the batch endpoint typically costs roughly half of what the same volume would cost through the standard synchronous endpoint", "A submitted batch job can take up to 24 hours to complete, with no guaranteed turnaround time", "Each request in a batch is paired with a custom_id that is used to match its response back to the request that produced it", "A single batch request can autonomously run a full multi-turn tool-calling loop, calling a tool, reading the result, and continuing, before returning its final response", "Once submitted, a batch job is guaranteed to return all results within a fixed number of minutes"], "correct": [0, 1, 2], "explanation": "The batch endpoint's defining tradeoffs are real: it runs at roughly half the standard price, it comes with no latency guarantee and an upper bound of about a day, and it relies on custom_id to correlate each response to its originating request since results aren't guaranteed to preserve submission order. What it does not do is execute an in-request, multi-turn tool-calling loop the way a live synchronous conversation can, and it makes no promise of a fixed, short completion window: the 24-hour figure is a ceiling, not an SLA."}, {"id": "F-D4-B3-10", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A multi-agent research coordinator has two jobs queued: synthesizing an answer to a question a user is asking right now in an active session, and re-summarizing 10,000 archived articles overnight to seed tomorrow's weekly digest. Which of these two jobs is a good candidate for the Message Batches API?", "options": ["Only the overnight re-summarization of the 10,000 archived articles", "Only the live synthesis the user is waiting on right now", "Both jobs equally, since batch processing is always the cheaper and therefore better choice", "Neither job, since the Message Batches API is only intended for structured data extraction workloads"], "correct": [0], "explanation": "The overnight article re-summarization has no one waiting on it and involves high volume, exactly what the batch endpoint's cost savings and relaxed turnaround are built for. The live synthesis has a person waiting in the current session for an answer, so it needs the standard synchronous endpoint's immediate response rather than a job with no latency guarantee. Cost alone isn't a sufficient reason to route everything through batch when a real-time interaction depends on the other job, and batch processing isn't limited to structured extraction: any sufficiently large, latency-tolerant generation workload is a fit, including bulk summarization."}, {"id": "F-D4-B3-11", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An HR team submits 3,200 resumes to the Message Batches API to extract candidate name, years of experience, and skill tags into a structured record per resume. A downstream script needs to load each structured record into the correct candidate's file in the applicant tracking system. What should the downstream script rely on to attach each batch response to the correct candidate record?", "options": ["The custom_id that was assigned to each resume's request at submission time", "The order in which the responses arrive from the batch job", "The candidate's name as it appears in the model's free-text response, matched by string comparison", "The timestamp attached to each response, matched against when each resume was uploaded"], "correct": [0], "explanation": "The custom_id is the mechanism purpose-built for this exact problem: it's attached to each request and returned with its response so downstream code can deterministically map results back to source records. Relying on response order is unsafe because batch results aren't guaranteed to come back in the sequence they were submitted. Matching on a candidate's name pulled from free text is fragile since small formatting differences or inconsistent capitalization can break the match, and timestamps reflect when a request happened to finish processing rather than a stable identifier tying it back to a specific resume."}, {"id": "F-D4-B3-12", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI lead notices that in testing, most Message Batches API jobs for a code-review workflow complete in well under an hour, often within a few minutes. Based on this observation, the team designs a pull-request pipeline that submits each PR's review as a batch request and blocks the merge-ready status check until that batch job returns, expecting it to typically finish fast. What is the flaw in this design?", "options": ["The batch endpoint provides no latency SLA, so designing a blocking status check around typical observed turnaround rather than a guaranteed one risks unpredictable multi-hour or multi-day stalls on the PRs that don't finish quickly", "Batch jobs cannot be used for code review tasks at all, regardless of how the pipeline is structured", "The observed fast completion times mean the team should lower their cost expectations, since the batch endpoint likely isn't actually applying its discount", "The status check should instead poll the synchronous Messages API repeatedly until the batch job finishes"], "correct": [0], "explanation": "Typical performance isn't a guarantee: the batch endpoint's only stated bound is an upper limit of about a day with no committed latency, so any PR whose batch request lands in the slow tail will stall the merge-blocking check well beyond what the team observed in testing. Batch itself isn't disqualified from code-review workflows in general, only from being the mechanism behind a synchronous, developer-blocking gate. The fast completion times the team observed say nothing about pricing and don't indicate the discount isn't applying. Polling the synchronous endpoint while still waiting on the batch job doesn't remove the core issue, since the merge gate is still ultimately dependent on a job with no turnaround guarantee."}, {"id": "F-D4-B3-13", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A batch job extracts structured clause data from 2,000 vendor contracts using tool_use with a JSON schema. After completion, 40 requests come back with an error status because the source PDF text was empty, likely due to scan failures, while the rest returned schema-valid structured data. What should the team do with the 40 errored requests?", "options": ["Pull their custom_id values, investigate and re-scan or otherwise fix the source documents where possible, and resubmit just those 40 as a new batch or via the synchronous API", "Re-run all 2,000 contracts again since 40 unexplained errors call the entire job's reliability into question", "Modify the JSON schema to make every field optional so the 40 requests stop producing errors", "Increase the batch job's timeout setting and resubmit the same 40 requests unchanged"], "correct": [0], "explanation": "The efficient path is to isolate the specific failed requests by their custom_id, address the underlying data problem where feasible, and resubmit only that small subset rather than the full 2,000-contract job. Re-running everything wastes the cost and time already saved on the 1,960 requests that completed cleanly. Loosening the schema doesn't fix documents that failed because there was no usable text to extract in the first place: it just hides the failure as an empty result. There is no per-job timeout knob to adjust here, and resubmitting the same unmodified requests against the same corrupted source text would just reproduce the same errors."}, {"id": "F-D4-B3-14", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A release-engineering team wants an LLM to draft release notes summarizing every merged commit from the past two weeks. A human editor reviews the draft the next morning before publishing, so nothing depends on the draft appearing within the next few hours. Which processing approach best fits this workflow?", "options": ["Submit the commit-summarization request through the Message Batches API and let it run overnight ahead of the editor's morning review", "Call the standard synchronous Messages API repeatedly through the night to make sure the draft is ready as early as possible", "Wait until the editor is ready the next morning, then call the standard synchronous Messages API on demand", "Split the request into many small synchronous calls issued in parallel to finish as quickly as possible"], "correct": [0], "explanation": "A next-morning human review step means there's no urgency for the draft to appear within minutes or even a couple of hours, exactly the latency tolerance the batch endpoint is built to take advantage of at roughly half the cost. Calling the synchronous endpoint repeatedly through the night or in parallel threads pays full price purely to arrive early, when nothing is waiting on that speed. Waiting until morning and calling synchronously on demand would work operationally, but it leaves the batch discount on the table for a job that easily tolerates an overnight turnaround."}, {"id": "F-D4-B3-15", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team is designing a batch job where each request should have Claude call a single tool once, receive that tool's result, and produce one final structured answer, with no further back-and-forth after the tool result is incorporated. Is this workflow compatible with a single Message Batches API request?", "options": ["Yes, but only if the tool result is already known and included directly in the request, since a batch request can't pause mid-flight to execute a tool call and then continue automatically", "Yes, batch requests can autonomously execute any number of sequential tool calls within a single submitted request", "No, the Message Batches API cannot include tool definitions in a request under any circumstances", "No, batch requests can only return plain text and can never return structured tool_use output"], "correct": [0], "explanation": "A batch request can't be paused partway through to execute a tool call and then resumed with that tool's result the way a live synchronous turn can, since there's no in-request multi-turn tool-calling loop available. If the needed tool output can be determined ahead of time and folded into the prompt itself, a single-turn batch request works fine and can still request structured tool_use output. The other options either overstate what batch can automate mid-request or wrongly claim tools and structured output are unavailable in batch altogether."}, {"id": "F-D4-B3-16", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A platform team is deciding which of four pending jobs should be routed through the Message Batches API: answering a developer's question in an active Claude Code session, tagging sentiment on 100,000 archived support transcripts for a retrospective due next month, posting a merge-blocking review comment on an open pull request, and responding to a live customer chat message. Which job is the best fit for the Message Batches API?", "options": ["Tagging sentiment on the 100,000 archived transcripts for the retrospective", "Answering the developer's question in the active Claude Code session", "Posting the merge-blocking review comment on the open pull request", "Responding to the live customer chat message"], "correct": [0], "explanation": "The archived-transcript retrospective is large-volume, has no one actively waiting on it, and tolerates a turnaround measured in hours or a day, which lines up exactly with the batch endpoint's cost-for-latency tradeoff. The other three all have a person or process blocked on an immediate answer (a developer mid-session, a PR waiting to merge, and a customer in a live chat), and routing any of them through an endpoint with no latency guarantee risks stalling exactly the interaction that needs to stay responsive. Matching API choice to actual latency tolerance, not just to cost, is what separates the retrospective job from the other three."}, {"id": "F-D4-B3-17", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "hard", "question": "A structured-data-extraction team is drafting internal guidelines for when engineers may route work through the Message Batches API instead of the standard synchronous Messages API. Which of the following are legitimate reasons to choose the Message Batches API for a given workload?", "options": ["The workload involves a large volume of independent documents with no individual result needed within the next several hours", "Cost efficiency matters more for this workload than the speed of any single result", "The workflow needs Claude to call one tool, inspect the result, and decide whether to call a second tool, all inside a single submitted request", "Someone is actively waiting in a live session for this exact result before they can continue", "The team requires a firm guarantee that results will be ready within a specific short window, such as one hour"], "correct": [0, 1], "explanation": "Good batch candidates share two traits above all: a large volume of independent work with no one needing an individual result within the next several hours, and a priority on cost efficiency over the speed of any single response. A workflow that needs Claude to inspect one tool's result and decide on a second tool call within the same request depends on multi-turn tool calling inside a single request, which batch requests don't support. Anyone actively waiting in a live session needs the immediate response only the synchronous endpoint provides, and no batch job can be designed around a firm short-window guarantee, since the endpoint offers no fixed turnaround commitment at all."}, {"id": "F-D4-B3-18", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "After Claude Code implements a bug fix across a repository, a developer asks the same session whether it is confident the fix is correct and complete, and the session replies that it is confident. What is the main limitation of relying on this self-check?", "options": ["The same session already committed to its reasoning while writing the fix, so it tends to confirm its own prior conclusions rather than critically re-examining them", "Claude Code sessions are not able to answer yes-or-no questions about their own output", "The session's confidence statement will always be phrased as a numeric score rather than in words", "Asking the same session to self-check consumes more tokens than the original fix did"], "correct": [0], "explanation": "A session that generated a fix carries forward the reasoning trail that led to that fix, so when asked to check its own work it tends to re-affirm the same assumptions rather than genuinely question them the way a fresh reviewer would. The claim that a session can't answer self-check questions at all is false: the concern is reliability, not capability. Numeric-versus-worded confidence phrasing and token cost are both beside the point; neither addresses why self-review is a weaker check than an independent one."}, {"id": "F-D4-B3-19", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A CI pipeline currently uses the same Claude Code session that generated an automated fix for a failing test to also write the PR description claiming the fix is correct and ready to merge. What change would most improve the reliability of this review step?", "options": ["Have a separate, independent session with no memory of generating the fix review the diff and the test results before approval", "Have the same session re-read its own fix a second time before writing the PR description", "Ask the same session to lower its confidence threshold before approving its own work", "Have the same session write more detailed comments explaining its own fix in the PR description"], "correct": [0], "explanation": "A fresh session that never generated the fix has no prior reasoning to defend, so it evaluates the diff and test results on their own merits rather than confirming a conclusion it already reached. Re-reading its own work a second time is still the same session working from the same committed reasoning, so it doesn't meaningfully change the risk. Adjusting a confidence threshold or adding more explanatory detail changes how the same self-review is presented, not whether it is independent, so neither addresses the actual weakness."}, {"id": "F-D4-B3-20", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A team renames a shared utility function's signature across a 40-file module and reviews the change by having Claude examine each modified file individually to confirm that file's own edits look correct. All 40 individual reviews pass. What risk does this review process leave unaddressed?", "options": ["A caller in a file that wasn't part of the individually reviewed set, or an interaction between files, could still be using the old signature, an issue only a pass that looks across files together would catch", "Reviewing files individually always takes longer than reviewing them together in one pass", "Per-file review cannot detect syntax errors within a single file", "Per-file review requires a larger model tier than cross-file review does"], "correct": [0], "explanation": "Reviewing each file in isolation confirms that file's own edits are internally consistent, but it can't catch problems that only exist in the relationship between files, such as a caller elsewhere still passing arguments in the old order. That's precisely the gap a separate cross-file integration pass is meant to close. Per-file review is actually well-suited to catching in-file syntax problems, so that's not the missing piece, and model tier has nothing to do with the distinction between local and integration-level review."}, {"id": "F-D4-B3-21", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A pull request modifies an API response schema in one module and updates three files that construct that response, but does not touch two other files elsewhere in the codebase that parse and depend on the old schema shape. An automated review process checks each changed file individually against the diff and approves the PR. What review step would most likely have caught the two unmodified but affected files before merge?", "options": ["A separate cross-file pass that traces how the changed schema is consumed across the codebase, not just within the files the PR touched", "A stricter per-file review that reads each of the three modified files more carefully", "A larger context window for the per-file review step so each file review can see more surrounding code within that same file", "A second self-review pass by the same session that approved the PR the first time"], "correct": [0], "explanation": "The two affected-but-unmodified files were never in the diff, so no amount of scrutiny applied only to the changed files, however careful, would surface them; only a pass explicitly designed to trace usage of the changed schema across the wider codebase would. A larger context window helps a single file's review see more of that file's own surroundings, but it doesn't extend the review's scope to files outside the diff. Repeating the same self-review carries the same rationalization risk discussed elsewhere and, just as importantly, is still scoped to the same set of already-reviewed files rather than the broader dependency graph."}, {"id": "F-D4-B3-22", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A structured-extraction pipeline pulls policy numbers, coverage amounts, and effective dates from insurance documents, and the team wants a way to flag which extracted records are most likely to need human review without a person checking all of them. What is the most useful first step toward this goal?", "options": ["Have the extraction step emit a confidence value for each extracted field as part of the structured output, alongside the field itself", "Have the extraction step analyze the sentiment of the source document's language", "Have a human review every tenth record regardless of what the extraction step reports", "Increase the model's output length limit so extracted fields are described in more detail"], "correct": [0], "explanation": "Capturing a per-field confidence value alongside each extracted field gives the pipeline a concrete, field-level signal it can later use to decide which records most need a human look. Sentiment analysis of the source text has nothing to do with whether an extraction was done correctly. Reviewing a fixed fraction of records regardless of content is a useful sampling technique for validation, but it doesn't by itself identify which specific records are risky, and simply allowing longer field descriptions adds verbosity without adding any signal about correctness."}, {"id": "F-D4-B3-23", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A support-ops team has Claude classify incoming tickets as refund-eligible or not-refund-eligible, and wants low-certainty classifications routed to a human agent instead of being auto-processed. What should the classification step produce to make this routing possible?", "options": ["A confidence indicator alongside each classification, captured as part of the structured output for that ticket", "A separate sentiment score describing how upset the customer sounds in the ticket", "A random sample flag applied to exactly 5% of tickets regardless of their classification", "A longer written explanation of the classification with no accompanying confidence value"], "correct": [0], "explanation": "Routing decisions need a per-ticket signal to act on, and a confidence indicator attached to each classification is exactly that: it lets downstream logic send low-certainty tickets to a human and let high-certainty ones proceed automatically. Customer sentiment reflects emotional tone, not whether the refund-eligibility classification itself is likely correct, so it's the wrong signal for this routing decision. A fixed random sample is useful for auditing overall accuracy but doesn't identify which specific tickets are uncertain, and a longer explanation without a structured confidence value gives a human more to read but nothing a routing rule can act on programmatically."}, {"id": "F-D4-B3-24", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A document-extraction team has Claude self-report a 1-10 confidence score for every extracted field and configures their pipeline to auto-approve any field scored 8 or above, sending only lower scores to human review. After a month, they discover that a meaningful share of fields scored 9 or 10 were actually wrong. What most likely went wrong with this design?", "options": ["The raw self-reported confidence score was never validated against actual outcomes, so there was no evidence the 8-and-above threshold corresponded to genuinely reliable extractions", "The pipeline should have used a sentiment score instead of a confidence score", "The 1-10 scale should have been replaced with a 1-100 scale for finer granularity", "Confidence scores should never be requested from the model under any circumstances"], "correct": [0], "explanation": "An LLM's raw self-reported confidence is not automatically trustworthy: it only becomes useful for routing once it has been checked against a labeled or human-verified sample to confirm that high scores actually correlate with correctness. Skipping that validation step and picking a threshold on faith is exactly how a team ends up auto-approving fields that were confidently wrong. Swapping in a sentiment score would trade one unvalidated signal for an even less relevant one, and a finer-grained scale doesn't solve the core problem, since more precision on an uncalibrated signal is still uncalibrated. The fix isn't to abandon self-reported confidence altogether, but to validate and calibrate it before trusting it for automated routing."}, {"id": "F-D4-B3-25", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "Before relying on Claude's field-level confidence scores to auto-route structured extractions, a data-quality lead pulls a stratified sample of past extractions across document types, has humans mark the ground truth for each field, and compares those labels against the reported confidence scores before setting any auto-approval threshold. What does this process most directly establish?", "options": ["Whether the model's confidence scores are actually calibrated, meaning whether higher reported confidence reliably corresponds to higher real-world accuracy, before those scores are trusted for automated routing", "Whether the model is using the correct JSON schema for its structured output", "Whether the extraction pipeline is more cost-effective than manual data entry", "Whether the source documents contain enough information to extract every field"], "correct": [0], "explanation": "Comparing reported confidence against human-verified ground truth across a representative, stratified sample is exactly how a team finds out whether the model's confidence signal is trustworthy, before betting an automation threshold on it. Schema conformance is a structural, syntax-level property that a validator checks independently of whether the values themselves are correct. Cost-effectiveness against manual entry is a separate business question this sampling exercise isn't designed to answer, and whether source documents contain enough information to extract every field is a data-completeness issue distinct from whether the confidence scores themselves are trustworthy."}, {"id": "F-D4-B3-26", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "After validating that Claude's field-level confidence scores correlate well with actual accuracy on a labeled sample, a team configures their extraction pipeline so that fields below the validated threshold are queued for a human reviewer, while fields at or above it flow directly into the downstream system. What is the primary benefit of this design compared to sending every extracted field to a human reviewer?", "options": ["It concentrates reviewer attention on the fields most likely to be wrong, instead of spending equal review effort on fields that are already reliably correct", "It eliminates the need for any future recalibration of the confidence threshold", "It guarantees that every field routed automatically is correct", "It removes the need to ever involve a human reviewer again"], "correct": [0], "explanation": "Once the confidence signal has been shown to track real accuracy, routing only the lower-confidence fields to a human lets reviewers spend their limited time where errors are actually concentrated, rather than re-checking fields that are already reliably correct. A validated threshold isn't a permanent guarantee, since drift in document types or model behavior can still require periodic recalibration. Even well-calibrated confidence doesn't make every auto-routed field certain to be correct, only more likely to be correct than the ones flagged for review, and the design still explicitly sends some fields to humans, so it doesn't remove human review from the process."}, {"id": "F-D4-B3-27", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "After a structured-extraction pass produces JSON records from a batch of contracts, a team wants to verify the extractions are accurate before loading them downstream. Which verification approach is most likely to catch genuine extraction errors?", "options": ["Have a separate pass, with no memory of having produced the original extraction, re-examine the source document and the extracted JSON together", "Ask the same extraction output to restate its own confidence that the JSON is correct", "Check only that the JSON parses without a syntax error", "Check only that every required field in the schema is present"], "correct": [0], "explanation": "A verification pass that starts fresh, without the context of having generated the original extraction, is positioned to catch mismatches between the source document and the extracted values that the original pass would be inclined to overlook. Asking the same output to vouch for its own correctness is still self-review and carries the same risk of confirming a conclusion it already committed to. Confirming the JSON parses or that required fields are present are both useful sanity checks, but neither one verifies that the extracted values actually match what the source document says."}, {"id": "F-D4-B3-28", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "In a multi-agent research system, the same reporting subagent that drafted a cited synthesis report is also asked to double-check its own citations for accuracy before the report is finalized. What would most improve the reliability of this fact-checking step?", "options": ["Route the draft report to a separate subagent, uninvolved in writing it, whose sole task is to verify each citation against the original source", "Have the same reporting subagent re-read its own report a second time before finalizing it", "Ask the same reporting subagent to state a numeric confidence score for the report as a whole", "Instruct the same reporting subagent to write its citations in a more detailed format"], "correct": [0], "explanation": "A subagent that never wrote the report has no investment in its existing claims and can check each citation against the source material on its own merits, rather than confirming conclusions the original subagent already reached. Having the same subagent reread its own draft is still self-review, since it's working from the same reasoning that produced the report in the first place. A single whole-report confidence score is both self-reported by the same subagent and too coarse to indicate which individual citations, if any, are problematic, and writing citations in more detail changes presentation, not whether they were independently checked."}, {"id": "F-D4-B3-29", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A multi-agent research system has separate subagents each analyze one source document and extract claims into structured findings. A synthesis subagent then combines all the per-document findings into a single report without separately checking whether findings from different sources actually conflict with each other. What gap does this process leave, and how should it be addressed?", "options": ["Per-document analysis alone can miss contradictions that only appear when findings from different sources are compared against each other; a dedicated cross-source consistency pass is needed to catch them", "Per-document analysis is inherently unreliable and should be replaced entirely with a single pass over all documents combined", "The synthesis subagent should be given a larger context window so it can read each source document in more detail", "Each per-document subagent should independently increase its own confidence threshold before reporting a finding"], "correct": [0], "explanation": "Each subagent analyzing one document in isolation has no visibility into what the others found, so a genuine conflict between two sources, such as contradictory figures or claims, can slip straight into the final report unless something explicitly compares findings across documents. That's a distinct, additional pass, not a reason to discard per-document analysis, which is still well-suited to extracting findings accurately from within a single source. Giving the synthesis subagent more context about one document at a time doesn't create any mechanism for comparing documents against each other, and raising each subagent's individual confidence threshold affects how cautious it is a
