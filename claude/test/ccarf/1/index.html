"options": ["Start an entirely new session and lose all prior context", "Run /compact to reduce the accumulated context while keeping the session's essential thread going", "Manually delete individual messages from the conversation", "Switch to a smaller, faster model to speed up responses"], "correct": [1], "explanation": "/compact is designed for exactly this situation, reducing accumulated context such as stale diffs and tool output while preserving the session's continuity, which is more appropriate than discarding everything. Starting a brand-new session throws away useful context along with the clutter. Manually deleting individual messages is not a supported or reliable workflow for context management. Swapping to a smaller model does not address the actual cause of the slowdown, which is context volume rather than model choice."}, {"id": "F-D5-B2-05", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A team runs a multi-day Claude Code session to incrementally migrate a large codebase off a deprecated framework, tracking progress purely in the running conversation. Midway through day two, the environment crashes and the session is unrecoverable. What practice, if it had been followed, would have most effectively minimized the lost work?", "options": ["Relying on /compact more aggressively throughout the session", "Periodically exporting a structured state file covering files migrated, files remaining, and key decisions applied, so a new session could reload it and resume with minimal re-derivation", "Keeping the conversation history as long and detailed as possible without ever compacting", "Running the migration through a single very large subagent instead of the main session"], "correct": [1], "explanation": "A structured, periodically updated state export captures exactly what a resumed session needs, namely completed work, remaining work, and decisions made, so it survives a crash independent of the conversation itself. Aggressive compaction reduces context size but does not produce anything a new session could load to resume the migration. An ever-growing uncompacted history is itself vulnerable to the same crash and provides no recovery mechanism. Routing everything through one large subagent does not create durable state either; it just relocates where the context lives."}, {"id": "F-D5-B2-06", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A subagent is asked to find every call site of a deprecated internal API across a monorepo. Its raw grep output spans roughly 50,000 tokens across hundreds of matches, and the subagent must now report its results back to the coordinator. What should the subagent return to the coordinator?", "options": ["The full 50,000 tokens of raw grep output, so the coordinator has complete information", "A distilled list of affected files, relevant line numbers, and brief notes on each usage pattern, omitting the raw match dump", "Only the total count of matches found, with no file-level detail", "A request for the coordinator to re-run the same search itself to verify the subagent's work"], "correct": [1], "explanation": "The value of isolating verbose work in a subagent comes from returning a distilled, actionable summary of specific files, locations, and patterns, rather than dumping the raw output back into the coordinator's context and defeating the purpose of delegating the search. Returning the full raw output reintroduces the exact context bloat the subagent was meant to prevent. A bare count with no detail is too lossy to act on. Asking the coordinator to redo the search wastes the delegation entirely."}, {"id": "F-D5-B2-07", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "medium", "question": "A team is designing a workflow for Claude Code sessions that explore very large, unfamiliar codebases over multiple hours. They want the workflow to keep the main session's context usable and to survive interruptions. Which practices should they adopt? Select all that apply.", "options": ["Delegate broad, verbose discovery, such as searching and reading many files, to subagents that return only distilled findings", "Maintain a scratchpad file of confirmed findings that is updated as exploration progresses, independent of the conversation", "Avoid ever running /compact so that no discovered detail is ever summarized away", "Periodically export structured progress state so the session can be resumed cleanly after a crash", "Read every file in the repository directly into the main session up front to build complete context before starting"], "correct": [0, 1, 3], "explanation": "Isolating verbose discovery in subagents, persisting findings to a scratchpad, and periodically exporting structured state are complementary practices that keep the main context lean, preserve findings outside the model's window, and enable clean recovery from interruptions. Never compacting just delays context bloat rather than managing it. Reading every file directly into the main session up front is the opposite of isolating verbose output and guarantees the exact bloat the other practices are meant to avoid."}, {"id": "F-D5-B2-08", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A coordinator managing a multi-day, multi-agent codebase audit keeps no external record of subagent findings; everything lives only in the coordinator's conversation. After a crash, the team restarts with a fresh session and no scratchpad or state file to load. What is the most direct consequence of this setup?", "options": ["The new session can automatically recover the exact prior conversation state from the model provider's servers", "All prior findings must be rediscovered from scratch because nothing outside the lost conversation captured them durably", "The subagents that already ran will resume automatically from where they left off", "The team can reconstruct the lost findings by asking Claude to recall them from its general training knowledge"], "correct": [1], "explanation": "If findings only ever existed inside the coordinator's conversation with no scratchpad or exported state, a crash means there is nothing durable to reload, so the team must redo the discovery work. Conversation state is not something a fresh session can silently pull back from the provider, and subagents that already terminated do not resume on their own. Claude's general training knowledge has no record of this specific codebase's session-specific findings, so asking it to recall them is not a real recovery path."}, {"id": "F-D5-B2-09", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A developer notices that after asking several exploratory questions about a legacy codebase in one long Claude Code session, response quality degrades and the session seems to forget details that came up earlier in the exploration. What is the most likely root cause?", "options": ["The model is experiencing a hardware fault", "Excessive uncompacted context, much of it raw tool output accumulated during exploration, is crowding out the space available for the details that matter most", "The developer's account has hit a usage limit", "Claude Code's built-in tools have a bug that corrupts long conversations"], "correct": [1], "explanation": "Long exploration sessions that accumulate raw, verbose tool output without trimming or isolating it are a well-known cause of degraded recall and response quality, since important earlier details get buried or attended to less than more recent content. A hardware fault or tool bug is not a relevant explanation for this kind of context-driven degradation, and a usage limit would produce an explicit error rather than gradually worsening answers."}, {"id": "F-D5-B2-10", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A developer maintains a scratchpad file during a long codebase exploration. So far it contains entries like a note that the codebase seems well-organized and a guess that authentication is probably handled somewhere in the services layer. What change would make the scratchpad most useful for later work?", "options": ["Delete the scratchpad and rely on memory instead", "Replace vague impressions with specific, verifiable facts, such as exact file paths, function or class names, and concrete findings, so later steps can act on them directly", "Convert the scratchpad into a second live conversation with Claude", "Only record scratchpad entries once the entire exploration is complete"], "correct": [1], "explanation": "A scratchpad is only useful if it captures durable, specific facts such as paths, symbols, and concrete conclusions rather than vague impressions that still require re-verification later, since specificity is what lets future steps act without redoing the search. Deleting it removes the one durable record the team has. Turning it into a second live conversation reintroduces the exact context-bloat problem scratchpads are meant to avoid. Waiting until exploration is fully complete to record anything defeats the purpose of capturing findings as they happen, since a crash or compaction before that point would lose everything."}, {"id": "F-D5-B2-11", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "hard", "question": "A developer summarizes findings into a scratchpad after each subagent returns, then discards the subagent's original output. Weeks later they discover a scratchpad entry noting that config loading had been refactored in the payments module, but it omitted which files or commit this referred to, making it useless for a follow-up task. Which of the following are legitimate risks of premature or overly aggressive summarization during large-codebase exploration? Select all that apply.", "options": ["Specific identifiers such as file paths, function names, and line numbers needed for later, concrete action can be lost if summaries stay too high-level", "A summary that reads fine in the moment can still turn out to be too vague to act on once the original detail is gone and unrecoverable", "Summarization always improves the reliability of a scratchpad, so this kind of risk cannot actually occur", "Once a finding has been summarized, subagents can no longer be re-spawned to re-derive the missing detail", "Overly aggressive summarization can silently drop the specific facts a later task will need, even though the scratchpad still looks complete"], "correct": [0, 1, 4], "explanation": "Summaries that discard specific identifiers, that turn out to be too vague once the source detail is gone, and that silently drop needed facts while still looking complete are all real, documented risks of over-summarizing during exploration, mirroring the broader lesson that progressive summarization can quietly drop details that later steps depend on. Claiming summarization always improves reliability is false and contradicted by the scenario itself. Subagents can, in fact, be re-spawned to re-derive detail; doing so is simply wasteful, not impossible, which is exactly why capturing specifics the first time matters."}, {"id": "F-D5-B2-12", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "An automated code-review pipeline runs Claude Code non-interactively against large pull requests, spawning subagents to review different parts of a sprawling diff across a big repository. Each subagent's raw review output, several thousand tokens including full excerpts of surrounding code, is currently returned directly into the coordinator's context before the coordinator assembles the final PR comment. What change would most directly fix the coordinator's growing context problem without reducing review coverage?", "options": ["Reduce the number of subagents used, even if that means reviewing less of the diff", "Require each subagent to condense its own findings into a concise, structured summary, such as issue, location, and severity, before returning control to the coordinator, rather than returning full raw excerpts", "Have the coordinator re-read each subagent's raw output a second time to extract the key points", "Merge all subagents into a single sequential subagent so there is only one context to manage"], "correct": [1], "explanation": "The fix belongs at the point where output is produced: each subagent should distill its own findings before reporting back, which keeps the coordinator's context lean without cutting how much of the diff actually gets reviewed. Reducing subagent count sacrifices coverage instead of fixing the actual problem. Having the coordinator re-read the raw output does not reduce context consumption, since the raw output is already in context by the time that happens. Collapsing everything into one sequential subagent removes the parallelism benefit and still does not address unsummarized output."}, {"id": "F-D5-B2-13", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A developer is deciding, at a given moment in a long exploration session, between running /compact on the current session and instead spawning a subagent to handle the next phase of investigation. Which consideration should most influence that choice?", "options": ["Whether the accumulated context is mostly stale detail from work already concluded, favoring /compact, versus whether the next phase is a distinct, boundable investigation whose verbose output should not enter the main context at all, favoring a subagent", "Whether the session has crossed a fixed token count, regardless of what phase of work comes next", "/compact and subagents are interchangeable, so the choice makes no practical difference", "Subagents should always be preferred because they never lose information, unlike /compact"], "correct": [0], "explanation": "The two tools solve different problems: /compact shrinks context that has already accumulated in the current session, while a subagent isolates verbose output that has not happened yet, keeping it out of the main context entirely, so the right choice depends on which situation actually applies. A fixed token-count trigger ignores what kind of work is coming next, which is the more important signal. The two are not interchangeable, since one manages existing context and the other prevents new bloat. Subagents are not lossless by default, since they still require summarizing findings back to the coordinator, and detail can be lost there too."}, {"id": "F-D5-B2-14", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A structured extraction pipeline reports 96% overall field accuracy across all processed documents, and the team is preparing to turn off human review entirely based on that number. What is the most important risk this decision overlooks?", "options": ["The 96% aggregate figure may mask a specific document type or field with much lower accuracy that gets averaged out by higher-performing types", "A 96% accuracy rate is mathematically impossible for an extraction pipeline to sustain", "Human reviewers are always more accurate than any automated pipeline, regardless of the numbers", "Turning off human review will automatically reduce the pipeline's aggregate accuracy"], "correct": [0], "explanation": "A single aggregate accuracy number can hide large per-document-type or per-field variance, since a poorly performing category can be numerically drowned out by high-volume, high-accuracy categories, so the overall number alone does not justify removing review across the board. There is nothing implausible about a 96% aggregate rate, and blanket claims that humans are always more accurate, or that automation itself changes aggregate accuracy after the fact, are not supported reasoning for or against the decision."}, {"id": "F-D5-B2-15", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "Before removing human review from a document-extraction workflow that processes five distinct document types, a team wants to be confident that automation is safe. What should they do first?", "options": ["Measure and validate accuracy separately for each document type against a labeled test set, only automating types that clear the required threshold", "Run the pipeline on a larger volume of unlabeled documents and observe whether it appears stable", "Poll the team for their subjective confidence in the pipeline's quality", "Automate all five types simultaneously and monitor customer complaints afterward"], "correct": [0], "explanation": "Because accuracy can vary substantially by document type, validating each type separately against labeled ground truth is the only way to know whether each one individually is safe to automate. Running on more unlabeled volume provides no ground truth to measure accuracy against. Subjective team confidence is not a reliable substitute for measured accuracy. Automating everything at once and waiting for complaints turns customers into the quality-assurance mechanism, which is reactive rather than validated upfront."}, {"id": "F-D5-B2-16", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team auditing an extraction system draws 200 documents completely at random from a pool of 50,000, of which 47,000 are standard invoices and only 500 are complex multi-page contracts. The resulting sample contains almost no contracts. What sampling approach would better support confidence calibration across all document types?", "options": ["Increase the random sample size to 2,000 documents while keeping the sampling method purely random", "Use stratified sampling that ensures adequate representation from each document type, including the rarer contract category, rather than relying on proportional pure-random draws", "Sample only from the contract category going forward, since it is underrepresented", "Continue with pure random sampling, since larger sample sizes always self-correct for category imbalance"], "correct": [1], "explanation": "Stratified sampling deliberately draws enough examples from each category, including low-volume ones, so accuracy can be assessed reliably per type, which pure random sampling from a skewed population will not reliably do even at larger sizes. Simply enlarging a purely random sample will still draw contracts in roughly the same tiny proportion, leaving that stratum thin. Sampling only contracts going forward would lose visibility into the other, higher-volume types. The claim that larger random samples self-correct for skew is false when the underlying population itself is imbalanced."}, {"id": "F-D5-B2-17", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A team wants to compute a confidence score for each extracted field, such as invoice total, vendor name, or due date, so that low-confidence extractions can be routed to human review while high-confidence ones are auto-accepted. What is the most reliable basis for these field-level confidence scores?", "options": ["The extraction model's own self-reported confidence percentage returned alongside each field", "Historical accuracy of that specific field, measured against a labeled ground-truth set, broken out per field or field type", "The overall aggregate accuracy of the pipeline applied uniformly to every field", "The length of the extracted value, on the assumption that shorter values are less likely to be wrong"], "correct": [1], "explanation": "Field-level confidence should be grounded in measured, historical accuracy against labeled data for that specific field, since this reflects how often the field type is actually correct rather than a model's own unverified self-assessment. Self-reported model confidence is a known-unreliable proxy that does not track true correctness well. Applying one aggregate number to every field reintroduces the exact masking problem calibration is meant to fix, since some fields are harder than others. Value length is an arbitrary heuristic with no established relationship to correctness."}, {"id": "F-D5-B2-18", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "An agent extracting structured case details reports a self-assessed confidence of 95% for a particular field it filled in, but a review of labeled historical cases shows that field type is actually correct only about 70% of the time. Which confidence figure should a routing decision between auto-accepting the field and sending it to human review rely on?", "options": ["The 95% figure, since the model that produced the extraction is best positioned to judge its own certainty", "An average of the two figures, split down the middle", "The 70% empirically measured accuracy for that field type, since self-reported confidence is not a reliable indicator of actual correctness", "Whichever figure the customer would find more reassuring if disclosed"], "correct": [2], "explanation": "Self-reported model confidence is an unreliable proxy for actual correctness, so routing decisions should be grounded in empirically measured, field-specific historical accuracy rather than the model's own stated certainty. Trusting the self-report simply because the model produced the extraction ignores that self-assessment and true accuracy can diverge significantly, as this scenario shows. Averaging the two numbers has no principled basis and still lets the unreliable figure distort the result. What a customer would find reassuring is irrelevant to whether the routing decision is actually correct."}, {"id": "F-D5-B2-19", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "An extraction pipeline handles ten document types. Nine types each show accuracy above 98%. The tenth, handwritten intake forms, shows only 55% accuracy but makes up just 2% of total document volume, so the overall aggregate accuracy still comes out to about 97%. Given this breakdown, what is the appropriate decision about handwritten intake forms?", "options": ["Automate all ten types together, since the aggregate accuracy of 97% clearly clears any reasonable bar", "Keep handwritten intake forms under human review, or improve extraction for that type, despite the low volume, since per-type accuracy rather than the low-volume-adjusted aggregate determines whether outputs for that type can be trusted", "Exclude handwritten intake forms from the accuracy calculation entirely so they do not distort the aggregate", "Lower the accuracy threshold for handwritten forms so they blend in with the other nine types' results"], "correct": [1], "explanation": "The low-accuracy type still produces wrong extractions whenever it occurs, regardless of how small a share of overall volume it represents, so decisions about automating it should be based on its own measured accuracy rather than an aggregate that low volume lets it hide inside. Automating everything based on the blended 97% would mean every handwritten form processed automatically is more likely than not to contain an error nobody catches. Excluding it from measurement does not fix the underlying accuracy problem, it just stops reporting on it. Lowering the bar to make the numbers match inverts the purpose of calibration."}, {"id": "F-D5-B2-20", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "medium", "question": "A team wants to build a defensible process for deciding which parts of an automated pipeline, such as extraction fields, document types, or agent decisions, are safe to run without human review. Which of the following practices should be part of that process? Select all that apply.", "options": ["Break down accuracy metrics by category, such as document type, field, or decision type, instead of relying only on an aggregate figure", "Use stratified sampling so lower-volume categories still get enough labeled examples to assess reliably", "Base go/no-go decisions primarily on the model's own self-reported confidence in its outputs", "Derive confidence thresholds from historical accuracy measured against labeled ground truth", "Assume that once overall aggregate accuracy clears a single fixed bar, every category is automatically safe to automate"], "correct": [0, 1, 3], "explanation": "Breaking metrics down by category, using stratified sampling to ensure adequate coverage of rare categories, and deriving thresholds from labeled historical accuracy are the core building blocks of a defensible calibration process, since together they reveal per-category risk that a single number cannot. Relying on the model's self-reported confidence is explicitly unreliable as a basis for such decisions. Assuming a single aggregate bar makes every category safe is exactly the masking failure the other practices are designed to catch."}, {"id": "F-D5-B2-21", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A team is designing the labeled validation set they will use to calibrate confidence for an extraction pipeline covering many document types with very different volumes in production. What is the most important property that validation set needs?", "options": ["It should mirror production volume proportions exactly, so common types dominate the labeled set the same way they dominate real traffic", "It should include enough labeled examples of each document type, including low-volume ones, to produce statistically meaningful per-type accuracy figures, even if that means oversampling rare types relative to production volume", "It only needs to be large in total size; the internal distribution across document types does not matter", "It should be drawn exclusively from the document types that already show the highest accuracy, to establish a reliable baseline"], "correct": [1], "explanation": "If the validation set mirrors production's skewed volume, rare document types end up with too few labeled examples to compute a trustworthy per-type accuracy figure, which is the same failure stratified sampling is meant to prevent, so the set needs deliberately adequate representation of every type. Mirroring production proportions exactly reproduces the sparse-coverage problem for rare types. Total size alone without attention to per-type coverage can still leave individual categories under-sampled. Restricting to already-high-accuracy types tells you nothing about the categories most likely to need review."}, {"id": "F-D5-B2-22", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team has computed reliable, labeled-data-derived confidence scores for each extracted field in their pipeline. What is the most effective way to operationalize these scores in production?", "options": ["Publish them in an internal dashboard for reference, without connecting them to the extraction workflow itself", "Route extractions with confidence below a defined threshold to human review, and auto-accept those above it", "Use the scores only to retroactively audit already-delivered results once a month", "Discard the scores once the initial calibration study is complete, since the pipeline's aggregate accuracy is already known"], "correct": [1], "explanation": "Confidence scores deliver value when they are wired directly into the routing decision, sending lower-confidence extractions to human review while letting high-confidence ones flow through automatically, which is the whole point of computing them at the field level. A dashboard with no workflow connection does not change what happens to any actual extraction. Purely retroactive monthly audits let errors reach downstream systems before anyone catches them. Discarding the scores after the initial study throws away an ongoing signal in favor of a single static aggregate number, reintroducing the masking problem."}, {"id": "F-D5-B2-23", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A customer support resolution agent shows an overall 92% customer satisfaction score across all interaction types. A deeper breakdown reveals that refund-related escalations specifically have only a 40% satisfaction rate, even though they represent a small fraction of total interactions. What does this pattern most directly illustrate?", "options": ["That the 92% aggregate score is invalid and should be discarded entirely", "That refund-related escalations are inherently impossible to resolve well and should be removed from the agent's scope", "That an aggregate success metric can mask a specific, high-stakes interaction category performing far worse than the overall number suggests", "That customer satisfaction scores are always an unreliable metric and should never be used"], "correct": [2], "explanation": "This is a direct example of an aggregate metric hiding poor performance in a specific subgroup that matters a great deal even though it is numerically small, which is exactly the reasoning that motivates breaking metrics down by category before trusting the overall number. The aggregate figure is not invalid; it is accurate as an overall average, it is just insufficient on its own. Concluding the category is inherently unresolvable overreaches well beyond what a satisfaction gap actually shows. Declaring satisfaction scores broadly unreliable is a much stronger claim than the evidence supports, since the issue here is granularity, not the metric's validity in general."}, {"id": "F-D5-B2-24", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team wants to gradually reduce the volume of documents sent to human reviewers without compromising accuracy on any single document type. What is the safest first step?", "options": ["Immediately disable human review for the document type with the highest historical volume, since that yields the largest workload reduction", "Identify which document types have been validated, through per-type accuracy against labeled data, to reliably clear the required bar, and automate only those, leaving the rest under review", "Reduce the review workload uniformly by having reviewers spend less time per document across all types", "Ask reviewers to self-report which document types feel easiest, and automate those first"], "correct": [1], "explanation": "The safest reduction path automates only the document types that have actually been measured, per type, to clear the accuracy bar, leaving unvalidated or lower-accuracy types under review until they are proven out. Picking the highest-volume type first optimizes for workload reduction without regard to whether that type's accuracy has actually been validated. Uniformly cutting reviewer time per document degrades review quality everywhere instead of removing review only where it is safe to. Reviewer gut feel about difficulty is a subjective proxy, not a measured one, and does not reliably predict actual accuracy."}, {"id": "F-D5-B2-25", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A monthly quality-assurance audit for an extraction pipeline randomly samples documents in proportion to how frequently each document type appears in production traffic. One rare but high-stakes document type, legal notices, makes up under 1% of volume and, as a result, appears in almost none of the monthly audit samples. What does this audit design fail to achieve?", "options": ["It fails to give any document type enough total processing volume to be useful", "It fails to provide adequate, statistically meaningful coverage of the rare but high-stakes document type, leaving its true accuracy essentially unmeasured", "It fails to reduce the overall cost of running quality-assurance audits", "It fails because proportional sampling is not a valid statistical technique in any context"], "correct": [1], "explanation": "Sampling proportionally to production volume systematically starves low-volume categories of audit coverage, so a rare but high-stakes type like legal notices ends up with essentially no measured accuracy at all, which is precisely the gap stratified sampling closes by guaranteeing adequate examples from every category. The audit does not affect processing volume, which is a production throughput question rather than a sampling one. Cost reduction is not the property in question here. Proportional random sampling is a valid technique in many contexts, so the issue is that it is the wrong tool when rare-but-important categories need dedicated coverage, not that the technique is universally invalid."}, {"id": "F-D5-B2-26", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A multi-agent research system's reporting subagent compiles a final report from findings gathered by several web-search and document-analysis subagents. A reviewer later wants to check whether a specific claim in the report is actually supported by evidence. What should the report include to make this kind of verification possible?", "options": ["A structured mapping from each claim in the report to the specific source or sources that support it", "A single sources-consulted list at the end of the document, without per-claim attribution", "A confidence percentage attached to the report as a whole, rather than to individual claims", "A summary of how many total sources were used across the whole investigation"], "correct": [0], "explanation": "Verifying a specific claim requires knowing exactly which source or sources support that claim, which is what a structured claim-to-source mapping provides, whereas a general list of sources consulted does not indicate which one backs any particular sentence. A single report-wide confidence score does not help verify any individual claim either. A total source count is a volume statistic rather than a traceability mechanism, and it provides no path back to evidence for a specific assertion."}, {"id": "F-D5-B2-27", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "While synthesizing a report on a company, a research system's document-analysis subagent finds one source reporting the company's annual revenue as 50 million dollars and another reporting it as 65 million dollars. The reporting subagent must produce a single coherent paragraph about the company's financials. What is the best way to handle this in the final report?", "options": ["Report the average of the two figures, presented as a single reconciled number", "Report the higher figure, since it presents the company in the most favorable light", "Present both figures explicitly along with their respective sources, and flag the discrepancy rather than silently resolving it", "Omit the revenue figure from the report entirely to avoid the conflict"], "correct": [2], "explanation": "When sources conflict on a factual value, the reliable approach is to surface both values with their sources and flag the discrepancy so the reader can judge which is more credible or current, rather than silently manufacturing a single answer. Averaging the two numbers invents a figure that neither source actually reported. Picking the more favorable number has no basis in evidence quality and introduces bias. Dropping the figure entirely removes useful information rather than handling the conflict transparently."}, {"id": "F-D5-B2-28", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A synthesis subagent is drafting a research report and needs to decide, for each finding, whether to present it as an established fact or as a contested and uncertain point. Which basis for that classification is most defensible?", "options": ["Classify a finding as established when multiple independent, credible sources agree on it, and as contested when sources disagree or the finding rests on thin or single-source evidence", "Classify every finding that appears in more than one document as established, regardless of source independence or credibility", "Classify a finding as established whenever the subagent itself expresses high confidence in its own synthesis", "Classify findings as established or contested based on which classification makes the report read more authoritatively"], "correct": [0], "explanation": "Distinguishing established from contested findings should track actual evidentiary support, meaning agreement across independent, credible sources versus disagreement or thin sourcing, since that is what tells a reader how much weight to place on a claim. Counting mere appearance in more than one document ignores whether those documents are actually independent or credible, which could still describe a single rumor repeated verbatim. A subagent's own confidence in its synthesis is a self-reported signal, not evidence of source agreement. Optimizing for how authoritative the report sounds has nothing to do with whether a finding is actually well-supported."}, {"id": "F-D5-B2-29", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A draft research report states as plain fact that a new regulation applies retroactively, but investigation shows this claim traces to a single unverified blog post, while two peer-reviewed legal analyses explicitly state the regulation is not retroactive. How should the reporting subagent present this claim in the final report?", "options": ["Keep the claim stated as fact, since it was the first source found on the topic", "Remove all mention of retroactivity from the report to avoid taking a position", "Present the claim as contested, noting that it rests on a single unverified source while explicitly citing the two peer-reviewed analyses that reach the opposite conclusion", "State that the regulation is not retroactive as settled fact, since peer-reviewed sources outnumber the blog post two to one"], "correct": [2], "explanation": "With sources actively disagreeing and unevenly credible, the honest presentation is to mark the claim as contested and show the reader both the thin, single-source claim and the more credible sources that contradict it, so they can weigh the evidence themselves. Presenting the weakly sourced claim as settled fact misrepresents its evidentiary basis. Omitting the topic entirely hides a materially relevant finding instead of handling the conflict transparently. Declaring the opposite position settled purely by source count is closer to the right conclusion but still overstates certainty by treating a vote count as equivalent to a resolved question, glossing over that a real disagreement exists."}, {"id": "F-D5-B2-30", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team synthesizes a report by extracting and merging structured data, such as pricing, headcount, or leadership, from several source documents collected at different times. Why is it important to include each source's publication or collection date alongside the extracted value?", "options": ["Dates are required by the JSON schema validator and serve no other purpose", "Without dates, a reader cannot judge whether a value is current or stale, which matters especially when sources disagree and the difference may simply reflect that they were collected at different times", "Dates make the report longer, which increases its perceived thoroughness", "Dates are only relevant for sources published within the last 24 hours"], "correct": [1], "explanation": "For time-sensitive facts, a collection or publication date lets the reader assess currency and often explains an apparent conflict between sources as simply reflecting different points in time rather than an unresolved contradiction. Framing this as a schema-validation formality misses the actual reason dates matter for trustworthiness. Length or perceived thoroughness is not a legitimate reason to include dates. Restricting relevance to sources from the last day is arbitrary, since dates matter whenever facts can change over time, which is common well beyond a single day."}, {"id": "F-D5-B2-31", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "To keep the final report concise, a reporting subagent's summarization step strips out inline citations and source attributions from each paragraph, leaving only a general bibliography at the end of the document. What is the main risk this creates?", "options": ["The report becomes too short to be useful to readers", "Individual claims lose their traceability back to specific evidence, so a reader can no longer verify or challenge any particular assertion in the report", "The bibliography format will fail JSON schema validation", "Removing inline citations will cause the underlying source documents to become inaccessible to future subagents"], "correct": [1], "explanation": "Stripping per-claim attribution breaks the structured claim-to-source mapping that lets a reader verify any individual assertion, since a general bibliography shows what was consulted overall but not which source backs any specific sentence. Conciseness is not actually a downside here, since the problem is what got cut, not the resulting length. A bibliography has no inherent schema requirement in this context, and removing citations from a report has no effect on whether the underlying documents remain accessible elsewhere."}, {"id": "F-D5-B2-32", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "Two subagents research the same compliance question. One cites guidance published in 2019, and the other cites updated guidance published in 2026. The two sources reach different conclusions about what is currently required. How should the reporting subagent resolve this in the final report?", "options": ["Present only the 2026 guidance as the answer, without mentioning that older guidance existed or differed", "Present only the 2019 guidance, since it was presumably the first one found during research", "Present both sources with their dates, note that the more recent guidance likely reflects current requirements, and flag the older guidance as historical and superseded rather than silently dropping it", "Average the two positions into a single blended recommendation"], "correct": [2], "explanation": "Including both sources with their dates lets the report explain the apparent conflict as a matter of timing, with newer guidance superseding older guidance, while still preserving the historical context transparently rather than erasing it. Presenting only the newer guidance without explanation reaches a defensible practical conclusion but hides the reasoning and the fact that a conflict was even resolved. Presenting only the older source risks giving outdated compliance guidance without any indication it may be stale. Averaging two compliance positions produces a blended answer that does not correspond to either actual regulatory guidance and could be actively misleading."}, {"id": "F-D5-B2-33", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A team wants claim-to-source mappings to be reliably present in every report a synthesis subagent produces, rather than depending on the subagent remembering to include them in free-form prose. What is the most effective way to enforce this?", "options": ["Add a brief, polite reminder in the system prompt asking the subagent to try to cite sources when possible", "Require the synthesis output to be produced as structured output, for example through tool_use with a schema, where each claim field is paired with a required source-reference field", "Manually review every report after the fact and add citations that are missing", "Increase the subagent's model tier, assuming a more capable model will remember to cite sources unprompted"], "correct": [1], "explanation": "Structured output with a schema that makes the source-reference field required alongside each claim gives a deterministic, enforced guarantee that the mapping is always present, rather than relying on the model to remember or comply with a soft instruction. A prompt-only reminder is probabilistic and can be skipped in any given generation. Manual after-the-fact review is a detective control that catches problems after publication rather than preventing them. A more capable model may improve compliance somewhat but still does not guarantee the field is always present the way an enforced schema does."}, {"id": "F-D5-B2-34", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "medium", "question": "A team is defining standards for how their multi-agent research system should handle provenance when synthesizing a final report from many sources. Which of the following should be part of those standards? Select all that apply.", "options": ["Every claim in the report should map to the specific source or sources that support it", "Conflicting values found across sources should be annotated and shown together rather than silently resolved into a single number", "Each cited source should carry its publication or collection date so currency can be assessed", "Findings should always be presented with uniform confidence, regardless of how many independent sources support them", "Once a report is published, its source citations can be safely discarded since the findings themselves are what matters"], "correct": [0, 1, 2], "explanation": "Mapping claims to sources, annotating rather than silently resolving conflicting values, and including dates on cited sources are the core standards that preserve provenance and let readers judge reliability and currency. Presenting all findings with uniform confidence erases the meaningful distinction between well-corroborated and thinly sourced claims. Discarding citations after publication destroys the very traceability the other standards are meant to establish, and undermines any future need to verify or update the report."}, {"id": "F-D5-B2-35", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A synthesis process merges company headcount figures from two source documents: one states 1,200 employees as of January 2025, and the other states 1,500 employees as of June 2026. The merged report currently reports only the figure of 1,500 with no further context. What is the problem with the current merged output, and what should be fixed?", "options": ["There is no problem; the more recent figure is correct by definition and no further context is needed", "The report should include both figures with their respective dates, since presenting only the newer number without context obscures that the values differ and hides that a company's headcount can genuinely change over time", "The report should present the average of the two figures as the best estimate", "The report should exclude headcount entirely, since the two source documents disagree"], "correct": [1], "explanation": "Silently keeping only the newer number strips out the fact that the two sources disagree and the dates that would let a reader understand why, whereas presenting both figures with their dates preserves that context and is consistent with treating growth over roughly a year and a half as a plausible, not necessarily contradictory, explanation. Assuming the newer figure is simply correct with no further explanation is a reasonable practical default but is not defensible as the final answer without surfacing the source and date that justify it. Averaging invents a number neither source reported and obscures the actual trend. Dropping the field entirely discards a real, useful data point instead of contextualizing the disagreement."}, {"id": "F-D5-B2-36", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A research report includes a specific claim about a competitor's upcoming product launch date. That claim is sourced entirely from a single unverified social media post, while every other claim in the report is corroborated by at least two independent, credible sources. How should this claim be presented relative to the rest of the report?", "options": ["With the same weight and phrasing as the well-corroborated claims, since all claims came from the same research process", "Flagged as lower-confidence and explicitly attributed to the single unverified source, distinguishing it from the more thoroughly corroborated findings around it", "Removed from the report, since single-source claims should never be included regardless of relevance", "Elevated to the report's headline finding, since a product launch date is likely to be the most interesting detail to readers"], "correct": [1], "explanation": "Presenting a thinly sourced, unverified claim with the same confidence as well-corroborated findings misleads the reader about how much to trust it, so it should be explicitly flagged and attributed to its single source to distinguish its evidentiary basis from the rest of the report. Giving it equal, unmarked weight blurs exactly that distinction. Removing all single-source claims unconditionally is heavier-handed than necessary, since a clearly labeled single-source claim can still be useful information as long as its status is transparent. Elevating it to a headline rewards how interesting a claim is rather than how well-supported it is, which is the wrong basis for prominence."}, {"id": "F-D5-B2-37", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A coordinator notices that, across several past reports, readers have repeatedly been unable to determine which subagent or source a given sentence in the final report actually came from, making it hard to challenge or double-check specific claims. What structural change to the reporting subagent's output would most directly fix this recurring issue?", "options": ["Have the reporting subagent write in a more confident, authoritative tone so readers trust it without needing to check sources", "Require the reporting subagent to produce output where every claim is explicitly linked to the source or sources, and where relevant the subagent, that produced the underlying finding, rather than free-flowing prose with no attribution structure", "Shorten future reports so there are fewer claims that could need verification", "Have the coordinator, rather than the reporting subagent, verbally reassure readers that the report is accurate"], "correct": [1], "explanation": "The recurring problem is a missing structural link between claims and their evidence, so the direct fix is to require the reporting subagent's output format to carry that mapping explicitly for every claim, rather than leaving attribution implicit in prose. A more confident tone makes the report harder to challenge without actually making it more verifiable, which is the opposite of what is needed. Shortening reports reduces the number of claims but does not fix the attribution structure for the claims that remain. A verbal assurance from the coordinator is not a substitute for an actual evidentiary trail."}]</script>
<script>
"use strict";
document.getElementById('themeBtn').addEventListener('click',function(){
  var h=document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark');
});
const QBANK = JSON.parse(document.getElementById('qbank').textContent);
const CERTS = {
  "CCAR-F":{code:"CCAR-F",name:"Claude Certified Architect: Foundations",fullLen:60,examMin:120,passPct:72,
    tagline:"Hands-on: Agent SDK, Claude Code, MCP, structured output"}
};
const app = document.getElementById('app');
const topRight = document.getElementById('topRight');
const brandSub = document.getElementById('brandSub');

function bankStats(){
  const s={}; for(const c in CERTS) s[c]={total:0,domains:{}};
  QBANK.forEach(q=>{s[q.cert].total++; s[q.cert].domains[q.domain]=(s[q.cert].domains[q.domain]||0)+1;});
  return s;
}
const STATS = bankStats();
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmtTime(sec){sec=Math.max(0,Math.round(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?h+":"+String(m).padStart(2,"0"):m)+":"+String(s).padStart(2,"0");}

let sel={cert:"CCAR-F",length:10};
let S=null; // active session

/* ---------------- HOME ---------------- */
function renderHome(){
  brandSub.textContent="Practice Exams · CCAR-F";
  topRight.innerHTML="";
  const c=CERTS[sel.cert];
  const fullN=c.fullLen;
  const lenOpts=[{v:10,l:"Quick check"},{v:25,l:"Standard set"},{v:"full",l:"Full mock exam"}];
  app.innerHTML=`
  <div class="card hero">
    <h1>Practice the Claude Certified Architect: Foundations exam</h1>
    <p class="sub">Original scenario-based questions written to the official CCAR-F exam blueprint. Pick a length, and every session is freshly shuffled with answer explanations at the end.</p>
  </div>

  <div class="section-label">1 · Choose a length</div>
  <div class="len-grid">
    ${lenOpts.map(o=>{const n=o.v==="full"?fullN:o.v;const label=o.v==="full"?`Full · ${fullN} Q`:`${o.v} questions`;
      const t=o.v==="full"?c.examMin:Math.round(n*2);
      return `<button class="len-card ${sel.length===o.v?'sel':''}" data-len="${o.v}">
        <div class="n">${o.v==="full"?fullN:o.v}</div><div class="l">${o.l}</div>
        <div class="l" style="margin-top:6px;color:var(--faint)">${t} min timer</div></button>`;}).join("")}
  </div>

  <div class="start-row">
    <button class="btn primary lg" id="startBtn">Start session →</button>
    <span style="font-size:13.5px;color:var(--muted)">${sel.length==="full"?fullN:sel.length} questions · ${sel.length==="full"?c.examMin:Math.round((sel.length)*2)} min · ${c.code}</span>
  </div>

  <div class="card" style="padding:18px 20px;margin-top:26px">
    <div class="section-label" style="margin:0 0 8px">${sel.cert} domain coverage</div>
    <div class="domain-list">
      ${Object.entries(STATS[sel.cert].domains).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<div><span>${esc(d)}</span><span class="mono" style="color:var(--faint)">${n}</span></div>`).join("")}
    </div>
  </div>

  <p class="disclaimer"><b>Unofficial study aid.</b> These are original practice questions written to the published exam guide for the Claude Certified Architect: Foundations (CCAR-F) certification. They are not real exam questions and this tool is not affiliated with or endorsed by Anthropic. Pass/fail here uses an approximate 72% bar; the real exam uses scaled scoring (720/1000).</p>
  `;
  app.querySelectorAll("[data-len]").forEach(b=>b.onclick=()=>{sel.length=b.dataset.len==="full"?"full":+b.dataset.len;renderHome();});
  document.getElementById("startBtn").onclick=beginSession;
}

/* ---------------- SESSION ---------------- */
function beginSession(){
  const cert=sel.cert, c=CERTS[cert];
  const pool=QBANK.filter(q=>q.cert===cert);
  const n=sel.length==="full"?c.fullLen:sel.length;
  const chosen=shuffle(pool.slice()).slice(0,Math.min(n,pool.length));
  const questions=chosen.map(q=>{
    const order=shuffle(q.options.map((_,i)=>i));
    const options=order.map(i=>q.options[i]);
    const correct=[]; order.forEach((orig,ni)=>{if(q.correct.includes(orig))correct.push(ni);});
    return {id:q.id,domain:q.domain,type:q.type,difficulty:q.difficulty,question:q.question,explanation:q.explanation,options,correct};
  });
  const durationSec=(sel.length==="full"?c.examMin*60:n*120);
  S={cert,length:sel.length,questions,answers:questions.map(()=>[]),flagged:new Set(),current:0,
     durationSec,remaining:durationSec,timer:null,submitted:false};
  startTimer();
  renderQuiz();
}
function startTimer(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    S.remaining--;
    if(S.remaining<=0){S.remaining=0;paintTimer();finishExam(true);}
    else paintTimer();
  },1000);
}
function paintTimer(){
  const el=document.getElementById("timer");
  if(!el)return;
  el.textContent="⏱ "+fmtTime(S.remaining);
  el.classList.toggle("warn",S.remaining<=300);
}

function renderQuiz(){
  brandSub.textContent=CERTS[S.cert].code+" · "+(S.length==="full"?"Full mock":S.questions.length+" questions");
  topRight.innerHTML=`<div class="timer" id="timer">⏱ ${fmtTime(S.remaining)}</div>`;
  const i=S.current, q=S.questions[i];
  const chosen=S.answers[i];
  const answeredCount=S.answers.filter(a=>a.length).length;
  app.innerHTML=`
    <div class="qtop">
      <span class="qcount">Question ${i+1} of ${S.questions.length}</span>
      <div class="progress"><i style="width:${(answeredCount/S.questions.length)*100}%"></i></div>
      <span class="qcount">${answeredCount} answered</span>
    </div>
    <div class="card qcard">
      <div class="qbadges">
        <span class="badge dom">${esc(q.domain)}</span>
        <span class="badge type">${q.type==="multiple"?"Select all that apply":"Single answer"}</span>
        <span class="badge diff-${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="qtext">${esc(q.question)}</div>
      ${q.type==="multiple"?`<p class="hint">Select all that apply: ${q.correct.length} answers are correct.</p>`:""}
      <div class="opts" id="opts">
        ${q.options.map((o,oi)=>{
          const on=chosen.includes(oi);
          return `<button class="opt ${q.type==="multiple"?'check':'radio'} ${on?'chosen':''}" data-oi="${oi}">
            <span class="box">${on?(q.type==="multiple"?'✓':'●'):''}</span>
            <span class="txt">${esc(o)}</span></button>`;}).join("")}
      </div>
      <div class="qnav">
        <button class="btn" id="prevBtn" ${i===0?'disabled':''}>← Previous</button>
        <button class="flagbtn ${S.flagged.has(i)?'on':''}" id="flagBtn">⚑ ${S.flagged.has(i)?'Flagged':'Flag'}</button>
        ${i===S.questions.length-1?`<button class="btn primary" id="submitBtn">Review &amp; submit</button>`:`<button class="btn primary" id="nextBtn">Next →</button>`}
      </div>
    </div>

    <div class="card navigator">
      <h3>Question navigator</h3>
      <div class="grid-nums" id="nav">
        ${S.questions.map((_,k)=>`<button class="gn ${S.answers[k].length?'answered':''} ${k===i?'current':''} ${S.flagged.has(k)?'flagged':''}" data-k="${k}">${k+1}</button>`).join("")}
      </div>
      <div class="legend">
        <span><i style="background:#cc7a5c33;border:1.5px solid var(--accent-d)"></i> Answered</span>
        <span><i style="background:#fff;border:1.5px solid var(--border)"></i> Unanswered</span>
        <span><i style="background:var(--amber)"></i> Flagged</span>
      </div>
      <div style="margin-top:16px;text-align:right"><button class="btn ghost" id="submitBtn2">Review &amp; submit exam</button></div>
    </div>
  `;
  paintTimer();
  document.querySelectorAll("#opts .opt").forEach(b=>b.onclick=()=>choose(+b.dataset.oi));
  const prev=document.getElementById("prevBtn"); if(prev)prev.onclick=()=>{S.current--;renderQuiz();};
  const next=document.getElementById("nextBtn"); if(next)next.onclick=()=>{S.current++;renderQuiz();};
  document.getElementById("flagBtn").onclick=()=>{S.flagged.has(i)?S.flagged.delete(i):S.flagged.add(i);renderQuiz();};
  const sb=document.getElementById("submitBtn"); if(sb)sb.onclick=confirmSubmit;
  document.getElementById("submitBtn2").onclick=confirmSubmit;
  document.querySelectorAll("#nav .gn").forEach(b=>b.onclick=()=>{S.current=+b.dataset.k;renderQuiz();});
}
function choose(oi){
  const i=S.current,q=S.questions[i],a=S.answers[i];
  if(q.type==="multiple"){const p=a.indexOf(oi);p>=0?a.splice(p,1):a.push(oi);}
  else {S.answers[i]=[oi];}
  renderQuiz();
}

/* ---------------- SUBMIT CONFIRM ---------------- */
function confirmSubmit(){
  const answered=S.answers.filter(a=>a.length).length;
  const un=S.questions.length-answered;
  const ov=document.createElement("div");ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h3>Submit your exam?</h3>
    <p>Once you submit you'll see your score, a domain breakdown, and an explanation for every question.</p>
    <div class="stats">
      <div><b>${answered}</b><small>Answered</small></div>
      <div><b style="color:${un?'var(--red)':'inherit'}">${un}</b><small>Unanswered</small></div>
      <div><b>${S.flagged.size}</b><small>Flagged</small></div>
    </div>
    ${un?`<p style="color:var(--red)">${un} question${un>1?'s':''} still unanswered, they'll be marked incorrect.</p>`:""}
    <div class="modal-row">
      <button class="btn ghost" id="mCancel">Keep going</button>
      <button class="btn primary" id="mGo">Submit exam</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#mCancel").onclick=()=>ov.remove();
  ov.querySelector("#mGo").onclick=()=>{ov.remove();finishExam(false);};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

/* ---------------- RESULTS ---------------- */
function grade(){
  let correct=0;const dom={};
  S.questions.forEach((q,i)=>{
    const ch=[...S.answers[i]].sort((a,b)=>a-b),co=[...q.correct].sort((a,b)=>a-b);
    const ok=ch.length===co.length&&ch.every((v,k)=>v===co[k]);
    q._ok=ok;if(ok)correct++;
    dom[q.domain]=dom[q.domain]||{c:0,t:0};dom[q.domain].t++;if(ok)dom[q.domain].c++;
  });
  return {correct,total:S.questions.length,dom};
}
function bandColor(p){return p>=72?"var(--green)":p>=50?"var(--amber)":"var(--red)";}
function finishExam(auto){
  clearInterval(S.timer);S.submitted=true;
  const g=grade();const pct=Math.round(g.correct/g.total*100);
  const pass=pct>=CERTS[S.cert].passPct;
  const used=S.durationSec-S.remaining;
  const R=2*Math.PI*52;const off=R*(1-pct/100);
  brandSub.textContent=CERTS[S.cert].code+" · Results";
  topRight.innerHTML="";
  S._filter="all";
  app.innerHTML=`
    <div class="card res-hero">
      <div class="ring">
        <svg width="128" height="128" viewBox="0 0 128 128">
          <circle cx="64" cy="64" r="52" fill="none" stroke="var(--border)" stroke-width="12"/>
          <circle cx="64" cy="64" r="52" fill="none" stroke="${bandColor(pct)}" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${R.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 64 64)"/>
          <text x="64" y="60" text-anchor="middle" font-size="30" font-weight="750" fill="var(--ink)">${pct}%</text>
          <text x="64" y="80" text-anchor="middle" font-size="13" fill="var(--muted)">${g.correct}/${g.total}</text>
        </svg>
      </div>
      <div class="res-head" style="flex:1;min-width:220px">
        <h2>${auto?"Time's up. ":""}You scored ${g.correct} / ${g.total}</h2>
        <span class="verdict ${pass?'pass':'fail'}">${pass?'✓ Above the pass bar':'✗ Below the pass bar'}</span>
        <div class="sub">${CERTS[S.cert].name}${auto?" · exam auto-submitted when the timer ran out":""}. Pass bar ≈ ${CERTS[S.cert].passPct}% (approximate: real exam scales to 720/1000).</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="k">Score</div><div class="v">${pct}%</div></div>
      <div class="card stat"><div class="k">Correct</div><div class="v">${g.correct}<span style="font-size:15px;color:var(--muted)"> / ${g.total}</span></div></div>
      <div class="card stat"><div class="k">Time used</div><div class="v">${fmtTime(used)}</div></div>
    </div>

    <div class="card dom-break">
      <h3>Performance by domain</h3>
      <div class="cap">Where your points came from. Target the low bars before your next attempt.</div>
      ${Object.entries(g.dom).sort((a,b)=>(a[1].c/a[1].t)-(b[1].c/b[1].t)).map(([d,o])=>{
        const p=Math.round(o.c/o.t*100);
        return `<div class="dbar"><div class="top"><b>${esc(d)}</b><span class="sc" style="color:${bandColor(p)}">${o.c}/${o.t} · ${p}%</span></div>
          <div class="track"><i style="width:${p}%;background:${bandColor(p)}"></i></div></div>`;}).join("")}
    </div>

    <div class="rev-tools">
      <span style="font-weight:650;font-size:14px;margin-right:4px">Review answers</span>
      <button class="filterbtn on" data-f="all">All (${g.total})</button>
      <button class="filterbtn" data-f="wrong">Incorrect (${g.total-g.correct})</button>
      <button class="filterbtn" data-f="flag">Flagged (${S.flagged.size})</button>
    </div>
    <div id="reviewList"></div>

    <div class="footer-actions">
      <button class="btn primary lg" id="retake">↻ New ${S.length==="full"?"full":S.length+"-question"} session</button>
      <button class="btn lg" id="home">Change length</button>
    </div>
  `;
  app.querySelectorAll(".filterbtn").forEach(b=>b.onclick=()=>{
    app.querySelectorAll(".filterbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");
    S._filter=b.dataset.f;paintReview();});
  document.getElementById("retake").onclick=()=>{sel.cert=S.cert;sel.length=S.length;beginSession();};
  document.getElementById("home").onclick=renderHome;
  paintReview();
  window.scrollTo(0,0);
}
function paintReview(){
  const list=document.getElementById("reviewList");
  const items=S.questions.map((q,i)=>({q,i})).filter(({q,i})=>{
    if(S._filter==="wrong")return !q._ok;
    if(S._filter==="flag")return S.flagged.has(i);
    return true;});
  if(!items.length){list.innerHTML=`<div class="card" style="padding:24px;text-align:center;color:var(--muted)">Nothing to show in this filter.</div>`;return;}
  list.innerHTML=items.map(({q,i})=>{
    const ua=S.answers[i];
    return `<div class="card rev">
      <div class="rev-head">
        <div class="qbadges" style="margin:0">
          <span class="badge dom">${esc(q.domain)}</span>
          <span class="badge diff-${q.difficulty}">${q.difficulty}</span>
          ${S.flagged.has(i)?`<span class="badge" style="background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)">⚑ flagged</span>`:""}
        </div>
        <span class="outcome ${q._ok?'ok':'no'}">${q._ok?'✓ Correct':(ua.length?'✗ Incorrect':'○ Skipped')}</span>
      </div>
      <div class="rq">${esc(i+1)}. ${esc(q.question)}</div>
      ${q.options.map((o,oi)=>{
        const isC=q.correct.includes(oi),isU=ua.includes(oi);
        let cls="",ic="",lab="";
        if(isC){cls="correct";ic="✓";lab="Correct answer";}
        else if(isU){cls="wrong";ic="✗";lab="Your answer";}
        else{ic="";}
        return `<div class="rev-opt ${cls}"><span class="ic">${ic}</span><span style="flex:1">${esc(o)}</span>${lab?`<span class="lab">${lab}${isC&&isU?" · you":""}</span>`:""}</div>`;
      }).join("")}
      <div class="expl"><b>Why:</b> ${esc(q.explanation)}</div>
    </div>`;}).join("");
}

renderHome();
</script>
</body>
</html>
