used, isolated exploration, and the coordinator's aggregation step is what actually produces the cross-subsystem interaction picture the user asked for. A single subagent reading the whole repository loses the benefit of parallel, focused delegation and risks an unfocused summary. Letting subagents read each other's notes directly bypasses the coordinator and removes the central point of observability into how the investigation is proceeding. Sampling files at random in the coordinator itself abandons delegation and is unlikely to reliably surface the specific interactions requested."}, {"id": "F-D1-B2-06", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A research coordinator delegates \"What is Acme Corp's projected 2027 revenue?\" to two subagents: one analyzing a recent analyst report (projecting $420M) and one analyzing Acme's own investor presentation (projecting $500M). Both subagents report high confidence. What should the coordinator do when aggregating these results into the final report?", "options": ["Average the two figures and report $460M as the single projected revenue figure.", "Present both figures in the final report, attribute each to its source, and note the discrepancy rather than silently picking one.", "Discard the investor presentation's figure because it comes from the company itself and is presumably biased.", "Report only the figure produced by whichever subagent finished first, since both subagents claimed high confidence."], "correct": [1], "explanation": "Good aggregation preserves provenance and surfaces genuine conflicts rather than manufacturing false certainty: attributing each number to its source and flagging the discrepancy lets the reader judge for themselves. Averaging two unrelated estimates invents a number that neither source actually supports and hides the real disagreement. Automatically discarding the company's own projection assumes bias without evidence and throws away a legitimate data point. Picking whichever subagent happened to finish first is an arbitrary tie-breaker unrelated to the quality or reliability of either source."}, {"id": "F-D1-B2-07", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support coordinator's decomposition logic classifies every incoming ticket into exactly one of two buckets, \"billing\" or \"technical,\" and routes accordingly. A customer writes: \"I want to file a formal complaint about how my data was shared with a third party without my consent.\" Neither subagent's specialty covers this. What does this scenario illustrate?", "options": ["The coordinator should always default ambiguous tickets to the billing subagent, since billing tickets are the most common.", "The technical subagent should be modified to also handle privacy complaints, since it already handles the largest ticket volume.", "A decomposition scheme that is too narrow can leave legitimate requests with no matching subagent, causing the request to fall through uncovered.", "The ticket should be silently closed, since neither subagent recognizes it as belonging to its area."], "correct": [2], "explanation": "This is exactly the risk of too-narrow decomposition: a fixed, small set of categories may not cover every real request, and a privacy/consent complaint has no natural home in a billing-vs-technical split, so it risks being mishandled or dropped. Defaulting uncovered tickets to billing just because it's the most common category doesn't fix the coverage gap; it silently misroutes a request. Bolting an unrelated specialty onto the technical subagent because it happens to have volume, rather than because it fits its actual expertise, treats the symptom rather than the coverage design. Silently closing an unrecognized ticket is the worst outcome the coverage gap can produce, not a justified response to it."}, {"id": "F-D1-B2-08", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A coordinator has been decomposing every \"should we enter this market\" research request into exactly three fixed subtasks: competitor landscape, pricing benchmarks, and market size. For a request about entering a heavily regulated industry, the final report is well-researched but the user complains it never addresses regulatory risk. What is the most effective fix?", "options": ["Add a fourth permanently fixed subtask, \"regulatory risk,\" that runs on every future request, regardless of industry.", "Instruct the competitor-landscape subagent to also mention regulatory issues if it happens to notice any while researching competitors.", "Ask the user to explicitly list every topic they want covered before submitting any research request.", "Have the coordinator derive its subtask list from the specifics of each incoming request instead of always applying the same three fixed categories."], "correct": [3], "explanation": "The underlying problem is a rigid, fixed decomposition that doesn't adapt to what each request actually needs; letting the coordinator tailor its subtasks to the specifics of the request fixes the general pattern, not just this one instance. Permanently bolting on a fourth fixed category still leaves a rigid scheme that could miss the next uncovered topic for a different kind of request: it treats one symptom rather than the decomposition strategy. Hoping a subagent focused on competitors will incidentally surface regulatory findings is unreliable, since that isn't its assigned focus. Requiring users to enumerate every topic themselves pushes the coordinator's decomposition responsibility onto the user instead of fixing the architecture."}, {"id": "F-D1-B2-09", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI coordinator always delegates pull-request reviews to exactly two subagents: one for test coverage, one for security. The engineering team's review checklist also requires documentation updates to be checked, but no subagent is ever assigned that job. What architectural change most directly closes this gap?", "options": ["Add a documentation-review subagent (or expand an existing subagent's scope) and have the coordinator delegate to it whenever a PR is expected to require doc updates.", "Increase the number of parallel invocations of the security subagent so more issues are caught overall.", "Instruct the test-coverage subagent to flag missing documentation as a lower-priority test finding.", "Have the coordinator itself write a brief note reminding the PR author to check documentation, without a dedicated review step."], "correct": [0], "explanation": "The two-subagent decomposition simply never covers documentation, so the fix is to extend the decomposition to include that concern (either a new subagent or a subagent whose scope is deliberately expanded), with the coordinator delegating to it. Running the security subagent more times doesn't add coverage of an entirely different concern that it was never built to check. Tacking documentation checks onto the test-coverage subagent as an afterthought conflates two different specialties and is likely to be applied inconsistently. A generic reminder from the coordinator isn't a review step at all and provides none of the structured checking the other concerns get."}, {"id": "F-D1-B2-10", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "In a hub-and-spoke research system, the synthesis subagent finishes early and, to save time, sends its draft summary directly to the reporting subagent without going back through the coordinator. What is the main architectural downside of this shortcut?", "options": ["The reporting subagent will be unable to technically parse any message that didn't originate from the coordinator.", "The coordinator's log no longer captures the full exchange between subagents, reducing observability into what each subagent actually produced and passed along.", "The synthesis subagent will lose access to its own conversation history as soon as it sends output anywhere.", "Direct subagent-to-subagent messages always cost significantly more tokens than routing through the coordinator."], "correct": [1], "explanation": "Routing all subagent communication through the coordinator exists specifically so the coordinator can observe, log, and, if needed, intervene in every exchange; a direct handoff creates a blind spot the coordinator can't see into. There's no technical barrier preventing a subagent from parsing a peer's message: the problem is architectural, not a parsing failure. A subagent doesn't lose its own history by sending a message elsewhere; that isn't how isolation between subagents works. There's no inherent token-cost penalty tied to routing versus not routing: the real cost here is lost visibility, not extra spend."}, {"id": "F-D1-B2-11", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A developer proposes letting the technical-troubleshooting subagent hand a partially resolved ticket directly to the escalation subagent, bypassing the coordinator, to shave a few seconds off resolution time. What is the strongest architectural reason to reject this proposal?", "options": ["Subagents are not permitted to produce any output except through their originally assigned coordinator call.", "It would exceed the escalation subagent's isolated context window, since it wasn't designed to receive input from other subagents.", "It would remove the coordinator's ability to see and control every step of the ticket's path, undermining the central observability that hub-and-spoke routing is meant to provide.", "It would prevent the technical subagent from being reused on future tickets."], "correct": [2], "explanation": "The core reason to route all communication through the coordinator is central observability and control: a direct subagent-to-subagent handoff creates an untracked path that the coordinator, and anyone auditing the system later, cannot see. Subagents aren't categorically forbidden from producing output outside a single call; the issue here is architectural design, not a hard technical restriction. Context-window capacity isn't inherently the blocker: the escalation subagent could technically receive the data; the problem is that doing so bypasses the coordinator's oversight. Reusability of the technical subagent on future tickets is unaffected by this one routing shortcut."}, {"id": "F-D1-B2-12", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A coordinator for a code-generation workflow has subagents for refactoring, test generation, and documentation updates. For a request that only asks to \"rename this function across the codebase,\" the coordinator invokes all three subagents anyway. What is the drawback of this approach?", "options": ["It violates the hub-and-spoke pattern, since a coordinator is only allowed to invoke a single subagent per request.", "It will cause the refactoring subagent to receive corrupted context from the other two subagents.", "It is architecturally required, since every subagent must run on every request to keep aggregation logic simple.", "It wastes work and adds unnecessary latency by running subagents whose specialties (test generation, documentation) aren't relevant to a simple rename request."], "correct": [3], "explanation": "Invoking every subagent regardless of relevance is the opposite of dynamic subagent selection: the coordinator should choose the subagent or subagents whose expertise actually matches the request, which here is just the refactoring subagent. Hub-and-spoke coordinators are free to invoke one, several, or all subagents as appropriate; there's no rule limiting them to exactly one. Running subagents in parallel doesn't corrupt another subagent's context, since each subagent's context is isolated from the others. Running every subagent on every request isn't an architectural requirement: dynamic selection is specifically what avoids that waste, and aggregation logic can still handle a variable number of contributing subagents."}, {"id": "F-D1-B2-13", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A coordinator needs to extract structured data from a 40-page commercial lease agreement covering parties, payment terms, and termination clauses. Which decomposition best applies hub-and-spoke delegation?", "options": ["Delegate each section (parties, payment terms, termination clauses) to a subagent focused on that section, then have the coordinator combine the three outputs into one JSON record.", "Send the entire 40-page document to a single subagent and ask it to extract everything in one pass, without any decomposition.", "Have the coordinator split the document into 40 single-page subagent calls, one per page, regardless of where clauses begin or end.", "Extract the data directly in the coordinator without delegating to any subagent, since extraction is a simple task."], "correct": [0], "explanation": "Delegating by logical section lets each subagent focus on a well-scoped, meaningful part of the document, and the coordinator's aggregation step assembles those results into the final structured record: a clean application of decomposition, delegation, and aggregation. Sending the whole document to one subagent abandons decomposition entirely and risks a less focused extraction across very different clause types. Splitting strictly by page number ignores where the actual sections begin and end, likely cutting a clause in half across two subagent calls. Bypassing subagents altogether discards the benefit of specialized, focused delegation even though the document has natural, delegable sections."}, {"id": "F-D1-B2-14", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "hard", "question": "A research coordinator has been locked into decomposing every \"vendor evaluation\" request into exactly two fixed subtasks (pricing comparison and feature comparison), regardless of what the request actually asks. Users increasingly report that important aspects of their requests, such as vendor financial stability or support quality, never appear in the final report. Which of the following changes would most directly reduce this coverage-gap risk?", "options": ["Increase the number of parallel pricing-comparison subagent calls so pricing data is triple-checked before the report is finalized.", "Have the coordinator derive its list of subtasks from the specific content of each incoming request instead of always applying the same two fixed categories.", "Give the pricing-comparison and feature-comparison subagents a larger set of tools so they can each do more within their existing scope.", "Add a coordinator-level check that compares the original request against the subtask outputs and flags any requested aspect that no subagent addressed.", "Allow the coordinator to spin up an additional subagent mid-task when a novel aspect of the request is discovered that the initial two subtasks don't cover."], "correct": [1, 3, 4], "explanation": "The root issue is a decomposition scheme frozen to two categories no matter what the request actually contains, so the fixes that work are the ones that make the subtask list responsive to the request: deriving subtasks from the request itself, explicitly checking coverage against the original ask, and letting the coordinator add a subagent when it discovers an uncovered aspect. Running the pricing subagent more times only deepens work on a category that was never the gap: the missing aspects were financial stability and support quality, not pricing accuracy. Giving the existing two subagents more tools lets them work harder within their current scope but does nothing to introduce the topics that scope excludes."}, {"id": "F-D1-B2-15", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "In a customer-support hub-and-spoke system, an engineer proposes that the billing subagent should be allowed to forward its findings directly to the escalation subagent, skipping the coordinator, whenever it detects a high-value account. Which of the following are legitimate reasons to reject this proposal?", "options": ["Subagents are technically incapable of formatting output that another subagent could read.", "The coordinator's record of the interaction would no longer include a complete account of what was passed between the two subagents, weakening observability and later auditing.", "It would permanently prevent the billing subagent from being invoked on any future ticket.", "High-value accounts should never be escalated under any circumstances, regardless of findings.", "The coordinator would lose the chance to validate or adjust the billing subagent's findings before they influence how the case is escalated."], "correct": [1, 4], "explanation": "Routing through the coordinator exists to preserve a complete, auditable record of every exchange and to give the coordinator a chance to validate or steer information before it drives a consequential decision like escalation: both are lost the moment two subagents talk directly, which makes these the legitimate architectural objections. There's no technical barrier stopping one subagent's output from being read by another: the problem is architectural, not a formatting limitation. Using the direct path once for a high-value account has no bearing on whether the billing subagent can still be invoked normally on future tickets. And the proposal never suggested high-value accounts shouldn't be escalated at all, it only concerned how the finding travels internally before escalation, so that objection doesn't actually apply."}, {"id": "F-D1-B2-16", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A coordinator delegates codebase exploration to three subagents covering the frontend, backend, and database layers. When they finish, the coordinator's final output is simply the three subagents' reports concatenated one after another, with no additional text. The engineer who requested \"an explanation of how the three layers interact\" says the answer doesn't address their question. What is the most likely cause?", "options": ["The decomposition was wrong; the task should have gone to a single subagent covering all three layers at once.", "The coordinator skipped aggregation: it needed to synthesize the three reports into an explanation of cross-layer interaction, not just concatenate them.", "The subagents were invoked sequentially instead of in parallel, which changed the content of their findings.", "The engineer's request should have been rejected, since interaction analysis is out of scope for a hub-and-spoke system."], "correct": [1], "explanation": "Each subagent correctly reported on its own layer, but the question asked how the layers interact: that synthesis is precisely the coordinator's aggregation responsibility, and simple concatenation isn't synthesis. Splitting the exploration by layer was reasonable decomposition; the problem isn't the split, it's what happened after the three reports came back. Whether subagents ran in parallel or sequentially affects timing, not the content of each subagent's findings about its own layer. Cross-component interaction analysis is a normal and expected use of aggregation in hub-and-spoke systems, not something out of scope."}, {"id": "F-D1-B2-17", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI coordinator has three available subagents (security review, performance review, and style review) but does not need to invoke all three on every PR. A PR that only reformats whitespace in a config file arrives. What is the most appropriate coordinator behavior?", "options": ["Invoke all three subagents on every PR regardless of content, since consistency requires an identical process each time.", "Invoke only the performance subagent, since whitespace changes could theoretically affect build times.", "Recognize that the change doesn't touch logic and skip invoking the security and performance subagents, applying only whatever lightweight check is actually relevant.", "Skip subagent review entirely for this PR and have the coordinator approve it without any check, since it appears simple."], "correct": [2], "explanation": "Dynamic subagent selection means matching the invoked subagents to what the change actually touches: a pure whitespace or formatting change in a config file doesn't warrant a security or performance review, so skipping those while still applying whatever lightweight check is relevant is the efficient, targeted choice. Running every subagent on every PR regardless of content is exactly the static, non-selective approach dynamic selection is meant to replace, and it wastes review cycles on irrelevant checks. Assuming whitespace changes meaningfully affect performance is a stretch that doesn't match the actual nature of the change. Approving with zero review because a change appears simple removes the coordinator's decision-making role entirely rather than exercising it."}, {"id": "F-D1-B2-18", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team's CI pipeline reviews large pull requests by spinning up one subagent per changed file to analyze that file in isolation, then posts each subagent's findings as the PR review. On a PR that changes a shared utility function's signature in file A and updates two call sites in files B and C, the per-file reviews all pass individually, but a mismatched argument order between file A's new signature and file C's call site ships to production. What decomposition change would have caught this?", "options": ["Increase the number of subagents assigned to file A specifically, since that's where the signature change originated.", "Replace per-file analysis entirely with a single subagent that skims all changed files at low depth.", "Require each per-file subagent to independently re-read every other changed file in full before reporting its findings.", "Add a separate cross-file integration pass, run after the per-file analyses, that specifically checks how changed files interact with each other, such as call sites against updated signatures."], "correct": [3], "explanation": "Per-file analysis is good at catching issues local to a single file but structurally cannot see a mismatch that only exists in the relationship between two files, which is exactly why a dedicated cross-file integration pass, run after the per-file passes, is needed to check things like call sites against updated signatures. Adding more subagents to file A alone still keeps every review scoped to a single file and wouldn't surface a cross-file mismatch. Replacing focused per-file analysis with one shallow pass over everything sacrifices the depth that caught other issues without actually guaranteeing cross-file consistency checking. Having every per-file subagent re-read every other file duplicates enormous effort across subagents and still doesn't create a dedicated, focused step whose job is specifically to reconcile cross-file consistency."}, {"id": "F-D1-B2-19", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A CI review process always performs the same three checks, in the same order, on every pull request: run the linter, run the test suite, then run a security scan, with each stage's pass/fail result determining whether the next stage runs. Why is a fixed sequential pipeline a good fit here?", "options": ["The work is predictable and has well-known, consistent stages that apply the same way to every PR, which is exactly what a fixed pipeline handles well.", "Fixed pipelines are required whenever more than one check needs to run on the same input.", "A fixed pipeline is the only decomposition strategy capable of running steps in a specific order.", "Fixed pipelines automatically adapt their stages based on what each individual PR contains."], "correct": [0], "explanation": "Lint-then-test-then-security-scan is the same predictable, multi-stage process for every PR, which is the textbook case for a fixed sequential pipeline, or prompt chaining, since the stages don't need to be discovered per request. Fixed pipelines aren't required any time multiple checks exist; plenty of multi-check workflows use dynamic decomposition instead when the checks needed vary by input. Ordering is also achievable in decomposition approaches other than a fixed pipeline, so a fixed pipeline isn't uniquely capable of sequencing. Adapting stages per input is the defining feature of dynamic decomposition, not a fixed pipeline, which runs the same stages regardless of content."}, {"id": "F-D1-B2-20", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A research coordinator is asked to investigate \"the emerging competitive landscape in a market that didn't exist two years ago,\" where the number of relevant competitors, the right search angles, and the depth needed per competitor can't be known before research begins. Which decomposition strategy fits this request best?", "options": ["A fixed sequential pipeline with exactly three predetermined stages: search, summarize, format.", "Dynamic adaptive decomposition, where the coordinator determines subtasks as it discovers competitors and angles during the research itself.", "A single fixed prompt-chain step that asks one subagent to both find and summarize all competitors in one call.", "A rigid decomposition into a preset number of competitor subagents decided before any research starts."], "correct": [1], "explanation": "When the shape of the work (how many competitors, what angles matter, how deep to go) can't be known upfront, the coordinator needs to adapt its subtasks as it learns, which is exactly what dynamic adaptive decomposition is for. A fixed three-stage pipeline assumes the structure of the work is already known and repeatable, which doesn't hold for a genuinely open-ended, unprecedented market. Cramming discovery and summarization into one single-shot step removes the ability to adjust based on what's actually found along the way. Deciding the number of competitor subagents before any research begins bakes in an assumption about scope that the scenario explicitly says can't be known in advance."}, {"id": "F-D1-B2-21", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An engineer asks Claude to \"produce an architectural overview of this legacy codebase we just inherited,\" with no existing documentation and an unknown number of subsystems. Which decomposition approach is most appropriate?", "options": ["A fixed pipeline with a predetermined, unchangeable set of five subsystem categories decided before looking at any code.", "A single-stage fixed pipeline that reads every file in one linear pass with no ability to branch based on findings.", "Dynamic adaptive decomposition, letting the investigation determine what subsystems exist and spawning further exploration as they're discovered.", "Skipping decomposition and asking one subagent to guess at the architecture without reading the code."], "correct": [2], "explanation": "Since nobody yet knows what subsystems the legacy codebase actually contains, the exploration needs to adapt as it goes, discovering a subsystem and then deciding whether it warrants further investigation, which is the hallmark of dynamic adaptive decomposition. Committing to five fixed subsystem categories before looking at any code assumes knowledge the team doesn't have and risks mismatching the codebase's real structure. A single linear pass with no branching can't adjust when it stumbles onto an unexpected subsystem, which is likely in unfamiliar legacy code. Skipping any real investigation and guessing produces an overview with no grounding in the actual code."}, {"id": "F-D1-B2-22", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A pipeline extracts structured data from every incoming invoice using the same three stages in order: extract raw field values, validate them against the invoice schema, then normalize dates and currency formats. Every invoice, regardless of vendor, goes through the same three stages. What decomposition strategy is this, and is it appropriate?", "options": ["Dynamic adaptive decomposition: appropriate, since each invoice needs a different combination of stages chosen on the fly.", "A fixed sequential pipeline, but poorly suited here, since invoice structure varies too unpredictably for fixed stages.", "Dynamic adaptive decomposition: necessary because the coordinator can't know how many fields an invoice contains until it starts extracting.", "A fixed sequential pipeline: appropriate, since the stages and their order are predictable and identical across every invoice."], "correct": [3], "explanation": "Extract, validate, normalize is applied in the same order to every invoice with no variation in which stages run, which is exactly the predictable, repeatable structure a fixed sequential pipeline is built for. It isn't dynamic decomposition, since the scenario explicitly states every invoice goes through the identical three stages rather than a varying combination chosen per document. The strategy is also well suited here, not poorly suited: invoice fields follow a known schema, so treating the process as unpredictable overstates the actual variability. Not knowing the exact number of fields in advance doesn't require dynamic decomposition at the stage level; the three high-level stages remain fixed regardless of how many individual fields end up populated within them."}, {"id": "F-D1-B2-23", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A requested refactor has four known, ordered steps: rename a widely used function, update every call site, update the affected tests, then update the docs that reference the old name. Which decomposition strategy fits, and why?", "options": ["A fixed sequential pipeline, since the steps and their order are known in advance and apply the same way regardless of where the function happens to be used.", "Dynamic adaptive decomposition, since the number of call sites can't be known until the codebase is searched.", "A fixed sequential pipeline, but only if every call site is in the same file.", "Dynamic adaptive decomposition, since renaming functions is inherently unpredictable work."], "correct": [0], "explanation": "The four stages here (rename, update call sites, update tests, update docs) are known ahead of time and always apply in the same order regardless of the specific codebase, which is exactly the predictable, multi-aspect work a fixed sequential pipeline handles well. Not knowing the exact number of call sites in advance doesn't change the fact that the four high-level stages themselves are fixed and predictable; that detail is handled within the update-call-sites stage, not a reason to abandon the pipeline structure. The pipeline also doesn't require every call site to live in a single file: the stage handles however many call sites exist across however many files. Renaming a function is a well-understood, repeatable kind of task, not the genuinely open-ended work that calls for dynamic decomposition."}, {"id": "F-D1-B2-24", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A team configures a fixed three-stage pipeline for every \"improve this service\" request: stage 1 profiles the code, stage 2 always optimizes the top-level request handler, stage 3 always optimizes the database query layer. On a request where the actual bottleneck turns out to be a third-party API call buried in a background job, the pipeline completes all three stages but never touches the real bottleneck. What does this scenario best illustrate?", "options": ["Profiling should be removed from the pipeline entirely, since it didn't identify a problem in the request handler or database layer.", "Performance-improvement work is often open-ended, and forcing it through a fixed pipeline with predetermined optimization targets can miss the actual issue that only profiling would reveal.", "The pipeline needs a fourth fixed stage specifically for third-party API calls, added permanently for every future request.", "Fixed pipelines are never appropriate for any code-generation or refactoring task."], "correct": [1], "explanation": "The pipeline's stages 2 and 3 were locked in before profiling even ran, so no matter what profiling found, the optimization work was always going to target the same two predetermined areas: that's the core problem with applying a fixed pipeline to inherently open-ended, discovery-dependent work like performance tuning. The profiling stage actually did its job correctly here; the failure is that its findings were ignored by the fixed downstream stages, so removing profiling doesn't address the real issue. Bolting on a fourth permanently fixed stage for third-party calls just relocates the same rigidity problem to the next unanticipated bottleneck category. Fixed pipelines remain a good fit for plenty of predictable code-generation work, as seen in more mechanical, well-defined refactors, so the issue here is applying that strategy to open-ended optimization, not fixed pipelines in general."}, {"id": "F-D1-B2-25", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support team uses two different agent configurations. Configuration 1 handles password resets with a fixed sequence: verify identity, check account lock status, issue reset link. Configuration 2 handles \"my integration stopped working and I'm not sure why\" tickets, where the cause could be anything from an expired credential to a third-party outage to a config change. Which statement correctly matches strategy to task?", "options": ["Both configurations should use the same fixed sequential pipeline, since consistency across ticket types simplifies the system.", "Configuration 1 needs dynamic adaptive decomposition, since password resets vary too much between users to predict.", "Configuration 1 is well suited to a fixed sequential pipeline; Configuration 2 needs dynamic adaptive decomposition since the diagnostic path can't be known until symptoms are investigated.", "Configuration 2 should use a fixed sequential pipeline with steps decided in advance, to keep diagnosis predictable."], "correct": [2], "explanation": "Password reset has a small, known, repeatable set of steps that apply the same way to nearly every case, making it a natural fixed pipeline; the vague integration-failure ticket could stem from many different root causes that only emerge through investigation, which calls for adaptive decomposition that adjusts based on what's found. Forcing both ticket types into the same fixed pipeline ignores that they have fundamentally different predictability: one is routine, the other is open-ended diagnosis. Password resets don't meaningfully vary between users in a way that requires per-case adaptive decomposition; the steps are essentially the same every time. Locking the ambiguous integration-failure diagnosis into predetermined steps risks the same problem as any fixed pipeline applied to open-ended work: it may check the wrong things and miss the actual cause."}, {"id": "F-D1-B2-26", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A large PR touches 15 files and introduces a new \"formatCurrency\" helper function that's implemented independently, and slightly differently, in three of those files. Fifteen per-file subagent reviews all report clean code with no issues, since each file's version of the helper is internally consistent and well-written. What kind of decomposition failure does this represent, and what fixes it?", "options": ["The per-file subagents were not thorough enough within their own files and need stricter internal code-quality rules.", "The PR should have been decomposed into a single subagent reviewing all 15 files together in one pass, with no per-file review at all.", "This is a test-coverage gap, not a decomposition issue, and should be fixed by requiring more unit tests on the helper function.", "Per-file analysis alone cannot see duplication across files; a dedicated cross-file integration pass comparing changed files against each other is needed to catch the duplicated helper."], "correct": [3], "explanation": "Each individual file is fine in isolation: the problem, three near-duplicate implementations of the same helper, only exists when files are compared against each other, which is structurally invisible to any review scoped to a single file at a time. The per-file subagents did their job correctly within their own scope, so tightening per-file quality rules wouldn't help, since nothing about any individual file's helper is actually wrong. Replacing all per-file review with a single monolithic pass over 15 files sacrifices the focused depth that per-file analysis provides and isn't necessary: the fix is adding a cross-file pass, not removing per-file analysis. More unit tests might incidentally reveal the duplication, but that isn't reliable or the direct fix; the direct fix is a dedicated integration-focused review step designed to catch exactly this kind of cross-file redundancy."}, {"id": "F-D1-B2-27", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team splits a large PR review into per-file subagent analyses followed by a cross-file integration pass. In what order should these run, and why?", "options": ["The cross-file integration pass should run after the per-file analyses complete, since it needs their findings (such as what changed in each file) as input to reason about how the files relate.", "The cross-file integration pass should run before any per-file analysis, since cross-file issues are always more severe than per-file issues.", "Both passes must run at exactly the same time in a single combined subagent call to avoid any duplicated effort.", "The order doesn't matter, since both passes always reach identical conclusions regardless of sequence."], "correct": [0], "explanation": "The cross-file pass depends on knowing what changed and what each file's local analysis found, so it naturally runs after the per-file passes have produced that input: this ordering is a form of prompt chaining, where one stage's output feeds the next. Severity isn't an ordering rule, and there's no basis for assuming cross-file issues are always worse than per-file ones; both can matter and neither category is inherently more severe. Combining both into a single simultaneous call defeats the purpose of separating focused per-file depth from a dedicated cross-file comparison, and doesn't actually eliminate effort. The order clearly does matter, since the cross-file pass needs the per-file results to compare against: running it first would leave it with nothing to reason about."}, {"id": "F-D1-B2-28", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team automates a weekly internal report: gather the same five product metrics, summarize week-over-week changes, and format the result into a standard template. These are identical steps every week for over a year. An engineer proposes replacing this with a dynamic adaptive decomposition system that determines what to analyze fresh each week. What is the most likely outcome?", "options": ["Significantly better coverage, since dynamic decomposition always outperforms fixed pipelines regardless of task predictability.", "Added complexity and latency with little benefit, since the task's steps are already predictable and haven't changed in over a year.", "No change in behavior at all, since dynamic decomposition and fixed pipelines always produce byte-identical output.", "A reduction in cost, since dynamic decomposition requires fewer coordinator decisions than a fixed pipeline."], "correct": [1], "explanation": "When a task's structure is genuinely stable and predictable (the same five metrics, the same summary, the same template, every week for over a year), a fixed pipeline already fits well, and switching to dynamic decomposition adds the overhead of deciding subtasks from scratch each run without a corresponding benefit. Dynamic decomposition isn't universally better; it's suited to open-ended work where the right subtasks can't be known in advance, which isn't the case here. The two strategies don't produce identical output by default: a dynamic approach could plausibly vary what it chooses to analyze week to week, which is itself a risk for a report that's supposed to be consistent. Dynamic decomposition typically involves more coordinator decision-making per run, not less, since it has to work out the subtask structure each time instead of reusing a known one."}, {"id": "F-D1-B2-29", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team needs to generate five new REST API endpoints that all follow the exact same established pattern used elsewhere in the codebase: route definition, handler function, input validation, and a corresponding test file. An engineer sets up a dynamic adaptive decomposition system that re-evaluates from scratch what steps are needed for each endpoint. What is the drawback of this choice compared to a fixed pipeline?", "options": ["Dynamic decomposition is architecturally incapable of producing test files as part of its output.", "It will produce inconsistent route definitions, since dynamic decomposition cannot reuse an established pattern.", "It adds unnecessary overhead re-deriving a subtask structure that's already known and identical for every endpoint, without improving the outcome.", "It requires manually specifying the number of endpoints before decomposition can begin, unlike a fixed pipeline."], "correct": [2], "explanation": "Since every endpoint needs the exact same four steps in the same order, that structure is already known and doesn't benefit from being rediscovered per endpoint: a fixed pipeline captures that repetition directly, while dynamic decomposition spends effort re-deriving something that isn't actually variable here. Dynamic decomposition has no inherent limitation that prevents it from producing test files or any other artifact; that isn't a real constraint of the strategy. Inconsistency isn't an inherent property of dynamic decomposition either: the risk here is wasted overhead, not an inability to follow an established pattern. Needing the endpoint count upfront isn't a distinguishing requirement of fixed pipelines versus dynamic decomposition; either approach can be applied per endpoint or across a known batch."}, {"id": "F-D1-B2-30", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A PR renames a shared configuration key in one file. Five other files still reference the old key name, but each of those five files is reviewed by its own per-file subagent, which correctly reports that the file is internally consistent: it uses the old name consistently within itself and isn't part of the diff, so nothing looks broken locally. The renamed key silently breaks configuration loading in production. What decomposition gap does this expose?", "options": ["The per-file subagents should have been given a stricter internal linting configuration for each of the five files.", "This is purely a testing gap; per-file and cross-file review strategies are both irrelevant to catching it.", "The rename should never have been performed, since renaming shared configuration keys is inherently unsafe.", "Per-file review only sees files that changed and only checks internal consistency, so it cannot detect that an unchanged file now references a name that no longer exists elsewhere: that requires a cross-file pass that checks changed identifiers against the whole codebase."], "correct": [3], "explanation": "The five files weren't even part of the diff, so per-file review, which typically focuses on what changed, has no natural trigger to re-examine them, and each one is genuinely self-consistent in isolation; only a pass that specifically checks a renamed identifier against every reference across the whole codebase would catch this. Stricter internal linting within each of the five files wouldn't help, since nothing is wrong within any single file: the old key name is used consistently there. Calling this purely a testing gap ignores that a well-designed cross-file integration pass, checking renamed or changed identifiers against the rest of the codebase, is a direct and appropriate way to catch exactly this class of issue. Renaming shared keys isn't inherently unsafe; the failure is a missing verification step in the review process, not the rename itself."}, {"id": "F-D1-B2-31", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "In a fixed sequential pipeline for invoice processing, the extraction stage's output (a set of raw field values) becomes the direct input to the validation stage, and the validation stage's cleaned output becomes the input to the normalization stage. What is this pattern called, and what does it require of each stage?", "options": ["Prompt chaining: each stage must produce output in a form the next stage can consume as its input.", "Dynamic adaptive decomposition: each stage independently decides which other stages to invoke.", "Aggregation: each stage's output must be merged with every other stage's output simultaneously.", "Parallel subagent delegation: all three stages must run at the same time on the same input."], "correct": [0], "explanation": "Feeding one stage's output forward as the next stage's input, in a fixed order, is the definition of prompt chaining: it requires each stage's output to be structured in a way the following stage can actually consume. This isn't dynamic adaptive decomposition, since the stages and their order are fixed in advance rather than decided on the fly. It isn't aggregation either, since aggregation combines multiple parallel results into one, whereas here each stage's output feeds forward sequentially into a single next stage. And the stages explicitly run one after another because each depends on the previous stage's output, which rules out running them in parallel on the same input."}, {"id": "F-D1-B2-32", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A team forces every \"debug this issue\" request through a fixed three-stage pipeline: stage 1 always checks recent commits, stage 2 always checks the error logs, stage 3 always checks the test suite. For a genuinely novel intermittent bug, the engineer notices the pipeline forces a conclusion after exactly those three stages even though none of them turned up anything relevant, because the pipeline has no next stage to move to. What does this illustrate about applying a fixed pipeline to this kind of task?", "options": ["The pipeline simply needs a fourth and fifth fixed stage added to check two more predetermined sources.", "Forcing open-ended debugging into a fixed number of predetermined stages can cause the process to stop prematurely, categorizing findings into stages that don't match what the actual investigation needs.", "This proves fixed pipelines should never be used for any debugging-related task, even routine ones.", "The error-log stage must have been implemented incorrectly, since it should have found the intermittent bug."], "correct": [1], "explanation": "The real issue is structural: debugging a novel, intermittent issue is open-ended, and a rigid pipeline with a fixed number of stages simply runs out of predetermined places to look and then stops, whether or not the actual cause has been found; dynamic adaptive decomposition would instead let the investigation branch based on what each check reveals. Adding two more fixed stages just delays the same problem to whichever bug doesn't fit into five predetermined categories instead of three. Plenty of debugging work is routine and predictable enough for a fixed pipeline, such as a known class of error with a standard checklist, so the lesson here is about matching strategy to how open-ended the specific task is, not banning fixed pipelines from debugging entirely. There's no indication the error-log stage was implemented wrong: an intermittent bug may simply not manifest in the log window checked, which is a limitation of the fixed stage set, not a bug in that stage's implementation."}, {"id": "F-D1-B2-33", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "Which of the following support scenarios is the best fit for a fixed sequential pipeline rather than dynamic adaptive decomposition?", "options": ["Investigating a customer's report of \"random data disappearing from my account sporadically over the last month\" with no clear pattern yet identified.", "Handling a complaint that touches billing, a technical bug, and a request for a policy exception all in one message, where the right response depends on how those three parts interact.", "Processing a standard subscription cancellation request: confirm the account, apply the cancellation, send a confirmation email, the same three steps every time.", "Diagnosing why one specific customer's account is behaving differently from every other account on the same plan, for reasons not yet understood."], "correct": [2], "explanation": "Subscription cancellation follows the same short, well-defined sequence of steps every time regardless of the customer, which is exactly the predictable, repeatable work a fixed sequential pipeline handles well. An unexplained, sporadic data-loss report has no known diagnostic path yet, so investigating it needs to adapt based on what's discovered, not follow steps decided in advance. A message mixing billing, a technical bug, and a policy exception requires figuring out how those parts relate to each other before a response strategy is clear, which is better served by decomposition that adjusts to the specific mix of concerns present. An account behaving unexpectedly for unknown reasons is, by definition, a case where the right next step depends on what's found along the way, not a predetermined sequence."}, {"id": "F-D1-B2-34", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "Which of the following tasks are better suited to a fixed sequential pipeline (prompt chaining) than to dynamic adaptive decomposition?", "options": ["Investigating the root cause of an intermittent production outage whose symptoms vary each time it occurs.", "Generating a recurring weekly status report that always requires gathering the same metrics, summarizing changes, and formatting the result the same way.", "Producing an architecture overview of a legacy codebase with no existing documentation and an unknown number of subsystems.", "Translating a document into another language and then proofreading that translation for fluency.", "Extracting fields from a standard invoice template and then validating them against a fixed schema."], "correct": [1, 3, 4], "explanation": "A recurring report with the same metrics and format every time, translate-then-proofread, and extract-then-validate against a known schema are all predictable, multi-aspect workflows whose stages are known in advance and repeat the same way each run: precisely the profile that fits a fixed sequential pipeline. An intermittent outage with symptoms that vary each occurrence has no fixed diagnostic path to follow, so forcing it through predetermined stages risks stopping before the real cause is found; it needs decomposition that adapts to what's actually observed. Similarly, mapping an undocumented legacy codebase with an unknown number of subsystems can't have its investigation stages fixed in advance, since nobody yet knows what those subsystems even are: that discovery process is what dynamic adaptive decomposition is for."}, {"id": "F-D1-B3-01", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A team builds a research coordinator agent whose system prompt describes delegating to a web-search subagent and a synthesis subagent. When the coordinator emits a Task tool call, the call is rejected and never executes. What is the most likely cause?", "options": ["The coordinator's own allowedTools list does not include \"Task\", so it isn't permitted to invoke the Task tool at all.", "The subagent's AgentDefinition does not specify a description.", "The coordinator is trying to spawn more than one subagent per response.", "The subagent was not given a system prompt."], "correct": [0], "explanation": "For an agent to invoke the Task tool at all, \"Task\" must be present in its own allowedTools configuration; without it, the tool call itself is blocked regardless of how well the subagent is defined. A missing subagent description would affect routing and selection, not whether Task calls are permitted. Emitting multiple Task calls in one response is how parallel subagents are spawned and is not itself disallowed. A subagent lacking a system prompt would still run, just with a more generic role, rather than fail to be invoked."}, {"id": "F-D1-B3-02", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A customer support agent needs to delegate complex billing disputes to a specialized billing-investigation subagent while still directly calling get_customer and lookup_order itself. The architect configures the subagent's AgentDefinition with tool restrictions limiting it to lookup_order and process_refund only. Beyond that tool restriction, what else must be true for the top-level agent to successfully delegate to this subagent?", "options": ["\"Task\" must be included in the top-level agent's own allowedTools so it is permitted to invoke subagents in the first place.", "The subagent must also be granted escalate_to_human even though billing investigations never escalate.", "The subagent's system prompt must repeat the full text of the top-level agent's system prompt.", "The top-level agent must call fork_session before every delegation."], "correct": [0], "explanation": "Tool restrictions on the subagent's own AgentDefinition control what it can do once invoked, but the top-level agent separately needs \"Task\" in its allowedTools to be permitted to issue the delegation at all. Granting an unused tool like escalate_to_human to a subagent that never escalates violates least privilege and isn't required. Copying the entire parent system prompt into the subagent conflates general persona with the specific case context the subagent needs and doesn't enable delegation. fork_session branches a session for divergent approaches; it is not a prerequisite for an ordinary Task delegation."}, {"id": "F-D1-B3-03", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A research coordinator has spent several turns gathering search results and forming an outline. It then invokes a synthesis subagent via the Task tool with only the instruction \"Write the final report now.\" What will most likely go wrong?", "options": ["The synthesis subagent has no access to the coordinator's prior findings because subagents run with isolated context and don't inherit parent history.", "The synthesis subagent will consume so much of the coordinator's remaining context window that the coordinator can no longer respond.", "The Task tool will reject the call because no tool restrictions were specified.", "The synthesis subagent will automatically re-run all of the coordinator's earlier web searches before writing."], "correct": [0], "explanation": "Subagents start with a clean, isolated context and cannot see the coordinator's conversation history, so a bare instruction like \"write the final report now\" gives it nothing to actually synthesize; the real findings must be passed explicitly in the prompt. Subagents run in their own separate context, so they don't consume the coordinator's context window this way. The Task tool doesn't require explicit tool restrictions to function. Subagents don't automatically redo prior work; they simply have no memory of it unless told."}, {"id": "F-D1-B3-04", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support agent decides a case needs human escalation after a long multi-turn conversation involving a failed refund, a wrong shipping address, and a customer now requesting a supervisor. It invokes an escalation subagent with only the prompt \"Escalate this to a human agent.\" What change would most improve the quality of the escalation handoff?", "options": ["Pass the customer's verified ID, the sequence of failed steps, the specific policy question, and the customer's stated request directly in the subagent's prompt.", "Ask the escalation subagent to write a brief, generic summary so the human agent can read it quickly.", "Give the escalation subagent access to process_refund so it can attempt one more refund first.", "Ask the escalation subagent to re-derive the case history by calling get_customer and lookup_order itself."], "correct": [0], "explanation": "Because the escalation subagent has no access to the coordinator's conversation history, the coordinator must explicitly pass the concrete case facts so the human agent receives a complete, actionable handoff. A brief, generic summary is the over-condensing failure mode in disguise: it produces something readable but strips out exactly the specific facts a human needs to act. Granting refund authority to an escalation subagent expands its scope beyond its purpose and risks acting against the customer's explicit request for a human. Asking the subagent to re-derive history via fresh tool calls is wasteful and doesn't reconstruct context the tools can't provide, like the customer's stated frustration."}, {"id": "F-D1-B3-05", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "While refactoring a module, a developer's Claude Code session discusses and agrees on a specific naming convention and error-handling pattern with the user across several turns. The developer then spawns a subagent via the Task tool to apply the same refactor to a second file, with only the prompt \"Refactor this file the same way.\" What is the most likely outcome?", "options": ["The subagent will refactor the file using its own default judgment, because it has no visibility into the convention agreed on earlier in the parent session.", "The subagent will silently read the parent session's transcript before starting, to recover the missing convention.", "The Task tool will automatically append the full parent conversation to the subagent's prompt.", "The refactor will fail outright because subagents cannot edit files."], "correct": [0], "explanation": "Because subagent context is isolated from the parent session, \"the same way\" refers to a convention the subagent never saw, so it applies its own defaults instead of the one actually agreed upon; the specific convention needed to be written into the prompt. Subagents do not read the parent transcript on their own. The Task tool does not automatically forward full conversation history, which is exactly why explicit context passing is necessary. Subagents can be given file-editing tools, so the refactor itself would not fail outright; it would simply be inconsistent."}, {"id": "F-D1-B3-06", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A developer uses an Explore subagent to survey a large legacy codebase for every usage of a deprecated authentication helper before a migration. The Explore subagent returns a concise five-bullet summary of files and line ranges. The developer then spawns a second subagent to perform the migration, passing it only the instruction \"Migrate all usages of the deprecated helper found earlier.\" What is the most effective fix?", "options": ["Pass the Explore subagent's actual five-bullet summary of files and line ranges directly into the migration subagent's prompt, since \"found earlier\" refers to nothing the new subagent can see.", "Merge the Explore and migration steps into a single subagent invocation so no handoff is required.", "Increase the migration subagent's context window so it can hold more file contents at once.", "Instruct the migration subagent to re-run the same Explore search itself before migrating."], "correct": [0], "explanation": "Each subagent starts isolated, so the migration subagent has no way to know what \"found earlier\" means unless the coordinator explicitly forwards the concrete findings it already has on hand; this is a case where a small, structured result from one subagent should be passed as input to the next. Combining both concerns into one subagent invocation removes the benefit of isolating verbose discovery output and may not fit the intended decomposition. A larger context window doesn't solve a problem caused by content never being sent at all. Re-running the same search wastes work already done and could return a different result if the codebase changed, still leaving the handoff broken."}, {"id": "F-D1-B3-07", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A multi-agent research system defines two subagents, \"web-search\" and \"search-agent\", both described in their AgentDefinition simply as \"searches for information.\" The coordinator frequently routes queries to the wrong one, or splits a single request across both unnecessarily. What change would most directly fix the routing problem?", "options": ["Rewrite each subagent's description to state its distinct scope and typical inputs, such as distinguishing live web search from internal document search.", "Remove both descriptions and let the coordinator infer purpose from each subagent's tool restrictions alone.", "Merge the two subagents into one with combined tool access so routing is never ambiguous.", "Add a rule to the coordinator's system prompt that always prefers the web-search subagent by default."], "correct": [0], "explanation": "A subagent's description is what the coordinator uses to decide which one to invoke, so two overlapping, generic descriptions make them indistinguishable; giving each a specific, differentiated description is the direct fix, mirroring how tool descriptions must be differentiated for selection. Removing descriptions entirely removes the coordinator's only signal for choosing between them. Merging the subagents sidesteps the decomposition rather than fixing the routing signal and may reintroduce the coverage or scope problems separate subagents were meant to solve. Hard-coding a default preference doesn't fix the underlying ambiguity and would misroute the many queries that actually need the other subagent."}, {"id": "F-D1-B3-08", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI pipeline defines a security-review subagent whose job is to flag suspicious patterns in a pull request diff and post findings as JSON. Its AgentDefinition currently grants it Read, Grep, Bash, and Write access to the repository. Which change best aligns the subagent's configuration with its actual job?", "options": ["Restrict the subagent's tools to Read and Grep only, since a review-and-report task doesn't need to execute commands or modify files.", "Add Edit access so the subagent can fix the vulnerabilities it finds.", "Remove Read access and rely solely on the diff text embedded in the prompt.", "Keep all four tools in case future review tasks need them."], "correct": [0], "explanation": "A subagent's tool restrictions should reflect least privilege for its actual role; a subagent that only inspects code and emits a report needs read and search access but has no legitimate need for Bash execution or Write, both of which are pure risk in a security-review context. Granting Edit so it can auto-fix vulnerabilities changes its job into something riskier and unreviewed, which isn't what was asked. Removing Read entirely would prevent it from examining any files beyond what's pasted into the prompt, which is too restrictive for thorough review. Keeping unused tools \"in case\" violates least privilege and widens the blast radius of a misfire or prompt injection in the diff content."}, {"id": "F-D1-B3-09", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A structured-extraction pipeline spawns a subagent whose only job is to pull invoice line items into a fixed JSON schema. The architect writes a system prompt for this subagent's AgentDefinition stating its exact role, output schema, and edge-case handling, separate from the ad hoc Task prompt sent for each document. What is the main benefit of putting this information in the AgentDefinition's system prompt rather than repeating it in every Task call?", "options": ["The role, schema, and edge-case rules stay fixed and consistent across every invocation without needing to be retyped in each individual delegation prompt.", "It allows the subagent to inherit the coordinator's full conversation history automatically.", "It removes the need for the subagent to have any tool restrictions.", "It lets the subagent skip validating its output against the schema."], "correct": [0], "explanation": "An AgentDefinition's system prompt establishes a persistent role and standing instructions, so stable elements like the target schema and edge-case rules only need to be defined once, while each Task call then only needs to supply the document-specific content. A system prompt has no effect on context inheritance; subagents remain isolated from parent history regardless. Tool restrictions are a separate part of the AgentDefinition and aren't eliminated by having a system prompt. Nothing about defining a system prompt exempts the subagent's output from schema validation."}, {"id": "F-D1-B3-10", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A team repeatedly asks Claude Code to spawn a subagent for \"reviewing this diff for style issues\" using a freshly written, slightly different prompt each time. Results are inconsistent: sometimes the subagent checks naming conventions, sometimes it doesn't; sometimes it outputs prose, sometimes a list. What is the most effective way to make this recurring delegation consistent?", "options": ["Define a persistent style-review AgentDefinition with a fixed description, a system prompt specifying exactly what to check and in what output format, and appropriate tool restrictions, then invoke it with just the diff-specific content each time.", "Ask the requester to write a longer ad hoc prompt each time, covering every rule from memory.", "Increase the subagent's context window so it can hold more style rules at once.", "Switch the subagent to a more capable model tier so it infers the missing rules itself."], "correct": [0], "explanation": "Recurring, well-defined roles are exactly what a persistent AgentDefinition is for: fixing the description, system prompt, and tool restrictions once means every invocation behaves consistently, and the caller only needs to supply what's specific to that diff. Relying on someone to retype the full rule set correctly from memory each time is exactly the inconsistency that caused the problem. A larger context window doesn't fix inconsistent instructions; the rules still have to actually be stated. A more capable model may guess more style rules correctly on average, but it is still filling gaps probabilistically rather than following a fixed standard, so results would remain inconsistent."}, {"id": "F-D1-B3-11", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A research coordinator needs to gather information from three independent sources (a web search, an internal document store, and a competitor-analysis feed) before synthesis can begin. None of the three depends on another's output. What is the most efficient way to invoke these three subagents?", "options": ["Emit three separate Task tool calls within the same coordinator response so they run in parallel.", "Invoke them one at a time across three separate coordinator turns, waiting for each to finish before starting the next.", "Combine all three data-gathering jobs into a single subagent invocation to avoid multiple Task calls.", "Use fork_session to create three branches, one per source."], "correct": [0], "explanation": "Since the three lookups are independent of each other, emitting multiple Task calls in a single response lets them run in parallel, which is the most efficient structure for genuinely independent subagent work. Running them sequentially across separate turns adds unnecessary latency when there's no dependency forcing that order. Merging unrelated data-gathering jobs into one subagent works against the point of decomposing by source and can reintroduce the tool-scope and clarity problems separate subagents avoid. fork_session is for branching a session to explore divergent approaches to the same problem, not for fanning out independent, complementary lookups."}, {"id": "F-D1-B3-12", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI review pipeline currently spawns a lint-check subagent, waits for it to finish, then spawns a test-coverage subagent, waits, then spawns a security-pattern subagent. Each subagent only reads the PR diff and doesn't depend on any other subagent's output. Review turnaround time is a recurring complaint. What change would most directly reduce turnaround time without changing what each subagent checks?", "options": ["Emit the lint, test-coverage, and security-pattern Task calls together in one response so they execute in parallel instead of one after another.", "Replace all three subagents with a single subagent that has every tool needed for linting, coverage, and security checks.", "Switch every subagent to a faster model tier regardless of what each check requires.", "Reduce the diff size the subagents receive by truncating older files from the PR."], "correct": [0], "explanation": "Since the three checks are independent and don't rely on each other's output, the only reason they're slow is that they're running serially; issuing all three Task calls in the same response lets them execute in parallel, cutting wall-clock time without changing any individual check. Merging them into a single broad subagent discards the tool-scoping benefits of separate roles and doesn't itself address the serial-execution problem. Changing model tier is a separate lever from parallelism and could hurt accuracy on checks that need more careful reasoning. Truncating the diff risks missing real issues and doesn't address why the checks run one after another."}, {"id": "F-D1-B3-13", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A developer wants to use subagents to (a) identify every call site of a function being renamed across a large codebase, then (b) apply the rename at each call site found. They consider spawning both subagents in a single response to save time. What is the most important reason NOT to parallelize these two subagents?", "options": ["The rename subagent depends on the call-site list the discovery subagent produces, so running them at the same time would leave the rename subagent with nothing to act on.", "Parallel Task calls are limited to read-only subagents and cannot include any subagent that edits files.", "Running two subagents in the same response always exceeds the coordinator's allowed tool count.", "fork_session must be called before any subagent that modifies files."], "correct": [0], "explanation": "Parallelism only helps when subagents are independent; here the second subagent's input is the first subagent's output, so spawning both at once would leave the rename subagent with no call sites to act on, making sequential execution the correct structure. There is no such restriction limiting parallel Task calls to read-only subagents; plenty of legitimate parallel workloads include subagents that write or edit. The number of tools available to the coordinator is unrelated to how many Task calls it emits in one response. fork_session is a mechanism for branching a session to explore divergent approaches, not a required precursor to file-editing subagents."}, {"id": "F-D1-B3-14", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team notices their multi-agent research system's document-analysis, web-search, and fact-check subagents, all independent of each other, always show a coordinator turn issuing exactly one Task call, waiting for the transcript to include that subagent's result, then issuing the next Task call. What is the most likely explanation for the slow, serialized behavior, and what fixes it?", "options": ["The coordinator is emitting one Task call per response instead of multiple Task calls in a single response; batching the independent calls together enables parallel execution.", "The subagents were defined with conflicting tool restrictions that prevent them from running at the same time.", "The AgentDefinition for each subagent is missing a description, which forces sequential fallback behavior.", "The underlying model tier used by the subagents doesn't support concurrent execution."], "correct": [0], "explanation": "The described pattern (one Task call, wait, then the next) is the signature of a coordinator issuing single Task calls per turn rather than multiple calls in one response; since these three subagents don't depend on each other, batching their Task calls together is what enables parallel execution. Tool restrictions govern what a subagent can do once running, not whether multiple subagents can be dispatched together. A missing description affects how well the coordinator selects a subagent, not the serialization of independent calls. Model tier is unrelated to whether multiple Task calls in one response execute concurrently."}, {"id": "F-D1-B3-15", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A document-analysis subagent returns its findings to the coordinator as one long paragraph mixing the extracted claim, the source document's filename, the page number, and its own confidence level all run together in prose. The coordinator passes this paragraph as-is into the synthesis subagent's prompt, and the final report occasionally cites the wrong source for a claim. What change would most reduce this citation confusion?", "options": ["Have the document-analysis subagent return structured fields, such as claim text, source filename, page number, and confidence, so content is clearly separated from metadata before being passed along.", "Ask the synthesis subagent to guess the correct source whenever the prose is ambiguous.", "Shorten the document-analysis subagent's paragraph so there's less text to misread.", "Have the coordinator manually rewrite the paragraph into a shorter summary before forwarding it."], "correct": [0], "explanation": "Mixing claim content, source filename, page number, and confidence into a single unstructured paragraph makes it easy for a downstream subagent to conflate them; separating that same information into structured fields removes the ambiguity at its root. Asking the synthesis subagent to guess when things are unclear treats the symptom, not the cause, and can produce confidently wrong citations. Simply shortening the paragraph doesn't address the mixing of content and metadata that caused the confusion. Manually rewriting a summary still produces unstructured prose and is a fragile, ad hoc fix compared to structuring the handoff itself."}, {"id": "F-D1-B3-16", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support coordinator hands a case off to a refund-processing subagent using a single free-text sentence: \"The customer, John, wants a refund for an order from last week, I think it was around $45, because the item never arrived.\" The subagent then can't reliably locate the exact order or confirm the exact amount. What is the best way to fix this handoff?", "options": ["Pass structured fields (verified customer ID, order ID, exact order amount, and stated reason) instead of a single paraphrased sentence.", "Instruct the refund subagent to ask the customer directly for clarification before proceeding.", "Give the refund subagent broader search tools so it can find the order despite vague details.", "Lower the refund subagent's tool-call limit so it resolves the case faster."], "correct": [0], "explanation": "Vague, paraphrased details like \"around $45\" and \"last week\" force the subagent to guess; passing the specific, structured facts the coordinator already has removes the ambiguity at the source, which is exactly why separating structured content from loose narrative matters in a handoff. The refund subagent typically has no direct channel to the customer, so it can't simply ask for clarification the way the coordinator's earlier turns could. Broader search tools don't fix imprecise input data; they just search more places with the same vague details. Reducing a tool-call limit doesn't address the missing precision and could make the subagent give up before finding the right order."}, {"id": "F-D1-B3-17", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "An extraction coordinator delegates each incoming contract to an extraction subagent using a single unbroken block of text that mixes the actual contract co
