a custom slash command that mimics its behavior for every task"], "correct": [2], "explanation": "The efficient pattern is choosing the mode based on the task: plan mode pays off when there's real complexity or multiple approaches to weigh, while a straightforward rename or log-message tweak is better handled with direct execution's lower overhead. Assuming plan mode is always higher quality ignores that its benefit comes from resolving genuine ambiguity, which trivial edits don't have. Abandoning plan mode entirely would leave the architect without its benefits on the complex work where it matters. A slash command is a reusable prompt template, not a substitute for the judgment of when to plan versus act directly."}, {"id": "F-D3-B2-15", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team is deciding where to put two different pieces of guidance: first, 'every new Python function must include a docstring,' which should apply in every coding session; second, a six-step procedure for cutting a release, which is only relevant when someone is actually preparing a release. How should these be organized?", "options": ["Both belong in CLAUDE.md, since CLAUDE.md is the only place Claude Code reads configuration from", "Both belong in a skill, since skills are more powerful than CLAUDE.md and can express any instruction", "The docstring rule belongs in a skill invoked before every commit; the release procedure belongs in CLAUDE.md", "The docstring rule belongs in CLAUDE.md as a universal standard; the release procedure belongs in a skill invoked on demand"], "correct": [3], "explanation": "CLAUDE.md is loaded as standing context every session, which is exactly right for a universal coding standard like requiring docstrings on every new function; a skill is invoked deliberately for a specific task, which fits a release procedure that's only relevant occasionally. Putting the docstring rule in a skill would mean it only applies on the rare occasions someone remembers to invoke that skill, defeating its purpose as an always-on standard. Putting everything in CLAUDE.md would force Claude Code to carry the full release procedure as context in every unrelated session. Skills aren't a strictly more powerful replacement for CLAUDE.md: the two serve different scopes, on-demand versus universal."}, {"id": "F-D3-B2-16", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An architect uses plan mode to investigate how to add a caching layer to a service, producing a reviewed and approved plan that specifies exactly which files to modify and how. What is the most appropriate next step?", "options": ["Re-enter plan mode and repeat the same investigation to double-check the approved plan", "Spawn an Explore subagent to redo the discovery work plan mode already completed", "Discard the plan and start over with direct execution from scratch, ignoring the earlier analysis", "Switch to direct execution to implement the approved plan, since the investigation and design work is already done"], "correct": [3], "explanation": "Once a plan has resolved the open questions and specified concrete steps, direct execution is the efficient way to carry it out: this is the standard pattern of using plan mode for investigation and direct execution for implementation. Repeating the same plan-mode investigation adds no new information and just duplicates work that already produced an approved answer. An Explore subagent is for verbose discovery, which plan mode's investigation phase already completed here. Discarding the plan and starting over throws away the analysis the team specifically asked for and approved."}, {"id": "F-D3-B2-17", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team repeats an involved 'prepare a hotfix' procedure (running a targeted test suite, branching from the last release tag, bumping a version file, and drafting release notes) but only when an actual hotfix is needed, not during normal development. How should this procedure best be captured for reuse?", "options": ["As a permanent rule in CLAUDE.md so it applies to every session automatically", "As a skill that engineers invoke on demand when a hotfix is actually needed", "As a rule in `.claude/rules/` scoped to every file in the repository", "By asking engineers to memorize and manually retype the steps each time"], "correct": [1], "explanation": "A skill is meant for exactly this kind of on-demand, multi-step workflow: it packages the procedure so it can be invoked when a hotfix is actually needed, without affecting any other session. Putting it in CLAUDE.md would load the entire hotfix procedure as context in every session, including the vast majority where no hotfix is being prepared. Path-scoped rules apply based on which files are being edited, not on an occasional operational procedure unrelated to file type. Relying on memorization discards the reliability and consistency that packaging the workflow is meant to provide."}, {"id": "F-D3-B2-18", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An engineer needs to find every definition of a function called `calculateTax` across a system of 50 microservices. Searching manually in the main conversation would require dozens of grep calls and produce a huge volume of matched lines. What is the best approach?", "options": ["Enter plan mode and run the same dozens of grep calls there instead, since plan mode has unlimited context", "Ask a teammate to search manually and paste the results into the conversation", "Increase the model tier to Opus so it can process more search results at once", "Delegate the search to an Explore subagent so the extensive search output stays out of the main conversation"], "correct": [3], "explanation": "This is a broad, verbose discovery task across many services: exactly the case an Explore subagent is meant to isolate, returning only the relevant findings instead of dozens of raw grep dumps into the main conversation. Plan mode governs when edits happen, not how much intermediate search output accumulates in the shared context; running the same searches there doesn't solve the volume problem. Manual searching by a teammate just moves the same copy-paste burden elsewhere without addressing it. A larger model tier improves reasoning quality, not the amount of raw tool output that piles up in context."}, {"id": "F-D3-B2-19", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team builds a 'database migration helper' skill that runs schema migration scripts via Bash and inspects results with Read. Because a migration mistake could be costly, they want it structurally impossible for this particular skill to use Edit or Write on any file. How should they configure it?", "options": ["Set `argument-hint` to warn the user not to request file edits", "Set `allowed-tools` to include only Bash and Read, omitting Edit and Write", "Set `context: fork` so file edits happen in an isolated context instead of the main one", "Add a CLAUDE.md instruction asking Claude Code to avoid editing files during migrations"], "correct": [1], "explanation": "`allowed-tools` is the setting that determines which tools a skill is permitted to call at all, so limiting it to Bash and Read makes Edit and Write structurally unavailable to this skill, regardless of what a prompt suggests. `argument-hint` only documents expected inputs and has no effect on which tools can run. `context: fork` changes where the skill's execution happens, not what tools it can reach: an isolated context could still call Edit or Write if they were allowed. A CLAUDE.md instruction is a probabilistic nudge, not the deterministic restriction this costly-mistake scenario calls for."}, {"id": "F-D3-B2-20", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An architect enters plan mode to investigate an intermittent performance regression that spans two services. After investigation, the plan identifies a specific root cause (a missing index on one table) and a precise, low-risk fix. What should happen next?", "options": ["Stay in plan mode indefinitely, since performance issues always require ongoing planning", "Restart the investigation using an Explore subagent instead of trusting the plan's conclusion", "Escalate the issue to a human before making any change, regardless of how well-scoped the fix is", "Move to direct execution to apply the specific, now well-understood fix"], "correct": [3], "explanation": "Once plan mode has resolved the ambiguity and produced a specific, well-scoped fix, direct execution is the efficient way to apply it: this is the standard combination of planning for investigation and direct execution for implementation. Staying in plan mode after the ambiguity is resolved adds no value and only delays a fix that's already understood. Restarting with an Explore subagent duplicates discovery work the plan already completed. Escalating to a human is appropriate for genuine ambiguity or policy exceptions, not for a fix that investigation has already pinned down precisely."}, {"id": "F-D3-B2-21", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team has two skills. The first ingests an entire directory of scanned invoice PDFs, performing verbose intermediate extraction and cross-checking before returning a summary. The second simply checks whether a single configuration file is well-formed and reports pass or fail. Which SKILL.md setting should differ between the two, and how?", "options": ["The first should have a longer `argument-hint`; the second doesn't need an `argument-hint` at all", "The first should set `context: fork` to isolate its verbose intermediate extraction; the second doesn't need it since its output is already small", "The first should omit `allowed-tools` entirely; the second should set `allowed-tools` to an empty list", "Both skills need identical settings, since `context: fork` only affects performance, not context usage"], "correct": [1], "explanation": "`context: fork` isolates a skill's execution so verbose intermediate work (like scanning and cross-checking an entire directory of invoice PDFs) doesn't accumulate in the main conversation, while a skill that just checks one file and reports pass or fail has no such volume problem to isolate. Argument-hint length is about documenting inputs, not about how much output a skill produces. Omitting `allowed-tools` or setting it to an empty list changes which tools a skill can call, not where its context lives, and an empty list would leave a skill unable to act at all. `context: fork` directly changes how much of a skill's output reaches the main conversation's context, not merely its speed."}, {"id": "F-D3-B2-22", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team is considering writing a script that would permanently delete stale records from a production database. Before anyone runs anything, they want Claude Code to help them think through edge cases and confirm the deletion criteria are correct, with zero risk of the script actually executing during this stage. What is the best approach?", "options": ["Direct execution, since writing the script and reasoning about it can happen at the same time", "An Explore subagent, since the main risk here is not knowing where the relevant tables are defined", "A project-level slash command that runs the deletion script automatically once written", "Plan mode, so the criteria and script can be reasoned through and reviewed with no edits or execution happening yet"], "correct": [3], "explanation": "Plan mode's safe-exploration property is exactly suited to a scenario where the team wants to reason through a risky operation with a guarantee that nothing executes until a plan is reviewed and approved. Direct execution is built for making changes, which is precisely what the team wants to avoid until the criteria are verified. An Explore subagent isolates broad discovery work, but the core need here is safe reasoning about a destructive operation, not locating table definitions. Wiring up a command that runs the deletion automatically is the opposite of what a team wanting zero execution risk should do."}, {"id": "F-D3-B2-23", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "An engineering organization wants a shared set of onboarding commands (`/setup-env`, `/run-tests`, and `/lint-fix`) available to every engineer on a project, updated centrally whenever the required tooling changes. What is the best way to provide these?", "options": ["Ask each engineer to create matching commands individually in their own `~/.claude/commands/` directory", "Publish the steps in an internal onboarding document that engineers read once", "Define them as project-level commands in `.claude/commands/`, committed to the repository", "Add them as bullet points inside each engineer's personal CLAUDE.md file"], "correct": [2], "explanation": "Project-level commands committed to `.claude/commands/` give every engineer the same onboarding commands automatically on clone, and a single update to the file propagates to the whole team the next time they pull. Asking each engineer to recreate the commands individually invites drift and inconsistency the moment tooling changes. A document engineers read once doesn't stay wired into Claude Code as an invokable command and won't reflect later updates. Personal CLAUDE.md files are individual, not centrally managed, so tooling changes wouldn't reliably reach everyone."}, {"id": "F-D3-B2-24", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "An architect is deciding between two possible refactors of a core authentication module that dozens of other services depend on. One refactor is faster to implement but changes the module's public interface; the other preserves the interface but takes longer and touches more internal code. Both carry meaningful downstream risk. What is the most appropriate way to proceed?", "options": ["Pick the faster refactor and begin direct execution, since shipping quickly matters most for shared infrastructure", "Use an Explore subagent to pick which refactor is better, since it can search the codebase fastest", "Split the work into two independent direct-execution sessions, one per refactor, and merge whichever finishes first", "Use plan mode to lay out both refactors, their downstream impact, and trade-offs before any code is changed"], "correct": [3], "explanation": "A decision between two architecturally significant options with real downstream risk to dozens of dependent services is precisely the multi-approach, high-stakes situation plan mode is built for: it lets the team compare impact and trade-offs before committing to either path. Picking the faster option and executing directly skips the comparison entirely and risks an interface-breaking change without the team having weighed the alternative. An Explore subagent is built to isolate discovery output, not to make or recommend an architectural trade-off decision. Running both refactors in parallel and merging whichever finishes first ignores that the two approaches are different design decisions, not a race to the same outcome."}, {"id": "F-D3-B2-25", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A developer wants a personal `/todo` alias that only they will ever use, formatted exactly to their own taste. A teammate suggests adding it to the project's `.claude/commands/` directory so it's 'available everywhere.' Why is that not the best choice?", "options": ["Adding it to the project directory shares and effectively proposes it to the whole team through version control, when it's meant to stay one person's individual preference", "Project-level commands are technically limited to five files, so adding another risks breaking existing commands", "Commands in `.claude/commands/` cannot have personalized formatting, only user-level commands can", "The project directory is read-only after the first commit, so new commands can never be added there"], "correct": [0], "explanation": "Because the project's `.claude/commands/` directory is version-controlled, anything placed there is shared with, and implicitly suggested to, every teammate the next time they pull: not what's wanted for a one-person formatting preference. There's no such five-file limit on project command directories. Formatting flexibility isn't restricted by location; both project- and user-level commands can be written however their author likes. The project directory isn't read-only after the first commit: new files, including commands, can be added at any time."}, {"id": "F-D3-B2-26", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team applied a database schema migration directly, without first working through a plan, because 'it was just a migration script.' The migration touched shared tables used by several services, and the rollout ended up inconsistent: some services picked up the new schema assumptions and others didn't, causing intermittent failures. In hindsight, what was the most significant process gap?", "options": ["The migration script should have been run through an Explore subagent instead of directly, since Explore would have prevented the inconsistency", "The team should have written the migration as a slash command instead of running it directly", "The change had architectural, multi-service impact and should have gone through plan mode to surface the coordination needed across dependent services before any change was made", "The failure occurred because the team used direct execution instead of a bigger model tier"], "correct": [2], "explanation": "A schema change touching shared tables across multiple dependent services is architecturally significant, exactly the kind of situation where plan mode's comparison and review step would have surfaced the cross-service coordination that direct execution skipped. An Explore subagent isolates verbose discovery output; it doesn't coordinate a multi-service rollout or substitute for planning the change itself. Packaging the migration as a slash command would only make the same unplanned change easier to repeat, not safer. Model tier affects reasoning quality and cost, not whether a change's architectural impact was properly planned for."}, {"id": "F-D3-B2-27", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team put the instruction 'all commit messages must follow the Conventional Commits format' inside a rarely-invoked `/format-check` skill, expecting it to be enforced automatically going forward. In practice, most commits still don't follow the format, because engineers commit directly without ever invoking that skill. What is the root cause, and how should it be fixed?", "options": ["A skill only takes effect when deliberately invoked, so a universal standard like commit message format needs to live in CLAUDE.md instead, where it's loaded as context in every session", "The skill's `allowed-tools` field is missing Bash, so it can never actually run `git commit`", "`argument-hint` was not set, so Claude Code doesn't know what format to check for", "Skills cannot contain any instructions about formatting conventions, only about multi-step procedures"], "correct": [0], "explanation": "Skills only apply on the turns where someone deliberately invokes them, so a rule meant to govern every commit needs to be a standing, always-loaded instruction: which is what CLAUDE.md provides by being read as context in every session. `allowed-tools` determines which tools a skill may call while it's running; it doesn't explain why commits made outside the skill ignore the rule entirely. `argument-hint` only documents expected inputs for the skill itself, not a missing global standard. Skills are fully capable of expressing formatting guidance: the issue here is that its scope of application is too narrow, not what kind of content it can hold."}, {"id": "F-D3-B2-28", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "An architect is designing a workflow for a large, unfamiliar codebase: first understand the existing authentication flow across many files, then decide between two possible ways to add multi-factor support. How do the Explore subagent and plan mode fit into this workflow, and how do they differ?", "options": ["They are interchangeable; either one alone can both discover the codebase and decide between the two multi-factor approaches", "Plan mode is only for discovery and cannot be used to compare architectural approaches, while the Explore subagent is what makes the final design decision", "The Explore subagent replaces the need for plan mode entirely once a codebase has been explored once", "An Explore subagent isolates the broad, verbose discovery of the existing authentication flow so it doesn't flood the main context, while plan mode is the mode used afterward to reason about and compare the two multi-factor approaches before any edits are made: the two can be combined in the same workflow"], "correct": [3], "explanation": "These two tools solve different problems and combine naturally: the Explore subagent keeps verbose, broad discovery of the existing authentication code out of the main conversation, while plan mode is the mechanism for weighing the two multi-factor design options and getting a reviewed plan before touching any files. Treating them as interchangeable ignores that one isolates search output and the other governs when edits happen. Plan mode is explicitly suited to comparing multiple approaches, not limited to discovery only, and the Explore subagent doesn't make design decisions: it returns findings. Exploring a codebase once doesn't remove the need to plan a specific architectural decision like which multi-factor approach to take."}, {"id": "F-D3-B2-29", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "A team is deciding whether a repeated workflow should be packaged as a slash command alone or as a skill. Which of the following are legitimate reasons to choose a skill over a plain slash command?", "options": ["The workflow produces a large amount of intermediate output that should stay isolated from the main conversation via `context: fork`", "The workflow should only ever be able to call a restricted set of tools, enforced through `allowed-tools`", "Users invoking the workflow need to see documented expected arguments via `argument-hint`", "Skills always execute faster than slash commands regardless of what they do", "Only skills, not slash commands, can be committed to version control"], "correct": [0, 1, 2], "explanation": "Skills add capabilities that plain slash commands don't have: isolating verbose execution from the main conversation with `context: fork`, restricting which tools the workflow can call with `allowed-tools`, and documenting expected inputs with `argument-hint`, each a legitimate reason to reach for a skill instead of a simpler command. There's no basis for skills being inherently faster than commands; the performance depends on what the workflow actually does, not the packaging mechanism. Both slash commands and skills can live in project directories and be committed to version control, so version-control support isn't a distinguishing factor between them."}, {"id": "F-D3-B2-30", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "medium", "question": "Which of the following are appropriate reasons to use plan mode rather than jumping straight into direct execution?", "options": ["The change is architecturally significant and touches many parts of the system", "There are multiple viable implementation approaches and the team wants to compare them before committing", "The engineer wants to safely explore and reason about the code with a guarantee that no edits happen yet", "The fix is a single-character typo with one obvious correction", "The implementation is already fully specified in complete detail and is trivial to apply"], "correct": [0, 1, 2], "explanation": "Plan mode earns its overhead specifically for architecturally significant work, situations with multiple viable approaches worth comparing, and cases where safe, edit-free exploration is valuable before committing to a change: all three are legitimate triggers. A single-character typo with one obvious fix has no ambiguity or architectural weight to justify the overhead of planning. Likewise, when implementation is already fully specified and trivial, there's nothing left to investigate or compare, so direct execution is the efficient choice rather than planning a decision that's already been made."}, {"id": "F-D3-B2-31", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A `/generate-release-notes` skill has `allowed-tools` set to only Read and Grep. It successfully gathers commit history and summarizes changes, but consistently fails at the final step where it's supposed to write the summary into `CHANGELOG.md`. What is the cause, and what is the fix?", "options": ["`argument-hint` is missing the `CHANGELOG.md` path, so Claude Code doesn't know where to write", "`context: fork` is preventing the skill from writing any files; removing it will fix the issue", "`allowed-tools` doesn't include Write, so the skill has no way to create or modify the file; adding Write to `allowed-tools` resolves it", "Read and Grep are mutually exclusive with any file-writing operation in every Claude Code skill"], "correct": [2], "explanation": "`allowed-tools` restricts a skill to only the tools listed, and since Write isn't among Read and Grep, the skill is structurally unable to create or modify `CHANGELOG.md`: adding Write to the list is the direct fix. `argument-hint` only documents expected inputs for the person invoking the skill; it doesn't grant or withhold tool access. `context: fork` isolates where a skill's execution happens, but it doesn't block specific tools: a forked skill with Write allowed could still write files. There's no general rule that read tools and write tools are mutually exclusive; `allowed-tools` simply lists whichever tools a given skill actually needs."}, {"id": "F-D3-B2-32", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team has a habit of spawning an Explore subagent even when a developer already knows exactly which single, small file contains the function they want to look at. What is the most accurate critique of this habit?", "options": ["The Explore subagent should never be used under any circumstances, since Claude Code can always find files on its own", "Explore subagents are only permitted inside plan mode, so using one outside of plan mode is a misconfiguration", "The habit is fine and has no downside, since Explore subagents are free to spawn and always speed up every lookup", "The Explore subagent is best reserved for broad or verbose discovery across unfamiliar territory; a known, simple lookup can just be read directly without the added indirection"], "correct": [3], "explanation": "Explore subagents earn their value when discovery is broad, uncertain, or would otherwise flood the main conversation with search noise; when the location is already known and the lookup is simple, reading the file directly is more direct and avoids unnecessary indirection. Saying Explore should never be used ignores the many unfamiliar-codebase scenarios where it's genuinely the right tool. There's no rule tying Explore subagents exclusively to plan mode: they address a discovery problem that can arise during direct execution too. Treating the habit as costless ignores that spawning a subagent for a trivial, already-known lookup adds overhead without a matching benefit."}, {"id": "F-D3-B2-33", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "Which of the following statements about SKILL.md frontmatter fields are correct?", "options": ["`context: fork` causes the skill to run in an isolated context so its intermediate work doesn't pollute the main conversation", "`allowed-tools` restricts which tools the skill is permitted to invoke", "`argument-hint` documents the arguments a user is expected to provide when invoking the skill", "`argument-hint` restricts which tools the skill may call, functioning the same as `allowed-tools`", "`context: fork` determines whether the skill's file is shared through version control"], "correct": [0, 1, 2], "explanation": "Each of the three named fields does a distinct, well-defined job: `context: fork` isolates execution context, `allowed-tools` restricts tool access, and `argument-hint` documents expected arguments for whoever invokes the skill. Claiming `argument-hint` restricts tool calls confuses it with `allowed-tools`: documenting inputs and gating tool access are different mechanisms. Version-control sharing is determined by where the SKILL.md file lives, such as a project versus a personal directory, not by the `context: fork` setting, which only affects execution isolation."}, {"id": "F-D3-B3-01", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer building a structured data extraction pipeline asks Claude Code to 'make the date parser handle more formats.' The first attempt only fixes some cases, and a second round using the same vague instruction plus 'please be more thorough this time' produces another partial fix. What should the developer do differently in the next prompt to converge faster?", "options": ["Repeat the original instruction again, adding stronger emphasis that thoroughness matters this time", "Paste an actual malformed date string pulled from production logs together with the exact normalized output that is expected", "Ask Claude Code to first produce a full design document enumerating every conceivable date format before writing any code", "Switch to a more capable model tier without changing anything else about the request"], "correct": [1], "explanation": "Giving Claude Code a concrete before/after example, one real malformed input and its exact expected output, removes the ambiguity that a vague phrase like 'handle more formats' leaves open, so the fix can converge in fewer rounds. Repeating the same vague instruction with added emphasis supplies no new information, so the outcome is unlikely to change. Demanding a full design document enumerating every format is a disproportionately heavy first step when a single concrete example would resolve the immediate case faster. A larger model does not fix an underspecified request; the problem is missing information, not insufficient capability."}, {"id": "F-D3-B3-02", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A developer is debugging an intermittent failure in the escalate_to_human handler of a customer support agent's codebase. Reporting the issue to Claude Code as 'sometimes escalation doesn't trigger when it should' leads to a guessed fix that misses the real case. What should the developer provide instead to drive a faster, more reliable fix?", "options": ["The exact failing test's input, its expected assertion, and the actual output it currently produces, so Claude Code can iterate against a reproducible target", "A restated version of the same bug description using different wording", "A request to rewrite the entire escalation module from scratch to be safe", "A longer conversation about general best practices for escalation logic"], "correct": [0], "explanation": "Sharing the concrete failing test, its input, expected result, and actual result, gives Claude Code a reproducible, checkable target to iterate against, which is far more effective than a prose description of symptoms. Rewording the same vague description adds no new signal for Claude Code to work from. Rewriting the whole module is an over-engineered response to what is likely a narrow, localized bug. A general discussion of best practices does not anchor the fix to the specific reproducible failure at hand."}, {"id": "F-D3-B3-03", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A product manager files a ticket for the support-agent codebase: 'add refund limits.' It does not specify whether limits are per-transaction or per-customer, which currencies apply, or what the thresholds should be. A developer wants to avoid Claude Code building the wrong thing. What is the best first move?", "options": ["Have Claude Code implement a reasonable default, such as per-transaction limits in US dollars, and adjust later if it turns out to be wrong", "Instruct Claude Code to ask clarifying questions about scope, currency, and thresholds before writing any implementation", "Enable plan mode and let Claude Code present an implementation approach for approval before coding", "Split the ticket across three subagents and let each infer its own assumptions about the missing details independently"], "correct": [1], "explanation": "When core requirements are genuinely unknown rather than just architecturally undecided, the interview pattern, asking Claude Code to surface clarifying questions before writing code, avoids expensive rework caused by a wrong guess. Implementing a silent default risks building the wrong feature entirely. Plan mode is useful for evaluating implementation approaches once requirements are known, but it does not substitute for resolving missing business requirements like currency and threshold definitions. Letting independent subagents each guess would produce inconsistent, uncoordinated assumptions rather than a single clarified requirement."}, {"id": "F-D3-B3-04", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "A multi-agent research system has three interacting bug reports: the coordinator times out waiting on the synthesis subagent, the synthesis subagent retries and duplicates work, and the reporting subagent occasionally cites stale data. A developer fixed the timeout issue first in an isolated Claude Code session; that session's fix made the duplicate-retry problem worse, so a second isolated session addressed the retries, which then reintroduced the timeouts. Which of the following are valid reasons to instead describe all three symptoms together in a single session rather than continuing to fix them one at a time?", "options": ["Fixing one symptom in isolation risks an edit that inadvertently worsens a related symptom, because separate sessions do not share awareness of each other's pending changes", "A single session working from the full picture can propose one coherent change that addresses the shared root cause instead of three uncoordinated patches", "Sequential, isolated fixes are guaranteed to be applied in the safest possible order automatically", "Reducing the number of Claude Code sessions used, by itself, guarantees the resulting fix is correct", "It avoids the oscillation pattern where a later isolated fix undoes assumptions the earlier isolated fix depended on"], "correct": [0, 1, 4], "explanation": "The three symptoms share a root cause in the retry and timeout logic, so batching them into one session lets Claude Code see the full interaction and design one coherent fix, which also directly avoids the observed oscillation where each isolated fix undid the previous one's assumptions. There is no guarantee that sequential, isolated fixes happen in a safe order; the scenario shows the opposite occurring. Using fewer sessions is a side effect of batching, not a guarantee of correctness on its own; correctness comes from Claude Code having full context of the interacting symptoms, not merely from a lower session count."}, {"id": "F-D3-B3-05", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A team wants Claude Code to reformat a structured-extraction pipeline's CSV output to match a stakeholder's required column order and naming. A paragraph-long style description leaves Claude Code guessing at details across several rounds. What is the most effective next step?", "options": ["Paste one fully worked example: an actual input row and the exact output row the stakeholder expects", "Expand the paragraph description with even more detail about formatting rules", "Let Claude Code guess repeatedly and iterate blindly across many rounds until it happens to match", "Escalate the task to a human, since Claude Code cannot be trusted with CSV formatting"], "correct": [0], "explanation": "A single concrete input/output example pins down exactly the details, column order, naming, formatting, that a prose description leaves ambiguous, so Claude Code can match the pattern directly instead of inferring it. Adding more paragraphs of description is still abstract and prone to the same gaps. Blind repeated guessing wastes rounds that a single concrete example would have prevented. Handing the task to a human abandons a formatting task well within Claude Code's capability once given a clear target."}, {"id": "F-D3-B3-06", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A legacy codebase has a sort function whose unit test fails intermittently. A developer wants Claude Code to fix the underlying bug rather than just make the test stop failing. Which iteration approach best supports that goal?", "options": ["Share the exact input that reproduces the failure along with the failing assertion, and ask Claude Code to iterate until the test passes deterministically, not just once", "Tell Claude Code 'the sort is flaky, please fix it' without further detail", "Delete the flaky test so the CI pipeline goes green again", "Increase the test's timeout value so intermittent slow runs stop being reported as failures"], "correct": [0], "explanation": "Providing the exact reproducing input and failing assertion, and iterating until the test passes reliably rather than just once, keeps Claude Code anchored to fixing the actual defect instead of a symptom. A vague description gives no reproducible target to iterate against. Deleting the test removes the signal entirely without fixing anything underneath. Extending the timeout can mask a real race condition or logic bug rather than addressing it."}, {"id": "F-D3-B3-07", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A new teammate files a vague ticket against the research system's reporting UI: 'the export button doesn't work.' Asking Claude Code to fix it immediately leads to several speculative changes that do not resolve the issue. What should the teammate do instead?", "options": ["Instruct Claude Code to first ask about reproduction steps, environment, and expected versus actual behavior before proposing any fix", "Have Claude Code try five different speculative fixes in sequence and see which one happens to resolve the ticket", "Reassign the task to the most capable model tier so it can guess more accurately", "Ask Claude Code to first write a design document for the entire export subsystem"], "correct": [0], "explanation": "Applying the interview pattern, having Claude Code ask about reproduction steps and expected behavior before attempting a fix, replaces guessing with the specific information needed to diagnose the real problem. Trying several speculative fixes in sequence is still guessing, just repeated guessing, and wastes cycles. A more capable model does not fix a request that is missing basic diagnostic information. Writing a full subsystem design document is disproportionate to what is likely a narrow, specific bug."}, {"id": "F-D3-B3-08", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A currency parser in a structured-extraction pipeline has two related bug reports: it drops decimals on EU-formatted numbers, and after a prior isolated fix, it now double-counts thousand separators. Each issue was fixed in its own separate Claude Code session, without either session seeing the other's change. What is the most likely cause of the oscillation, and what should the team do next?", "options": ["The two sessions lacked isolated subagent context, so the team should route both fixes through a coordinator using the Task tool", "The two interacting parsing issues were patched sequentially without either session seeing the other's change, so the second fix undid an assumption the first fix relied on; the team should describe both symptoms together in one session", "The parser logic is too complex for the current model tier and needs a larger model", "The team should switch the review step to use --output-format json to catch this class of bug"], "correct": [1], "explanation": "The oscillation is a textbook symptom of fixing two interacting issues in separate, isolated sessions: the second session's fix for thousand separators undid an assumption the first session's decimal fix depended on. Describing both symptoms together lets Claude Code see the full picture and design one coherent parsing fix. This has nothing to do with subagent context isolation via the Task tool, which is a multi-agent orchestration concern, not a sequential-session-planning one. A larger model does not resolve a coordination problem caused by missing context, and a CI output-format flag has no bearing on how a parsing bug gets diagnosed."}, {"id": "F-D3-B3-09", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A developer wants Claude Code to generate a new support-agent API endpoint whose error responses match the camelCase JSON convention already used by an existing endpoint. Repeatedly describing the convention in words across several prompts still produces drift. What is the fastest way to lock in the desired style?", "options": ["Paste an actual request/response example from the existing endpoint as the concrete pattern to mirror", "Write an even longer natural-language description of the naming convention", "Let Claude Code invent its own consistent convention and adopt it going forward", "Add a linter that flags style violations after the code is generated"], "correct": [0], "explanation": "A real example from the existing endpoint gives Claude Code an exact concrete pattern to match, which converges faster than another round of prose description of the same rule. A longer written description is still abstract and has already proven insufficient. Letting Claude Code invent its own convention risks a style that is internally consistent but mismatched with the existing endpoint. A linter is a useful check after the fact, but it does not help Claude Code converge on the right style during generation."}, {"id": "F-D3-B3-10", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A developer is migrating a synchronous module to async in a large legacy codebase and wants confidence that behavior has not changed. Which iterative workflow best supports that goal?", "options": ["Ask Claude Code to describe in prose how thoroughly it verified correctness during the migration", "After each incremental change, run the existing test suite and feed any failing test's output back to Claude Code before proceeding to the next change", "Perform the entire migration in one large pass, then run the test suite once at the very end", "Temporarily disable the slower tests to speed up the migration process"], "correct": [1], "explanation": "Running the existing tests after each incremental change and feeding failures back keeps the scope of each step small and immediately verifiable, which is the core of test-driven iteration. Asking Claude Code to self-report how thorough it was is an unreliable substitute for actually running tests. Doing the whole migration in one pass before testing makes it much harder to localize which change introduced a regression. Disabling tests removes the exact safety signal the developer is trying to preserve."}, {"id": "F-D3-B3-11", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A ticket for the research system's document-analysis subagent simply says 'improve search,' without specifying whether the goal is relevance ranking, latency, or coverage. Which instruction to Claude Code best applies the interview pattern here?", "options": ["Before writing any code, ask me clarifying questions about what 'improve' means in this context, ranking, latency, or coverage, and wait for my answers", "Implement three different search improvements so I can pick my favorite afterward", "Use your best judgment and proceed silently without asking anything", "Write unit tests for the current search behavior before making any changes"], "correct": [0], "explanation": "Explicitly asking Claude Code to surface clarifying questions about what 'improve' means, and to wait for answers, is the interview pattern applied directly to a genuinely ambiguous requirement. Implementing three variants is expensive guessing dressed up as thoroughness rather than clarifying intent first. Proceeding silently on best judgment is the opposite of the interview pattern and risks solving the wrong problem. Writing tests for current behavior is a reasonable but separate practice; it does not resolve the ambiguity about what 'improved' should mean."}, {"id": "F-D3-B3-12", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Two PR comments land on the same function in the support-agent codebase the same day: one about a null-check bug, another about an unrelated logging format issue. Each is sent to Claude Code as its own separate session, and the two sessions produce conflicting edits to the same lines that then require manual merging. What should the team do differently?", "options": ["Keep filing every comment as its own isolated session regardless of overlap, for cleaner traceability", "When multiple pending issues touch the same code region, address them together in one session so the edits are coherent", "Assign each comment to a different model tier so the outputs are easier to distinguish", "Wait until the first PR fully merges before even reading the second comment"], "correct": [1], "explanation": "When two issues touch the same lines of code, handling them in one session lets Claude Code produce a single coherent edit instead of two conflicting ones that need manual reconciliation. Continuing to file every comment separately regardless of overlap is exactly what caused the conflict in the first place. Assigning different model tiers does not address the underlying coordination problem. Delaying the second comment until the first PR merges blocks progress rather than solving the coordination issue directly."}, {"id": "F-D3-B3-13", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A developer asks Claude Code to write a Slack-notification formatter for escalation events, describing the desired output only as 'readable and concise.' Across several rounds, the generated formatting varies significantly each time. What is the best fix?", "options": ["Repeat the phrase 'readable and concise' with stronger emphasis in the next prompt", "Provide two or three concrete example messages showing the exact desired formatting for different escalation types", "Increase the model's creativity setting to get more varied formatting options to choose from", "Have a different developer write the formatter by hand instead"], "correct": [1], "explanation": "Concrete example messages covering a few different escalation types pin down the exact formatting Claude Code should converge on, resolving the ambiguity that 'readable and concise' leaves wide open. Repeating the same vague phrase with more emphasis provides no new information. Increasing variety in the output is the opposite of what is needed when the goal is a consistent, predictable format. Abandoning the tool for manual work gives up on a task that concrete examples would solve efficiently."}, {"id": "F-D3-B3-14", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer reports to Claude Code only that 'the discount calculation is wrong,' with no further detail. What single artifact would most efficiently drive the next round of iteration?", "options": ["A failing test case showing the exact input, the expected output, and the actual, incorrect, output", "A link to the general pricing policy documentation", "A screenshot of the UI showing an incorrect total", "A restatement of the bug ticket's title in different words"], "correct": [0], "explanation": "A failing test with a concrete input, expected output, and actual output gives Claude Code a precise, checkable target, which is the most direct path to a fix. General policy documentation provides useful background but does not pinpoint the specific failing case. A screenshot shows a symptom but lacks the precise input and expected value needed to reproduce and verify a fix. Restating the same vague title in different words adds no new information."}, {"id": "F-D3-B3-15", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A structured-extraction team receives a one-line request: 'extract vendor info from these contracts,' and the contracts vary widely in layout and completeness. Applying the interview pattern, what should Claude Code be prompted to do first?", "options": ["Start extracting from the first contract and adjust the schema reactively as edge cases appear", "Ask what fields count as 'vendor info,' how to handle contracts missing some fields, and whether multiple vendors per contract are possible, before writing extraction code", "Generate a JSON schema unilaterally and begin extraction without confirming it", "Request a larger context window before starting the task"], "correct": [1], "explanation": "Asking upfront what counts as vendor info, how missing fields should be handled, and whether multiple vendors are possible resolves the real ambiguity in the request before any extraction logic is written, which is the interview pattern in action. Starting reactively means the schema and logic may need significant rework once real edge cases surface. Generating a schema unilaterally skips the clarification step entirely and risks building against the wrong assumptions. Context window size is unrelated to the ambiguity in the request itself."}, {"id": "F-D3-B3-16", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A reviewer leaves three related findings on the same file in one pass: missing input validation, an off-by-one loop bound, and a misleading variable name that obscures the off-by-one. A developer considers sending these to Claude Code as three separate follow-up prompts, one per finding. What is the better approach?", "options": ["Send all three findings together in one prompt, since the misleading variable name is directly tied to understanding and fixing the off-by-one bug", "Send them one at a time in the order they were filed, for cleaner traceability", "Fix only the input-validation issue and treat the other two as low priority", "Ask Claude Code to choose which one of the three findings to address"], "correct": [0], "explanation": "Because the misleading variable name is part of what is obscuring the off-by-one bug, Claude Code needs both findings in view at once to fix them coherently; splitting them into separate prompts fragments context that is needed together. Sending them strictly in filed order ignores the fact that two of the three are interdependent. Dropping two of the three findings as low priority discards real issues without justification. Deferring the prioritization decision to Claude Code hands off a call the developer should be making."}, {"id": "F-D3-B3-17", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A developer wants Claude Code to generate docstrings matching the team's established style, but an abstract paragraph describing the style guide is not converging across rounds. What technique would most likely produce fast convergence?", "options": ["Paste one existing, fully-written docstring from the codebase as the concrete target pattern to match", "Reference an external style guide by name without including its actual content", "Ask Claude Code to survey the entire repository and derive a 'consensus style' before writing anything", "Specify only the maximum line length allowed for docstrings"], "correct": [0], "explanation": "A real, fully-written docstring from the codebase gives Claude Code a concrete pattern to mirror directly, which converges faster than another abstract description. Referencing an external guide by name only, without its content, still leaves the actual rules unspecified. Surveying the whole repository for a consensus style is a disproportionately heavy first step for what a single example would resolve quickly. Specifying only line length addresses one narrow dimension of style and leaves the rest, structure, tone, section ordering, still ambiguous."}, {"id": "F-D3-B3-18", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A GitHub Actions workflow invokes Claude Code to review pull requests for a multi-agent research system's codebase. The job hangs indefinitely and eventually times out, because Claude Code is waiting for interactive terminal input that never arrives in the runner environment. What change fixes this?", "options": ["Invoke Claude Code with the -p/--print flag so it runs non-interactively and exits without waiting for input", "Increase the workflow's timeout-minutes setting so the job has more time to complete", "Switch the GitHub Actions runner to a different operating system image", "Add --resume with a session name to the invocation"], "correct": [0], "explanation": "The -p/--print flag runs Claude Code in non-interactive mode, producing output and exiting instead of waiting on a terminal prompt, which is exactly what a CI runner needs. Increasing the timeout just delays the same hang rather than fixing its cause. Changing the runner's operating system image has no bearing on an interactive-input wait. Resuming a named session does not address the lack of a non-interactive mode."}, {"id": "F-D3-B3-19", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A team wants a nightly cron job to run a Claude Code code review fully unattended, with output captured to a log file and no prompts appearing at any point. Which invocation approach is correct?", "options": ["Run Claude Code in its default interactive mode and pipe an auto-confirmation string like 'yes' into it", "Invoke Claude Code with the -p/--print flag for non-interactive, headless execution", "Schedule an engineer to connect over SSH interactively each night to run the review", "Rely on plan mode being enabled by default to avoid prompts"], "correct": [1], "explanation": "The -p/--print flag is built for exactly this purpose: non-interactive, headless execution suitable for an unattended job like a nightly cron run. Piping a fake confirmation string into an interactive session is a fragile workaround for a problem that non-interactive mode solves directly. Requiring a human to connect nightly defeats the purpose of automating the job. Plan mode governs whether Claude Code proposes an approach before acting; it does not make a session non-interactive."}, {"id": "F-D3-B3-20", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "medium", "question": "A CI job for the support-agent codebase must run Claude Code's PR review both fully unattended and with output a downstream script can reliably parse to auto-file follow-up tickets. Which of the following should the team configure?", "options": ["-p/--print, so the run does not wait on interactive input inside the CI runner", "--output-format json, so the response is structured rather than free-form text", "--resume, so the CI run reuses a previous interactive terminal session", "A larger model tier, which inherently formats all output as valid JSON without needing any output-format flag", "--json-schema, so the JSON output is constrained to the exact fields the downstream script expects"], "correct": [0, 1, 4], "explanation": "Unattended, parseable CI output requires both non-interactive execution and structured output: -p/--print prevents the run from waiting on input, --output-format json produces machine-parseable structure, and --json-schema further constrains that structure to the specific fields the downstream script needs. --resume is about continuing a named session across invocations and does not address either interactivity or parseability. Model size has no bearing on whether output is valid, schema-conformant JSON; that requires the explicit output-format and schema flags, not a larger model."}, {"id": "F-D3-B3-21", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A PR bot needs to reliably extract severity, file path, and line number from Claude Code's review output to auto-file follow-up tickets. The current setup asks for free-text output and occasionally breaks the downstream parser when the wording shifts. What is the most robust fix?", "options": ["Add a prompt instruction asking Claude to 'always format your response as JSON,' with no further constraints", "Use --output-format json together with --json-schema to enforce a machine-parseable structure with defined fields", "Switch to a more capable model tier so it more reliably follows the JSON-formatting instruction", "Post-process the free-text output with a more elaborate regular expression to extract the fields"], "correct": [1], "explanation": "Combining --output-format json with --json-schema enforces a defined, machine-parseable structure for fields like severity, file, and line, which is a guarantee that a prompt instruction alone cannot provide. Asking Claude to 'format as JSON' in the prompt is a probabilistic instruction that can still drift in wording or structure. A larger model improves instruction-following on average but still does not guarantee schema conformance. A more elaborate regular expression over free text treats the parsing symptom rather than fixing the underlying lack of structure."}, {"id": "F-D3-B3-22", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A merge-gate script must automatically block a PR whenever Claude Code's review reports a 'high' severity finding. Free-text review output currently uses inconsistent phrasing like 'pretty bad' or 'serious issue' instead of a fixed severity value, so the gate cannot reliably detect blocking conditions. What should the team configure?", "options": ["A --json-schema that constrains the severity field to a fixed set of enum values, used together with --output-format json", "A note in CLAUDE.md asking Claude to 'please use consistent severity words' in its reviews", "A post-processing script that maps phrases like 'pretty bad' to the 'high' severity level", "The --resume flag, so the same session's wording stays consistent across runs"], "correct": [0], "explanation": "A JSON schema that constrains severity to a fixed enum, combined with structured JSON output, guarantees the merge-gate script gets one of a small set of exact values it can reliably check, a deterministic, syntactic guarantee rather than a hope about wording. A CLAUDE.md note is still a probabilistic instruction that can drift in exact phrasing. Mapping known phrases after the fact is a fragile patch that breaks on any new phrasing Claude produces. Reusing the same session with --resume does not constrain output structure or values at all."}, {"id": "F-D3-B3-23", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A team currently greps Claude Code's plain-text review output for the word 'CRITICAL' to decide whether to block a PR, but this misses variants like 'Critical' or 'critical:' and is generally unreliable. What is the best structural fix?", "options": ["Keep grepping the text but add more capitalization and wording variants to the pattern", "Require --output-format json with --json-schema so severity is a defined field with fixed values instead of free text to search", "Ask reviewers to manually double-check every PR in addition to the automated grep", "Stop blocking merges on severity altogether to avoid the unreliable check"], "correct": [1], "explanation": "Making severity a defined, schema-constrained JSON field removes the need to pattern-match free text entirely, a structural fix rather than another patch on the same brittle approach. Adding more wording variants to the grep pattern is the same treat-the-symptom approach that already failed and will keep failing on future rewordings. Adding manual double-checking defeats the purpose of automating the gate. Removing the severity-based block entirely discards a genuinely useful safety control instead of fixing how it is detected."}, {"id": "F-D3-B3-24", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A PR receives a Claude Code review that reports four findings. The author fixes three of them and triggers a re-review. The new run re-reports all four findings, including the three that are already fixed, as if nothing had changed. What is the most direct fix?", "options": ["Feed the prior review's findings into the new run's context so it can confirm which are resolved and focus on what is actually new", "Assume the model tier is too weak to remember the previous review and switch to a larger model", "Enable --resume so the review continues in the exact same session that originally wrote the code fixes", "Split the PR into several smaller PRs to reduce the number of findings per review"], "correct": [0], "explanation": "The re-run starts without knowledge of the prior findings, so it re-derives everything from scratch; passing the previous findings into the new run's context lets it check what is resolved and report only what is genuinely new or unresolved. This is not a capability limitation that a larger model would fix, it is a missing-context problem. Resuming the code-writing session conflates continuing that session with the separate concern of giving the review step access to prior findings, and does not specifically solve the re-reporting issue. Splitting the PR reduces the volume of findings per review but does not stop already-fixed items from being re-flagged."}, {"id": "F-D3-B3-25", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A nightly Claude Code review of a codebase repeatedly flags a parameter as unused, but the team has already determined it is part of a required public interface and dismisses the finding every day, because each nightly run starts with no memory of the earlier dismissal. What is the most direct fix given this CI-review workflow?", "options": ["Increase the review model's temperature setting to produce fewer false positives", "Pass the prior run's findings and the team's dismissal notes into the next run's context so it does not re-flag the already-reviewed pattern", "Disable the review step entirely to stop the recurring noise", "Reduce the review's frequency to weekly instead of nightly"], "correct": [1], "explanation": "Carrying forward the prior findings and the team's dismissal notes gives the next run the context it needs to recognize the pattern as already reviewed and acceptable, which directly addresses why it keeps recurring. Temperature is not a lever for controlling which specific findings get re-flagged. Disabling the whole review step throws away its real value along with the noise. Running less often only spreads the same recurring noise over a longer interval instead of fixing it."}, {"id": "F-D3-B3-26", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "An architect is designing the re-review step for long-lived PRs on the research-system repo that get updated over several days. The goal is for each re-review to confirm previously reported issues are resolved and to avoid re-litigating decisions a human reviewer already made in PR comments. Which design best achieves both goals?", "options": ["Run Claude Code from a completely clean context on each re-review, providing only the current diff", "Include the prior review's findings, along with their resolution status and any human decisions on them, as input to each new re-review run", "Keep resuming the exact same interactive session across every day of the PR's life", "Require a human to manually retype all previous findings into the PR description before each automated run"], "correct": [1], "explanation": "Feeding each new re-review the prior findings together with their resolution status and any human decisions lets Claude Code confirm what is fixed and respect what has already been decided, satisfying both goals directly. A clean context with only the current diff loses all of that history and re-litigates settled points. Resuming the same interactive session does not fit an automated, triggered CI re-review and conflates session continuity with structured findings tracking. Manually retyping prior findings could work in principle but is an error-prone, unscalable workaround for something the tooling should pass along automatically."}, {"id": "F-D3-B3-27", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Claude Code is asked to 'add tests for the refund calculator' in the support-agent codebase. It generates a new test file that duplicates roughly 70% of the assertions already present in an existing, differently-named test file it was never shown. What should change for future runs?", "options": ["Ask Claude Code to write fewer tests overall", "Give Claude Code visibility into the existing test files so it extends coverage instead of re-deriving it from scratch", "Switch to a smaller, cheaper model for test-generation tasks", "Run the test-generation step twice and manually diff the two outputs"], "correct": [1], "explanation": "Showing Claude Code the existing test file lets it see what is already covered and write tests that fill genuine gaps instead of re-deriving overlapping coverage. Simply asking for fewer tests would reduce duplication somewhat but could just as easily cut needed new coverage instead of the redundant part. Model size is not the cause of the duplication; the cause is missing visibility into existing tests. Running generation twice and diffing manually is a wasteful workaround that does not prevent the duplication in the first place."}, {"id": "F-D3-B3-28", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A CI job labeled 'generate missing tests' runs on every PR and consistently produces near-duplicate tests for utility functions that already have solid coverage elsewhere in the repository, inflating the test suite and the review burden. What is the most effective structural fix?", "options": ["Include the relevant existing test files, or a summary of already-covered cases, in the prompt so Claude Code targets only genuine gaps", "Add a follow-up CI step that deletes tests that look like duplicates after generation", "Only run the job on Fridays to reduce how often duplicates are produced", "Add an instruction telling Claude Code 'do not write duplicate tests,' without providing any information about what already exists"], "correct": [0], "explanation": "Giving Claude Code visibility into what is already covered, the actual existing test files or a summary of covered cases, lets it identify genuine gaps instead of guessing and re-deriving existing coverage. Deleting apparent duplicates afterward is a detective, after-the-fact cleanup step rather than a fix to the generation process itself. Running less often just reduces how frequently the same root problem shows up, not the problem itself. An instruction to avoid duplicates with no supporting information is a probabilistic ask that Claude Code has no reliable way to satisfy, since it genuinely does not know what already exists."}, {"id": "F-D3-B3-29", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer wants Claude Code to write a regression test for a bug just fixed in the extraction pipeline, but worries it will duplicate tests that already cover adjacent cases in the pipeline's test suite. What is the simplest effective step to prevent that?", "options": ["Point Claude Code at the existing test file or files covering that module so it can see current coverage before adding the new test", "Ask Claude Code to guess what is already tested based on function names alone", "Write the regression test by hand instead of using Claude Code for this task", "Increase the maximum output length so Claude Code can write more tests just in case"], "correct": [0], "explanation": "Showing Claude Code the existing test file directly is the simplest way to give it accurate knowledge of current coverage before it adds a new regression test. Guessing from function names alone is unreliable and can miss coverage that is not obvious from naming. Abandoning Claude Code for this task gives up the efficiency it offers rather than fixing the actual workflow gap. A longer output limit provides no information about existing coverage and could make duplication worse, not better."}, {"id": "F-D3-B3-30", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Automated PR reviews on the research-system repo inconsistently flag the team's error-handling conventions, because whichever engineer wrote that day's CI review prompt restates the rules slightly differently each time. What is the best fix for consistency across runs?", "options": ["Document the error-handling and coding standards once in CLAUDE.md so every Claude Code invocation, interactive or in CI, loads the same conventions automatically", "Require each engineer to memorize the standards and manually retype them into every PR description", "Rotate which engineer writes the CI review prompt each week", "Increase how often the review job runs so issues are caught sooner regardless of which rules were applied that day"], "correct": [0], "explanation": "Putting the standards in CLAUDE.md once means every Claude Code invocation loads the same conventions automatically, removing the variation that comes from different engineers restating the rules by hand each time. Requiring manual retyping into every PR description is exactly the error-prone, inconsistent pattern causing the problem. Rotating who writes the prompt does not address the root inconsistency and could make it worse. Running the review more frequently does not fix which rules get applied; it just applies inconsistent rules more often."}, {"id": "F-D3-B3-31", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "An architect is choosing between two designs for a CI review job: hardcoding the team's twelve coding standards directly into the CI shell script's prompt string, duplicated across three separate pipeline files, versus referencing a project CLAUDE.md that Claude Code loads automatically. One of the standards is expected to change next quarter. Which design is better, and why?", "options": ["Hardcoding into the CI script is better, because it keeps everything visible in one file per pipeline", "The CLAUDE.md approach is better, because the standards live in a single place, load automatically for any Claude Code invocation, and only need updating once instead of in three duplicated prompt strings", "Neither matters, since the model already applies generic best practices regardless of team-specific conventions", "Standards should instead be re-explained fresh in every individual prompt to guarantee the model 'really' applies them"], "correct": [1], "explanation": "Centralizing the standards in CLAUDE.md means a future change only needs to happen in one place and is picked up automatically by every Claude Code invocation that loads it, exactly the maintainability the three-way duplication lacks. Hardcoding into the CI script is precisely what creates the triplicated-update problem the scenario describes, so it is not actually the safer choice despite seeming centralized within each pipeline file. Relying on generic best practices ignores that these are team-specific conventions a general model would not know on its own. Re-explaining the standards fresh in every prompt reintroduces the same duplication and drift risk that CLAUDE.md is meant to eliminate."}, {"id": "F-D3-B3-32", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "To save time, a team has the same Claude Code session that just wrote a bug fix immediately review and approve its own diff, within the same conversation, before merging. What is the risk, and what is the better design?", "options": ["There is no real risk, since the session already has full context of the change, which makes its review more accurate", "The session tends to retain its own reasoning and rationalize the choices it already made, so the review should run in an independent Claude Code session with fresh context instead of continuing the same one", "The only real risk is that it is slower to review in the same session, so running the review in parallel within that session solves it", "The risk is fully addressed by adding an explicit instruction telling the same session to 'review critically'"], "correct": [1], "explanation": "A session that just wrote the fix retains its own reasoning and tends to rationalize the choices it already made, so a genuinely independent review needs a fresh session without that carried-over context. Claiming there is no risk ignores this well-known self-review bias. The issue is not about speed, so running things in parallel within the same biased session does not address it. An instruction to 'review critically' is a probabilistic nudge layered on top of the same retained context and reasoning, not a structural fix for the bias."}, {"id": "F-D3-B3-33", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "A team wants to make its automated Claude Code PR-review pipeline more reliable end to end, from generating structured findings to avoiding stale or repeated noise. Which of the following changes would most improve the reliability of that pipeline?", "options": ["Run the review step as an independent Claude Code session rather than continuing the session that wrote the original fix", "Feed the prior review's findings into each re-review so already-resolved issues are not re-flagged as new", "Enforce --output-format json with --json-schema so severity and category fields are consistently structured for the merge gate", "Increase the temperature parameter to encourage more creative and varied review feedback", "Skip re-review entirely once a PR's first review passes, even after new commits are pushed"], "correct": [0, 1, 2], "explanation": "Running review in an independent session avoids the self-review bias of a session rationalizing its own prior choices; carrying forward prior findings prevents already-resolved issues from being endlessly re-flagged; and enforcing structured JSON output with a schema gives the merge gate consistent, reliably parseable fields to act on. Raising the temperature increases output variability, which works against the consistency a review pipeline needs, not toward it. Skipping re-review after new commits removes the safety signal entirely for exactly the changes most likely to need a fresh look, defeating the purpose of continuous review."}, {"id": "F-D4-B1-01", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team's Claude Code CI review bot is instructed to only flag issues it is highly confident about and to be conservative in general. Despite this, it still flags minor style nits on roughly 40% of pull requests, and developers routinely dismiss the comments. What change is most likely to reduce these false positives?", "options": ["Replace the conservatism instruction with explicit categorical criteria describing exactly which issue types and conditions qualify for a flag", "Reword the instruction to be extremely conservative instead of just conservative", "Increase the amount of reasoning the model is allowed to do before it responds", "Switch the underlying model to a more capable tier without changing the instructions"], "correct": [0], "explanation": "Vague adjectives like conservative leave the actual decision threshold undefined, so the model has no concrete rule to apply; explicit categorical criteria give it one. Intensifying the same vague wording doesn't add any decision-relevant information. Allowing more reasoning time doesn't resolve an underspecified instruction. A more capable model still has to interpret the same ambiguous criteria, so it doesn't fix the root cause."}, {"id": "F-D4-B1-02", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A security-review agent labels every finding as critical, high, medium, or low, but two engineers reviewing th
