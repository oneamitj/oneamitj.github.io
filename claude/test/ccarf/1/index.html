e same findings disagree on the severity roughly a third of the time. Which change most directly resolves the inconsistency?", "options": ["Add concrete code examples for each severity tier drawn from real cases, such as unsanitized user input concatenated directly into a database query for critical versus a missing validation check on an internal-only admin endpoint for medium", "Have engineers vote on the severity and use whichever label gets the most votes", "Instruct the model to use its best judgment when assigning severity", "Remove the severity field and treat every finding as equally urgent"], "correct": [0], "explanation": "Anchoring each severity label to a concrete, representative code example turns an abstract word into an observable pattern the model can match against, which is what produces consistent categorization. Voting doesn't scale and doesn't fix the underlying ambiguous prompt that caused the disagreement in the first place. Telling the model to use its best judgment reintroduces the same undefined threshold that caused the inconsistency. Removing severity altogether discards information the team needs for triage instead of fixing the labeling problem."}, {"id": "F-D4-B1-03", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A structured-extraction pipeline pulls purchase-order number, vendor, line items, and total from scanned invoices. On invoices where the purchase-order number is genuinely absent from the document, the model consistently invents a plausible-looking number instead of leaving the field blank. What is the most effective fix?", "options": ["Add a few-shot example, among the 2-4 sample invoices in the prompt, drawn from a real invoice with no purchase-order number, showing the correct output leaves that field null instead of fabricating a value", "Add a single instruction telling the model not to hallucinate values", "Split the extraction into two separate calls, one for header fields and one for line items, without otherwise changing the prompt", "Add a follow-up step that asks the model to double-check the purchase-order number after every extraction"], "correct": [0], "explanation": "Demonstrating the desired null/absent behavior on a real example is what teaches the model the pattern to follow; a shown example changes behavior more reliably than a description. Telling the model not to hallucinate is itself a vague instruction with no concrete anchor, the same failure mode as telling it to be conservative. Splitting the call in two doesn't change what the model does when the field is missing in whichever call handles it. Asking the model to double-check adds cost without addressing why it invented the value in the first place, since it doesn't know that a blank answer is acceptable."}, {"id": "F-D4-B1-04", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "After a Claude Code review agent is added to a repository's pull-request pipeline, developers begin ignoring all of its comments because its possible-race-condition category is wrong about 85% of the time, even though its unhandled-exception and SQL-injection categories are reliable. What is the best immediate action?", "options": ["Temporarily disable the possible-race-condition category while keeping the reliable categories active, then rework its criteria before re-enabling it", "Disable the entire review agent until every category has a zero false-positive rate", "Leave all categories enabled and add a disclaimer comment reminding developers the bot can be wrong", "Increase how often the agent reviews the code so the race-condition category has more data to learn from"], "correct": [0], "explanation": "Disabling only the category causing the noise preserves the value developers already get from the reliable categories while immediately stopping the specific source of distrust, and the change is easy to reverse once the criteria are reworked. Shutting the whole agent off throws away working functionality that developers were benefiting from. A disclaimer doesn't reduce the actual volume of noise developers see and dismiss. Running the agent more often just produces the same unreliable flags faster, it doesn't fix the underlying criteria that make the category imprecise."}, {"id": "F-D4-B1-05", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A legal-tech team's contract-extraction prompt includes four few-shot examples, all drawn from the same standard non-disclosure-agreement template. In production, extraction accuracy drops sharply on employment agreements and licensing contracts that use different section structures. What should the team change?", "options": ["Replace some of the same-template examples with examples drawn from the other contract types and structures the pipeline actually processes", "Add ten more examples using the same non-disclosure-agreement template to reinforce the existing pattern", "Remove all few-shot examples and rely on the schema definition alone", "Increase the randomness of the model's output so it adapts more creatively to unfamiliar formats"], "correct": [0], "explanation": "Few-shot examples teach the model the range of structures to expect; when every example shares one layout, the model overfits to that layout instead of learning to generalize. Adding more examples of the same template reinforces the identical narrow pattern rather than broadening it. Removing the examples entirely discards the strongest lever available for consistent extraction across formats. Increasing output randomness works against the goal of reliable, structured extraction and doesn't teach the model anything about the missing structures."}, {"id": "F-D4-B1-06", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A license-compliance check in CI is instructed to flag any concerning license. It ends up flagging permissive licenses like a standard open-source attribution license right alongside genuinely restrictive copyleft licenses, burying the real problems in noise. What is the most effective fix?", "options": ["Provide an explicit list of specific license identifiers and the exact condition under which each should be flagged, replacing the word concerning", "Change the instruction from concerning to very concerning for emphasis", "Tell the model to only flag licenses it has low confidence are safe", "Remove the license check from the pipeline entirely"], "correct": [0], "explanation": "Naming the specific licenses and the concrete condition that triggers a flag gives the model a checkable rule instead of an ambiguous adjective. Intensifying the same vague word adds emphasis but no new decision-relevant information. Framing the criterion as low confidence just substitutes one unanchored, self-referential threshold for another. Removing the check entirely discards a legitimate compliance safeguard instead of fixing the underlying prompt."}, {"id": "F-D4-B1-07", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A support-ticket extraction pipeline assigns each ticket to exactly one category, but roughly 15% of real tickets plausibly belong to two categories at once, such as a failed payment caused by a software bug that touches both billing and technical issues. The team wants their few-shot examples to fix this. What should they add?", "options": ["One or two examples showing a genuinely ambiguous ticket with the intended tie-breaking category chosen and a brief rationale, so the model learns the resolution rule for overlapping cases", "Ten additional clear-cut, single-category examples so the model sees more examples overall", "The same unambiguous example repeated several times to reinforce the desired category strongly", "An instruction telling the model to pick whichever category seems more important"], "correct": [0], "explanation": "Demonstrating an actual ambiguous ticket along with its intended resolution is exactly what teaches the model a specific tie-breaking rule, which is a core purpose of few-shot examples. Adding more clear-cut examples doesn't touch the 15% of genuinely ambiguous tickets the fix is meant to address. Repeating an identical example adds no new information about how to resolve overlap. Telling the model to pick whichever category seems more important is an unanchored instruction with the same failure mode as telling it to be conservative."}, {"id": "F-D4-B1-08", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A code-review prompt originally says to flag security issues by severity, using judgment for critical, high, medium, and low. A revised version instead includes concrete code examples from the team's own history for each tier, such as a specific past incident where string-concatenated SQL was rated critical. In a pilot, the revised version cuts false positives by 60%. What best explains this improvement?", "options": ["Grounding severity labels in concrete, representative code examples removes ambiguity about what qualifies for each tier, giving the model a pattern to match against instead of an open-ended judgment call", "The revised version uses a larger, more capable model than the original", "The revised version requires every pull request description to be longer before the review runs", "The revised version was tested on more pull requests, so it had more opportunities to be correct"], "correct": [0], "explanation": "Anchoring severity to concrete, representative examples is the specific mechanism that removes the ambiguity responsible for the false positives. Nothing in the scenario changes the model between versions, so a capability difference isn't the explanation. Requiring longer pull request descriptions has no bearing on what the review criteria are or how severity is assigned. Testing on more pull requests only produces more data points, it does not explain a systematic improvement in precision."}, {"id": "F-D4-B1-09", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "medium", "question": "A team is redesigning a Claude Code CI review agent's prompt after a wave of false-positive complaints from developers. Which two changes would most meaningfully reduce false positives?", "options": ["Replace flag anything suspicious with a specific list of vulnerability patterns and the exact conditions under which each qualifies as a flag", "Add concrete code examples illustrating what does and does not meet each severity threshold", "Tell the model to try its best to avoid false positives", "Run the agent on every commit instead of only when a pull request is opened", "Rephrase be conservative as be very conservative"], "correct": [0, 1], "explanation": "Replacing vague phrasing with a concrete pattern list and grounding severity thresholds in code examples both give the model checkable, deterministic-feeling criteria instead of a subjective judgment call, which is what actually changes flag precision. Telling the model to try its best is still an unanchored instruction that doesn't change its decision boundary. Running the same underspecified prompt more frequently only produces the same false positives faster. Intensifying be conservative to be very conservative adds emphasis without adding any decision-relevant information."}, {"id": "F-D4-B1-10", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "An engineer building a resume-parsing pipeline asks how many few-shot examples to include in the extraction prompt to get consistent, well-formatted output without making the prompt unnecessarily long. What is the best guidance?", "options": ["Include roughly 2 to 4 well-chosen examples that cover the common case plus at least one edge case", "Include no examples and rely entirely on the schema description", "Include as many examples as possible, ideally 20 or more, to maximize coverage", "Include exactly one example, since additional examples would be redundant"], "correct": [0], "explanation": "A small, targeted set of roughly 2 to 4 examples is the effective range for teaching consistent formatting and handling edge cases without unnecessary bulk. Relying on the schema alone forfeits the strongest lever for consistent formatting and ambiguous-case handling. Piling on dozens of examples adds length without a proportional benefit once the key patterns are already represented. A single example under-represents the diversity of real inputs the pipeline will encounter."}, {"id": "F-D4-B1-11", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An automated test-generation agent in CI flags newly generated tests as likely flaky whenever they involve asynchronous code, including well-written tests with correct awaits. Developers have started ignoring the flaky-test warnings entirely. What is the most effective prompt change?", "options": ["Define the specific patterns that actually indicate flakiness, such as an assertion on wall-clock time within a tight tolerance or an unawaited promise, instead of a broad rule about asynchronous code", "Instruct the agent to flag a test as flaky only if it seems risky", "Tell the agent to stop analyzing any test that touches asynchronous code", "Ask the agent to lower its overall flag rate by half without changing what triggers a flag"], "correct": [0], "explanation": "Naming the concrete patterns that actually cause flakiness lets the model distinguish genuinely risky async tests from well-written ones. Framing the criterion as seems risky reintroduces the same unanchored judgment call that caused the problem. Exempting all async code from analysis would create false negatives on real flaky tests instead of fixing the precision issue. Arbitrarily halving the flag rate doesn't change what triggers a flag, so flags would no longer track genuine risk at all."}, {"id": "F-D4-B1-12", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "In a multi-agent research system, a synthesis subagent extracts author names and publication years from source documents into a structured citation list. It occasionally fabricates a plausible-sounding author name when a source is a preprint with no listed author. What prompt change best addresses this?", "options": ["Add a few-shot example where the source has no listed author, with the correct output explicitly marking the author field as unknown rather than inventing a name", "Add an instruction telling the subagent to be accurate", "Provide the subagent with more source documents to consider in each synthesis pass", "Increase the number of retrieval results the subagent reviews before writing each citation"], "correct": [0], "explanation": "Showing a concrete example of the desired unknown/absent output for missing author information demonstrates the exact pattern the model should follow; a shown example changes behavior more reliably than a description. Telling the subagent to be accurate is a vague aspirational instruction with no concrete anchor. Neither more source documents nor more retrieval results addresses the specific failure of inventing an author when none is present, since additional input can't recover information that was never in the source."}, {"id": "F-D4-B1-13", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI security-review agent has three flag categories: hardcoded secrets at 95% precision, insecure deserialization at 90% precision, and possible logic error at 20% precision. The team wants to protect developer trust while still catching real secrets and deserialization issues, and has no time this sprint to rewrite the possible-logic-error criteria. What should they do?", "options": ["Temporarily disable the possible-logic-error category while leaving the two high-precision categories active, and schedule work later to rewrite its criteria with concrete examples", "Lower the confidence threshold for all three categories equally so fewer issues are flagged everywhere", "Disable all three categories until possible-logic-error can be fixed, since a partially broken tool is worse than no tool", "Keep all three categories active and add a note to the pull-request template asking developers to be patient with false positives"], "correct": [0], "explanation": "Disabling only the low-precision category preserves the value of the two categories that are already working well while immediately stopping the specific source of noise, which is the most targeted response given limited time. Lowering the threshold across all three categories equally would also degrade the two categories that don't need fixing. Disabling everything discards functioning, high-precision checks the team has no reason to give up. Asking developers to be patient doesn't reduce the noise they actually see and does little to preserve trust."}, {"id": "F-D4-B1-14", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A document-extraction prompt originally had one few-shot example and produced inconsistent date formats across outputs. The team added three more examples, all using the exact same document layout as the first, but real-world documents with different layouts still produce inconsistent date formats. What is the most likely reason the fix didn't work?", "options": ["All four examples share the same structure, so they only reinforce one narrow pattern instead of demonstrating the desired date format across the range of layouts the pipeline actually sees", "Four examples is too many and is confusing the model", "The examples need to be converted to a different file format before they can influence the output", "Date formatting cannot be controlled through few-shot examples and requires a separate processing step outside the prompt"], "correct": [0], "explanation": "When every example shares the same layout, the model doesn't learn to generalize the formatting rule across different real-world structures, it only pattern-matches the one structure it was shown repeatedly. Four examples is within the effective targeted range, not an excessive number. The file format of the examples within the prompt isn't a real constraint on few-shot learning. Few-shot examples are precisely the recommended lever for consistent formatting, so the fix was applied in the right way, it just wasn't varied enough in structure."}, {"id": "F-D4-B1-15", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A newly deployed pull-request review bot's code-style category has a 70% false-positive rate, and developers have begun dismissing every comment it posts, including accurate ones from other categories. What best restores developer trust in the short term?", "options": ["Temporarily turn off the noisy code-style category so developers only see the accurate flags, while its criteria are reworked", "Post an apology comment on every pull request acknowledging the bot's inaccuracy", "Have a human manually re-review every comment the bot posts before developers see it", "Increase the verbosity of the bot's explanations so developers understand why each style issue was flagged"], "correct": [0], "explanation": "Removing the specific noisy category stops the immediate damage to trust while preserving the categories that are already working, and it's a fast, reversible action. An apology doesn't reduce the volume of noise developers actually experience. Manually re-reviewing every comment before it's shown defeats the purpose of automation and doesn't scale. Making an already-wrong flag more verbose doesn't make it less wrong, it just adds more words to dismiss."}, {"id": "F-D4-B1-16", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A pipeline extracts line items from financial statements. Some statements use a single flat table, others use nested subtotal tables per department, and others break line items across multiple pages. The team is choosing 2 to 4 few-shot examples for the extraction prompt. What is the best approach?", "options": ["Choose examples that each represent one of the structurally distinct formats actually seen in production, such as the flat table, the nested subtotals, and the multi-page layout, rather than several examples of the same format", "Choose the cleanest, simplest single-page flat-table statements available, since simpler examples are easier for the model to learn from", "Use one very long example that documents every possible table structure in exhaustive detail", "Skip examples and instead write a longer natural-language description of every table structure the schema should support"], "correct": [0], "explanation": "Representing each structurally distinct format the pipeline actually encounters is what lets a small few-shot set generalize; choosing only the simplest format leaves the model unprepared for the nested or multi-page cases it will actually see. A single exhaustive example doesn't demonstrate multiple structures the way separate targeted examples do. A long description without worked examples forfeits the concrete pattern-matching benefit that few-shot examples provide over prose alone."}, {"id": "F-D4-B1-17", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "To reduce false positives in a vulnerability-flagging prompt, an engineer proposes instructing the model to only flag issues where its self-reported confidence is above 90%. A colleague argues this won't help. Who is right, and why?", "options": ["The colleague is right, because self-reported confidence scores are not a reliable signal of correctness, so this just adds an unverifiable threshold on top of the same underlying ambiguity instead of defining concrete categorical criteria", "The engineer is right, because confidence thresholds are a proven, deterministic way to eliminate false positives", "The colleague is right, but only because 90% is too high a threshold, and 70% would fix the problem", "The engineer is right, but only if the confidence score is produced by a second, independent model call"], "correct": [0], "explanation": "Self-reported confidence is an unreliable proxy, so gating on it doesn't supply the concrete, observable criteria that actually reduce false positives. Confidence thresholds aren't deterministic here because the underlying self-assessment is unreliable regardless of the numeric cutoff chosen. Changing the threshold number doesn't fix the fact that the confidence score itself isn't trustworthy. Producing the score from a second model call doesn't make self-reported confidence reliable, since the same underlying unreliability applies no matter which instance reports it."}, {"id": "F-D4-B1-18", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A developer extracting structured data from varied support-ticket transcripts is deciding between spending time writing 2 to 4 carefully chosen few-shot examples versus writing several extra paragraphs of abstract formatting rules in the system prompt. Based on established practice, which generally works better for consistent formatting and ambiguous-case handling?", "options": ["A small set of targeted few-shot examples, since they demonstrate the desired behavior directly rather than describing it abstractly", "Abstract formatting rules, since they can be written to cover every possible case explicitly", "Neither approach affects output consistency, which is determined entirely by the underlying model", "Abstract formatting rules, because few-shot examples increase hallucination by giving the model patterns to copy incorrectly"], "correct": [0], "explanation": "A small number of targeted examples is established as the strongest lever for consistent formatting and ambiguous-case handling because they show the desired output directly rather than describing it. Abstract rules can't realistically enumerate every case that arises in varied real-world transcripts and are more prone to misinterpretation than a demonstrated example. The prompt clearly does influence output consistency, so dismissing its effect is incorrect. Well-chosen examples reduce hallucination, for instance by showing correct handling of missing data, rather than increasing it."}, {"id": "F-D4-B1-19", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A fintech company's CI review agent is asked to flag risky financial calculations. It flags nearly every line involving decimal math, including harmless display formatting, while missing an actual bug where interest was calculated using truncated integer division on a stored balance. Which prompt fix best addresses this?", "options": ["Replace risky financial calculations with concrete before-and-after code examples distinguishing decimal math used only for display formatting from math that affects a stored monetary value", "Instruct the agent to flag every use of decimal or floating-point arithmetic anywhere in the codebase to be safe", "Instruct the agent to only flag financial calculations when something feels off", "Remove the financial-calculation check entirely and rely on manual code review for that category"], "correct": [0], "explanation": "Concrete before-and-after examples teach the model the actual distinguishing factor, whether a value is stored and monetary versus purely cosmetic, which is exactly what the vague phrase risky financial calculations failed to communicate, and this directly targets catching the real truncation bug. Flagging every use of decimal math maximizes false positives without fixing the miss. Framing the criterion as when something feels off is another unanchored, subjective instruction. Reverting to manual review abandons automation instead of fixing criteria that can be made specific."}, {"id": "F-D4-B1-20", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "medium", "question": "A team is assembling a 3-example few-shot set for a document-extraction prompt used across purchase orders, delivery receipts, and packing slips. Which three considerations should guide their example selection?", "options": ["Cover the structurally distinct document types the pipeline will actually see in production, not just one", "Include at least one example demonstrating the correct output when a schema field is genuinely missing from the source document", "Include an example that resolves a realistic ambiguous or borderline case rather than only clear-cut cases", "Maximize the raw number of examples, aiming for as many as can fit in the prompt", "Choose examples that are as similar to each other as possible so the model isn't confused by variation"], "correct": [0, 1, 2], "explanation": "Representing structural variety, demonstrating correct handling of a genuinely missing field, and resolving an ambiguous case are exactly what make a small few-shot set effective at teaching consistent formatting and reducing hallucination. Maximizing raw example count trades off against the targeted, small-set guidance without adding proportional benefit once the key patterns are represented. Choosing near-identical examples defeats the purpose of few-shot prompting, which is to demonstrate the range of cases the model must handle, not a single repeated pattern."}, {"id": "F-D4-B1-21", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A medical-intake extraction pipeline is tuned with three few-shot examples that correctly demonstrate leaving a field blank when information is genuinely absent from the intake form. On a new batch of scanned forms, the model still occasionally invents a value for the allergies field on forms where that section was physically cut off during scanning, with no allergy information visible anywhere in the image. What does this indicate?", "options": ["Few-shot examples reduce hallucination by teaching the correct pattern for absent data, but they cannot fully eliminate it, especially for input degradation not represented by the examples, so a complementary fix beyond prompting may be needed", "The few-shot examples are miscounted, and adding a fifth or sixth example will fully eliminate the remaining hallucination", "This proves few-shot examples are ineffective at reducing hallucination and should be abandoned in favor of a longer instruction paragraph", "This is expected and requires no further investigation, since some hallucination rate is unavoidable regardless of technique"], "correct": [0], "explanation": "Few-shot examples meaningfully reduce, but don't guarantee zero, hallucination, especially for a failure mode like a physically cut-off scan that isn't represented anywhere in the example set, so recognizing that gap matters for realistic expectations and further mitigation. Simply adding another example or two isn't guaranteed to cover every possible degraded-input scenario. The technique isn't shown to be ineffective overall, since it already succeeds on the legible absent-data cases the examples do represent. Treating a still-elevated hallucination risk in medical data as not worth investigating ignores a fixable problem."}, {"id": "F-D4-B1-22", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A dependency-vulnerability check in CI is instructed to flag anything with a known vulnerability identifier. It floods pull requests with warnings about vulnerabilities in development-only dependencies, such as a testing library that never ships to production, alongside real warnings about production dependencies. Developers now skip the report entirely. What is the most effective fix?", "options": ["Add explicit criteria scoping flags to vulnerabilities in packages reachable from the production build or runtime, excluding development-only dependencies unless the vulnerability affects the build process itself", "Instruct the model to flag vulnerabilities only when they seem important", "Increase the displayed severity level for every vulnerability found so developers take the report more seriously", "Have the model summarize all vulnerabilities in a single paragraph instead of a structured list"], "correct": [0], "explanation": "Defining the concrete scoping condition, production-reachable versus development-only, is a categorical criterion that directly targets the actual source of noise. Framing the criterion as when they seem important is exactly the kind of vague qualifier that fails to change model behavior. Raising the displayed severity of every finding makes the noise more alarming without reducing how often irrelevant items are flagged. Changing the output format doesn't address which issues get flagged in the first place."}, {"id": "F-D4-B1-23", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team is launching a pipeline to extract name, date, amount, and category from scanned receipts across many retailers, each with a different layout. They are deciding whether to rely on the schema description alone or add a small number of few-shot examples. What is the most likely outcome if they skip the few-shot examples?", "options": ["Output formatting will likely be less consistent across the varied receipt layouts, and the model is more likely to invent values for fields it cannot find", "Output quality will be identical, since the schema alone fully determines both formatting and field presence", "The pipeline will run measurably faster with no effect on extraction accuracy", "The model will refuse to process receipts from any retailer layout it hasn't seen an example of"], "correct": [0], "explanation": "Few-shot examples are the strongest lever for consistent formatting and for reducing hallucination on missing or ambiguous fields, so skipping them typically costs consistency and increases invented values. A schema defines structure but not behavioral patterns like what to do with missing data, which is what examples teach. Any speed difference from a few omitted examples is a minor prompt-length effect, not the main consequence of this decision. The model won't refuse unfamiliar layouts, it will still attempt extraction, just less reliably."}, {"id": "F-D4-B1-24", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A weekly metrics review shows a CI review agent's overall false-positive rate dropped from 45% to 30% after a prompt update, but a developer survey shows trust in the tool is still very low. Investigation shows one category, possible unused variable, still has an 80% false-positive rate and generates the most comments per pull request, even though it is a small share of total findings. What should the team prioritize next?", "options": ["Target the possible-unused-variable category specifically, since a high-volume, low-precision category dominates what developers actually see regardless of the improved aggregate rate", "Declare success based on the improved aggregate false-positive rate and move the team to a different project", "Increase the number of categories monitored so the aggregate rate is calculated across more data", "Ask developers to adjust their expectations, since a 30% overall false-positive rate is already a strong result"], "correct": [0], "explanation": "Aggregate metrics can mask a single noisy, high-volume category that dominates developers' actual day-to-day experience of the tool, so fixing that specific category is what will move trust. Declaring success based on the aggregate ignores the survey evidence that trust hasn't actually improved. Monitoring more categories doesn't address the one that's already known to be the problem. Asking developers to lower their expectations doesn't reduce the noise and doesn't rebuild trust."}, {"id": "F-D4-B1-25", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An extraction pipeline outputs a JSON object per document. Without few-shot examples in the prompt, the model sometimes names the same field total_amount and other times totalAmount or amount_total across different runs on similar documents. What is the most direct fix?", "options": ["Provide 2 to 4 few-shot examples showing the exact field name and casing to use every time, giving the model a concrete pattern to copy rather than inferring a name each time", "Add a note in the system prompt saying to use consistent field names", "Post-process every output with a script that renames whichever variant appears to the canonical name", "Ask the model to alphabetize the JSON keys before returning the output"], "correct": [0], "explanation": "Showing the exact desired field name and casing in worked examples is the most direct way to make the model reproduce it consistently, which is precisely the consistent-formatting benefit few-shot examples provide. Saying to use consistent field names is vague, since it never specifies what the consistent name actually is. A post-processing script could patch the symptom but only after anticipating every variant the model might produce, rather than fixing the prompt that causes the variation. Alphabetizing key order has no bearing on which name is chosen for each field."}, {"id": "F-D4-B1-26", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "After the instruction be conservative fails to reduce false positives, an engineer rewrites it as: be conservative, and only flag issues that are clearly problems, are important, and that you are quite sure about. The false-positive rate barely changes. What best explains this, and what should be tried instead?", "options": ["The rewrite still relies only on subjective, unanchored qualifiers like clearly, important, and quite sure rather than specific, checkable criteria, so the fix is to define concrete, observable conditions, ideally with code examples, for what qualifies as a flag", "The rewrite is the correct approach and simply needs several more qualifying adjectives added to be effective", "The false-positive rate is unrelated to prompt wording and is purely a function of which model is used", "The rewrite failed because it used the word conservative twice, which confuses the model, and removing the duplicate would fix it"], "correct": [0], "explanation": "Stacking additional subjective adjectives doesn't add any checkable information, so the underlying ambiguity remains, which is why the fix requires concrete, observable criteria rather than more descriptive words. Adding still more adjectives compounds the same problem instead of solving it. Model choice matters elsewhere, but this specific pattern, a persistently high false-positive rate despite reworded vague instructions, is a criteria-specificity problem rather than a capability limit. Word repetition isn't a documented cause of this kind of behavior."}, {"id": "F-D4-B1-27", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A team's few-shot examples for a contract-extraction pipeline all show fields being correctly filled in from data explicitly present in the contract. They notice the model still occasionally infers a termination date by calculating three years after the signing date when the contract never states a termination date explicitly. What addition to the few-shot set would most directly target this behavior?", "options": ["An example based on a contract where the termination date is not explicitly stated, with the correct output leaving that field null even though it could be inferred or calculated from other stated terms", "Another example of a contract where the termination date is explicitly and clearly stated", "A longer contract example so the model has more surrounding context to work with", "An example that shows the calculation method for deriving a termination date from a signing date and a stated duration"], "correct": [0], "explanation": "The specific failure is the model inferring or calculating a value that was never explicitly stated, so the example that fixes it must show the correct don't-infer, leave-it-null behavior in exactly that situation. Another example where the date is clearly stated doesn't touch the inference behavior at all. A longer example doesn't target the specific pattern causing the unwanted inference. Showing the calculation method would reinforce the very behavior the team is trying to eliminate."}, {"id": "F-D4-B1-28", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team is choosing among four candidate instructions to reduce false positives in a code-review agent's potential-null-pointer category. Which instruction is least likely to actually reduce the false-positive rate?", "options": ["Only flag a variable as a potential null-pointer risk if it can be assigned null within the function and is dereferenced without a null check in the same function", "Please try to be more careful, and only flag things you are really sure about", "Flag a potential null-pointer risk only when the variable's type is nullable and no null-check, optional-chaining, or default-value pattern appears between assignment and use", "Do not flag a variable if it is immediately checked with a null or undefined guard before use, following the examples provided below"], "correct": [1], "explanation": "Please try to be more careful and only flag things you are really sure about relies on subjective, unanchored qualifiers with no concrete decision rule, exactly the pattern that fails to reduce false positives. Requiring that a variable be assignable to null and dereferenced without a guard in the same function specifies an observable, checkable condition. Requiring a nullable type with no guarding pattern between assignment and use is similarly concrete and checkable. Excluding variables already covered by a guard, backed by worked examples, also gives the model an observable rule to apply, which is what actually changes behavior."}, {"id": "F-D4-B1-29", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "To improve consistency, an engineer expands a structured-extraction prompt's few-shot set from 3 examples to 25 examples, one for nearly every document variant the team has ever seen. Extraction consistency improves only marginally over the 3-example version, while every request now costs more and takes noticeably longer due to the much longer prompt. What does this best illustrate?", "options": ["A small, well-chosen set of targeted examples, roughly 2 to 4, captures most of the consistency benefit, so piling on many more similar examples yields diminishing returns while adding real cost, meaning example selection quality matters more than raw quantity", "Few-shot examples stop working entirely once a prompt exceeds 10 examples", "The 3-example version must have been misconfigured, since adding more examples should always strictly improve results", "Extraction consistency is unrelated to the number or content of few-shot examples and is determined solely by the schema"], "correct": [0], "explanation": "The established guidance is that a targeted 2 to 4 example set captures most of the achievable benefit, and this scenario directly illustrates diminishing returns beyond that range rather than a hard cutoff. There is no cliff at any specific example count, the issue is a shrinking marginal benefit, not a breaking point. More examples don't always strictly help, especially once they're largely redundant with what's already represented. The schema-only claim is contradicted by the real improvement the first three examples already provided."}, {"id": "F-D4-B1-30", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "hard", "question": "A platform team is writing internal guidelines for anyone building Claude-based review or extraction agents at their company. Which two statements should be included as accurate guidance?", "options": ["When an automated review agent's false positives are concentrated in one category, disabling that category while leaving well-performing categories active is a reasonable interim step while its criteria are reworked", "A small number of targeted, structurally varied examples, roughly 2 to 4, is generally more effective for consistent formatting and ambiguous-case handling than a long paragraph of abstract formatting rules", "Telling a review agent to be conservative is a reliable way to reduce false-positive flags, because it lowers the model's overall willingness to respond", "Extraction pipelines should always include as many few-shot examples as will fit in the prompt, since more examples strictly improve accuracy", "Severity or risk labels are best left entirely to the model's own judgment without examples, since concrete code examples bias the model toward recognizing only those exact patterns"], "correct": [0, 1], "explanation": "Disabling a concentrated false-positive category as an interim measure and using a small, structurally varied few-shot set are both established, effective practices. Be conservative is exactly the vague instruction shown not to reliably reduce false positives, since it leaves the actual threshold undefined. Maximizing example count doesn't strictly improve accuracy and trades off against cost and length for diminishing benefit past a small targeted set. Concrete severity examples are what reduces ambiguity and improves consistency, so withholding them in favor of unguided judgment reintroduces the vague-criteria problem rather than avoiding overfitting."}, {"id": "F-D4-B1-31", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An accessibility-linting agent in a CI pipeline is instructed to flag anything that might hurt accessibility. It flags color choices, spacing, and icon usage inconsistently, often disagreeing with itself on similar code across different pull requests. What is the most effective fix?", "options": ["Provide explicit, checkable criteria per accessibility rule, such as flagging an image element only when it lacks alternative text, or flagging a color pair only when a calculated contrast ratio falls below a stated threshold, replacing the broad might-hurt-accessibility phrasing", "Instruct the agent to flag issues based on general accessibility best practices instead", "Randomize which pull requests receive accessibility review to reduce the total flag volume", "Ask the agent to only flag accessibility issues in files larger than 500 lines"], "correct": [0], "explanation": "Explicit, checkable criteria for each rule, such as a missing-alt-text condition or a calculable contrast-ratio threshold, give the model observable conditions to apply consistently. Framing the criterion as general accessibility best practices is still vague and leaves the actual threshold undefined. Randomizing review coverage reduces volume arbitrarily without improving precision on the pull requests that are still reviewed. A file-size threshold is unrelated to actual accessibility risk and would miss real issues in smaller files while still flagging noise in large ones."}, {"id": "F-D4-B1-32", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "An invoice-extraction pipeline processes documents from both domestic and international vendors, where a date like 03/04/2026 is genuinely ambiguous between two different calendar readings. The team wants their few-shot examples to teach the model how to handle this ambiguity consistently. What should they include?", "options": ["An example containing an ambiguous-format date where the correct output applies the team's intended resolution rule consistently, such as preserving the original text alongside a normalized value or flagging it as ambiguous", "An example where every date in the document is already in an unambiguous format, giving the model a clean pattern to copy", "An instruction to skip any document that contains a date field entirely", "An example demonstrating that the model should guess based on whichever interpretation seems more common globally"], "correct": [0], "explanation": "Demonstrating the actual ambiguous case together with the intended resolution rule is what teaches the model consistent handling of that ambiguity, which is a core purpose of few-shot examples. An example where every date is already unambiguous never shows the model what to do when real ambiguity occurs. Skipping documents that contain dates isn't a workable extraction strategy. Guessing based on global commonality is an unreliable, unanchored behavior, only a worked example can consistently anchor the intended interpretation."}, {"id": "F-D4-B1-33", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A performance-monitoring bot in CI flags possible performance regression so often that it flagged 90% of pull requests last month, most with no measurable slowdown. The team drafts a new instruction: only flag a regression if benchmark results show more than a 15% increase in execution time for the affected function compared to the prior commit, citing the specific before-and-after numbers. What is the expected effect of this change, and why?", "options": ["False positives should drop substantially, because the new instruction defines a specific, measurable, checkable threshold rather than an open-ended judgment call about what counts as possible", "False positives will likely stay the same, because performance regressions are inherently unpredictable regardless of how the instruction is worded", "False positives will increase, because requiring specific numbers pressures the model to flag more issues in order to justify its answer", "This change primarily affects how long the CI run takes, not the accuracy of what gets flagged"], "correct": [0], "explanation": "Defining a specific numeric threshold tied to measurable benchmark data is exactly the kind of concrete categorical criterion that reduces false positives by replacing an open-ended judgment call. Regressions are measurable through benchmarks, so the outcome isn't independent of the instruction's wording, since specific criteria are what make the flagging decision reliable. Requiring specific supporting numbers constrains flags to cases that actually meet the threshold, it doesn't create pressure to flag more. The change targets what triggers a flag, which is a precision question, not how long the CI run itself takes."}, {"id": "F-D4-B1-34", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A structured-extraction pipeline for new-hire paperwork must handle offer letters, government-style identity-verification forms, and benefits-election forms, three genuinely different layouts, and must output unclear plus a short detail note whenever a field can't be confidently determined instead of guessing. The team has budget to hand-craft only 3 few-shot examples. Which set of 3 examples best follows established few-shot practice?", "options": ["One example per document type, with one of the three deliberately including a field that is missing or ambiguous and demonstrating the unclear-plus-detail-note output for it", "Three examples of the offer letter only, since it is the highest-volume document type and mastering it first is the most efficient use of the budget", "Three examples, each showing a different field being filled in correctly from clearly stated data, all drawn from the same benefits-election form", "One extremely detailed example of a benefits-election form, annotated with inline comments explaining every possible edge case that might occur across all three document types"], "correct": [0], "explanation": "Covering each structurally distinct document type while also demonstrating the ambiguous-case, unclear-plus-detail-note behavior packs the two things a small few-shot set most needs to teach into the available budget of three examples. Spending all three examples on only the offer letter, or only the benefits-election form, leaves the model with no demonstrated pattern for the other two layouts. A single exhaustively annotated example can't substitute for showing the model actual varied structures and a real ambiguous case in the target output format, since inline commentary isn't the same as a worked example."}, {"id": "F-D4-B2-01", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team built a pipeline that extracts vendor name, invoice number, and total amount from scanned invoices by having Claude call an extract_invoice tool whose parameters are defined by a JSON schema. During testing, roughly 1 in 20 responses return a plain-text summary of the invoice instead of a tool call, which crashes the downstream parser that expects JSON. Which change most directly guarantees that every response is a schema-conforming tool call?", "options": ["Add a stronger instruction in the system prompt telling Claude to always call extract_invoice and never respond in plain text", "Set tool_choice to force the extract_invoice tool (or to 'any') so the model must emit a tool call rather than free text", "Lower the max output length so Claude has less room to write a prose summary", "Re-run any failed request a second time with the identical prompt and hope the tool is called"], "correct": [1], "explanation": "Forcing tool_choice to the extraction tool (or to 'any') removes the model's option to end the turn with plain text, so the response is guaranteed to be a tool call matching the schema: a deterministic, structural guarantee rather than a hope. Strengthening the system-prompt wording is still a probabilistic instruction the model can occasionally ignore, which is exactly the failure being observed. Cutting the output length might truncate a prose response but does not make Claude call the tool, and could just as easily truncate valid tool-call output. Blindly retrying the identical prompt does nothing to change the odds of the same failure recurring."}, {"id": "F-D4-B2-02", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A customer support agent has three MCP tools available (get_customer, process_refund, escalate_to_human) plus a submit_resolution_summary tool whose schema captures the case outcome (customer_id, resolution_type, refund_amount, notes) for the ticketing system. At the end of every conversation, the summary must be recorded, but engineers notice Claude sometimes ends the turn without calling submit_resolution_summary, leaving cases unlogged.", "options": ["Add a reminder line near the end of the system prompt saying the case must be summarized before finishing", "On the closing turn, force tool_choice to the specific submit_resolution_summary tool so that turn cannot end without a schema-valid call", "Give the agent 'any' tool_choice for the entire conversation so it must call some tool on every single turn", "Have a second Claude instance read the transcript afterward and produce the summary itself"], "correct": [1], "explanation": "Forcing tool_choice to the specific submit_resolution_summary tool on the closing turn structurally requires that exact schema-valid call before the turn can end, closing the gap a reminder leaves open. A prompt reminder is still probabilistic and is the behavior already failing. Forcing 'any' tool_choice for the whole conversation would break normal turns where the agent legitimately needs to call get_customer, process_refund, or escalate_to_human, or where no tool call is appropriate yet. Having a separate instance reconstruct the summary afterward adds an extra pass and latency instead of fixing the root cause: the agent not being required to call the tool in the first place."}, {"id": "F-D4-B2-03", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A legal-tech team extracts contract terms (party names, effective_date, termination_clause_present) via a tool_use call with a strict JSON schema. After deployment, schema validation passes on 100% of responses, but a manual audit finds that 8% of extractions list the wrong company as a party because Claude picked the counterparty's name from a similar-looking header on the page.", "options": ["The schema must be misconfigured, since a properly strict schema would have caught this error", "Strict schema validation guarantees the output has the right structure and types, but it cannot verify that the semantic content (like which company is actually the correct party) is accurate", "The extraction tool should be replaced with a larger model, since only model capacity affects semantic accuracy", "Schema validation and content accuracy are unrelated concerns, so the schema step should be removed to save latency"], "correct": [1], "explanation": "Strict schema enforcement checks structural conformance (required fields present, correct types, valid values), which is why every response passes validation, but it has no way to judge whether the extracted party name is the factually correct one; that is a semantic error, not a syntax error. Nothing in the scenario indicates schema misconfiguration: the schema is doing exactly what schema validation does. A bigger model may reduce the error rate, but claiming only model capacity affects semantic accuracy overstates the case and isn't what the observation demonstrates. Removing schema validation would reintroduce structural failures on top of the existing semantic ones, making things strictly worse."}, {"id": "F-D4-B2-04", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A recruiting tool extracts structured candidate profiles (name, email, years_experience, current_employer) from uploaded resumes using a tool_use schema. Many resumes belong to students or career-changers who have no current employer. The schema marks current_employer as a required string, and Claude frequently fills it with a guessed or fabricated company name to satisfy the requirement.", "options": ["Make current_employer optional/nullable so Claude can omit or null it when the resume gives no employer", "Keep the field required but add an instruction telling Claude not to guess", "Remove the field from the schema entirely so it is never extracted", "Set the field's type to an enum with a fixed list of well-known company names"], "correct": [0], "explanation": "Making the field optional/nullable directly matches the schema to reality: some resumes simply lack this information, so Claude can represent 'not present' honestly instead of being forced to invent a value to satisfy a required field. Leaving the field required while only adding a prompt instruction keeps the underlying pressure to fill every required slot and is a probabilistic patch on a structural problem. Deleting the field loses genuinely useful data for the large share of resumes that do list an employer. Constraining it to an enum of known companies would reject legitimate employers not on the list and does nothing to address the no-employer case."}, {"id": "F-D4-B2-05", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A CI code-review bot classifies each finding with an issue_category field constrained to an enum: security, performance, style, bug. Reviewers notice that when a finding doesn't cleanly fit one of the four categories (for example, a deprecated-dependency warning), Claude is forced to shoehorn it into bug or style, making the category data unreliable for downstream reporting.", "options": ["Remove the enum constraint entirely and let issue_category be free text", "Add an 'other' value to the enum plus a separate detail string field so Claude can flag the mismatch and describe it in its own words", "Expand the enum to include every conceivable category the team can think of in advance", "Keep the four categories but instruct Claude in the prompt to always pick the closest match"], "correct": [1], "explanation": "Adding an 'other' enum value paired with a free-text detail field lets Claude flag findings that don't fit the known taxonomy while still keeping the enum reliable for the categories that do apply, and the detail field preserves the specific information that would otherwise be lost. Removing the enum entirely sacrifices the structured, aggregable reporting that was the point of having categories in the first place. Trying to enumerate every possible category up front is a losing, ever-growing effort and will still miss cases like a first-of-its-kind dependency warning. Instructing Claude to always force the closest match is exactly the behavior causing the unreliable data: it just relocates the guessing into an explicit instruction without fixing it."}, {"id": "F-D4-B2-06", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "An extraction pipeline pulls due_date from invoices originating from vendors in the US, UK, and Germany, who write dates as MM/DD/YYYY, DD/MM/YYYY, and DD.MM.YYYY respectively. The schema only specifies that due_date is a string, so Claude passes each date through in whatever format appeared on the source document, and the downstream billing system, which expects ISO 8601 (YYYY-MM-DD), misparses many of them.", "options": ["Reject any invoice that isn't already in ISO 8601 format", "Add an explicit format-normalization rule requiring due_date to always be output as YYYY-MM-DD regardless of the source format", "Switch the field's type from string to number", "Have the billing system try every possible date format until one parses successfully"], "correct": [1], "explanation": "Stating an explicit normalization rule (always emit YYYY-MM-DD regardless of how the source document wrote the date) gives Claude a single deterministic target format to convert into, which is exactly what structured extraction needs to be reliable across varied inputs. Rejecting non-ISO invoices would throw out the majority of real vendor documents, since none of the three source formats are ISO 8601. Changing the type to a number doesn't specify a format and still leaves ambiguity about which numeric representation to use. Pushing the problem downstream to a 'try every format' parser just relocates the ambiguity instead of resolving it at the point where the actual source format is known."}, {"id": "F-D4-B2-07", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A CI pipeline runs Claude Code with structured JSON output to produce review findings. When the returned JSON fails schema validation (for example, a missing severity field), the current retry logic simply resends the identical prompt a second time, which fails again about half the time.", "options": ["Append the specific validation error, such as which field was missing or malformed, to the retry prompt so Claude can see exactly what needs fixing", "Increase the number of blind retries from one to five with the same unchanged prompt", "Switch to a smaller, faster model for the retry to reduce latency", "Discard schema validation on retries so any output is accepted the second time"], "correct": [0], "explanation": "Feeding the concrete validation failure back into the retry prompt gives Claude the specific, actionable information needed to correct the exact problem, which is far more effective than resending an unchanged prompt and hoping for a different result. Simply adding more blind retries multiplies the same uninformed attempt without addressing why it failed in the first place. Switching to a smaller model addresses latency, not correctness, and doesn't target the missing-field problem. Disabling schema validation on retry defeats the purpose of structured output validation and lets invalid data flow downstream."}, {"id": "F-D4-B2-08", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An intake-form digitization pipeline extracts patient fields including insurance_group_number as a required string. For walk-in patients who are uninsured, the source form has this field left entirely blank. Validation keeps failing because the field is missing, and the retry loop resends the same extraction prompt up to five times, still producing no value each time before finally erroring out.", "options": ["The retry loop needs a higher retry limit, since five attempts clearly wasn't enough", "Retrying cannot recover information that was never present on the source document; the field should be made optional/nullable so the pipeline can represent 'not applicable' instead of endlessly retrying for a value that doesn't exist", "The model should be told in the retry prompt to try harder to locate the group number", "The schema should require insurance_group_number to match a specific numeric format so Claude has clearer formatting guidance"], "correct": [1], "explanation": "No amount of retrying will produce a value the source document never contained (the group number simply isn't on an uninsured patient's form), so the fix is a schema change to optional/nullable that lets the pipeline correctly represent absence, rather than a process change that keeps re-asking for the impossible. Raising the retry cap only delays the same guaranteed failure and wastes latency and cost on every uninsured patient. Telling the model to 'try harder' in the retry prompt doesn't change what's actually printed on the paper form. Tightening the format requirement addresses formatting, not the actual problem, which is that there is no number to format at all."}, {"id": "F-D4-B2-09", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI review bot has a persistently high false-positive rate on one specific rule: flagging 'unused variable' in files that actually use the variable inside a decorator. The team wants to systematically analyze which flags are false positives without manually re-reading every flagged file, across thousands of historical findings.", "options": ["A detected_pattern field on each finding that records the specific code pattern or heuristic that triggered the flag, so findings can be grouped and audited by pattern after the fact", "A confidence score field where Claude self-reports how sure it is about each finding", "A free-text notes field where Claude can write anything it wants about the finding", "A boolean is_false_positive field that Claude sets based on its own judgment at flag time"], "correct": [0], "explanation": "A structured detected_pattern field captures which specific pattern or rule path triggered each flag, letting the team group and query historical findings by pattern to discover, for example, that decorator usage is a recurring trigger for the unused-variable false positives: exactly the scaled analysis being asked for. A self-reported confidence score is an unreliable proxy for correctness and doesn't identify what caused the flag. An unstructured free-text notes field can't be reliably grouped or queried at scale the way a structured, categorical pattern field can. Having Claude judge its own false positives at flag time is circular: if the model reliably knew a flag was wrong it likely wouldn't have raised it, and this still gives the team no queryable signal for pattern-level analysis."}, {"id": "F-D4-B2-10", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An expense-report extraction tool captures a list of line items, each with an amount, plus a total_amount field from a scanned receipt. On a sample of 200 receipts, 14 have a total_amount that doesn't match the sum of the extracted line items: sometimes because a line item was missed, sometimes because the total was misread.", "options": ["Have a validation step compute the sum of extracted line items and compare it to the extracted total, flagging the record when they don't match", "Round all extracted amounts to the nearest dollar to reduce the chance of mismatches", "Only extract the total_amount field and drop the line-item array to simplify the schema", "Increase the image resolution requirement for uploaded receipts"], "correct": [0], "explanation": "Cross-checking the extracted total against the sum of the extracted line items is a concrete, calculable consistency check that catches exactly the class of error described (a missed line item or a misread total) and flags it for review rather than letting silently wrong numbers flow to accounting. Rounding amounts doesn't address missed items or misread digits and could even mask small discrepancies. Dropping the line-item array removes the very data needed to perform the cross-check and throws away useful structured detail. Requiring higher-resolution images might reduce some misreads but doesn't catch or flag the errors that still occur, unlike an explicit totals comparison."}, {"id": "F-D4-B2-11", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A customer support agent has several MCP tools (get_customer, lookup_order, process_refund, escalate_to_human) plus a structured log_interaction tool used to record every turn. Engineers want to guarantee that on every turn Claude calls at least one of these tools, never just replies with plain conversational text, without dictating which specific tool it must be.", "options": ["Set tool_choice to 'auto'", "Set tool_choice to 'any', which requires calling some tool but leaves the choice of which one to Claude", "Force tool_choice to a single specific tool name for every turn", "Leave tool_choice unset and rely on the system prompt to request tool usage"], "correct": [1], "explanation": "A tool_choice of 'any' requires Claude to call some tool on that turn while still letting it pick the most appropriate one from the available set, exactly matching 'must call a tool, but not any specific one.' The 'auto' setting is what permits Claude to respond in plain text instead of calling a tool, which is the opposite of what's needed here. Forcing one specific tool name would wrongly require that exact tool on every turn, even when a different tool is the right one, such as forcing process_refund when the customer is only asking about order status. Omitting tool_choice guidance and relying on prompt wording alone reintroduces the probabilistic failure mode the team is trying to eliminate."}, {"id": "F-D4-B2-12", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A research-synthesis subagent extracts structured claims from source articles into a schema with fields claim_text, source_confidence (enum: high, medium, low, unclear), and publication_year (nullable integer). For one source (an opinion blog post with no visible byline or clear editorial process), the article makes a definite-sounding claim, but the site gives no clue about its year of publication.", "options": ["Set source_confidence to 'unclear' since the site's credibility signals are genuinely ambiguous, and leave publication_year null since no date information exists on the page", "Leave both fields null, since neither can be determined with certainty", "Set source_confidence to 'low' and fabricate a plausible publication_year based on the article's writing style", "Omit the claim from the output entirely rather than populate uncertain fields"], "correct": [0], "explanation": "The two fields serve different purposes and should be handled differently: source_confidence is a categorical judgment, so the 'unclear' enum value correctly captures genuine ambiguity about credibility without forcing a false high or low rating, while publication_year is a factual data point that is simply absent, so null is the honest representation rather than an enum label. Nulling out source_confidence throws away a categorical field that has a purpose-built value for exactly this situation, and a plain null typically isn't reported or aggregated the way an explicit enum choice is. Fabricating a plausible year from writing style invents information that was never verified, which is the opposite of what the field is meant to capture. Omitting the claim entirely discards a real, extractable claim just because two metadata fields are uncertain, losing information the schema was specifically designed to still capture via null and unclear values."}, {"id": "F-D4-B2-13", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A structured cancellation-request extraction tool captures requested_cancellation_date and current_billing_period_end from a customer's message and account record. In one case, the extracted requested_cancellation_date is three months earlier than current_billing_period_end, which is logically impossible since the customer is messaging today, before that earlier date has occurred.", "options": ["Add a cross-field conflict check that flags this specific combination as inconsistent and routes it for re-extraction or human review before acting on it", "Silently use whichever of the two dates is earlier", "Process the cancellation as-is, since both fields individually passed schema validation", "Drop the requested_cancellation_date field from the schema so the conflict can't occur"], "correct": [0], "explanation": "A conflict-detection check that compares related fields for logical consistency catches exactly this kind of error (a requested date that couldn't legitimately occur) before it triggers an incorrect action, which is the point of self-correction beyond basic schema validation. Silently picking the earlier date guesses at intent instead of resolving the actual extraction error and could apply the wrong cancellation date to the account. Proceeding because each field individually passed schema validation ignores that schema validation only checks structure and type, not whether the two values make sense together. Removing the field avoids the conflict by deleting data the process actually needs to function."}, {"id": "F-D4-B2-14", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A CI review bot assigns each finding a severity field constrained to an enum: critical, high, medium, low. All output passes schema validation, since every value comes from the allowed set. However, a quarterly audit finds that 22% of findings labeled critical are actually cosmetic style issues that should have been low.", "options": ["The enum constraint has failed and should be removed since it isn't preventing bad data", "Schema validation only guarantees the severity value is a member of the allowed set: it cannot verify the value is the semantically correct one; the fix is to improve the classification guidance Claude receives, not the schema mechanics", "The team should switch severity to a free-text field so Claude can explain its reasoning inline", "The 22% misclassification rate indicates the JSON schema library itself is buggy and should be replaced"], "correct": [1], "explanation": "Every mislabeled finding is still a valid enum member, which is exactly why schema validation shows a 100% pass rate while semantic accuracy is well below that: schema strictness guarantees syntactic conformance, not that the chosen value is the right one, so the fix has to target how Claude decides which value to pick, not the schema's structural rules. Removing the enum constraint would reopen the door to structurally invalid values on top of the semantic problem, making things worse rather than better. Switching to free text sacrifices the very structure that makes severity usable for automated triage and reporting. The failure pattern described (right structure, wrong classification) has nothing to do with the schema library's implementation being buggy; it's a classification-quality issue operating entirely within valid schema outputs."}, {"id": "F-D4-B2-15", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A synthesis subagent in a multi-agent research system produces a structured citation list via tool_use. When schema validation fails, the current retry handler sends back only the message 'Output was invalid, please try again,' with no detail about what was wrong, and this loop resolves the failure only about 30% of the time.", "options": ["Repeat the identical generic message two more times before giving up", "Replace the generic message with the specific validation failure, such as which citation field must be an integer and what value was received instead, so the subagent knows exactly what to fix", "Reword the generic message to sound more encouraging and less terse", "Skip retries altogether and route every validation failure straight to a human reviewer"], "correct": [1], "explanation": "Telling the subagent precisely which field failed and why gives it the concrete information needed to fix that specific problem on the next attempt, which is far more effective than a generic 'invalid' message that carries no actionable signal. Repeating the same uninformative message more times doesn't add any new information for the model to act on. Making the wording more encouraging doesn't change its informational content and wouldn't be expected to move the success rate. Routing every failure straight to a human abandons automated retry entirely, which is a bigger step than necessary when a more specific error message could resolve most failures on its own."}, {"id": "F-D4-B2-16", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A document-classification tool assigns each uploaded file a document_type field from an enum: contract, invoice, purchase_order, legal_notice. When a user uploads a meeting-minutes memo (a real document type not represented in the enum), Claude is currently forced to guess the closest of the four categories, and downstream routing sends it to the wrong review queue.", "options": ["Add an 'unclear' or 'other' value to the enum along with a document_type_detail free-text field so genuinely uncategorized documents are flagged accurately instead of misrouted", "Instruct Claude to always pick legal_notice as the safest default for anything that doesn't clearly match", "Reject any document that doesn't match one of the four types", "Make document_type a required field with no other changes, since it is already required"], "correct": [0], "explanation": "Adding an escape-hatch enum value plus a detail field lets Claude honestly flag documents that fall outside the known taxonomy while capturing what the document actually is in the detail text, which routes it correctly instead of forcing a misclassification. Defaulting everything unclear to legal_notice just swaps one systematic misrouting for another, equally predictable one. Outright rejecting documents that don't match the four types loses real documents the system needs to process, like the meeting-minutes memo. The field is already required in the current setup, which is part of why Claude is forced to guess, so reasserting 'required' with no other change does nothing to fix the guessing behavior."}, {"id": "F-D4-B2-17", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "hard", "question": "A document-analysis subagent in a multi-agent research system flags sources as 'potentially unreliable' before they reach the synthesis subagent. Over several months, editors find that a disproportionate share of these flags turn out to be reliable sources flagged only because they used first-person language or an informal tone, not because of any actual credibility problem. Thousands of flagged sources sit in the historical log, and editors want to quantify this specific failure mode without re-reviewin
