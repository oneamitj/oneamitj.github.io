ntent, instructions about the target JSON schema, and formatting constraints all together with no separation. The subagent occasionally extracts a schema instruction, like a field name, as if it were contract data. What restructuring of the subagent prompt would most reduce this failure mode?", "options": ["Separate the prompt into clearly labeled sections (the contract content, the target schema and instructions, and any constraints) so the subagent can distinguish what to extract from what to extract it into.", "Reduce the length of the contract text passed to the subagent so less content needs to be parsed.", "Increase the number of few-shot examples without changing how the prompt is organized.", "Ask the subagent to output plain prose instead of JSON so schema fields no longer appear in the prompt."], "correct": [0], "explanation": "When the raw content to extract and the meta-level instructions about schema and format are run together undifferentiated, the subagent has no reliable way to tell them apart, so structurally separating content from metadata and instructions directly addresses the confusion. Trimming the contract's length doesn't fix the underlying mixing of content and instructions. Adding more few-shot examples can help output consistency in general, but it doesn't fix a prompt whose sections are undifferentiated in the first place. Abandoning structured JSON output removes the very deliverable the pipeline needs downstream and sidesteps the actual problem rather than solving it."}, {"id": "F-D1-B3-18", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A coordinator's Task prompt to a reporting subagent reads: \"Step 1: open a markdown file. Step 2: write a heading called Summary. Step 3: write three bullet points. Step 4: write a heading called Details. Step 5: write two paragraphs.\" The resulting reports are technically formatted correctly but often unhelpful, burying the most important finding in the second paragraph of Details. What change to the subagent prompt would most likely improve report quality?", "options": ["Replace the rigid step list with a statement of the goal and quality bar, such as requiring the most important finding to be surfaced first so a reader can act on it in under a minute, and let the subagent determine structure.", "Add even more granular steps specifying the exact word count for each paragraph.", "Remove the subagent entirely and have the coordinator write the report itself.", "Instruct the subagent to always write exactly five bullet points regardless of how many findings exist."], "correct": [0], "explanation": "A purely procedural, step-by-step prompt tells the subagent how to move but never tells it what \"good\" looks like, which is why the output can satisfy every mechanical instruction while still burying the lead; describing the goal and quality criteria instead lets the subagent adapt structure to what actually matters. Adding more granular procedural steps doubles down on the same failure mode rather than fixing it. Having the coordinator write the report itself abandons the delegation rather than fixing the prompt that caused the problem. Forcing a fixed bullet count regardless of content is another rigid procedural constraint, not a quality criterion, and doesn't address why the important finding was buried."}, {"id": "F-D1-B3-19", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A Claude Code session spawns a subagent to refactor a poorly structured module, with a prompt listing eleven specific micro-steps such as renaming a variable, moving a function, and adding a docstring. Halfway through, the subagent discovers the module has a circular import the eleven-step list never anticipated, and it proceeds to complete the listed steps anyway, leaving the circular import unresolved. What is the most effective way to prevent this outcome in future refactor delegations?", "options": ["Write the prompt around the desired end state and quality bar, such as eliminating the module's structural issues including any import cycles while preserving behavior, so the subagent can adapt when it discovers problems the steps didn't anticipate.", "Expand the step list to twelve items, explicitly adding \"fix circular imports\" as step twelve.", "Instruct the subagent to stop immediately and take no action whenever it encounters anything not on the list.", "Have the coordinator pre-scan every file for circular imports before writing the step list, no matter how large the codebase."], "correct": [0], "explanation": "A rigid, fully enumerated procedure can't anticipate every issue a subagent will encounter, so when reality diverges from the list, as with an unexpected circular import, a subagent following steps literally will keep executing the list rather than addressing the new problem; framing the task around the goal and quality bar instead gives it room to handle exactly this kind of surprise. Adding one more anticipated step to the list is still reactive and will fail again the next time an unanticipated issue appears. Stopping at the first unlisted issue defeats the purpose of delegating the refactor and creates unnecessary back-and-forth for problems the subagent could reasonably handle. Exhaustively pre-scanning every file before delegating defeats the purpose of delegation and doesn't scale to large codebases."}, {"id": "F-D1-B3-20", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI coordinator's prompt to a code-review subagent says only: \"Check the diff for issues.\" Reviews come back wildly inconsistent: sometimes flagging trivial style nits, sometimes missing an actual SQL injection vulnerability. What is the best fix, consistent with giving subagents goals and quality criteria rather than vague instructions?", "options": ["Replace the vague instruction with explicit criteria describing what counts as a reportable issue, such as security vulnerabilities of a given severity and correctness bugs, and what should be ignored, such as minor style, so the subagent has a concrete quality bar.", "Tell the subagent to \"be more careful\" and \"focus on what really matters\" without further detail.", "Remove the subagent's ability to report style issues at all by revoking its output permissions.", "Have the coordinator re-run the same vague prompt three times and merge the three results."], "correct": [0], "explanation": "\"Check the diff for issues\" gives no criteria for what counts as worth flagging, which is why results swing between trivial nits and missed vulnerabilities; explicit, specific categorical criteria give the subagent a concrete bar to apply consistently. Telling it to \"be more careful\" is still vague and doesn't add any concrete criteria; it just restates the problem in different words. The subagent doesn't have a separate output permission to revoke; the issue is judgment criteria, not access control. Re-running the same underspecified prompt multiple times and merging results doesn't fix the underlying ambiguity and just multiplies the cost of an unreliable check."}, {"id": "F-D1-B3-21", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A developer isn't sure whether to refactor a payment module using a strategy pattern or a simpler set of conditional branches. They want to try both approaches starting from the current code state without one attempt's changes leaking into the other. What is the most appropriate mechanism for this?", "options": ["Use fork_session to create two independent branches from the current session state, one per approach.", "Spawn a single subagent via the Task tool and ask it to implement both approaches in the same set of files.", "Resume the same session twice in parallel terminal windows without any special branching.", "Ask the subagent to keep both versions in comments within the same file."], "correct": [0], "explanation": "fork_session is designed exactly for this situation: trying divergent approaches from a shared baseline without either attempt contaminating the other, by creating independent branches that each proceed from the same starting point. Asking a single subagent to implement both approaches in the same files invites exactly the kind of cross-contamination the developer is trying to avoid. Resuming the same session in two windows without branching means both would share the same underlying state, not the isolated forks the developer needs. Keeping both versions as comments in one file is unmanageable and doesn't give either approach a clean, independent implementation to evaluate."}, {"id": "F-D1-B3-22", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A developer's Claude Code session has built up a large amount of useful context after exploring a legacy codebase: file locations, naming quirks, a mental model of the architecture. The developer now wants to try an aggressive, somewhat risky refactor and worries that if it goes badly, they'll want to abandon it and try a safer, incremental approach instead, without losing the exploration context already gathered. What is the best way to proceed?", "options": ["Fork the session at this point so the risky refactor happens on a branch, preserving the option to return to the shared baseline and try the incremental approach on a separate branch if needed.", "Start an entirely new session from scratch for the risky refactor so nothing from the current session can affect it.", "Proceed with the risky refactor directly in the current session, planning to manually undo file changes if it fails.", "Spawn a Task subagent for the risky refactor, accepting that it won't have access to the exploration context already gathered."], "correct": [0], "explanation": "Forking preserves the valuable exploration context already built up as a shared baseline while letting the risky approach proceed independently, so if it doesn't pan out, the developer can return to that baseline and fork again for the safer approach without redoing the exploration. Starting an entirely new session discards the exploration context that was the whole reason for wanting to preserve state. Proceeding directly and manually undoing changes risks losing track of exactly what changed and doesn't give a clean way to compare against an alternative approach. A Task subagent starts with isolated context, so it would lose exactly the exploration context the developer wants to keep, unless that context were laboriously re-passed in the prompt."}, {"id": "F-D1-B3-23", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A research coordinator has gathered an initial set of sources on a technical topic and now must decide between two very different report structures: one organized chronologically, one organized by competing viewpoints. The team wants to actually produce both versions to compare quality before picking one, without redoing the source-gathering work. Which approach best fits this need?", "options": ["Fork the session after source-gathering into two branches, one per report structure, so both can be produced independently from the same gathered sources.", "Spawn two parallel Task calls in the same response, each with an empty prompt asking the subagent to pick whichever structure seems best.", "Re-run the entire source-gathering process twice, once for each desired structure.", "Write both report structures into a single subagent prompt and ask it to interleave them into one document."], "correct": [0], "explanation": "Because the two report structures are genuinely divergent approaches built on the same completed source-gathering work, forking at that point lets each structure be produced independently from a shared baseline without redoing the gathering, which is exactly the scenario fork-based session management is for. Two Task calls with an empty, non-specific prompt wouldn't reliably produce one report per structure and would leave the actual comparison to chance rather than a real side-by-side. Redoing the source-gathering twice wastes work already completed, since both structures depend on the same sources. Asking a single subagent to interleave both structures into one document doesn't produce two comparable versions at all; it produces something that's neither one."}, {"id": "F-D1-B3-24", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "An architect is deciding between two mechanisms for a new piece of work: forking the current session, or spawning a subagent via the Task tool. Which statement correctly distinguishes when each is the better fit?", "options": ["Forking is best for exploring divergent approaches that should each retain the accumulated context of the current session, while a Task subagent is best for a bounded, delegable piece of work that starts clean and reports back a result.", "A Task subagent always retains the full parent conversation, while forking always starts from an empty context.", "Forking and Task subagents are interchangeable in every situation, so the choice is purely stylistic.", "Task subagents can only be used for read-only work, while forking is required for any task that modifies files."], "correct": [0], "explanation": "The two mechanisms solve different problems: forking branches an existing session so each branch keeps the context built up so far, suiting divergent-approach exploration, while a Task subagent spawns an isolated context for a scoped, delegable job whose result gets reported back to the invoking agent. It is the Task subagent that starts isolated, not forking; forking is the one that preserves accumulated context, so this reverses the actual behavior. They aren't interchangeable; using a subagent when divergent, context-preserving branches are needed would lose exactly the context the developer wants to keep, and vice versa. There is no such restriction limiting Task subagents to read-only work or requiring forking for file modification."}, {"id": "F-D1-B3-25", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A coordinator condenses its research findings into a two-sentence summary before passing it to a reporting subagent: \"Found that Approach A outperforms Approach B on most benchmarks. Write a report recommending an approach.\" The original findings actually noted that Approach A only outperforms on latency, while Approach B is significantly better on accuracy, and that the client's stated priority was accuracy. The final report recommends Approach A. What went wrong, and what would have prevented it?", "options": ["The condensed summary dropped the specific benchmark breakdown and the client's stated priority, so the subagent never saw the facts needed to reach the correct recommendation; passing the complete relevant findings, not a lossy paraphrase, would have prevented this.", "The reporting subagent's AgentDefinition was missing a description, causing it to default to the wrong recommendation.", "The coordinator should have used fork_session instead of a Task call so the subagent could inherit the full findings automatically.", "The subagent's tool restrictions were too permissive, allowing it to draw conclusions outside its intended scope."], "correct": [0], "explanation": "Since the subagent only ever sees what's in its prompt, an over-condensed summary that drops the actual benchmark breakdown and the client's stated priority removes exactly the information needed to reach the right conclusion; this is the isolated-context risk of passing a lossy paraphrase instead of the complete relevant findings. A missing subagent description affects how a coordinator selects among multiple subagents, not the correctness of a report once that subagent has already been invoked. fork_session preserves an existing session's accumulated context for a branch continuing that session; a Task subagent is isolated by design regardless of which mechanism is used, so switching mechanisms wouldn't cause automatic inheritance. Overly permissive tool restrictions are a scope and security concern, not the cause of a wrong recommendation driven by missing facts."}, {"id": "F-D1-B3-26", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A coordinator spawns four parallel document-analysis subagents via four Task calls in a single response, each covering a different source document. Once all four return, the coordinator must produce a single synthesized answer. What is the best practice for handling the four subagents' results?", "options": ["Have each subagent report its findings back to the coordinator, which then aggregates and synthesizes across all four results, keeping the coordinator as the central point for combining and observing the outputs.", "Have each subagent post its findings directly to the other three subagents so they can synthesize amongst themselves.", "Discard three of the four results at random to reduce the amount of content the coordinator must read.", "Instruct each subagent to independently write the same final synthesized answer so the coordinator can just pick one."], "correct": [0], "explanation": "Routing subagent results back through the coordinator keeps a single point of aggregation and observability, letting the coordinator combine the four independent analyses into one coherent answer. Having subagents communicate directly with each other bypasses the coordinator and removes the central visibility into what each subagent found and how the final answer was assembled. Discarding results at random throws away work that was deliberately parallelized to cover different sources, undermining the point of the decomposition. Asking every subagent to independently produce the full final answer duplicates work each subagent isn't positioned to do well, since each only analyzed one of the four documents."}, {"id": "F-D1-B3-27", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "An architect is designing subagents for a document-processing pipeline and is deciding between one broad \"document-worker\" subagent with access to every tool used anywhere in the pipeline, or several narrow subagents, each with only the tools its specific job needs. Which approach is generally preferable, and why?", "options": ["Several narrow subagents, each scoped to only the tools its role needs, because giving every subagent every tool degrades tool selection and violates least privilege.", "One broad subagent, because consolidating tools avoids the overhead of defining multiple AgentDefinitions.", "One broad subagent, because subagents with more tools always produce higher-quality output.", "Several narrow subagents, but each should still be granted every pipeline tool so none of them are ever blocked from a task."], "correct": [0], "explanation": "Scoping each subagent's tools to what its specific role actually needs follows least privilege and avoids the selection degradation that comes with handing any single subagent a large, undifferentiated toolset. Avoiding the setup overhead of multiple AgentDefinitions trades a one-time cost for an ongoing tool-selection and scope problem, which is a poor tradeoff. More tools does not equate to higher quality; an oversized toolset for a narrow job tends to hurt tool selection rather than help it. Granting narrow subagents every pipeline tool \"just in case\" undoes the benefit of narrow scoping and reintroduces the same least-privilege and selection problems the narrow design was meant to solve."}, {"id": "F-D1-B3-28", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A developer configures an Explore subagent to survey a codebase and, mid-task, decides the codebase is large enough that the Explore subagent itself should spawn further sub-subagents to parallelize the search across directories. The Explore subagent's AgentDefinition currently restricts its tools to Read, Grep, and Glob for isolating verbose discovery output. What must change for the Explore subagent to be able to spawn its own subagents?", "options": ["\"Task\" must be added to the Explore subagent's own allowed tools, since without it the subagent has no way to invoke further delegation regardless of how good its instructions are.", "Nothing; any subagent can spawn further subagents by default as long as the parent coordinator has Task access.", "The Explore subagent's description must be rewritten to mention delegation.", "The developer must call fork_session before the Explore subagent starts."], "correct": [0], "explanation": "Task-tool access is scoped per agent; an agent, including a subagent acting as a mini-coordinator, can only invoke further subagents if \"Task\" is included in its own allowed tools, so a subagent restricted to Read, Grep, and Glob has no path to delegation until that's added. Task access does not cascade automatically from a parent's permissions to every subagent it spawns; each agent's tool access is its own. Rewriting the description affects how the subagent is selected or understood, not whether it's technically permitted to call the Task tool. fork_session branches session state for divergent approaches and has no bearing on whether a given agent can invoke subagents."}, {"id": "F-D1-B3-29", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI pipeline runs an initial code-review subagent on a pull request, which reports three issues. The developer pushes a fix, and the pipeline spawns a brand-new review subagent via a fresh Task call to check the updated diff, giving it only the new diff with no mention of the three previously reported issues. What risk does this introduce, and how should it be addressed?", "options": ["The new subagent has no memory of the prior findings, so it might re-flag already-acknowledged issues or fail to confirm they were actually fixed; the coordinator should include the prior findings in the new Task prompt.", "No risk exists, since a freshly spawned subagent always automatically retrieves the full review history for the same pull request.", "The new subagent will refuse to run at all without an explicit reference to the previous subagent's session ID.", "The risk only matters if the two review subagents use different AgentDefinitions."], "correct": [0], "explanation": "Because each Task invocation is isolated and doesn't inherit history from earlier calls, even earlier calls on the same pull request, a fresh review subagent has no way to know what was already flagged or fixed unless the coordinator explicitly includes that context in the new prompt. There is no automatic retrieval of prior review history for subagents; that context has to be passed deliberately. Subagents don't require a session ID reference from a prior Task call in order to run. The risk stems from the lack of passed context, not from whether the two invocations happen to share the same AgentDefinition."}, {"id": "F-D1-B3-30", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A coordinator hands off a case to an escalation subagent using a JSON object with two clearly separated parts: a content field containing the customer's actual complaint text, and a metadata field containing the customer ID, order ID, and timestamp of the original request. What is the main benefit of this structure compared to a single prose paragraph mixing all of this together?", "options": ["It lets the subagent reliably distinguish the customer's actual words from factual identifiers and timestamps, reducing the chance of misreading one as the other.", "It guarantees the escalation subagent will never need to contact a human.", "It allows the subagent to skip validating the customer's identity.", "It automatically increases the subagent's context window."], "correct": [0], "explanation": "Separating the customer's actual complaint text from factual metadata like IDs and timestamps means the subagent doesn't have to parse them apart from unstructured prose, reducing misreads such as treating a date mentioned in the complaint as the request timestamp. This structure doesn't determine whether human escalation is needed; that depends on the nature of the case. Structuring the handoff doesn't remove the need for identity verification; it just makes the already-verified identifiers easier to consume reliably. Passing structured fields has no effect on the size of the subagent's context window."}, {"id": "F-D1-B3-31", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "An architect is writing guidance for engineers on how to prompt subagents invoked via the Task tool in a multi-agent research system, given that each subagent starts with isolated context. Which of the following practices should the guidance recommend? (Select all that apply.)", "options": ["Include the complete relevant findings the subagent needs directly in its Task prompt, rather than referencing \"the findings above.\"", "Structure passed context into clearly separated fields, such as content versus source and metadata, instead of one undifferentiated block of prose.", "State the goal and quality bar for the subagent's output rather than only a rigid list of mechanical steps.", "Assume the subagent can see the full coordinator conversation, so only the newest instruction needs to be included in the prompt.", "Keep every Task prompt as short as possible by omitting source attribution details, since the subagent can infer them later."], "correct": [0, 1, 2], "explanation": "Because subagents run with isolated context, complete findings must be passed explicitly rather than assumed available, and structuring that content separately from its metadata reduces misreads. Pairing that with goal and quality-bar framing, rather than a rigid step list, lets the subagent produce genuinely useful output instead of merely mechanically compliant output. Assuming the subagent can see the coordinator's full conversation is the exact misconception that causes failed handoffs, since subagents do not inherit parent history. Omitting source attribution to keep prompts short removes information the subagent has no way to infer later, since it has no access to anything outside its own prompt."}, {"id": "F-D1-B3-32", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A team is designing how their coordinator agent spawns subagents for a multi-source research task with three independent lookups (web search, internal wiki search, and competitor filings search) followed by one synthesis step that depends on all three. Which of the following design choices are correct for this workflow? (Select all that apply.)", "options": ["Emit the three independent lookup subagents' Task calls together in a single coordinator response so they run in parallel.", "Wait until all three lookup subagents have returned results before spawning the synthesis subagent, since synthesis depends on their combined output.", "Ensure the coordinator's own allowedTools configuration includes \"Task\" before any of these subagents can be invoked.", "Spawn the synthesis subagent in the same response as the three lookup subagents so all four run concurrently.", "Give the synthesis subagent the same broad tool access as all three lookup subagents combined, in case it needs to redo their searches."], "correct": [0, 1, 2], "explanation": "The three lookups are mutually independent, so batching their Task calls into a single response correctly parallelizes them, while synthesis genuinely depends on their combined output and so correctly waits until they've all returned; none of this is possible in the first place unless the coordinator's allowedTools includes \"Task.\" Spawning synthesis alongside the three lookups would start it before its dependency is satisfied, since it would have nothing yet to synthesize. Giving the synthesis subagent every lookup tool \"in case it needs to redo their searches\" violates least privilege and misunderstands its job, which is to synthesize the findings it's given, not re-run the upstream searches itself."}, {"id": "F-D1-B3-33", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "easy", "question": "An architect is filling out an AgentDefinition for a new test-writer subagent that will be invoked via the Task tool to generate unit tests for a given file. Which of the following are legitimate parts of an AgentDefinition that the architect should configure? (Select all that apply.)", "options": ["A description that helps the coordinator recognize when this subagent should be invoked.", "A system prompt that establishes the subagent's role, standards, and expected output format.", "Tool restrictions that scope the subagent to only what a test-writing task actually needs.", "A guarantee that the subagent automatically inherits every prior message from the coordinator's conversation.", "A fixed iteration cap that terminates the subagent once it reaches a hard-coded number of tool calls, used as the primary signal that its work is complete."], "correct": [0, 1, 2], "explanation": "An AgentDefinition legitimately configures a description for routing and selection, a system prompt for role and standards, and tool restrictions for least privilege; these are the standard building blocks for defining a reusable subagent type. Automatic inheritance of the coordinator's prior messages is not something an AgentDefinition provides or guarantees; subagents remain isolated from parent history regardless of how they're defined. Using a hard-coded iteration cap as the primary way to decide a subagent is done is an anti-pattern for agentic control flow; completion should be driven by the model's own stop reason, not an arbitrary cap layered onto the agent's configuration."}, {"id": "F-D1-B3-34", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An extraction coordinator's prompt to a per-document extraction subagent reads: \"Extract fields in this exact order: name, then date, then amount, then category. Use exactly one tool call per field.\" Some documents don't mention a category at all, and the subagent either stalls or invents a plausible-sounding category rather than leaving the field empty. What is the most effective way to rewrite this prompt?", "options": ["State the extraction goal and the rule for missing information directly, such as populating each field from the document and leaving a field null when the information isn't present, rather than dictating a fixed sequence of tool calls per field.", "Keep the exact step order but add a fifth step reminding the subagent not to invent data.", "Remove the category field from the schema entirely so the issue can never come up again.", "Instruct the subagent to always leave every field null when any single field is missing, to be safe."], "correct": [0], "explanation": "The original prompt's rigid, mechanical structure never actually tells the subagent what to do when a field's information simply isn't in the document, which is why it either stalls or fabricates a plausible value; stating the goal along with an explicit rule for missing data gives it a clear, correct way to handle that case regardless of step order. Bolting on one more procedural reminder without stating the actual rule for missing fields is unlikely to reliably fix the fabrication behavior. Removing the category field entirely discards real information for the many documents that do include it, which isn't an acceptable fix. Blanking every field whenever any one is missing throws away correctly extracted data just because category happened to be absent, which is overcorrection, not a fix."}, {"id": "F-D1-B4-01", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A customer support resolution agent's system prompt instructs it to always call get_customer to verify the caller's identity before calling process_refund. Production logs show that in a small percentage of long sessions, the agent calls process_refund without a prior successful get_customer call, typically once the identity-check instruction has scrolled well out of recent context. What should the team do to guarantee this never happens again?", "options": ["Add a programmatic check in the tool-execution harness that blocks any call to process_refund unless a prior get_customer call in the same session returned a verified customer ID.", "Move the identity-verification instruction to the very top of the system prompt and repeat it in bold.", "Switch to a larger, more capable model tier so the instruction is less likely to be forgotten.", "Add a few-shot example to the prompt showing the correct order of tool calls."], "correct": [0], "explanation": "A programmatic gate tied to the session's actual tool-call history guarantees the sequence holds no matter how long the conversation runs, since it no longer depends on the instruction still being salient. Repositioning or bolding the instruction, or upgrading the model, both leave compliance dependent on the model attending to a prompt instruction, which is exactly the failure mode already observed. Adding a few-shot example nudges behavior in the same probabilistic way and offers no guarantee against a long-context lapse."}, {"id": "F-D1-B4-02", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI coordinator's system prompt says that before calling the merge tool, it must confirm the test-runner tool has already been executed and returned a passing result. A postmortem after a broken merge finds the agent skipped straight to the merge tool on a small diff that the model judged 'low risk.' What is the most effective fix?", "options": ["Rewrite the instruction in all caps to say the test run is required with no exceptions.", "Add a programmatic prerequisite gate that blocks the merge tool call unless the session's tool-call history contains a passing test-runner result for the current diff.", "Add a second reminder about the required order immediately before the merge step in the prompt.", "Require the agent to explain its reasoning in writing before calling the merge tool."], "correct": [1], "explanation": "A programmatic gate tied to the actual tool-call history removes the decision from the model entirely, so a diff that merely looks low risk can no longer bypass the test requirement. Rewording the instruction more forcefully or adding a second reminder right before the merge step are still prompt-level nudges that depend on the model choosing to comply, the same dependency that already failed. Requiring a written explanation makes a bypass easier to spot afterward in the transcript, but does nothing to stop the merge from happening in the first place."}, {"id": "F-D1-B4-03", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team's CLAUDE.md tells Claude Code to run the project linter before committing any change. Most commits comply, but an audit finds a handful of commits over the past month went out without a preceding lint run, all during sessions where the developer had asked for a 'quick fix.' What is the best way to make lint-before-commit non-negotiable?", "options": ["Move the lint-before-commit rule into a path-specific .claude/rules/ file instead of CLAUDE.md.", "Ask the developer to verbally confirm that linting happened before each 'quick fix' request.", "Enforce a programmatic gate that blocks the commit action unless a linter run with a known result already exists in that session for the changed files, rather than relying on the CLAUDE.md instruction alone.", "Move the instruction from CLAUDE.md into a custom slash command's description instead."], "correct": [2], "explanation": "A gate that checks for an actual linter result in the session's tool history enforces the rule deterministically regardless of how urgently the request is phrased. Relocating the same instruction to a rules file or a slash command description changes where the guidance lives but not its fundamentally probabilistic nature. Asking for a verbal confirmation still relies on human diligence under time pressure, the exact condition that produced the audit failures in the first place."}, {"id": "F-D1-B4-04", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A developer productivity agent is instructed, via prompt guidance, to read a module's existing test file before editing that module's implementation, so it doesn't break undocumented behavior. Telemetry shows this happens nearly 100% of the time on short sessions but drops to about 70% on sessions where the agent has already made several unrelated edits earlier in the same conversation. Which change would most reliably close this gap?", "options": ["Periodically summarize the conversation so the read-tests-first instruction stays closer to the top of context.", "Increase the number of few-shot examples showing the correct read-then-edit order.", "Instruct the agent to re-read its full system prompt before every Edit call.", "Track, per module, whether a Read call against that module's test file has occurred in the session, and programmatically block Edit calls to the implementation file until that condition is met."], "correct": [3], "explanation": "Tracking the actual Read call per module and gating the Edit call on it enforces the ordering with certainty, independent of how much unrelated work has piled up earlier in the session. Periodic summarization can help keep an instruction from being buried, but it is a mitigation for context decay, not a guarantee, and the instruction is still followed probabilistically. More few-shot examples suffer the same limitation. Re-reading the full system prompt before every edit burns context on every turn without addressing why the ordering was skipped in the first place."}, {"id": "F-D1-B4-05", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A refund policy states a customer can never be refunded more than the original order total. The agent's system prompt already says never to refund more than the order total, but an incident review finds one case where the agent, following a customer's insistent recalculation, approved a refund twelve dollars above the order total. What is the best fix?", "options": ["Add a deterministic check that compares the requested process_refund amount to the verified order total from lookup_order and blocks the call if the amount exceeds it, regardless of how the conversation unfolded.", "Add a stronger prompt clause instructing the agent to double-check its math before calling process_refund.", "Instruct the agent to apologize and re-verify with the customer whenever a refund amount feels unusually high.", "Log every refund amount so a human can audit them at the end of each week."], "correct": [0], "explanation": "Comparing the requested amount against the verified order total at the moment of the call guarantees the cap holds no matter how persuasive the customer's recalculation was. A stronger prompt clause or an instruction to 're-verify when it feels high' both still leave the decision to the model's in-conversation judgment, the same judgment that already failed under social pressure. Weekly auditing is detective rather than preventive: it only surfaces the problem well after the money has already moved."}, {"id": "F-D1-B4-06", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "An invoice-processing pipeline extracts a payment amount and currency from scanned invoices and then calls a downstream tool that schedules the payment. The extraction prompt includes detailed instructions and worked examples for reading totals correctly, and per-document accuracy is already high, but at high volume even a small error rate produces enough over-payments to worry the finance team. Which additional control would most directly address finance's concern?", "options": ["Add two more worked examples of correctly extracted totals to the extraction prompt.", "Add a deterministic validation step that cross-checks the extracted amount and currency against an independently computed value, such as the sum of the extracted line items, and blocks the payment-scheduling call on any mismatch.", "Switch the extraction step to a more capable model tier to reduce misreads.", "Have the model report a confidence score alongside each extracted total, and only worry about totals below 90% confidence."], "correct": [1], "explanation": "An independent cross-check that blocks the payment call on any mismatch catches errors deterministically no matter how they occurred, which is what a near-zero-tolerance requirement like finance's actually needs. More worked examples or a more capable model can lower the error rate further but never guarantee it reaches zero, so some over-payments will still slip through at volume. A model's self-reported confidence score is an unreliable signal to gate on, since it reflects the model's own assessment rather than a verified, independently computed check."}, {"id": "F-D1-B4-07", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI agent is allowed to auto-commit suggested fixes directly for low-risk categories such as formatting and typos, but anything touching authentication or payment code must be routed to a human reviewer instead of committed directly. The system prompt describes this split clearly, but an audit finds one case where the agent auto-committed a one-line change inside a payment-calculation function because the change 'looked trivial.' What is the most effective fix?", "options": ["Add more examples to the prompt showing what counts as a trivial change versus a sensitive one.", "Ask the agent to add a comment explaining why it judged the change to be trivial.", "Add a programmatic check on the file path of any auto-commit target that blocks direct auto-commits under authentication or payment directories, routing them to human review regardless of how small the change looks.", "Increase how often the agent is reminded of the auto-commit policy during long review sessions."], "correct": [2], "explanation": "A path-based check removes the trivial-or-not judgment call entirely for sensitive directories, so a change can no longer slip through just because it looks small. More examples of what counts as trivial still leave a probabilistic judgment call for changes near the boundary, which is exactly where this incident occurred. Requiring an explanatory comment creates a record of the reasoning but does not stop the risky auto-commit from happening. More frequent reminders address attention decay, not the underlying lack of a hard boundary."}, {"id": "F-D1-B4-08", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A support agent may auto-approve discretionary discounts up to fifty dollars without review; anything above that requires a human manager's sign-off. Rather than describing both thresholds in the system prompt and trusting the model to route correctly, an architect wants a guarantee that no discount over fifty dollars is ever applied without human approval. What should they implement?", "options": ["A prompt instruction reminding the agent of the fifty-dollar threshold on every turn involving a discount.", "A monthly report reviewing all discounts that were applied, flagging any above fifty dollars for follow-up.", "A few-shot example in the prompt showing a sixty-dollar discount being correctly escalated.", "A deterministic check on the discount amount that automatically routes any request above fifty dollars to escalate_to_human and blocks the discount-applying tool call until a human approves it."], "correct": [3], "explanation": "A deterministic check on the amount itself guarantees the routing decision regardless of how the conversation goes, since it never depends on the model recalling or applying the threshold correctly. A per-turn reminder or a few-shot example are still prompt-based nudges with a non-zero failure rate. A monthly report only discovers violations after the discount has already been applied, which does not prevent the unauthorized discount in the first place."}, {"id": "F-D1-B4-09", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A Claude Code-based deployment assistant is allowed to run a deploy script against production. The team's CLAUDE.md states that it must never deploy to production unless the full test suite has passed in that session. An incident occurs when a developer, mid-conversation, asks the agent to push a hotfix immediately because 'we already know it's fine,' and the agent complies without a fresh passing test run. What is the most effective way to prevent a recurrence?", "options": ["Add a programmatic gate around the deploy tool that blocks execution unless the session's tool-call history shows a passing test-suite run against the current code state, regardless of what the user says in the conversation.", "Add an explicit CLAUDE.md clause stating that requests to skip tests should be politely declined.", "Require the agent to ask a clarifying question whenever a user requests an urgent deploy.", "Log a warning whenever a deploy happens without a preceding test run, so the team can review it the next morning."], "correct": [0], "explanation": "A gate that checks the actual test-run history is the only option that does not depend on the model successfully pushing back on an insistent user, which is precisely where the prompt-only approach broke down. A CLAUDE.md clause about declining such requests, or a requirement to ask a clarifying question, are both still prompt-level behaviors that a sufficiently insistent request can override. Logging a warning after the fact is purely detective, and by the time anyone reviews it the production deploy has already happened."}, {"id": "F-D1-B4-10", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "Whenever a support agent calls escalate_to_human, it currently attaches only the full raw conversation transcript. Human reps report spending several minutes per case just re-reading the transcript to work out who the customer is, what has already gone wrong, and what to try next. What change to the escalation handoff would most directly address this?", "options": ["Shorten the transcript by removing the customer's earliest messages, since they are the least relevant.", "Generate a structured summary containing the verified customer details, a concise root-cause diagnosis, and recommended next actions, and attach it alongside the case.", "Have the agent apologize to the customer for the delay before escalating.", "Increase the priority level of every escalated ticket so reps address them faster."], "correct": [1], "explanation": "A structured summary that states who the customer is, what has been diagnosed, and what to try next gives the rep exactly what they need without re-deriving it from scratch. Trimming the transcript still leaves the rep to parse unstructured prose, and removing the earliest messages risks cutting the very context that explains how the problem started. Apologizing to the customer does not change what information the human rep receives, and reprioritizing the queue only affects how soon the case is picked up, not how quickly it can be resolved once it is."}, {"id": "F-D1-B4-11", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An architect is defining the required fields for a structured escalation handoff produced whenever escalate_to_human is called. Which piece of information is most important to guarantee is always included, so the human rep is not forced to re-derive it from scratch?", "options": ["The exact number of conversational turns that occurred before escalation.", "Which model tier handled the conversation before escalation.", "The verified customer and order identifiers, along with a summary of what was already attempted and why it did not resolve the issue.", "A sentiment label describing how frustrated the customer's messages sounded."], "correct": [2], "explanation": "Verified identifiers plus a summary of what was already tried are exactly what let a human rep pick up the case without redoing the investigation from scratch. The turn count and the model tier used are operational metadata that do not help the rep resolve anything. A sentiment label references the kind of signal the platform already treats as unreliable, and it tells the rep nothing concrete about the customer's account or the root cause."}, {"id": "F-D1-B4-12", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A research coordinator cannot resolve a factual conflict between two sources within its confidence threshold and hands the question off to a human reviewer for a final call. Which handoff content would best support a fast, correct human decision?", "options": ["Just the final report with the more frequently cited claim already selected, so the reviewer only has to sign off.", "A list of every source URL consulted during the entire research task, in the order they were fetched.", "A single overall confidence percentage for the report, with no supporting detail.", "Both conflicting claims, their sources and publication dates, and a short note on why the coordinator could not resolve the conflict on its own."], "correct": [3], "explanation": "Presenting both claims with their sources, dates, and the reason the coordinator got stuck gives the reviewer exactly what is needed to adjudicate the conflict. Pre-selecting the more frequently cited claim quietly resolves the disagreement itself and reduces the reviewer to a rubber stamp rather than an informed decision-maker, which defeats the purpose of escalating. Dumping every source URL from the whole task forces the reviewer to sift through irrelevant material instead of the specific conflict at hand, and a bare confidence percentage gives them nothing they can actually evaluate."}, {"id": "F-D1-B4-13", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A team is defining a template that escalate_to_human must always populate before handing a case to a support rep. Which of the following should be included as structured fields in that template? (Select all that apply.)", "options": ["A self-reported confidence score from the model about how well it thinks it handled the case", "Verified customer and order identifiers", "The complete, unfiltered raw text of every tool call made during the session, exactly as returned", "A concise root-cause diagnosis of what went wrong", "Recommended next actions for the human to consider"], "correct": [1, 3, 4], "explanation": "Identifiers, a root-cause diagnosis, and recommended next actions together give the rep exactly what is needed to act without re-deriving the case from scratch: who the customer is, what already went wrong, and what to try next. Dumping the complete unfiltered tool-call log defeats the purpose of a structured summary by handing the rep the same wall of raw material they were trying to avoid. A model's self-reported confidence score is an unreliable signal and does not tell the rep anything actionable about the case itself."}, {"id": "F-D1-B4-14", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A customer's message reads: 'My last invoice charged me twice, my package never arrived, and I still can't log into my account.' The agent currently investigates only the first issue it recognizes, the double charge, and once that is resolved it ends the interaction without addressing the other two. What is the best way to fix this?", "options": ["Decompose the message into its three distinct concerns, billing, shipping, and account access, and investigate each one, in parallel where they don't depend on each other, before presenting one consolidated resolution.", "Ask the customer to resubmit their message with only one issue at a time.", "Resolve the double charge, then close the ticket, and rely on the customer to open a new ticket for the remaining issues.", "Pick whichever of the three issues has the shortest resolution path and resolve only that one to keep first-contact-resolution metrics high."], "correct": [0], "explanation": "Decomposing the message into its three concerns and investigating the independent ones in parallel resolves everything the customer actually raised in a single pass. Asking the customer to resubmit one issue at a time shifts the work of decomposition back onto them and delays resolution. Closing the ticket after fixing only the double charge, or cherry-picking whichever issue is fastest, both leave real problems unresolved and would only look good on a resolution metric while actually under-serving the customer."}, {"id": "F-D1-B4-15", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A research coordinator receives a request that clearly splits into three independent sub-questions covering different domains: market size, regulatory landscape, and competitor pricing. None of the sub-questions depends on another's answer. What is the most efficient way to investigate them?", "options": ["Investigate all three sub-questions sequentially within one subagent to keep the findings in a single context.", "Emit three Task tool calls in a single response, one per sub-question, so the independent subagents investigate in parallel.", "Pick the sub-question most central to the request and investigate only that one in depth.", "Merge the three sub-questions into one broad prompt and send it to a single generalist subagent."], "correct": [1], "explanation": "Since the sub-questions are independent, dispatching three parallel subagents lets each one get a focused, isolated investigation without waiting on the others, minimizing overall latency. Investigating them sequentially in one subagent wastes time when nothing requires that ordering. Investigating only the most central sub-question drops coverage of two-thirds of the request. Folding all three into one broad prompt for a single generalist subagent sacrifices the focused attention each sub-question benefits from, without gaining any of the latency advantage that parallel dispatch provides."}, {"id": "F-D1-B4-16", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A customer's request has two concerns: they want a refund, and they want their account's registered email address corrected because they say the current one isn't theirs. The agent must confirm identity before doing anything financial, and the refund's eligibility genuinely depends on first confirming which account the order belongs to, which is unclear given the email dispute. What is the best decomposition strategy?", "options": ["Investigate both concerns fully in parallel from the start, since decomposing into independent sub-tasks always minimizes latency.", "Resolve the email correction first because it was mentioned first, then start the refund investigation from scratch afterward.", "Treat identity and account confirmation as a sequential prerequisite for the refund, since the refund's correctness depends on it, while still investigating the parts of the email-correction concern that don't depend on the refund outcome in parallel.", "Treat the entire request as a single non-decomposable unit and investigate it as one sequential narrative to avoid any risk of missing a dependency."], "correct": [2], "explanation": "Good decomposition tracks the actual dependencies present: the refund can't be safely resolved until account identity is settled, so that part must be sequential, while whatever in the email-correction concern doesn't depend on the refund outcome can still proceed in parallel. Parallelizing everything ignores a genuine dependency and risks approving a refund against the wrong account. Working through the concerns in the order they were mentioned doesn't address the dependency either, it just picks an arbitrary sequence without reasoning about why. Refusing to decompose at all throws away the latency benefit that the request's genuinely independent parts could have provided."}, {"id": "F-D1-B4-17", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A team is writing guidance for how their support agent should handle tickets that bundle multiple, unrelated concerns in a single message. Which of the following are good practices? (Select all that apply.)", "options": ["Explicitly identify each distinct concern in the customer's message before starting any investigation", "Silently drop whichever concern seems least urgent so the ticket can be closed faster", "Investigate concerns that don't depend on each other in parallel rather than strictly one after another", "Always investigate concerns in the exact order the customer typed them, regardless of dependencies", "Present the customer with one consolidated response that addresses every concern that was raised"], "correct": [0, 2, 4], "explanation": "Naming each concern up front, investigating the independent ones in parallel, and closing with one consolidated response together ensure the customer's entire message gets addressed efficiently and coherently. Dropping the least urgent concern to close faster leaves a real problem unresolved and undermines trust once the customer notices. Always following the exact order the concerns were typed ignores whatever actual dependencies exist between them, which is an arbitrary rule rather than a real decomposition strategy."}, {"id": "F-D1-B4-18", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "get_customer, backed by the CRM's MCP server, returns account-creation dates as '07/19/2026', while lookup_order, backed by the order-management MCP server, returns order dates in ISO format '2026-07-19'. Downstream logic that compares these dates to compute account age at the time of order intermittently miscalculates because the two formats aren't reconciled consistently. What is the most reliable fix?", "options": ["Add a system-prompt instruction telling the model to always convert dates to ISO format before using them in calculations.", "Ask the two MCP server owners to agree on a shared date format at some point in the future.", "Have the model call a separate date-parsing tool itself whenever it notices a date-format mismatch.", "Add a PostToolUse hook that normalizes date fields to one canonical format immediately after either tool returns, before the values reach downstream logic or the model's context."], "correct": [3], "explanation": "A PostToolUse hook runs deterministically on every tool result, so date normalization happens automatically regardless of which tool produced the data or whether the model happens to notice a mismatch. A prompt instruction to convert dates, or relying on the model to notice and call a parsing tool, are both still probabilistic and can be missed under load or in a long conversation. Waiting for the two server owners to agree on a shared format someday is outside the architecture's control and does not fix today's miscalculations."}, {"id": "F-D1-B4-19", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "The web-search subagent's tool returns citation metadata as a flat list of URL strings, while the document-analysis subagent's tool returns citation metadata as nested objects with separate title, author, and date fields. The synthesis subagent, which consumes both, frequently cites sources inconsistently or drops metadata fields. What is the best fix?", "options": ["Add a PostToolUse hook for each tool that reshapes its citation output into one consistent schema before it is appended to context, regardless of which subagent produced it.", "Instruct the synthesis subagent's prompt to handle both citation formats carefully.", "Have the synthesis subagent re-fetch every source itself in a consistent format before citing it.", "Merge the web-search and document-analysis subagents into a single subagent so there is only one citation format to worry about."], "correct": [0], "explanation": "Reshaping each tool's output into one schema immediately after it returns guarantees the synthesis subagent always receives a consistent structure to cite from. Asking the model to 'handle it carefully' is a probabilistic instruction with the same failure mode already observed in production. Re-fetching every source is wasted work and still doesn't guarantee a consistent shape without the same normalization step. Merging the two subagents into one sacrifices the specialization the architecture was built for, just to sidestep a formatting problem a hook solves directly."}, {"id": "F-D1-B4-20", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "While exploring an unfamiliar codebase, an agent uses two different MCP tools that both return file paths, one using forward slashes and relative paths, the other using absolute paths with the host OS's separators. A downstream step that deduplicates 'files already reviewed' keeps treating the same file as two different files. What is the most direct fix?", "options": ["Tell the agent in the system prompt to mentally normalize file paths before comparing them.", "Add a PostToolUse hook that normalizes every returned file path into one consistent absolute-path format immediately after either tool runs.", "Only use one of the two MCP tools going forward, even though each offers different useful capabilities.", "Ask the model to list all previously reviewed files at the start of every turn so duplicates are more visible."], "correct": [1], "explanation": "Normalizing every path immediately after either tool runs fixes the root cause deterministically, once, regardless of which tool produced the path. Relying on the model to normalize paths 'mentally' is a probabilistic workaround for what is really a mechanical formatting problem. Dropping one tool entirely sacrifices real capability just to avoid a formatting inconsistency that doesn't require sacrificing anything. Re-listing reviewed files every turn burns context repeatedly without fixing the mismatched formats that are actually causing the duplicates."}, {"id": "F-D1-B4-21", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI review agent uses three different tools: a linter that labels issues 'error' or 'warning', a security scanner that labels them 'critical', 'major', or 'minor', and a style checker that labels them 'must-fix' or 'suggestion'. Downstream logic for deciding what blocks a PR has to interpret all three vocabularies, and inconsistent handling already let a 'critical' security finding through because the blocking logic only recognized the word 'error'. What is the best fix?", "options": ["Update the blocking logic's prompt instructions to also recognize the word 'critical' in addition to 'error'.", "Only use tools that already share the exact same severity vocabulary, and drop the others.", "Add a PostToolUse hook that maps each tool's native severity labels onto one canonical severity scale immediately after the tool returns, so downstream blocking logic only ever sees one vocabulary.", "Ask the model to convert severities to a common scale in its final summary at the end of the review."], "correct": [2], "explanation": "Mapping every tool's labels onto one canonical scale immediately after each tool returns guarantees a single consistent vocabulary reaches the blocking logic, closing the exact gap that let a critical finding through. Patching the prompt to also recognize one more label is a whack-a-mole fix that will keep missing whatever vocabulary the next tool introduces. Dropping tools to force vocabulary uniformity discards real capability the team relies on. Converting severities only in a final summary is too late if the blocking logic already acted on the raw, unnormalized labels earlier in the run."}, {"id": "F-D1-B4-22", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "An extraction pipeline pulls payment amounts from invoices using three different document-parsing MCP tools depending on document type. One returns '$1,000.00', another returns '1000.00 USD', and a third returns a bare number '1000' with the currency implied by a separate field. Before a deterministic validation gate checks the amount against a purchase order, the values need to be in one consistent numeric-plus-currency form. What is the best way to guarantee this?", "options": ["Add extraction prompt instructions asking each tool's underlying model to always format its answer as 'amount USD'.", "Have the validation gate itself try to parse whichever raw format it receives, handling all three cases inline.", "Route all invoices through only the parsing tool that already returns the cleanest format, regardless of document type.", "Add a PostToolUse hook that parses and normalizes each tool's raw output into a consistent amount-and-currency-code structure immediately after extraction, before the validation gate runs."], "correct": [3], "explanation": "A single normalization step that every extraction result passes through guarantees the validation gate always receives a consistent structure it can rely on, no matter which parser produced it. Prompting for a specific output format is still probabilistic per-tool compliance and does nothing for tools whose prompting you don't control. Pushing the parsing burden into the validation gate itself couples validation logic to every current and future raw format, which is fragile and duplicates normalization wherever the data is consumed. Restricting to one tool regardless of document type sacrifices the accuracy gained by using the right parser for each document type just to avoid normalization."}, {"id": "F-D1-B4-23", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "Despite a system-prompt policy capping any single refund at five hundred dollars without manager approval, an agent occasionally calls process_refund with a higher amount when a customer is especially persistent. The team wants a guarantee that this specific limit can never be violated by a tool call, independent of how the conversation went. What should they add?", "options": ["A tool-call interception hook that inspects the arguments of every process_refund call before it executes and blocks the call outright if the amount exceeds five hundred dollars without an approval flag present.", "A system-prompt clause stating the five-hundred-dollar limit in bold with an explanation of why it matters.", "A follow-up step where the agent double-checks the refund amount against policy after the call has already been made.", "Training material for the support team explaining the refund policy in more detail."], "correct": [0], "explanation": "Inspecting the arguments of every process_refund call and blocking anything over the limit enforces the cap at the moment of execution, so a persistent customer can no longer talk the model into an over-limit call. Restating the policy more emphatically in the prompt is still a probabilistic instruction with the same failure mode already observed. Checking the amount after the call has executed is detective rather than preventive, since the refund has already gone out by the time it's reviewed. Training material for the support team doesn't constrain the software at all."}, {"id": "F-D1-B4-24", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An engineering team wants an absolute guarantee that a Claude Code coding agent can never run a force-push against the main branch, no matter how a session's conversation unfolds. Simply telling the agent in CLAUDE.md not to do this has already failed once. What should they add?", "options": ["A more strongly worded CLAUDE.md instruction repeating that force-pushing to main is forbidden.", "A tool-call interception hook that inspects Bash tool calls before execution and blocks any command matching a force-push to the protected branch pattern.", "A reminder appended to the end of every user prompt about the force-push restriction.", "A requirement that the agent explain its reasoning before running any Bash command."], "correct": [1], "explanation": "Blocking the matching command at the point of execution enforces the restriction deterministically, regardless of what led up to it in the conversation. A more strongly worded instruction, a repeated reminder, and a requirement to explain reasoning first are all still prompt-level nudges, and the team has already seen firsthand that a prompt-only instruction can fail here."}, {"id": "F-D1-B4-25", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An agent exploring and refactoring an unfamiliar codebase should only ever modify files inside the project's own directory tree, never elsewhere on the filesystem. Rather than trusting the system prompt's instruction to stay within the project directory, an architect wants this guaranteed. What should they implement?", "options": ["A system-prompt reminder listing the exact project directory path at the start of every session.", "A periodic review where a human checks which files were modified after each session ends.", "A tool-call interception hook that checks the target path of every Edit or Write call and blocks the call if the path falls outside the project directory.", "Instructions telling the agent to ask for confirmation before editing any file it hasn't read yet."], "correct": [2], "explanation": "Checking the target path before an Edit or Write call executes enforces the directory boundary deterministically, so no path outside the project tree can ever be written to. Reminding the model of the correct directory at session start is still a probabilistic instruction that can be overridden later in a long session. Reviewing modified files after a session ends is detective, not preventive, and any damage is already done by the time it's caught. Asking for confirmation before editing unread files addresses a different concern, read-before-write discipline, not the directory boundary itself."}, {"id": "F-D1-B4-26", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A CI agent has a merge tool it can call to auto-merge approved pull requests. In one incident, the agent called the merge tool immediately after a flaky test-runner result came back ambiguous, and the model interpreted the ambiguity charitably. The team wants a hard guarantee that merges never happen except after an unambiguous passing result. What is the best fix?", "options": ["Add a system-prompt clause defining exactly what counts as an 'ambiguous' test result and instructing the agent to treat those as failures.", "Configure the test-runner tool to retry automatically until it produces an unambiguous result.", "Add a step requiring the agent to summarize the test results in its own words before deciding whether to merge.", "A tool-call interception hook that checks the most recent test-runner result before allowing the merge tool call to proceed, blocking it unless that result is an unambiguous pass."], "correct": [3], "explanation": "Checking the actual test-runner result before allowing the merge call enforces the requirement at the tool-execution layer, so the merge simply cannot proceed on anything short of an unambiguous pass, regardless of how the model reasons about ambiguity. Defining ambiguity more precisely in the prompt still leaves compliance up to the model's interpretation in the moment. Retrying the test runner might reduce how often ambiguous results occur but doesn't guarantee the merge tool is blocked on the occasions one still slips through. Requiring the model to summarize results first adds a step the model could still summarize charitably, exactly as it did in the incident."}, {"id": "F-D1-B4-27", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A structured-extraction pipeline writes each extracted invoice record into a production database via a dedicated MCP tool. The team wants a guarantee that a record is never written when a required field, such as invoice total, came back null from extraction, since a prompt instruction to double-check completeness before saving has already let a handful of incomplete records through. What should they add?", "options": ["A tool-call interception hook that validates the record against the required schema fields before the database-write tool call executes, blocking the write if any required field is null.", "A stronger prompt instruction emphasizing that completeness checks are mandatory, not optional.", "A nightly batch job that scans the database for incomplete records and flags them for cleanup.", "An additional few-shot example showing a complete record being saved correctly."], "correct": [0], "explanation": "Validating required fields before the write executes prevents the incomplete record from ever being saved, closing the exact gap already observed with prompt-only guidance. A stronger version of the same instruction is still probabilistic and has already been shown to fail in practice. Scanning for incomplete records after they've been written is detective and lets bad data reach production before anyone notices. Another few-shot example may improve extraction quality generally, but it does nothing to guarantee the write itself is blocked when a required field is null."}, {"id": "F-D1-B4-28", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "Policy requires that the total refunds issued to a single customer within a rolling 24-hour window never exceed one thousand dollars without manager sign-off, a rule that must hold even though each individual process_refund call might look small on its own. An architect is comparing four ways to guarantee this. Which would actually provide the guarantee?", "options": ["Switching to a larger, more capable model tier so it more reliably remembers prior refunds issued earlier in the day.", "A tool-call interception hook that maintains a running 24-hour total per customer and blocks any process_refund call that would push the cumulative total past one thousand dollars without a sign-off flag.", "Adding a chain-of-thought instruction asking the agent to mentally total the customer's refunds so far before approving a new one.", "Reviewing a random weekly sample of customers' 24-hour refund totals to catch any that exceeded one thousand dollars."], "correct": [1], "explanation": "Tracking the actual running total per customer and blocking any call that would cross the cap enforces the rule deterministically at the moment a violation would occur, independent of what the model remembers or reasons about. A larger model may recall context better but still depends on the model choosing to retrieve and correctly sum every prior refund, which remains probabilistic and can't see across separate sessions. A chain-of-thought instruction to mentally total refunds has the same weakness, it depends on the model both remembering every prior amount and computing the sum correctly, with no verification. Weekly sampling is detective, catching violations well after the fact and only for the customers who happen to be sampled."}, {"id": "F-D1-B4-29", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A junior engineer proposes fixing a recurring policy violation by adding a more detailed explanation to the system prompt describing why the rule matters. A senior architect instead recommends adding a hook. What is the core reason a hook is the stronger choice for enforcing a hard rule?", "options": ["A hook makes the system prompt shorter, which is the main reason it improves reliability.", "A hook allows the agent to skip calling tools entirely, which reduces the chance of error.", "A hook runs as deterministic code that executes on every matching event, guaranteeing the rule holds regardless of how the model reasons in a given conversation, while a prompt instruction, however well explained, is still followed probabilistically.", "A hook is easier for a new engineer to read than a prompt instruction."], "correct": [2], "explanation": "The real distinction is mechanism: deterministic code that always runs versus a language model instruction that is followed with some non-zero failure rate no matter how well it's explained. Attributing the benefit to a shorter system prompt misses the actual reason hooks help. Hooks don't cause the agent to skip tool calls, that claim is simply inaccurate. Readability for a new engineer is a maintenance convenience, not the reason architects reach for hooks over prompts."}, {"id": "F-D1-B4-30", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "After a coding agent violates a rule despite a clearly worded CLAUDE.md instruction, one engineer proposes rewriting the instruction in more forceful language, marking it critical and mandatory. Another engineer proposes adding a hook that blocks the specific action instead. Which position is better supported, and why?", "options": ["The forceful rewording, because stronger language measurably reduces a language model's error rate to zero.", "Both are equivalent, since CLAUDE.md instructions and hooks are just two different places to write the same rule.", "The forceful rewording, bec
