to a distinct, well-defined category with a distinct correct response: the dropped connection is transient and self-resolves on retry, the checksum problem is a validation issue that requires fixing the input rather than repeating it, and the return-window and partner-scope failures are business and permission problems respectively that no amount of retrying will overturn. Treating all four the same way with uniform blind retries ignores that two of them, the validation and business or permission failures, will fail identically every time, wasting calls and delaying the customer. Collapsing the permission failure and the business failure into the same treatment obscures that they need different remedies: a business failure is explained as policy, while a permission failure requires different credentials or an escalation path, not a policy explanation."}, {"id": "F-D2-B2-15", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An on-call engineer starts receiving pages every time `process_refund` rejects a request because the order was already refunded once before, a duplicate-refund guard doing its job. The engineer assumes this indicates a bug in the refund tool and wants to add it to the incident dashboard alongside genuine system outages. What is the best assessment of this situation?", "options": ["This is a permission error, and the engineer should grant the refund tool broader access so duplicate refunds can be processed.", "This is an expected business-rule rejection, not a system fault; it should be surfaced to the agent so it can inform the customer, but it does not belong on the same incident dashboard as genuine outages and should not page on-call engineers.", "This is a transient error, and the refund tool should simply be configured to retry the call several more times.", "This is a validation error, and the order ID format needs to be corrected before the refund can proceed."], "correct": [1], "explanation": "A duplicate-refund guard doing exactly its job, correctly rejecting a second refund on the same order, is a business-rule outcome rather than evidence of a broken system, so routing it into the same alerting pipeline as real outages creates alert fatigue and wastes on-call attention. It has nothing to do with access rights, so widening the tool's permissions would be both unnecessary and risky, since it could let duplicate refunds through, which the guard exists to prevent. It is not transient, since repeating the call will hit the same guard every time. The order ID is not malformed either; the rejection happens because of the business rule about repeat refunds, not the input's shape."}, {"id": "F-D2-B2-16", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "Over several quarters, a support agent's MCP toolset grew from the original four tools, `get_customer`, `lookup_order`, `process_refund`, and `escalate_to_human`, to 22 tools after shipping, marketing, and HR integrations were bolted on so the same agent could handle requests from any department. Support engineers now notice the agent frequently calls an unrelated tool, such as a marketing-campaign lookup, instead of the correct support tool for a customer's question. What is the most effective fix?", "options": ["Write a longer system prompt that lists all 22 tools with detailed instructions on when to use each one.", "Switch the agent to a more capable model so it can reliably pick the correct tool from the larger set.", "Scope the support agent's toolset back down to only the tools its role actually needs, moving the shipping, marketing, and HR tools to separate agents or subagents scoped to those domains.", "Sort the 22 tools alphabetically in the tool list so related tools are easier to find."], "correct": [2], "explanation": "Scoping each agent's tools to only what its role needs, the least-privilege approach, directly removes the irrelevant options that are causing misselection, and is the architectural fix rather than a workaround. A longer prompt explaining 22 tools is a probabilistic patch that adds more text for the model to weigh at every turn without reducing the actual number of competing options. A larger model can improve reasoning generally, but tool-selection accuracy is known to degrade as the available tool count grows regardless of model tier, so the fix is the toolset size, not raw capability. Reordering the list does not change how many overlapping, irrelevant options the model must discriminate between when deciding what to call."}, {"id": "F-D2-B2-17", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A multi-agent research system's coordinator delegates to four subagents: web-search, document-analysis, synthesis, and reporting. Currently, the orchestration is configured so that every subagent is instantiated with the full combined toolset of all four roles, in case a subagent needs a tool outside its usual job, rather than each subagent receiving only its own relevant tools. What is the best practice being violated here, and what should change?", "options": ["Nothing needs to change, since giving every subagent every tool maximizes flexibility for future tasks.", "The coordinator should be the only agent with tools at all, with subagents limited to plain-text reasoning and no tool calls.", "The four subagents should be merged into a single agent that handles search, analysis, synthesis, and reporting sequentially with the full combined toolset.", "Each subagent should be scoped to only the tools relevant to its own role, for example only search-related tools for the web-search subagent, since giving every subagent the full combined toolset increases selection errors without adding real capability."], "correct": [3], "explanation": "Scoping each subagent to the tools its specific role needs is the least-privilege principle applied to tool distribution, and it avoids the tool-selection degradation that comes from exposing an unnecessarily large, overlapping toolset to every agent. Treating maximum flexibility as free ignores that a larger available tool count measurably hurts selection accuracy, so unused breadth is a liability rather than a benefit. Stripping subagents of tools entirely would prevent them from doing their actual jobs, such as a web-search subagent that can no longer search. Merging all four roles into one agent with every tool reintroduces the same oversized, undifferentiated toolset problem at a single point instead of solving it through role-based delegation."}, {"id": "F-D2-B2-18", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "The reporting subagent's only job is to take already-synthesized findings and format them into a final cited report. It currently has access to the full web-search and document-analysis toolsets in addition to its formatting tools, even though it never calls them. What should be done?", "options": ["Remove the unused web-search and document-analysis tools from the reporting subagent's toolset, leaving only the formatting and report-generation tools it actually uses.", "Leave the tools in place in case the reporting subagent needs them for an edge case someday.", "Keep the tools but rename them so they sound more report-related.", "Add even more tools to the reporting subagent so it becomes a general-purpose fallback agent."], "correct": [0], "explanation": "Removing tools a subagent never uses is a direct application of scoping tools to role, and it eliminates irrelevant options that only add noise to the reporting subagent's tool-selection decisions. Keeping unused tools just in case is exactly the kind of scope creep that degrades selection without ever paying off, since the subagent's role does not call for search or analysis capability. Renaming the unused tools does not address the underlying problem, since they are still irrelevant options competing for the model's attention regardless of their names. Adding more tools moves further in the wrong direction, compounding the same issue rather than fixing it."}, {"id": "F-D2-B2-19", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A Claude Code session is configured with 18 available tools spanning file editing, several overlapping search utilities, deployment helpers, and a handful of rarely used MCP integrations. Developers report the agent sometimes uses a slower, more roundabout tool when a more direct, correctly described tool was also available. What does this symptom most likely indicate?", "options": ["The tool descriptions must all be rewritten in a completely different writing style.", "The large number of available tools is degrading tool selection; trimming the toolset down to roughly the four or five tools actually needed for the current task would likely improve which tool gets chosen.", "The agent needs to be given plan mode permanently enabled to compensate for tool confusion.", "The session should be switched to a smaller, faster model to reduce latency."], "correct": [1], "explanation": "A toolset in the high teens spanning many unrelated purposes is a known trigger for degraded selection, so trimming to the handful of tools the current task actually needs is the direct fix, since fewer, clearer options are easier for the model to discriminate between. The description-writing style is not indicated as the problem here, since the tools are described as correct, just too numerous and overlapping to reliably distinguish. Plan mode addresses how much upfront planning happens before execution, not how many candidate tools compete at each selection step. Changing model size does not address the number of options being weighed and would not reliably resolve a tool-count-driven selection problem."}, {"id": "F-D2-B2-20", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An automated PR-review agent was originally given access to the organization's full developer toolbox, including deployment and database-migration tools, on the theory that it might need them someday. Its actual job is limited to reading diffs, running the test suite, and posting review comments. What change best aligns this agent's tool access with its actual responsibilities?", "options": ["Keep the full toolbox, but add a comment in the system prompt telling the agent not to use deployment or migration tools unless asked.", "Keep the full toolbox and rely on the agent's judgment to avoid using tools irrelevant to code review.", "Restrict the review agent's tools to only what code review requires, such as diff reading, test execution, and comment posting, removing deployment and database-migration access entirely.", "Add a fifth category of tools for infrastructure monitoring so the agent has even broader visibility during review."], "correct": [2], "explanation": "Removing tools the review agent's role has no legitimate use for is the least-privilege application of tool scoping, and it also removes irrelevant options that could otherwise be mis-selected during a review. A prompt instruction telling the agent to avoid certain tools is a probabilistic guardrail, not a guarantee, and does nothing to shrink the actual candidate set it must discriminate among. Relying purely on the model's judgment leaves both the exposure of an automated reviewer that can trigger deployments or migrations, and the selection-degradation risk, fully in place. Adding still more unrelated tools moves further in the wrong direction rather than narrowing scope to the review task."}, {"id": "F-D2-B2-21", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A developer-productivity agent originally had one generic `query_repo` MCP tool that accepted a free-form mode argument, such as symbol_search, file_history, or blame, and dispatched internally to different backend logic depending on that argument. The agent frequently picks the wrong mode or omits required mode-specific parameters. What is the most effective redesign?", "options": ["Keep the single generic tool, but add more example values for the mode argument to its description.", "Keep the single generic tool, and have the agent always ask the user which mode to use before every call.", "Remove the tool entirely and have the agent describe what it would have searched for in plain text instead.", "Split `query_repo` into several constrained, purpose-specific tools, for example `search_symbols`, `get_file_history`, and `get_blame`, each with its own clear description and only the parameters relevant to that specific operation."], "correct": [3], "explanation": "Replacing one overloaded, mode-dispatched tool with several narrow, purpose-specific tools removes the ambiguity of picking a mode and the right parameters for it, since each tool's description and schema can now clearly reflect exactly one operation. Adding more example mode values to the same generic tool's description still leaves the underlying mode-selection-plus-parameter-matching problem intact. Asking the user before every call adds friction to routine operations that should not need confirmation and does not fix the tool's design. Removing the tool and falling back to prose descriptions eliminates the agent's ability to actually retrieve real repository data, trading a design problem for a much bigger capability loss."}, {"id": "F-D2-B2-22", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A team previously had four well-scoped, purpose-specific MCP tools for repository tasks: `search_symbols`, `get_file_history`, `get_blame`, and `list_dependents`. Aiming to simplify the tool list, they now propose merging all four into a single `repo_tool` that takes an action parameter selecting which of the four behaviors to run. What is the most likely consequence of this consolidation, and is it advisable?", "options": ["This is advisable because reducing four tools to one always improves tool-selection accuracy regardless of how the merged tool is structured.", "This is advisable because it reduces the total number of tool descriptions the model has to read, which is the only factor that affects selection quality.", "This has no effect either way, since the model treats a single action parameter exactly like four separate tool definitions.", "This reintroduces the ambiguity that constrained, purpose-specific tools were meant to eliminate: the model must now correctly infer both the intended action and its action-specific parameters from one generic interface, which is a step backward, not a simplification."], "correct": [3], "explanation": "Collapsing several clear, single-purpose tools into one generic tool with a mode-like parameter recreates the exact ambiguity, which action and which parameters go with it, that splitting into purpose-specific tools was meant to solve; going from four tools to one does not help if the one tool is now doing four jobs' worth of disambiguation. The number of tools by itself is not the only variable, since an overloaded single tool can be harder to select correctly than several clear, narrow ones, so the claim that fewer is always better regardless of structure does not hold. Tool count in isolation being the only factor ignores that description clarity and parameter fit matter at least as much as raw count. A generic action parameter is also not equivalent to genuinely separate tool definitions from the model's perspective, since it first has to pick the right action value correctly before it can even get the parameters right, which is an extra inference step that distinct tools do not require."}, {"id": "F-D2-B2-23", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A structured-data-extraction pipeline has two tools available to the model: `extract_invoice_fields`, the schema-validated extraction tool, and a general-purpose `web_search` tool used elsewhere in the same session. Every document processed must produce a JSON object matching a fixed schema by calling `extract_invoice_fields` specifically; no other outcome is acceptable. Which `tool_choice` configuration best guarantees this outcome?", "options": ["Setting `tool_choice` to auto, since it gives the model the most flexibility to decide the best way to respond.", "A forced tool choice naming `extract_invoice_fields` specifically, so the model must call exactly that tool rather than responding in text or calling the other available tool.", "Leaving `tool_choice` unset, relying on the system prompt to insist that `extract_invoice_fields` must be used.", "Setting `tool_choice` to any, since forcing a specific tool and letting the model pick from all available tools produce the same guarantee."], "correct": [1], "explanation": "Forcing the specific extraction tool by name is the only configuration that guarantees both that a tool is called and that it is the correct one; with two tools available, the any setting leaves room for the model to call the unrelated search tool instead, which would violate the pipeline's requirement. The auto setting explicitly allows a plain-text response instead of a tool call, which is unacceptable when free text is never a valid output here. Relying on prompt wording alone to insist on a specific tool is a probabilistic guardrail with a non-zero failure rate, not the deterministic guarantee schema-validated extraction needs. The any setting does guarantee that some tool is called, but not which one, so with more than one tool in scope it is a materially weaker guarantee than forcing the exact tool by name."}, {"id": "F-D2-B2-24", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A support agent is configured with `tool_choice` set to auto throughout the conversation. Production logs show that in some conversations, when a customer asks about their order status, the agent answers directly from general knowledge with a confidently phrased guess, without calling `lookup_order` at all. What is the most effective fix for this specific reliability problem?", "options": ["Add a sentence to the system prompt more strongly worded to insist the agent always calls `lookup_order` for order questions.", "Switch to a more capable model, since better reasoning will reliably prevent the agent from skipping the tool call.", "For the turn where an order-status question is detected, use a forced tool choice, or at minimum set `tool_choice` to any, so the model must call a tool rather than answering from text, instead of relying on auto and prompt wording alone.", "Remove the `lookup_order` tool and replace it with a more detailed tool description so the model understands when to use it."], "correct": [2], "explanation": "The auto setting explicitly permits the model to respond in text instead of calling a tool, so when a tool call must happen, the deterministic fix is switching that turn to a forced, or at least mandatory-call, tool choice rather than continuing to rely on auto. A more strongly worded prompt is still a probabilistic instruction and carries the same non-zero failure rate as the original prompt wording that already allowed this behavior. A bigger model may reduce the error rate somewhat but does not provide a deterministic guarantee against skipping a required tool call, since the tool_choice setting is what controls that mechanically. Removing the tool obviously cannot fix a problem where the tool was not called, and a better description does not override what auto fundamentally permits."}, {"id": "F-D2-B2-25", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "Architects want to guarantee that every support conversation begins by verifying the customer's identity through `get_customer` before any other tool, such as `process_refund`, can be considered, but they still want the agent to freely choose among several appropriate tools, or respond in text, later in the conversation once identity is established. What is the best way to implement this?", "options": ["Set `tool_choice` to auto for the entire conversation and add prominent instructions in the system prompt that `get_customer` must always be called first.", "Force the tool choice to `get_customer` for every single turn of the entire conversation, including after identity has already been verified.", "Set `tool_choice` to any for the entire conversation so the model is guaranteed to call some tool at every turn, starting with `get_customer`.", "Force the tool choice to `get_customer` specifically on the first turn requiring a tool call, then switch subsequent turns to auto, or any, depending on whether text responses should remain possible, once identity has been verified."], "correct": [3], "explanation": "Forcing the specific identity-verification tool only on the turn where it is required, then relaxing to a more flexible setting afterward, gets a deterministic guarantee exactly where it is needed without permanently constraining the rest of the conversation. Relying on auto plus prompt wording for the mandatory first step reintroduces the probabilistic compliance problem the forced choice is meant to eliminate. Forcing `get_customer` for the entire conversation would prevent the agent from ever calling any other tool or answering in text again, which breaks the stated goal of free tool choice later on. The any setting guarantees some tool call but not which one, so it does not guarantee `get_customer` specifically runs first, since the model could call a different tool instead."}, {"id": "F-D2-B2-26", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "At a certain point in a research workflow, the coordinator knows the next step must gather more information, either through `web_search` or `document_analysis`, both of which are equally valid depending on what is already known, but a plain-text response with no tool call would leave the pipeline stalled with nothing to act on. Which `tool_choice` setting best fits this step?", "options": ["Setting `tool_choice` to any, which requires the model to call some tool this turn while still letting it pick whichever of the available tools best fits the situation.", "A forced tool choice naming `web_search` specifically, regardless of whether `document_analysis` might be the better fit for a given case.", "Setting `tool_choice` to auto, since it best matches a situation where either tool could be appropriate.", "Leaving `tool_choice` unset entirely, since the default behavior already guarantees a tool will be called."], "correct": [0], "explanation": "The any setting is the exact fit here: it forces a tool call so the pipeline does not stall on a text-only response, while leaving the choice of which qualifying tool to call up to the model, matching the fact that either option is genuinely valid. Forcing one specific tool by name would remove the model's ability to pick the better-suited tool for cases where the other one is actually more appropriate. The auto setting is the wrong fit precisely because it still permits a text-only answer, which is the outcome this step needs to avoid. There is no default that inherently guarantees a tool call, since auto is a common default and explicitly allows skipping tool use, so leaving tool_choice unset does not provide the guarantee this step requires."}, {"id": "F-D2-B2-27", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A general support FAQ agent handles a wide range of questions. Many are answerable directly from a static knowledge summary already in context, such as store hours or return-policy text, while others require calling `get_customer` or `lookup_order` to pull account-specific details. Architects are deciding whether to force a tool call on every turn. What is the most appropriate `tool_choice` configuration for this agent's general question-answering turns?", "options": ["A forced tool choice naming `lookup_order` on every turn, so the agent always has fresh account data available.", "Setting `tool_choice` to auto, since many questions are legitimately answerable from context without a tool call, and requiring a tool call on every turn would push the model to invoke a tool unnecessarily.", "Setting `tool_choice` to any on every turn, so the model must always call some tool even for questions answerable from static context.", "Remove `get_customer` and `lookup_order` entirely so the agent only ever answers from static context."], "correct": [1], "explanation": "The auto setting fits precisely because many turns genuinely do not need a tool call, and allowing the model to answer directly from already-available context avoids unnecessary tool invocations while still leaving tool use available for the turns that need account-specific data. Forcing `lookup_order` on every turn would trigger it even for questions like store hours that have nothing to do with any specific order, wasting calls and potentially confusing the response. The any setting has the same problem as forcing a specific tool, since it would compel a tool call even when the question is fully answerable from static context already in scope. Removing the account-lookup tools entirely would break the agent's ability to answer the account-specific questions it is explicitly meant to handle."}, {"id": "F-D2-B2-28", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A commit-message-writing agent has two tools available: `format_conventional_commit` and `format_freeform_commit`. In one workflow, team policy requires every commit message to use the conventional-commit format with no exceptions. In a separate, unrelated workflow for a personal scratch repository, either format is acceptable, but the agent must always produce a formatted commit message rather than leaving it as freeform, unformatted text. Which pairing of `tool_choice` settings correctly matches each workflow?", "options": ["Use `tool_choice` set to any for both workflows, since any already guarantees the correct tool is called whenever there is a required outcome.", "Force the tool choice to `format_conventional_commit` for both workflows, since forcing a specific tool is always the safest choice regardless of policy.", "Force the tool choice to `format_conventional_commit` specifically for the policy-mandated workflow; use `tool_choice` set to any for the scratch-repository workflow so either formatting tool may be called but a formatted result is still guaranteed.", "Use `tool_choice` set to auto for both workflows, since the agent can be trusted to follow the team's written policy either way."], "correct": [2], "explanation": "The policy-mandated workflow needs a guarantee that the exact conventional-commit tool runs, which only a forced choice on that specific tool provides, while the scratch-repo workflow only needs some formatting tool to run, and either one qualifies, which is exactly what the any setting guarantees without over-constraining which one gets picked. The any setting does guarantee a tool call, but not a specific one, so it would let the scratch-repo scenario's flexibility bleed into the policy-mandated workflow, where only the conventional format is acceptable. Forcing the conventional-commit tool in the scratch-repo workflow would block the freeform tool from ever being used even though policy there explicitly allows either format. The auto setting permits skipping tool use entirely and answering in plain text, which fails both workflows' requirement that a formatted commit message always be produced, and trusting written policy alone reintroduces probabilistic compliance where a deterministic guarantee is available."}, {"id": "F-D2-B2-29", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "medium", "question": "A team is redesigning the toolset for an automated PR-review agent. Its responsibilities are limited to reading diffs, running the existing test suite, and posting review comments. The team is deciding among several proposed changes. Which of these changes would appropriately improve the agent's tool design? (Select all that apply.)", "options": ["Add the organization's full deployment toolkit to the agent so it can immediately deploy any fix it suggests.", "Remove tools unrelated to code review, such as deployment or database-migration tools, that the agent was previously given just in case.", "Replace a single generic `dev_tool` that took an action parameter for diffing, testing, and commenting with three purpose-specific tools, one for each responsibility.", "Replace `tool_choice` set to auto with a single tool forced for the agent's entire session, so it always calls the same one tool no matter what the diff contains.", "Keep the review agent's toolset limited to what its role needs rather than adding broader tools on the chance they might someday be useful."], "correct": [1, 2, 4], "explanation": "Stripping out tools the review role never legitimately needs, splitting an overloaded generic tool into purpose-specific ones for each distinct responsibility, and generally keeping the toolset scoped to the role's actual needs are all direct applications of least-privilege tool distribution and purpose-specific tool design. Adding the full deployment toolkit does the opposite, since it hands an automated reviewer capability far beyond its review responsibilities and reintroduces unnecessary tool-selection surface. Forcing one single tool for the agent's entire session would prevent it from ever calling the other tools it legitimately needs, since it cannot both run tests and post comments if only one tool is ever permitted, which misapplies forced tool choice as a session-wide setting rather than a mechanism for guaranteeing a specific call at a specific turn."}, {"id": "F-D2-B2-30", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "hard", "question": "A research coordinator agent has accumulated 22 tools directly on itself over time, including tools that logically belong to its web-search, document-analysis, synthesis, and reporting subagents, because it was easier to add new capabilities directly to the coordinator than to set up new subagents. Tool-selection errors have become frequent. Which of the following would meaningfully address the coordinator's tool-selection problems? (Select all that apply.)", "options": ["Increase the coordinator's context window so it can hold more tool descriptions in memory at once.", "Delegate the specialized capabilities to separate subagents, each scoped to only the tools its role needs, so the coordinator itself holds a much smaller set of orchestration-level tools.", "Switch the coordinator to a more capable model tier, since tool-selection accuracy is primarily a function of model capability rather than the number of available tools.", "Audit the 22 tools for overlapping or rarely used ones and remove or consolidate genuinely redundant capability rather than leaving everything attached to the coordinator.", "Route the specialized work through the coordinator's delegation mechanism instead of calling those tools directly, so each call happens inside a subagent that has only the relevant narrow toolset."], "correct": [1, 3, 4], "explanation": "Splitting the coordinator's tool count by delegating specialized work to properly scoped subagents, and separately auditing the existing 22 tools to remove genuine redundancy, both directly reduce the number of competing, overlapping options the coordinator has to discriminate among when selecting a tool. Routing specialized work through delegation rather than direct tool calls achieves the same goal from a different angle, since the coordinator's own tool surface shrinks because the narrow, specialized tools live with the subagents that actually use them. A bigger context window lets more tool descriptions fit, but it does not address why a large, overlapping set of options degrades selection, since the problem is discrimination among many candidates, not available context space. Assuming model capability is primarily what drives tool-selection accuracy contradicts the pattern that even capable models show degraded selection as the available tool count grows into that range, since the number and overlap of tools is an architectural variable largely independent of model tier."}, {"id": "F-D2-B3-01", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "Five engineers on a project all need Claude Code to connect to the same internal ticket-tracking MCP server so everyone has identical tool access when exploring the codebase and filing follow-up tickets. Where should this server be configured so every engineer who clones the repository gets the same setup automatically, without manual copy-paste?", "options": ["In the project's committed .mcp.json file at the repository root", "In each engineer's personal ~/.claude.json file, copied by hand to match", "In the project's CLAUDE.md file, described in prose so Claude configures it at runtime", "In a shared team chat message that engineers reference when setting up"], "correct": [0], "explanation": "A server every teammate needs is exactly what project-scoped .mcp.json is for: checked into version control so cloning the repo gives everyone the identical configuration automatically. Copying a personal config by hand doesn't scale and drifts out of sync as soon as one person updates it. CLAUDE.md carries prose instructions and standards for Claude to follow, not MCP server connection configuration. A chat message isn't part of the project and provides no mechanism for Claude Code to actually connect to anything."}, {"id": "F-D2-B3-02", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A team is setting up a project .mcp.json entry for an internal deploy-status server that requires an API token to authenticate. Which approach lets the file be safely committed and shared with the team?", "options": ["Reference the token through environment-variable expansion, such as ${DEPLOY_API_TOKEN}, so the committed file holds only a placeholder and each person supplies the real value locally", "Paste the current token directly into the file so the server works immediately for anyone who clones the repo", "Base64-encode the token before pasting it into the file", "Store the token in a code comment above the server entry so it's easy to find"], "correct": [0], "explanation": "Env-var expansion is exactly what project-scoped .mcp.json supports so secrets never need to live in the committed file: only a reference to a variable name is checked in, and each environment supplies the actual value. Pasting the raw token, even encoded, still commits the real secret into version-control history where it remains retrievable indefinitely, since encoding is not encryption. A comment is just as visible and committed as any other text in the file, so it leaks the same secret."}, {"id": "F-D2-B3-03", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A team needs Claude Code to query their Postgres database as part of everyday development work, and a well-maintained, actively used community MCP server already exists for exactly this purpose. What is the most effective way to start?", "options": ["Adopt the existing community Postgres MCP server and configure it for the project", "Build and maintain an in-house Postgres MCP server from scratch for full control", "Have every engineer write their own personal wrapper script around the database driver", "Avoid MCP for this and have Claude construct raw SQL inside Bash calls instead"], "correct": [0], "explanation": "For a standard, widely-used integration like Postgres, an existing well-maintained community server already solves the problem and continues to receive updates, so adopting it is the effective first move rather than reinventing it. Building a custom server from scratch duplicates work that's already been done and now has to be maintained indefinitely in-house. Per-engineer wrapper scripts fragment the setup and lose the shared, describable tool interface a proper MCP server provides. Falling back to raw SQL through Bash discards a structured, well-described tool interface in favor of ad hoc commands Claude has to construct correctly from scratch every time."}, {"id": "F-D2-B3-04", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "After connecting a community CRM MCP server, a customer support agent frequently calls get_record when it should call get_records, and vice versa, while handling refund requests. Both tools currently carry the same one-line description, \"Retrieve records,\" and both remain genuinely needed since one fetches a single customer by ID and the other filters a list by criteria. What is the most effective fix?", "options": ["Rewrite each tool's description so it clearly and distinctly states its purpose, expected input shape, and when to use it versus the other", "Switch the agent to a larger, more capable model so it infers the right tool from context", "Remove one of the two tools so there's nothing left to confuse", "Add a general instruction to the system prompt reminding Claude to pick the right retrieval tool"], "correct": [0], "explanation": "Tool descriptions are the primary signal Claude uses to select between tools, so differentiating two near-identical descriptions directly fixes the ambiguity at its source. A bigger model doesn't compensate for a genuinely ambiguous interface: this is an architecture problem, not a reasoning-capacity problem. Removing either tool isn't viable here since both single-record and filtered-list lookups are still needed for refund handling. A vague system-prompt reminder is probabilistic prompt guidance layered on top of the same underlying ambiguity, not a fix to the signal Claude actually uses first."}, {"id": "F-D2-B3-05", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An engineer adds a new refund_lookup MCP server entry to the project's .mcp.json while a support engineer's Claude Code session is already open and mid-conversation. The support engineer immediately asks Claude to use the new tool, but Claude reports no such tool is available. What is the most likely root cause?", "options": ["Claude Code discovers a server's available tools when it connects to that server, so a session already running before the edit hasn't connected to the newly added server yet", "The new server's description is too vague for Claude to recognize the tool", "The .mcp.json file has a JSON syntax error preventing it from loading at all", "Refund-related tools require a separate manual allowlist entry in the system prompt before Claude can see them"], "correct": [0], "explanation": "MCP tools are discovered at connection time, so a config change made after a session has already started and connected won't be visible until a new connection is established, such as by starting a fresh session. A vague description would cause Claude to misuse or avoid a visible tool, not report the tool as absent entirely. A syntax error is possible in general but isn't the most likely explanation given the scenario describes a normal addition and an already-running session: the timing of the edit is the deciding detail. There's no separate allowlist mechanism at work here; tool visibility comes from the server connection itself."}, {"id": "F-D2-B3-06", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A multi-agent research system's document-analysis subagent currently calls a list_documents tool and then, one at a time, a get_document_metadata tool for each result just to figure out which documents exist and what they cover, before it even starts real analysis. Which redesign most directly reduces this exploratory overhead?", "options": ["Have the MCP server expose the document catalog, including titles, dates, and summaries, as a resource the subagent can read directly, instead of requiring a tool call per document just to browse", "Increase the subagent's context window so it can hold more tool-call results at once", "Add a caching layer in front of the get_document_metadata tool", "Merge list_documents and get_document_metadata into a single tool with more parameters"], "correct": [0], "explanation": "MCP resources are meant to expose content catalogs so agents can see what's available without a round trip of exploratory tool calls, which directly addresses the described pattern. A larger context window lets more results accumulate but does nothing to reduce the number of calls being made. Caching metadata still requires the same initial round of calls to populate the cache and adds infrastructure without changing the interaction pattern. Merging the two tools still leaves a tool-call-per-item pattern for browsing rather than exposing the catalog as directly readable content."}, {"id": "F-D2-B3-07", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "One engineer wants to try connecting an experimental, not-yet-vetted MCP server purely to explore its capabilities on their own machine, without affecting what any teammate sees or requiring a pull-request review before they can even start experimenting. Where should this experimental server be configured?", "options": ["In that engineer's personal ~/.claude.json", "In the project's .mcp.json, with a comment marking it as experimental so teammates know to disregard it", "In the project's .mcp.json, submitted as a pull request for team review before use", "In a duplicate copy of the repository just for this experiment"], "correct": [0], "explanation": "A personal, one-off integration that shouldn't affect teammates is exactly what user-level configuration is for: it lets the engineer experiment freely without touching anything shared. Putting it in the project file, even with a warning comment, still makes it visible and shared with the whole team the moment they pull the change. Requiring a review before the engineer can even start experimenting adds process overhead to what is, by design, a personal exploration step, not a team commitment. Duplicating the entire repository just to isolate one server entry is a disproportionate amount of overhead for what user-level configuration already solves directly."}, {"id": "F-D2-B3-08", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A new hire clones a repository whose committed .mcp.json references a Jira MCP server using ${JIRA_API_TOKEN}. They haven't modified the file. When Claude Code tries to use the Jira tools, it fails with an authentication error. What is the most likely explanation?", "options": ["The JIRA_API_TOKEN environment variable isn't set in the new hire's local environment yet, so the placeholder has nothing valid to expand into", "The community Jira MCP server the team is using has been discontinued", ".mcp.json entries only work for the person who originally committed them", "The new hire needs elevated permissions on the git repository itself"], "correct": [0], "explanation": "Env-var expansion only works if the referenced variable is actually set somewhere in the environment running Claude Code; a freshly cloned repo gives the new hire the placeholder reference but not the secret value itself, which they still need to provide locally. Nothing in the scenario suggests the server is discontinued: the error is about authentication, not about the tool being unavailable. Project-scoped configuration is explicitly meant to work the same way for everyone who clones the repo, not just the original committer. Git repository permissions control access to the code itself, not whether an environment variable is set on a particular machine."}, {"id": "F-D2-B3-09", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "medium", "question": "A multi-agent research system's team is deciding whether to adopt an existing, actively maintained community MCP server for a well-known external search API, or build an equivalent one in-house. Which of the following are valid reasons to prefer the community server, assuming it already meets the team's functional requirements? Select all that apply.", "options": ["It avoids duplicating engineering effort on functionality the community has already built and tested", "It continues to be maintained and updated as the underlying search API evolves, without the team owning that upkeep", "It frees the team's engineering time to focus on integrations that are genuinely proprietary and have no existing community coverage", "It guarantees the search results themselves will always be more accurate than an in-house implementation", "It removes any need to configure scope, connection details, or credentials for the server"], "correct": [0, 1, 2], "explanation": "Preferring an actively maintained community server for a standard integration avoids reinventing already-solved functionality, inherits ongoing maintenance as the underlying API changes, and lets engineers spend their limited time on the integrations unique to their own domain instead. It does not guarantee better result accuracy: that depends on the underlying search API itself, not on which side built the MCP wrapper around it. And adopting a community server still requires configuring it, including connection details, scope, and any required credentials, so it doesn't eliminate setup work entirely."}, {"id": "F-D2-B3-10", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A community-maintained issue-tracker MCP server exposes create_issue and update_issue tools. Their descriptions don't mention which fields are required or what happens if an issue with the same title already exists. The automated PR-review workflow in CI has started creating duplicate issues for findings it already filed earlier. What is the most targeted fix?", "options": ["Enrich the tool descriptions to specify required fields and existing-title or duplicate behavior so Claude has the information it needs before calling create_issue", "Switch the review workflow to a larger model so it reasons more carefully before filing issues", "Add a retry loop that re-runs create_issue automatically whenever the workflow seems uncertain", "Disable create_issue entirely and have a human file every issue manually"], "correct": [0], "explanation": "The description gap is the root cause: Claude has no way to know from the tool's own description that duplicate titles need to be checked or which fields matter, so enriching that description directly closes the gap causing the duplicates. A larger model doesn't compensate for missing information the tool description simply doesn't provide. A retry loop would likely make duplication worse, not better, since it re-invokes the same under-specified tool without changing its behavior. Removing automated filing entirely defeats the purpose of the automated workflow instead of fixing the underlying interface problem."}, {"id": "F-D2-B3-11", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An MCP server connected to a document repository requires calling list_schemas and then get_schema for each of dozens of schemas individually before a structured-extraction agent can even determine which schema matches an incoming document. Which change most directly reduces the overhead of this discovery process?", "options": ["Expose the full schema catalog as an MCP resource the agent can read as a single piece of content, rather than requiring a separate tool call per schema just to browse them", "Increase the number of documents processed per batch to amortize the discovery cost", "Have the agent memorize schema IDs across sessions so it skips discovery next time", "Reduce the number of schemas available by archiving older ones"], "correct": [0], "explanation": "This is precisely the exploratory-tool-call problem MCP resources are meant to solve: exposing the catalog as directly readable content lets the agent see all the schemas at once instead of paying a tool call for each one just to browse. Batching documents doesn't change how many discovery calls are needed per run. Cross-session memorization isn't a reliable mechanism for tool interfaces and doesn't help in a fresh session or when a schema is newly added. Archiving schemas might reduce the count but doesn't fix the underlying pattern of needing a tool call per item just to see what's there, and risks losing schemas still needed for older document types."}, {"id": "F-D2-B3-12", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A community MCP server the team uses gets upgraded: a tool named search_docs is renamed to search_documents and its description is rewritten to match. A Claude Code session that connected before the upgrade keeps calling search_docs and getting failures well after the upgrade shipped. What is the most likely explanation?", "options": ["The session discovered the server's tool list and descriptions at connection time and hasn't reconnected since, so it's still working from the pre-upgrade tool set", "The community server has a naming bug that needs to be reported upstream", "Claude intentionally continues using old tool names for backward compatibility", "The rewritten description is worse than the original, causing Claude to guess incorrectly"], "correct": [0], "explanation": "Because tools are discovered when the connection to a server is established, a session that connected before the rename is still operating on the tool list it originally discovered, and needs a new connection, such as a new session, to see the update. There's no bug being described here; the rename and description update are working exactly as intended on the server side. Claude has no behavior that deliberately preserves old, no-longer-existing tool names for compatibility. And the scenario states the new description matches the rename, so a worse description isn't what's driving the failure: the session simply never saw it."}, {"id": "F-D2-B3-13", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A project's committed .mcp.json defines a shared production-database MCP server every engineer uses. One senior engineer also wants a personal, read-only server pointed at their own local sandbox database for solo experiments, and wants zero chance that a teammate accidentally ends up pointed at that sandbox. What is the best way to add the sandbox server?", "options": ["Add it only to that engineer's own ~/.claude.json, leaving the shared project .mcp.json unchanged", "Add it to the project's .mcp.json with a comment explaining it's for personal use only", "Temporarily rename the shared .mcp.json on their own machine while experimenting", "Ask teammates verbally to ignore a new sandbox entry once it's added to the shared file"], "correct": [0], "explanation": "A personal server that must never be visible to teammates belongs in user-level configuration, which by design isn't shared or version-controlled with the project. Adding it to the shared file, even with an explanatory comment, still puts it in front of every teammate who pulls the change, which is exactly the risk being avoided. Renaming the shared file locally breaks that engineer's own access to the actual shared configuration and doesn't address where the sandbox entry lives. Relying on teammates to verbally remember to ignore an entry in a shared, version-controlled file is not a scope boundary: it depends entirely on everyone remembering correctly, every time."}, {"id": "F-D2-B3-14", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A security review finds that a project's .mcp.json, which normally references a payment-processor secret through ${PAYMENTS_SECRET_KEY}, briefly contained the literal secret value because a teammate pasted it in to test locally and committed that change before switching back to the variable reference. What process change best prevents this from happening again?", "options": ["Add an automated check in the commit or review process that blocks commits containing literal secret-like values in tracked configuration files, rather than relying solely on everyone remembering to use variable references", "Move the entire server definition into a personal ~/.claude.json so it's never committed at all", "Rotate the key and send the team a reminder email to always use variable syntax going forward", "Stop tracking .mcp.json in version control entirely"], "correct": [0], "explanation": "The underlying gap is that nothing prevented a literal secret from being committed even though the convention was to use a variable reference: an automated, deterministic check closes that gap regardless of whether any individual remembers the convention in the moment. Moving the server to personal configuration breaks the shared-across-the-team purpose that .mcp.json exists for, since every engineer still needs this server. Rotating the key and asking politely addresses this one incident but leaves the same human-memory-dependent process in place for the next person who pastes a secret in to test something. Removing .mcp.json from version control entirely eliminates the shared, consistent configuration the whole team otherwise benefits from, which is a much larger cost than the problem being solved."}, {"id": "F-D2-B3-15", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A multi-agent research system's document-analysis subagent needs to read files from Google Drive as one of its standard data sources. An engineer proposes writing a bespoke MCP server that wraps the Drive API from scratch, arguing that the team's specific needs justify owning the integration outright. What should the architect recommend as the first step?", "options": ["Evaluate an existing, actively maintained community Google Drive MCP server before committing to a custom build, reserving custom development for needs that server genuinely can't meet", "Proceed directly with the custom build, since knowing the exact requirements up front justifies writing it in-house", "Skip MCP for this integration and have Claude fetch file contents by prompting it with public URLs", "Give this responsibility to the reporting subagent instead, since it already produces the final output"], "correct": [0], "explanation": "Reading files from Google Drive is a standard integration that existing community servers typically already cover, so checking whether one meets the team's needs first avoids committing to ongoing in-house maintenance before that's actually necessary. Jumping straight to a custom build skips that evaluation and takes on maintenance burden for functionality that may already exist. Treating Drive files as fetchable via public URLs misunderstands that most Drive content requires an authenticated, structured interface rather than being openly fetchable content. Reassigning the task to a different subagent doesn't address which integration approach to use at all: it just moves the same unresolved question to a different part of the system."}, {"id": "F-D2-B3-16", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "While exploring an unfamiliar legacy codebase, engineers connect a community MCP server for the company's internal wiki. Its only tool, query, is described simply as \"Runs a query.\" In practice, both engineers and Claude frequently submit malformed queries and get unhelpful results back. What is the most effective fix?", "options": ["Improve the tool's description with example queries, the expected query syntax, and known edge cases, so both Claude and engineers know how to use it correctly", "Ask engineers to manually test different query formats each time until one happens to work", "Replace the wiki server with a general-purpose web-search tool instead", "Instruct Claude, in the system prompt, to use the query tool more carefully"], "correct": [0], "explanation": "A one-line description gives Claude almost nothing to work with when constructing a query, so enriching it with concrete examples, required syntax, and known edge cases is what actually improves the odds of a well-formed call. Manual trial-and-error doesn't scale and has to be repeated every time someone new hits the same problem. Swapping in a general web-search tool abandons access to the internal wiki's actual content, which a public search tool wouldn't have. A vague system-prompt reminder to be careful doesn't supply any of the syntax or examples actually missing from the tool's description, so it doesn't change the outcome."}, {"id": "F-D2-B3-17", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A knowledge-base MCP server used by a customer support resolution agent offers a search_articles tool and also exposes a resource listing the full current catalog of article titles, categories, and last-updated dates. Support policy requires confirming whether a relevant article exists in a given category before escalating an issue to a human. Which approach minimizes wasted tool calls while keeping that check reliable?", "options": ["Read the article-catalog resource first to check category coverage, reserving search_articles for actually retrieving content once a relevant article is identified", "Call search_articles repeatedly with different keyword variations until something relevant turns up", "Escalate to a human immediately whenever there's any doubt, skipping the article check", "Copy the entire article catalog into the system prompt at the start of every conversation so it never needs to be looked up again"], "correct": [0], "explanation": "The catalog resource exists specifically so an agent can check what's available without repeated exploratory calls, so reading it once to confirm category coverage, then calling the search tool only when actually retrieving content, is the efficient and reliable path. Repeating keyword guesses against the search tool is exactly the exploratory-call pattern the resource is meant to replace. Escalating immediately on any doubt skips the very check the policy requires and undermines the goal of resolving issues without unnecessary escalations. Embedding the entire catalog permanently in the system prompt bloats every single conversation with content that's only needed for occasional checks, and goes stale the moment the catalog changes."}, {"id": "F-D2-B3-18", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "medium", "question": "A new architect on a code-generation team is documenting how project-scoped .mcp.json and user-scoped ~/.claude.json differ, to guide where future MCP servers should be added. Which statements correctly describe this distinction? Select all that apply.", "options": ["Project-scoped .mcp.json is meant to be committed to version control so the whole team gets the same configured servers", "User-scoped ~/.claude.json is where an individual adds a personal server integration that shouldn't affect teammates", "Project-scoped .mcp.json supports environment-variable expansion so secret values don't need to be committed in plaintext", "User-scoped ~/.claude.json is version-controlled alongside the project so the whole team automatically inherits each person's personal servers", "Project-scoped .mcp.json cannot reference environment variables, so any secret a server needs must be pasted directly into the file"], "correct": [0, 1, 2], "explanation": "Project-scoped configuration is designed to be shared and version-controlled so every teammate gets the identical set of servers, user-scoped configuration is where personal, individual integrations belong without leaking to the team, and the project-scoped file supports environment-variable expansion precisely so secrets don't have to be committed as plaintext. The claim that personal configuration is version-controlled and shared with the team has it backwards: that would defeat the purpose of a personal scope. The claim that the shared file can't reference environment variables is also false and contradicts the entire reason env-var expansion is supported there in the first place."}, {"id": "F-D2-B3-19", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "The same .mcp.json, referencing a test-management server via ${TEST_MGMT_API_KEY}, is used both by developers running Claude Code locally and by the CI pipeline running automated code review. What is the most maintainable way to supply the actual key value in both places?", "options": ["Set the TEST_MGMT_API_KEY environment variable separately in each environment, such as developers' local shells and the CI platform's own secret store, while the committed file keeps only the reference", "Maintain two separate committed config files, one with a real key for CI and one with a placeholder for developers", "Paste the real key directly into the CI pipeline's configuration, since pipeline files are usually already private", "Have developers email each other the current key value whenever it changes"], "correct": [0], "explanation": "Env-var expansion is designed exactly for this: one committed file with a variable reference, and each environment supplying its own actual value through whatever mechanism fits it, whether a developer's shell profile or the CI platform's secret store. Maintaining two divergent config files duplicates the server definition and creates a maintenance burden every time the server configuration itself changes, not just the key. Pasting the real key into pipeline configuration commits the same secret into a file that the env-var approach was specifically meant to avoid. Emailing a secret around is neither secure nor scalable and has nothing to do with how .mcp.json is designed to be used."}, {"id": "F-D2-B3-20", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "Onboarding documentation currently just tells new hires to add a server entry to .mcp.json and start working. A new hire adds an entry and, without restarting their already-running Claude Code session, immediately asks Claude to use the new tool, but gets a tool-not-available result. What explanation should be added to the onboarding docs to prevent this confusion?", "options": ["Claude Code determines available MCP tools by connecting to each configured server, so a session that was already running before the edit won't see the new server until a new session connects", "New servers require a two-week review period before they can be used", "The .mcp.json format only supports one server definition at a time", "Tool availability depends on which model tier is currently selected"], "correct": [0], "explanation": "Because tool discovery happens at connection time, an already-running session simply hasn't connected to the newly added server yet: starting a new session is what actually picks up the change, and documenting that expectation directly prevents the confusion described. There's no review-period requirement built into how configuration changes take effect. .mcp.json is not limited to a single server entry, so that isn't the explanation either. Tool availability from a configured server has nothing to do with which model tier is in use; it depends on which servers are connected."}, {"id": "F-D2-B3-21", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "Across several connected MCP servers in a multi-agent research system, the coordinator has noticed Claude periodically calls the wrong tool for a given step, even though a genuinely correct tool exists among the ones available. As a general first lever, before considering removing tools or restructuring the agent, what most directly improves tool-selection accuracy?", "options": ["Improving the clarity and specificity of each tool's description, since that's the primary signal Claude uses when choosing which tool to call", "Increasing the temperature setting so Claude explores more options before deciding", "Alphabetizing the tool names so they appear in a consistent order", "Adding more tools that overlap in function, so there's a better chance one of them matches"], "correct": [0], "explanation": "Tool descriptions are the primary signal Claude relies on for selection, so sharpening unclear or overlapping descriptions is the most direct lever for improving accuracy before reaching for bigger structural changes. Raising temperature increases variability in output rather than improving the agent's understanding of which tool fits which situation. Alphabetizing tool names has no bearing on what a tool does or when it should be used. Adding more overlapping tools makes selection harder, not easier, since it gives Claude more similar options to distinguish between rather than fewer, clearer ones."}, {"id": "F-D2-B3-22", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "For a multi-agent research system's web-search subagent, two designs are on the table: adopt an existing, actively maintained community MCP server for a well-known external search API, or have the team build and maintain an equivalent one in-house instead, out of an abundance of caution. Assuming the community server already meets requirements, what is the strongest architectural reason to prefer adopting it?", "options": ["It avoids taking on ongoing, duplicate engineering and maintenance cost for functionality the community already builds and keeps current", "An in-house build is inherently less secure than a community server, no matter how it's written", "The community server requires no configuration once it's installed", "An in-house build would automatically produce better tool descriptions than the community server, since the team wrote it"], "correct": [0], "explanation": "The real cost being avoided is the duplicated, ongoing engineering effort of building and maintaining functionality the community has already solved and continues to update, letting the team spend that effort on integrations unique to their own domain instead. Claiming an in-house build is inherently less secure overstates the case; security depends on how either option is implemented and reviewed, not on who wrote it. Every MCP server, community or custom, still needs to be configured, including connection details, scope, and any required credentials, so no configuration needed isn't accurate. And writing something in-house doesn't automatically produce better tool descriptions; description quality depends on the effort put into it, not on authorship."}, {"id": "F-D2-B3-23", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "While exploring an unfamiliar legacy codebase, an engineer connects an MCP server for the company's internal API gateway. Rather than one tool per internal endpoint, the server exposes a small set of tools, such as invoke_endpoint, plus a resource that enumerates all available endpoints along with their names, methods, and parameter schemas. Why is exposing the endpoint catalog as a resource preferable to requiring a list_endpoints tool call followed by a describe_endpoint tool call for each endpoint Claude is curious about?", "options": ["The catalog is available as directly readable content without a round trip of tool calls, cutting the exploratory back-and-forth needed just to learn what exists before real work starts", "It removes the need for the gateway to authenticate any of the invoked requests", "It guarantees the set of endpoints will never change again", "It lets Claude skip reading parameter schemas entirely and guess argument types instead"], "correct": [0], "explanation": "Exposing the catalog as a resource means the full picture of available endpoints, methods, and parameter schemas is available up front as content, rather than needing a tool call per endpoint just to browse, which is exactly the exploratory overhead resources are meant to cut down. Authentication for actually invoking an endpoint is a separate concern from how the catalog of endpoints is discovered. Nothing about exposing a catalog as a resource freezes the underlying endpoints from ever changing: it just changes how they're discovered at a point in time. And having the catalog available should make it easier, not more tempting, to read real parameter schemas rather than guess at argument types."}, {"id": "F-D2-B3-24", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A repository's .mcp.json includes a shared internal-lint-service MCP server used during code review by every full-time engineer. A short-term contractor needs a personal connection to a sandboxed copy of that same lint service to test changes before proposing them, without changing what any full-time engineer sees. What is the best way to set this up?", "options": ["Configure the sandboxed variant in the contractor's own ~/.claude.json, leaving the shared project .mcp.json untouched", "Comment out the shared entry in .mcp.json while the contractor is testing, then restore it afterward", "Open a pull request that temporarily points the shared server's endpoint at the sandbox instead", "Have the contractor clone the entire repository into a second copy just to isolate this one server"], "correct": [0], "explanation": "A personal variant meant only for one person's testing belongs in user-level configuration, which by design doesn't affect what teammates see. Commenting out the shared entry, even temporarily, breaks the lint service for every other engineer during that window. Repointing the shared server at a sandbox endpoint has the same problem: it changes what the whole team connects to for the sake of one person's testing. Duplicating the entire repository is far more overhead than the situation calls for, when user-level configuration already solves it directly."}, {"id": "F-D2-B3-25", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "After a compromised API key referenced as ${SERVICE_API_KEY} in a project's .mcp.json was rotated, no changes to any committed file were needed. Every teammate picked up the new key automatically the next time they started a session, once the new value was set in their own environment. What property of the configuration made this possible?", "options": ["The file references the secret indirectly through environment-variable expansion rather than embedding the literal value, so only the out-of-band value had to change, not the committed configuration", ".mcp.json regenerates itself automatically on a fixed schedule", "The MCP server itself stores no state between requests", "Claude Code centrally stores and automatically rotates every secret on the team's behalf"], "correct": [0], "explanation": "Because the committed file only ever held a reference to a variable name, rotating the actual key just meant updating that variable's value in each person's environment: the tracked configuration never had to change at all. There's no automatic regeneration mechanism for .mcp.json; the file only changes when someone edits and commits it. Whether the server itself is stateless has nothing to do with how a client picks up a new key value. And Claude Code doesn't centrally manage or rotate secrets on a team's behalf; supplying and rotating the actual values is left to whatever environment or secret store each person or system uses."}, {"id": "F-D2-B3-26", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A developer updates the connection URL for an internal MCP server in the project's .mcp.json to point at a newly migrated staging environment, then keeps working in their already-open Claude Code session and is confused that requests still seem to hit the old environment. What should they do to actually pick up the change?", "options": ["Start a new session so Claude Code reconnects to the server, since its configuration and resulting tool set are established at connection time", "Edit the system prompt to mention the new URL", "Wait for the context window to fill up and auto-compact", "Rename the server's entry in .mcp.json"], "correct": [0], "explanation": "Server configuration is read and the tool connection established when Claude Code connects, so a session that's already running keeps using whatever it connected to originally: starting a new session is what actually picks up the updated URL. Mentioning the new URL in the system prompt doesn't change which server connection the running session is actually using underneath. Compaction manages context length, not server connections, and has no effect on which environment is being reached. Renaming the entry doesn't address the reconnection issue and could just as easily break other references to that server."}, {"id": "F-D2-B3-27", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A community MCP server for a document-conversion API exposes a convert_document tool with a format parameter, used as part of a structured-data-extraction pipeline. Its description doesn't mention that format must be one of a small fixed set of accepted strings, so Claude sometimes passes free-text format names that fail validation. What is the most targeted improvement?", "options": ["Enrich the tool's description to explicitly enumerate the accepted format values and note that it's a closed set, so Claude has what it needs to pass a valid value on the first attempt", "Add a loop that retries convert_document with a randomly chosen different format string whenever the first attempt fails", "Switch the extraction workflow to a larger model so it guesses more accurately", "Wrap every call to convert_document in a try/except that silently swallows failures"], "correct": [0], "explanation": "The description simply doesn't tell Claude that format is a closed set of specific values, so listing those accepted values directly closes the actual information gap causing the failures. Randomly retrying with a different guessed format doesn't use any real information and could easily keep failing or produce a nonsensical result. A larger model doesn't help when the needed information, the valid set of values, is absent from the tool's own description. Silently swallowing failures hides the problem rather than fixing it, and would let bad conversions or missing output pass through unnoticed."}, {"id": "F-D2-B3-28", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "hard", "question": "An architecture team spanning a structured-data-extraction pipeline and a multi-agent research system is deciding when an MCP resource exposing a content catalog is the stronger design choice compared to relying only on tool calls for discovery. In which of the following situations is a resource-based catalog the stronger choice? Select all that apply.", "options": ["The content is fairly stable and can be enumerated up front, such as a fixed set of document templates or schemas, so the agent benefits from seeing it as a whole rather than probing item by item", "Agents have been issuing many sequential list-then-fetch-details tool calls just to figure out what exists before they can even begin the actual task", "Several different subagents repeatedly need the same overview of available content, so paying the discovery cost once and reusing it is cheaper than each one re-discovering it through tool calls", "The content changes unpredictably on every single request, so a snapshot would already be stale by the time it's read, but exposing it as a resource is still the right call regardless", "The server exposes exactly one tool with exactly one possible call, so a catalog resource is required in order to tell it apart from other tools"], "correct": [0, 1, 2], "explanation": "A resource-based catalog pays off when content is stable enough to be usefully enumerated up front, when agents were previously burning many exploratory tool calls just to learn what exists, and when the same overview would otherwise be rediscovered redundantly by multiple subagents. Content that changes unpredictably on every request undercuts the whole premise of a catalog snapshot, since it would be stale immediately: that situation argues against a resource, not for one regardless. And a server with a single, unambiguous tool has no discovery problem to solve in the first place, so a catalog resource isn't required for anything there."}, {"id": "F-D2-B3-29", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An automated PR-review workflow running in CI needs to post comments back to the team's issue-tracking SaaS product, which already has a well-supported community MCP server. An engineer suggests instead having the CI script shell out to raw curl commands against the tracker's REST API from inside a Bash tool call, arguing it's simpler. What is the strongest tool-design downside of bypassing the MCP server this way?", "options": ["It gives up a structured, well-described tool interface in favor of ad hoc shell commands that Claude has to construct correctly from prose instructions every time, instead of a clear tool contract with its own description and inputs", "curl is technically unable to authenticate to SaaS REST APIs", "Bash tool calls are always slower to execute than MCP tool calls", "Shell commands are inherently more secure than MCP servers because they avoid MCP entirely"], "correct": [0], "explanation": "The real cost is losing the describable, discoverable interface a maintained MCP server provides, including clear inputs, a purpose-specific description, and consistent behavior, and replacing it with raw shell commands Claude has to get right from instructions each time rather than from a well-defined tool contract. curl is fully capable of authenticating to REST APIs, so that isn't a real limitation. There's no general basis for claiming Bash tool calls are always slower than MCP tool calls. And bypassing MCP doesn't ma
