ause hooks can only be used for data formatting, not for blocking actions.", "The hook, because no matter how forcefully worded, a prompt instruction is still followed probabilistically and can still fail under the right conditions, while a hook enforces the rule in code with no dependence on the model choosing to comply."], "correct": [3], "explanation": "The common failure mode with prompt-only enforcement is that it remains probabilistic no matter how it's phrased, while a hook is deterministic code that doesn't depend on the model's compliance at all. Stronger wording can help at the margin but never reaches a guaranteed zero failure rate, which is the actual claim being tested here. Treating the two as equivalent ignores the fundamental difference between language the model may or may not follow and code that always runs. Hooks are not limited to formatting, the same mechanism can intercept and block a tool call, which is exactly what's needed here."}, {"id": "F-D1-B4-31", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A developer productivity agent is expected to always convert tool output file sizes to a consistent unit before displaying a comparison table to the user. Relying on a prompt instruction telling the model to remember the conversion every time works well early in a session but degrades as the conversation grows longer and more tool results accumulate. What does this pattern illustrate, and what is the better fix?", "options": ["It illustrates that prompt-based instructions are probabilistic and can degrade as context grows; a PostToolUse hook that normalizes units immediately after each tool call guarantees consistency regardless of session length.", "It illustrates that the model needs a larger context window, and the fix is switching to a model tier with more context capacity.", "It illustrates that the instruction was worded ambiguously, and the fix is to define the target unit more precisely in the prompt.", "It illustrates a normal, expected limitation with no real fix beyond periodically reminding the model mid-conversation."], "correct": [0], "explanation": "This names both the cause, probabilistic compliance that becomes less reliable as context grows, and the deterministic fix, a hook applied at the moment each tool returns, independent of conversation length. A larger context window doesn't address the actual issue, which is compliance with an instruction, not available context space. Wording was never the ambiguous part of the problem, since the model already converts correctly early in the session, so redefining the unit more precisely won't change the degradation pattern. Treating this as unfixable overlooks the deterministic option that directly solves it."}, {"id": "F-D1-B4-32", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "After successfully using a hook to guarantee that CI merges never proceed without a passing test result, an engineer proposes handling every remaining CI judgment call the same way, including deciding how much explanatory detail a PR review comment should include for a minor style nit versus a significant architectural concern. Why is this proposal likely to be a poor fit for a hook?", "options": ["Hooks cannot run on CI systems at all, so the proposal is technically impossible.", "Deciding how much explanatory detail a comment needs is a nuanced, context-dependent judgment call rather than an objective, programmatically checkable condition, so it is better suited to model reasoning guided by clear criteria in the prompt than to a deterministic hook.", "Hooks can only block actions, so they are incapable of ever running alongside a code-review workflow.", "Adding more hooks always increases the false-positive rate of a code-review pipeline, regardless of what the hook checks."], "correct": [1], "explanation": "Hooks excel at objective, checkable conditions like whether tests passed, but a subjective judgment like how much detail a comment deserves doesn't reduce to a simple deterministic rule and is better left to guided model reasoning. Hooks are clearly not incompatible with CI systems, since the merge-gating example in the same scenario already shows one working there. Hooks can do more than block actions, including normalizing data, so that claim about their capability is factually wrong. A higher false-positive rate isn't an inherent property of hooks either, a hook enforcing an objective rule doesn't make unrelated subjective judgment calls any worse."}, {"id": "F-D1-B4-33", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "An architect is deciding which of the following rules to enforce with a deterministic hook rather than leaving them to prompt-only guidance. Which of these are good candidates for a hook? (Select all that apply.)", "options": ["Blocking any refund request that exceeds the customer's verified order total", "Normalizing inconsistent date formats returned by two different MCP tools before they reach the model's context", "Choosing which of two grammatically correct phrasings sounds warmer in an apology message to a frustrated customer", "Blocking any Write tool call whose target path falls outside the project's allowed directory", "Choosing the friendliest way to explain a delay to a customer who has already escalated twice"], "correct": [0, 1, 3], "explanation": "The three winning cases all share an objective, mechanically checkable condition: a numeric comparison against a verified total, a fixed reshaping of one data format into another, and a path-prefix check, which is exactly what a hook can enforce with certainty. Choosing warmer phrasing or the friendliest way to explain a delay are subjective, context-dependent judgment calls with no single correct answer to check against, so they remain better suited to guided model reasoning than to a deterministic hook."}, {"id": "F-D2-B1-01", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A team builds an MCP server for a support agent with tools named get_customer, lookup_order, process_refund, and escalate_to_human. Two engineers debate whether Claude picks the right tool mainly based on the tool's function name in the server's code or something else exposed to the model. Which statement is accurate?", "options": ["Claude selects tools primarily based on the order in which they are listed in the tools array, so placing the most important tool first resolves most selection issues.", "Claude selects tools primarily based on the internal function or variable names used in the server's implementation code, which the model can inspect directly.", "Claude selects tools primarily based on the natural-language description attached to each tool, so vague or generic descriptions are the most common cause of wrong tool selection.", "Claude selects tools primarily based on how recently each tool was added to the MCP server, favoring newer tools over older ones."], "correct": [2], "explanation": "Tool descriptions are the primary signal Claude uses to decide which tool to call and when, since the model never sees the server's implementation code, so clear and differentiated description text matters far more than internal naming. Ordering in the tools array and how recently a tool was added have no defined effect on selection. Treating the model as though it reads server-side source code confuses what's actually exposed to it, which is only the name, description, and input schema."}, {"id": "F-D2-B1-02", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "In the support agent's MCP server, both get_customer and lookup_order currently have descriptions that just say 'Retrieves account information.' Logs show Claude frequently calls lookup_order when it actually needs to verify who the customer is, and vice versa. What is the most effective fix?", "options": ["Rewrite each description to state precisely what each tool returns, what inputs it needs, and example queries that map to it, so the two tools are clearly differentiated.", "Keep the descriptions as they are but add a longer system prompt section listing every possible customer scenario and which tool applies to it.", "Remove lookup_order from the toolset entirely so Claude is forced to rely on get_customer for all requests.", "Rename both tools to shorter one-word names so Claude has less text to parse before deciding."], "correct": [0], "explanation": "The two tools are colliding because their descriptions are nearly identical and uninformative, so making each description specific about purpose, required inputs, and example queries directly fixes that overlap. Shifting the burden onto an ever-growing system prompt is a workaround that doesn't scale and still leaves the underlying descriptions ambiguous. Deleting a needed tool or shortening names to single words removes information rather than adding the differentiation that's actually missing."}, {"id": "F-D2-B1-03", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A developer joins a new team and needs to find every place in a 40,000-file legacy repository where a specific configuration key, MAX_RETRY_COUNT, is referenced, regardless of which file it appears in. Which built-in tool is the right first choice for this task?", "options": ["Glob, because it can match the string MAX_RETRY_COUNT as a wildcard pattern against every file in the repository.", "Read, because opening each file individually is the most reliable way to confirm whether the configuration key appears in it.", "Write, because updating the files directly is faster than first locating every occurrence.", "Grep, because the task is a content search for a text pattern across files rather than a search for files matching a name pattern."], "correct": [3], "explanation": "Finding a text pattern's occurrences across many files is exactly what Grep is for, while Glob matches file paths and names rather than file contents, so it can't locate a string inside files. Reading every file one at a time to search for a string would be enormously slow and defeats the purpose of a dedicated search tool, and writing changes before even locating the references is premature and risky."}, {"id": "F-D2-B1-04", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "While refactoring a JavaScript project with Claude Code, a developer wants to find every test file in the repository, knowing that test files always end in .test.js but not caring yet what's inside them. Which tool best fits this need?", "options": ["Grep with a pattern like **/*.test.js, since it is the tool designed to match file naming conventions.", "Glob with a pattern like **/*.test.js, since the task is locating files by name and path pattern rather than searching file contents.", "Read applied to the project root, since it will return a directory listing of every matching file.", "Edit with a pattern targeting .test.js, since it can rename matching files in place."], "correct": [1], "explanation": "Glob is built for matching file paths against patterns like **/*.test.js, which is precisely what's needed when the goal is locating files by name rather than inspecting contents. Grep searches inside file contents for text patterns rather than matching file paths, so a glob-style pattern isn't its purpose. Read opens the contents of a specific file rather than listing files, and Edit performs targeted text replacement inside a file's contents rather than renaming or discovering files."}, {"id": "F-D2-B1-05", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A research coordinator delegates to subagents equipped with web_search and document_analysis tools. Both tool descriptions currently read 'Finds information relevant to the query.' The coordinator often invokes document_analysis for requests that clearly need a live web lookup, and vice versa. What should the team change first?", "options": ["Rewrite each tool's description to specify its actual data source, the kind of query it handles well, and example inputs, so the two are no longer functionally indistinguishable to the model.", "Merge the two tools into a single find_information tool so the coordinator no longer has to choose between them.", "Add a retry loop so that if one tool returns unhelpful results, the coordinator automatically tries the other tool next.", "Reduce the randomness in the coordinator's model output so tool selection becomes more deterministic."], "correct": [0], "explanation": "The root cause is that both descriptions are identical boilerplate that gives the model no way to distinguish a live web search from analysis of already-retrieved documents, so specific, differentiated descriptions with example inputs address the actual problem. Merging the tools removes the distinction Claude needs rather than restoring it, and a retry-after-failure loop only papers over misselection instead of preventing it. Adjusting output randomness does not fix descriptions that are genuinely ambiguous, since no amount of determinism resolves a coin-flip choice between two identically described options."}, {"id": "F-D2-B1-06", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "Claude Code attempts to use the Edit tool to change a single line inside utils.py, but the operation fails because the anchor text it supplied for the old code appears six times in the file, at six different unrelated functions. What is the most appropriate next step?", "options": ["Retry the identical Edit call repeatedly, since Edit will eventually apply to the correct occurrence given enough attempts.", "Switch to Grep to delete the five unwanted occurrences directly, since Grep can modify file contents once it locates a match.", "Read the full file to see all six occurrences in context, then either supply a longer anchor that includes enough surrounding lines to be unique, or fall back to reading the whole file and writing back the complete corrected version.", "Use Write to create a brand-new file containing only the single corrected line, replacing utils.py entirely."], "correct": [2], "explanation": "When an Edit anchor isn't unique, the correct pattern is to read the file for full context and either broaden the anchor with enough surrounding text to identify the right occurrence, or fall back to Read plus Write to replace the whole file's contents deliberately. Retrying the same ambiguous Edit call doesn't change the ambiguity and will keep failing or risk editing the wrong occurrence. Grep is a read-only search tool and cannot modify files, and overwriting the entire file with just one line would destroy all the other functions it contains."}, {"id": "F-D2-B1-07", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A structured-extraction pipeline gives Claude two MCP tools: extract_line_items and extract_summary_totals. Both descriptions currently just restate their names with no further detail. Claude sometimes calls extract_summary_totals on invoices that have no totals section, returning empty or nonsensical output. Which addition to the tool descriptions would most directly reduce this failure?", "options": ["A longer, more formal legal disclaimer in each description clarifying that the vendor is not responsible for extraction errors.", "Example queries and explicit notes on the edge cases each tool handles, including what to expect when the expected section is absent from a document.", "The exact programming language and internal library used to implement each extraction function.", "A numeric version identifier appended to each tool's name so Claude can track which release of the tool it is calling."], "correct": [1], "explanation": "Adding concrete example queries plus explicit edge-case guidance, such as what happens when a totals section doesn't exist, gives Claude the information it needs to decide when a tool applies and what to do when the expected input isn't present. A disclaimer about liability has no bearing on tool selection or behavior. Implementation language and version numbers are internal details that don't help the model decide which tool fits a given document, since Claude reasons over the description text rather than the underlying code or version metadata."}, {"id": "F-D2-B1-08", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A developer is dropped into an unfamiliar 200,000-line legacy codebase and asked to trace how a payment webhook flows from the HTTP handler through to the database write, before making any changes. Which approach builds an accurate understanding most efficiently?", "options": ["Read every file under the src/ directory from top to bottom in alphabetical order to build a complete mental model before searching for anything specific.", "Use Write to annotate every file in the codebase with inferred comments describing what each function probably does, then review the annotations.", "Skip exploration and ask a teammate to just describe the code flow verbally, since built-in search tools are not reliable for large codebases.", "Use Glob to map the relevant directory structure, then Grep for the webhook route and key function names to find the files involved, then Read only the specific files and sections that turn up, narrowing further as understanding builds."], "correct": [3], "explanation": "Building understanding incrementally, with broad structural discovery through Glob, targeted content search through Grep to find the relevant call sites, and then focused reads of only the files that matter, scales to large codebases and converges quickly on the actual flow. Reading every file sequentially wastes enormous effort on irrelevant code and doesn't prioritize the parts relevant to the webhook path. Writing speculative comments into files the developer doesn't yet understand risks introducing incorrect documentation, and dismissing built-in search tools ignores that Grep and Glob are specifically designed for this kind of large-codebase discovery."}, {"id": "F-D2-B1-09", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "The support agent's escalate_to_human tool has a well-written description explaining it should only be used for policy exceptions, ambiguous cases, or explicit customer requests for a human. Despite this, Claude escalates nearly every ticket immediately. Investigation reveals the system prompt contains the line: 'When in doubt, hand the customer off to a human agent.' What is the most likely explanation and fix?", "options": ["Broad system-prompt wording is overriding the more precise tool description; narrowing the system-prompt instruction to match the tool's actual intended triggers should restore appropriate selection.", "The escalate_to_human tool's description is too long for Claude to process, so shortening it to a single sentence will fix the over-escalation.", "Claude cannot read tool descriptions and system prompts at the same time, so one of the two must be deleted entirely.", "The MCP server is returning a malformed schema for escalate_to_human, which forces Claude to default to that tool on every turn."], "correct": [0], "explanation": "General, blanket system-prompt phrasing like handing off to a human whenever in doubt competes with and can override a carefully scoped tool description, so aligning the system prompt's wording with the tool's actual intended triggers is the direct fix. The tool's description length isn't the issue described, and Claude does process both system-prompt instructions and tool descriptions together rather than being forced to ignore one. Nothing in the scenario suggests a schema error, since the symptom of immediate escalation matches an instruction conflict rather than a malformed tool definition."}, {"id": "F-D2-B1-10", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An automated code-review setup asks Claude to flag every call site that still uses a deprecated formatDate helper before a PR can merge, across a monorepo with thousands of files. Which built-in tool should Claude reach for first to build the list of call sites?", "options": ["Glob, searching for files named formatDate.js since that will surface every place the function is used.", "Edit, applying a blind find-and-replace of the function call across the whole repository before confirming where it's actually called.", "Grep, searching for the literal call text across the repository to locate every call site regardless of which file it's in.", "Write, generating a brand-new helper file and assuming existing call sites will automatically pick it up."], "correct": [2], "explanation": "Locating every call site of a specific function name is a content search across many files, which is exactly what Grep is designed for. Searching for a file literally named formatDate.js with Glob would miss every call site in other files that merely invoke the function, since that searches file paths rather than contents. Editing before confirming where the calls actually are risks incorrect blind replacements, and simply writing a new helper file does nothing to identify or update the existing call sites that need review."}, {"id": "F-D2-B1-11", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A multi-agent research system gives its synthesis subagent a summarize_sources tool. The team wants to prevent Claude from ever calling this tool as a substitute for actually fetching new sources when coverage is thin. What is the simplest effective way to convey this in the tool's design?", "options": ["Give the tool a deliberately intimidating name like DO_NOT_MISUSE_summarize_sources so Claude hesitates before calling it.", "State an explicit boundary in the tool's description, such as noting it should be used only after sources have been gathered and should not be used to compensate for insufficient source coverage.", "Remove the tool's description entirely so Claude has no guidance and must infer correct usage from trial and error.", "Require that the tool always be the last one called in every session, regardless of the task."], "correct": [1], "explanation": "Explicitly stating the tool's boundaries, meaning what it should not be used for, directly communicates the intended constraint using the same channel Claude relies on for tool selection. An alarming name is not a substitute for a clear boundary statement and can just add noise. Removing the description entirely eliminates the very signal that guides correct use, and forcing a fixed call order regardless of task context doesn't address when the tool is or isn't appropriate to invoke."}, {"id": "F-D2-B1-12", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A developer asks Claude Code to reformat an entire 80-line configuration file, reordering keys, changing indentation style, and renaming several fields, such that nearly every line changes. Which approach is most appropriate?", "options": ["Read the file to see its current contents, then use Write to save the complete, newly formatted version, since the change touches nearly the whole file rather than a small, isolated location.", "Use Edit with the entire original file content as the anchor text and the entire new content as the replacement, since Edit is required for any change to an existing file.", "Call Edit eighty separate times, once per line, to individually replace every line in sequence.", "Use Grep to locate the file and rely on its output to perform the reformatting automatically."], "correct": [0], "explanation": "When a change touches most of a file's content rather than a small, targeted location, reading the file and writing back the complete new version is more direct and reliable than forcing the change through an anchor-based edit. Using the entire file as an Edit anchor works against the tool's purpose of small, targeted changes and offers no benefit over Read plus Write here. Issuing eighty individual edits is needless overhead for a change touching nearly every line, and Grep only searches and reports matches, with no ability to modify file contents."}, {"id": "F-D2-B1-13", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "medium", "question": "A team is writing the description for the support agent's process_refund MCP tool. Which of the following additions would genuinely help Claude select and use this tool correctly?", "options": ["A concrete example query, such as a customer wanting a partial refund on a specific order due to a damaged item, showing when this tool applies.", "The exact database table name and column names the tool writes to internally.", "An explicit note on edge cases, such as what happens when the requested refund amount exceeds the original order total.", "A boundary statement clarifying that this tool should not be used for exchanges or store-credit issuance, which are handled elsewhere.", "The average response latency in milliseconds that the tool has historically exhibited in production."], "correct": [0, 2, 3], "explanation": "Example queries anchor the description in realistic usage, edge-case notes tell Claude what to expect from unusual inputs like an over-limit refund amount, and explicit boundaries prevent the tool from being reached for adjacent-but-different tasks like exchanges, all of which directly shape tool selection and correct usage. Internal database schema details are implementation internals the model doesn't need in order to decide when and how to call the tool. Historical latency figures describe operational performance rather than what the tool does or when it's appropriate, so they don't help selection either."}, {"id": "F-D2-B1-14", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A developer wants to find every place a specific SQL query pattern appears, but only within .py files, ignoring the many .sql fixture files in the same repository that happen to contain similar-looking text used only for test data. Which approach is most efficient?", "options": ["Use Glob alone to search for the SQL pattern as if it were a file name, since Glob supports matching arbitrary text content.", "Use Grep with no filter, then manually read through every result to mentally discard the ones from .sql files.", "Use Read on every .py file in the repository sequentially, checking each one for the pattern by eye.", "Use Grep with a file-type or path filter restricting the search to .py files, so the content search only scans relevant source files."], "correct": [3], "explanation": "Grep supports narrowing a content search to specific file types or path patterns, so filtering to .py files directly targets the relevant source files and skips the noisy fixtures in one step. Glob matches file paths and names rather than arbitrary text inside files, so it cannot search for a SQL pattern as content. Searching without a filter and manually discarding irrelevant matches works but wastes effort the tool's own filtering could have avoided, and reading every Python file sequentially by eye is far slower than a targeted content search built for exactly this purpose."}, {"id": "F-D2-B1-15", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A document-processing MCP server exposes a single manage_document tool that accepts an action parameter of extract, validate, or archive, all bundled into one description that briefly mentions all three behaviors. Claude frequently sets the wrong action value or omits it, producing failed calls. What is the most effective structural fix?", "options": ["Keep the single tool but triple the length of its description by pasting in the full internal implementation source code for all three actions.", "Split the tool into three separate tools, one each for extracting, validating, and archiving a document, each with its own focused description, inputs, and example queries.", "Keep the single tool and instruct Claude, only in the system prompt, to always guess the extract action if unsure which action to use.", "Remove the action parameter's description entirely so Claude is not distracted by conflicting guidance about the three behaviors."], "correct": [1], "explanation": "When a single tool bundles multiple distinct behaviors behind a parameter Claude has to infer correctly, splitting it into separate, purpose-specific tools with their own descriptions removes the ambiguity at its source, since each tool's presence and description now signal exactly one behavior. Pasting in implementation source code adds length without adding guidance the model can act on, and doesn't resolve which action applies. Defaulting to a guessed action via system-prompt instruction just papers over misselection with a probabilistic guess rather than fixing the design, and removing the parameter's description entirely deletes information rather than clarifying it."}, {"id": "F-D2-B1-16", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "Claude Code needs to update a return value inside one specific function in handlers.py. It supplies 'return None' as the anchor for an Edit call, but the file contains that exact line in twelve different functions. The operation correctly fails rather than guessing. What should Claude do next?", "options": ["Expand the anchor to include several lines of unique surrounding context, such as the enclosing function's signature and a nearby comment, so the anchor uniquely identifies the intended location, or fall back to Read plus Write if that's cleaner.", "Lower the specificity of the anchor even further, using just the word None instead of the full line, so the match is more likely to succeed.", "Insert a new function above the file solely to change the count of matching occurrences from twelve to eleven.", "Repeat the exact same Edit call a second time, since Edit tools apply changes to a random matching occurrence on retry."], "correct": [0], "explanation": "The fix for a non-unique anchor is to add enough surrounding context, such as the function signature or a nearby comment, that the anchor text becomes unique to the intended location, or to fall back to reading the whole file and writing back the corrected version when that's simpler. Making the anchor even shorter and less specific moves in exactly the wrong direction and guarantees more matches, not fewer. Inserting an unrelated function to shift the occurrence count is a fragile, indirect workaround that doesn't reliably target the right location, and a non-unique anchor is precisely the failure mode that needs to be resolved rather than retried unchanged."}, {"id": "F-D2-B1-17", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "The process_refund tool's description explains its normal use but says nothing about what happens if a customer requests a refund on an order that was already fully refunded. In practice, Claude sometimes calls the tool anyway and gets an unexpected result it doesn't know how to interpret. What should be added to the description to address this?", "options": ["A requirement that the tool description be translated into every language the support team operates in, regardless of the runtime language used.", "A note instructing Claude to always call process_refund twice in a row to double-check the result.", "Explicit guidance on this edge case, describing what the tool does when called on an already-refunded order, so Claude knows what to expect and how to respond.", "Instructions to ignore any result returned by process_refund that doesn't match the happy-path example in the description."], "correct": [2], "explanation": "Naming the specific edge case of an already-refunded order and describing the expected behavior gives Claude a way to recognize and handle that situation correctly instead of encountering unexpected output with no guidance. Translation into multiple languages doesn't address the missing behavioral information at all. Calling the tool twice in a row could trigger a duplicate refund attempt rather than clarify anything, and telling Claude to disregard any non-happy-path result would cause it to ignore legitimate edge-case responses instead of handling them appropriately."}, {"id": "F-D2-B1-18", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A developer opens a repository they've never seen before and wants a quick sense of its overall structure, such as top-level directories and where source code lives versus tests versus config, before doing any targeted searching. Which built-in tool is best suited to this very first step?", "options": ["Glob, using broad patterns to enumerate directories and file types and get an overview of how the project is laid out.", "Grep, searching for the word function across the entire repository to infer where the source code is concentrated.", "Edit, applying a placeholder change to a random file to see what happens.", "Write, creating a new top-level file that lists the developer's own notes about the repository as they explore."], "correct": [0], "explanation": "Glob is well suited to a first structural pass, since broad path patterns quickly reveal how a repository is organized before any specific content search is needed. Grep searches file contents for a pattern and is a much noisier, less direct way to infer structure than simply listing paths. Making a speculative edit to a random file risks unintended changes to code the developer doesn't yet understand, and writing personal notes into the repository is a separate task from building understanding of the existing layout."}, {"id": "F-D2-B1-19", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A research coordinator has two subagent tools called search and search_documents. Despite reasonably detailed descriptions, Claude consistently confuses which one to call, because the near-identical names bias its selection even when the description text differs. What change directly addresses this specific failure mode?", "options": ["Make both descriptions even longer, adding several more paragraphs of detail to each without changing either name.", "Alphabetize the tool list so search always appears before search_documents in the tools array.", "Add a disclaimer at the end of each description simply stating that the tool is different from the other search tool.", "Rename the tools to names that reflect their distinct purposes, such as search_the_web and search_uploaded_documents, so the names themselves reinforce rather than undercut the differentiated descriptions."], "correct": [3], "explanation": "When near-identical names undercut otherwise-clear descriptions, renaming the tools so the names themselves signal the distinction reinforces correct selection instead of working against it, which is the fix-overlap-by-renaming pattern. Simply lengthening already-adequate descriptions doesn't address a naming collision and adds more text to parse without resolving the actual confusion. Reordering the tools array has no defined effect on which tool the model judges as the better fit, and a vague disclaimer that the tools are different restates that a problem exists without giving Claude the specific differentiating information it needs."}, {"id": "F-D2-B1-20", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "An automated review job needs to assess a 45-file pull request for a regression in error-handling logic, but the CI environment caps how much file content can be loaded into context per run. Which strategy builds sufficient understanding without exceeding that budget?", "options": ["Read every file in the entire repository in full, on the theory that more context always produces a more accurate review.", "Use the diff listing or Glob to identify only the changed files, then Grep within that smaller set for the specific error-handling patterns under review, reading in full only the handful of files and sections that are actually relevant.", "Skip reading any file contents and generate review comments based solely on the pull request title and description.", "Read only the first file in the pull request alphabetically and extrapolate the same findings to the other forty-four."], "correct": [1], "explanation": "Narrowing first to the changed files and then to the specific patterns relevant to the regression under review, reading fully only what actually matters, builds accurate understanding while respecting a limited context budget, which is the incremental, targeted approach the built-in search tools are designed to support. Reading the entire repository in full is exactly what a limited budget can't accommodate and pulls in vast amounts of irrelevant content. Reviewing based only on the title and description ignores the actual code changes entirely, and extrapolating from a single arbitrarily chosen file to the other forty-four has no basis in what those other files actually contain."}, {"id": "F-D2-B1-21", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An extraction pipeline offers both extract_table, for tabular data like line-item grids, and extract_key_values, for label-value pairs like an invoice date field. A new engineer asks how the descriptions should communicate the difference so Claude doesn't default to the same tool for every document. What is the recommended approach?", "options": ["Only one of the two tools should have a description at all; the other should be left blank so Claude falls back to it only when the first one fails.", "Both descriptions should be identical to guarantee consistent behavior regardless of which one Claude happens to pick.", "Each description should state what kind of document layout it's designed for and explicitly reference the other tool, clarifying when to prefer one over the other.", "The descriptions should focus exclusively on the JSON schema of the output format and omit any mention of when each tool applies."], "correct": [2], "explanation": "Describing the layout each tool is designed for and explicitly calling out the alternative gives Claude a direct basis for choosing between genuinely different use cases, and this when-to-use-this-versus-the-alternative framing is exactly what prevents defaulting to one tool for every document. Leaving one tool's description blank removes the very information needed to select it appropriately and produces unpredictable behavior. Making the descriptions identical would recreate the overlap problem being solved rather than prevent it, and focusing only on output schema while omitting usage guidance leaves Claude without the information it needs to decide which tool fits a given document in the first place."}, {"id": "F-D2-B1-22", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "medium", "question": "A developer new to Claude Code is learning when to reach for Grep, Glob, Read, and Edit while fixing a bug in an existing codebase. Which of the following statements about these tools are correct?", "options": ["Read should be avoided entirely once a codebase has more than a few hundred files, in favor of exclusively using Grep and Glob.", "Grep is the right choice when the goal is finding which files contain a specific string, function call, or symbol, without yet knowing which files those are.", "Glob is the right choice when the file naming pattern is known but the goal is discovering which files match it, not what's inside them.", "Write is the preferred tool for every change to an existing file, since it always produces a cleaner diff than Edit.", "Edit can be pointed at a general description of the desired change rather than exact existing text, since it will locate the right spot on its own."], "correct": [1, 2], "explanation": "Grep is designed for content search when the matching files aren't yet known, and Glob is designed for discovering files by path or naming pattern rather than content, so both statements describe the tools' intended use correctly. Avoiding Read entirely on larger codebases is wrong, because Read is still necessary to view the full contents of specific files that Grep or Glob identify as relevant, regardless of repository size. Write is not preferable for every change, since for small, isolated edits Edit is the more targeted tool, and using Write for every change risks unintentionally discarding unrelated content or producing a noisier diff. Edit depends on being given the actual existing text as its anchor, and cannot locate a target location from a general description of the desired change, which is why a precise, unique anchor is required rather than optional."}, {"id": "F-D2-B1-23", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A new engineer is about to write the description for a support tool that looks up a customer's order history. Which of the following should the description primarily focus on conveying to Claude?", "options": ["What the tool does, what inputs it expects, and example situations in which it should be called.", "The name of the internal microservice and API endpoint the tool calls behind the scenes.", "The engineering team responsible for maintaining the tool and their internal contact information.", "A changelog of every prior version of the tool's implementation."], "correct": [0], "explanation": "Because tool descriptions are the primary signal Claude uses for selection and correct usage, they should focus on purpose, expected inputs, and example scenarios, which is information the model can actually act on when deciding whether and how to call the tool. Internal service or endpoint names, team ownership details, and version changelogs are operational or organizational metadata that don't help Claude decide when the tool is appropriate or how to use it correctly."}, {"id": "F-D2-B1-24", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A developer exploring an unfamiliar codebase needs to find where a function named calculateShippingCost is defined but has no idea which of the repository's many directories it lives in. Using Glob would require already knowing the file name, which the developer doesn't. What's the most direct approach?", "options": ["Use Glob with the pattern calculateShippingCost.js, assuming the function's file name always exactly matches the function name.", "Use Read on the repository's root README file, since documentation always lists the exact file location of every function.", "Use Write to create a new function with the same name in a new file, avoiding the need to locate the original.", "Use Grep to search file contents for the function's definition, which will surface the file and line regardless of its location."], "correct": [3], "explanation": "Searching for the function's definition text is a content search, which is exactly what Grep is for, and it will find the matching file and line regardless of which directory it's buried in. Assuming a file is always named identically to a function it contains is a fragile guess that frequently fails in real codebases, especially where multiple functions share a file. A README is not guaranteed to document every function's exact location, and creating a duplicate function elsewhere doesn't locate the original or help the developer understand the existing code."}, {"id": "F-D2-B1-25", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A multi-agent research system's synthesis tool has a description stating it should only run once at least three independent sources have been gathered and reviewed. Reports are consistently thin and single-sourced anyway. The system prompt for the coordinator reads: 'Always produce a final report by calling synthesis as your last action.' What's the best fix?", "options": ["Delete the synthesis tool's description entirely so there's no conflicting text for the coordinator to reconcile.", "Revise the system-prompt instruction so it reflects the same source-count condition as the tool description, rather than issuing a blanket directive that overrides it.", "Increase the number of subagents available to the coordinator, since more subagents will automatically produce more sources regardless of instructions.", "Instruct the synthesis subagent, in its own separate system prompt, to silently fabricate two additional plausible-sounding sources whenever fewer than three are found."], "correct": [1], "explanation": "A blanket coordinator instruction to always call synthesis as the final action conflicts with and overrides the tool description's actual precondition, so the fix is to make the system prompt's wording consistent with that condition instead of contradicting it. Deleting the tool description removes useful guidance rather than resolving the conflict, and would leave the coordinator with even less information about when synthesis is appropriate. Simply adding more subagents doesn't guarantee they're actually invoked or that their output is reviewed before synthesis runs, since the coordinator's instruction to always call synthesis last is the actual conflict, and fabricating sources to satisfy a numeric threshold defeats the entire purpose of the precondition while introducing false information into a cited report."}, {"id": "F-D2-B1-26", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "hard", "question": "A senior engineer is reviewing how a junior developer used Claude Code's Edit tool throughout a session. Which of the following observations reflect correct use of Edit versus Read plus Write?", "options": ["Using Edit for a one-line bug fix inside a large file, where the surrounding lines make the anchor text unmistakably unique.", "Falling back to Read plus Write after an Edit call failed because its anchor text matched four different unrelated locations in the file.", "Using Edit repeatedly, once per occurrence, to change a variable name that appears 200 times throughout one file, without ever considering Read plus Write.", "Using Read followed by Write to replace the entire contents of a file when the majority of its lines are changing as part of a rewrite.", "Avoiding Read entirely before every Edit call, on the assumption that Edit does not need any prior context about the file."], "correct": [0, 1, 3], "explanation": "A unique anchor around a small, targeted change is the ideal case for Edit, falling back to Read plus Write when an anchor turns out to be non-unique is exactly the documented recovery path, and reading a file before writing back a full replacement is the right call when most of the file's content is changing anyway. Firing off 200 separate Edit calls for a change that touches nearly the whole file ignores a much simpler Read-plus-Write rewrite and multiplies the chance of errors along the way. Skipping Read before Edit is risky because Edit depends on knowing the exact existing text to anchor on, so proceeding without that context makes it far more likely the anchor is wrong, missing, or accidentally non-unique."}, {"id": "F-D2-B1-27", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A structured-extraction MCP server has two tools, pull_data and get_fields, each described only as 'Gets data from the document.' An engineer is asked to explain why Claude frequently calls the wrong one. What is the most accurate diagnosis?", "options": ["The tools have too few input parameters, and adding more required parameters to each would resolve the selection problem.", "Claude cannot reliably use any tool whose name is shorter than three words, regardless of its description.", "Both descriptions are too generic and nearly identical, giving Claude no meaningful signal to distinguish when each tool applies.", "The order of the two tools' definitions in the MCP server's source file determines which one Claude picks, so reordering them will fix the issue."], "correct": [2], "explanation": "When two tools carry essentially the same vague description, Claude has no textual basis to tell them apart, which is the direct cause of frequent misselection, and the fix is differentiating what each description actually says. Adding more required parameters doesn't address the missing information about when each tool is appropriate and could make both tools harder to call correctly. Tool name length has no bearing on selection reliability, and the order tools happen to be defined in the server's source code isn't a signal Claude uses to choose between them, since the description text is what matters."}, {"id": "F-D2-B1-28", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A developer investigating a bug in an unfamiliar codebase is tempted to immediately read every file in the affected module, around 60 files, to 'get the full picture' before doing anything else. What is the drawback of this approach compared to a more incremental one?", "options": ["It front-loads a large amount of mostly irrelevant content into context before any targeted search has narrowed down which files and lines actually matter to the bug.", "Read is fundamentally incapable of opening more than five files in a single working session, so the plan would fail immediately.", "It guarantees Claude will hallucinate function names, since Read is not permitted to be used on more than one file per task.", "It violates a hard technical limit that prevents any built-in tool from being used more than ten times per session."], "correct": [0], "explanation": "Reading dozens of files before narrowing scope pulls a large amount of likely-irrelevant content into context up front, when a targeted pass with Grep or Glob first would identify the handful of files and sections actually relevant to the bug, building understanding incrementally instead. There's no hard cap on how many files Read can open in a session, no rule limiting Read to a single file per task, and no fixed ten-use ceiling on built-in tools, since the real issue is inefficiency and context bloat rather than a technical restriction being violated."}, {"id": "F-D2-B1-29", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "The get_customer tool's description says it retrieves verified customer identity and account details by customer ID or verified email, and explicitly instructs not to use the tool to look up a customer by name alone since names are not unique identifiers. Despite this, an engineer wants to also add a check elsewhere to guarantee no downstream tool ever proceeds without a verified ID. What does the boundary statement in the description actually provide, and what does it not provide?", "options": ["It guarantees, with the same certainty as a code-level check, that Claude will never attempt a name-only lookup again under any circumstances.", "It has no effect at all on Claude's behavior, since descriptions are only used for human documentation and are never read by the model.", "It automatically blocks the underlying API call at the server level whenever a name-only request is attempted, regardless of what Claude sends.", "It gives Claude probabilistic guidance that reduces incorrect name-only lookups, but it does not guarantee compliance the way a programmatic prerequisite check would."], "correct": [3], "explanation": "A well-written boundary in a tool's description meaningfully shapes Claude's behavior by giving it clear guidance to follow, but like all prompt-level instructions it remains probabilistic, lowering the failure rate without eliminating it, which is why the engineer is right to still want a deterministic safeguard for a critical compliance requirement. Claiming it guarantees compliance with code-level certainty overstates what a description alone can do. Descriptions are read by the model and do influence tool selection and usage, so claiming no effect is incorrect, and the description text itself does not enforce anything at the server or API level, since enforcing that would require an actual programmatic check rather than just wording in the description."}, {"id": "F-D2-B1-30", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A CI review job needs to do two separate things: first, get a list of every test file in the repository, meaning files ending in _test.go, and second, check whether any of those test files still contain a call to a deprecated assertion helper called assertLegacy. Which pairing of tools matches these two steps?", "options": ["Grep to list files matching the _test.go naming pattern, then Glob to search within that set for occurrences of the assertLegacy call.", "Glob to list files matching the _test.go naming pattern, then Grep to search within that set for occurrences of the assertLegacy call.", "Read to list files matching the _test.go naming pattern, then Edit to search within that set for occurrences of the assertLegacy call.", "Write to list files matching the _test.go naming pattern, then Read to search within that set for occurrences of the assertLegacy call."], "correct": [1], "explanation": "Listing files by a naming pattern is a path-matching task suited to Glob, and then searching within that set of files for a specific text pattern is a content search suited to Grep, matching each step to the tool actually designed for it. Swapping the two reverses their purposes, since Grep does not match file paths by naming pattern and Glob cannot search file contents for a string. Read opens file contents but doesn't enumerate files by pattern, and Edit modifies content rather than searching it, so neither of the other pairings performs the two requested steps correctly."}, {"id": "F-D2-B2-01", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A customer support agent calls `lookup_order` for a customer who says they placed an order yesterday. The order-management database is temporarily unreachable, but `lookup_order` catches the connection exception internally and returns an empty result array with no error indicator. The agent then tells the customer that no orders are on file for their account. What is the most effective fix at the tool layer?", "options": ["Have `lookup_order` return `isError` set to true with an errorCategory such as transient when the database connection fails, reserving a plain empty result for the case where the database was reachable and genuinely found no matching orders.", "Have the agent apologize and ask the customer to check back later whenever `lookup_order` returns zero results.", "Increase the number of orders `lookup_order` returns per page so fewer queries are needed.", "Add a retry loop in the agent's system prompt instructing it to call `lookup_order` twice before responding."], "correct": [0], "explanation": "The tool conflated an access failure with a legitimate empty result, so only a structured error signal lets the agent distinguish between not being able to check and checking and finding nothing. Telling every zero-result customer to check back later creates needless friction for customers who genuinely have no orders. Changing the page size does not address the underlying failure being silently swallowed. Prompting the agent to retry blindly is probabilistic and does not fix the tool returning a false success signal in the first place; the tool itself must expose the failure."}, {"id": "F-D2-B2-02", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "In a multi-agent research system, the web-search subagent's underlying search API returns an error for a query, but the subagent catches this internally and reports zero results found to the coordinator. The coordinator's final cited report then states that no sources exist on the topic, when in fact the search never actually ran. What change to the web-search subagent's tool would prevent this misleading conclusion?", "options": ["Have the subagent broaden the query automatically and try again with different keywords.", "Return a structured error, with `isError` true and a category indicating a transient service problem, when the search API itself fails, so the coordinator can distinguish between the search running and finding nothing versus the search failing to run at all.", "Instruct the coordinator, via the system prompt, to always assume zero results might be inaccurate.", "Cache the previous successful search results so a failed call can fall back to stale data."], "correct": [1], "explanation": "A search-API failure is an access failure, not evidence that the topic has no sources, and collapsing both into a zero-results report hides that distinction from the coordinator, which then states a false negative as fact. Automatically broadening the query still does not tell the coordinator whether an eventual empty result reflects reality or another failure. A prompt reminder that results might be inaccurate is a probabilistic nudge, not a reliable signal, and the coordinator needs a deterministic flag instead. Falling back to stale cached results could itself mislead the report by mixing outdated data into what should be a fresh answer, which is a different accuracy problem."}, {"id": "F-D2-B2-03", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "The `get_customer` MCP tool occasionally fails because the CRM backend times out under load for a fraction of a second. These failures resolve themselves if the same call is simply attempted again moments later. How should this failure be represented in the tool's structured error response so the agent loop can handle it correctly without human involvement?", "options": ["errorCategory indicating a permission failure, with isRetryable set to false.", "errorCategory indicating a validation failure, with isRetryable set to false.", "errorCategory indicating a transient failure, with isRetryable set to true.", "errorCategory indicating a business-rule failure, with isRetryable set to true."], "correct": [2], "explanation": "A momentary backend timeout that clears up on its own is the textbook definition of a transient error, and marking it retryable lets the agent, or the tool itself, safely retry without escalating to a human. A permission failure implies the credentials or scope are wrong, which retrying will never fix. A validation failure implies the input itself was malformed, which is unrelated to a timing-based backend hiccup. Business-rule failures reflect a deliberate policy outcome, such as a denied request, not a technical retry candidate, and pairing that category with a retryable flag would be internally inconsistent."}, {"id": "F-D2-B2-04", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A customer support agent calls `process_refund` with an order ID typed with a stray space instead of the expected hyphenated format. The tool rejects the call. How should this error be categorized, and what should the agent do next?", "options": ["Categorize it as a transient error and retry the identical call automatically until it succeeds.", "Categorize it as a permission error and immediately invoke `escalate_to_human`.", "Categorize it as a business error and tell the customer that refunds are not available for their order.", "Categorize it as a validation error that is not retryable as-is; the agent should correct the malformed order ID, or confirm it with the customer, before calling the tool again."], "correct": [3], "explanation": "Malformed input is a validation problem, and retrying the exact same call will fail identically every time, so the fix is correcting the input rather than repeating it. Treating it as transient wastes retries on a deterministic failure that will never self-resolve. It is not a permission problem, since no access rights are in question, so escalating to a human misdiagnoses the cause and spends an escalation on something the agent could fix itself. It is also not a business-rule outcome, since the refund policy was never actually evaluated because the call never reached that logic due to the malformed ID."}, {"id": "F-D2-B2-05", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A customer requests a refund for an order placed 45 days ago. Store policy allows refunds only within 30 days. The `process_refund` tool correctly rejects the call and returns a structured error. What errorCategory and isRetryable value best fit this outcome, and what should the agent do?", "options": ["errorCategory business, isRetryable false; the agent should explain the policy outcome to the customer, and consider `escalate_to_human` only if the customer disputes it or a documented exception applies.", "errorCategory transient, isRetryable true; the agent should retry the call periodically until it succeeds.", "errorCategory validation, isRetryable false; the agent should ask the customer to resubmit the order ID in a different format.", "errorCategory permission, isRetryable false; the agent should request elevated credentials before proceeding."], "correct": [0], "explanation": "The refund window has genuinely expired, which is a correctly enforced business rule rather than a technical fault, so it belongs in the business category and is not something retrying will overturn. Treating it as transient and retrying would never succeed, since the 30-day window will not change no matter how many times the call is repeated. It is not a validation problem, since the order ID and other inputs were presumably well-formed and the failure only occurred after the policy check ran. It is also not a permission problem, since the agent's credentials were sufficient to evaluate and correctly reject the request, so no amount of elevated access would change the outcome."}, {"id": "F-D2-B2-06", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "An automated PR-review agent calls a `post_pr_comment` MCP tool to leave feedback on a pull request opened from an external contributor's fork. The tool fails because the bot's credentials only have comment permissions on branches within the main repository, not on forked-repo pull requests. How should this failure be classified, and what is the appropriate response?", "options": ["errorCategory transient, isRetryable true; the agent should retry the identical call a few times since permission systems sometimes take a moment to propagate.", "errorCategory permission, isRetryable false; retrying will not help, and the fix requires either different credentials or scope, or an alternate feedback path such as posting a summary in the CI job log, rather than looping on the same call.", "errorCategory validation, isRetryable false; the agent should reformat the comment text and try again.", "errorCategory business, isRetryable false; the agent should reject the pull request outright."], "correct": [1], "explanation": "The credentials genuinely lack the required scope, so no number of retries will change the outcome, which is the defining feature of a permission error, and the correct response is to find an alternate path or request proper access rather than loop. Treating it as transient invites wasted retries against a failure that is structural rather than timing-related. The comment text's formatting was never the issue, so treating it as a validation error misdiagnoses the cause. Rejecting the pull request conflates a tooling permission gap with a judgment about the code itself, which the failure says nothing about."}, {"id": "F-D2-B2-07", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "A document-fetch MCP tool used by a research subagent occasionally hits a brief network blip when downloading a source PDF; retrying the same fetch immediately almost always succeeds. Currently, the tool returns `isError` true on the very first failure, causing the coordinator to drop that source and note it as unavailable in the final report, even though a repeat attempt seconds later would have worked. What is the most effective fix?", "options": ["Have the coordinator re-run its entire research plan from scratch whenever any single source fails to fetch.", "Remove error reporting from the fetch tool entirely so failures never interrupt report generation.", "Add a small number of local retries with backoff inside the fetch tool itself for transient failures, only returning `isError` to the coordinator if all local attempts are exhausted.", "Instruct the coordinator's system prompt to assume all sources were fetched successfully unless told otherwise."], "correct": [2], "explanation": "Absorbing a brief, self-resolving network blip with local retry-and-backoff at the tool level is exactly what recovering locally before propagating means, and it prevents a source from being dropped over a hiccup that a second attempt would have cleared. Restarting the entire research plan is wildly disproportionate to a single transient fetch failure and wastes the work already completed. Removing error reporting entirely would hide genuine, unrecoverable failures, such as a source that is permanently gone, leaving the coordinator with no way to know a source is actually missing. Telling the coordinator to assume success by default is a prompt-level workaround that produces confidently wrong reports whenever a fetch truly did fail."}, {"id": "F-D2-B2-08", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "medium", "question": "During a Claude Code refactoring session, a custom `run_linter` MCP tool is wired so that any linter output, including single, easily auto-fixable style nits like a missing trailing comma, is returned with `isError` set to true, causing the coding agent to pause and prompt the developer for guidance on every minor nit. What is the best way to fix this tool's error behavior?", "options": ["Keep every linter finding marked as an error, but add a note in the system prompt telling the agent to disregard the errors it judges to be minor.", "Disable the linter tool entirely so refactoring sessions never see style feedback.", "Route every linter finding through a human-escalation step so a person reviews each style nit before the agent proceeds.", "Reserve `isError` true for cases where the linter itself cannot run or produces unusable output, and return trivial style findings as normal structured, non-error results the agent can act on inline."], "correct": [3], "explanation": "Trivial, auto-fixable style findings are normal tool output the agent should simply handle as part of editing, not failures, so reserving the error flag for cases where linting genuinely could not be performed keeps the signal meaningful and stops the agent from pausing on noise. Relying on a prompt instruction to selectively ignore flagged errors is probabilistic and leaves the underlying over-propagation problem in place. Disabling the linter throws away useful signal along with the noise. Escalating every style nit to a human defeats the purpose of an automated refactoring session and would overwhelm reviewers with trivia."}, {"id": "F-D2-B2-09", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A synthesis subagent in a research pipeline is designed to combine findings from multiple sources into a summary. When its underlying summarization call errors out internally, the subagent's tool wrapper catches the exception and returns a normally formatted, non-error result containing an empty findings list, so the coordinator proceeds to generate a final report claiming that no significant findings were identified. What is the core problem with this design, and how should it be fixed?", "options": ["The wrapper is under-propagating: it hides a genuine internal failure behind a fabricated successful-but-empty result. It should instead return `isError` true with an appropriate category so the coordinator knows synthesis did not actually complete.", "The problem is that the coordinator should re-run the entire pipeline from the web-search stage every time synthesis produces an empty list.", "The problem is that the subagent should be replaced by a larger, more capable model to avoid summarization errors altogether.", "The problem is that empty findings lists should never be allowed as valid output under any circumstances."], "correct": [0], "explanation": "Swallowing a real internal failure and reporting it as a normal, if uneventful, success is the under-propagation anti-pattern, and it removes the coordinator's ability to tell that synthesis genuinely found nothing new apart from synthesis having crashed. Restarting from web search every time synthesis is empty is unnecessary churn and does not address the wrapper hiding the failure. A larger model might reduce some error rates but does not fix an architecture that discards error signals regardless of model capability. Banning empty findings outright would break the legitimate case where synthesis genuinely and correctly concludes there is nothing new to report, when the actual goal is distinguishing that case from failure, not eliminating it."}, {"id": "F-D2-B2-10", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A document-analysis subagent fails partway through parsing a large, partially corrupted PDF: it successfully extracts data from the first 40 pages before hitting a parsing error on page 41 that halts further processing. The subagent must report this back to the coordinator. What should the structured error response include to give the coordinator the most useful information?", "options": ["Only the isError flag and category, with no additional data, so the coordinator treats the entire document as fully unprocessed.", "An isError flag with an appropriate errorCategory, along with the partial results already extracted from the first 40 pages and a description of what was being attempted when the failure occurred.", "The full raw parser stack trace and nothing else, so a human can debug the parsing library later.", "A best-effort guess at what pages 41 onward probably contained, generated from the surrounding text, presented as normal extracted data."], "correct": [1], "explanation": "Including both the error signal and the partial results already obtained, plus what was being attempted, lets the coordinator make an informed choice, such as using the 40 pages of valid data while flagging the document as incomplete, rather than treating a partially useful result as either a total success or a total loss. Returning only the flag with no partial data throws away real, already-extracted work the coordinator could still use. A raw stack trace is meant for a human debugging session, not information a coordinator agent can act on to complete its task. Fabricating a guess at the unparsed content and presenting it as real extracted data is far worse than reporting the failure, since it would inject invented information into a report that is supposed to be grounded in real sources."}, {"id": "F-D2-B2-11", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A team is designing an MCP tool that fetches a source document before an extraction pipeline processes it. A developer suggests that if the fetch fails, the tool can simply omit the content field from its response, and the calling agent can infer failure from the missing field. Why is an explicit isError flag a better design than relying on a missing field to signal failure?", "options": ["An explicit flag makes the tool's response smaller and reduces token usage.", "An explicit flag is required so the tool can authenticate with the source system.", "An explicit boolean gives the agent a single, unambiguous, machine-checkable signal to branch its error handling on, whereas inferring failure from an absent field is fragile, since the field could be legitimately empty, for example an empty document, for reasons unrelated to failure.", "An explicit flag lets the tool skip returning any structured data at all, even on success."], "correct": [2], "explanation": "The purpose of a structured error signal is removing ambiguity: a missing or empty field could mean failure, or it could mean the document genuinely has no content, and the agent has no reliable way to tell those apart without an explicit indicator. Token footprint is not the motivation here, and a boolean flag does not meaningfully change response size either way. Authentication is a separate concern from how failure is signaled in the response payload. The flag's purpose is to describe failure clearly, not to justify omitting structured data on success, since successful responses still need their normal structured content."}, {"id": "F-D2-B2-12", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "A frustrated customer asks to speak with a human. The agent calls `escalate_to_human`, but the ticketing system backing that tool is briefly overloaded and the call fails. How should this failure be handled?", "options": ["Treat it as a business error and tell the customer that escalation is not available for their type of request.", "Treat it as a validation error and ask the customer to rephrase their request in different words.", "Silently continue the conversation as a bot without informing the customer that their escalation request could not be completed.", "Treat it as a transient, retryable failure: retry the escalation call with backoff rather than silently dropping the customer's request or looping indefinitely, and use a fallback path, such as flagging the conversation for immediate follow-up, if retries are exhausted."], "correct": [3], "explanation": "An overloaded backend that clears up shortly after is a transient condition, and the customer's explicit request for a human is exactly the kind of thing that must not be dropped, so a bounded retry with a fallback path is the right response. It is not a business-rule outcome, since nothing about policy is preventing escalation, only a temporary system overload. It is not a validation problem either, since the customer's request was perfectly well-formed and rephrasing it addresses nothing. Silently continuing as a bot without acknowledging the failed escalation directly violates the requirement to honor an explicit human request and would likely worsen an already frustrated customer's experience."}, {"id": "F-D2-B2-13", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "hard", "question": "An incident review reveals that `process_refund` had been returning a normal success response even on calls where the downstream payment reversal actually failed at the payment processor. Customers were told refunds were issued when no money moved. What is the root cause, and what should change?", "options": ["The tool reported success before confirming the downstream reversal actually completed; it should only report success after verification, and return `isError` with an appropriate category, such as transient or business depending on the cause, whenever the reversal cannot be confirmed.", "The root cause is that the agent should have asked the customer to confirm receipt of the refund before closing the conversation.", "The root cause is that `process_refund` needs a larger model to interpret the payment processor's responses correctly.", "The root cause is that customers should be told refunds can take several business days, regardless of whether the tool succeeded or failed."], "correct": [0], "explanation": "The failure is architectural: the tool declared success without verifying that the operation it claimed to have performed actually completed downstream, which is the same under-propagation problem as fabricating an empty success, just with financial consequences. Asking the customer to confirm receipt is a workaround that shifts the burden of catching the tool's bug onto the customer instead of fixing the tool. This is not a model-capability issue, since no amount of reasoning skill compensates for a tool that does not check its own result before reporting success. A generic disclaimer about refund timing does not address the tool actively misreporting failed transactions as successful ones."}, {"id": "F-D2-B2-14", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "multiple", "difficulty": "hard", "question": "A support-agent orchestrator receives four structured tool errors during one shift: `lookup_order` fails because the order-service connection dropped mid-call and a repeat call succeeds moments later; `process_refund` fails because the supplied order ID has an invalid checksum; `process_refund` fails because the order is outside the eligible return window; and `get_customer` fails because the account belongs to a partner brand the support bot's credentials are not scoped to access. Which of the following responses correctly match the appropriate category-driven handling for these failures? (Select all that apply.)", "options": ["All four failures should be retried automatically the same number of times regardless of category, since retry count is what matters, not category.", "The dropped connection on `lookup_order` is a transient failure and is safe to retry automatically.", "The out-of-scope partner-brand account failure should be treated the same as the expired-return-window failure, since both ultimately block the same customer-facing action.", "The invalid checksum on the order ID is a validation failure and should be resolved by correcting the input, not by repeating the identical call.", "The out-of-window refund and the out-of-scope partner-brand account are business and permission failures respectively, and neither should be resolved by blind automatic retries."], "correct": [1, 3, 4], "explanation": "Each of the correctly matched failures maps
