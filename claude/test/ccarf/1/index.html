ke shell commands inherently more secure; security depends on how credentials and requests are actually handled, not on which mechanism issues the call."}, {"id": "F-D2-B3-30", "cert": "CCAR-F", "domain": "Tool Design & MCP Integration", "type": "single", "difficulty": "easy", "question": "A solution architect is writing a short best-practices note for new projects about where to configure MCP servers. The note has two blanks: the first names what belongs in the project's .mcp.json, and the second names what belongs in an individual's ~/.claude.json. Which pairing correctly fills them in, in that order?", "options": ["Servers the whole team needs configured consistently, then an individual's personal servers and one-off experiments", "Servers that don't require authentication, then servers that require authentication", "Only servers used in production, then only servers used for local testing", "An individual's personal servers and one-off experiments, then servers the whole team needs configured consistently"], "correct": [0], "explanation": "The actual distinction between the two scopes is about sharing versus personal use: project configuration is for servers the whole team relies on consistently, while user-level configuration is for an individual's own servers and experiments that shouldn't affect anyone else. Whether a server requires authentication has no bearing on which scope it belongs in, since both scopes can hold authenticated servers. Production versus testing is a different axis entirely and doesn't determine whether a server should be shared with the team or kept personal. The reversed pairing swaps the two purposes and would put personal experiments in front of the whole team while keeping team-wide servers invisible to everyone but one person."}, {"id": "F-D3-B1-01", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A contractor works across several unrelated client codebases and wants Claude Code to always use their personal shorthand commit prefixes like `wip:` and `fix:` in every project they touch, but none of the clients should ever see this personal configuration in their repositories. Where should the contractor place this preference?", "options": ["In the root CLAUDE.md of whichever client repo they are currently working in, since project-level files take precedence", "In a `.claude/rules/` file scoped to the file types they edit most often", "In their user-level `~/.claude/CLAUDE.md`, since it lives on their machine outside any repository and is never checked into a client's version control", "In a directory-level CLAUDE.md placed in the repo's top folder so it applies everywhere in that project"], "correct": [2], "explanation": "User-level CLAUDE.md is stored in the user's home directory and applies across every project on that machine without ever being committed to a client's repository, which is exactly what a cross-client personal preference needs. Placing it in a client's root or directory-level CLAUDE.md would check it into that client's version control and expose it to everyone on that project. A path-specific rules file is meant for file-type conventions tied to a specific codebase's paths, not portable personal preferences."}, {"id": "F-D3-B1-02", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A new architect is documenting how Claude Code's memory system works for an internal training deck and wants to describe the CLAUDE.md hierarchy accurately. Which statement correctly describes how Claude Code handles CLAUDE.md files at the user, project, and directory levels?", "options": ["Claude Code can load CLAUDE.md files from multiple levels at once (user, project, and directory), combining them into the session's context rather than only using a single file", "Claude Code only ever reads one CLAUDE.md file per session, and any file at a more specific level completely replaces all higher-level files", "Directory-level CLAUDE.md files are ignored unless they are explicitly imported into the project-level file with `@import`", "User-level CLAUDE.md is checked into the project's repository the first time Claude Code runs so teammates automatically inherit it"], "correct": [0], "explanation": "Claude Code's memory system is layered: user-level, project-level, and directory-level CLAUDE.md files are all loaded and combined into context, letting broad standards and local specifics coexist. It does not collapse to a single winning file, so the claim that a more specific file fully replaces the rest is inaccurate. Directory-level files load automatically based on location, they don't require an explicit `@import` to take effect. User-level CLAUDE.md is deliberately never committed to a project's repository, which is the whole point of keeping it separate from version control."}, {"id": "F-D3-B1-03", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A logistics company's monorepo contains a Python-based routing service in `/services/routing` and a React/TypeScript dashboard in `/apps/dashboard`. Both share a company-wide commit message format and code review checklist, but each also needs stack-specific guidance (routing needs internal geospatial library conventions; the dashboard needs component library conventions). What is the most maintainable way to structure the CLAUDE.md files?", "options": ["Put everything, including both stacks' specific guidance, into a single root CLAUDE.md so there is only one file to maintain", "Keep the shared commit format and review checklist in the root CLAUDE.md, and add a directory-level CLAUDE.md inside `/services/routing` and `/apps/dashboard` for each stack's specific guidance", "Create a `.claude/rules/` file with paths matching every file extension used by either stack so the guidance loads conditionally", "Duplicate the full set of company-wide and stack-specific guidance into both `/services/routing` and `/apps/dashboard`, and remove the root CLAUDE.md entirely"], "correct": [1], "explanation": "Cross-cutting standards that apply everywhere belong in the root CLAUDE.md so every session inherits them, while directory-level CLAUDE.md files let each self-contained service layer in only the guidance relevant to its own subtree. Cramming both stacks' specific guidance into one root file forces Claude to load irrelevant context regardless of which service is being edited. A path-specific rules file matches file patterns rather than whole subsystems, so it is a weaker fit for guidance tied to an entire service directory rather than a scattered file type. Duplicating everything into both directories and dropping the root file throws away the benefit of a single shared source for company-wide conventions."}, {"id": "F-D3-B1-04", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Over two years, a SaaS company's root CLAUDE.md has grown to include architecture history, onboarding notes, a full testing philosophy essay, and API design guidelines all in one file, and engineers complain that every session now spends noticeable context just loading it. What is the best way to address this while keeping all the content available to Claude automatically?", "options": ["Delete the architecture history and onboarding notes since they are the least frequently referenced sections", "Move the entire contents into a single `.claude/rules/` file with a paths pattern of `**/*` so it only loads for files that are actually being edited", "Ask each engineer to copy only the sections relevant to their current task into their own `~/.claude/CLAUDE.md`", "Split the content into separate topic files (e.g., testing.md, api-guidelines.md) and reference them from the root CLAUDE.md using `@import`, so the root file stays short but the details still load"], "correct": [3], "explanation": "Breaking the monolithic file into focused topic files and pulling them back together with `@import` keeps the root CLAUDE.md readable while preserving automatic loading of every section, which directly solves the stated problem. Deleting content sacrifices institutional knowledge instead of just reorganizing it. A rules file with a catch-all `**/*` pattern would load on essentially every file anyway, providing no real reduction and misusing a mechanism meant for targeted, file-type-specific conventions. Pushing shared team knowledge into personal user-level files would fragment it and stop it from being consistently available to the whole team."}, {"id": "F-D3-B1-05", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "An engineering team's test files (`*.test.ts`) live inside dozens of different feature directories throughout the codebase, and the team wants consistent mocking and assertion conventions applied whenever anyone edits a test file, without adding that guidance to every directory. What is the most appropriate way to define this convention in Claude Code?", "options": ["Add an identical CLAUDE.md file to every directory that currently contains a test file", "Create a `.claude/rules/` file with YAML frontmatter specifying a paths glob for test files (e.g., matching `*.test.ts`) so the convention loads only when a matching file is being edited", "Write the convention once in the user-level `~/.claude/CLAUDE.md` so it is personal to whoever configures it", "Add the convention to the root CLAUDE.md and instruct engineers to mentally ignore it when not working on tests"], "correct": [1], "explanation": "A path-specific rules file with a paths glob targeting test files loads the convention automatically whenever a matching file is opened, no matter which directory it lives in, which is exactly the scattered-file-type problem described. Copying the same CLAUDE.md into every directory that has tests creates dozens of files to keep in sync and will drift as new test directories appear. A user-level file would make the convention personal rather than a shared team standard. Putting it in the root CLAUDE.md forces it into context on every single edit, including non-test work, when the goal is to load it only when relevant."}, {"id": "F-D3-B1-06", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An engineer at a fintech company added a directory-level CLAUDE.md inside `/services/payments` describing the required error-response envelope for that service. While later editing files inside `/services/shipping`, they notice Claude is not applying that error-response convention at all. What is the most likely explanation?", "options": ["Directory-level CLAUDE.md files only apply within their own directory subtree, so guidance placed in `/services/payments` does not extend to the unrelated `/services/shipping` directory", "Directory-level CLAUDE.md files never load unless referenced from the root file with `@import`", "CLAUDE.md files stop working after the first tool call in a session and must be manually reloaded", "The convention was written incorrectly, since CLAUDE.md is only capable of holding project-wide, not service-specific, guidance"], "correct": [0], "explanation": "A CLAUDE.md placed inside a specific directory scopes its guidance to that directory and its subtree, so content written for `/services/payments` has no automatic bearing on a sibling directory like `/services/shipping`. Directory-level files load automatically based on location and don't require an `@import` reference to take effect. CLAUDE.md files remain part of the loaded memory for the session rather than expiring after one tool call. Directory-level CLAUDE.md is specifically meant to hold service- or module-specific guidance, so that is not the issue here."}, {"id": "F-D3-B1-07", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Before a live demo, a team lead wants to confirm exactly which CLAUDE.md files, at which levels, are currently loaded into their Claude Code session's context, since they suspect a recently added directory-level file might not have been picked up. What should they do first?", "options": ["Run `/compact` to shrink the context and see which files remain", "Manually open every CLAUDE.md file in the repository in a text editor and compare file timestamps", "Run `/memory` to list the memory files currently loaded in the session", "Delete the `.claude/rules/` directory temporarily to rule out interference"], "correct": [2], "explanation": "The `/memory` command is built specifically to show which memory files are currently loaded, making it the direct way to confirm whether the new directory-level file was picked up. Running `/compact` addresses conversation context size, not which memory files are loaded, so it doesn't answer the question. Manually diffing file timestamps in an editor doesn't confirm what Claude Code actually loaded into the session. Deleting the rules directory targets a different mechanism entirely and wouldn't reveal anything about CLAUDE.md loading."}, {"id": "F-D3-B1-08", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A freelance developer wants Claude Code to always prefer a particular commit message length and a specific way of explaining tradeoffs in code comments, consistently across every client project on their laptop, without ever needing to set it up again per repository. Where should this go?", "options": ["In a `.claude/rules/` file inside each client's repository, scoped with a broad paths glob", "In the root CLAUDE.md of each client repository they work on", "In a directory-level CLAUDE.md placed in their home directory's Projects folder", "In their personal `~/.claude/CLAUDE.md`, which applies across all projects on their machine"], "correct": [3], "explanation": "User-level CLAUDE.md at `~/.claude/CLAUDE.md` is loaded regardless of which project is open, so it is the one place a cross-project personal preference needs to be defined once. Placing it inside each client repository, whether as a rules file or a root CLAUDE.md, means re-creating and maintaining it separately in every project. A directory-level CLAUDE.md is scoped to the directory subtree it sits in, and Claude Code's hierarchy doesn't treat an arbitrary folder like a Projects directory as a global scope the way the dedicated user-level file is."}, {"id": "F-D3-B1-09", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team discovers their repository has both a root-level CLAUDE.md and a separate `.claude/CLAUDE.md`, each containing different and sometimes contradictory project-level guidance that engineers have edited independently over time. What is the best way to resolve this?", "options": ["Leave both in place, since Claude Code always prioritizes `.claude/CLAUDE.md` over the root file and will ignore the conflicting parts automatically", "Consolidate onto a single canonical project-level file (choosing either the root CLAUDE.md or `.claude/CLAUDE.md`) and remove or merge the other, so project-level guidance has one source of truth", "Convert both into `.claude/rules/` files with overlapping paths globs so Claude can merge the conflicting guidance at runtime", "Move one of the two files into the user-level `~/.claude/CLAUDE.md` so it stops being shared with the team"], "correct": [1], "explanation": "Since either the root CLAUDE.md or `.claude/CLAUDE.md` can serve as the project-level file, having both maintained independently invites exactly the drift and contradiction described, so the fix is to pick one as the canonical project-level source and merge or retire the other. There isn't a defined precedence where one silently overrides the other in a way that resolves contradictions for you, so leaving both is not a safe fix. Turning shared project-wide guidance into rules files misuses a mechanism meant for file-pattern-scoped conventions, and doesn't resolve the underlying duplication. Moving project-level content into a personal user-level file would remove it from the team's shared configuration entirely, which is the opposite of what's needed."}, {"id": "F-D3-B1-10", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A platform team has five independent squads, each owning a fully self-contained service directory (e.g., `/services/billing`, `/services/notifications`) with its own distinct architecture, testing framework, and naming conventions that don't apply to any other squad's code. Which configuration approach best fits this situation?", "options": ["A directory-level CLAUDE.md inside each squad's service directory, since each squad's conventions are self-contained to that subtree rather than a file pattern repeated across unrelated directories", "A single `.claude/rules/` file with a broad paths glob like `**/*` covering every squad's file types in one place", "One `.claude/rules/` file per squad, each scoped only by file extension rather than directory", "A single root CLAUDE.md containing all five squads' conventions concatenated together"], "correct": [0], "explanation": "Because each squad's conventions apply to an entire self-contained directory rather than to a file type scattered across many unrelated locations, a directory-level CLAUDE.md per service is the natural fit and keeps each squad's guidance isolated to its own subtree. A single catch-all rules file loses the directory boundary that actually matters here and would apply indiscriminately. Scoping rules files only by file extension ignores that the differentiator between squads is which directory the code lives in, not what type of file it is. Concatenating everything into the root file forces every squad's unrelated conventions into every session's context regardless of which service is being touched."}, {"id": "F-D3-B1-11", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A contractor keeps some personal prompt-engineering notes and shortcuts in their `~/.claude/CLAUDE.md`, including some details they would rather not share with the client. They are about to push their finished feature branch to the client's shared repository and are worried this content might leak. Why is this generally safe?", "options": ["It isn't automatically safe; they must remember to add `~/.claude/CLAUDE.md` to the project's .gitignore before every push", "Claude Code automatically encrypts user-level CLAUDE.md content before any git commit", "User-level CLAUDE.md lives in the user's home directory, entirely outside the project's repository, so ordinary git operations within that repository have no way to include it", "Git automatically excludes any file named CLAUDE.md from being committed, regardless of its location"], "correct": [2], "explanation": "Because `~/.claude/CLAUDE.md` sits in the user's home directory rather than inside any project's working tree, it is not part of the repository's file set at all, so nothing about a normal commit or push in that repository could pick it up. There's no need to gitignore it because it was never inside the tracked directory to begin with. Claude Code doesn't encrypt memory files as part of git operations. Git has no special rule that excludes files simply because they are named CLAUDE.md; the safety here comes entirely from the file's location outside the repository."}, {"id": "F-D3-B1-12", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An engineering manager wants every new hire who clones the checkout-service repository to automatically get the team's established conventions (error handling patterns, logging format) applied by Claude Code from their very first session, with no manual setup required. Where should these conventions be defined?", "options": ["In each new hire's personal `~/.claude/CLAUDE.md`, which they set up during onboarding", "In a `.claude/rules/` file with no paths key defined, so it always applies", "In a directory-level CLAUDE.md placed only inside the new hire's personal scratch folder", "In the project-level CLAUDE.md (root or `.claude/CLAUDE.md`) committed to the checkout-service repository, so it's version-controlled and loaded for anyone working in that repo"], "correct": [3], "explanation": "A project-level CLAUDE.md committed to the repository is version-controlled and loads automatically for anyone working in that project, which is exactly the no-manual-setup requirement described. A personal user-level file requires each new hire to manually recreate it and isn't shared through the repository at all. Rules files are defined by a paths glob targeting specific file patterns; omitting the paths key isn't how project-wide, always-on guidance is meant to be expressed, and it's a less direct fit than the project-level CLAUDE.md built for this purpose. A directory-level file scoped to a personal scratch folder wouldn't apply to the actual service code the new hire is meant to work in."}, {"id": "F-D3-B1-13", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "medium", "question": "A platform engineer is writing internal documentation summarizing how Claude Code's memory and configuration system behaves before rolling it out org-wide. Which of the following statements are accurate? (Select all that apply.)", "options": ["Directory-level CLAUDE.md files apply to every directory in the repository regardless of where they are placed", "User-level CLAUDE.md at `~/.claude/CLAUDE.md` is not checked into a project's version control system, since it lives outside the repository", "The `@import` mechanism can only be used inside `.claude/rules/` files, never inside a CLAUDE.md file", "Path-specific rule files in `.claude/rules/` use YAML frontmatter with a `paths` key containing glob patterns that control when the rule loads", "Running `/memory` lets you verify which memory files are currently loaded into a session"], "correct": [1, 3, 4], "explanation": "User-level CLAUDE.md is intentionally kept outside any repository so it's personal and never version-controlled, which is accurate. Rules files do use YAML frontmatter with a `paths` key of glob patterns to determine when they should load, and `/memory` is precisely the command for checking which memory files are active in the current session, so both of those are correct. Directory-level CLAUDE.md files are scoped to their own directory subtree, not the whole repository, so the claim that they apply everywhere is wrong. `@import` is used to modularize CLAUDE.md content itself by pulling in other files, not something restricted to rules files only, so that statement is also incorrect."}, {"id": "F-D3-B1-14", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "An e-commerce company's catalog-service repository has a project-level root CLAUDE.md describing overall API conventions, plus a directory-level CLAUDE.md inside `/catalog-service/src/legacy-import` describing quirks specific to a legacy data-import module. What is the correct scope of each file?", "options": ["The root CLAUDE.md's API conventions apply across the whole repository, while the legacy-import directory's CLAUDE.md guidance applies only within that directory and its subtree", "Both files apply identically across the entire repository, since all CLAUDE.md files share the same scope once loaded", "The directory-level file in legacy-import overrides and disables the root CLAUDE.md for the entire repository once it's added", "Only the most recently modified CLAUDE.md file is loaded in any given session"], "correct": [0], "explanation": "Project-level (root) CLAUDE.md guidance is repository-wide, while a directory-level CLAUDE.md scopes its content to that specific directory and its subtree, which matches how the two files were described. They don't share an identical scope; the whole point of a directory-level file is to add something narrower than the project-wide file. A directory-level file doesn't disable or override the root file for the rest of the repository, it supplements it locally. Loading isn't based on recency of edits; it's based on the hierarchy and location of the files relative to what's being worked on."}, {"id": "F-D3-B1-15", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "An engineer is comparing how project-level CLAUDE.md behaves versus how a `.claude/rules/` file behaves within the same Claude Code session. What is the key behavioral difference?", "options": ["CLAUDE.md files never load automatically and must be manually attached each session, while rules files always load", "Project-level CLAUDE.md loads on every session regardless of which files are touched, while a rules file loads conditionally, only when a file matching its paths glob is being edited", "There is no behavioral difference; both are loaded identically at session start regardless of file pattern", "Rules files can only be written by administrators, while CLAUDE.md files can be written by any engineer"], "correct": [1], "explanation": "Project-level CLAUDE.md is part of the standard memory hierarchy and loads for every session regardless of what's being edited, whereas a `.claude/rules/` file loads conditionally based on whether the file currently being edited matches its frontmatter paths glob. CLAUDE.md files do load automatically as part of the memory hierarchy, so the claim that they require manual attachment is backwards. Since one loads unconditionally and the other loads only for matching files, treating them as behaviorally identical misses the entire point of path-specific rules. Nothing about either mechanism restricts authorship to administrators only."}, {"id": "F-D3-B1-16", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A component library's CSS and SCSS files are spread across many component folders throughout the repository, and the team wants consistent naming and nesting conventions applied whenever any styling file is edited, without adding guidance to every component's folder individually. What is the best way to implement this?", "options": ["A directory-level CLAUDE.md added to every single component folder that happens to contain a stylesheet", "A single entry in the root CLAUDE.md that lists every component folder's path individually", "A `.claude/rules/` file with a paths glob matching CSS and SCSS files (e.g., matching `*.css` and `*.scss`) so the convention loads whenever a matching file is opened", "A `.claude/commands/` slash command that engineers must remember to run before editing any stylesheet"], "correct": [2], "explanation": "A rules file with a paths glob targeting CSS and SCSS extensions loads the styling convention automatically whenever a matching file is touched, no matter which component folder it's in, which directly matches the scattered-file-type scenario. Adding a directory-level CLAUDE.md to every component folder creates many files to keep synchronized and doesn't scale as new components are added. Hardcoding every folder path into the root CLAUDE.md is brittle and still loads unconditionally on unrelated work. A slash command requires the engineer to remember and manually invoke it, rather than the guidance surfacing automatically the way a rule does."}, {"id": "F-D3-B1-17", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A backend platform has API route handler files spread across many service directories (e.g., `src/api/*.ts` within each service), and the team wants consistent request validation and error-shape conventions applied whenever anyone edits a route handler, regardless of which service it belongs to. What is the most scalable way to enforce this?", "options": ["A directory-level CLAUDE.md inside every individual service's `src/api` folder, kept manually in sync across all services", "A single root CLAUDE.md entry describing the convention only in prose, with no path targeting", "A `.claude/skills/` skill that must be manually invoked before writing a new route handler", "A `.claude/rules/` file with a paths glob such as `src/api/**/*.ts` so the convention loads whenever a matching route handler file is edited, across every service"], "correct": [3], "explanation": "A rules file with a paths glob targeting the shared `src/api` directory pattern applies the convention consistently wherever a matching route handler is edited, across every service, without needing per-service duplication. Manually maintaining a directory-level CLAUDE.md inside each service's api folder means the convention can silently drift out of sync as services are added or updated. A prose entry in the root file with no path targeting loads unconditionally on unrelated work and provides no scoping to route handlers specifically. A skill that must be manually invoked depends on the engineer remembering to trigger it rather than surfacing automatically like a matching rule does."}, {"id": "F-D3-B1-18", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A data platform team stores SQL migration files inside a migrations folder within each of a dozen services. They want a consistent naming pattern and rollback-comment requirement enforced whenever anyone writes or edits a migration file, no matter which service's migrations folder it's in. Which configuration best achieves this?", "options": ["A `.claude/rules/` file with a paths glob like `**/migrations/*.sql` so the convention loads for any matching migration file across all services", "A directory-level CLAUDE.md placed only in the top-level repository root, since migrations are a database concern", "A user-level `~/.claude/CLAUDE.md` so each engineer configures the convention individually", "Twelve separate directory-level CLAUDE.md files, one inside each service's migrations folder"], "correct": [0], "explanation": "A rules file with a glob that matches any migrations folder's SQL files applies the convention consistently everywhere that pattern occurs, which is exactly what's needed across a dozen scattered folders. A single CLAUDE.md at the repository root wouldn't specifically target migration files and would load unconditionally regardless of relevance. Pushing a team-wide database convention into personal user-level files makes it inconsistent and dependent on each engineer configuring it themselves. Maintaining twelve separate directory-level files duplicates the same guidance twelve times and invites drift as the convention evolves."}, {"id": "F-D3-B1-19", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A company's entire `/design-system` directory is a self-contained package with conventions (token naming, component API shape, story file structure) that are specific to that one directory and don't apply anywhere else in the monorepo. What is the most appropriate way to encode these conventions?", "options": ["A `.claude/rules/` file with a paths glob of `**/*` so it applies everywhere just in case other directories adopt similar patterns later", "A directory-level CLAUDE.md placed inside `/design-system`, since the conventions apply to an entire self-contained subtree rather than a file pattern reused elsewhere", "The root CLAUDE.md, so every engineer working anywhere in the monorepo sees the design-system conventions at all times", "A `.claude/commands/` slash command that must be run manually whenever someone opens the design-system folder"], "correct": [1], "explanation": "Because the conventions are tied to one self-contained directory rather than a file type scattered across the codebase, a directory-level CLAUDE.md inside `/design-system` is the direct fit, scoping the guidance to exactly the subtree where it's relevant. A catch-all rules glob would load the design-system-specific guidance on completely unrelated files elsewhere in the monorepo. Putting it in the root CLAUDE.md forces every engineer to load design-system conventions even when working on unrelated services. A manually invoked slash command depends on someone remembering to run it rather than the guidance being present automatically while working in that directory."}, {"id": "F-D3-B1-20", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team defines logging conventions (structured fields, log level usage) that only matter when someone is editing files that emit logs, which are scattered across many services. They are deciding between putting this guidance in the root CLAUDE.md versus a `.claude/rules/` file. What is the main advantage of using a `.claude/rules/` file here instead of the root CLAUDE.md?", "options": ["Rules files support richer Markdown formatting than CLAUDE.md files, such as bullet lists and code blocks", "Rules files are the only mechanism that can reference file paths at all", "The rules file only loads into context when a matching file is actually being edited, keeping the guidance out of context and avoiding clutter during unrelated work", "Rules files are updated automatically by Claude Code whenever the logging convention changes elsewhere in the codebase"], "correct": [2], "explanation": "The key advantage is conditional loading: a rules file only enters context when the file being edited matches its glob, so engineers working on unrelated code never pay the context cost of loading logging guidance they don't need, unlike the always-on root CLAUDE.md. Both CLAUDE.md and rules files support the same Markdown formatting, so that isn't a differentiator. CLAUDE.md content can also describe file-path-related guidance in prose; what's unique to rules files is the structured, automatic path-matching behavior, not the mere ability to mention paths. Neither mechanism automatically rewrites itself when a convention changes elsewhere; someone still has to update the file."}, {"id": "F-D3-B1-21", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A security team wants specific conventions (mandatory input sanitization checks, required audit-log calls) applied whenever anyone edits authentication-related code, which lives in files named things like `AuthService.ts`, `AuthMiddleware.py`, and `oauthHandler.go`, spread across multiple services. How should this be configured?", "options": ["A directory-level CLAUDE.md in the repository root's top-level folder, since security conventions are important enough to be project-wide", "A verbal agreement communicated in a team meeting, with no configuration in Claude Code at all", "A `.claude/rules/` file with no paths key, relying on Claude to infer from context which files are security-related", "A `.claude/rules/` file with a paths glob targeting authentication-related file names and directories (e.g., matching `**/auth/**` and `**/*Auth*`) so the convention loads whenever a matching file is edited"], "correct": [3], "explanation": "A rules file with a paths glob that matches authentication-related file and directory naming patterns will load the security convention automatically whenever a matching file is touched, wherever it lives across services. Placing it in a top-level directory-level CLAUDE.md doesn't target the specific files that need it and would either be too broad or fail to match auth code living in other directories. Relying on a verbal agreement with no configuration means the convention has no reliable, enforced presence in Claude's context at all. Omitting the paths key removes the very mechanism that makes rules files load conditionally and correctly for the intended files."}, {"id": "F-D3-B1-22", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team adds a `.claude/rules/testing.md` file with frontmatter matching paths like `**/*.test.js` to enforce testing conventions. Weeks later, engineers report the convention never seems to apply, even when they edit test files. Investigation shows the codebase migrated its test suite to TypeScript months ago, and all test files are now named `*.spec.ts`. What is the most likely root cause and fix?", "options": ["The rules file's paths glob still targets the old `*.test.js` pattern, so it never matches the current `*.spec.ts` test files; updating the glob to match the new naming and extension fixes it", "The rules directory has a hard limit of one file and testing.md is being silently ignored in favor of another rule", "Rules files stop working automatically after a certain number of days and must be recreated periodically", "TypeScript files are fundamentally incompatible with the `.claude/rules/` mechanism and must use a directory-level CLAUDE.md instead"], "correct": [0], "explanation": "The rule's paths glob is matched literally against file names, so a pattern written for the old `*.test.js` convention simply won't match files now named `*.spec.ts`, meaning the rule silently never fires; updating the glob to the current naming and extension directly resolves it. There's no stated limit of one active rules file, so a file being ignored for that reason isn't the explanation. Rules files don't expire on a timer, they remain active as long as they exist with valid frontmatter. TypeScript files are matched by glob patterns like any other file type, so there's no fundamental incompatibility with the rules mechanism."}, {"id": "F-D3-B1-23", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team has created three separate files: `.claude/rules/testing.md` (paths matching test files), `.claude/rules/api-conventions.md` (paths matching API route handlers), and `.claude/rules/database.md` (paths matching migration and schema files). An engineer edits a single file that is both a database migration and included in an API route test. What should happen?", "options": ["Only one rules file can be active per session, so the engineer must manually choose which of the three to load", "Any rules file whose paths glob matches the file being edited can load into context; since this file could match more than one rule's pattern, more than one rules file may apply during that turn", "Creating more than one file inside `.claude/rules/` causes Claude Code to ignore all of them until they are merged into a single file", "Rules files can only match one file per session; editing a second matching file requires restarting Claude Code"], "correct": [1], "explanation": "Each rules file is evaluated independently against its own paths glob, so a single file being edited can match more than one rule's pattern, and any rule whose glob matches can load into context for that turn. There's no restriction limiting the session to a single active rules file, so engineers don't need to manually pick just one. Having multiple files inside `.claude/rules/` is the expected way to organize independent conventions; it doesn't cause Claude Code to ignore them. Nothing about the mechanism requires restarting Claude Code to match a second file later in the session."}, {"id": "F-D3-B1-24", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "A platform team's Jest test files (`*.test.ts`) are scattered across more than forty microservice directories in a monorepo. They currently duplicate the same testing-conventions CLAUDE.md file into each directory that contains tests, and it has started drifting out of sync as the convention evolves. Which of the following are correct reasons to replace this with a single `.claude/rules/` file instead? (Select all that apply.)", "options": ["Rules files execute test suites automatically, removing the need for a CI pipeline to run Jest", "A single rules file with a paths glob like `**/*.test.ts` removes the need to keep more than forty duplicated CLAUDE.md files synchronized whenever the convention changes", "The rule will automatically apply to new test directories created in the future, since it matches based on file pattern rather than a fixed, enumerated list of directories", "Rules files are stored in a special encrypted format, so consolidating into one file also improves the security of the testing conventions", "Consolidating into one rules file means the guidance only enters context when a matching test file is actually being edited, rather than being duplicated as forty separate always-loaded files"], "correct": [1, 2, 4], "explanation": "Replacing forty duplicated CLAUDE.md files with one rules file eliminates the synchronization burden, automatically covers new test directories because matching is based on the file pattern rather than a hardcoded directory list, and keeps the guidance loading only when a matching test file is actually touched. Rules files hold guidance for Claude to follow while editing code; they have no mechanism for executing test suites, which remains the job of the CI pipeline. There's no encryption applied to rules files as part of this mechanism, so consolidating them doesn't change anything about their security properties."}, {"id": "F-D3-B1-25", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A repository has a root CLAUDE.md describing general coding standards and a directory-level CLAUDE.md inside `/services/notifications` adding extra guidance about retry semantics for that service. An engineer edits a file inside `/services/notifications`. What happens to the general coding standards from the root CLAUDE.md during that session?", "options": ["They are temporarily suspended for the duration of any session touching `/services/notifications`", "They are permanently overwritten by the directory-level file the first time it is loaded", "They are still loaded and combined with the directory-level guidance; the directory-level file supplements rather than replaces the root file's content", "They only apply if the directory-level CLAUDE.md explicitly uses `@import` to reference the root file"], "correct": [2], "explanation": "Root and directory-level CLAUDE.md files are additive: the broader standards from the root file remain loaded and are combined with the more specific directory-level guidance rather than being replaced by it. Nothing about entering a subdirectory suspends the project-wide file, so the general standards stay active. There's no overwrite behavior between hierarchy levels; both sets of guidance coexist. The root file's standards apply as part of the normal hierarchy regardless of whether the directory-level file references it via `@import`, since `@import` is for pulling in separate content, not for re-enabling already-active hierarchy levels."}, {"id": "F-D3-B1-26", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "An engineer gets a new laptop and reinstalls Claude Code. After cloning their usual repositories, they notice their previous personal formatting preferences (which used to live in `~/.claude/CLAUDE.md`) are gone, while the team's shared project conventions still apply as expected. Why is this the expected behavior?", "options": ["This indicates a bug, since all CLAUDE.md files, including user-level ones, are expected to sync automatically across machines", "Project-level CLAUDE.md files are also machine-specific, so the engineer's team conventions should have disappeared as well", "User-level CLAUDE.md is stored in the repository under `.claude/`, so it should have been present after cloning", "User-level CLAUDE.md is local to a machine and not stored in any repository, so it doesn't transfer automatically to a new machine, while project-level CLAUDE.md is version-controlled and loads for anyone who clones the repository"], "correct": [3], "explanation": "User-level CLAUDE.md lives in the user's home directory on a specific machine and isn't part of any repository, so a new laptop simply won't have it until the engineer recreates it; project-level CLAUDE.md, by contrast, is committed to the repository and loads for anyone who clones it, which explains why the team conventions still worked. There's no automatic cross-machine sync for the user-level file, so its absence isn't a bug. Project-level files are exactly the ones that behave consistently across machines, which is why they were unaffected. The user-level file is deliberately kept outside the repository, not stored under `.claude/` in the project."}, {"id": "F-D3-B1-27", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer is setting up project-level Claude Code guidance for a new repository and is unsure exactly where the file should live to be recognized as the project's memory file. Which of the following is a valid location for project-level CLAUDE.md content?", "options": ["Either a root-level CLAUDE.md file or a CLAUDE.md file inside a `.claude/` directory at the project root", "Only inside a hidden `.git/CLAUDE.md` file tracked alongside commit history", "Only inside the user's home directory, since project-level and user-level files share one location", "Only as an environment variable named `CLAUDE_MD` set in the CI system"], "correct": [0], "explanation": "Project-level guidance can be defined either as a root CLAUDE.md file or as a CLAUDE.md file inside a `.claude/` directory at the project root, both of which are recognized as project-level memory. The `.git` directory is for version control internals, not a recognized location for memory files. Project-level and user-level files are deliberately different locations, one inside the repository and one in the user's home directory, not the same place. There's no mechanism that defines project-level memory content through a CI environment variable."}, {"id": "F-D3-B1-28", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An open-source project auto-generates API client code for 40 different target languages, each in its own top-level directory (e.g., `/clients/python`, `/clients/go`, `/clients/java`). They want a consistent do-not-hand-edit warning applied whenever anyone opens a generated client file, across all 40 language directories, pointing them to the generator templates instead. What is the most scalable way to enforce this?", "options": ["Forty separate directory-level CLAUDE.md files, one added inside each language's client directory", "A `.claude/rules/` file with a paths glob matching the generated client file patterns across all language directories (e.g., `clients/**/*generated*`), so the warning loads whenever a matching file is opened", "A single root CLAUDE.md warning that only mentions the concept in general terms without referencing any specific paths", "Renaming every generated file to include DO_NOT_EDIT in the filename and relying on engineers to notice"], "correct": [1], "explanation": "A rules file with a paths glob covering the generated-file pattern across all client directories surfaces the warning automatically whenever a matching file is opened, regardless of which of the 40 languages it belongs to, and scales without per-language duplication. Maintaining forty separate directory-level files means the same warning has to be created and kept consistent forty times over. A generic mention in the root CLAUDE.md loads unconditionally on unrelated work and isn't tied to the specific generated files that need the warning. Renaming files relies entirely on humans noticing a naming convention rather than Claude Code surfacing the guidance automatically."}, {"id": "F-D3-B1-29", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A mobile app monorepo has grown to over 50 feature modules, each containing its own test directory. Two years ago, the team standardized testing conventions by adding an identical CLAUDE.md file to every module's test directory. Today, roughly a third of those files are out of date because engineers who update the convention often forget to propagate the change to all 50 copies. What is the root cause of this problem, and what change would most effectively fix it?", "options": ["The root cause is that CLAUDE.md files cannot describe testing conventions at all; the fix is to move all guidance into `.claude/commands/` slash commands instead", "The root cause is that CLAUDE.md files silently expire after two years and must be periodically recreated; the fix is to set a recurring reminder to rewrite them", "The root cause is that a file-type convention scattered across many directories was implemented as duplicated per-directory CLAUDE.md files instead of a single `.claude/rules/` file with a paths glob; consolidating into one rules file removes the need for synchronized copies", "The root cause is that the team has too many feature modules; the fix is to reduce the monorepo to fewer than ten modules"], "correct": [2], "explanation": "This is exactly the scenario path-specific rules exist for: a convention tied to a file type (tests) that recurs across many directories is better expressed once, as a rules file matched by a paths glob, than duplicated as dozens of separate CLAUDE.md copies that inevitably drift when only some of them get updated. CLAUDE.md files are perfectly capable of describing testing conventions; the problem is the duplication pattern, not the content type. There's no expiration behavior tied to file age; files don't silently go stale on a timer, they go stale because humans forget to update every copy. Restructuring the number of modules doesn't address the actual cause, which is a configuration and maintenance pattern problem, not a codebase-size problem."}, {"id": "F-D3-B1-30", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A team runs Claude Code non-interactively on an ephemeral CI runner to generate an automated code review comment for each pull request. The runner is provisioned fresh for every job and destroyed afterward. Which memory conventions can the team reliably depend on being present during these CI runs?", "options": ["Only conventions defined in each individual engineer's personal `~/.claude/CLAUDE.md`, since CI runs on their behalf", "All three levels equally, since the ephemeral runner automatically restores a snapshot of every engineer's personal configuration", "None of the hierarchy levels apply in CI; conventions must be re-typed into the prompt on every run", "Only conventions defined in project-level and directory-level CLAUDE.md files, since those are version-controlled and checked out fresh with the repository on every run"], "correct": [3], "explanation": "Project-level and directory-level CLAUDE.md files are committed to the repository, so they're checked out fresh on every ephemeral CI run along with the rest of the code, making them reliably available. A personal user-level CLAUDE.md lives on an individual engineer's machine and isn't part of the repository, so a freshly provisioned, disposable runner has no way to have it present unless something explicitly provisions it there. There's no snapshot mechanism that restores individual engineers' personal configurations onto CI runners. Project- and directory-level conventions do apply automatically in CI because they travel with the repository, so re-typing them manually into every prompt isn't necessary."}, {"id": "F-D3-B1-31", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "While working, an engineer creates a new directory-level CLAUDE.md inside a subfolder they are about to start editing, hoping Claude will pick up the new guidance the next time it reads a file in that subfolder during the same session. What is the most reliable way to confirm whether the new file has actually been loaded into context?", "options": ["Run `/memory` to check which memory files are currently loaded", "Assume it is loaded automatically, since CLAUDE.md files never need to be verified once written to disk", "Run `/compact` and check whether the context size increased", "Check the file's last-modified timestamp in the terminal, since a recent timestamp guarantees it has been loaded"], "correct": [0], "explanation": "`/memory` is the direct way to check which memory files Claude Code currently has loaded, making it the reliable way to confirm the new directory-level file is actually part of the session's context rather than just assuming. Simply assuming a newly written file is loaded skips verification entirely, which is what the engineer is trying to avoid. `/compact` addresses shrinking conversation context, not confirming which memory files are present, so a context-size change wouldn't reliably indicate this. A recent file-modification timestamp only proves the file was saved to disk, not that Claude Code has actually loaded its contents into the session."}, {"id": "F-D3-B1-32", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A monorepo has dozens of independently published packages, each with its own README.md file describing usage and API surface. The team wants a consistent structure (installation, usage, API reference, changelog link) enforced whenever anyone edits any package's README, without adding a CLAUDE.md to every package folder. What is the appropriate configuration?", "options": ["A directory-level CLAUDE.md added individually to each package folder describing the README structure", "A `.claude/rules/` file with a paths glob matching `**/README.md` so the structure convention loads whenever any package's README is being edited", "A user-level `~/.claude/CLAUDE.md` so the convention is available on the maintainer's machine only", "A root CLAUDE.md entry that lists the full desired README template, loaded on every session regardless of what file is open"], "correct": [1], "explanation": "A rules file with a glob matching README files anywhere in the monorepo applies the structure convention automatically whenever any package's README is opened, which is exactly the scattered-file-type situation described and avoids adding a file to every package folder. Adding a directory-level CLAUDE.md to each package individually is precisely the duplication the team wants to avoid. A user-level file would make the convention personal to one maintainer's machine rather than a shared team standard. Embedding the full template in the root CLAUDE.md loads it unconditionally on every session, including work that has nothing to do with README files."}, {"id": "F-D3-B1-33", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "hard", "question": "A company's monorepo has a `/billing` directory with unique domain conventions that apply only inside that one subsystem, and separately, the company wants a shared convention for all `*.proto` files (protocol buffer schema definitions), which are scattered across more than a dozen unrelated service directories including but not limited to `/billing`. What is the best way to configure both needs at once?", "options": ["Choose only one mechanism for the whole company, since directory-level CLAUDE.md and `.claude/rules/` files cannot coexist in the same repository", "Put the `*.proto` convention inside the `/billing` directory-level CLAUDE.md only, since that's where protocol buffer files were first introduced", "Keep the `/billing`-specific conventions in a directory-level CLAUDE.md inside `/billing`, and separately create a `.claude/rules/` file with a paths glob matching `**/*.proto` for the shared schema convention; both can be active together without conflict", "Merge both needs into a single `.claude/rules/` file with a paths glob of `/billing/**` that happens to also match `*.proto` files everywhere else by coincidence"], "correct": [2], "explanation": "The two needs are genuinely different in shape: one is scoped to a single self-contained subsystem and the other is a file-type convention scattered across many unrelated directories, so using a directory-level CLAUDE.md for the `/billing`-specific guidance and a separate rules file with a proto-matching glob for the shared schema convention addresses each correctly, and both mechanisms can be active in the same repository simultaneously. There's no restriction preventing directory-level CLAUDE.md and rules files from coexisting, so picking only one for the whole company is unnecessarily limiting. Confining the `*.proto` convention to the `/billing` directory-level file would mean it never applies to the proto files in any of the other dozen-plus service directories that also need it. A single glob scoped to `/billing/**` would not match proto files outside that directory, so it can't cover files elsewhere by coincidence, making that approach fail the actual requirement."}, {"id": "F-D3-B1-34", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "multiple", "difficulty": "hard", "question": "An engineering organization is deciding how to configure three distinct pieces of guidance: (1) an overall architecture philosophy that should be visible in every single session regardless of what's being edited, (2) Python style rules that apply to `*.py` files scattered across fifteen otherwise-unrelated microservice directories, and (3) conventions specific to a self-contained legacy PHP subsystem living entirely inside `/legacy-billing` that don't apply anywhere else. Which of the following correctly match a convention to its configuration mechanism? (Select all that apply.)", "options": ["The Python style rules are best handled by copying the same content into a directory-level CLAUDE.md inside each of the fifteen microservice directories, since that guarantees every service has its own local copy", "The architecture philosophy belongs in the root project CLAUDE.md, since it should load for every session no matter which files are touched", "The legacy PHP subsystem's conventions belong in a directory-level CLAUDE.md placed at `/legacy-billing`, since they apply to one self-contained module rather than a file pattern reused elsewhere", "The legacy PHP subsystem's conventions are best expressed as a `.claude/rules/` file with a paths glob of `**/*.php`, since PHP is a distinct file type", "The Python style rules scattered across fifteen microservice directories belong in a single `.claude/rules/` file with a paths glob like `**/*.py`, rather than being copy-pasted into fifteen separate directory-level CLAUDE.md files"], "correct": [1, 2, 4], "explanation": "The always-visible architecture philosophy fits the root CLAUDE.md because it must load unconditionally every session; the Python conventions scattered across many unrelated directories fit a single rules file matched by a paths glob, since that avoids fifteen copies to keep synchronized; and the self-contained legacy subsystem fits a directory-level CLAUDE.md because its conventions apply to one bounded module rather than a file pattern that recurs elsewhere. Copying the Python guidance into fifteen separate directory-level files reintroduces the exact synchronization burden that path-specific rules exist to eliminate, so that pairing is wrong. Matching the legacy subsystem by a `**/*.php` glob would also pull that guidance into any stray PHP file outside `/legacy-billing`, misapplying subsystem-specific rules to unrelated code and ignoring that the real boundary here is the directory, not the file extension."}, {"id": "F-D3-B2-01", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "The platform team behind the customer support resolution agent wants a `/security-review` slash command that every engineer can run, that stays current automatically when its definition is updated, and that new hires get the moment they clone the repository. Where should this command be defined?", "options": ["In each engineer's personal `~/.claude/commands/` directory, with instructions for everyone to recreate it locally", "In the project's `.claude/commands/` directory, committed alongside the application code", "As a paragraph of instructions inside the project's CLAUDE.md file that engineers are expected to follow manually", "In a team wiki page that engineers copy into their local environment whenever they remember to"], "correct": [1], "explanation": "Commands placed in the project's `.claude/commands/` directory are version-controlled with the rest of the codebase, so every engineer who clones the repo gets the exact same command automatically and updates propagate the next time they pull. A personal user-level directory is not part of the repository, so each engineer would need to recreate the command themselves and it would drift out of sync. Prose in CLAUDE.md is read as context rather than invoked as a reusable command, and a wiki page requires manual copying that will not stay current."}, {"id": "F-D3-B2-02", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer is fixing a single incorrect error-message string in one file. The bug is fully understood, the fix is one line, and there is no ambiguity about the correct change. What is the most appropriate way to have Claude Code make this change?", "options": ["Direct execution: describe the fix and let Claude Code make the edit right away", "Enter plan mode, produce a written proposal comparing several possible fixes, and get approval before any edit is made", "Spawn an Explore subagent to search the entire repository for every occurrence of similar strings before touching this one", "Write a new CLAUDE.md rule describing the correct error message text, then ask Claude Code to re-read its configuration before editing"], "correct": [0], "explanation": "A simple, well-scoped, unambiguous one-line change is exactly the case where direct execution is most efficient: there is nothing architectural to weigh and no competing approaches to compare. Plan mode adds overhead that pays off for complex or multi-approach work, not a single obvious fix. Spawning an Explore subagent is meant for isolating verbose discovery across a large or unfamiliar codebase, not a change whose location and content are already known. Adding a permanent CLAUDE.md rule for a one-off string fix conflates a universal standing instruction with a single throwaway edit."}, {"id": "F-D3-B2-03", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A developer on the multi-agent research system project wants a personal `/wip-commit` shortcut that formats commit messages the way they individually prefer. They do not want it applied to, or reviewed by, the rest of the team. Where should this command live?", "options": ["In `~/.claude/commands/`, so it is available only in that developer's own environment", "In `.claude/commands/` inside the project repository, so it is documented for the whole team", "In the project's CLAUDE.md file under a 'personal preferences' heading", "In `.claude/skills/wip-commit/SKILL.md` with `context: fork` so it runs isolated from the team's shared context"], "correct": [0], "explanation": "The user-level `~/.claude/commands/` directory is personal and not checked into the project repository, which is exactly what an individual preference that shouldn't be imposed on teammates needs. Placing it in the project's `.claude/commands/` would share it with, and implicitly propose it to, every teammate through version control. CLAUDE.md is loaded context for everyone on the project, not a place to isolate one person's private tooling. A forked-context skill would still typically live in the shared project directory and solves an isolation-of-execution problem, not a sharing-scope problem."}, {"id": "F-D3-B2-04", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "An architect has been asked to migrate a service from a REST API to GraphQL. The migration touches dozens of files, several viable schema designs exist, and the team has not yet decided how to handle backward compatibility. What is the best way to start this work with Claude Code?", "options": ["Begin direct execution on the first file that looks related, and adjust course as new files are discovered", "Write a CLAUDE.md rule stating 'always prefer GraphQL' and let future sessions figure out the details", "Use plan mode to investigate the codebase and lay out candidate approaches before any files are changed", "Ask Claude Code to make the change and immediately commit it so the team can review a concrete diff"], "correct": [2], "explanation": "A large, architecturally significant change with multiple viable designs and open questions is precisely what plan mode is for: it lets the team compare approaches and settle ambiguity before any code is touched. Jumping straight into direct execution on a partially understood, multi-file migration risks inconsistent changes and rework. A CLAUDE.md rule is a standing convention, not a substitute for planning a specific one-time migration. Committing an unreviewed direct-execution diff for a decision that hasn't been made yet skips the investigation the situation clearly calls for."}, {"id": "F-D3-B2-05", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team builds a skill that ingests thousands of lines of production log output, filters it, and triages the noteworthy errors. They notice that when the skill runs inline, the massive intermediate log dumps consume so much of the conversation that later turns lose earlier context. Which SKILL.md frontmatter setting most directly addresses this?", "options": ["A shorter `description` field so the skill is easier to select", "`argument-hint`, so users know to pass a smaller log file", "`context: fork`, so the skill's verbose intermediate work happens in an isolated context and only the result returns to the main conversation", "`allowed-tools`, restricted to just the Read tool"], "correct": [2], "explanation": "Running the skill with `context: fork` isolates its execution, so the thousands of lines of intermediate log output stay out of the main conversation and only the distilled result comes back: directly solving the context-pollution problem described. `argument-hint` only documents expected inputs for the user invoking the skill; it doesn't change how much output floods the conversation. `allowed-tools` controls which tools the skill may call, not where its context lives. Shortening the description only affects how Claude decides to invoke the skill, not the volume of output it produces once running."}, {"id": "F-D3-B2-06", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An engineer is debugging an intermittent failure in an unfamiliar module and wants to poke around the code, trace call paths, and form hypotheses, without any risk that Claude Code accidentally edits a file while investigating. Which approach best fits this need?", "options": ["Direct execution, trusting that Claude Code will only read files unless explicitly told to write", "A project-level slash command that wraps the investigation steps into one reusable command", "Plan mode, which lets Claude Code read and reason about the code without making edits until a plan is approved", "A CLAUDE.md rule instructing Claude Code never to use the Edit tool during debugging sessions"], "correct": [2], "explanation": "Plan mode is designed for exactly this kind of safe exploration: Claude Code can investigate and reason freely while edits are held back until a plan is reviewed and approved, removing the risk of an accidental change mid-investigation. Direct execution carries no such guarantee: it is built for making changes, not for a protected read-only exploration phase. A slash command is a convenience for repeating a known set of steps, not a mechanism for constraining edit risk. A standing CLAUDE.md rule is a probabilistic prompt instruction, not the deterministic safeguard that a dedicated exploration mode provides."}, {"id": "F-D3-B2-07", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A team packages their code-review process as a skill invoked via `/review-pr`. They want to guarantee the skill can inspect and comment on code but can never modify a file, even if the prompt is manipulated into suggesting an edit. Which SKILL.md setting should they configure?", "options": ["`argument-hint`, documenting that the skill takes a pull request number", "`context: fork`, so the review happens in an isolated conversation", "A CLAUDE.md instruction telling Claude Code not to edit files during code review", "`allowed-tools`, listing only read-oriented tools such as Grep, Glob, and Read, and omitting Edit and Write"], "correct": [3], "explanation": "`allowed-tools` is the mechanism that constrains which tools a skill can invoke at all: leaving out Edit and Write makes it structurally impossible for the skill to modify files, regardless of what the prompt says. `argument-hint` only documents expected inputs and has no bearing on tool access. `context: fork` isolates where the skill's conversation happens, not what it's permitted to do once running. A CLAUDE.md instruction is a prompt-level nudge that a manipulated or confused turn could still fail to follow, which is the probabilistic gap this scenario explicitly wants to avoid."}, {"id": "F-D3-B2-08", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A developer is assigned to fix a bug in a 500-file legacy codebase they have never worked in before. Locating the relevant code will likely require many rounds of searching and reading files, producing a large volume of intermediate output. What is the best way to keep this discovery work from overwhelming the main conversation's context?", "options": ["Delegate the search-and-read work to an Explore subagent and have it return only the relevant findings", "Enter plan mode and perform all the searching manually within the plan, since plan mode has no context limits", "Create a project-level slash command called `/find-bug` and run it directly in the main conversation", "Lower the model tier to Haiku so search results are shorter"], "correct": [0], "explanation": "An Explore subagent is built to isolate exactly this kind of verbose, exploratory discovery: it does the many rounds of searching and reading in its own context and hands back only the distilled findings, keeping the main conversation clean. Plan mode changes when edits are permitted, not how much raw search output accumulates in the shared context. A slash command run directly in the main conversation would still dump all of its search output into that same context. Switching model tiers affects reasoning quality and cost, not the volume of tool output that gets appended to the conversation."}, {"id": "F-D3-B2-09", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A skill accepts a required file path and an optional `--severity` flag, and the team wants anyone invoking it to immediately see the expected inputs without reading the skill's full implementation. Which SKILL.md frontmatter field is designed for this?", "options": ["`allowed-tools`", "`context: fork`", "A general `description` field", "`argument-hint`"], "correct": [3], "explanation": "`argument-hint` exists specifically to surface the expected arguments to whoever is invoking the skill, so the required path and optional severity flag show up up front. `allowed-tools` governs which tools the skill may call, not what arguments it expects. `context: fork` controls whether the skill executes in an isolated context, unrelated to documenting inputs. A general description field explains what the skill does overall, but it isn't the field built to spell out argument usage."}, {"id": "F-D3-B2-10", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A team lead observes that engineers are entering plan mode even for one-line configuration edits with an obvious, singular fix, and complains this is slowing the team down. What guidance best addresses the complaint?", "options": ["Reserve plan mode for complex, architectural, or multi-approach work, and use direct execution for simple, well-scoped changes like this one", "Keep using plan mode for every change, since more planning is always safer regardless of scope", "Replace plan mode entirely with an Explore subagent for all future changes", "Disable plan mode at the project level so it can never be invoked"], "correct": [0], "explanation": "The fix is matching the tool to the task: plan mode earns its overhead on complex, architectural, or multi-approach work, while a one-line, unambiguous config edit is exactly what direct execution handles efficiently. Treating more planning as unconditionally safer ignores that the complaint is specifically about wasted overhead on trivial changes. An Explore subagent solves a different problem (isolating verbose discovery) and doesn't replace the plan-versus-direct decision. Disabling plan mode entirely throws away its value for the legitimately complex changes the team will still need to make."}, {"id": "F-D3-B2-11", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "easy", "question": "A repository contains a committed `.claude/commands/deploy-check.md` file. A new engineer clones the repository for the first time and, without any extra setup, is immediately able to run `/deploy-check`. What best explains why the command is available right away?", "options": ["Claude Code automatically copies all commands from teammates' `~/.claude/commands/` directories on first use", "Project-level commands live inside the repository, so cloning the repo brings the command along automatically", "The command was defined inside CLAUDE.md, which is always bundled with every clone", "Slash commands are built into Claude Code itself and `deploy-check` happens to match a reserved name"], "correct": [1], "explanation": "Because `.claude/commands/` sits inside the project directory, it is tracked by version control just like source code, so a fresh clone brings the command file with it and it's usable immediately. User-level command directories are personal and are never copied between teammates' machines. CLAUDE.md is a separate configuration mechanism for contextual instructions, not where this command file was defined. Slash commands defined this way are project-specific additions, not reserved built-in names."}, {"id": "F-D3-B2-12", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "Before writing any code, an architect wants to compare three viable approaches to adding caching to a service (in-memory, a dedicated Redis instance, and a CDN layer), weighing latency, operational cost, and complexity for each. What is the best way to use Claude Code for this step?", "options": ["Direct execution, implementing the in-memory option first since it's the fastest to try", "An Explore subagent, to search the codebase for any existing caching code", "Plan mode, to lay out and compare the trade-offs of each approach before committing to an implementation", "A project-level slash command pre-written to always choose Redis"], "correct": [2], "explanation": "Comparing multiple viable architectural approaches before any implementation is squarely what plan mode is for: it produces a reasoned comparison the team can review and approve before code changes happen. Jumping into direct execution on one option skips the comparison the architect explicitly asked for and risks picking the wrong trade-off. An Explore subagent is useful for locating existing code, but it doesn't perform the cross-approach trade-off analysis being requested. A command that hard-codes one answer defeats the purpose of comparing options at all."}, {"id": "F-D3-B2-13", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "An engineer defines a `/my-format` command inside their own `~/.claude/commands/` directory and expects teammates to have it available after they pull the latest changes from the shared repository. After pulling, none of the teammates can run `/my-format`. What is the most likely explanation?", "options": ["User-level commands are stored outside the project repository and are never shared through version control", "Slash commands require a restart of Claude Code before they take effect for any teammate", "The command's `allowed-tools` field was left empty, so Claude Code silently disabled it for everyone", "Commands defined by one engineer automatically expire after a fixed number of days"], "correct": [0], "explanation": "Commands placed under a personal `~/.claude/commands/` directory live outside the project repository entirely, so a `git pull` by teammates has nothing to fetch: that directory was never part of what got committed. Restart timing isn't the issue here since the command was never shared to begin with. `allowed-tools` affects which tools a command or skill may use, not whether the command exists on someone else's machine. There's no mechanism by which locally defined commands expire; the scope problem is about sharing, not expiration."}, {"id": "F-D3-B2-14", "cert": "CCAR-F", "domain": "Claude Code Configuration & Workflows", "type": "single", "difficulty": "medium", "question": "A junior architect has started entering plan mode before every change, including small, single-purpose edits like renaming a variable or adjusting a log message. Their teammates, who reserve plan mode for larger decisions, are noticeably faster on similar work. What should the junior architect change?", "options": ["Continue using plan mode for everything, since it always produces a higher-quality result than direct execution", "Stop using plan mode entirely and rely only on direct execution going forward", "Reserve plan mode for complex, architectural, or multi-approach decisions, and use direct execution when a change is simple and well-scoped", "Replace plan mode with
