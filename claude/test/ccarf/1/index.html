<style>
.wrap{max-width:900px;margin:0 auto;padding:22px 18px 80px}
h1,h2,h3{line-height:1.25;margin:0}
button{font-family:inherit;cursor:pointer}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.hidden{display:none!important}

/* top bar */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);margin-bottom:22px}
.topbar-in{max-width:900px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:650;letter-spacing:-.01em}
.brand .dot{width:16px;height:16px;border-radius:5px;background:var(--accent)}
.brand small{font-weight:500;color:var(--muted)}
.spacer{flex:1}
.timer{font-weight:650;padding:5px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);letter-spacing:.02em}
.timer.warn{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.pill{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-weight:550}
.back-link{font-size:13px;font-weight:600;color:var(--faint);text-decoration:none;white-space:nowrap}
.back-link:hover{color:var(--accent-ink)}

/* cards & buttons */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.btn{border:1px solid var(--border-2);background:var(--surface);color:var(--ink);border-radius:10px;padding:11px 18px;font-weight:600;font-size:15px;transition:.15s}
.btn:hover{border-color:var(--faint)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.lg{padding:14px 26px;font-size:16px}

/* HOME */
.hero{padding:30px 30px 26px}
.hero h1{font-size:27px;letter-spacing:-.02em}
.hero p.sub{color:var(--muted);margin:9px 0 0;font-size:15.5px}
.section-label{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:26px 4px 11px}
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cert-card{padding:18px 18px 16px;text-align:left;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius);transition:.15s;position:relative}
.cert-card:hover{border-color:var(--accent-d)}
.cert-card.sel{border-color:var(--accent);box-shadow:0 0 0 3px #cc7a5c22}
.cert-card .code{font-weight:750;font-size:15px}
.cert-card .full{font-size:13.5px;color:var(--muted);margin-top:2px}
.cert-card .meta{font-size:13px;color:var(--faint);margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:650;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--muted)}
.len-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.len-card{padding:16px;text-align:center;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius);transition:.15s}
.len-card:hover{border-color:var(--accent-d)}
.len-card.sel{border-color:var(--accent);box-shadow:0 0 0 3px #cc7a5c22}
.len-card .n{font-size:23px;font-weight:750;letter-spacing:-.02em}
.len-card .l{font-size:13px;color:var(--muted);margin-top:2px}
.start-row{display:flex;align-items:center;gap:16px;margin-top:26px}
.disclaimer{font-size:12.5px;color:var(--faint);margin-top:24px;line-height:1.5}
.domain-list{margin-top:10px;font-size:13.5px;color:var(--muted)}
.domain-list div{display:flex;justify-content:space-between;padding:5px 2px;border-bottom:1px dashed var(--border)}
.domain-list div:last-child{border-bottom:0}

/* QUIZ */
.qtop{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.progress{flex:1;min-width:160px;height:8px;background:var(--border);border-radius:20px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
.qcount{font-size:13.5px;color:var(--muted);font-weight:600;white-space:nowrap}
.qcard{padding:26px 26px 22px}
.qbadges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{font-size:11.5px;font-weight:650;border-radius:6px;padding:3px 9px;border:1px solid var(--border)}
.badge.dom{background:#f2eef8;border-color:#e0d6ef;color:#6b4ba0}
.badge.type{background:#eef4f2;border-color:#cfe4dc;color:#2f7a52}
.badge.diff-easy{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.badge.diff-medium{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.badge.diff-hard{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.qtext{font-size:18px;line-height:1.5;font-weight:550;letter-spacing:-.01em;white-space:pre-wrap}
.hint{font-size:13px;color:var(--accent-ink);font-weight:600;margin:12px 0 0}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1.5px solid var(--border);border-radius:11px;background:var(--surface);transition:.12s;text-align:left;width:100%}
.opt:hover{border-color:var(--accent-d);background:var(--surface-2)}
.opt.chosen{border-color:var(--accent);background:#cc7a5c12}
.opt .box{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;margin-top:1px}
.opt.radio .box{border-radius:50%}
.opt.chosen .box{background:var(--accent);border-color:var(--accent)}
.opt .txt{flex:1;font-size:15.5px;line-height:1.5}
.qnav{display:flex;gap:10px;margin-top:22px;align-items:center;flex-wrap:wrap}
.flagbtn{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--border-2);border-radius:9px;padding:9px 14px}
.flagbtn.on{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}

/* navigator */
.navigator{margin-top:16px;padding:16px 18px}
.navigator h3{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.grid-nums{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:8px}
.gn{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-weight:650;font-size:13.5px;color:var(--muted);position:relative}
.gn:hover{border-color:var(--faint)}
.gn.answered{background:#cc7a5c18;border-color:var(--accent-d);color:var(--accent-ink)}
.gn.current{outline:2px solid var(--accent);outline-offset:1px}
.gn.flagged::after{content:"";position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--amber);border:1.5px solid #fff}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:14px}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(30,25,20,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{max-width:460px;width:100%;padding:24px;border-radius:16px;background:var(--surface);box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{font-size:19px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14.5px;margin:0 0 8px}
.modal .stats{display:flex;gap:10px;margin:16px 0 20px}
.modal .stats > div{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 6px}
.modal .stats b{display:block;font-size:20px}
.modal .stats small{font-size:11.5px;color:var(--muted)}
.modal-row{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* RESULTS */
.res-hero{padding:28px 30px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.ring{flex:none}
.res-head h2{font-size:22px;letter-spacing:-.02em}
.res-head .verdict{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:6px 14px;border-radius:20px;margin-top:10px}
.res-head .verdict.pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.res-head .verdict.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.res-head .sub{color:var(--muted);font-size:14px;margin-top:10px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.stat{padding:15px 16px}
.stat .k{font-size:12px;color:var(--faint);font-weight:650;text-transform:uppercase;letter-spacing:.05em}
.stat .v{font-size:22px;font-weight:750;letter-spacing:-.02em;margin-top:3px}
.dom-break{padding:20px 22px;margin-top:16px}
.dom-break h3{font-size:16px;margin-bottom:4px}
.dom-break .cap{color:var(--muted);font-size:13.5px;margin-bottom:16px}
.dbar{margin:13px 0}
.dbar .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;gap:10px}
.dbar .top b{font-weight:600}
.dbar .top .sc{font-weight:700;white-space:nowrap}
.track{height:10px;background:var(--border);border-radius:20px;overflow:hidden}
.track > i{display:block;height:100%;border-radius:20px;transition:width .5s}

/* review */
.rev-tools{display:flex;gap:9px;align-items:center;margin:22px 2px 12px;flex-wrap:wrap}
.filterbtn{font-size:13.5px;font-weight:600;border:1px solid var(--border-2);background:var(--surface);border-radius:20px;padding:7px 15px;color:var(--muted)}
.filterbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
.rev{padding:22px 24px;margin-bottom:14px}
.rev .rq{font-size:16.5px;font-weight:550;line-height:1.5;margin:12px 0 16px;white-space:pre-wrap}
.rev-opt{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:9px;font-size:15px;line-height:1.5}
.rev-opt .ic{flex:none;font-weight:800;width:20px;text-align:center;margin-top:1px}
.rev-opt.correct{background:var(--green-bg);border-color:var(--green-bd)}
.rev-opt.correct .ic{color:var(--green)}
.rev-opt.wrong{background:var(--red-bg);border-color:var(--red-bd)}
.rev-opt.wrong .ic{color:var(--red)}
.rev-opt .lab{font-size:11.5px;font-weight:700;margin-left:8px;padding:1px 7px;border-radius:5px;white-space:nowrap}
.rev-opt.correct .lab{background:var(--green);color:#fff}
.rev-opt.wrong .lab{background:var(--red);color:#fff}
.expl{margin-top:14px;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:14.5px;line-height:1.6}
.expl b{color:var(--accent-ink)}
.rev-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.outcome{font-size:12.5px;font-weight:750;padding:3px 10px;border-radius:20px;white-space:nowrap}
.outcome.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.outcome.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.footer-actions{display:flex;gap:12px;justify-content:center;margin:30px 0 10px;flex-wrap:wrap}

@media(max-width:640px){
  .cert-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr}
  .hero{padding:24px 20px}
  .qcard,.rev{padding:20px 18px}
  .res-hero{padding:22px 20px}
}

<script id="qbank" type="application/json">[{"id": "F-D1-B1-01", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A customer support resolution agent calls the model, and the response comes back with stop_reason set to tool_use, requesting a call to get_customer. What should the orchestration harness do next?", "options": ["Scan the assistant's message text for a phrase like 'looking up the customer' before deciding whether the tool call is real.", "Return the response to the customer as the final resolution, since the model has already generated output.", "Pause and wait for a support rep to manually approve the call, because any tool_use response signals the model's turn is already finished.", "Execute get_customer, append its result to the conversation as a tool result, and send the updated conversation back to the model."], "correct": [3], "explanation": "A stop_reason of tool_use means the model paused specifically to have a tool executed; the harness must run get_customer, append its result as a tool result, and continue the loop by sending another request. Treating the tool_use response as final output would end the interaction before the agent has any customer data to act on. Gating on manual approval by default misreads what tool_use means: it is not a pause for human review, it is a request for programmatic execution. Scanning the assistant's text for a confirming phrase reintroduces natural-language parsing into a decision that the stop_reason field already answers deterministically."}, {"id": "F-D1-B1-02", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "In a multi-agent research system, a synthesis subagent finishes writing its final cited report and returns a response with no tool_use blocks; the response's stop_reason is end_turn. What should the coordinator do?", "options": ["Treat the response as the subagent's final output, stop looping on that subagent, and incorporate the report.", "Scan the report's text to confirm it 'sounds' finished before accepting it as final.", "Keep sending follow-up requests to the subagent until it produces at least one more tool call, just to be safe.", "Immediately trigger another synthesis pass regardless of stop_reason, since one pass is rarely sufficient."], "correct": [0], "explanation": "end_turn is the model's own signal that it has produced a complete response with nothing further pending, so the coordinator should accept the report as final and move on. Continuing to solicit tool calls after end_turn ignores the deterministic signal and can push the subagent into unnecessary, unrequested work. Double-checking by reading the report's tone is exactly the kind of natural-language judgment call that stop_reason is meant to replace. Automatically forcing a second pass regardless of stop_reason conflates a design choice about report quality with the mechanics of loop termination. If a second pass is genuinely needed, that should be a deliberate decision, not a default reaction to every end_turn."}, {"id": "F-D1-B1-03", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "An extraction pipeline built on the Agent SDK loops on an agent that pulls line items out of scanned invoices. An engineer's harness code checks whether the assistant's text contains the phrase 'extraction complete' to decide when to stop looping and return the final JSON. On some invoices, the loop stops after the first partial extraction because the model mentions being 'nearly complete' in an intermediate message. What is the best fix?", "options": ["Refine the target phrase to something more specific, like 'extraction fully complete', so the intermediate message no longer matches.", "Stop scanning the assistant's text for phrases and instead terminate the loop only when the response's stop_reason equals end_turn.", "Lower the model's output length so it cannot produce intermediate commentary before the final answer.", "Keep the phrase check but add a second check requiring the phrase to appear twice across the conversation."], "correct": [1], "explanation": "The root problem is that termination is being decided by pattern-matching the model's prose, which is inherently unreliable. Any wording change can trigger a false positive or miss a true completion. The stop_reason field is the authoritative, deterministic signal for whether the model is done (end_turn) or still needs a tool executed (tool_use), and switching to it eliminates the whole class of phrase-matching failures. Tightening the target phrase or requiring it twice are both still natural-language parsing under the hood and will eventually break on some other wording variant. Restricting output length doesn't address the underlying design flaw and would degrade the quality of the model's work along the way."}, {"id": "F-D1-B1-04", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "While automating a multi-step refactor with the Agent SDK, an engineer notices the agent loop sometimes runs many tool calls in a row without finishing. As a quick fix, they add code that force-stops the loop and returns whatever partial result exists after exactly 10 tool calls, regardless of stop_reason. What is the main problem with this approach?", "options": ["It will cause the Agent SDK to throw an unrecoverable error the next time the loop is invoked.", "It is functionally identical to checking stop_reason, just implemented differently.", "It prevents the model from ever receiving tool results, so no tool call can complete successfully.", "It treats the iteration count as the primary termination signal, so a legitimate refactor that genuinely needs more than 10 tool calls gets cut off before the model ever reaches end_turn."], "correct": [3], "explanation": "Using a fixed call count as the thing that decides when the agent is 'finished' is a different, weaker signal than stop_reason: it will truncate genuinely unfinished multi-step work while doing nothing to address why the loop needed so many calls in the first place. This doesn't crash the SDK or block tool results from being appended; those mechanics are unaffected. It's also not equivalent to checking stop_reason: stop_reason reflects the model's own assessment that it has produced a final answer, while a call count is an arbitrary external limit with no relationship to task completion. A better approach keeps stop_reason as the termination signal and treats an unusually high call count as a signal to investigate, not a normal way to end the turn."}, {"id": "F-D1-B1-05", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "While exploring an unfamiliar codebase, an agent calls Grep to find all usages of a deprecated function. The harness executes the search successfully but a bug in the harness code fails to append the Grep results to the conversation before sending the next request. What is the most likely effect on the agent's next response?", "options": ["The next response will fail validation and the API will return an explicit 'missing search results' error naming Grep.", "The loop will simply skip ahead to end_turn, since Grep is a read-only tool and doesn't require a result to be appended.", "The model has no actual knowledge of what Grep found, so it may re-issue the same search, ask about results it never received, or fabricate plausible-looking usages instead of real ones.", "The model automatically retrieves the missing Grep output from the harness's internal state before responding."], "correct": [2], "explanation": "The model's understanding of what happened is built entirely from what's in the conversation history; if a tool result is never appended, the model has nothing to go on and may re-run the same search, ask about output it never actually saw, or confidently describe usages it invented rather than what Grep actually found. The model cannot reach into the harness's internal state to recover a result that was never sent to it. The conversation is the only channel. There's no generic API-level error that specifically detects and names an unappended tool result; the failure shows up as confused or fabricated model behavior instead. Nothing about a tool being read-only changes the requirement to append its result, every tool call still needs its result surfaced to the model."}, {"id": "F-D1-B1-06", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "During a CI code review run, the model's response has stop_reason set to tool_use and contains two separate tool_use blocks: one requesting run_tests and one requesting lint. What must the harness do before sending its next request to the model?", "options": ["Ask the model, in plain text, which of the two tools it would prefer to run first.", "Execute both run_tests and lint, and append both of their results as tool results in the same next turn before continuing.", "Send two separate follow-up requests to the model, one after each tool finishes, before either result is appended.", "Execute only run_tests, since it appeared first, and treat the lint request as implicitly cancelled."], "correct": [1], "explanation": "When a single response contains multiple tool_use blocks, the model is waiting on all of them: the harness needs to execute every requested tool and include all of their results together before the next request, so the model has the complete picture of what happened at that turn. Executing only the first and dropping the second leaves one of the model's requests permanently unanswered. Sending two separate follow-up requests before either result is appended doesn't match how the turn is structured: both results belong in the same next turn, not split across two round trips. Asking the model to pick one in plain text sidesteps the actual requirement, which is to run both and report back, not to renegotiate what was already requested."}, {"id": "F-D1-B1-07", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support agent's response includes the text 'I've processed the refund, but let me also flag this account for a specialist to review,' and the API response's stop_reason is tool_use because the message also contains a request to call escalate_to_human. A junior engineer's harness reads the phrase 'processed the refund' and ends the loop immediately, before escalate_to_human ever runs. What should the harness rely on instead?", "options": ["The order in which sentences appear in the assistant's message, ending the loop only after the last sentence is generated.", "The presence of the word 'refund' anywhere in the conversation history.", "The stop_reason field alone: since it is tool_use, the loop must execute the requested tool and continue, regardless of what the assistant's text says.", "A more specific phrase match, such as 'refund fully processed and case closed', to avoid ending the loop too early."], "correct": [2], "explanation": "The assistant's prose is not a reliable completion signal: it can describe an action while the response is still mid-turn, exactly as shown here, where the model's own text and its stop_reason disagree. The stop_reason field is authoritative: tool_use means the harness must execute the pending tool call (here, escalate_to_human) and append its result before looping again, no matter what the text says. Refining the matched phrase still leaves the harness dependent on fragile text parsing that will fail on the next wording variant. Looking at sentence order or keyword presence elsewhere in the history has the same fundamental flaw of substituting text heuristics for the deterministic field the API already provides."}, {"id": "F-D1-B1-08", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A new engineer is implementing their first Agent SDK harness and asks a teammate how the control flow should work. Select all statements that correctly describe proper agentic loop behavior.", "options": ["The loop should always cap out after a fixed number of iterations, and that cap, not stop_reason, is what determines when the agent is done.", "When stop_reason is end_turn, terminate the loop and treat the response as the final answer.", "If a single response contains more than one tool_use block, execute all of them and append all of their results before continuing the loop.", "The loop should end as soon as the assistant's message no longer contains a question mark, since that suggests the model is finished.", "When stop_reason is tool_use, execute the requested tool(s) and append the result(s) to the conversation before sending the next request."], "correct": [1, 2, 4], "explanation": "Driving control flow off stop_reason is the core mechanic: tool_use means execute and append results before continuing, end_turn means the model has produced its final answer and the loop should stop, and a turn with multiple tool_use blocks requires all of them to be executed and answered before the next request. Ending the loop based on punctuation in the assistant's text is a natural-language heuristic with no reliable connection to whether the model is actually finished. Making a fixed iteration count the primary determinant of completion is the arbitrary-cap anti-pattern: it can cut off legitimate multi-step work and doesn't reflect what the model itself has signaled through stop_reason."}, {"id": "F-D1-B1-09", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "During a structured extraction run, one of the agent's tool calls fails because the source document contains a corrupted table that the parsing tool can't handle. What should the harness do so the agentic loop continues correctly?", "options": ["End the loop immediately and report the whole document as unprocessable, without giving the model a chance to respond.", "Skip appending anything for that tool call and immediately send the next request as if the call never happened.", "Silently substitute an empty successful result for the failed call so the model isn't distracted by the error.", "Append the failure as the tool result for that call, let the model see it and decide how to proceed, then continue looping."], "correct": [3], "explanation": "Every tool call the model makes needs a corresponding result appended to the conversation, and a failure is simply a result with error content. Appending it lets the model see what went wrong and decide whether to retry, work around it, or ask for escalation, then the loop continues normally. Skipping the append entirely leaves the conversation missing a response to a call the model is waiting on, which breaks the turn-taking the loop depends on. Ending the loop outright removes the model's opportunity to react to a single failed call, which is a disproportionate response to one bad table. Fabricating a fake successful result hides real information from the model and risks it confidently reporting data that was never actually extracted."}, {"id": "F-D1-B1-10", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "During code review of a research coordinator's harness, you find this loop logic: while True: response = call_model(messages); if \"tool_use\" in response.assistant_text: execute_requested_tools(); append_results(); continue; else: break. The team reports the loop sometimes exits early even though the model clearly requested a tool, and other times keeps running after the model has already given a final answer. What is the bug?", "options": ["The loop checks for the substring 'tool_use' inside the assistant's generated text instead of checking the response's actual stop_reason field, so it misfires whenever the wording does or doesn't happen to contain that substring.", "The continue statement is misplaced and should be a break instead, which would fix both symptoms.", "execute_requested_tools() is being called before append_results(), and swapping their order will fix the early-exit symptom.", "The while True loop needs an explicit maximum iteration count added to prevent it from ever running after end_turn."], "correct": [0], "explanation": "The code is scanning the assistant's generated text for a literal substring instead of reading the structured stop_reason field the API actually returns. That's unreliable in both directions: it can miss a genuine tool_use response whose text doesn't happen to contain that substring, and it can keep looping on a final answer that happens to mention tool use in its wording. Swapping continue and break would invert the loop's behavior entirely rather than fix the detection logic. Reordering execution and appending doesn't address the actual defect, which is what condition is being tested, not the order of the two calls inside the true branch. Adding an iteration cap treats a symptom (the loop not stopping when it should) without fixing the root cause, which is checking the wrong signal in the first place."}, {"id": "F-D1-B1-11", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team lead mandates that every Claude Code agent loop in their CI pipeline must stop after exactly 3 tool calls 'to keep runs predictable and fast.' After rollout, several legitimate refactors that need 5-6 tool calls are being cut off with incomplete changes. What is the fundamental issue with the team lead's policy?", "options": ["Three tool calls is simply too small a number, and the policy would work fine if raised to 10.", "The policy conflicts with how stop_reason is encoded in the API and will cause requests to be rejected outright.", "It substitutes a fixed call count for the model's own end_turn signal, so tasks that legitimately need more steps are terminated before completion rather than when the model is actually done.", "Tool calls in Claude Code cannot be counted reliably, so any count-based policy is technically infeasible."], "correct": [2], "explanation": "The core problem is architectural, not just a matter of picking a better number: any fixed cap used as the primary way to decide when a task is finished will eventually collide with a task that legitimately needs more steps, cutting it off mid-work instead of letting stop_reason reach end_turn naturally. Raising the number to 10 only delays the same failure mode to a bigger task, it doesn't fix the underlying design. Tool calls are perfectly countable in a harness; that's not a technical barrier. Nothing about a call-count check causes API requests to be rejected. The two mechanisms are unrelated, which is exactly why relying on a count instead of stop_reason produces inconsistent behavior rather than an outright error."}, {"id": "F-D1-B1-12", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "In a Claude Code CI review job, the model's response comes back with stop_reason equal to tool_use, requesting that a run_tests tool be executed. What is the correct next step for the automation harness?", "options": ["Wait for a human reviewer to approve merging the pull request before doing anything further.", "Log the requested tool call and end the job, since the review is considered finished once the model asks for a tool.", "Discard the tool_use request and ask the model directly, in plain text, what the test results would probably be.", "Run run_tests, append its output to the conversation as a tool result, and send the conversation back to the model to continue."], "correct": [3], "explanation": "A tool_use stop_reason means the model needs the tool executed to keep making progress on the review; the harness should run it, append the result, and continue the loop, exactly as in any other agentic loop. Ending the job at this point would leave the review incomplete, since the model hasn't actually seen any test output yet. Gating on human PR-approval has nothing to do with executing a pending tool call. That's a separate concern from the loop mechanics. Asking the model to guess test results defeats the purpose of having it call a real tool and would produce a review based on speculation rather than actual output."}, {"id": "F-D1-B1-13", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A support-bot harness has the following behaviors: (1) it ends the loop when the model's text contains a phrase like 'issue resolved'; (2) it force-stops after 5 tool calls no matter what; (3) it executes any requested tool and appends the result before making the next request; (4) it checks stop_reason for equality with end_turn to decide whether the interaction is finished; (5) it continues looping any time stop_reason is tool_use, even if that happens on the very first response. Select all of the behaviors that are anti-patterns the team should remove.", "options": ["Continuing to loop any time stop_reason is tool_use, even on the very first response.", "Executing any requested tool and appending the result before making the next request.", "Ending the loop when the model's text contains a phrase like 'issue resolved'.", "Force-stopping after exactly 5 tool calls no matter what.", "Checking stop_reason for equality with end_turn to decide whether the interaction is finished."], "correct": [2, 3], "explanation": "Scanning the assistant's text for a resolution phrase is the natural-language-parsing anti-pattern: model wording varies and can appear before a turn is actually complete. Force-stopping at a fixed call count is the arbitrary-iteration-cap anti-pattern: it will cut off any legitimate case that needs more than 5 calls, regardless of what the model itself has signaled. Executing requested tools and appending their results is exactly the correct loop mechanic, not a problem to remove. Checking stop_reason against end_turn is the correct, deterministic way to detect completion. Continuing to loop whenever stop_reason is tool_use is also correct behavior: it should keep happening consistently, including on an early response, since tool_use always means more work is pending regardless of which turn it occurs on."}, {"id": "F-D1-B1-14", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A document-analysis subagent keeps calling the same search tool with nearly identical queries across many turns. stop_reason is tool_use every time, and the harness correctly executes each call and appends its result, exactly as designed. The loop never reaches end_turn, and the team is tempted to add a hard iteration cap to force it to stop. What does this behavior most likely indicate, and what is the better response?", "options": ["This is expected and requires no investigation, since the loop mechanics of executing and appending results are already implemented correctly.", "The subagent has exhausted its available context window, and the fix is to shrink the system prompt.", "The Agent SDK has a defect in how it evaluates stop_reason, and the fix is to patch the SDK's internal response handling.", "The model isn't getting what it needs from the tool results, likely due to ambiguous instructions or unhelpful result content; that root cause should be investigated and fixed rather than papered over with a cap."], "correct": [3], "explanation": "Correct loop plumbing doesn't guarantee a healthy task: repeatedly reissuing near-identical queries without ever reaching end_turn suggests the model isn't converging, often because the tool results aren't useful enough or the instructions are ambiguous about what 'done' looks like, and that's worth diagnosing directly. A hard cap would silence the symptom without resolving why the subagent is stuck, quietly truncating a task rather than fixing it. Nothing in the description points to an SDK defect, the execute-append-continue mechanics are working exactly as intended, which is precisely why the repeated queries point to a content or instruction problem instead. The scenario also doesn't describe anything consistent with context exhaustion, which tends to produce different symptoms than a tight loop of near-identical tool calls."}, {"id": "F-D1-B1-15", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A developer building a custom harness on the Agent SDK asks which single field they should check to decide whether to keep the agentic loop running. What is the correct answer?", "options": ["The stop_reason field on the model's response.", "The total number of tokens generated so far in the conversation.", "Whether the assistant's message includes the words 'done' or 'finished'.", "Whether the assistant's most recent message ends with a period or a question mark."], "correct": [0], "explanation": "stop_reason is the field the API provides specifically to indicate why the model stopped generating: tool_use means it's pausing for a tool result; end_turn means it considers its response complete. It's the one deterministic signal designed for this decision. Punctuation at the end of a message has no defined relationship to task completion. Token count reflects verbosity, not whether the task is finished. Scanning for words like 'done' or 'finished' is the natural-language-parsing anti-pattern, since the model can use those words in contexts that aren't actually signaling completion."}, {"id": "F-D1-B1-16", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "An architect proposes that every Agent SDK loop should include a high iteration ceiling (say, 200 calls) purely as a circuit breaker against runaway cost, while termination is still driven primarily by stop_reason reaching end_turn. Hitting the ceiling triggers an alert and hands the session to a human rather than silently returning a partial result. Is this design sound?", "options": ["Yes, and the ceiling can fully replace stop_reason checks going forward, since a high enough number will rarely be reached anyway.", "Yes, as long as stop_reason remains the primary way the loop ends under normal conditions, a high ceiling that triggers escalation on the rare occasion it's hit is a reasonable safety net rather than a termination strategy.", "Yes, but only if the harness also scans the assistant's text for signs of confusion before deciding whether to honor the ceiling.", "No, any use of an iteration count is the arbitrary-cap anti-pattern, so no numeric ceiling should ever exist in a loop implementation, even as a backstop."], "correct": [1], "explanation": "The anti-pattern isn't the mere existence of any numeric limit: it's using a fixed count as the primary mechanism for deciding a task is finished. A high ceiling that almost never triggers under normal operation, paired with stop_reason as the actual termination signal and an escalation path (not a silent partial return) when the rare runaway case occurs, addresses a legitimate operational risk without displacing the deterministic signal. Rejecting every numeric limit outright ignores that cost circuit breakers are a reasonable defensive measure when they're not what normally ends the loop. Letting the ceiling replace stop_reason checks reintroduces exactly the failure mode the design is trying to avoid: cutting off legitimate multi-step work. Adding natural-language scanning on top would layer one anti-pattern on top of another rather than fixing anything."}, {"id": "F-D1-B1-17", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "In a CI review harness, after the model requests a lint tool via a tool_use response, an engineer's code updates some internal logging but sends the next request to the model as a fresh user text prompt instead of a proper tool_result block paired with that tool_use. What is the most likely consequence?", "options": ["The conversation is malformed because the pending tool_use call was never answered with a matching tool_result, which can produce an error or leave the model confused about whether the tool actually ran.", "The loop will automatically detect the mismatch and re-request the lint tool call on its own.", "Nothing changes functionally, because the model treats any new text input as equivalent to a tool result regardless of its structure.", "The CI job will simply run faster, since skipping the formal tool_result structure reduces the payload size."], "correct": [0], "explanation": "Every tool_use block the model emits expects a corresponding tool_result before the conversation can sensibly continue; substituting an unrelated free-text prompt leaves that call effectively unanswered, which can produce an error from the API or leave the model uncertain about whether its requested action ever happened. The model does not treat arbitrary text as a substitute for a structured tool result: the pairing matters. Nothing in the loop automatically detects and repairs this kind of mismatch; the harness is responsible for maintaining it correctly. Any payload savings from skipping the proper structure are irrelevant next to the correctness problem this creates."}, {"id": "F-D1-B1-18", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An engineer spent yesterday afternoon debugging a failing test with Claude Code and wants to continue today with the exact same conversation history, tool outputs, and reasoning context intact. Which mechanism should they use?", "options": ["Start a new session and let the model re-derive context from the current state of the files alone.", "Start a new session and paste in a manually written recap of what happened yesterday.", "--resume <session-name> to reattach to yesterday's session.", "fork_session to branch a new session from yesterday's state."], "correct": [2], "explanation": "Resuming the named session restores the full prior conversation, including every tool call and result, so the engineer can continue exactly where they left off without reconstructing anything. Forking is for branching into an independent alternative from a shared state, not simply continuing the same line of work. A manually written recap discards the fidelity of the original tool outputs and reasoning, and is unnecessary extra work when the goal is to preserve everything. Letting the model infer context from the current file state alone throws away the debugging reasoning and intermediate findings that made yesterday's session valuable."}, {"id": "F-D1-B1-19", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A developer wants to try two different fixes for the same bug starting from the identical point in an ongoing Claude Code session, without either experiment overwriting the other or altering the original conversation. Which capability is designed for this?", "options": ["A new slash command that wraps the two fixes into one prompt.", "--resume, run twice in two terminals against the same session name.", "/compact, to shrink the session before trying each fix.", "fork_session, to create independent branches from the shared session state."], "correct": [3], "explanation": "Forking creates an independent branch from the current session state, so each fix can be explored on its own line of history without the two experiments colliding or either one mutating the original conversation. Resuming the same session name twice does not create isolation: both terminals would be continuing (and potentially conflicting with) the same underlying session. Compacting reduces context size but does not create parallel, independent branches to compare alternatives. Wrapping both fixes into a single prompt would have the model reason about them together rather than exploring each as an independent branch."}, {"id": "F-D1-B1-20", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "An engineer new to the Agent SDK believes that running --resume on a session will also silently re-execute every tool call the session made previously, so that any file contents or search results it holds are automatically brought up to date. Is this belief correct?", "options": ["Partially, only file-reading tools are automatically re-run on resume, while other tool types are not.", "No, resuming restores the prior conversation and its previously returned tool results exactly as they were; it does not re-run any tool calls or refresh their outputs.", "Yes, re-running every previous tool call is exactly what makes resuming different from starting a new session.", "Yes, but only for tool calls made in the most recent turn before the session was left."], "correct": [1], "explanation": "Resuming reattaches to the conversation history as it stood when the session was left, including whatever tool results were already returned: it's a restoration of prior state, not a re-execution of prior actions. Nothing about resuming causes tool calls to run again automatically, for file-reading tools or any other kind. Because no automatic refresh happens, anything that changed in the underlying environment since the session was last active has to be surfaced deliberately, which is precisely why informing a resumed session about relevant changes is a separate, necessary step rather than something resume handles on its own."}, {"id": "F-D1-B1-21", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A developer resumes a week-old Claude Code session (--resume) to keep exploring an unfamiliar legacy service. In the resumed conversation, the model still has the contents of several files from its earlier Read tool calls. Unknown to the model, a teammate refactored two of those files yesterday. The developer simply says 'let's keep going.' What is the most likely consequence, and what should the developer do first?", "options": ["The session will fail to resume at all, because Claude Code detects the on-disk changes and blocks reattachment.", "Nothing changes, because resuming a session automatically re-runs every prior tool call to refresh its results.", "The model will reason from the outdated file contents captured in its earlier tool results; the developer should tell it which files changed, or have it re-read them, before continuing.", "The model will silently ignore anything related to the two changed files until told to run Bash directly."], "correct": [2], "explanation": "Resuming a session restores the conversation exactly as it was, including tool results already returned: it does not re-execute previous tool calls, so the model's picture of those two files is now stale. The safe move is to explicitly tell the resumed session what changed, or trigger a fresh read, before it reasons or proposes edits based on outdated contents. Resuming does not automatically refresh file state, and Claude Code does not block reattachment because files changed on disk. The model also won't spontaneously and reliably infer which specific files changed just from being resumed: that has to be surfaced, not assumed."}, {"id": "F-D1-B1-22", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A developer resumes a legacy-codebase exploration session from last week to keep planning a refactor. Since then, another team merged a substantial rewrite of the module the agent had already explored. The developer just says 'let's continue the plan.' The agent proposes changes referencing functions and variables that no longer exist in the codebase. What is the root cause, and what should the developer have done differently?", "options": ["The agent is hallucinating regardless of what's in its context, and no amount of informing it about the rewrite would change its output.", "The agent's training data is out of date, and the fix is to switch to a newer model tier before continuing.", "The agent is reasoning from the module's contents as captured in last week's tool results, which are now stale; the developer should have told it the module was rewritten (or had it re-explore the module) before asking it to continue planning.", "The resumed session silently corrupted its own conversation history, and the fix is to discard it and start over with no context at all."], "correct": [2], "explanation": "Resumed sessions carry forward exactly the tool results they had when they were left, so the agent's mental model of that module still reflects the pre-rewrite code; without being told about the rewrite, it has no way to know its understanding is outdated and will keep planning against code that no longer exists. This isn't a model-capability or training-data issue: the same thing would happen with any model tier given the same stale context, so switching tiers doesn't address it. Nothing points to session corruption here; the history is intact, it's simply out of date relative to the codebase. The premise that informing it wouldn't help is wrong: giving the agent the current state of the rewritten module (or letting it re-explore) is exactly what resolves this class of problem."}, {"id": "F-D1-B1-23", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "An engineer finished extracting structured data from half of a document batch yesterday using a given schema and tool configuration. Nothing about the schema, the documents, or the extraction tools has changed since then, and today's task is simply to continue processing the remaining documents with the identical setup. What is the most appropriate way to continue?", "options": ["Fork the existing session so the original stays untouched while a separate branch processes the rest of the batch.", "Discard all prior context and reprocess the entire batch from the beginning to guarantee consistency.", "Start a fresh session and inject a structured summary describing the schema, since nothing should ever be resumed in a production pipeline.", "Resume the existing session with --resume, since the prior context, schema, and tool configuration are all still valid and directly useful."], "correct": [3], "explanation": "When nothing relevant has changed and the task is a direct continuation of the same work, resuming is exactly the right tool: the prior context is still valid and reusing it avoids re-establishing the schema and setup from scratch. Starting fresh here would throw away perfectly good, still-accurate context for no benefit, which is wasteful when nothing is stale. Forking is meant for branching into an independent alternative, not for straightforward continuation of the same task with no divergence needed. Reprocessing the already-completed half of the batch wastes time and cost without improving consistency, since nothing about the setup has changed."}, {"id": "F-D1-B1-24", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A coordinator session in a multi-agent research system has accumulated dozens of exploratory web-search subagent calls, many of which returned irrelevant results from early, poorly-worded queries. The researcher now has a short list of validated findings and wants to continue with a synthesis subagent, without the irrelevant search noise cluttering the context. What is the best next step?", "options": ["Start a fresh session and inject a structured summary containing the validated findings, rather than resuming the noisy session.", "Resume the existing session with --resume and continue straight into synthesis, since all the history is still technically available.", "Ask the model to summarize the irrelevant searches for itself mid-session and keep going from there.", "Fork the existing session so the noisy history is preserved in a branch while synthesis continues in the same context."], "correct": [0], "explanation": "When a session's history is dominated by low-value tool results that add noise rather than useful context, starting fresh and injecting a concise structured summary of what's actually validated gives the synthesis subagent exactly what it needs without the accumulated clutter. Resuming keeps every irrelevant search result in context, wasting tokens and risking that the model's attention gets diluted among stale, low-value results. Forking still carries the same bloated history forward into the new branch: it doesn't reduce the noise, it just duplicates it. Asking the model to self-summarize mid-session still leaves the full noisy history sitting in context underneath the summary, rather than replacing it."}, {"id": "F-D1-B1-25", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support engineer decides a customer's session history is too stale to resume and opts to start fresh, injecting a structured summary instead. What should that summary contain to be useful to the new session?", "options": ["The complete verbatim conversation and tool-call transcript from the old session, reformatted as a single block of text.", "Only the assistant's final message from the old session, since that reflects where the conversation ended.", "Nothing beyond a short greeting, since the model can infer the necessary facts once the customer restates their issue.", "Concrete case facts the agent will need going forward (such as the customer ID, the order in question, prior decisions made, and any outstanding commitments) rather than the raw transcript."], "correct": [3], "explanation": "A structured summary is meant to give the new session exactly the durable facts it needs: identifiers, decisions already made, commitments outstanding, without dragging along the stale or bloated material that motivated starting fresh in the first place. Reproducing the full verbatim transcript defeats the purpose of starting fresh, since it reintroduces the same volume of content the engineer was trying to avoid. Providing nothing and hoping the model infers what it needs risks losing details the customer won't think to repeat, like an order number or a commitment already made. Using only the last assistant message discards everything except the final line, losing the concrete facts that actually matter for continuity."}, {"id": "F-D1-B1-26", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A nightly CI job uses Claude Code to review the latest commits on an open pull request. Each night, new commits may have been pushed since the previous review. Should the job use --resume to continue the previous night's session for each new run?", "options": ["No, every nightly run should be fully isolated with no reference to prior findings at all, to guarantee a clean review each time.", "No, it's generally better to start a fresh session each run and explicitly pass forward the prior review's findings as structured input, rather than resuming a session whose diff and test-output context reflects the previous, now-outdated commit.", "Yes, but only if fork_session is used instead of --resume, since forking is required before any CI job can access a previous session.", "Yes, resuming preserves the full diff and test history, so it should always be used to avoid losing any prior context."], "correct": [1], "explanation": "The previous session's tool results (the old diff, old test output) describe a commit state that's no longer current, so resuming it wholesale risks the review reasoning about stale evidence; starting fresh and deliberately carrying forward just the prior findings gets the useful continuity (what was already flagged) without the stale tool context. Always resuming keeps that outdated diff and test output in play alongside the new commits, which is exactly the risk worth avoiding. Fork_session isn't a prerequisite for accessing anything in a CI job: it solves a different problem (branching into an independent variant), not routine per-run continuation. Discarding prior findings entirely would mean re-flagging the same issues every night or losing track of what's already been addressed, which throws away useful information for no reason."}, {"id": "F-D1-B1-27", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A support engineering team wants to try two different resolution strategies (issuing store credit versus escalating for a full refund) starting from the identical point in an already-lengthy customer conversation, without either exploratory branch being recorded as part of the customer's official case session used for audit purposes. What should they do?", "options": ["Use fork_session to branch off the current session state, leaving the original case session as the untouched audit record while each branch tries a different strategy.", "Manually copy and paste the conversation transcript into two brand-new sessions and proceed from there.", "Run --resume twice in separate terminals against the same session name, once for each strategy.", "Continue in the single existing session, trying one strategy first and then asking the model to reconsider with the other."], "correct": [0], "explanation": "Forking is designed for exactly this situation: branching into independent alternatives from a shared point while leaving the original session, which here needs to remain a clean audit trail, completely unaffected. Resuming the same session name twice would have both terminals continuing and potentially conflicting with the very session that's supposed to stay untouched, not creating independent branches. Manually copying the transcript loses the fidelity of the actual tool-call state and is unnecessary extra work when forking does this natively. Trying one strategy and then asking the model to reconsider within the same session contaminates the official record with both attempts and lets the second strategy's reasoning be influenced by the first, rather than evaluating each independently."}, {"id": "F-D1-B1-28", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A coordinator session has two problems at once: its history is dominated by dozens of irrelevant early-exploration tool calls, and several of the documents it read early on have since been revised upstream. The team needs to continue with a synthesis pass. Which approach best addresses both problems together?", "options": ["Resume the existing session and separately tell the model which documents changed, leaving the irrelevant exploration history in place since removing it isn't necessary.", "Resume the existing session and ask the model to disregard both the irrelevant history and the outdated documents on its own judgment.", "Start a fresh session and inject a structured summary containing only the validated, current findings: this sidesteps the irrelevant history and lets the current document versions be stated explicitly, rather than trying to separately prune noise and patch staleness inside the old session.", "Fork the existing session so the noisy, stale history is preserved in a branch while a second branch proceeds with synthesis unchanged."], "correct": [2], "explanation": "When staleness and bloat compound, starting fresh with a structured summary solves both at once: the noise never enters the new session, and the current, accurate state of the changed documents can simply be stated as fact rather than requiring the model to reconcile old tool results against a correction. Resuming and only patching the document staleness still leaves the irrelevant exploration history sitting in context, continuing to waste tokens and attention. Forking carries the exact same noisy, stale history into the new branch: it duplicates the problem rather than solving it. Asking the model to sort out on its own judgment what's irrelevant or outdated is unreliable; the whole reason to inform it explicitly is that the model can't verify which of its own context is accurate."}, {"id": "F-D1-B1-29", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A long-running nightly batch job resumes the same session to keep adding newly extracted documents to a growing structured dataset. One night, the upstream source system corrects data in several documents that were already processed on a previous night. What should happen for the resumed session to stay reliable?", "options": ["Disable resuming entirely and reprocess the full document corpus from scratch every night to avoid any possibility of stale data.", "Keep resuming and processing only the new documents each night, since corrections to already-processed documents don't need to be surfaced.", "Explicitly surface the corrected content for those previously processed documents to the resumed session, rather than assuming its earlier extraction results are still accurate.", "Switch from --resume to fork_session each night, since forking automatically re-validates all previously extracted data against the source system."], "correct": [2], "explanation": "The resumed session's earlier extraction results reflect the documents as they were on the night they were processed; if the source system later corrects some of them, the session has no way of knowing unless that correction is explicitly surfaced, so proactively feeding in the updated content is what keeps the dataset accurate. Ignoring corrections and only handling new documents leaves the dataset silently wrong for every corrected record. Forking doesn't perform any validation against a source system: it just branches session state, so switching to it wouldn't catch corrections either. Reprocessing the entire corpus every night to avoid staleness is a far more expensive way to solve a problem that a small, targeted update to just the corrected documents already solves."}, {"id": "F-D1-B1-30", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A coordinator forks its session twice to let two different synthesis approaches be tried in parallel from the same research baseline. After comparing outputs, the team discards one fork and keeps the other. What happens to the original baseline session as a result of this process?", "options": ["The baseline session must be manually reverted, because both forks' tool calls were automatically merged back into it.", "The baseline session now reflects whichever fork was discarded, since forks default to overwriting their origin when abandoned.", "The baseline session is unaffected by either fork: forking creates independent branches, so discarding one doesn't touch the baseline or the surviving fork.", "The baseline session is deleted automatically once any fork of it is created."], "correct": [2], "explanation": "Forking branches independently from a shared starting point: each fork proceeds on its own without writing back to the session it came from, so trying and then discarding one approach has no effect on the original baseline or on the fork that was kept. There's no automatic merge-back of a fork's tool calls into its origin that would require manual reverting. Creating a fork also doesn't delete or otherwise consume the session it branched from: the baseline remains available. A discarded fork doesn't overwrite the baseline either; it simply stops being used, with the baseline exactly as it was before the fork happened."}, {"id": "F-D1-B1-31", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "multiple", "difficulty": "medium", "question": "A team is writing internal guidance on when to start a fresh Claude Code session with an injected structured summary instead of resuming an existing one. Select all of the situations below where starting fresh is the better choice.", "options": ["The existing session's tool results describe underlying data or files that have since changed so extensively that most of the captured context is no longer accurate.", "The new task is essentially unrelated to what the existing session was working on.", "The existing session's history is dominated by failed or irrelevant exploratory tool calls that add bulk without adding useful context.", "Exactly one file referenced early in the session has changed, while the rest of the session's context remains valid and directly useful.", "The existing session is still working on the same task, its tool results remain accurate, and the engineer wants to preserve the full history for continuity."], "correct": [0, 1, 2], "explanation": "Starting fresh with a structured summary is the better choice when the old session's context is extensively stale, when it's cluttered with failed or irrelevant exploration that adds no value, or when the new task doesn't actually relate to what the session was doing: in each case, the old session's history is either inaccurate or not worth carrying forward. When the task is still ongoing and the existing context remains accurate, resuming is what preserves valuable continuity, so restarting there would throw away useful history for no reason. When only a single file has changed while everything else in the session remains valid, resuming and explicitly informing the session about that one change is more proportionate than discarding an otherwise-good session and rebuilding it from a summary."}, {"id": "F-D1-B1-32", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A customer's refund case was fully resolved and closed out in a support session last week. Today, the same customer opens a new conversation with a completely unrelated billing question. Should the support engineer resume last week's session?", "options": ["No, the engineer should manually delete last week's session before helping the customer with the new question.", "No, since the new request is unrelated to the resolved case, it's better to start fresh (optionally including just the few account facts still relevant), rather than dragging in tool results and context from an unrelated, already-closed case.", "Yes, always resume any prior session for a returning customer so that absolutely no historical context is ever lost.", "Yes, but only after forking the old session first, since forking is required before continuing any customer session a second time."], "correct": [1], "explanation": "When the new request has nothing to do with the prior, already-resolved case, resuming would pull in a session's worth of context about a closed refund that has no bearing on today's billing question: starting fresh, with at most a small set of still-relevant account facts, keeps the new conversation focused. Treating 'always resume' as a blanket rule ignores that unrelated topics gain nothing from the old case's tool results and history. Forking isn't a required gate before reusing or starting a session, and it wouldn't even make sense here since there's no shared point to branch from for an unrelated topic. Deleting the old session isn't necessary either: the old session can simply be left alone; nothing about starting a new conversation requires removing the prior record."}, {"id": "F-D1-B1-33", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A team designing a Claude Code automation is deciding whether they need to explicitly tell a resumed session about file changes made outside of it. One engineer argues this isn't necessary: 'if something changed, the model can just run Bash or Grep itself to check, so we don't need to build anything special.' What is the flaw in this reasoning?", "options": ["The flaw is that Bash and Grep results can't be appended to a resumed session's conversation the way they can in a new session.", "Relying on the model to spontaneously decide to re-verify file state is unreliable: the model has no inherent signal that anything changed and may simply continue reasoning from its existing (stale) tool results unless the harness proactively surfaces the change or prompts it to check.", "The flaw is technical: Bash and Grep cannot be called at all within a resumed session, only in a brand-new one.", "There is no flaw; this is precisely the documented, reliable way that resumed sessions are expected to detect external changes."], "correct": [1], "explanation": "Nothing tells the model that something changed outside its awareness, so hoping it will proactively decide to double-check file state on its own is a gamble, not a design: the model is just as likely to keep reasoning from the file contents already sitting in its context. This isn't a technical limitation: Bash and Grep work the same way in a resumed session as in any other, so that isn't the actual problem. It also isn't documented, reliable behavior to lean on. It's quite the opposite, which is why proactively informing the session is the recommended practice rather than an optional nicety. Tool results append into a resumed session's conversation exactly as they would in a new one, so that isn't what's blocking anything here either: the issue is entirely about whether the model is ever prompted to look."}, {"id": "F-D1-B1-34", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "hard", "question": "A CI pipeline is misconfigured so that a review session originally opened (and resumed across several runs) for pull request A gets reused via --resume for an unrelated pull request B on a completely different long-lived branch, with mostly different files. What is the best way to handle this once the misconfiguration is discovered?", "options": ["Start a fresh session for pull request B and inject a structured summary of only what's actually relevant to it, rather than resuming a session whose accumulated context is almost entirely about a different, unrelated pull request.", "Resume the session as-is, but instruct the model in plain text to 'ignore everything related to pull request A' and trust that instruction alone to fully separate the two contexts.", "Fork the session for pull request B, since forking is specifically meant to reconcile two unrelated review histories into one coherent context.", "Keep resuming the same session for pull request B, since --resume is designed to work across unrelated pull requests without any adjustment."], "correct": [0], "explanation": "When almost none of a session's accumulated context is relevant to the new task, the practical fix is the same as any severe staleness/relevance case: start over with a concise, accurate summary of what pull request B actually needs, rather than trying to salvage a session built around a different pull request. Treating --resume as safe across genuinely unrelated tasks ignores exactly the risk this scenario illustrates: irrelevant, potentially misleading context carried forward into a review it has nothing to do with. Forking doesn't reconcile or clean anything; it would just branch the same PR-A-heavy history into another copy, still dominated by the wrong context. Telling the model to 'ignore' the old context in plain text is a prompt-level instruction competing against a large body of actual conversation history: it's far less reliable than simply not carrying that history forward in the first place."}, {"id": "F-D1-B2-01", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A multi-agent research system has a coordinator plus specialist subagents for web search, document analysis, synthesis, and reporting. A new request arrives asking only to \"summarize the key findings from these five uploaded PDFs.\" No web research is needed. What should the coordinator do?", "options": ["Invoke only the document-analysis and synthesis subagents, skipping the web-search subagent since the request doesn't require external search.", "Invoke all four subagents in parallel every time to keep the workflow consistent across requests.", "Ask the document-analysis subagent to decide on its own whether to invoke the web-search and reporting subagents.", "Handle the request entirely in the coordinator without delegating to any subagent, since only two subagents would clearly apply."], "correct": [0], "explanation": "Dynamic subagent selection means the coordinator inspects the actual request and invokes only the subagents whose specialty is needed: here document analysis and synthesis. Invoking every subagent regardless of relevance wastes work and adds noise and latency for a request that doesn't need web search. Letting a specialist subagent decide which other subagents to invoke breaks the hub-and-spoke model, where routing decisions belong to the coordinator. Skipping delegation entirely discards the benefit of specialized subagents even though two of them are clearly applicable here."}, {"id": "F-D1-B2-02", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "easy", "question": "A customer support coordinator agent receives an incoming ticket: \"My last invoice charged me twice for the same subscription.\" The system has specialist subagents for billing, technical troubleshooting, and account management. What is the most appropriate coordinator behavior?", "options": ["Always send every incoming ticket to all three subagents so no category is ever missed.", "Dynamically route the ticket to the billing subagent based on the content of the request, rather than defaulting to the technical-troubleshooting subagent.", "Route the ticket to the technical-troubleshooting subagent, since a duplicate charge suggests a system malfunction.", "Have the coordinator resolve the billing question itself without invoking any subagent, since the request seems simple."], "correct": [1], "explanation": "The essence of dynamic subagent selection is that the coordinator reads the actual content of the request and routes to the subagent whose specialty matches it: a duplicate charge is a billing concern, not a technical or account-management one. Sending every ticket to all subagents regardless of topic is wasteful and abandons the point of having specialized subagents. Assuming a duplicate charge must be a technical malfunction misreads the request; billing issues like duplicate charges are billing-subagent territory. Bypassing delegation for a request that merely seems simple discards the coordinator's job of routing to the specialist best equipped to look up and resolve billing records."}, {"id": "F-D1-B2-03", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A team is building a coordinator for competitive-intelligence research. A request arrives: \"Give me a full picture of Acme Corp: their product line, recent funding, and customer sentiment.\" Which decomposition best reflects hub-and-spoke delegation?", "options": ["The coordinator forwards the entire unmodified request to the web-search subagent and asks it to produce the full report on its own.", "The coordinator asks the user to submit three separate requests, one per topic, so each can be handled independently.", "The coordinator breaks the request into three subtasks (product line, funding history, customer sentiment), delegates each to the most relevant specialist subagent, then combines their outputs into one report.", "The coordinator processes the request as a single monolithic task itself, using its own general-purpose reasoning rather than delegating to any subagent."], "correct": [2], "explanation": "Effective hub-and-spoke orchestration means the coordinator decomposes a multi-part request into well-scoped subtasks, delegates each to the subagent best suited for it, then aggregates the results: exactly what happens when the request splits into product-line, funding, and sentiment work. Handing the whole compound request to one subagent forfeits the benefit of specialization and asks that subagent to work outside its focus. Pushing the decomposition burden onto the user defeats the purpose of an orchestration layer that should absorb that complexity. Having the coordinator answer the whole thing itself ignores the specialist subagents entirely."}, {"id": "F-D1-B2-04", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "A CI coordinator agent reviews a pull request touching six files across authentication and payment logic. It has specialist subagents for security review, test-coverage analysis, and style/lint checking. After all three subagents finish, what should the coordinator do before posting a single PR comment?", "options": ["Post each subagent's raw output as a separate, unedited PR comment so reviewers can see the individual agents' work.", "Discard the lint subagent's findings automatically, since security and test coverage are higher priority.", "Wait for a human reviewer to manually merge the three subagents' findings before anything is posted.", "Aggregate the findings from all three subagents into one structured comment, resolving any overlapping or redundant findings."], "correct": [3], "explanation": "The coordinator's role includes aggregation: synthesizing the specialist subagents' outputs into a single coherent result and deduplicating overlap so the PR comment doesn't repeat itself. Posting three raw, unedited outputs skips the synthesis step and leaves the reader to reconcile them. Silently dropping one subagent's findings abandons part of the multi-concern review scope instead of aggregating it. Requiring manual human merging defeats the purpose of automating the aggregation step in the orchestration layer."}, {"id": "F-D1-B2-05", "cert": "CCAR-F", "domain": "Agentic Architecture & Orchestration", "type": "single", "difficulty": "medium", "question": "An engineer asks a coordinator agent to \"understand how authentication, the database layer, and the public API interact in this unfamiliar codebase.\" The coordinator has generic explorer subagents it can spin up on demand. What is the best decomposition approach?", "options": ["Spin up one subagent per subsystem (authentication, database, API), each producing a focused summary, then have the coordinator combine the three summaries into a description of how the subsystems interact.", "Spin up a single subagent and instruct it to read the entire repository end to end before producing any summary.", "Spin up three subagents but let them read each other's in-progress notes directly as they work, without going through the coordinator.", "Skip subagents and have the coordinator read a random sample of files itself to form a general impression."], "correct": [0], "explanation": "Decomposing the investigation by subsystem lets each subagent do foc
