bout its own findings but does nothing to surface a contradiction between two separately confident findings."}, {"id": "F-D4-B3-30", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "A developer-productivity team uses Claude to update a deprecated logging call to a new API across a legacy codebase. They review the change file-by-file, confirming each file's updated logging call is syntactically correct and uses the new API properly, but skip a dedicated pass checking whether the new logging API is initialized consistently at the application's entry points. What kind of problem is this review process most likely to miss?", "options": ["An initialization or configuration inconsistency that only becomes visible when looking at how the entry-point setup and the many updated call sites relate to each other, rather than at any single file in isolation", "A typo inside one of the updated logging calls within a single file", "Whether the new logging API syntax is valid at all", "Whether the deprecated logging call has been fully removed from a given individual file"], "correct": [0], "explanation": "Confirming each file's own updated call sites are syntactically correct doesn't establish that the broader system, including how logging gets initialized at the entry points the individual call sites depend on, is still consistent, which is exactly the kind of issue a cross-file integration pass is meant to surface. A typo in a single updated call, invalid syntax for the new API, or a leftover deprecated call within one file are all things a careful per-file review is well equipped to catch on its own. The gap here is specifically about relationships between files, not about any single file's internal correctness."}, {"id": "F-D4-B3-31", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "medium", "question": "An automated code-review pipeline has Claude flag potential issues in a pull request, and the team wants reviewers to quickly tell which flagged issues are most likely to be real problems worth their time versus which are more speculative. What should be added to each flagged issue to support this?", "options": ["A confidence value attached to each individual flagged issue, included in the structured review output", "A single overall confidence score for the pull request as a whole, with no per-issue breakdown", "A count of how many files the pull request touches", "A rewritten, longer description of each issue with no accompanying confidence value"], "correct": [0], "explanation": "Attaching a confidence value to each individual flagged issue gives reviewers a concrete, per-issue signal to triage by, letting them prioritize the issues most likely to be genuine problems. A single confidence score for the whole PR collapses that distinction and can't tell a reviewer which of several flagged issues to look at first. The number of files touched describes the size of the change, not the likelihood that any particular flagged issue is real, and expanding each issue's description without a confidence value gives reviewers more to read but still nothing they can sort or filter by."}, {"id": "F-D4-B3-32", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "single", "difficulty": "easy", "question": "A team has validated that Claude's per-field confidence scores on their extraction task correlate well with actual accuracy, based on a labeled sample, and now wants to use this to reduce the human review workload. What is the appropriate way to use the validated confidence scores?", "options": ["Automatically route only the low-confidence fields to human reviewers, letting high-confidence fields proceed without manual review", "Ignore the confidence scores and continue reviewing every field manually, since automation cannot be trusted for this task", "Route only the high-confidence fields to human reviewers, since those are the most important fields to double-check", "Discard the confidence scores after validation since their only purpose was the one-time calibration check"], "correct": [0], "explanation": "Once confidence scores have been shown to track real accuracy, the efficient use of that signal is to send the fields most likely to be wrong, the low-confidence ones, to a human, while letting the fields already shown to be reliable move forward automatically. Continuing to review everything manually throws away the benefit the calibration work was meant to unlock. Routing only the high-confidence fields to review inverts the logic, since those are the fields least likely to need a second look, and throwing away the scores after validation discards an ongoing signal that should keep informing routing on every new batch of extractions, not just the one-time calibration sample."}, {"id": "F-D4-B3-33", "cert": "CCAR-F", "domain": "Prompt Engineering & Structured Output", "type": "multiple", "difficulty": "hard", "question": "A team is redesigning their code-review automation. Today, the same Claude Code session that generates a fix also approves its own pull request, and the pipeline separately asks that session for a 1-10 self-reported confidence score which it uses directly to decide whether to skip human review, without ever having checked whether that score means anything. Which of the following changes would meaningfully improve this process?", "options": ["Replace the self-approval step with review by an independent session that did not generate the fix", "Validate the self-reported confidence score against a labeled sample of past fixes before using any threshold to skip human review", "Add a separate cross-file pass that checks for integration issues beyond what a single file's review would catch", "Keep the same self-approving session, but have it state its confidence score twice for redundancy", "Skip human review entirely once the self-reported score reaches 10, since a perfect score should not require validation"], "correct": [0, 1, 2], "explanation": "The three genuine improvements attack the process's actual weaknesses: an independent session removes the self-review rationalization risk, validating the confidence score against real outcomes turns an unchecked number into a usable routing signal, and a dedicated cross-file pass catches integration problems that per-file review structurally can't see. Asking the same self-approving session to repeat its own score doesn't introduce any new information or independence, since it's the identical self-review problem stated twice. Treating a top self-reported score as automatically trustworthy repeats the exact mistake the scenario describes, because no self-reported confidence score, however high, has been shown to correlate with accuracy until it is actually validated."}, {"id": "F-D5-B1-01", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A customer support agent has been chatting with a customer for 22 turns. Midway through the conversation, a summarization step condenses the transcript to save context space. The resulting summary reads 'customer had a billing issue and a refund was discussed,' losing the exact $340.50 refund amount and the promised July 22 processing date. What should the team add to prevent this kind of loss?", "options": ["A persistent case-facts block that extracts and preserves structured details like amounts, dates, and promises verbatim across every summarization pass", "A larger context window so the summarization step runs less frequently", "A revised summarization prompt that simply instructs the model to 'be more thorough'", "A rule that disables summarization for the entire conversation regardless of length"], "correct": [0], "explanation": "Numbers, dates, and customer-stated commitments are exactly what progressive summarization tends to drop, so the reliable fix is to extract them into a dedicated structured block that is never subject to lossy compression. A bigger context window only delays the problem, since summarization will still eventually run and the same fields can still be dropped. Telling the model to 'be more thorough' is a vague instruction, not a structural guarantee, so it will not reliably preserve specific figures. Disabling summarization entirely does not scale to long conversations and reintroduces the context-growth problem summarization exists to solve."}, {"id": "F-D5-B1-02", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A synthesis subagent receives a 6,000-word document-analysis report to turn into a two-paragraph executive summary. The single most important finding, a compliance risk, is stated in paragraph 14 of 20. The generated summary omits it entirely and instead highlights less important findings from the opening and closing paragraphs. What is the most likely cause, and what change addresses it?", "options": ["The report exceeded the subagent's token limit, so the fix is to increase the subagent's max-output-tokens setting", "The critical finding sat in the middle of a long input, where attention is weaker, so the fix is to restructure the input so key findings are surfaced near the top before the surrounding detail", "The subagent's sampling randomness was too high, so the fix is to make output generation fully deterministic", "The document-analysis subagent used the wrong tool to produce the report, so the fix is to swap in a different tool"], "correct": [1], "explanation": "This is the classic lost-in-the-middle effect: content in the middle of a long context gets less attention than content at the beginning or end, so surfacing key findings near the top, or repeating them in a short highlights section before the full detail, makes them far more likely to be used. An output-length setting controls how much the model can write, not how it weighs input it already received, so raising it would not rescue a buried finding. Sampling randomness affects wording variety, not which parts of a long context get weighted, so tightening it would not fix omission of buried content. There is no tool-selection issue here since the document-analysis subagent already produced the finding; the problem is where it sits in the input the synthesis step consumes."}, {"id": "F-D5-B1-03", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "Early in a support conversation, a customer says, 'I need this resolved before my flight departs at 6pm today.' Twelve turns later, after several tool calls and a summarization pass, the agent proposes a fix that will take three business days, with no acknowledgment of the deadline. What is the most likely root cause?", "options": ["The customer's stated time constraint was treated as ordinary conversational content and dropped during summarization instead of being captured as a durable fact", "The agent's tool selection setting required it to call a tool on every turn instead of allowing a text response", "The support tools were given overlapping descriptions, causing the agent to select the wrong tool", "The escalation tool was not included in the agent's available tools for this session"], "correct": [0], "explanation": "Customer-stated expectations like deadlines are one of the specific categories, alongside numbers and dates, that progressive summarization silently drops unless they are deliberately extracted into a persistent record, which directly explains why the agent proposed a three-day fix without acknowledging a same-day deadline. A tool-selection setting governs whether the model must invoke a tool, not what conversational content survives summarization. Overlapping tool descriptions would cause the wrong tool to be picked, not the disappearance of a stated deadline. A missing escalation tool would prevent handoff to a human but would not explain why the deadline itself was forgotten."}, {"id": "F-D5-B1-04", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A web-search subagent calls a search tool that returns full HTML page dumps of 15,000-plus tokens for every result. After six searches, the subagent's context is nearly exhausted and it starts truncating its own reasoning. What is the best fix?", "options": ["Post-process each tool result to extract only the relevant text before it is added to context, rather than accumulating raw page dumps", "Switch the subagent to a model tier with a larger context window and keep passing full page dumps", "Reduce the number of searches the subagent is allowed to run to two", "Have the coordinator periodically remind the subagent to 'summarize your findings so far'"], "correct": [0], "explanation": "Verbose tool outputs should be trimmed down to their relevant content before they accumulate in context, and extracting the useful snippet from each page dump keeps context lean regardless of how many searches run. Moving to a bigger context window treats the symptom rather than the root cause of unbounded raw-output accumulation, and it is a more expensive workaround for a problem that is cheap to fix at the source. Capping the number of searches sacrifices the coverage the research task needs instead of fixing the underlying token bloat. Periodic reminders to summarize are a probabilistic prompt nudge rather than a reliable mechanism, and the full raw dumps still sit in context between reminders."}, {"id": "F-D5-B1-05", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A team wants their support agent to reliably retain the customer's order number, the promised refund amount, and the agreed resolution date throughout an arbitrarily long conversation, even after multiple summarization passes. Which design achieves this most reliably?", "options": ["Maintain a structured case-facts block, updated whenever a new fact appears, that is carried forward unchanged and referenced directly rather than reconstructed from the summarized transcript", "Instruct the model in the system prompt to 'never forget important details'", "Increase the frequency of summarization so the transcript stays short", "Ask the customer to repeat their order number and refund amount at the end of the call"], "correct": [0], "explanation": "A dedicated, explicitly maintained structure for key facts sidesteps the lossy nature of narrative summarization entirely, since those fields are never subject to being condensed away. A blanket instruction to never forget important details is a probabilistic prompt nudge with no structural guarantee, exactly the kind of vague instruction that fails to reliably change behavior. Summarizing more frequently only increases the number of lossy compression passes the same details must survive. Relying on the customer to repeat information at the end shifts the reliability burden onto the customer and does nothing to preserve facts during the conversation itself."}, {"id": "F-D5-B1-06", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A coordinator agent finishes a research session and emails the user a report. Three days later, the user replies to that email asking to 'expand the market-sizing section with the two competitors we discussed.' The reply-handling agent receives only the new message text and generates a response from scratch, listing generic competitors instead of the two specific ones from the original conversation. What is the most effective fix?", "options": ["When processing the follow-up, retrieve and pass the complete relevant prior conversation and report context into the new request rather than treating the reply as an isolated message", "Add a note to the email footer asking users not to reply more than 24 hours after the original report", "Increase the model's sampling temperature so it generates more varied competitor suggestions", "Have the agent ask a clarifying question before answering every follow-up, regardless of content"], "correct": [0], "explanation": "A follow-up is only as good as the context behind it, so passing the complete relevant history, including the two named competitors from the original findings, into the new request is what lets the model produce a grounded, specific answer instead of guessing generically. A footer disclaimer does not solve the technical problem of missing context and just pushes friction onto the user. Raising sampling temperature increases output variety but does nothing to recover facts that were never in the model's context, so it would make the generic guessing worse rather than better. Forcing a clarifying question on every follow-up adds friction to cases where the context could simply have been supplied, and it does not fix the underlying gap when a user's reply does not restate everything needed."}, {"id": "F-D5-B1-07", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A CI review agent posts inline comments on a pull request. The developer pushes three more commits addressing the feedback, and the agent is invoked again to re-review. The second invocation is a brand-new session that receives only the latest diff. What critical information is lost, and what should be fixed?", "options": ["The prior review's findings are lost, so the agent may re-flag already-fixed issues or contradict its earlier feedback; the fix is to include the prior review's findings when re-invoking", "The developer's commit messages are lost, so the fix is to require longer commit messages", "The CI pipeline's configuration file is lost, so the fix is to duplicate the config into the pull request description", "The repository's README is lost, so the fix is to paste the README into every review prompt"], "correct": [0], "explanation": "Without the earlier review's findings, a fresh re-review session has no way to know which issues were already raised and possibly fixed, so it risks flip-flopping or re-flagging resolved items; passing the prior findings forward as context is what keeps the second pass consistent and additive. Commit message length has no bearing on what context the review agent receives. The CI configuration is not part of the conversational context being lost between review invocations, and duplicating it into the description does not address the actual gap. Pasting the whole README into every prompt is unrelated to losing prior review state and just adds irrelevant bulk."}, {"id": "F-D5-B1-08", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "An agent's prompt for a response-generation step includes a one-sentence instruction, 'Draft a resolution email,' followed by an 8,000-token dump of order history and policy documents, with nothing else. The generated emails frequently ignore the instruction's specific tone requirements. What restructuring most directly addresses this?", "options": ["Move the concise instruction so it also appears immediately after the large reference dump, rather than being stated once and then buried under the largest block of content", "Translate the policy documents into a different language before including them", "Increase the number of few-shot examples of order histories included in the dump", "Ask the model to write its reasoning in a hidden scratchpad before drafting the email"], "correct": [0], "explanation": "When a short instruction is stated once and then overshadowed by a much larger block of reference material with nothing reinforcing it afterward, it gets the lost-in-the-middle treatment; repeating or placing the instruction at a position that gets more attention, such as the end, makes it far more likely to be followed. Translating the policy documents changes their language, not their position or salience, so it does not address attention placement. Adding more few-shot examples of order histories increases the size of the very block crowding out the instruction, making the problem worse. A hidden reasoning scratchpad might help reasoning quality generally but does not specifically fix an instruction being under-weighted due to its position in a lopsided prompt."}, {"id": "F-D5-B1-09", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "During a 30-turn technical support conversation, the customer mentions on turn 3 that they are running an outdated operating system version, a detail directly relevant to the final diagnosis. On turn 28, the agent gives a fix that ignores the operating system version entirely. The team is weighing two fixes: extending a persistent case-facts block that already tracks structured details like account numbers and dates, or restructuring prompts so the most relevant retrieved information is surfaced near the top of context. Given that the operating system version is a free-form diagnostic detail mentioned once in passing, not a transactional data point, which is the more directly applicable fix?", "options": ["Extending the persistent case-facts block to also capture relevant free-form diagnostic details as they are mentioned, so they survive regardless of where they later fall in a long transcript", "Relying solely on lost-in-the-middle repositioning, since reordering context is sufficient for any kind of buried information", "Disabling summarization only for the first five turns of every conversation", "Reducing every conversation to a maximum of ten turns before forcing escalation"], "correct": [0], "explanation": "Structured, persistently tracked facts are not limited to transactional fields like order numbers; any detail that later diagnosis depends on, such as a stated operating system version, should be captured into the durable record as soon as it is mentioned, precisely because a single passing mention early in a long transcript is what both summarization and positional attention effects tend to lose. Repositioning content within a single prompt addresses where information sits in one instance of context, but it does not help when the detail was never carried forward into the final prompt's context at all, since there is nothing to reposition once it has already been dropped. Protecting only the first five turns is arbitrary and does not generalize to details mentioned later in a long conversation. Forcing escalation at a fixed turn count sidesteps rather than solves the information-preservation problem and reduces resolution capability for conversations that would otherwise be resolvable."}, {"id": "F-D5-B1-10", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "An extraction pipeline calls a document-parsing tool that returns the entire OCR'd text of a 40-page contract for every field it looks up, even when only a single clause is needed. Across a multi-field extraction session, this pushes the agent's context near its limit well before the run finishes. What is the most effective adjustment?", "options": ["Have the tool or a post-processing step return only the relevant excerpt for each lookup instead of the full document text every time", "Ask the extraction agent to work faster so fewer tokens accumulate over time", "Change the JSON schema to allow more optional fields", "Increase the number of retries allowed per extraction call"], "correct": [0], "explanation": "Trimming each tool response down to the relevant excerpt before it is added to context is exactly what prevents verbose outputs from accumulating across a multi-step session, and returning the full 40-page text on every lookup is the actual root cause here. Working faster does not change how many tokens each tool call contributes to context. Making more schema fields optional affects what the extraction outputs, not what a parsing tool returns as input context. Increasing retry counts would make repeated full-document dumps happen more often, not less, worsening the problem."}, {"id": "F-D5-B1-11", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A support conversation is first handled by a triage agent, which gathers the customer's issue and account details across five turns, then hands off to a specialist refund agent. The handoff passes only the single sentence 'customer wants a refund.' The specialist then re-asks the customer for their order number and the reason for the refund, frustrating a customer who already provided this. What change fixes the handoff?", "options": ["Pass the complete relevant details already gathered, including the order number, stated reason, and any commitments made, into the specialist agent's context at handoff, not just a one-line summary", "Give the specialist agent a higher sampling temperature so it asks more creative follow-up questions", "Require the customer to restate their entire issue to every new agent in the chain by policy", "Remove the triage agent entirely and let the specialist agent handle every conversation from the start"], "correct": [0], "explanation": "A handoff between agents needs to carry forward the complete set of relevant facts already established, not a terse one-line gist, otherwise the receiving agent has no choice but to re-ask for information the customer already gave. Raising sampling temperature changes response variability, not what information is available to the specialist, so it would not stop redundant questions. Formally requiring customers to repeat themselves treats the symptom as a policy rather than fixing the actual context-passing gap, and it directly harms the experience. Eliminating the triage stage removes whatever value triage provides, such as initial issue capture and routing, rather than fixing how its findings are communicated downstream."}, {"id": "F-D5-B1-12", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "hard", "question": "A team is redesigning their long-running customer support agent to reduce cases where critical information gets lost over multi-hour conversations that involve several summarization passes and many tool calls. Which of the following changes would directly reduce this risk? (Select all that apply.)", "options": ["Extract numbers, dates, and customer-stated commitments into a persistent structured block that is not subject to summarization", "Trim verbose tool outputs down to their relevant content before they accumulate in context", "Position key findings and facts near the top of prompts rather than burying them in the middle of long content", "Increase the summarization aggressiveness so the transcript is condensed more often", "Rely on the customer to remind the agent of prior details whenever something seems to have been forgotten"], "correct": [0, 1, 2], "explanation": "Extracting durable facts into a protected structured block, trimming verbose outputs before they pile up, and surfacing key information away from the attention-weak middle of long contexts are all concrete, structural mitigations for context loss over long interactions. Summarizing more aggressively increases the number of lossy compression passes that critical details must survive, making loss more likely rather than less. Depending on the customer to catch and correct the agent's memory failures is not a system design fix; it offloads reliability onto the user and only helps after a wrong or incomplete response has likely already occurred."}, {"id": "F-D5-B1-13", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A coordinator in a multi-agent research system condenses each subagent's findings into a short bullet list before passing them to the synthesis subagent, to save space. One bullet drops the original publication date of a key statistic, and the final report presents that statistic without any date, making it read as current when the source is actually two years old. What is the most direct fix?", "options": ["Extract dates and other easily-summarized-away specifics into a structured record that is preserved alongside each finding rather than folded into free-text condensation", "Have the synthesis subagent guess a plausible date based on context", "Remove the condensation step and pass every subagent's full raw output to synthesis regardless of length", "Instruct the coordinator to write 'recent' instead of a specific date whenever one is missing"], "correct": [0], "explanation": "Dates are one of the specific fact types that free-text condensation is prone to silently dropping, so pulling them into a structured, protected record alongside each finding is the direct, reliable fix, mirroring why customer commitments and numeric amounts need the same treatment. Guessing a plausible date would fabricate information rather than preserve it, trading a missing detail for a wrong one. Passing every subagent's full raw output eliminates the benefit of condensation and reintroduces the verbose-accumulation problem the process was designed to avoid, rather than fixing the actual data-loss issue. Writing 'recent' in place of a missing date launders the loss into a vague claim instead of catching that the underlying data was dropped in the first place."}, {"id": "F-D5-B1-14", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A customer support agent's escalation instruction currently reads: 'Escalate to a human if the situation seems difficult.' In production this leads to wildly inconsistent behavior, with some sessions escalating trivial issues while others push through genuinely stuck conversations. What change would most improve consistency?", "options": ["Replace the vague instruction with explicit, categorical escalation criteria, such as named policy gaps, an explicit customer request, or a defined number of failed resolution attempts", "Tell the agent to 'use good judgment and be careful' when deciding to escalate", "Add the word 'please' to the escalation instruction to encourage compliance", "Increase the model's context window so it can see more of the conversation before deciding"], "correct": [0], "explanation": "Vague qualifiers like 'seems difficult' leave the actual decision boundary undefined, so different runs land on different sides of it; specific, categorical criteria give the model a concrete, checkable condition, which is what produces consistent behavior. Instructions to use good judgment or be careful are exactly the kind of vague phrasing that fails to change behavior reliably, since they do not specify what judgment to apply. Politeness wording has no bearing on decision consistency. A larger context window lets the model see more conversation history, but it does not resolve the ambiguity in what counts as difficult, so the criteria problem persists regardless of window size."}, {"id": "F-D5-B1-15", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "Midway through automated troubleshooting, a customer types, 'I've tried all that already, please just connect me with a real person.' The agent has two more diagnostic steps in its playbook that it has not tried yet. What should the agent do?", "options": ["Escalate to a human immediately, honoring the explicit request rather than running the remaining diagnostic steps first", "Run the two remaining diagnostic steps quickly, then escalate, since completing the playbook first will make the human agent's job easier", "Ask the customer to confirm they really want to escalate before proceeding, to avoid an unnecessary handoff", "Continue troubleshooting but switch to a more apologetic tone"], "correct": [0], "explanation": "An explicit customer request for a human is one of the clearly valid escalation triggers, and it should be honored immediately rather than delayed; continuing automated steps after a direct request undermines the customer's stated preference and wastes their time. Running the remaining playbook steps first prioritizes the agent's convenience over the customer's explicit instruction, exactly the kind of delay that erodes trust. Asking the customer to confirm they want to escalate after they have already clearly asked adds friction and second-guesses a request that was already unambiguous. Changing tone without changing behavior does not address the customer's actual request at all."}, {"id": "F-D5-B1-16", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A customer requests a refund for a product that was a gift, meaning the account holder is not the person who purchased it. The written refund policy only addresses refunds requested by the original purchaser and says nothing about gift scenarios. The agent has full account and order access. What should it do?", "options": ["Escalate to a human, since this is a genuine gap in written policy rather than a case the agent can resolve by extrapolating on its own", "Approve the refund anyway, since the agent has the technical access needed to process it", "Deny the refund, reasoning that since the policy does not explicitly allow it, the safest default is refusal", "Ask the customer to have the original purchaser contact support instead, without taking any further action"], "correct": [0], "explanation": "A situation the written policy simply does not address is a textbook policy gap, and gaps or ambiguity are one of the valid, defined triggers for escalating to a human rather than the agent inventing a resolution on its own. Having the technical ability to process the refund does not mean the agent has the authority or guidance to decide a case the policy does not cover, which is exactly the judgment call escalation exists for. Defaulting to denial is just as much an unguided guess as approving it would be, since an unaddressed case is not the same as an implicitly prohibited one. Redirecting the customer elsewhere without escalating leaves the ambiguity unresolved and pushes the burden back onto the customer instead of routing the actual gap to someone who can decide it."}, {"id": "F-D5-B1-17", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "An agent searches for a customer account using the name 'J. Smith' provided over chat, and the lookup tool returns four matching accounts with different addresses and order histories. What should the agent do next?", "options": ["Ask the customer for a distinguishing identifier, such as an order number, email, or account number, before proceeding with any account-specific action", "Proceed with the account that has the most recent order activity, since it is statistically the most likely match", "Merge information from all four accounts into a single combined response to cover every possibility", "Pick the first account returned by the lookup tool, since the tool presumably ranks by relevance"], "correct": [0], "explanation": "When a lookup returns multiple plausible matches, the correct move is to ask the customer for a distinguishing identifier rather than guess, since acting on the wrong account risks exposing another customer's order details or taking action against the wrong record. Picking the most recent or statistically likely match is still a guess dressed up as a heuristic, and guessing wrong with account data is a real privacy and correctness risk. Combining details from multiple accounts into one response risks leaking one customer's private information to another. Assuming the first result is authoritative is not a safe assumption, since nothing establishes that the tool ranks by confidence, and even if it did, confirming an actual identifier is the reliable way to verify identity."}, {"id": "F-D5-B1-18", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A team configures their support agent to automatically escalate any conversation where a sentiment-analysis pass flags the customer's messages as negative. After launch, they find calm-but-serious billing disputes are frequently missed for escalation, while customers merely venting about long hold times before their trivial issue is resolved get escalated unnecessarily. What does this indicate?", "options": ["Sentiment analysis is an unreliable proxy for when escalation is actually needed, since tone does not reliably correlate with issue severity or an actual need for human intervention", "The sentiment model needs to be replaced with a larger, more capable model to fix the false readings", "The negative-sentiment threshold needs to be raised so fewer conversations qualify", "Sentiment analysis is working correctly here and the escalation criteria do not need to change"], "correct": [0], "explanation": "This is the exact failure mode of using sentiment as an escalation trigger: calm customers with serious problems get missed, and merely frustrated-but-fine customers get flagged, because emotional tone does not reliably track actual escalation need, which is why sentiment is called out as an unreliable proxy. Swapping in a bigger sentiment model would likely still key off tone rather than issue substance, so it would not fix the fundamental mismatch between sounding upset and actually needing a human. Adjusting the threshold just shifts which side of an unreliable signal produces more false positives versus false negatives, without fixing the underlying unreliability. The results described are precisely the kind of misses and false alarms that show the criterion is not working, so treating it as fine would leave both failure modes in place."}, {"id": "F-D5-B1-19", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team asks their support agent to output a self-reported confidence score from 1 to 10 after each proposed resolution, and configures escalation to trigger only when the score is below 4. In practice, the agent frequently reports high confidence of 8 or 9 on resolutions that turn out to be wrong, and low confidence on resolutions that were actually correct. What is the most appropriate response to this finding?", "options": ["Stop relying on the model's self-reported confidence as the escalation trigger, and replace it with explicit, verifiable criteria instead", "Lower the escalation threshold to trigger on a score below 6 instead of below 4", "Ask the model to double-check its own confidence score before finalizing its answer", "Average the confidence score across the last five turns to smooth out noise"], "correct": [0], "explanation": "LLM self-reported confidence scores are an unreliable proxy for actual correctness, since a model can be miscalibrated in either direction, which is exactly the pattern described, so the fix is to move to explicit criteria that do not depend on the model grading its own output. Simply moving the numeric threshold still trusts the same unreliable signal at a different cutoff, and would not fix a score that does not track correctness in the first place. Asking the model to double-check its own confidence is still self-review of its own reasoning and does not introduce any new information to correct the miscalibration. Averaging scores over recent turns smooths noise but does nothing about systematic miscalibration, where the scores are consistently pointing the wrong direction rather than just noisy."}, {"id": "F-D5-B1-20", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A support agent has exhausted every relevant tool: the customer lookup succeeded, the order lookup returned a valid order, but the refund action fails repeatedly with a business-rule rejection that no other available tool or documented policy path can resolve. The agent has no further legitimate action it can take. What should happen?", "options": ["Escalate to a human, since the agent has hit a genuine inability to progress rather than a scenario it can resolve with the tools and policy available to it", "Retry the refund action repeatedly with the same parameters until it eventually succeeds", "Tell the customer the refund was processed successfully to close out the conversation smoothly", "Silently close the conversation without informing the customer of the outcome"], "correct": [0], "explanation": "Genuine inability to progress, where every legitimate tool and policy path has been exhausted without resolution, is one of the explicitly valid triggers for escalating to a human, since continuing to try the same approach will not fix a business-rule rejection the agent has no authority to override. Repeating the identical failing call indefinitely wastes time and will not produce a different outcome if the rejection is a genuine business-rule block rather than a transient error. Falsely telling the customer the refund succeeded is a fabrication that will surface as a worse problem the moment the customer checks their account. Closing the conversation without any explanation abandons the customer with an unresolved issue and no path forward, which is worse than escalating."}, {"id": "F-D5-B1-21", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A support team writes an explicit escalation policy covering policy gaps, explicit human requests, and genuine inability to progress, but agents still handle edge cases inconsistently, such as a customer requesting a refund exception for a documented extenuating circumstance, with some agents escalating and others improvising an answer. What addition would most improve consistency for these edge cases specifically?", "options": ["Add a small set of few-shot examples showing how similar borderline cases were correctly classified as escalate versus not, alongside the explicit criteria", "Rewrite the escalation criteria in more formal legal language", "Reduce the number of escalation categories from three down to one, to simplify the decision", "Require a second, independent agent to make the same escalation decision and take the majority vote of the two"], "correct": [0], "explanation": "Explicit criteria establish the general rule, but ambiguous edge cases at the boundary of that rule are exactly where a handful of targeted few-shot examples add the most value, since they show how the criteria apply to specific borderline situations rather than leaving interpretation to chance. Rewording the criteria in more formal language does not add any new information about how to handle borderline cases; it is a style change, not a content change. Collapsing three meaningfully different categories into one discards distinctions that were presumably useful for downstream handling and does not resolve the specific ambiguity described. Running two independent agents to vote adds cost and complexity without addressing why either agent is uncertain in the first place, since both could easily share the same blind spot."}, {"id": "F-D5-B1-22", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "Two conversations arrive in the same shift. In the first, the customer's messages are terse and irritated, repeatedly using words like 'ridiculous' and 'again,' but the underlying issue is a shipping address typo the agent can fix in one tool call. In the second, the customer's tone is calm and polite throughout, but they describe a billing discrepancy spanning three disputed charges over two billing cycles with no clear policy precedent. Which conversation should be escalated, and why?", "options": ["The second conversation, because it involves a genuine policy ambiguity that the agent is not equipped to resolve, regardless of either customer's tone", "The first conversation, because the customer's irritated tone indicates a need for human intervention", "Both conversations, because any sign of customer dissatisfaction should trigger escalation out of caution", "Neither conversation, because the agent should always attempt full resolution before ever considering escalation"], "correct": [0], "explanation": "What determines escalation is the substance of the issue, not the customer's tone: the terse, irritated customer has a straightforward, fully resolvable problem, while the calm customer's multi-charge, multi-cycle billing dispute has no clear policy precedent, which is a genuine ambiguity that warrants a human. Escalating based on irritated tone alone is the sentiment-as-trigger mistake, handing off a trivially fixable issue while potentially missing calmly stated but substantively harder ones. Escalating everything with any hint of dissatisfaction abandons judgment entirely and would overwhelm human agents with cases the system could resolve on its own. Refusing to ever escalate before full resolution ignores that some cases, like the undefined billing dispute, are not things the agent can appropriately resolve alone no matter how many attempts it makes."}, {"id": "F-D5-B1-23", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A customer says, 'This isn't working, I want to speak to a manager.' The agent responds, 'I understand your frustration, let me try one more approach first,' and proceeds with another automated troubleshooting step before escalating two turns later. What is the problem with this handling, and what should change?", "options": ["The explicit request for a human should be honored immediately rather than delayed by additional automated attempts, however well-intentioned", "The agent should have used a more formal apology before continuing troubleshooting", "The agent should have looped in a second automated agent instead of a human", "There is no problem, since trying one more approach before escalating is good practice as long as escalation eventually happens"], "correct": [0], "explanation": "An explicit request for a human is a clearly valid, immediate escalation trigger, so deferring it, even briefly and even with an empathetic acknowledgment, overrides the customer's stated preference and adds delay they did not ask for. A more formal apology does not address the actual issue, which is proceeding with unrequested troubleshooting rather than honoring the request. Routing to another automated agent still is not what was explicitly asked for, since the customer specifically asked for a human. Eventually escalating two turns later does not undo the problem, since the request should trigger escalation right away, not after one more attempt the customer did not ask for."}, {"id": "F-D5-B1-24", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A customer's situation matches the written return policy almost exactly, except their item was purchased 31 days ago against a 30-day policy window, and an internal note states that exceptions require manager approval on a case-by-case basis. What should the agent do?", "options": ["Escalate to a human, since the situation explicitly requires case-by-case judgment beyond what the written policy authorizes the agent to decide", "Approve the return anyway, since one day past the deadline is a trivial difference", "Deny the return outright, since the customer is technically outside the policy window", "Tell the customer to wait and resubmit the return request in case the system recalculates the date differently"], "correct": [0], "explanation": "The policy itself flags this as requiring case-by-case manager judgment, which is an explicit acknowledgment that the agent is not authorized to decide it unilaterally, so escalating routes it to the person who actually has the authority to decide. Approving it because the overage seems trivial substitutes the agent's own judgment for the manager approval the policy explicitly requires. Denying it outright ignores that the policy explicitly allows for exceptions rather than enforcing a hard cutoff. Telling the customer to resubmit does not change the underlying facts of the case and just delays reaching the human decision the policy calls for."}, {"id": "F-D5-B1-25", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "An agent processing a refund finds two customer accounts with the same name and similar order histories, but different email domains and different shipping addresses. The customer on chat has not yet provided any additional identifying information, and the conversation is time-sensitive because the customer mentioned needing the refund confirmed before a return window on a separate purchase of their own closes today. Should the agent proceed with the account most consistent with the current chat's order details, given the time pressure?", "options": ["No, it should still ask for a distinguishing identifier before acting, since time pressure does not change the risk of taking action on the wrong customer's account", "Yes, the time-sensitive deadline justifies proceeding with the best-guess account to avoid missing the window", "Yes, since both accounts have similar order histories, either one is an acceptable target for the refund", "No, the agent should end the conversation entirely rather than risk any error"], "correct": [0], "explanation": "Ambiguity between multiple genuine matches calls for a quick identifying question regardless of time pressure, since acting on the wrong account risks a materially worse outcome, such as a refund issued to or account details exposed to the wrong customer, than the modest delay of asking one clarifying question. Using urgency to justify skipping identity verification treats speed as more important than correctness in exactly the situation where getting it wrong is costly and hard to reverse. Treating two different customers' accounts as interchangeable because their histories look similar ignores that they are, in fact, different people. Ending the conversation entirely is an overreaction, since a single targeted identifying question resolves the ambiguity quickly without abandoning the customer."}, {"id": "F-D5-B1-26", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "hard", "question": "A team is auditing their support agent's escalation logic and wants to align it with reliable triggers rather than proxies that have proven unreliable elsewhere. Which of the following should be kept as escalation triggers? (Select all that apply.)", "options": ["An explicit customer request to speak with a human", "A gap or ambiguity in written policy that the agent is not authorized to resolve on its own", "Genuine inability to progress after exhausting the available tools and policy guidance", "A sentiment-analysis score classifying the customer's most recent message as negative", "The model's own self-reported numeric confidence score falling below a set threshold"], "correct": [0, 1, 2], "explanation": "An explicit request for a human, a genuine policy gap or ambiguity, and a real inability to make further progress are all well-defined, verifiable conditions that reliably indicate a human is actually needed. Sentiment scores measure tone rather than issue severity or resolvability, generating both false positives from frustrated customers with trivial issues and false negatives from calm customers with serious problems, and a model's self-reported confidence is frequently miscalibrated in the same way, not reliably tracking whether the underlying answer is actually correct. Both of the excluded signals are unreliable proxies precisely because they do not correlate consistently with genuine escalation need."}, {"id": "F-D5-B1-27", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "In a multi-agent research system, a document-analysis subagent hits an error and reports it to the coordinator simply as the string 'Error: failed.' The coordinator has no way to determine whether this was a permissions issue, a malformed query, or a timeout, and cannot decide whether to retry, substitute another source, or inform the user of a gap. What is missing?", "options": ["Structured error context, such as a failure type or category, what was actually attempted, and any partial results gathered, rather than an opaque failure string", "A larger model for the document-analysis subagent", "A longer timeout setting for every tool call in the system", "A rule that automatically retries every failed call exactly three times"], "correct": [0], "explanation": "A bare failure string gives the coordinator nothing to act on; passing structured context, including what kind of failure occurred, what query or action was attempted, and whatever partial results exist, is what lets the coordinator make an informed decision about retrying, substituting, or flagging a gap to the user. Using a larger model does not change what information the error report contains. A blanket longer timeout might reduce one specific failure type but does nothing about permission or validation failures, and it still would not give the coordinator informative error context when something does fail. Automatically retrying a fixed number of times regardless of failure type is a blunt policy that would just waste time repeating a permission or validation failure that will never succeed on retry, and it still does not solve the coordinator's information problem."}, {"id": "F-D5-B1-28", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A document-analysis subagent searches an internal knowledge base for information on a specific product and returns zero results. The synthesis subagent treats this the same way it would treat a topic with no results because none genuinely exist, and reports in the final output that no information is available on this product. In fact, the subagent lacked read permissions for the folder containing the relevant documents. What is the core problem?", "options": ["The subagent's zero-result response did not distinguish an access failure from a genuinely valid empty result, so downstream synthesis drew the wrong conclusion", "The knowledge base itself needs to be re-indexed", "The synthesis subagent should have used a larger context window", "The document-analysis subagent should have used a different search algorithm"], "correct": [0], "explanation": "A permissions failure and a genuine finding of nothing on a topic both surface as zero results if the error is not distinguished from valid emptiness, and conflating the two led the synthesis step to confidently report an absence of information when the real story was an access problem, which is exactly the distinction that needs to be preserved and passed along. Re-indexing would not fix a permissions error, since the documents may be perfectly well indexed but simply inaccessible to this subagent. A larger context window for synthesis does not help if the input it received was already mislabeled as no results instead of could not access. Changing the search algorithm addresses retrieval quality, not the permissions failure that caused zero results in the first place."}, {"id": "F-D5-B1-29", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A web-search subagent's search call fails with a timeout on the first attempt. Its current design immediately reports this failure up to the coordinator, which then pauses the entire research task to decide what to do. What change would most reduce unnecessary escalations for this kind of failure?", "options": ["Have the subagent attempt local recovery, such as a retry, before propagating a failure up to the coordinator", "Have the subagent silently return an empty result set instead of reporting anything", "Remove the web-search subagent from the system entirely", "Have the coordinator always escalate every subagent failure directly to a human reviewer"], "correct": [0], "explanation": "A one-off timeout is a plausible transient error, so the subagent should attempt local recovery, such as a retry, before bubbling the failure up to the coordinator, avoiding a pause of the whole task over a blip that a second attempt might resolve on its own. Silently returning an empty result set instead of reporting the failure hides the problem rather than recovering from it, risking that the coordinator or synthesis step treats a failed search as if it were a legitimate finding of nothing. Removing the subagent entirely eliminates its capability rather than fixing its error handling. Escalating every failure straight to a human, including routine transient blips, defeats the purpose of an automated multi-agent system handling routine hiccups and would overwhelm reviewers with noise."}, {"id": "F-D5-B1-30", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A coordinator dispatches four subagents in parallel: web-search, document-analysis, synthesis, and reporting. The web-search subagent fails after exhausting its local retries due to an upstream API outage. The other three subagents have no dependency on it and complete without issue. What is the best way for the system to proceed?", "options": ["Continue with the successful subagents' results, and have the coordinator include a clear note in the final output that web-search results are missing due to the outage", "Immediately terminate the entire pipeline and discard all work done by the other three subagents", "Silently proceed to generate a final report as if web-search had never been part of the plan, without mentioning the gap", "Pause indefinitely until the web-search API outage is confirmed resolved before doing anything else"], "correct": [0], "explanation": "The right middle path is neither to kill the whole pipeline over one subagent's failure nor to quietly paper over the gap; surfacing the failure explicitly while still delivering the value already produced by the agents that succeeded serves the user best. Terminating everything discards perfectly good work from three subagents that had no problem at all, which is the terminate-all antipattern. Silently omitting any mention of the missing web-search results is the silent-suppress antipattern, leaving the user with an incomplete report they have no way of knowing is incomplete. Pausing indefinitely for an external outage to resolve blocks delivering everything that could already be delivered, and outages can last an unpredictable amount of time."}, {"id": "F-D5-B1-31", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A multi-agent compliance research system reports 'no relevant regulations found' for a jurisdiction after its document-analysis subagent hit an authentication failure retrieving the regulatory database for that specific jurisdiction, while succeeding for three other jurisdictions in the same run. A human reviewer takes the report at face value and tells a client no regulations apply there. What upstream design flaw caused this outcome?", "options": ["The authentication failure for one jurisdiction was not distinguished from a genuine absence of applicable regulations, so it propagated through synthesis and reporting as if it were a confirmed empty result", "The human reviewer should have independently re-verified every jurisdiction regardless of what the report said", "The system used too many subagents for a task that a single agent could have handled", "The reporting subagent formatted the final document inconsistently"], "correct": [0], "explanation": "This is the access-failure-versus-valid-empty distinction failing in practice: an authentication failure on one jurisdiction's data source looks identical to having checked and found nothing there if that distinction is not captured and carried through synthesis and reporting, so the final report confidently asserted an absence that was never actually verified. Expecting the human reviewer to redundantly re-verify every jurisdiction defeats the purpose of the system and does not fix the actual design flaw that produced a misleading report. The number of subagents is not the issue, since a single agent could make exactly the same category error if it does not distinguish access failures from genuine empty results. Formatting inconsistency in the final document is a presentation issue, unrelated to why the underlying claim was factually wrong."}, {"id": "F-D5-B1-32", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A team is defining a standard error-reporting schema that every subagent in their multi-agent system must use when a tool call or sub-task fails, so the coordinator can make consistent decisions. Which combination of fields would make this schema most useful to the coordinator?", "options": ["A failure type or category, the specific query or action that was attempted, and any partial results already gathered before the failure", "Only a boolean flag indicating success or failure, with no further detail", "A raw stack trace of the underlying programming exception and nothing else", "The elapsed wall-clock time of the failed call"], "correct": [0], "explanation": "A category such as transient, permission, or validation, together with what was actually attempted and whatever partial results exist, gives the coordinator enough information to decide whether to retry, substitute a different approach, or surface a gap to the user, which is exactly the structured context that makes propagated errors actionable. A bare success-or-fail boolean collapses all of that nuance away, leaving the coordinator no better off than an opaque failure. A raw stack trace is meant for engineers debugging code, not for a coordinator agent making a routing decision, and it says nothing about what was attempted or what partial data might already be usable. Elapsed time might be a useful diagnostic detail in some contexts, but on its own it does not tell the coordinator what failed, why, or what to do next."}, {"id": "F-D5-B1-33", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A CI pipeline runs four independent automated checks in parallel: style linting, security scanning, test generation, and a code-review agent, then aggregates them into one pull-request comment. The security-scanning check crashes due to a malformed config file. The pipeline's current behavior is to abort the entire run, so the pull request receives no feedback at all, including from the three checks that completed successfully. What is the best fix?", "options": ["Let the successful checks' results still post to the pull request, with a clear note that the security scan did not complete and why", "Keep aborting the entire run whenever any single check fails, to guarantee the pull-request comment is never incomplete", "Have the pipeline post a generic message saying all checks passed regardless of the security scan's crash", "Disable the security-scanning check permanently so its failures can no longer block the pipeline"], "correct": [0], "explanation": "One check's failure should not take down the other three checks' perfectly good results; posting what succeeded along with a clear note about what did not complete and why gives the pull-request author useful, honest feedback instead of nothing. Continuing to abort the whole run on any single failure is the terminate-all antipattern and throws away working results from unrelated checks every time. Posting that all checks passed despite a crashed check is a fabrication that silently suppresses the failure and could let a real security issue slip through unflagged. Permanently disabling the security check removes its value entirely rather than fixing the propagation problem, leaving every future pull request unscanned for security issues."}, {"id": "F-D5-B1-34", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A subagent responsible for validating extracted invoice data against a downstream schema encounters a malformed field it cannot parse. Rather than reporting this, its current implementation substitutes a default placeholder value and reports success, so the coordinator and every downstream consumer treat the record as fully valid. Three weeks later, a finance team discovers dozens of invoices were silently populated with the wrong placeholder amounts. What principle did the original implementation violate?", "options": ["Errors should not be silently suppressed and reported as success; a failure to parse a field should be surfaced as a structured error rather than papered over with a fabricated default", "Errors should always cause the entire multi-agent pipeline to halt immediately", "Subagents should never attempt any local recovery and should always propagate every issue to a human", "Downstream consumers should independently validate every field a second time regardless of what upstream subagents report"], "correct": [0], "explanation": "Substituting a placeholder and reporting success is the silent-suppress antipattern in its clearest form, hiding a genuine failure behind a fabricated value that downstream systems then trust as valid, which is exactly what let bad data flow into finance records undetected for weeks. Halting the entire pipeline on every error is the opposite antipattern of terminate-all and is not what is being violated here, since the actual problem is the opposite behavior of hiding the failure rather than over-reacting to it. Local recovery is appropriate when it is a legitimate retry or fallback; the principle being violated is not that recovery happened, but that a failed parse was misrepresented as success instead of surfaced as an error. Expecting every downstream consumer to independently re-validate everything defeats the purpose of structured error reporting and does not address why the upstream subagent misreported success in the first place."}, {"id": "F-D5-B1-35", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A subagent's tool call fails twice in the same run: once due to a network timeout, and later due to the caller passing a customer ID in an invalid format. The subagent's error-handling logic retries both failures locally three times before giving up. Is this the correct approach for both cases?", "options": ["No, the timeout is a reasonable candidate for local retry, but the invalid-format failure will fail identically every time and should be surfaced as a structured error rather than retried the same way", "Yes, retrying every failure the same fixed number of times is the correct universal approach regardless of cause", "No, neither failure should ever be retried locally, and both should always be sent straight to a human", "Yes, but only because three retries happens to be the correct number for every error type"], "correct": [0], "explanation": "A transient network timeout is a plausible candidate for a local retry, since the same call might well succeed on a later attempt, but a malformed customer ID is a validation error that will produce the exact same failure every time it is retried with the same bad input, so it needs to be surfaced with structured context rather than blindly retried. Treating every failure type identically ignores that different failure categories call for different handling, which is the core reason categorizing errors as transient, validation, permission, or business matters in the first place. Refusing to ever retry anything locally would send every routine transient blip straight to a human, overwhelming reviewers with noise. There is no retry count that makes blind retrying appropriate for a deterministic validation failure."}, {"id": "F-D5-B1-36", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "hard", "question": "A structured-data-extraction pipeline processes a batch of 200 scanned invoices through three stages: OCR, field extraction, and schema validation. For one invoice, OCR fails to produce readable text due to a corrupted scan. The field-extraction stage receives this failure and, without any special handling, passes an empty object to schema validation, which then reports the invoice as successfully validated with all optional fields empty, since the schema makes every field nullable. What is the actual problem here?", "options": ["The OCR failure was never captured as a distinct failure and was indistinguishable from a document that legitimately had no extractable data, so it was reported as a valid, if sparse, success instead of a genuine processing error", "The schema should not allow any nullable fields under any circumstances", "The batch size of 200 invoices was too large for the pipeline to process reliably", "OCR should be replaced with a different tool that never fails"], "correct": [0], "explanation": "Making every field nullable was meant to accommodate documents that legitimately lack certain data, but that same design let an actual OCR failure masquerade as a normal sparse result, since nothing distinguished a document with no data from a document that could not be read at all; a processing failure needs to be carried forward as its own distinct signal rather than silently absorbed into empty but valid. Banning nullable fields entirely would break legitimate cases where a field genuinely does not apply to a given document, which is a different problem than the one described. Batch size does not explain why a single corrupted scan's failure state disappeared into the schema, since the same masking would happen with a batch of one. No OCR tool is failure-proof, so replacing it with one that never fails is not a real fix; the pipeline needs to handle OCR failures explicitly rather than assume they will not happen."}, {"id": "F-D5-B1-37", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "In a multi-agent research system, three of four dispatched subagents complete successfully, while the fourth, tasked with checking a paywalled industry database, cannot complete because it lacks valid access credentials. The reporting subagent needs to assemble the final deliverable. Which approach best reflects sound error propagation?", "options": ["Include the findings from the three completed subagents, and explicitly flag in the report that the industry-database check could not be completed due to an access issue, distinguishing it from a finding of no data", "Wait to deliver anything until credentials for the industry database are obtained, however long that takes", "Deliver the three completed findings without any mention of the fourth subagent, since three out of four is already a strong majority", "Report that the industry database contains no relevant information, since the check for it did not return any data"], "correct": [0], "explanation": "Delivering the usable results while explicitly flagging the access failure, clearly distinct from a finding of no data, gives the requester an accurate, actionable picture of what is known and what remains genuinely unknown due to a specific, nameable cause. Waiting indefinitely for credentials blocks delivering everything that is already usable and ties the whole deliverable's timeline to an unrelated access problem. Omitting any mention of the fourth subagent silently suppresses a known gap, leaving the reader to wrongly assume the research was comprehensive. Reporting no relevant information for the industry database misrepresents an access failure as a genuine empty result, which is precisely the access-failure-versus-valid-empty confusion that leads to false conclusions downstream."}, {"id": "F-D5-B1-38", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "multiple", "difficulty": "hard", "question": "A platform team is writing internal guidelines for how subagents in their multi-agent systems should handle and report errors to a coordinator. Which of the following should be included as core principles? (Select all that apply.)", "options": ["Attempt reasonable local recovery, such as retrying a transient failure, before propagating an error up to the coordinator", "Report failures with structured context, including failure type, what was attempted, and any partial results, rather than an opaque status flag", "Clearly distinguish an access or processing failure from a genuinely valid empty result so downstream steps do not misinterpret one as the other", "Whenever any subagent fails for any reason, immediately abort the entire multi-agent workflow", "If a subagent cannot complete its task, substitute a plausible-looking default result so the workflow can continue without interruption"], "correct": [0, 1, 2], "explanation": "Attempting local recovery for transient issues, reporting structured error context instead of an opaque flag, and distinguishing access failures from genuinely empty results are all core, well-established practices for making multi-agent error handling both resilient and honest. Automatically aborting the entire workflow on any single subagent's failure is the terminate-all antipattern, discarding value from every subagent that succeeded over one that did not. Substituting a plausible-looking default when a subagent cannot actually complete its task is the silent-suppress antipattern, letting a real failure masquerade as a legitimate result, which is precisely how bad data or false conclusions end up propagating downstream undetected."}, {"id": "F-D5-B2-01", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A developer using Claude Code to explore an unfamiliar 300-file backend service has the main session directly run Read on every file returned by a broad Grep search. The conversation quickly balloons to tens of thousands of tokens of raw file content before any real analysis has happened. What is the most effective change to make?", "options": ["Delegate the broad file discovery and reading to a subagent that returns only a distilled summary of relevant findings to the main session", "Switch to a model with a larger context window so the same direct-read pattern can continue without truncation", "Ask the user to manually narrow the codebase before any exploration begins", "Increase the number of files read per Grep call so fewer round trips are needed"], "correct": [0], "explanation": "Isolating verbose discovery work in a subagent keeps only the relevant, distilled findings in the coordinator's context, while reading files directly in the main session accumulates raw content that crowds out reasoning space regardless of model size. A larger context window treats the symptom rather than the architecture problem, and still leaves the coordinator's context filled with content it does not need. Manually pre-narrowing the codebase may not be practical when the codebase is unfamiliar, and it does not fix the underlying pattern. Reading more files per call in the main session makes the bloat worse, not better."}, {"id": "F-D5-B2-02", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "While mapping the authentication flow across a large repository over several hours, a developer's Claude Code session keeps re-deriving the same conclusions about where the auth logic lives and how tokens are refreshed, every time context is compacted or a new subagent is spawned, because those conclusions were never captured outside the conversation. What should the developer do to prevent this repeated rediscovery?", "options": ["Write confirmed findings to a scratchpad file as they are discovered, so they persist independently of the conversation and can be referenced or reloaded later", "Avoid using /compact for the remainder of the session so nothing is ever summarized away", "Ask Claude to repeat the findings verbatim at the start of every new message", "Increase the frequency of subagent spawns so more parallel context is available"], "correct": [0], "explanation": "A scratchpad file persists key findings outside the model's context window, so they survive compaction and subagent isolation and can simply be reloaded rather than rediscovered. Never compacting only delays the problem and lets context balloon unchecked. Asking Claude to repeat findings in-conversation still keeps everything inside the same context that later gets compacted or isolated away. Spawning more subagents does not address the root cause, since nothing durable is being recorded regardless of how many subagents run."}, {"id": "F-D5-B2-03", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "medium", "question": "A coordinator in a multi-agent research system has accumulated a long, meandering conversation history while investigating a codebase migration question, then immediately launches five parallel subagents, each assigned a different module, using a boilerplate prompt that simply says to investigate that module for migration issues. What is the most likely reliability problem with this approach?", "options": ["Each subagent will run out of tool calls before finishing its module", "Because subagents do not inherit the coordinator's history, the vague prompt fails to pass along the specific context and constraints the coordinator already worked out, so subagents duplicate effort or miss what actually matters", "Running five subagents in parallel will silently corrupt the shared conversation history", "The subagents will automatically read the coordinator's full conversation log to fill in the missing context"], "correct": [1], "explanation": "Subagents run with isolated context and do not inherit the coordinator's history, so any relevant constraints or partial findings must be distilled and passed explicitly in each subagent's prompt; a generic one-line prompt throws away everything the coordinator already learned. Subagents do not automatically gain access to the coordinator's conversation, which rules out the option assuming they do, and parallel execution does not corrupt shared history since subagents work independently. Running out of tool calls is a possible but unrelated failure mode, not the issue created by skipping the summarization step."}, {"id": "F-D5-B2-04", "cert": "CCAR-F", "domain": "Context Management & Reliability", "type": "single", "difficulty": "easy", "question": "A developer is using Claude Code to work through a large refactor. After completing and verifying several files' worth of changes, the conversation history is dominated by old diffs and tool output that are no longer needed, and responses are starting to slow down. What is the most appropriate next step?",
