low downstream tool, but this fraction is too small to move the mean noticeably. What should the monitoring approach add?", "options": ["A switch from reporting mean latency to reporting only the single highest latency observed each day", "Latency percentiles such as p95 or p99, so that tail-latency regressions affecting a subset of requests become visible even when they don't move the average", "A longer averaging window so latency is smoothed out over a larger number of requests", "A less frequent polling interval for latency measurements to reduce monitoring overhead"], "correct": [1], "explanation": "Tracking latency percentiles like p95 or p99 directly surfaces how the slower tail of requests behaves, which is exactly the population of customers experiencing the \"hanging\" behavior that a mean latency metric averages away. Smoothing over an even longer window would dilute the tail cases further and make the problem harder, not easier, to spot. Reporting only the single daily maximum is too noisy and doesn't show whether slow requests are a rare fluke or a growing trend affecting a meaningful share of traffic. Reducing how often latency is measured doesn't address which statistic is being reported and would only make the picture coarser."}, {"id": "P-D3-B3-16", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A team integrates a vendor's MCP server that exposes 40 tools. Rather than deciding which tools the coordinator agent actually needs today, the team enables all 40 \"in case we need them later,\" reasoning that it's easier than reconfiguring the connection repeatedly. What does this decision violate, and what should the team do instead?", "options": ["It violates least privilege; the team should enable only the tools needed for current use cases and add others later as new needs arise", "It violates least privilege, but the fix is to enable all 40 tools while relying on the model to politely decline requests that don't fit its purpose", "It is fine as long as the vendor's MCP server itself is a reputable, well-known company", "Nothing significant; enabling all available tools up front is the recommended default for any new MCP server integration"], "correct": [0], "explanation": "Enabling every available tool \"just in case\" expands the agent's capability surface well beyond what its current job requires, which is exactly the capability-bloat and least-privilege problem the architecture guidance warns about; the better approach is to enable only what's needed now and expand deliberately as new use cases justify it. Treating blanket enablement as a recommended default gets the guidance backwards. Enabling everything and hoping the model declines out-of-scope requests relies on probabilistic prompt behavior instead of a deterministic configuration boundary. The vendor's reputation has no bearing on whether the agent itself should be handed capabilities it doesn't currently use, since a trustworthy vendor's tools can still be misused or accidentally invoked by the agent integrating them."}, {"id": "P-D3-B3-17", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "To let an agent query a legacy reporting database through a generic query tool, engineers embedded the database's plaintext password directly inside the tool's description text in the system prompt, reasoning that the model needs the password to pass along as a parameter. What is the correct way to fix this design?", "options": ["Base64-encode the password before including it in the tool description so it isn't stored as obvious plaintext", "Rotate the database password on a daily schedule to limit how long any single leaked value remains valid", "Instruct the model, in the same system prompt, never to repeat the password back to the end user", "Remove the credential from the model-visible prompt and context entirely; the tool or its underlying server should hold and apply the credential itself when executing the call"], "correct": [3], "explanation": "Credentials should never need to pass through the model's context at all; the tool implementation or its backing server should authenticate to the database directly, so the password is never something the model can see, leak into its output, or have exfiltrated through a crafted prompt. Base64 encoding is trivially reversible and provides no real protection, only obscuring the value superficially. Instructing the model not to repeat the password is a probabilistic prompt control that does nothing to prevent the value from being read, logged, or extracted through indirect means, since it's still sitting in the model's context. Daily rotation reduces the exposure window somewhat but does not address the fundamental design flaw of putting a live credential inside model-visible context in the first place."}, {"id": "P-D3-B3-18", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A post-incident review finds that when a tool call fails because the agent's credentials lack sufficient permission for a resource, the integration logs it identically to a network timeout, and the automated on-call runbook responds to both the same way, with a blind retry. The retries never succeed because retrying with the same insufficient credentials cannot fix a permission problem, and the real issue goes unresolved for hours. What should change?", "options": ["Increase the number of automatic retry attempts so permission errors are more likely to eventually succeed", "Suppress alerts for any error that resolves within a single retry attempt", "Classify failures into distinct categories, such as permission versus transient errors, in logging and monitoring, so permission failures trigger re-authentication or escalation instead of futile retries", "Route every kind of tool-call failure to the same generic alert channel to keep on-call response simple"], "correct": [2], "explanation": "Distinguishing error categories, separating a permission failure from a transient one, lets the monitoring and runbook respond appropriately: escalate or trigger re-authentication for permission errors instead of retrying a call that can never succeed with the same insufficient credentials. Increasing the retry count doesn't help, since no number of retries with the same credentials will resolve a genuine permission problem. Routing every failure type to one generic alert is what caused the runbook to apply the wrong response in the first place, and doing so more broadly wouldn't fix that. Suppressing alerts for anything that resolves within one retry would specifically hide problems that need more than one retry to become visible, which cuts against improving detection, not toward it."}, {"id": "P-D3-B3-19", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A post-incident review of a research subagent, whose only job is running web searches and summarizing results, finds it also has Bash, Edit, and Write tools available in its allowed tool list, even though logs show it has never used them. The security team asks the architecture team to recommend fixes. Which two of the following would most directly address this finding?", "options": ["Add a system-prompt note asking the research subagent to avoid using Bash, Edit, or Write unless truly necessary", "Remove Bash, Edit, and Write from this subagent's allowed tools, since its actual role only requires search and summarization", "Define each subagent's tool grants explicitly based on its role, rather than letting subagents inherit the coordinator's entire tool set by default", "Combine Bash, Edit, Write, and the search tool into one generic \"perform_action\" tool to reduce the total number of registered tools", "Increase the research subagent's model tier so it exercises better judgment about which tools are appropriate to use"], "correct": [1, 2], "explanation": "Removing the unused, unnecessary tools from this subagent's allowed list directly closes the exposure, and fixing the underlying default, where subagents inherit the full coordinator tool set rather than an explicitly scoped subset, prevents the same bloat from recurring for other subagents. A prompt note asking the model to avoid certain tools is a probabilistic control that leaves the dangerous tools reachable if the request is worded persuasively enough. Merging distinct tools into one generic action tool eliminates the safety benefit of purpose-built, auditable tools rather than restoring least privilege. A higher model tier doesn't remove any capability from the subagent's configuration and doesn't address the root architectural cause of the bloat."}, {"id": "P-D3-B3-20", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A refunds agent is authorized to autonomously approve customer refunds of any dollar amount once it determines, on its own, that a claim is valid, with no additional check involved. An audit flags this as an authorization gap. Which two changes would most directly close it?", "options": ["Increase the agent's model tier to Opus so it more reliably judges which refund claims are valid", "Add a programmatic gate that blocks the refund action until an independent check confirms the claim, enforcing the requirement deterministically rather than relying only on the agent's own judgment", "Log every refund decision so it can be reviewed in a monthly audit report", "Add more few-shot examples of valid and invalid refund claims to the agent's prompt", "Require human-in-the-loop or step-up approval for refunds above a defined monetary threshold, rather than fully autonomous approval at any amount"], "correct": [1, 4], "explanation": "A monetary threshold that triggers human or step-up approval directly limits the agent's unchecked authority for high-impact refunds, and a programmatic gate enforces that requirement deterministically instead of depending on the agent choosing to comply. A more capable model may make better individual judgment calls but still leaves the agent fully autonomous for arbitrarily large refunds, which is the actual gap. More few-shot examples can improve classification of claims but is a probabilistic prompt-level nudge, not an authorization control, and it doesn't cap the agent's authority. Monthly audit logging is a detective control that only surfaces problems well after an unauthorized refund has already been paid out."}, {"id": "P-D3-B3-21", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "An organization's monthly Claude API bill unexpectedly triples. The only existing monitoring is a single number: total organization-wide token spend for the month, refreshed once billing closes. No one can determine which of the dozen production agents or workflows caused the increase. What should be added to the monitoring stack?", "options": ["Per-agent and per-workflow breakdowns of token usage and cost, so a spend spike can be attributed to the specific component causing it", "A hard kill switch that halts all agent activity once total monthly spend crosses a fixed dollar amount", "A switch of every agent in the organization to the cheapest available model tier until the bill returns to its previous level", "A weekly email asking each engineering team to self-report their estimated token usage"], "correct": [0], "explanation": "Breaking token usage and cost down by agent and workflow is what turns an opaque, org-wide total into an actionable signal, letting the team see exactly which component's usage changed and investigate that specific workflow. Downgrading every agent to the cheapest model tier is a blunt, disruptive overcorrection that would degrade quality broadly instead of finding and fixing the actual source of the spike. A hard spend-based kill switch might limit financial damage in an emergency but provides no diagnostic information about which workflow is responsible, and it risks halting healthy, unrelated workloads too. Self-reported estimates from engineering teams are imprecise, delayed, and don't scale as reliably as an actual per-agent usage breakdown captured automatically."}, {"id": "P-D3-B3-22", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "During a partial API migration, a team registered a new MCP tool named update_user_v2 but never removed the original update_user tool, so both remain available to the agent. The agent occasionally calls the deprecated original tool instead of the new one, causing certain profile fields to go stale because the old tool doesn't write to them. Which two actions would most effectively resolve this at the configuration level?", "options": ["Increase the model's context window so it can better distinguish between the two similarly named tools", "Deregister and remove the deprecated update_user tool so it is no longer offered to the agent as an option", "Add a system-prompt reminder telling the agent to prefer the newer tool whenever both are available", "Establish a process to audit the tool registry after each migration and retire superseded tools promptly instead of leaving them registered indefinitely", "Rename update_user_v2 to a more distinctive name while leaving both tools registered and available"], "correct": [1, 3], "explanation": "Removing the deprecated tool eliminates the ambiguity immediately, since the agent can no longer select a tool that shouldn't exist anymore, and building a post-migration audit habit prevents the same stale-duplicate problem from recurring on future migrations. Renaming the newer tool leaves the deprecated one fully callable and doesn't remove the underlying risk of accidental selection. A prompt reminder to prefer the newer tool is a probabilistic nudge and, per the incident described, has already proven insufficient to stop occasional wrong selections. A larger context window doesn't change which tools are registered or resolve the ambiguity between two overlapping, similarly described tools."}, {"id": "P-D3-B3-23", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "In a claims-processing pipeline, five subagents, intake, verification, fraud-check, payout, and notification, all authenticate to backend systems using one shared, highly privileged service account. When a fraudulent payout was traced back to the pipeline, engineers could not determine which subagent's logic actually triggered the disbursement, because every action in the audit trail is attributed to the same shared account. Which two changes would most directly improve this design?", "options": ["Increase the shared account's session timeout so credentials don't expire mid-task", "Enable per-identity audit logging so sensitive actions can be traced back to the specific subagent that performed them", "Merge the five subagents into a single agent so there is only one identity to manage", "Issue each subagent its own distinct, appropriately scoped credential instead of sharing one account across all five", "Rotate the shared service account's password more frequently"], "correct": [1, 3], "explanation": "Giving each subagent its own scoped credential means every backend action is naturally attributable to the specific subagent that performed it, and per-identity audit logging makes that traceability explicit and queryable during an investigation, together directly solving the \"who did this\" problem the incident exposed. More frequent password rotation doesn't add any traceability; it only limits how long a single leaked credential stays valid. Merging the subagents into one would make attribution even harder, not easier, since there would then be only one identity behind every step of the pipeline. Extending session timeouts addresses convenience, not the complete absence of per-subagent accountability that caused the investigation to stall."}, {"id": "P-D3-B3-24", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A team's only defense against production regressions in their Claude-powered agent is a synthetic canary test suite that runs once every 24 hours. A prompt change deployed at 10 a.m. introduced a regression that degraded response quality for real customers throughout the day, but it wasn't caught until the canary ran again the next morning. What should the monitoring strategy add?", "options": ["Continuous, real-time production monitoring of live error rates, latency, and quality signals, alongside the existing daily canaries", "A larger number of canary test cases, while keeping the canary suite on the same once-daily schedule", "A move of all quality checks to manual QA sign-off performed before each release, replacing the canaries entirely", "A reduction of the canary run frequency to twice a year, reserved for major planned releases"], "correct": [0], "explanation": "Continuous, real-time monitoring of live production traffic closes the gap that a once-daily canary run leaves open, catching regressions like this one within minutes or hours instead of up to a full day later. Adding more canary test cases on the same daily schedule doesn't shrink the detection-time gap, since the suite still only runs once every 24 hours. Replacing automated canaries with manual QA sign-off before release wouldn't have caught this issue either, since the regression appeared after deployment through a live prompt change, not during a pre-release check. Reducing the canary frequency further would make the detection gap even larger, moving in exactly the wrong direction."}, {"id": "P-D3-B3-25", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An internal audit of a customer-triage chat agent finds it holds a single tool called admin_tool that can create, read, update, and delete user accounts. In practice, the agent's job is only to look up a customer's account status to include in its chat replies; it never creates, updates, or deletes anything. What should the architect recommend?", "options": ["Replace admin_tool with a narrowly scoped, read-only tool such as get_account_status, removing create, update, and delete capability from this agent entirely", "Keep admin_tool available but require the agent to explain its reasoning in its response before each call", "Keep admin_tool available but log every call it makes for a later audit review", "Keep admin_tool available but restrict its use to business hours only"], "correct": [0], "explanation": "Since the agent's actual job never requires create, update, or delete access, replacing the all-powerful admin tool with a narrow, read-only status-lookup tool removes the unnecessary capability entirely, which is the deterministic least-privilege fix. Logging calls for later review is a detective control that only reveals misuse after an unauthorized change has already happened. Asking the agent to explain its reasoning before acting doesn't prevent it from still being able to call a destructive or mutating action if it decides to. Restricting the tool to business hours does nothing to reduce what the tool can do; it only narrows when the excess capability could be misused, leaving the core problem in place."}, {"id": "P-D3-B3-26", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A security review of an enterprise Claude integration finds that several production agents authenticate with OAuth scopes broader than their actual usage (for example, write access when the agent only ever reads), that none of the associated credentials have an expiration date, and that there is no record of which team owns or is responsible for each credential. Which three actions should the architect prioritize?", "options": ["Move credential storage into each agent's system prompt so its access is visible to anyone reviewing the prompt", "Assign clear ownership for each credential, with an audit trail tying usage back to a responsible team", "Narrow each agent's OAuth scope to match its actual read and write needs", "Set expiration and rotation policies for credentials instead of leaving them valid indefinitely", "Consolidate all the agents onto one shared, broadly scoped credential to simplify future management"], "correct": [1, 2, 3], "explanation": "Matching scopes to actual usage, adding expiration and rotation instead of permanent validity, and assigning clear ownership with an audit trail are the three concrete fixes that directly address the gaps the review found: over-broad access, credentials that never expire, and no accountability for who is responsible for each one. Consolidating onto one shared, broadly scoped credential moves in the opposite direction, increasing blast radius and making attribution even harder than the current per-agent setup. Putting credentials in an agent's system prompt exposes live secrets to the model's context and to anyone with prompt visibility, creating a new leakage risk rather than fixing an authorization gap."}, {"id": "P-D3-B3-27", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "To gauge whether a production customer-support agent is healthy, a team's primary automated signal is the agent's own self-reported confidence score, returned at the end of each conversation. When the score trends downward, the team investigates; otherwise, they assume things are fine. What is the main problem with this monitoring approach, and what should the team do?", "options": ["The confidence score is fine as a primary signal, but it should be averaged over a longer rolling window before triggering an investigation", "The confidence score is fine as a primary signal, but it should be sampled more frequently throughout each conversation rather than only at the end", "Self-reported model confidence is an unreliable health signal; supplement or replace it with concrete operational metrics such as task completion rate, tool error rate, and escalation volume", "The confidence score should be trusted more, not less, by asking the model to justify it in greater detail within the same response"], "correct": [2], "explanation": "An LLM's self-reported confidence is a known-unreliable proxy for actual performance, so anchoring production health monitoring on it risks missing real degradation that the model itself doesn't \"know\" about; concrete, structured operational metrics like completion rate, tool error rate, and escalation volume are far more trustworthy signals of actual system health. Sampling the same unreliable signal more often doesn't make it a more accurate reflection of real performance. Asking the model to justify its own confidence score still relies on the model's self-assessment, which is the exact weakness being described, not a fix for it. Averaging an unreliable metric over a longer window can smooth out noise but doesn't correct for the fact that the underlying signal doesn't reliably track real task success in the first place."}, {"id": "P-D3-B3-28", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A company uses one \"Billing\" agent for two very different purposes: customer-facing balance inquiries, and internal billing-admin actions such as issuing credits, processing refunds, and closing accounts. Both use cases currently share the exact same tool list. Which two changes would most effectively enforce least privilege in this design?", "options": ["Split the single agent into two distinct agents, a customer-facing inquiry agent and an internal admin agent, each with its own tool grants", "Add a system-prompt disclaimer stating that customer-facing conversations must never trigger a refund or account closure", "Keep one shared agent, but increase logging verbosity specifically for refund and account-closure calls", "Use a larger, more capable model for the shared agent so it better judges when a refund or closure is appropriate in a customer conversation", "Grant the credit, refund, and account-closure tools only to the internal admin agent's allowed tools, removing them from the customer-facing agent entirely"], "correct": [0, 4], "explanation": "Splitting the two very different use cases into separate agents, and granting the sensitive admin-only actions solely to the internal agent's tool list, ensures the customer-facing agent is structurally incapable of issuing credits, refunds, or closures, a deterministic guarantee rather than a hope. A prompt disclaimer is a probabilistic instruction that a sufficiently crafted customer message could still bypass, since the tools remain available to call. Increasing logging verbosity is a detective control that would only reveal a wrongful refund after it already happened, not prevent it. A more capable model might improve judgment somewhat but still leaves the customer-facing agent holding tools it has no legitimate reason to hold, which is the actual gap being audited."}, {"id": "P-D3-B3-29", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "An architect reviewing production logs notices that when a user's authenticated session token expires partway through a long conversation, the agent's integration treats the resulting failure exactly like a transient network blip: it silently retries the identical tool call several times with the same expired token before eventually giving up and returning a generic failure to the user. What should the integration do instead?", "options": ["Classify the expired-token failure as a permission or authentication error distinct from a transient error, so the agent stops retrying and instead triggers re-authentication or a clear escalation", "Extend the token's expiration window indefinitely so it never expires mid-conversation", "Increase the number of retry attempts so the call is more likely to eventually succeed with the same token", "Automatically switch the tool call to a different endpoint that does not require a valid session token"], "correct": [0], "explanation": "Recognizing an expired-token failure as an authentication or permission error, distinct from a transient one, lets the integration respond correctly, by triggering re-authentication or clearly escalating, rather than looping through retries that can never succeed since the token itself, not the network, is the problem. Retrying more times doesn't help, because the same expired token will fail identically on every attempt. Routing around authentication by switching to an endpoint that doesn't require a valid token removes a security control rather than fixing the failure-handling gap, and introduces a much larger authorization problem. Making tokens never expire eliminates the symptom but removes an important security boundary, trading a real control for convenience instead of fixing how the integration handles the failure."}, {"id": "P-D3-B3-30", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "An architecture team wants to improve observability for a production multi-agent system that handles tens of thousands of requests per day across a coordinator and several specialized subagents. Which two of the following would most directly improve their ability to detect and diagnose issues at this scale?", "options": ["Track error rates and latency broken out per tool and per agent role, rather than only as a single system-wide aggregate", "Attach a consistent trace or correlation identifier to every request as it flows from the coordinator through each subagent and tool call", "Increase the model's sampling temperature so responses vary more across similar requests", "Reduce the number of metrics tracked down to a single uptime percentage to simplify the dashboard", "Store each agent's logs only in the individual engineer's local development environment for faster local access"], "correct": [0, 1], "explanation": "A consistent correlation identifier lets engineers reconstruct the full path of any given request across the coordinator and every subagent it touched, and breaking error rates and latency out per tool and per agent role reveals exactly where in the system a problem is concentrated instead of hiding it in a single blended number. Increasing sampling temperature affects response variability, not observability, and is unrelated to diagnosing production issues. Keeping logs only on individual engineers' local machines makes them unavailable for centralized, real-time investigation and doesn't scale to a shared production incident response process. Collapsing all monitoring down to a single uptime percentage would remove exactly the granularity needed to diagnose where and why a specific tool or agent is failing."}, {"id": "P-D3-B3-31", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "A company runs separate fleets of production agents in three geographic regions for latency and data-residency reasons. Each region's fleet currently writes its logs and metrics only to a regional store, with no shared view across regions. During a recent incident, a systemic bug affecting all three regions simultaneously wasn't recognized as a single, global issue for several hours, because each region's on-call team only saw their own regional dashboard and assumed it was a local, isolated problem. Which two changes would most directly close this observability gap?", "options": ["Standardize all three regions on the exact same Claude model tier for every agent", "Increase each region's local log retention period so more historical data is available within that region", "Centralize and aggregate logs and metrics from all three regions into a single, shared observability pipeline and dashboard", "Have each region's on-call engineer manually check the other two regions' dashboards once per day", "Define consistent structured logging fields and correlation identifiers across all regions, so incidents spanning multiple regions can be correlated and recognized as one issue"], "correct": [2, 4], "explanation": "A centralized, aggregated observability pipeline gives every on-call team a shared, cross-region view, so a pattern affecting all three regions at once is visible as a single global signal rather than three unrelated local blips. Consistent structured fields and correlation identifiers across regions make it possible to actually correlate and match up related incidents once the data is aggregated, rather than each region logging in its own incompatible format. Extending local retention within a single region doesn't create any cross-region visibility, since the core problem is the lack of a shared view, not insufficient history in any one store. Manual, once-daily cross-checks of other regions' dashboards are slow, error-prone, and would still leave a systemic incident undetected as a single issue for hours, which is exactly the failure that occurred."}, {"id": "P-D4-B1-01", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "A team at a telecom company built a Claude-based support agent that answers billing questions. To measure whether the agent's final answers are actually correct, they want a metric grounded in verified ground truth rather than surface impressions. Which metric best captures this?", "options": ["Task success rate measured against a set of billing questions with verified correct resolutions", "Average number of turns per conversation", "Percentage of sessions where the user sent a follow-up message", "Average response length in tokens"], "correct": [0], "explanation": "Task success rate against verified ground-truth resolutions directly measures accuracy: whether the agent actually got billing questions right. Turn count, follow-up rate, and response length are all proxies that can move for reasons unrelated to correctness, since a terse wrong answer and a long correct one look identical on these axes, so none of them substitute for checking outcomes against known-correct resolutions."}, {"id": "P-D4-B1-02", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "An architecture team monitors a customer-facing Claude agent and reports an average response latency of 900ms, well within the 2-second SLA. Despite this, support tickets complain about the agent 'hanging' during peak hours. What is the most likely gap in their latency measurement approach?", "options": ["They should switch from measuring latency in milliseconds to measuring it in seconds", "They are tracking mean latency only, which can hide a long tail of slow requests that p95/p99 latency would reveal", "They should stop measuring latency altogether and rely on user complaints instead", "They need to reduce the model's temperature setting to speed up generation"], "correct": [1], "explanation": "Mean latency is dominated by the bulk of fast requests and can look healthy even when a meaningful tail of requests, often concentrated at peak load, takes far longer; tracking p95/p99 latency exposes that tail. Changing the unit of measurement changes nothing about what's captured, temperature does not reliably control latency, and abandoning quantitative measurement in favor of anecdotal complaints removes the ability to detect or quantify the problem systematically."}, {"id": "P-D4-B1-03", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A finance-operations team switched their document-classification agent to a cheaper model tier to cut API spend. Cost per API call dropped 40%, but the cheaper model requires more retries and escalations to resolve each document, so total spend per fully-processed document actually rose. Which metric should the team have been tracking to avoid this outcome?", "options": ["Average tokens generated per response", "The list price per million tokens for each model tier", "Cost per successfully completed task, not just cost per individual model call", "Number of distinct tools available to the agent"], "correct": [2], "explanation": "Cost per call is a misleading unit when retries, escalations, or follow-up calls are needed to actually finish the job; cost per successfully completed task captures the full economic picture. List price per token and tool count are inputs to cost, not outcome measures, and average output length says nothing about whether the task was actually resolved."}, {"id": "P-D4-B1-04", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "hard", "question": "A SaaS vendor operates a multi-tenant Claude-powered support chatbot backed by a shared RAG index containing each customer's private documents. Before general availability, the architecture team must define metrics that would catch the highest-risk failure modes for this system. Which metrics should they include?", "options": ["Percentage of sessions rated five stars in a post-chat survey", "Rate at which retrieved or generated responses contain another tenant's data (cross-tenant leakage rate)", "Average number of words per response", "Success rate of adversarial prompt-injection attempts drawn from a red-team suite", "Rate of responses disclosing PII that the requesting user is not authorized to see"], "correct": [1, 3, 4], "explanation": "Cross-tenant leakage, prompt-injection success rate, and unauthorized PII disclosure are exactly the failure modes that matter for a shared-index multi-tenant system, where the top risks are sensitive-data exposure and manipulation of the agent's instructions. Response word count and star ratings are generic engagement signals that would not catch a single one of these high-severity security failures, since a leaked document snippet can still read as fluent and get a five-star rating."}, {"id": "P-D4-B1-05", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "A governance lead reviewing a new agent's eval plan sees this metric proposed: 'percentage of adversarial jailbreak attempts that successfully cause the agent to reveal system-prompt contents or bypass access controls.' Which category of metric is this?", "options": ["A latency metric, since it measures how quickly the agent responds to an attack", "A cost metric, since red-teaming consumes API budget", "An accuracy metric, since it measures whether the agent's answer was factually correct", "A security metric, since it measures resistance to unauthorized access and manipulation"], "correct": [3], "explanation": "Resistance to jailbreaks and unauthorized disclosure of protected content or bypassing of access controls is a security concern: whether the system can be manipulated or accessed improperly, not whether the answer is factually correct, fast, or cheap. The other three categories describe genuinely different dimensions of evaluation and none of them is what this metric is measuring."}, {"id": "P-D4-B1-06", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "An executive sponsor asks the evaluation team to report a single 'quality score' each release, blending accuracy, latency, and cost into one number so leadership can track one line on a dashboard. What risk does this approach introduce?", "options": ["A blended score can improve overall while one dimension, such as latency or cost, silently regresses, since gains in one metric can mathematically offset losses in another", "Blended scores are impossible to compute for any Claude-based system", "Tracking a single score eliminates the need for a regression test suite", "Combining metrics automatically satisfies compliance requirements for high-risk systems"], "correct": [0], "explanation": "When distinct metrics are folded into a single composite, a large improvement in one dimension can mathematically cancel out a serious regression in another, so leadership sees a flat or improving trend line while, for example, cost triples. The metrics remain individually computable and useful, a blended score has no bearing on regression testing needs, and no scoring scheme substitutes for actual compliance controls."}, {"id": "P-D4-B1-07", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "Over three consecutive releases, a team's accuracy eval score climbed from 82% to 94%. Over the same period, median production cost per request tripled and p95 latency doubled, but neither was reviewed as part of the release decision. What evaluation practice would have most directly prevented this outcome?", "options": ["Increasing the accuracy target to 98% so the team would stop making changes once it plateaus", "Requiring accuracy improvements to be evaluated jointly against predefined cost and latency guardrail thresholds before each release ships", "Rewriting the accuracy eval to use a larger holdout set", "Deprecating the accuracy metric entirely in favor of a pure cost metric"], "correct": [1], "explanation": "The failure here is optimizing one metric in isolation; defining guardrail thresholds for cost and latency that must hold alongside any accuracy gain forces trade-offs to be surfaced and reviewed at release time. Raising the accuracy target only intensifies the same one-dimensional pressure, a larger holdout set improves statistical confidence in the accuracy number but does nothing about the untracked dimensions, and discarding the accuracy metric swaps one blind spot for another."}, {"id": "P-D4-B1-08", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "A bank is preparing to launch a Claude-based agent that adjudicates customer billing disputes and can issue account credits. Before launch, which metrics should the architecture team formally define and track?", "options": ["The number of tools configured in the agent's toolset", "Accuracy of dispute resolutions measured against outcomes verified by a human adjudicator", "Rate of responses that expose one customer's account details to a different customer", "The character count of the system prompt", "Rate of incorrect or unauthorized credit issuances flagged in a safety/security review"], "correct": [1, 2, 4], "explanation": "A financial agent that can move money needs accuracy tracked against verified-correct outcomes, a security metric for cross-account data exposure, and a safety/security metric for unauthorized or incorrect credits, since those are the failure modes with real financial and compliance consequences. Tool count and system-prompt length are implementation details, not outcome metrics, and neither one tells you whether a customer was wrongly credited or another customer's data was exposed."}, {"id": "P-D4-B1-09", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "An architect is designing an eval for a Claude agent that writes free-form executive summaries of quarterly reports. There is no single correct string for a good summary. Which grading approach is best suited to this task?", "options": ["Exact-string match against one reference summary", "Counting the number of words in the output", "LLM-as-judge scoring against a rubric covering coverage, accuracy, and clarity", "Checking only whether the output contains the word 'summary'"], "correct": [2], "explanation": "Open-ended generation tasks have many acceptable phrasings, so a rubric-based LLM-as-judge approach that scores dimensions like coverage, accuracy, and clarity can recognize quality across varied valid outputs. Exact-string match, word counts, and keyword presence all assume a single fixed correct answer or use a superficial proxy, none of which reflects whether the summary is actually good."}, {"id": "P-D4-B1-10", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A team wants an automated grading step in their eval pipeline. They configure the same model session that generated each response to also grade its own output for correctness, reasoning that it has full context on why it produced that answer. What is the flaw in this design?", "options": ["Model sessions cannot be configured to perform grading tasks at all", "Self-grading is flawed only when the generating model is a smaller tier than the judge would be", "Grading requires a completely different modality of input than generation, which makes self-grading technically impossible", "A generator grading its own output tends to retain and defend its original reasoning rather than critically re-examining it, so an independent judge is more reliable"], "correct": [3], "explanation": "A model that generated an answer tends to hold onto its own reasoning and is less likely to question or catch its own mistakes, which is why independent, multi-pass review outperforms self-review. Models can absolutely be prompted to perform grading, the flaw is not tied to relative model size, and grading and generation use the same modality, text in and text out, so the problem is the lack of independence, not a technical impossibility."}, {"id": "P-D4-B1-11", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "Six months after launch, an architect notices that LLM-as-judge scores for a support agent have been trending upward, but a spot-check by human reviewers finds several judge-approved responses that a human would clearly rate as unacceptable. What is the most appropriate corrective action?", "options": ["Periodically recalibrate the judge's rubric and prompt against a fresh human-labeled gold sample to realign judge scoring with human judgment", "Discontinue LLM-as-judge scoring permanently and rely solely on user star ratings going forward", "Raise the passing threshold on the judge's numeric scale so fewer responses pass", "Switch the underlying agent to a larger model tier without changing the eval process"], "correct": [0], "explanation": "LLM-judge criteria can drift out of alignment with human standards over time, so periodically re-anchoring the rubric and prompt against fresh human-labeled examples is the direct fix for that specific problem. Abandoning LLM-as-judge discards a scalable grading method entirely, raising the numeric threshold is an arbitrary workaround that doesn't address why the judge is miscalibrated, and changing the agent's model tier doesn't touch the broken grading process at all."}, {"id": "P-D4-B1-12", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "hard", "question": "An architecture team is designing the evaluation pipeline for a Claude agent that summarizes legal contracts for a corporate legal department, running across thousands of documents per week. Which combination of grading methods should the pipeline use?", "options": ["Automated checks that verify required structural elements (e.g., key clauses, obligations, dates) are present in every summary", "LLM-as-judge scoring of faithfulness and coherence against a defined rubric for the full volume of summaries", "Using the average character length of each summary as the quality signal", "Human expert review of a sampled subset, weighted toward low-confidence or high-stakes contracts", "Relying exclusively on aggregate thumbs-up/thumbs-down feedback submitted by end users"], "correct": [0, 1, 3], "explanation": "At this volume, a sound pipeline layers automated structural checks for scale, LLM-as-judge for rubric-based quality scoring across the full volume, and targeted human legal-expert review concentrated on the highest-risk or lowest-confidence cases where errors matter most. Thumbs-up/down alone is sparse, self-selected, and doesn't explain what's wrong, and character length says nothing about whether a summary is faithful to the underlying contract."}, {"id": "P-D4-B1-13", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A team ships a prompt refinement intended to improve handling of refund requests. After deployment, several previously-reliable behaviors, like correctly formatting order numbers, start failing in production, even though refund handling did improve. What test-framework practice would have caught this before release?", "options": ["Spot-checking only the new refund-handling scenarios the prompt change targeted", "Running a versioned regression suite covering previously-passing cases against every prompt or model change before it ships", "Waiting for user complaints to identify unintended regressions", "Increasing the model's context window size"], "correct": [1], "explanation": "A versioned regression suite that re-runs previously-passing cases on every change is specifically designed to catch exactly this kind of unintended side effect before it reaches production. Testing only the targeted new scenarios is precisely how this regression slipped through, waiting for complaints turns customers into the test suite, and context window size has no bearing on whether an unrelated formatting behavior broke."}, {"id": "P-D4-B1-14", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "An eval engineer proposes building a 'golden dataset' as the foundation of a new test framework for a document-extraction agent. What does this term refer to in an evaluation context?", "options": ["The most recent week of raw, unlabeled production logs", "A collection of marketing materials describing the agent's capabilities", "A curated set of inputs paired with verified correct outputs, used as a benchmark to score the agent's responses", "The system prompt template used across all agent configurations"], "correct": [2], "explanation": "A golden dataset is a curated benchmark of inputs with verified correct answers, which is what makes automated and judge-based scoring meaningful in the first place. Raw unlabeled logs have no verified answers to compare against, marketing materials aren't an evaluation artifact at all, and a system prompt template is a configuration asset, not a labeled benchmark."}, {"id": "P-D4-B1-15", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "An architect testing a new LLM-as-judge pipeline for pairwise response comparison notices that the judge selects the first-listed response as the winner in roughly 80% of comparisons, regardless of which model actually produced the better answer. What should the team do to address this?", "options": ["Conclude that the first model in every comparison is genuinely superior and adopt it as the production default", "Remove the judge step entirely and rely only on aggregate user thumbs-up rates", "Increase the judge model's context window so it can see more of each response", "Randomize or alternate the order in which the two responses are presented to the judge, and average results across both orderings"], "correct": [3], "explanation": "This pattern is a textbook position bias in pairwise LLM-as-judge setups, and the standard mitigation is to randomize or alternate presentation order and average the results so the bias cancels out rather than contaminating the verdict. Treating the 80% figure as evidence of genuine quality difference mistakes a measurement artifact for a real signal, dropping the judge loses a scalable grading method instead of fixing it, and context window size is unrelated to an ordering bias."}, {"id": "P-D4-B1-16", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "An eval team's first attempt at an LLM-as-judge rubric used a vague instruction: 'rate the response's quality from 1-10, being conservative.' Judge scores turned out inconsistent across repeated runs on identical inputs. Which changes would most improve the rubric's reliability?", "options": ["Raise the judge model's sampling temperature so it produces a wider spread of scores", "Replace the vague instruction with explicit, categorical criteria that define what separates each score level", "Instruct the judge to first silently rewrite the response into an improved version, then score its own rewrite", "Add a small number of few-shot examples showing a high-quality and a low-quality response with their correct scores", "Define the scoring scale precisely enough that two different graders reading it would apply it the same way"], "correct": [1, 3, 4], "explanation": "Vague qualitative instructions like 'be conservative' don't reliably change behavior, while explicit categorical criteria, a few well-chosen calibration examples, and a precisely defined scale all directly improve consistency and inter-rater reliability. Raising temperature injects more randomness rather than removing it, and having the judge rewrite the response before scoring conflates the grading task with a generation task and no longer evaluates the original output."}, {"id": "P-D4-B1-17", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "In an eval pipeline for a healthcare-adjacent content agent, automated checks and LLM-as-judge scoring disagree on roughly 8% of sampled responses, with one flagging an issue the other doesn't. What is the most appropriate way to resolve these disagreement cases within the evaluation process?", "options": ["Route disagreement cases to human expert adjudication rather than defaulting to either automated method's verdict", "Always trust the LLM-as-judge verdict, since it is more scalable than the automated check", "Always trust the automated check, since it is deterministic", "Discard disagreement cases from the eval dataset so they don't affect the aggregate pass rate"], "correct": [0], "explanation": "When two grading methods disagree on content with real-world stakes, routing those specific cases to human expert review resolves the ambiguity with the highest-fidelity signal available, consistent with reserving human judgment for high-impact or uncertain cases. Automatically favoring one method over the other assumes it's always right, which is the very question the disagreement raises, and discarding disagreement cases would quietly remove the exact examples most likely to reveal a real problem."}, {"id": "P-D4-B1-18", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "An architect wants to measure whether a revised system prompt improves task success rate for a research-assistant agent. To isolate the effect of the prompt change, what should the test design hold constant between the control and treatment groups?", "options": ["Nothing; varying multiple factors at once produces results faster", "Everything except the system prompt: same model tier, same tools, same traffic characteristics", "Only the model tier, while allowing tools and traffic mix to differ freely", "Only the time of day the test runs, while allowing the prompt and model to both vary"], "correct": [1], "explanation": "To attribute any observed difference specifically to the prompt change, every other factor, including model tier, available tools, and traffic characteristics, needs to be held constant between control and treatment. Varying multiple factors at once, or holding constant only unrelated dimensions like time of day while letting the actual variables of interest change, makes it impossible to say which change caused the result."}, {"id": "P-D4-B1-19", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "After running a new model configuration against 20 test queries and seeing 2 more correct answers than the old configuration, a team declares the new configuration superior and schedules a full rollout. What is the main problem with this conclusion?", "options": ["Test queries should never be reused across configurations", "The new configuration should be compared only against its own historical average, not against the old configuration", "A sample of 20 queries is too small to establish statistical significance, so the observed difference could easily be noise", "Rollout decisions should be based on cost alone, not on accuracy differences"], "correct": [2], "explanation": "With only 20 queries, a two-answer swing is well within the range of random variation, so the team cannot yet distinguish a genuine improvement from noise; a properly sized sample, informed by expected effect size, is needed before drawing conclusions. Reusing the same query set across configurations is actually necessary for a fair comparison, comparing only to historical self-performance removes the head-to-head control needed to attribute the difference, and ignoring accuracy in favor of cost alone abandons the very question the test was designed to answer."}, {"id": "P-D4-B1-20", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "An A/B test shows a new agent configuration improves task accuracy from 88% to 93%. The team ships it immediately. Two weeks later, finance flags that per-session cost has tripled, a trade-off nobody evaluated during the test. What should the test design have included from the start?", "options": ["A larger accuracy improvement target, such as requiring at least a 10-point gain before shipping", "A second, independent accuracy eval to double-check the first one's result", "A delay of several additional months before making any rollout decision", "Predefined guardrail thresholds for cost (and other secondary metrics) that must hold alongside any accuracy gain before shipping"], "correct": [3], "explanation": "The test only measured the primary metric; defining guardrail thresholds for cost and other secondary dimensions up front would have surfaced the trade-off before shipping, not two weeks into production. Demanding a bigger accuracy gain doesn't address the untracked cost dimension at all, re-running the same accuracy eval a second time wouldn't reveal a cost problem it was never designed to measure, and an arbitrary delay adds no additional information without also changing what's actually being measured."}, {"id": "P-D4-B1-21", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "A new version of a production Claude agent passes the full offline evaluation suite, matching or beating every metric from the current version. What is the most appropriate next step before rolling it out to 100% of production traffic?", "options": ["A staged or canary rollout to a small percentage of real traffic with active monitoring, before expanding further", "Immediate full rollout, since passing the offline suite is sufficient confirmation", "Re-running the same offline evaluation suite a second time to be extra sure before any production exposure", "Postponing rollout indefinitely until a completely new evaluation suite is built from scratch"], "correct": [0], "explanation": "Offline eval suites are necessarily a sample of possible real-world conditions, so a staged canary rollout with live monitoring is the standard way to validate behavior against actual production traffic before full exposure, catching issues the offline suite didn't anticipate. Going straight to 100% skips that safety margin, repeating the identical offline suite adds no new information since it already passed, and building an entirely new suite before any rollout is a disproportionate delay that doesn't address the actual gap between offline and online conditions."}, {"id": "P-D4-B1-22", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "Which of the following are hallmarks of a well-designed A/B test comparing two candidate system prompts for a production agent?", "options": ["Users or sessions are randomly assigned to the control or treatment variant", "The test is stopped as soon as results happen to look favorable for the newer variant", "Success and guardrail metrics are defined before the test begins", "The treatment variant is automatically compared against a report from a previous quarter rather than a live control", "Both variants run concurrently, over the same time window and traffic conditions"], "correct": [0, 2, 4], "explanation": "Random assignment, metrics defined in advance, and a concurrent control group are the core ingredients that let a test attribute differences to the change being tested rather than to selection effects, timing, or shifting conditions. Stopping the moment results look favorable is a form of peeking that inflates false-positive rates, and comparing against a stale historical report instead of a live concurrent control confounds the result with everything else that changed in the interim."}, {"id": "P-D4-B1-23", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "hard", "question": "An eval run surfaces a new failure pattern: a support agent frequently mishandles refund requests submitted in non-English languages. Which sequence of actions reflects a sound iterative-improvement loop in response?", "options": ["Immediately upgrade to the largest available model tier for all traffic without first diagnosing the cause", "Investigate the failing transcripts to understand the specific root cause before making changes", "Make a targeted fix addressing the identified cause, then re-run the full eval suite, including previously-passing cases", "Add the newly-fixed scenarios into the ongoing regression suite so future changes are checked against them too", "Quietly drop the failing non-English cases from the eval dataset so the overall pass rate looks stable"], "correct": [1, 2, 3], "explanation": "A disciplined improvement loop investigates root cause first, applies a targeted fix, re-validates against the full regression suite rather than just the new cases, and folds the newly-discovered failure into the permanent test set so it can't silently regress again. Jumping straight to a bigger model without diagnosis is an expensive, unfocused guess that may not even address the actual cause, and removing the failing cases from the dataset hides the problem rather than fixing it."}, {"id": "P-D4-B1-24", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A team reports that their current model configuration resolves 91% of tickets correctly, compared to 84% cited in a report on the previous configuration from two quarters ago, and concludes the new configuration is clearly better. What weakens this comparison?", "options": ["The comparison is not concurrent or controlled: traffic mix, prompts, and other factors likely changed over the two quarters, confounding the result", "Percentages should never be used to report accuracy; only raw counts are valid", "91% is a numerically larger figure than 84%, so no further validation is needed", "Ticket-resolution accuracy cannot be meaningfully measured across different quarters at all"], "correct": [0], "explanation": "Comparing current performance to an old historical report is not a controlled comparison: traffic composition, product surface, and other conditions likely shifted over two quarters, so the gap can't be cleanly attributed to the configuration change. Whether percentages or raw counts are used doesn't fix this underlying confound, treating a larger number as automatically conclusive ignores that confound entirely, and the metric itself remains meaningful; it's the comparison method that's flawed, not the possibility of measuring it over time."}, {"id": "P-D4-B1-25", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "Before rolling out a new tool-calling strategy to all users, an architecture team wants to know whether the change actually causes a measurable improvement, rather than assuming it will based on offline testing alone. What is the primary purpose of running an A/B test in this situation?", "options": ["To replace the need for any offline evaluation suite going forward", "To identify syntax errors in the agent's tool-calling code", "To measure, under real production conditions with a live control group, whether the specific change causes a measurable improvement before broad rollout", "To permanently eliminate the need for human review of the agent's outputs"], "correct": [2], "explanation": "A/B testing exists to causally validate, under live production conditions with a concurrent control, whether a specific change actually delivers the improvement seen offline before committing to a full rollout. It doesn't replace offline evaluation, since the two are complementary, it isn't a tool for catching code-level syntax errors, and it has no bearing on whether human review is still needed for high-impact or uncertain outputs."}, {"id": "P-D4-B1-26", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "An eval dataset for a travel-booking agent contains 200 examples, all drawn from straightforward single-city, single-traveler bookings with no changes or cancellations. The agent scores 97% on this set, but production complaints center on multi-city itineraries and last-minute cancellations. What is the core problem with the eval dataset?", "options": ["It contains too many examples, which makes the eval slow to run", "It should be scored using exact-string match instead of task success", "It needs to be re-labeled by a different human reviewer", "It is not representative of real usage: it excludes entire categories of scenarios (multi-city trips, cancellations) that occur in production"], "correct": [3], "explanation": "A 97% score on a dataset that omits entire real-world scenario categories tells you almost nothing about how the agent handles those categories; the dataset simply isn't representative of production traffic. Its size isn't the issue, changing the scoring method wouldn't add the missing scenario types, and re-labeling by a different reviewer doesn't address the fact that certain scenarios are absent from the set entirely."}, {"id": "P-D4-B1-27", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "An architect building an eval set for a newly-launched agent has no historical eval data yet, but three weeks of production logs are available. Which practices would help them build a representative dataset from these logs?", "options": ["Sample across the actual distribution of real production queries, including infrequent edge cases", "Use only the queries that received a five-star rating in post-chat surveys", "Have sampled examples labeled with verified correct outcomes rather than assumed ones", "Include queries that were escalated to a human or flagged as failures, not only smooth interactions", "Use only the first 50 log entries collected, in chronological order"], "correct": [0, 2, 3], "explanation": "A representative dataset needs to reflect the real distribution of production traffic, including rare edge cases and known failure or escalation cases, with verified labels attached, since that's what makes it useful for actually detecting problems. Restricting to five-star-rated interactions filters out precisely the failure modes evaluation exists to catch, and taking only the first chronological entries captures whatever happened to occur early rather than a representative cross-section of real usage."}, {"id": "P-D4-B1-28", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "A retailer's Claude-based product-recommendation agent serves customers across five languages, but 90% of production traffic is in English. If the eval dataset is built by simple random sampling of production traffic, what is the likely consequence for the eval's ability to detect problems?", "options": ["The dataset will be dominated by English examples, likely leaving too few non-English examples to reliably detect language-specific failures", "Simple random sampling always produces a perfectly balanced dataset regardless of the underlying traffic mix", "The eval will be unable to measure accuracy at all under simple random sampling", "Non-English languages will be over-represented relative to their actual usage"], "correct": [0], "explanation": "Simple random sampling mirrors the underlying traffic distribution, so with 90% English traffic the sample will be similarly skewed, leaving too few non-English examples to draw a reliable conclusion about those languages; this is exactly the kind of gap that stratified sampling, deliberately ensuring adequate representation of each language, is designed to fix. Random sampling does not produce balance by default, it doesn't prevent accuracy from being measured at all, and it would under-represent minority languages, not over-represent them."}, {"id": "P-D4-B1-29", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "A financial-services agent's eval dataset was built two years ago and has not been updated since. Product scope has expanded significantly, and several new transaction types now make up a large share of production traffic but appear nowhere in the eval set. What should the team do?", "options": ["Keep the original eval dataset unchanged indefinitely, since changing it would break score comparability across releases entirely", "Periodically refresh the eval dataset to incorporate new scenario types as the product and its usage evolve", "Discontinue automated evaluation altogether and rely only on production incident reports", "Increase the pass threshold required on the existing eval set to compensate for its age"], "correct": [1], "explanation": "As a product's scope and real usage evolve, its eval dataset needs to evolve with it; periodically refreshing it to add newly-relevant scenario types keeps evaluation representative of what the system actually has to handle. Freezing the dataset forever leaves entire new scenario categories permanently untested, abandoning automated evaluation in favor of waiting for incidents means finding out about failures only after real customers hit them, and raising the pass bar on an outdated set does nothing to test the scenarios that are missing from it."}, {"id": "P-D4-B1-30", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "An architect is assembling a representative eval dataset for a healthcare-intake Claude agent. Which of the following should be deliberately included, beyond the routine happy-path cases?", "options": ["Rare but high-stakes edge cases, such as ambiguous or contradictory patient-provided information", "Adversarial inputs designed to probe prompt-injection and data-exposure vulnerabilities", "Only cases where the agent has already been observed to succeed in production", "Only cases short enough to fit in a single line of text, to keep the dataset simple to review", "Cases drawn from underrepresented patient segments or languages relative to the overall traffic mix"], "correct": [0, 1, 4], "explanation": "A representative dataset for a high-stakes domain needs deliberate coverage of rare-but-consequential edge cases, adversarial and security probes, and underrepresented segments, precisely the categories that a naive sample of routine traffic would under-sample. Restricting the set to cases the agent already handles successfully guarantees the eval can never surface a new failure, and filtering by input length for reviewer convenience arbitrarily excludes realistic, more complex inputs that are exactly where problems tend to hide."}, {"id": "P-D4-B1-31", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "A team building an eval set for a new agent feature has no production traffic yet, since the feature hasn't launched. They plan to use entirely LLM-generated synthetic queries to build the initial dataset. What is the key limitation of this approach that the team should plan to address once real usage data becomes available?", "options": ["Synthetic data can never be used for any part of an evaluation dataset under any circumstances", "LLM-generated queries are always factually incorrect and unsuitable for any testing purpose", "Synthetic queries may not capture the actual distribution, phrasing quirks, and edge cases that real users produce, so the dataset should be validated and expanded against real traffic once it exists", "Synthetic datasets eliminate the need for a golden or verified-answer set entirely"], "correct": [2], "explanation": "Synthetic queries are a reasonable starting point before launch, but they're generated from a model's guess at what users might ask, which can miss the actual distribution and idiosyncrasies of real usage, so the dataset should be validated and supplemented with real traffic once it's available. Synthetic data has a legitimate role, particularly pre-launch, so ruling it out entirely overstates the limitation, LLM-generated queries aren't inherently always incorrect, and using synthetic inputs doesn't remove the need for verified correct answers to grade against."}, {"id": "P-D4-B1-32", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A code-review assistant's eval dataset consists entirely of small, single-file diffs under 50 lines. In production, a growing share of usage involves multi-file refactors spanning several hundred lines. The team wants the eval set to remain a trustworthy predictor of real-world performance. What should they do?", "options": ["Keep the dataset focused on small diffs only, since those are easier to grade automatically", "Reduce the dataset to an even smaller set of trivial one-line diffs to speed up test runs", "Replace automated grading with a single aggregate pass/fail score across all diff sizes", "Expand the dataset to include multi-file and larger-diff scenarios proportional to how often they occur in production"], "correct": [3], "explanation": "A representative dataset needs to reflect how usage actually breaks down, so adding multi-file and larger-diff scenarios in proportion to their real share of production traffic keeps the eval predictive of real-world performance. Restricting the set to what's easiest to grade optimizes for reviewer convenience over representativeness, shrinking to even more trivial cases moves further away from real usage, and collapsing everything into one aggregate score would still leave larger diffs invisible within the total rather than adding coverage of them."}, {"id": "P-D4-B1-33", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "easy", "question": "A hiring-support agent shows an overall accuracy of 95% across all candidate interactions. A closer look reveals that accuracy for candidates using assistive screen-reader technology, who make up 4% of traffic, is only 61%. What does this reveal about relying on the overall 95% figure?", "options": ["The aggregate metric masks a serious per-segment failure that would go unnoticed without slicing results by segment", "The overall 95% figure means the agent is performing acceptably for every segment of users", "The screen-reader segment should be excluded from future evaluation since it is a small share of traffic", "The 61% figure must be a labeling error, since it contradicts the 95% aggregate"], "correct": [0], "explanation": "A high overall average is fully compatible with a much lower-performing minority segment hiding inside it, which is exactly why aggregate metrics need to be sliced by segment to be trustworthy. The 95% figure does not imply uniform performance across segments, excluding the very users experiencing the failure would hide the problem rather than fix it, and a large gap between an aggregate and a segment figure is a real signal to investigate, not evidence of a labeling mistake by default."}, {"id": "P-D4-B1-34", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "An architect is designing the reporting layer for an eval framework used by a global customer-support deployment. Which reporting practice would best surface segment-specific failures that a single overall accuracy number would hide?", "options": ["Report only the single overall accuracy number, since it is simpler for stakeholders to read", "Break down accuracy, latency, and safety metrics by segment, such as language, region, and query type, in addition to the overall figure", "Report the highest-performing segment's accuracy as the headline metric", "Round all metrics to the nearest 10% to make trends easier to spot"], "correct": [1], "explanation": "Slicing metrics by meaningful segments such as language, region, and query type, alongside the overall number, is what actually surfaces where a system underperforms, since a single aggregate cannot distinguish uniform performance from a strong majority masking a weak minority. Reporting only the overall number for simplicity reintroduces the exact blind spot in question, cherry-picking the best-performing segment as the headline actively hides the worst ones, and coarse rounding destroys the resolution needed to see meaningful segment differences."}, {"id": "P-D4-B1-35", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "hard", "question": "A team compares two model configurations and finds Configuration B has higher overall accuracy than Configuration A. When results are broken down by customer tier, however, Configuration A outperforms Configuration B in every individual tier. What explains this apparent contradiction, and what should the team do?", "options": ["The per-segment results must be miscalculated, since they contradict the aggregate figure by definition", "The team should simply report whichever number, aggregate or per-segment, is more favorable to the newer configuration", "The aggregate result is likely driven by a shift in the mix of tiers between the two test runs; the team should trust the consistent per-segment results and investigate the mix difference rather than the misleading aggregate", "This pattern is expected and requires no further investigation, since aggregates always take precedence over segment-level detail"], "correct": [2], "explanation": "When a metric that's worse in every subgroup is somehow better in aggregate, the almost certain explanation is a difference in the mix of subgroups between the two comparisons, a Simpson's-paradox-style effect, so the fix is to trust the consistent per-segment signal and dig into why the mix shifted rather than the misleading top-line number. The per-segment numbers aren't automatically wrong just because they conflict with the aggregate, cherry-picking whichever number looks better is not a legitimate analytical choice, and treating this as expected and unworthy of investigation would let a real, mix-driven confound go unexamined."}, {"id": "P-D4-B1-36", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "multiple", "difficulty": "medium", "question": "An enterprise architect designing an eval framework for a multinational retail chatbot wants to slice results to detect per-segment failures. Which dimensions would be most valuable to slice metrics by?", "options": ["Language or locale of the customer interaction", "The day of the week the eval suite happened to be executed", "Query complexity or category (e.g., simple lookup vs multi-step troubleshooting)", "Customer tier or account type where behavior or stakes differ", "The alphabetical order of the test case identifiers"], "correct": [0, 2, 3], "explanation": "Language, query complexity, and customer tier are dimensions along which real behavior and stakes plausibly differ, so slicing by them can reveal failures an overall average would hide. The day the eval suite was run and the alphabetical order of test-case identifiers are arbitrary artifacts of test execution and have no meaningful relationship to how the agent performs for different kinds of users or requests."}, {"id": "P-D4-B1-37", "cert": "CCAR-P", "domain": "Evaluation, Testing & Optimization", "type": "single", "difficulty": "medium", "question": "A multilingual document-processing agent handles 85% English and 15% Spanish documents. Overall extraction accuracy is reported at 91%. Later analysis shows English accuracy is 96% and Spanish accuracy is 63%. Why did the overall 91% figure fail to raise concern earlier?", "options": ["Because 91% is below any reasonable accuracy threshold, it should have raised concern regardless of the break
