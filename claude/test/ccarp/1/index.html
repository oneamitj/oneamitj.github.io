 "The team wants to minimize every possible token regardless of any quality consideration", "The model already achieves the required accuracy and format consistency with a plain zero-shot instruction"], "correct": [0, 1], "explanation": "Few-shot examples earn their cost when the desired format is hard to fully specify in words, or when edge cases need consistent handling that a plain instruction leaves ambiguous, since the examples show the model exactly what's wanted. A simple, single-step, unambiguous lookup doesn't have the format or edge-case complexity examples are meant to resolve. Minimizing tokens with no regard for quality argues against adding anything at all, not specifically for adding examples. If zero-shot already meets the accuracy and format bar, adding examples only adds cost without solving a problem that exists."}, {"id": "P-D2-B2-15", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "hard", "question": "An internal coding assistant uses chain-of-thought prompting for every request, including simple ones, and the raw step-by-step reasoning text is currently included directly in the final response shown to users, who find the verbose reasoning confusing and just want the answer. Which change addresses this while preserving chain-of-thought's accuracy benefit for the tasks that actually need it?", "options": ["Remove chain-of-thought entirely from every request so no reasoning text can ever leak into responses", "Reserve chain-of-thought reasoning for tasks that actually benefit from it, and for those, structure the output so the step-by-step reasoning is kept separate from, and not automatically shown as, the final user-facing answer", "Ask users to ignore the reasoning portion of the response themselves", "Keep chain-of-thought on every request but instruct the model to think \"more concisely\""], "correct": [1], "explanation": "The fix has two parts: apply chain-of-thought selectively where its reasoning benefit is actually needed rather than on every request, and when it is used, separate the reasoning from the final answer so only the answer surfaces to the user, preserving the accuracy benefit without the confusing exposure. Removing chain-of-thought entirely also removes its accuracy benefit on the genuinely complex tasks that need it. Asking users to self-filter doesn't fix a presentation problem the application should own. Asking for more concise reasoning still exposes raw reasoning to users and doesn't address unnecessary use on simple tasks."}, {"id": "P-D2-B2-16", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "multiple", "difficulty": "hard", "question": "An architect is writing internal guidance mapping task characteristics to prompting technique. Which three pairings are accurate?", "options": ["A task requiring multi-step arithmetic or logical reasoning toward a final answer benefits from chain-of-thought prompting", "A task with a specific, hard-to-describe output format or subtle edge cases benefits from a small number of few-shot examples", "A simple, well-specified, single-step task with no real ambiguity is usually well served by a direct zero-shot instruction without added examples or reasoning scaffolding", "Every production prompt should default to chain-of-thought regardless of task complexity, since additional reasoning can never reduce quality", "The number of few-shot examples should always be maximized, since there is no such thing as too many examples"], "correct": [0, 1, 2], "explanation": "Matching technique to task characteristics, chain-of-thought for genuine multi-step reasoning, few-shot for format or edge-case consistency, zero-shot for simple well-specified tasks, is the actual decision framework. Defaulting to chain-of-thought everywhere ignores that it adds latency and cost without benefit on tasks that don't need step-by-step reasoning. Maximizing example count without limit ignores the diminishing-returns pattern where extra examples add cost without added accuracy past a certain point."}, {"id": "P-D2-B2-17", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "easy", "question": "A SaaS company's support org has twelve slightly different copies of a 500-line system prompt, one per support team, each copy-pasted from an earlier version and lightly edited. When legal updates a mandatory disclaimer, engineers must manually find and edit all twelve copies, and two get missed, leaving those teams non-compliant for weeks. What structural change would prevent this from recurring?", "options": ["Extract the shared instructions, including the disclaimer, into a common base prompt component that all twelve teams reference, with only team-specific differences layered on top", "Require every team to re-copy the master prompt manually each quarter as a scheduled reminder", "Freeze the disclaimer text permanently so it never needs to change again", "Consolidate all twelve teams onto a single identical prompt with no team-specific differences at all"], "correct": [0], "explanation": "A shared base component referenced by every team, with only genuine per-team differences layered separately, means a policy update happens once and propagates everywhere, eliminating the manual-edit-and-miss failure mode. A recurring manual re-copy exercise just repeats the same error-prone process on a schedule instead of removing it. Freezing the disclaimer ignores that legal and policy content legitimately changes over time. Forcing complete uniformity removes legitimate team-specific customization that presumably exists for a reason."}, {"id": "P-D2-B2-18", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "medium", "question": "An insurance claims agent normally handles routine status updates and document requests. Occasionally, an adjuster needs it to draft a formal escalation letter for a disputed claim, a workflow with its own specific legal phrasing rules, structural requirements, and three worked examples, needed in roughly one out of every two hundred conversations. Where should this escalation-letter capability live?", "options": ["Permanently appended to the agent's main system prompt so the phrasing rules and examples are always loaded, even in the other 199 conversations that don't need them", "Packaged as a separate Skill containing the phrasing rules and examples, invoked and loaded only when the escalation-letter workflow is actually needed", "Left undocumented, relying on the model's general training knowledge to improvise the legal phrasing whenever it's needed", "Built as a completely separate customer-facing product with its own login"], "correct": [1], "explanation": "A specialized, infrequently used capability with its own instructions and examples is exactly what a Skill is for: it stays packaged and reusable but only loads into context when that specific workflow is actually invoked, keeping the other 199 conversations lean. Permanently appending it to the main prompt adds those tokens to every conversation regardless of relevance, inflating cost and latency for no benefit most of the time. Relying on unguided improvisation abandons the specific phrasing and structural rules the workflow needs to be reliable. Standing up an entirely separate product is far more overhead than an occasional, self-contained workflow justifies."}, {"id": "P-D2-B2-19", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "medium", "question": "Ten different internal agents at a research organization each need to cite sources in the same specific format, but each was built by a different engineer who wrote their own version of the citation instructions from scratch, and the results now vary team to team. What is the best way to fix this going forward?", "options": ["Create one shared, modular prompt component defining the citation format, and have each of the ten agents' prompts reference or include that shared component instead of maintaining separate copies", "Assign one engineer to manually inspect all ten agents' outputs after the fact and correct inconsistent citations", "Tell each of the ten teams to \"try to match the others\" without specifying the format", "Merge all ten agents into a single agent so there's only one citation format to maintain"], "correct": [0], "explanation": "A single shared, modular component for the citation convention, referenced by all ten agents, guarantees consistency at the source and means a future format change only needs to happen in one place. Manually correcting outputs after the fact is a detective fix that doesn't prevent the inconsistency from recurring on the next request. Telling teams to informally match each other without a concrete shared definition gives them nothing specific to converge on. Merging ten purpose-built agents into one is a disproportionate architectural change to solve a formatting-consistency problem."}, {"id": "P-D2-B2-20", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "hard", "question": "An internal code-review agent occasionally needs to run a \"generate release notes from commit history\" workflow with detailed formatting conventions and several worked examples, used only when a release is being cut, a small fraction of the agent's overall conversations. One engineer proposes permanently adding these rules and examples to the agent's main system prompt so they're always available. A colleague suggests packaging them as a separate Skill invoked only for that workflow. Which approach better fits the situation, and why?", "options": ["Permanently adding it to the main prompt, because having every capability always available minimizes the risk of the agent forgetting how to do something", "Packaging it as a separate Skill invoked on demand, because it keeps the main system prompt lean for the common code-review case while still making the specialized formatting rules and examples available exactly when the release-notes workflow is actually needed", "Neither approach; the release-notes workflow should be handled entirely outside of Claude by a separate scripting tool", "Permanently adding it to the main prompt, because Skills are only appropriate for tasks that never change"], "correct": [1], "explanation": "Because the workflow is used only occasionally and is self-contained with its own rules and examples, packaging it as a Skill loaded on demand avoids paying its token cost on every one of the far more common ordinary code-review conversations, exactly the trade-off Skills are designed to solve. Always including it inflates every request's context with rules that are irrelevant most of the time, running counter to good context management. Ruling out Claude entirely discards a capability the team clearly wants the agent to have. Skills aren't restricted to unchanging tasks; the deciding factor here is that the workflow is occasional and self-contained, not that it never changes."}, {"id": "P-D2-B2-21", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "medium", "question": "A platform team has published 25 Skills covering different internal workflows. Engineers report that the agent frequently fails to invoke the correct Skill for a given request, or invokes none at all, even when a matching Skill exists. Investigation shows most of the Skills have generic descriptions like \"helps with a task\" rather than describing what each Skill specifically does. What is the most direct fix?", "options": ["Reduce the number of available Skills to just one or two so there's nothing to choose between", "Rewrite each Skill's description to be specific and differentiated about what it does and when it applies, since that description is the primary signal used to decide which Skill fits a given request", "Instruct engineers to always name the exact Skill they want in every request", "Increase the model tier used for Skill selection"], "correct": [1], "explanation": "A Skill's description is what the model uses to judge whether it's the right match for a given request, so vague, near-identical descriptions make correct selection unreliable regardless of how good the Skills themselves are; writing specific, differentiated descriptions is the direct fix. Cutting down to one or two Skills sacrifices the capability the platform was built to offer instead of fixing the selection problem. Requiring users to name the exact Skill defeats the purpose of having the model select it automatically. A more capable model doesn't compensate for descriptions that don't differentiate what each Skill actually does."}, {"id": "P-D2-B2-22", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "multiple", "difficulty": "medium", "question": "An architect is proposing that several teams stop copy-pasting shared instructions into each of their own agent prompts and instead adopt a shared modular prompt component. Which three benefits should the architect cite?", "options": ["A future policy or format update only needs to be made in one place and then applies everywhere the component is referenced", "It reduces duplication and the drift that occurs when copies are edited independently over time", "It makes ongoing maintenance easier, since teams no longer need to hand-edit multiple near-identical copies", "It guarantees the agents using it will never produce an incorrect or unwanted output", "It removes any need to test the agents after the shared component is updated"], "correct": [0, 1, 2], "explanation": "A single update point, reduced duplication and drift, and easier maintenance are the concrete, well-established benefits of modularizing shared prompt content instead of copy-pasting it across teams. No prompt design choice, modular or otherwise, guarantees error-free output, since prompt compliance remains probabilistic. Updating a widely shared component actually increases the importance of testing afterward, since the change now affects every agent that references it, not less."}, {"id": "P-D2-B2-23", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "hard", "question": "A large enterprise runs a single 15,000-token system prompt containing onboarding instructions, refund policy, technical troubleshooting steps, and legal disclaimers, used identically by every customer-facing agent regardless of what a given conversation is actually about. Most conversations only ever touch one of these four areas, yet every request pays the token cost and latency of the full 15,000 tokens. Which redesign best addresses this?", "options": ["Decompose the omnibus prompt into modular, topic-specific components, such as separate onboarding, refund, troubleshooting, and legal-disclaimer modules, loaded only when a conversation's actual topic calls for them", "Shorten each of the four sections proportionally while keeping all four permanently included in every request", "Keep the single 15,000-token prompt but move it to a faster model tier to offset the added latency", "Split the agent into four completely separate products, one per topic, each requiring the customer to choose the right one upfront"], "correct": [0], "explanation": "Since most conversations only need one of the four topic areas, decomposing into modular, conditionally loaded components means each request only pays for the content actually relevant to it, directly cutting unnecessary cost and latency while keeping every topic available when needed. Proportionally trimming all four sections still forces every request to carry parts of all four areas it likely doesn't need. A faster tier processes the same bloated prompt faster without reducing what's unnecessarily included. Splitting into separate products pushes the burden of guessing the right topic onto the customer for a problem that's solvable through prompt modularization alone."}, {"id": "P-D2-B2-24", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "multiple", "difficulty": "easy", "question": "A team is deciding which capabilities to package as separate, on-demand Skills rather than folding permanently into an agent's base system prompt. Which three characteristics make a capability a good candidate for a Skill?", "options": ["It's only needed in a subset of conversations, not in every single request the agent handles", "It bundles instructions, formatting rules, or examples that are specific to that particular workflow", "Including it permanently in the base system prompt would add tokens that are irrelevant to most requests", "Every agent in the organization needs it available on every single request without exception", "It must be duplicated by hand into the prompt of each new agent that might eventually use it"], "correct": [0, 1, 2], "explanation": "Occasional use, workflow-specific bundled content, and the fact that permanent inclusion would waste tokens on unrelated requests are exactly the conditions that make on-demand Skill packaging worthwhile. A capability needed by every agent on every request is the opposite case, arguing for shared baseline content rather than an on-demand Skill. Needing to be hand-duplicated into each new agent describes the drift-prone copy-paste problem that modular reuse, including Skills, is meant to eliminate, not a reason to choose that approach."}, {"id": "P-D2-B2-25", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "medium", "question": "An architect assembles a prompt from four components that together exceed the intended context budget: core system instructions, a few worked examples, retrieved reference passages, and recent conversation history. The team needs to trim to fit. Which approach best reflects sound context prioritization?", "options": ["Trim proportionally, cutting an equal percentage from all four components regardless of how much each currently contributes to answering the request", "Rank each component by how directly it drives the quality of the response to this specific request, and cut first from whichever contributes the least relative to its size, rather than cutting evenly or by category alone", "Always cut the system instructions first, since they're usually the largest fixed block", "Always cut the conversation history first, regardless of whether it contains information still needed for the current request"], "correct": [1], "explanation": "Context prioritization means judging each piece of content by its actual contribution to the current response and trimming what contributes least relative to the space it occupies, not applying a blanket rule by category. Cutting evenly across all four ignores that some components may be far more valuable than others for this specific request. Always cutting system instructions first risks removing core behavioral guardrails and task definition regardless of their importance. Always cutting history first ignores that some of that history, like a fact or commitment stated earlier, may still be essential to the current request."}, {"id": "P-D2-B2-26", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "easy", "question": "A marketing email-drafting tool includes an entire 50-page brand style guide in full on every request \"just in case\" a rule buried somewhere in it becomes relevant, even though any single email only ever needs the two or three paragraphs covering tone and prohibited claims. Cost and latency are high, and the assistant occasionally seems to lose track of the specific request while wading through unrelated style-guide sections. What is the most effective fix?", "options": ["Pre-select and include only the specific excerpt or excerpts of the style guide relevant to drafting a given email, rather than the entire 50-page document every time", "Keep the entire style guide included, since removing any of it risks missing a rule someday", "Replace the style guide with a single sentence summarizing \"follow brand guidelines\"", "Increase the context window size so the full style guide is less of a burden"], "correct": [0], "explanation": "The task only ever needs a small, identifiable excerpt of the reference material, so curating down to that relevant subset removes the unnecessary bulk while keeping the specific guidance the task actually depends on. Keeping the entire document \"just in case\" is exactly the low-value-context pattern driving the cost, latency, and focus problems described. Collapsing it to one vague sentence loses the specific tone and claims guidance the task genuinely needs. A larger context window accommodates the bloat rather than removing it, and doesn't address the focus problem also being observed."}, {"id": "P-D2-B2-27", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "medium", "question": "A trip-planning assistant includes a user's entire multi-year booking history, hundreds of past trips of every type, in context for every new request, including when the user is now asking specifically about planning a weekend ski trip. Response quality suffers, and the assistant sometimes references irrelevant past business trips. What change would most improve this?", "options": ["Filter the included history to the subset actually relevant to the current request, such as recent trips and past trips of a similar type to what's being planned now, rather than the full multi-year history", "Remove all booking history from context permanently, since personalization isn't worth the added tokens", "Include the full history, but ask the assistant in the prompt to focus only on the relevant parts", "Summarize the entire multi-year history into one paragraph regardless of trip type"], "correct": [0], "explanation": "The task at hand only benefits from history that's actually relevant to the type of trip being planned, so filtering to recent and similar-type trips keeps the useful personalization signal while dropping the volume of irrelevant history diluting focus. Removing history entirely discards the personalization the product is presumably built to offer. Keeping everything and just asking the model to focus on the relevant parts still pays the full token and attention cost of the irrelevant material and relies on probabilistic compliance rather than removing the noise. Flattening the entire history into one summary regardless of trip type blurs exactly the type-specific detail, such as ski versus business travel preferences, that made filtering useful in the first place."}, {"id": "P-D2-B2-28", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "hard", "question": "An agent's context is approaching its limit mid-task. Four things currently occupy space: the user's original research question, a verbose raw log from an earlier step whose single relevant conclusion has already been extracted and recorded elsewhere in the context, the system's core instructions, and a finding from two steps ago that hasn't yet been used or summarized anywhere. Which item is safest to remove first?", "options": ["The user's original research question, since it was already read once", "The verbose raw log from the earlier step, since its relevant conclusion has already been captured elsewhere and the raw log itself no longer adds new information", "The system's core instructions", "The not-yet-used finding from two steps ago"], "correct": [1], "explanation": "The raw log is both high-volume and, critically, its useful content has already been extracted and preserved elsewhere, so removing it sheds bulk without losing any information the task still needs. The original question anchors the entire task and must persist regardless of how many turns have passed. Core instructions define the agent's behavior and guardrails and shouldn't be sacrificed to free space. The finding from two steps ago hasn't been captured anywhere else yet, so removing it now would be an irreversible loss of information the task may still need."}, {"id": "P-D2-B2-29", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "easy", "question": "Believing that \"more context can only help,\" an engineer adds a triage agent's entire company org chart, the full product catalog, and a year of unrelated closed tickets to every prompt, regardless of the specific ticket being triaged. Latency and cost rise substantially, and triage accuracy actually gets slightly worse, not better. What does this outcome suggest, and what should the engineer do?", "options": ["Irrelevant content can dilute the model's focus rather than just add cost, so the fix is to curate the context down to what's actually relevant to triaging the specific ticket at hand", "The accuracy drop must be unrelated to the added context and points to a separate model issue", "Even more unrelated background should be added, since the current amount apparently isn't enough", "The task should be moved to a more capable model tier to compensate for the added context"], "correct": [0], "explanation": "The outcome directly contradicts the \"more context always helps\" assumption: irrelevant material adds cost and latency and can measurably dilute focus, so the fix is to curate context down to what the specific ticket actually needs, not to add more. Given that removing the org chart, catalog, and unrelated tickets is a direct, available explanation, attributing the drop to an unrelated model issue skips the more obvious cause. Adding still more unrelated background would worsen the exact problem just observed. A more capable tier processes the bloated context without removing the irrelevant material that's actually degrading focus."}, {"id": "P-D2-B2-30", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "multiple", "difficulty": "medium", "question": "An architect is defining signals that should trigger removing or deprioritizing a piece of content from an agent's context. Which three are appropriate signals?", "options": ["The content is no longer relevant to the current step or any reasonably upcoming step in the task", "The content is large relative to the specific value it still provides going forward", "The content duplicates information that's already captured elsewhere in a more condensed form", "The content is the user's original stated goal for the task", "The content was added within roughly the last two turns"], "correct": [0, 1, 2], "explanation": "No longer being relevant, being bulky relative to remaining value, and duplicating information already captured elsewhere are all legitimate, content-based reasons to trim something from context. The user's original goal should be preserved throughout the task regardless of how much other content gets trimmed around it, since losing it undermines the whole task. Recency by itself says nothing about value; content added recently can still be low-value, and content added long ago can still be essential, so recency alone isn't a sound removal signal."}, {"id": "P-D2-B2-31", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "single", "difficulty": "hard", "question": "A compliance assistant answering questions about a specific regulation has a hard 4,000-token context budget per request: roughly 700 tokens are needed for the user's question and core instructions, leaving about 3,300 tokens of room. The team can fit either five detailed few-shot examples of ideally formatted answers, or the specific regulatory text passages most relevant to the current question, retrieved for this request, but not both in full. Which should be prioritized within the remaining budget?", "options": ["The five few-shot examples in full, and drop the retrieved regulatory text, since consistent formatting is the top priority for a compliance answer", "The retrieved regulatory text most relevant to the question, trimming the few-shot examples down to the minimum needed for basic format guidance, or dropping them, since an answer ungrounded in the actual regulatory source is likely to be factually wrong regardless of how well formatted it is", "Split the budget exactly in half between the two regardless of which one this specific question depends on more", "Neither; reduce the user's question and instructions instead to free up space for both in full"], "correct": [1], "explanation": "For a compliance answer, being factually grounded in the actual regulatory text is the higher-stakes requirement, since a well-formatted but ungrounded answer can still be substantively wrong, so the retrieved source material should be prioritized and the example count trimmed to whatever minimum still gives adequate format guidance. Prioritizing formatting examples over the actual source material risks a polished-looking answer that isn't grounded in the regulation it's supposed to be citing. An even split regardless of which content this specific question actually depends on ignores that the right allocation depends on the request, not a fixed ratio. Cutting the user's question or core instructions to make room for both sacrifices content that should never be trimmed to accommodate lower-priority material."}, {"id": "P-D2-B2-32", "cert": "CCAR-P", "domain": "Claude Models, Prompting & Context Engineering", "type": "multiple", "difficulty": "medium", "question": "An architect is drafting a checklist for how an agent's context should be prioritized and trimmed as a long task progresses. Which three items belong on the checklist?", "options": ["Rank content by how directly it affects the quality of the current step's output, and cut low-value content before high-value content", "Preserve the original task or goal statement even when trimming context aggressively elsewhere", "Periodically re-evaluate whether previously included content is still relevant as the task moves forward, rather than deciding once and never revisiting it", "Treat all content in the context as equally valuable so that removal decisions can be made arbitrarily", "Once content is added to context, never remove it, to guarantee no information is ever lost"], "correct": [0, 1, 2], "explanation": "Ranking by actual contribution to the current step, always preserving the task's original goal, and periodically re-checking relevance as the task evolves are the concrete practices that keep a long-running context useful rather than bloated. Treating all content as equally valuable abandons the judgment that prioritization requires in the first place. Never removing anything guarantees the exact unchecked accumulation that drives up cost and latency and buries important content among low-value material, the opposite of good context management."}, {"id": "P-D3-B1-01", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A law firm builds a RAG assistant over 40,000 scanned lease agreements (image-only PDFs) digitized decades ago. After indexing, retrieval returns almost no relevant clauses even for exact phrase searches, and spot checks show the extracted 'text' is full of garbled, nonsense characters. What is the most likely missing step, and what should be added?", "options": ["Add an OCR/text-extraction step during document preparation so scanned images are converted to accurate machine-readable text before chunking", "Increase the chunk overlap percentage to capture more surrounding context", "Switch to a larger embedding model with higher-dimensional vectors", "Raise the retrieval top-k so more candidate chunks are returned per query"], "correct": [0], "explanation": "The garbled extracted text shows the root problem is at the document-preparation stage: image-only PDFs were never converted to accurate machine-readable text, so nothing downstream can work with them. Adding overlap, using a larger embedding model, or raising top-k all operate on already-corrupted text and cannot recover information that was never correctly extracted. OCR (or equivalent text extraction) has to run before chunking and indexing so the pipeline has real text to work with."}, {"id": "P-D3-B1-02", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An aerospace MRO company's technicians query a 500-page aircraft maintenance manual with precise procedural questions like 'torque spec for step 4 of the hydraulic pump removal procedure.' The manual has nested sections, subsections, and numbered steps, but the current pipeline splits it into fixed 500-token chunks that ignore those boundaries, so a single retrieved chunk often blends the end of one procedure with the start of an unrelated one. What is the best fix?", "options": ["Chunk by the manual's existing structural boundaries (sections, subsections, numbered procedure steps) so each chunk stays within one coherent procedure", "Reduce the fixed chunk size from 500 to 100 tokens to shrink the blending problem", "Keep fixed-size chunking but increase the overlap window between chunks", "Route all manual queries to a higher-reasoning model tier so it can untangle the blended content"], "correct": [0], "explanation": "Chunking along the manual's own section, subsection, and step boundaries keeps each procedure self-contained, which is exactly what a structure-aware chunking strategy matched to this document's shape looks like. Shrinking the fixed token size only moves the blending problem to a different boundary rather than eliminating it, since the split still ignores where procedures actually begin and end. More overlap duplicates content around arbitrary cut points but doesn't align those cut points with the manual's real structure. Routing to a more capable model tier asks the model to untangle a context-assembly problem that should have been solved during chunking."}, {"id": "P-D3-B1-03", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A SaaS company's self-serve help center has 800 short FAQ entries, each a question followed by a 2-3 sentence answer. An architect is designing the chunking step for a RAG bot over this content. Which chunking approach best matches this data shape?", "options": ["Treat each Q&A pair as its own chunk, keeping the question and its complete answer together", "Concatenate all FAQ entries into one large document and split it into fixed 1000-token chunks", "Split each answer into individual sentences and index each sentence as a separate chunk", "Group 20 unrelated FAQ entries per chunk to reduce the total number of stored vectors"], "correct": [0], "explanation": "Keeping each question paired with its full answer as a single chunk matches the natural unit of this FAQ content and ensures retrieval returns a complete, self-contained answer. Splitting answers into individual sentences breaks the connection between a claim and its surrounding justification. Fixed-token concatenation across unrelated entries or grouping 20 entries per chunk both bury the relevant answer inside irrelevant neighbors."}, {"id": "P-D3-B1-04", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "An internal developer platform team builds a code-search assistant over a 2-million-line monorepo. Engineers ask questions like 'where is the retry logic for the payment webhook handler defined.' The pipeline currently chunks source files every 300 lines regardless of function boundaries, so retrieved chunks frequently start mid-function with no signature or docstring, and the model can't tell which class or module the code belongs to. What is the best chunking and indexing adjustment for this data shape and query pattern?", "options": ["Chunk along function/class boundaries and attach metadata such as file path, module, and symbol name to each chunk", "Decrease the fixed line-count window from 300 to 150 lines", "Increase the overlap between consecutive 300-line chunks to 50%", "Switch the vector database to one with a larger maximum index size"], "correct": [0], "explanation": "Chunking by function or class boundaries preserves each unit of code as a coherent, self-contained piece, and attaching file path, module, and symbol metadata gives retrieval and the model exactly what a 'where is X defined' query needs. Shrinking or enlarging the fixed line-count window still ignores where functions actually start and end, so mid-function cuts persist. A larger maximum index size in the vector database addresses storage capacity, not the structural mismatch between chunk boundaries and code structure."}, {"id": "P-D3-B1-05", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A multi-brand retail company is consolidating product documentation from six brands into one RAG index. Which of the following should be part of the indexing stage design?", "options": ["Use the same embedding model, at the same version, to embed both the stored documents and incoming queries", "Attach metadata fields such as brand, product category, and effective date so retrieval can filter, not just rank by similarity", "Define a re-indexing cadence that matches how frequently each brand's content actually changes", "Always choose the embedding model with the largest possible vector dimensionality regardless of the data", "Skip storing metadata since vector similarity alone reliably captures brand and category distinctions"], "correct": [0, 1, 2], "explanation": "Keeping indexing and query embeddings on the same model and version is required for similarity scores to be meaningful at all; brand/category/date metadata lets retrieval filter precisely instead of relying on similarity alone; and a re-indexing cadence tied to actual content velocity keeps the index fresh without over- or under-investing in refresh infrastructure. Chasing the largest possible embedding dimensionality regardless of the data adds cost and latency without addressing the brand-consolidation problem, and skipping metadata assumes similarity alone can substitute for explicit structured attributes, which it generally cannot for consistent brand or category separation."}, {"id": "P-D3-B1-06", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A telecom company's marketing team updates the 'current promotions' page in the CMS at 9am. The support chatbot's index is populated by a nightly batch job that runs at 2am. Customers asking about promotions in the afternoon get confident answers quoting yesterday's expired promotion; the Claude model and inference latency are unchanged. What is the root cause?", "options": ["The vector index still reflects the pre-9am content because the nightly batch job hasn't run again since the update, so retrieval is serving stale chunks", "The model's training data cutoff makes it unaware of current promotions", "The context window is too small to hold the promotions page", "The temperature setting is too high, causing the model to hallucinate promotion details"], "correct": [0], "explanation": "Because the model and latency are explicitly unchanged, the symptom points downstream of generation to the retrieval layer: the index simply hasn't been rebuilt since the 9am content change, so it's still serving yesterday's promotion as current. The model's training cutoff is irrelevant since promotion content is supplied at query time via retrieval, not parametric knowledge. Context window size and temperature affect how much retrieved content fits and how the answer is phrased, not which version of the promotion gets retrieved in the first place."}, {"id": "P-D3-B1-07", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "Warehouse staff at an industrial parts distributor query a RAG assistant with exact part numbers like 'SKU-48213-B' to find compatible replacement parts. Pure dense semantic retrieval frequently returns parts with similar descriptions but different SKU codes, because the embedding model treats nearby SKU strings as similar in meaning. Which retrieval approach best matches this query pattern?", "options": ["Add keyword or exact-match (lexical) retrieval alongside or instead of pure semantic search so exact identifiers are matched precisely", "Increase the embedding vector dimensionality to capture SKU codes more precisely", "Lower the similarity threshold so more candidates are returned", "Switch to a larger, more capable model tier to better interpret the SKU codes"], "correct": [0], "explanation": "Exact identifiers like SKU codes are exactly the case where lexical or keyword matching outperforms pure semantic search, since embeddings are built to capture meaning and treat similarly-described-but-different SKUs as close together. Increasing vector dimensionality still leaves the fundamental issue that semantic similarity isn't the right signal for exact-code matching. Lowering the similarity threshold returns more near-miss candidates rather than fixing precision, and a larger model tier doesn't change what signal the retrieval step is matching on."}, {"id": "P-D3-B1-08", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "Employees at a corporate HR department ask a policy assistant broad, paraphrased questions like 'can I work from another country for a few weeks,' while the policy corpus uses formal terms like 'temporary international remote work.' Pure keyword search returns nothing because the wording doesn't overlap. What is the best retrieval approach?", "options": ["Use dense semantic (embedding-based) retrieval, which matches paraphrased meaning rather than exact wording", "Use strict lexical/keyword search so results are more precise", "Require employees to phrase questions using exact policy terminology", "Reduce the chunk size so more chunks are available to search"], "correct": [0], "explanation": "Paraphrased, conceptual questions need retrieval that matches meaning rather than exact words, which is what dense semantic search is built for. Strict lexical search fails here precisely because the employee's wording doesn't share vocabulary with the policy document. Requiring employees to use exact policy terminology shifts a retrieval problem onto users instead of fixing the architecture, and shrinking chunk size doesn't help if the retrieval method still can't match paraphrased meaning in the first place."}, {"id": "P-D3-B1-09", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "A financial services firm's ML platform team upgrades to a new embedding model for newly ingested documents but does not re-embed the existing three years of archived filings; both old and new vectors now sit in the same index. Retrieval quality has degraded sharply, mixing irrelevant old and new results with no error messages. Which statements are correct?", "options": ["Vectors produced by two different embedding models occupy different vector spaces, so similarity comparisons between them are not meaningful", "The entire archive needs to be re-embedded with the new model so all vectors live in one consistent space", "This kind of mismatch degrades ranking silently rather than throwing retrieval errors, which is why it can go unnoticed for a while", "Increasing top-k will resolve the mismatch by giving the model more chunks to choose from", "The fix is to fine-tune Claude on the archived filings so it learns to compensate for the mixed vector space"], "correct": [0, 1, 2], "explanation": "Two embedding models place vectors in different, generally incomparable coordinate spaces, so similarity scores computed across old and new vectors don't reflect true relevance, which is why a full re-embedding of the archive is needed to bring everything into one consistent space. This kind of mismatch doesn't throw errors; it just quietly degrades ranking, which is why it can persist unnoticed until someone investigates. Raising top-k just returns more candidates drawn from the same broken comparison, and fine-tuning the model doesn't address a vector-space incompatibility that lives entirely in the embedding and indexing layer."}, {"id": "P-D3-B1-10", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "An enterprise IT helpdesk assistant's retrieval step returns five chunks ranked by relevance score, but the context-assembly step currently inserts them in random order into the prompt. Reviewers notice the model sometimes ignores the most relevant chunk when it lands in the middle of a long assembled context. What is the best fix?", "options": ["Order chunks so the most relevant ones are placed near the beginning (and/or end) of the assembled context, since content in the middle of a long context gets less attention", "Reduce the number of retrieved chunks to exactly one to avoid ordering issues entirely", "Randomize the order on every request so no position is systematically favored", "Increase the model's temperature so it weighs all chunks more evenly"], "correct": [0], "explanation": "Because content in the middle of a long context receives less attention than content near the beginning or end, placing the highest-relevance chunks at the edges of the assembled context, rather than leaving their position to chance, directly addresses the symptom. Limiting to a single chunk discards potentially relevant supporting content rather than fixing ordering. Randomizing order doesn't solve the underlying attention pattern, and raising temperature changes response variability, not which parts of the context the model attends to most."}, {"id": "P-D3-B1-11", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A pharmaceutical regulatory affairs team finds that a key dosage-limit sentence spans the boundary between chunk 12 and chunk 13 of a drug label document, which were built with zero overlap. Queries about that dosage limit retrieve only one of the two chunks, so the model gives an incomplete answer. What is the best fix at the chunking stage?", "options": ["Introduce overlap between adjacent chunks so content spanning a boundary is likely to appear intact in at least one chunk", "Reduce chunk size further so boundaries occur less often", "Increase retrieval top-k so both neighboring chunks are always returned", "Switch to a keyword-based retrieval method instead of semantic search"], "correct": [0], "explanation": "Overlap between adjacent chunks is the direct fix for content that spans a chunk boundary, since it makes it far more likely that any given sentence appears intact within at least one chunk. Shrinking chunk size further only creates more boundaries, increasing the odds that important content gets split rather than reducing it. Raising top-k doesn't guarantee the two neighboring chunks are both retrieved, since ranking is based on similarity, not adjacency. Switching to keyword-based retrieval doesn't address the underlying chunk-boundary problem at all."}, {"id": "P-D3-B1-12", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "An investment research firm's corpus includes 10-K filings with large financial tables (revenue by segment, by quarter). The current pipeline strips tables into flat paragraph text during document preparation, and analysts report the assistant frequently mismatches values to the wrong column or quarter. Which changes would most directly address this?", "options": ["Preserve table structure during document preparation (e.g., row-level extraction with column headers retained) instead of flattening tables into plain paragraphs", "Repeat key row/column identifiers (such as the metric name and period) within each table-derived chunk so context isn't lost when it's retrieved in isolation", "Increase the embedding model's context length so it can encode the entire filing as one vector", "Ask analysts to rephrase their questions in a way that avoids referencing specific quarters", "Reduce the overall number of tables ingested to only the most commonly referenced ones"], "correct": [0, 1], "explanation": "Preserving row/column relationships during document preparation, instead of flattening tables into paragraph text, keeps the structure that gives a number its meaning. Repeating key identifiers like the metric name and reporting period inside each table-derived chunk ensures that meaning survives even when a chunk is retrieved in isolation from the rest of the table. A longer embedding context lets more text be encoded per vector but doesn't restore row/column relationships already lost during extraction; asking analysts to avoid specific quarters treats the symptom rather than the document-preparation gap causing it; and dropping less-common tables reduces coverage instead of fixing how tables are represented."}, {"id": "P-D3-B1-13", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An e-commerce retailer updates its returns policy at 10am, extending the window from 30 to 60 days. A customer asks the support bot at 2pm and gets a confident but wrong '30 days' answer. The support lead assumes the model needs retraining. What should the architect check first?", "options": ["Whether the document-ingestion/indexing pipeline actually picked up and re-indexed the updated policy page since the 10am change", "Whether the model tier should be upgraded to a more capable one", "Whether the system prompt needs stronger instructions to 'always be accurate'", "Whether the temperature parameter is set too high"], "correct": [0], "explanation": "Before assuming a model or generation-side problem, the architect should verify whether the ingestion and indexing pipeline actually processed the 10am policy change, since a confidently wrong-but-plausible answer right after a content update is the classic signature of a retrieval-layer lag, not a reasoning failure. Upgrading the model tier or lowering temperature don't change what content retrieval hands the model, and stronger 'be accurate' instructions can't compensate for the model being handed stale source material in the first place."}, {"id": "P-D3-B1-14", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "An insurance carrier's customer-facing assistant must answer both 'what does my policy cover for water damage' (requires reasoning over dense policy-language PDFs) and 'what is the status of claim #88213' (an exact record in a claims database that changes constantly). Which design choices are appropriate?", "options": ["Use RAG (chunking and retrieval) over the policy-language documents, where meaning must be matched across varied phrasing", "Use a direct structured query (database lookup or API call) for exact, frequently changing claim-status records rather than indexing them into a vector store", "Force claim status into the same vector index as the policy documents so both use one retrieval path", "Re-embed the entire claims database into the vector index every hour to keep it fresh", "Route all questions, regardless of type, through the highest-capability model tier to compensate for retrieval limitations"], "correct": [0, 1], "explanation": "Dense policy-language documents genuinely benefit from RAG because customers phrase questions differently than the policy text, while claim status is an exact, fast-changing record better served by a direct database or API call than by periodically re-embedding it into a vector store. Forcing both into the same vector index treats a live transactional record like static reference content, and it will always lag behind the source of truth. Re-embedding the claims database hourly is expensive and still leaves a staleness window, and routing everything through a bigger model compensates for an architecture gap instead of fixing it."}, {"id": "P-D3-B1-15", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "An analyst at a manufacturer's procurement team asks, 'which of our top-10 vendors by 2025 spend also failed a compliance audit in the last year?' The needed facts live in two separate document sets: a spend report and a compliance audit log. A single retrieval pass with one query embedding returns mostly spend-report chunks and misses the audit log entirely. What is the best approach?", "options": ["Decompose the question into sub-queries (spend ranking, then audit failures) and retrieve for each, or run iterative/multi-step retrieval before assembling context", "Increase top-k on the single query so more chunks from both document sets are likely included", "Merge the spend report and audit log into a single document before indexing", "Switch to a model tier with a larger context window so it can reason around the incomplete retrieval"], "correct": [0], "explanation": "When the answer genuinely requires facts from two different document sets, decomposing the question into sub-queries, or retrieving iteratively, gives each fact area its own dedicated retrieval pass, rather than hoping one query embedding happens to surface both. Raising top-k on a single query increases volume but not necessarily coverage across two different topics competing for the same ranked list. Merging the two document sets before indexing doesn't guarantee a single query will match relevant content from both parts of the merged document. A larger context window lets the model hold more retrieved text, but it can't reason about facts that were never retrieved."}, {"id": "P-D3-B1-16", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An enterprise software vendor maintains admin guides for three product versions (v3, v4, v5) with a lot of textual overlap between them. A customer on v5 asks a setup question and the bot cites a step that no longer exists because it retrieved a chunk from the v3 guide. What is the best fix?", "options": ["Attach version/product-line metadata to each chunk at indexing time and filter or boost retrieval by the customer's actual version", "Increase the chunk size so more context from each guide is included", "Increase retrieval top-k so the v5 chunk is more likely to appear somewhere in the results", "Add a disclaimer to the system prompt telling the model to double check version numbers"], "correct": [0], "explanation": "Attaching version and product-line metadata at indexing time, and filtering or boosting by the customer's actual version, stops textually similar but outdated content from outranking or sitting alongside the correct version. Enlarging chunk size or raising top-k both increase the chance the wrong-version chunk is included, not decrease it, since neither addresses which version is actually relevant. A system-prompt disclaimer asks the model to catch a version mismatch that the retrieval step should have prevented from reaching it in the first place."}, {"id": "P-D3-B1-17", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A media and publishing company indexes PDF whitepapers where every page includes a repeated header ('Confidential: Acme Research') and footer (page number and copyright line). After chunking, a large fraction of retrieved chunks are dominated by this repeated boilerplate rather than substantive content. What is the best fix?", "options": ["Strip repeated headers, footers, and other boilerplate during document preparation, before chunking", "Increase chunk size so boilerplate makes up a smaller proportion of each chunk", "Lower the retrieval similarity threshold so more substantive chunks surface despite the boilerplate", "Ask users to phrase queries that avoid matching the boilerplate text"], "correct": [0], "explanation": "Stripping repeated headers, footers, and other boilerplate during document preparation prevents that non-substantive text from ever entering the index, which is the direct fix for chunks being dominated by it. Increasing chunk size just means boilerplate appears more often per chunk in absolute terms even if its share shrinks. Lowering the similarity threshold surfaces more low-relevance results rather than removing the boilerplate problem, and rephrasing queries doesn't stop boilerplate from being indexed in the first place."}, {"id": "P-D3-B1-18", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A developer tools company's reference docs pair each function signature with a docstring explaining parameters and return values. Fixed-token chunking sometimes cuts a chunk boundary between the signature and its docstring, so retrieval returns a docstring with no indication of which function it describes. What is the best fix?", "options": ["Align chunk boundaries with logical/semantic units, keeping each function signature and its docstring together in one chunk", "Increase the number of retrieved chunks per query so the signature is likely retrieved alongside the docstring", "Reduce the fixed token count per chunk so boundaries occur more frequently", "Index function signatures and docstrings in two separate vector databases"], "correct": [0], "explanation": "Aligning chunk boundaries with the logical unit of a function signature plus its docstring ensures retrieval always returns a self-contained, attributable piece of documentation. Retrieving more chunks per query increases the odds the signature is somewhere in the result set but doesn't guarantee it's paired with the right docstring, and it adds noise. Shrinking the fixed token count creates more boundaries, which makes severed pairs more likely, not less. Splitting signatures and docstrings into separate databases makes recombining them even harder."}, {"id": "P-D3-B1-19", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "Two days after a large content migration to a new document management system, users of a global consulting firm's internal knowledge assistant report it is giving fluent, confident, but frequently incorrect answers. The Claude model version and infrastructure latency are unchanged from before the migration. Which of the following are plausible root causes worth investigating?", "options": ["The re-indexing job may not have actually completed for all migrated documents, leaving some content unindexed or indexed from stale copies", "The new document management system may export content with different formatting, causing inconsistent chunk boundaries or broken structure compared to before", "If the embedding model or its version changed as part of the migration without a full re-index, old and new vectors could now be incomparable", "The Claude model's context window physically shrank during the migration", "The model requires fine-tuning on the migrated documents before it can answer correctly"], "correct": [0, 1, 2], "explanation": "A completed-looking migration can still leave documents unindexed or indexed from stale copies if the pipeline wasn't actually triggered for every item, which is exactly the kind of gap that produces fluent-but-wrong answers. A new platform's export format can change how content is structured on the page, which shifts where chunk boundaries land even if the chunking logic itself didn't change. If the embedding model changed as part of the migration without a full re-index, old and new vectors become incomparable in ways that degrade ranking silently. The model's context window doesn't shrink on its own, and fine-tuning addresses parametric knowledge, not a retrieval-layer migration issue."}, {"id": "P-D3-B1-20", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An employee at a university HR/benefits office asks a policy assistant to 'show me the current parental leave policy section.' The corpus contains three versions of the handbook (2022, 2024, 2026) that are textually similar, so pure semantic similarity ranks them nearly the same, and the bot sometimes surfaces the 2022 version. What is the best fix?", "options": ["Use metadata such as document date/status (current vs. superseded) to bias or filter retrieval toward the authoritative current version, rather than relying on similarity score alone", "Increase the chunk size for handbook documents so more context is included", "Increase the embedding model's dimensionality to better distinguish similar-sounding versions", "Remove the older handbook versions from company file storage entirely"], "correct": [0], "explanation": "When several versions of a document are textually similar, similarity score alone can't reliably distinguish 'current' from 'superseded,' so retrieval needs to use date/status metadata to bias or filter toward the authoritative version. Increasing chunk size or embedding dimensionality doesn't give the retrieval step any signal about which version is current. Deleting older versions from storage is a records-retention decision that goes well beyond what the retrieval architecture needs to solve, and may conflict with legitimate reasons to retain historical versions."}, {"id": "P-D3-B1-21", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A customer support organization built chunks for its product troubleshooting guide at a very small fixed size (50 tokens) to maximize retrieval precision. Support agents now complain that retrieved chunks are often single fragmented sentences without enough surrounding context to understand the troubleshooting step, even though the right chunk is usually retrieved. What is the best fix?", "options": ["Increase chunk size (and/or add overlap) so each chunk retains enough surrounding context to be understandable on its own", "Decrease chunk size further so retrieval precision improves even more", "Increase retrieval top-k substantially so more fragments are returned per query", "Switch the embedding model to one with a smaller vector dimensionality"], "correct": [0], "explanation": "When the right chunk is usually found but lacks enough surrounding context to be useful, the fix is to give each chunk more room, whether by increasing size or adding overlap, so it stays coherent on its own. Shrinking chunks further compounds the fragmentation that's already causing the complaint. Raising top-k returns more fragments rather than more complete ones, and a smaller embedding dimensionality affects representation capacity, not how much surrounding text a chunk contains."}, {"id": "P-D3-B1-22", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A legal research platform chunks contracts at 4,000 tokens per chunk to minimize the number of stored vectors. Retrieval quality suffers because each large chunk buries the one relevant clause among many unrelated clauses, and the assembled context blows through the token budget after just two or three chunks. What is the best fix?", "options": ["Reduce chunk size (e.g., chunk at the clause or section level) so relevant content isn't diluted by unrelated text and more distinct chunks fit in the context budget", "Increase retrieval top-k so more of the large chunks are included", "Increase the model's context window so more 4,000-token chunks can be included at once", "Add more overlap between the existing 4,000-token chunks"], "correct": [0], "explanation": "When one oversized chunk buries the relevant clause among unrelated content and consumes a disproportionate share of the context budget, reducing chunk size, down to the clause or section level, restores precision and lets more distinct, relevant chunks fit within budget. Raising top-k just includes more of the same overly broad chunks. A larger model context window accommodates more bulk text but doesn't make any individual chunk more focused. Adding overlap to already-oversized chunks increases redundancy without addressing the dilution problem."}, {"id": "P-D3-B1-23", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A pharmaceutical company's regulatory corpus contains regional guidance that sometimes conflicts. A query retrieves two chunks with different dosage guidance: one from a 2023 EU bulletin and one from a 2025 US bulletin. The pipeline currently concatenates both chunks with no labeling. Which context-assembly practices would most improve the reliability of the resulting answer?", "options": ["Attach source and date metadata to each chunk so the model can reason about which guidance is more recent or jurisdictionally applicable", "Deduplicate near-identical chunks so conflicting or redundant content doesn't crowd out other relevant material", "Explicitly signal in the assembled context that the sources may conflict rather than presenting them as if they agree", "Randomly select one of the two chunks and discard the other before the model ever sees either", "Concatenate all retrieved chunks with no source labels so the model isn't biased toward either source"], "correct": [0, 1, 2], "explanation": "Attaching source and date metadata lets the model reason about which guidance is more recent or applicable rather than treating both as equally authoritative; deduplicating near-identical chunks keeps redundant content from crowding out other relevant material; and explicitly signaling that sources may conflict prevents the model from silently picking one or blending them into an unsupported answer. Randomly discarding one source risks throwing away the correct one, and presenting both with no labeling at all is what caused the unreliable answer in the first place, not a fix for it."}, {"id": "P-D3-B1-24", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "easy", "question": "A consumer electronics retailer's product catalog has structured fields (price, category, brand, in-stock flag) and a free-text description field. Customers ask things like 'wireless headphones under $100 with noise cancellation.' Which retrieval design choices best match this data shape?", "options": ["Apply metadata filters (price range, category) to narrow candidates using the structured fields", "Use semantic search over the free-text description field to match phrases like 'noise cancellation'", "Convert every structured field into free text and rely entirely on semantic search across the whole catalog", "Ignore the structured fields entirely since the description field contains most of the relevant words", "Drop the free-text description field from the index and match only on structured fields like brand and category"], "correct": [0, 1], "explanation": "Applying metadata filters on structured fields like price and category narrows candidates precisely on attributes that are exact and structured by nature, while semantic search over the free-text description field is what's needed to match phrases like 'noise cancellation' that don't correspond to a single structured field. Converting every field to free text discards the precision structured filtering already provides. Ignoring the structured fields or dropping the description field each throws away one half of the information this query pattern actually needs."}, {"id": "P-D3-B1-25", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A city government's permitting-fees document was updated last month, but the old version was never removed from the index, only the new one was added. Retrieval now often returns both the old and new fee schedule in the top results for the same query, and the assembled context contains contradictory numbers. What is the root cause and fix?", "options": ["The superseded document was never retired from the index, so both versions compete in retrieval; the fix is to remove or mark outdated documents as superseded when new versions are indexed", "The chunk size is too large and needs to be reduced", "The embedding model is outdated and needs to be replaced", "The retrieval top-k is too low and needs to be increased"], "correct": [0], "explanation": "When an old document is never retired from the index after a replacement is added, both versions remain eligible for retrieval and can both appear in the same result set, which explains the contradictory numbers showing up together. Reducing chunk size doesn't address two full, competing documents both being present in the index. Replacing the embedding model doesn't resolve a version-retirement gap, and raising top-k would only make it more likely both conflicting versions appear together, not less."}, {"id": "P-D3-B1-26", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "An airline's dynamic-pricing support assistant serves fares that change dozens of times per day, but the RAG index is only rebuilt once nightly via a batch job. Customers frequently get confidently wrong current fares. Increasing model quality hasn't helped. What is the best architectural fix?", "options": ["Move from nightly batch re-indexing to event-driven or near-real-time re-indexing triggered whenever fare content changes, matching index freshness to data volatility", "Increase the frequency of the nightly batch job from once a day to once a week", "Upgrade to a more capable model tier so it can better estimate current fares", "Increase the chunk overlap percentage for fare documents"], "correct": [0], "explanation": "When content changes far more often than the index refresh cycle, index-freshness design needs to match that volatility, which means moving to event-driven or near-real-time re-indexing rather than a fixed nightly batch. Running the batch weekly instead of nightly moves in the wrong direction entirely. A more capable model tier doesn't have access to fares that were never re-indexed, and adjusting chunk overlap doesn't change how often the index itself is refreshed."}, {"id": "P-D3-B1-27", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "Customers of a bank type short, ambiguous queries like 'late fee' into a support assistant, which could relate to credit cards, mortgages, or auto loans. Retrieval returns a scattershot mix of chunks from all three product lines, and answers blend unrelated fee schedules. What is the best fix?", "options": ["Rewrite or expand the query (e.g., using conversation context to disambiguate which product line) before running retrieval", "Increase retrieval top-k so chunks from all three product lines are returned and let the model sort it out", "Shorten the chunks further so less irrelevant text is included per chunk", "Remove two of the three product lines from the index to reduce ambiguity"], "correct": [0], "explanation": "Rewriting or expanding an ambiguous short query, for example using conversation context to determine which product line the customer means, resolves the ambiguity before retrieval runs, preventing the scattershot mix of unrelated fee schedules. Raising top-k just returns more chunks from all three product lines rather than narrowing to the right one. Shortening chunks doesn't address which product line is relevant, and removing product lines from the index sacrifices real coverage instead of resolving the ambiguity."}, {"id": "P-D3-B1-28", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An enterprise search team's internal wiki has 50,000 pages. Initial dense retrieval reliably surfaces the right page within its top 50 candidates but rarely ranks it in the top 5 that get passed into the prompt, so the model often doesn't see it. What should be added to the pipeline?", "options": ["Add a reranking step (e.g., a cross-encoder over the retrieved candidates) between initial retrieval and context assembly to reorder candidates by finer-grained relevance before selecting the top few", "Increase the number of chunks initially retrieved from 50 to 500", "Rebuild the entire vector index with a completely different chunking strategy", "Lower the similarity threshold used by the initial dense retrieval step"], "correct": [0], "explanation": "A reranking step between initial retrieval and context assembly re-scores the broader candidate set with a finer-grained relevance model, which is exactly what's needed when the right document is present in the top 50 but not ranked high enough to make the final selection. Retrieving even more initial candidates doesn't fix a ranking problem, it just gives the same imprecise ranking more to sort through. Rebuilding the entire index with new chunking is a much larger change than the ranking problem calls for, and lowering the similarity threshold surfaces more marginal candidates without improving how the good ones are ordered."}, {"id": "P-D3-B1-29", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "Over 18 months, a national pharmacy chain's internal drug-interaction lookup assistant grew from 5,000 to 60,000 ingested documents through continuous ingestion, with no single migration event. Pharmacists increasingly report the assistant confidently cites drug interaction guidance that turns out to be superseded by newer bulletins, even though every bulletin was ingested when published. The Claude model and prompt haven't changed. Which of the following are plausible contributing causes worth investigating?", "options": ["Superseded bulletins were never retired or flagged as outdated when replacement bulletins were ingested, so old and new versions compete in retrieval", "As the corpus grew, the original top-k and similarity threshold were never re-tuned, so relevant newer content is more easily crowded out by a larger pool of similar older content", "Newer bulletins may have been ingested without the same metadata (e.g., publish date, supersession flags) as earlier ones, making date-based filtering unreliable", "The underlying Claude model has drifted and needs periodic retraining to keep up with new drug interactions", "Pharmacists need to be retrained to phrase their questions more precisely"], "correct": [0, 1, 2], "explanation": "If superseded bulletins are never retired or flagged when replacements are ingested, old and new guidance keep competing in retrieval indefinitely, which fits a slow-building pattern rather than a single bad day. If top-k and similarity thresholds were tuned when the corpus was much smaller and never revisited, a larger, denser corpus makes it easier for older, similar content to crowd out the newer relevant bulletin. Inconsistent metadata between older and newer ingested batches would make date-based filtering unreliable exactly when it's needed most. The underlying model doesn't need retraining to reflect newly published bulletins supplied through retrieval, and asking pharmacists to rephrase questions doesn't address a structural indexing gap that built up over 18 months."}, {"id": "P-D3-B1-30", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A SaaS customer support team builds a RAG assistant over two years of past support chat transcripts. Fixed 300-token chunking frequently splits a transcript mid-exchange, separating a customer's problem description from the agent's resolution that appears a few messages later. What is the best chunking approach for this data shape?", "options": ["Chunk along conversational boundaries, such as by turn groups or full support session/thread, so a problem and its resolution stay together", "Keep the fixed 300-token chunking but increase retrieval top-k to compensate", "Chunk by calendar day so all conversations from the same day are grouped together", "Reduce the fixed chunk size to 100 tokens to isolate individual messages"], "correct": [0], "explanation": "Chunking along conversational boundaries, such as full support sessions or coherent turn groups, keeps a customer's problem description together with the resolution that follows, matching the natural unit of this transcript data. Keeping the same fixed-token chunking and compensating with more retrieved chunks still returns fragmented pieces rather than coherent exchanges. Grouping by calendar day mixes many unrelated conversations into one chunk, and shrinking chunk size further fragments individual messages even more."}, {"id": "P-D3-B1-31", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A newly hired architect at a healthcare provider is asked to document the RAG pipeline for the team's onboarding guide. Which sequence correctly describes the stages, in order?", "options": ["Document preparation, then chunking, then indexing, then retrieval at query time, then context assembly into the prompt", "Indexing, then document preparation, then retrieval, then chunking, then context assembly", "Retrieval, then chunking, then document preparation, then indexing, then context assembly", "Context assembly, then document preparation, then chunking, then indexing, then retrieval"], "correct": [0], "explanation": "The pipeline runs document preparation first to produce clean text, then chunking to split it into retrievable units, then indexing to embed and store those units, then retrieval at query time to find the most relevant ones, and finally context assembly to place them into the prompt sent to the model. Any ordering that puts retrieval or context assembly before indexing is not workable, since there would be nothing built yet to retrieve from or assemble."}, {"id": "P-D3-B1-32", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A global manufacturer's support content spans English, German, Japanese, and Portuguese. After switching to a new embedding model chosen for its strong English benchmark scores, retrieval quality for German, Japanese, and Portuguese queries dropped sharply while English queries stayed accurate. The Claude model and prompt are unchanged. What is the root cause?", "options": ["The new embedding model has weaker multilingual coverage than the previous one, so it doesn't represent non-English content as effectively in the vector space, a mismatch between the model choice and the data's actual language shape", "The Claude model itself lost its multilingual reasoning capability", "The chunk size is too large for non-English languages", "The retrieval top-k needs to be increased only for non-English queries"], "correct": [0], "explanation": "Because the Claude model and prompt didn't change, and only non-English retrieval quality dropped after an embedding model swap, the most likely explanation is that the new embedding model represents non-English content less effectively than the previous one, a mismatch between the embedding model's language coverage and the actual multilingual shape of the data. Claude's own reasoning capability doesn't degrade based on which embedding model is used for retrieval, since embeddings and generation are separate components. Chunk size affects how much text is grouped together, not language re
