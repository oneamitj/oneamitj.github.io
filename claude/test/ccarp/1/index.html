presentation quality, and raising top-k for non-English queries doesn't fix vectors that are already poorly positioned in the embedding space."}, {"id": "P-D3-B2-01", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "An online retailer's checkout microservice calls a single, fixed pricing endpoint, `getPrice(sku)`, on every checkout regardless of what else is happening in the conversation: the call is deterministic and always happens at the same pipeline step. The architecture team is deciding whether to wrap this endpoint as an MCP tool for their Claude-based shopping assistant or call it directly from the checkout pipeline's code. Which approach best fits this situation?", "options": ["Wrap the endpoint as an MCP tool so the shopping assistant decides on each turn whether to invoke it", "Build a dedicated pricing subagent that the checkout pipeline consults via agent-to-agent messaging", "Call the REST endpoint directly from the checkout pipeline's deterministic code, since no model judgment is needed to decide when to invoke it", "Replace the endpoint with a CLI command that the checkout pipeline shells out to on each request"], "correct": [2], "explanation": "Because the call happens at the same fixed point on every checkout with no need for the model to decide whether or how to invoke it, calling the endpoint directly keeps the deterministic step deterministic and avoids the extra tool-selection latency of routing it through an agent's reasoning loop. Wrapping it as an MCP tool only pays off when the model must choose among multiple possible actions; here there is only one action, always taken. Standing up a whole subagent for a single fixed lookup is unnecessary overhead, and CLI invocation is suited to human- or pipeline-triggered developer workflows, not a high-volume backend-to-backend call."}, {"id": "P-D3-B2-02", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A code-assistant agent answering questions about a 4,000-file monorepo currently has the entire repository concatenated into its system prompt on every request, adding tens of thousands of tokens and several seconds of latency even when a question is about one specific function. What change would most directly fix this?", "options": ["Move to a model tier with a larger context window so the whole repository fits more comfortably", "Use search and file-listing tools to locate the relevant files first, then load only those into context, instead of loading the whole repository upfront", "Generate one permanent summary of the entire repository and keep that summary in every system prompt", "Split the repository into two smaller fixed bundles and alternate which bundle is loaded each request"], "correct": [1], "explanation": "Switching to progressive discovery (searching or listing files to find what's relevant, then reading only those into context) targets the actual problem, which is that most of the repository is irrelevant to any single narrow question. A larger-context model still pays the token cost and latency of loading files that have nothing to do with the question, treating an architecture problem as a capacity problem. A single static summary trades one monolithic dump for another and risks dropping the specific details a later question needs, and alternating between two fixed bundles still loads far more than most questions require."}, {"id": "P-D3-B2-03", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A support chatbot retrieves the top 3 most relevant chunks from its knowledge base for every query. A teammate proposes raising this to the top 50 chunks so the bot 'never misses relevant context.' What is the most likely consequence of this change, and what would be a better first step?", "options": ["Retrieving 50 chunks will strictly improve every answer's accuracy with no meaningful downside", "Chunk count only affects API cost, not response latency", "The team should upgrade to a more capable model tier instead of changing the retrieval count", "Every response will slow down and the truly relevant chunks risk being buried among mostly irrelevant ones, so retrieval count should be tuned to typical query needs, with expansion only when a specific query needs it"], "correct": [3], "explanation": "Retrieving far more chunks than a typical query needs adds processing time to every request and can bury the passages that actually matter among a much larger pool of irrelevant ones, which is the opposite of the intended effect. This is a retrieval-configuration problem, not a model-capability gap, so switching model tiers doesn't address it. Chunk count affects both processing latency and cost, not cost alone, so tuning the count to match typical needs (with a targeted expansion step for the minority of queries that need more) is the more effective fix than a blanket increase."}, {"id": "P-D3-B2-04", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "Three separate Claude-based products at a company (a sales assistant, a support agent, and a finance analyst) all need to query the same internal CRM, ticketing, and expense systems. Each product team currently maintains its own point-to-point integration code, and error handling is inconsistent from one team to the next. What is the most effective way to consolidate these integrations?", "options": ["Stand up one shared, well-described MCP server per backend system so all three agents reuse the same standardized, centrally maintained integration", "Keep each team's direct REST integration in place, but publish a shared style guide for how the code should be written", "Route all backend calls for all three products through a single hub agent that performs every call on the other agents' behalf via agent-to-agent messaging", "Give each product's users a shared CLI utility they run manually before starting a conversation"], "correct": [0], "explanation": "A shared MCP server per backend system, with clear tool descriptions, lets all three products reuse one standardized, centrally maintained integration instead of three duplicated, inconsistently error-handled ones. A style guide leaves the duplication and inconsistency intact since the integrations remain separate. Funneling every call for three distinct products through one hub agent creates an unnecessary coordination bottleneck where a shared protocol layer would do, and a manually run CLI utility does not fit products where the agent itself needs to make the call as part of an automated conversation."}, {"id": "P-D3-B2-05", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A legal-tech team is building an agent to review an 80-page merger agreement and flag every place the defined term 'Material Adverse Effect' is used inconsistently across the document. Which context strategy is most appropriate for this task?", "options": ["Search for the term one occurrence at a time and evaluate each occurrence in isolation", "Summarize the agreement into a condensed outline first, then check only the outline for the term", "Load the full agreement into context at once, since verifying consistent usage across the whole document requires comparing every occurrence together", "Retrieve only the sections whose headings explicitly mention 'Material Adverse Effect'"], "correct": [2], "explanation": "Checking for consistent usage of a defined term across an entire document is exactly the kind of task where loading the full agreement at once is justified: the agent needs every occurrence visible together to compare them, and piecemeal retrieval risks missing an inconsistency it never thought to search for. Evaluating each occurrence in isolation removes the very comparison the task requires. A condensed outline can drop exact instances of the term, and heading-based retrieval misses occurrences that appear in clauses whose headings don't mention the term at all."}, {"id": "P-D3-B2-06", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A fraud-detection pipeline runs the same expensive, five-source cross-verification sequence on every transaction, including routine low-value purchases, which makes checkout feel sluggish for the vast majority of legitimate customers. Which two configuration changes would most effectively balance accuracy and latency here? (Select two.)", "options": ["Remove the cross-verification sequence entirely so checkout is fast for everyone", "Run a fast, lightweight risk-scoring pass on every transaction, and reserve the five-source cross-verification sequence for transactions that pass flags as higher-risk or ambiguous", "Keep running the full sequence on every transaction, but cache the results for 24 hours to reduce repeated latency", "Set a bounded timeout on the five-source sequence so one slow data source can't stall a review indefinitely, escalating to manual review if the timeout is hit", "Move the cross-verification sequence to a background job that finishes after checkout completes"], "correct": [1, 3], "explanation": "Tiering the expensive check so it only runs on transactions a fast first pass flags as risky keeps typical-case latency low while preserving thorough review where it matters most, and bounding the expensive sequence's worst-case time with a timeout-and-escalate path prevents one slow dependency from stalling every review it touches. Removing the sequence trades away the fraud protection it provides rather than applying it proportionately. Caching does not help because each transaction is a distinct decision, not a repeated lookup, and moving the check to run after checkout completes defeats its purpose as a gate on the transaction."}, {"id": "P-D3-B2-07", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A platform engineering team wants developers to trigger an automated code-review pass from their own terminal, and also wants the same review to run inside a CI workflow on every pull request, with the pipeline step parsing the result to decide whether to block the merge. Which integration mechanism best fits both needs?", "options": ["Wrap the review logic as an MCP server that a separate orchestrating agent calls on every pull request", "Stand up a REST API service that the CI pipeline polls until the review status changes", "Configure agent-to-agent messaging so a review agent hands its findings to a separate merge agent outside the pipeline's normal step sequence", "Invoke the review in non-interactive mode from both the terminal and the CI step, requesting structured output the pipeline can parse to gate the merge"], "correct": [3], "explanation": "A non-interactive, scriptable invocation that both a developer's terminal and a CI runner can call directly, returning structured output the pipeline step parses, matches exactly how both consumers want to trigger and read the result. Standing up an MCP server behind another orchestrating agent, or a REST service the pipeline has to poll, adds a standing service and extra indirection that a direct CLI-style invocation embedded in the pipeline step doesn't need. Handing results between two separate agents outside the pipeline's normal sequence adds coordination complexity the CI system already provides natively."}, {"id": "P-D3-B2-08", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A support agent's system prompt currently includes a customer's full 3-year interaction history (often 50 or more prior tickets) for every new conversation, even though roughly 90% of incoming tickets are simple, first-contact questions that never reference prior history. What is the most effective change?", "options": ["Keep loading the full history every time, but run it through a smaller model first to compress it", "Fetch the full history only when the conversation indicates it's actually needed, defaulting to a lean context for the common simple case", "Remove customer history from context entirely so every conversation starts lean", "Cache the full interaction history once per customer so it never needs to be fetched again"], "correct": [1], "explanation": "Fetching the full history on demand (only when the conversation signals it's actually relevant, such as a reference to a prior issue) keeps the common simple case lean while still making the history available for the minority of cases that need it. Pre-compressing the history with a smaller model still pays a retrieval and processing cost on every conversation, including the 90% that never use it. Removing history entirely fixes the common case but breaks the cases that do need it, and a permanent one-time cache still loads on every conversation regardless of need and goes stale as new tickets accumulate."}, {"id": "P-D3-B2-09", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A pipeline chains five separate MCP tool calls in strict sequence to answer one user question, and each call incurs its own network round trip, so total response time is now dominated by cumulative network latency rather than model reasoning time. Two of the five calls are independent of each other and neither needs the other's output; the remaining three genuinely depend on each other's results in sequence. What is the most effective way to reduce latency without sacrificing accuracy?", "options": ["Consolidate all five calls into a single combined tool call regardless of their dependencies", "Switch to a faster model tier to shorten the reasoning time between calls", "Execute the two independent calls in parallel while keeping the three genuinely dependent calls sequential", "Drop two of the five calls to reduce the total number of round trips"], "correct": [2], "explanation": "Running the two calls that don't depend on each other in parallel cuts wall-clock latency while leaving the three genuinely sequential calls in their required order, so the information gathered and the accuracy of the answer don't change. Forcing all five into one combined call ignores that three of them have real sequential dependencies and risks silently changing what gets computed. The bottleneck described is network round-trip time between tool calls, not model reasoning time, so a faster model tier doesn't address the actual cause, and dropping calls that are needed for the answer trades away accuracy rather than fixing how the needed calls execute."}, {"id": "P-D3-B2-10", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A logistics company's coordinator agent needs to delegate an open-ended task (investigate why shipment SH-4521 is delayed and produce a root-cause report) to a specialized routing-and-tracking capability that must itself plan multiple steps, query several carrier systems, and reason about which to check first as it learns more. What is the most appropriate integration mechanism for this delegation?", "options": ["Expose the routing-and-tracking logic as a single MCP tool that returns a completed root-cause report in one call", "Invoke the routing-and-tracking capability as a subagent, agent-to-agent, with the investigation context passed explicitly in its prompt", "Have the coordinator call each carrier's REST API directly itself and skip the specialized capability", "Give the coordinator a CLI script that runs a fixed sequence of carrier checks in a predetermined order"], "correct": [1], "explanation": "Because the task requires independent multi-step planning and reasoning that adapts as the investigation unfolds, treating the routing-and-tracking capability as a subagent invoked agent-to-agent (with context passed explicitly, since subagents don't inherit the coordinator's history automatically) fits the open-ended nature of the work. Collapsing that into a single MCP tool call forces an adaptive, multi-step investigation into one deterministic function signature that can't change course mid-investigation. Having the coordinator query every carrier itself discards the specialized agent's isolated expertise, and a fixed CLI script can't reason about which carrier to check first or adapt as it learns more."}, {"id": "P-D3-B2-11", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A compliance agent must determine whether a proposed product change violates any applicable financial regulation by checking it against several overlapping standards documents. The standards corpus is large but bounded (a few hundred pages total), and missing a relevant obligation buried in a rarely-cited section could expose the company to real regulatory risk. How should the architect weigh progressive discovery against monolithic context for this task?", "options": ["Favor progressive discovery keyed only on the literal terms used in the proposed product change, since it minimizes latency", "Favor progressive discovery because the corpus is bounded, and a bounded corpus always favors query-driven retrieval", "Alternate randomly between progressive and monolithic strategies from one request to the next to average out latency and completeness", "Favor a more monolithic approach that loads the great majority of the relevant standards corpus, despite the added latency, because the cost of silently missing an obligation outweighs the latency saved by query-driven retrieval"], "correct": [3], "explanation": "When the downside of missing something the agent didn't think to search for is a real compliance exposure, the added latency of loading most of a bounded, manageable-sized corpus is the more defensible trade, since a missed obligation is far more costly here than a slower response. A purely literal keyword search is exactly the pattern most likely to miss an obligation phrased differently or reached only through a cross-reference. A corpus being bounded makes monolithic loading feasible, but boundedness alone doesn't justify progressive discovery when the cost of a miss is what actually matters, and randomizing the strategy ignores that cost entirely."}, {"id": "P-D3-B2-12", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An application embedded in a customer portal sends the same roughly 6,000-token system prompt and tool definitions on every request to its Claude-based agent. The team wants to reduce both latency and per-request cost without reducing what the agent is able to do. Which configuration change most directly addresses this?", "options": ["Shorten the system prompt by removing tool definitions the agent uses only occasionally", "Place the static system prompt and tool definitions first in the request and enable prompt caching so the repeated prefix is reused instead of reprocessed every time", "Move to a smaller, cheaper model tier to offset the per-request token cost", "Batch multiple customers' separate conversations into a single request to amortize the system prompt across them"], "correct": [1], "explanation": "Ordering the static content first and enabling prompt caching lets the repeated prefix be reused across requests instead of reprocessed from scratch each time, cutting both latency and cost while leaving every tool and instruction in place. Removing tool definitions reduces the agent's capability, which the team explicitly wants to avoid. Switching to a cheaper model lowers per-token cost but does nothing about the redundant reprocessing of the same 6,000 tokens, and merging unrelated customers' conversations into one request breaks conversational isolation rather than legitimately sharing a cached prefix."}, {"id": "P-D3-B2-13", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A healthcare software vendor's only supported integration surface for its lab-results system is a command-line utility that operations staff already use for batch data pulls; the vendor offers no public API or SDK. What is the most pragmatic way for an internal Claude Code-based workflow to integrate with this system today?", "options": ["Wait to build any integration until the vendor ships a REST API", "Build a custom MCP server that reimplements the lab-results system's business logic from scratch", "Have the workflow invoke the vendor's CLI utility as a subprocess and parse its output", "Have a second agent negotiate directly with the lab-results system through agent-to-agent messaging"], "correct": [2], "explanation": "Invoking the vendor's CLI utility as a subprocess and parsing its output uses the integration surface that is actually available today rather than one that doesn't exist yet. Waiting for a REST API blocks progress on a workflow that could already work through the CLI. Reimplementing the vendor's business logic from scratch to avoid using their supported tool is a large, unnecessary undertaking, and the lab-results system is not itself an agent, so there is no agent-to-agent interface for it to participate in."}, {"id": "P-D3-B2-14", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "An MCP server exposes a company's internal wiki as resources: lightweight metadata such as titles, summaries, and IDs can be listed cheaply, and the full text of a page is only fetched when the agent requests that specific resource by ID. What benefit does this provide compared to loading every wiki page's full content into context upfront?", "options": ["It lets the agent discover what's available cheaply and fetch only the specific pages it actually needs, avoiding the cost of loading irrelevant pages on every query", "It guarantees the agent will never miss relevant information, since resources are inherently more accurate than tools", "It removes the need for the agent to make any further calls once it has listed the catalog", "It allows wiki content the agent fetches to bypass the model's context window limits entirely"], "correct": [0], "explanation": "Exposing a lightweight catalog first lets the agent discover what exists cheaply and then pull the full content of only the specific pages it needs, instead of paying the token cost of every page on every query. It doesn't guarantee completeness (the agent can still fail to request a page that was actually relevant), so it reduces waste rather than eliminating the risk of a miss. The agent still needs to make a follow-up call to fetch a specific resource's content, and whatever content it does fetch still counts against the context window; the catalog reduces what's loaded, it doesn't create unlimited room."}, {"id": "P-D3-B2-15", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "A compliance-document summarization job processes a large backlog overnight with analysts reviewing results the next morning, so no one is waiting on an individual result in real time. A separate customer-facing chat feature answers questions live with a two-second target response time. Both currently call the Claude API synchronously, one request at a time. Which two statements about configuring these two workloads are correct? (Select two.)", "options": ["The overnight backlog job is a good candidate for a batch-processing approach, since it is latency-tolerant and no individual result is time-critical", "The live chat feature should remain on synchronous, real-time calls, since a batch-style approach offers no latency guarantee and can take substantially longer to return results", "Both workloads should move to a batch-processing approach to maximize cost savings across the system", "The backlog job should increase the number of parallel synchronous requests it fires at once so it finishes faster overnight", "The live chat feature would benefit from a batch-processing approach's cost savings with no real downside, since users won't notice the difference"], "correct": [0, 1], "explanation": "The overnight job's defining feature (no one waiting on any individual result) is exactly what makes it a good fit for a latency-tolerant, non-blocking processing approach that trades a guaranteed turnaround time for substantial cost savings. The live chat feature has a real-time SLA that a no-latency-guarantee approach would routinely violate, so it needs to stay on synchronous calls. Moving both workloads over ignores that the chat feature cannot tolerate the lack of a latency guarantee, firing more parallel synchronous requests doesn't capture the batch-style discount and isn't needed since speed isn't the actual goal overnight, and users waiting live for a response absolutely would notice a multi-hour delay."}, {"id": "P-D3-B2-16", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "An architecture team is deciding whether a new internal capability should be exposed to their Claude agents as an MCP tool or called directly via REST API from deterministic backend code. Which factors should most influence choosing MCP over a direct REST call? (Select all that apply.)", "options": ["The capability needs to be dynamically selected by the model at runtime from among several possible actions based on the current conversation state", "The capability is invoked at the exact same point in a fixed, deterministic pipeline on every single request regardless of context", "Multiple different agents and products across the organization need to reuse the same integration through one standardized interface", "The capability sits on a latency-critical hot path where no model reasoning is needed to decide whether to call it", "The capability should be discoverable by the model from a natural-language description rather than hardcoded into pipeline logic"], "correct": [0, 2, 4], "explanation": "MCP earns its overhead when the model must choose among several possible actions at runtime, when the same integration needs to be reused consistently across multiple agents or products, and when discoverability through a natural-language tool description is the point. A capability invoked identically at a fixed point on every request doesn't need the model to decide anything, so routing it through an agent's tool-selection step only adds latency without adding value. Similarly, a latency-critical step where no reasoning is needed is better served by calling the backend directly rather than paying for an extra decision the model doesn't actually need to make."}, {"id": "P-D3-B2-17", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A team is deciding whether a new feature's context strategy should lean toward progressive discovery (fetch data as needed, step by step) or monolithic context (load the full relevant dataset upfront). Which of the following characteristics make progressive discovery the better fit? (Select all that apply.)", "options": ["Most individual queries only need a small, unpredictable subset of a very large corpus, and which subset is needed varies from request to request", "The task requires cross-referencing many parts of a bounded document at once to check internal consistency", "The product has a strict low-latency requirement for the common case, and most requests don't need the full dataset to answer correctly", "Missing a piece of information the agent didn't think to search for would create serious downstream risk", "New data is added to the corpus frequently, so a single static snapshot embedded in context risks going stale"], "correct": [0, 2, 4], "explanation": "Progressive discovery fits best when only a small, unpredictable slice of a large corpus is relevant to any given query, when a strict latency budget makes paying for the full dataset on every request too costly, and when the underlying data changes often enough that an embedded static snapshot would go stale. Needing to cross-reference many parts of a bounded document at once is the classic case for loading more of it upfront, not fetching piecemeal, and when a missed piece of information carries serious downstream risk, that risk argues for more complete upfront loading rather than query-driven retrieval that might never surface it."}, {"id": "P-D3-B2-18", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "An architect is justifying a decision to keep a legal-document Q&A agent's retrieval count (top-k) higher than a simpler internal FAQ bot's retrieval count, even though the higher setting adds measurable latency. Which of the following are valid justifications for that decision? (Select all that apply.)", "options": ["Legal questions more often require synthesizing information spread across multiple clauses or sections, so a narrow top-k is more likely to omit a relevant passage", "A higher top-k is always the safer default for every feature, so it should be applied everywhere rather than just this agent", "The cost of a legal answer that confidently omits a relevant clause is materially higher than the cost of a slower response, given the downstream risk of an incorrect legal conclusion", "Retrieval count has no real effect on response latency, so raising it for the legal agent costs nothing", "The FAQ bot's questions are typically answerable from a single, self-contained passage, so its lower top-k rarely omits relevant material"], "correct": [0, 2, 4], "explanation": "The justification holds because legal questions often need synthesis across multiple clauses where a narrow top-k risks an omission, because an incorrect legal conclusion is a materially worse outcome than a few extra seconds of latency, and because the FAQ bot's simpler, self-contained questions genuinely don't need the same retrieval depth. Claiming a higher top-k is universally the safer default contradicts the very point of the comparison, which is that the right setting depends on the task. And the claim that retrieval count doesn't affect latency directly contradicts the scenario's own premise that the higher setting measurably adds latency."}, {"id": "P-D3-B2-19", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A shop-floor agent needs to check current inventory levels from an ERP system before recommending a reorder. The check happens on nearly every conversation turn, the ERP call itself is a single deterministic query-and-response, but which specific field gets queried depends on what the operator is asking about. Which integration approach best fits?", "options": ["Hardcode a fixed sequence of REST calls that queries every field on every turn regardless of what was asked", "Stand up a dedicated inventory subagent that reasons independently about which ERP queries to run", "Require operators to run a command themselves to check inventory before each conversation turn", "Expose the inventory lookup as a single, well-described MCP tool the agent calls with the relevant parameters each turn"], "correct": [3], "explanation": "A single, well-described MCP tool lets the model decide which item or field to query based on what the operator actually asked, while the underlying call itself stays a simple deterministic lookup once the parameters are chosen. Querying every field on every turn wastes latency retrieving data nobody asked about. Standing up a separate reasoning subagent is unnecessary overhead for what is a single deterministic lookup once the parameters are known, and pushing the check onto the operator to run manually defeats the purpose of having the assistant handle it."}, {"id": "P-D3-B2-20", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A data-analyst agent lets users ask ad hoc questions against a database with over 600 tables. One proposal embeds a full schema dump of all 600 tables in the system prompt; another gives the agent a tool to look up a specific table's schema by name plus a tool to search for tables by keyword. Which approach scales better as the schema grows, and why?", "options": ["The full schema dump, because having every table definition available guarantees the agent never needs a follow-up call", "The lookup-and-search tool approach, because it lets the agent progressively discover only the tables relevant to a given question instead of paying the token cost of an ever-growing static dump on every request", "Neither approach scales, so the agent should be restricted to five pre-approved fixed queries instead", "The full schema dump, refreshed once per day instead of on every request, to reduce load"], "correct": [1], "explanation": "Letting the agent look up or search for only the tables relevant to a specific question keeps token usage proportional to what each query actually needs, instead of scaling linearly with total schema size on every single request. The full dump does reduce follow-up calls, but it does so by paying an ever-growing cost on every request and by burying the relevant tables among hundreds of irrelevant ones, which itself raises the odds of the agent picking the wrong table. Restricting the agent to a handful of fixed queries abandons the ad hoc capability the product requires, and refreshing the dump daily addresses staleness but not the core problem of dumping 600 tables into every request."}, {"id": "P-D3-B2-21", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A code-review agent currently returns findings after a single pass over a pull request. The team is considering adding a second, independent verification pass (with no memory of the first pass's reasoning) that cross-checks the first pass's findings before results are posted, roughly doubling response time. For which situation is this additional pass most clearly worth the added latency?", "options": ["Reviewing changes to security-sensitive or production-critical code, where a missed defect is costly and a second independent pass meaningfully reduces the chance that one pass's blind spot goes uncaught", "Reviewing routine documentation-only pull requests with no functional code changes", "Every pull request regardless of content, to keep the review process uniform and simple", "Only pull requests submitted outside business hours, since latency matters less when no one is actively waiting"], "correct": [0], "explanation": "The extra pass is worth its latency cost precisely where a missed defect is expensive, such as security-sensitive or production-critical code, because independent verification catches blind spots a single pass might carry through uncorrected. Routine documentation-only changes carry little downside from a missed issue, so doubling latency there isn't proportionate to the risk. Applying it uniformly to every pull request pays that cost even where the risk doesn't justify it, and the time of day a pull request happens to be submitted has no bearing on how much is actually at stake in the change."}, {"id": "P-D3-B2-22", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A financial-services firm's fraud-review agent sometimes needs a second opinion from a separate anti-money-laundering agent that maintains its own case history and applies its own multi-step reasoning to flagged transactions. Leadership wants both agents' reasoning to stay observable and auditable by a central compliance dashboard, rather than having the two agents exchange messages invisibly. What is the best way to structure this integration?", "options": ["Let the two agents message each other directly with no coordinator, since both are Claude-based and can share context automatically", "Merge both agents into a single agent with one combined system prompt covering both roles", "Route the interaction through a coordinator that explicitly passes the relevant case context to the anti-money-laundering agent and receives its response back, rather than letting the two agents communicate peer-to-peer", "Replace the anti-money-laundering agent with a plain REST endpoint that returns a fraud score with no reasoning trace"], "correct": [2], "explanation": "Routing the exchange through a coordinator that explicitly passes context and receives the response keeps both agents' reasoning visible to a central point, satisfying the observability and audit requirement leadership actually asked for. Direct peer-to-peer messaging is not observable in the same way, and subagents do not automatically inherit each other's context, so an unmediated exchange also risks losing information neither agent knows to ask for. Merging both roles into one agent muddies the audit trail between the two domains and bloats context with rules irrelevant to most requests, and a scoreless REST endpoint discards the multi-step reasoning the anti-money-laundering review is valued for."}, {"id": "P-D3-B2-23", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A team switched their documentation agent from loading an entire product manual into context on every request to a progressive-discovery strategy using a search tool. Latency and cost dropped as expected, but a new problem appeared: for questions that require synthesizing guidance scattered across several unrelated sections (such as a full cross-product data-retention policy), the agent sometimes gives an incomplete answer because its initial search doesn't surface every relevant section. What is the best way to address this without giving up most of the latency benefit progressive discovery provided?", "options": ["Revert entirely back to loading the full manual into context for every question, regardless of scope", "Keep progressive discovery as the default, but have the agent issue a broader follow-up search when its draft answer would otherwise rest on only a handful of retrieved sections for a question that clearly spans multiple topics", "Reduce the search tool's result count so individual responses return faster", "Fine-tune a new model on the product manual so it memorizes the content instead of retrieving it"], "correct": [1], "explanation": "Keeping progressive discovery as the default but adding an adaptive, broader follow-up search for the specific case where a question spans multiple topics and the initial retrieval looks thin preserves the latency benefit for the majority of narrow questions while directly targeting the failure mode that only affects broad, scattered questions. Reverting entirely back to a full manual load gives up that benefit for every question to fix a problem that only affects some of them. Reducing the result count makes the completeness problem worse, and fine-tuning a model to memorize a manual that keeps changing is a large, unrelated investment that doesn't reliably fix a retrieval-scope issue and introduces its own staleness risk."}, {"id": "P-D3-B2-24", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A team configured their MCP client to retry every failed tool call up to 10 times with no delay between attempts, reasoning that more retries can only help reliability. In production, one failing external service now causes every affected request to hang for a long time as it burns through 10 rapid-fire retries before finally failing, dragging down average latency far more than the occasional genuine transient error would justify. What is the most effective fix?", "options": ["Distinguish transient errors, which are worth a small number of retries, from non-retryable failures such as validation or permission errors, which should fail fast instead of being retried the same number of times", "Increase the retry count further so transient failures are even less likely to slip through", "Remove retries entirely so every failure returns immediately", "Switch to a different external service provider"], "correct": [0], "explanation": "Distinguishing retryable, transient failures from non-retryable ones like validation or permission errors (and failing fast on the latter instead of burning through the same fixed retry budget) directly fixes the undifferentiated policy that turns any failure into a long hang. Increasing the retry count further makes the same problem worse for every failing request. Removing retries entirely throws away the real benefit they provide for genuinely transient errors, and swapping providers treats the symptom of one flaky dependency rather than the retry policy that mishandles every kind of failure the same way."}, {"id": "P-D3-B2-25", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A DevOps team wants on-call engineers to trigger a 'summarize this production incident' workflow ad hoc from their own laptops during a rotation, with no other service needing to call it programmatically. Which integration mechanism is most appropriate?", "options": ["A command run locally in non-interactive mode with structured output, since the consumer is a human at a terminal rather than another networked service", "An MCP server that other agents must call on the engineer's behalf", "A REST API the on-call engineer curls manually with a hand-built JSON payload", "An agent-to-agent handoff between the incident workflow and a ticketing agent that runs without the engineer's involvement"], "correct": [0], "explanation": "Since a human at a terminal is the direct consumer and nothing else needs to call this programmatically, a locally run, non-interactive command with structured output matches the actual usage pattern without adding infrastructure nobody needs. Routing the request through an MCP server that other agents call on the engineer's behalf adds indirection for a task a human triggers and reads directly. A REST API the engineer has to curl by hand offers worse ergonomics with no offsetting benefit, since there is no other consumer to justify a network service, and an unattended agent-to-agent handoff removes the engineer from a workflow they explicitly want to trigger themselves."}, {"id": "P-D3-B2-26", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A customer success platform runs two Claude-based features against the same knowledge base: a live chat widget where users expect a reply within about two seconds, and an overnight batch job that audits whether support macros still match current policy. What is the most defensible context-strategy decision across these two features?", "options": ["Use the same full, monolithic context load for both features, since a consistent approach simplifies maintenance", "Use progressive, targeted retrieval for the live chat widget to protect its latency budget, and a more complete context load for the overnight audit, which has no comparable latency constraint and benefits from thoroughness", "Use progressive discovery for both features, since it is cheaper regardless of the task", "Use a full context load for the chat widget and progressive discovery for the overnight audit"], "correct": [1], "explanation": "Matching each feature's context strategy to its actual constraints (lean, targeted retrieval where a strict latency budget applies, and a fuller load where thoroughness matters more than speed) respects what each feature actually needs. Using the identical monolithic approach for both ignores that the chat widget has a hard latency budget the audit doesn't share, and using progressive discovery everywhere gives up completeness on the audit job even though it has no latency constraint to protect. Reversing the two strategies gets the trade-off backwards, since the chat widget is the one under time pressure and the audit is the one that can absorb slower, more thorough processing."}, {"id": "P-D3-B2-27", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A team is deciding whether a document-generation agent should stream its output token-by-token to the UI as it's produced, or wait and display the complete response only after an automated compliance filter has scanned the full text for prohibited content. Which factor should most directly decide this configuration?", "options": ["Whichever behavior is the client library's default, since defaults reflect best practice for every use case", "Whether the compliance filter must validate the complete output before any of it is safe to show the user", "Always stream, since faster perceived response time is the top priority for every feature", "Always wait for the full response, since it is the simpler implementation to build"], "correct": [1], "explanation": "Whether the filter needs the complete text before anything can safely be shown is the actual requirement driving this decision: if so, waiting for the full response is justified despite the slower perceived latency, because showing unvalidated partial output isn't safe. A library default isn't a substitute for evaluating this feature's specific safety requirement. Streaming for the sake of perceived speed ignores that partial, unfiltered content could be non-compliant, and choosing to always wait purely for implementation simplicity, without regard to whether validation actually requires it, isn't a reasoned basis for the decision either."}, {"id": "P-D3-B2-28", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "An architecture review flags that a customer-facing agent has a single generic MCP tool, `run_operation`, that accepts an arbitrary operation name and a free-form JSON payload, covering dozens of unrelated backend actions (refunds, address changes, account closure) behind one interface. Which two problems does this design create? (Select two.)", "options": ["It collapses dozens of distinct actions behind one generically named tool and a free-form payload, removing the differentiated, specific tool descriptions the model relies on to choose and use tools correctly", "Structured, action-specific error handling that distinguishes validation, permission, and transient failures becomes much harder when every action shares one generic tool signature instead of its own contract", "The agent becomes completely unable to reach the backend system until the tool is split apart", "Response latency necessarily increases, because a single shared tool always executes slower than many small tools would", "It becomes impossible to log which specific operation was requested for later review"], "correct": [0, 1], "explanation": "Collapsing many distinct actions into one generically described tool strips away the differentiated, specific descriptions the model relies on as its primary signal for selecting and using the right tool correctly, and it makes it much harder to return structured, action-specific errors that distinguish validation, permission, and transient failures when every action shares the same generic contract. The tool still functions end to end, so the agent is not completely unable to reach the backend: this is a selection-quality and error-handling problem, not a total outage. Execution latency isn't determined by how many actions share one tool signature, and the operation name is still present in the payload, so logging which operation was requested remains possible even though the design is otherwise a poor fit."}, {"id": "P-D3-B2-29", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A new engineer proposes always loading the maximum possible context for every agent request 'just to be safe,' reasoning that more information can only help the model give a better answer. What is the main flaw in this reasoning?", "options": ["There is no real flaw; maximum context is always the safest, most accurate choice regardless of the query", "Larger contexts always exceed the model's context window and simply fail outright", "The only downside of extra context is dollar cost, since token pricing is the sole consideration", "Loading far more context than a query needs adds latency and cost on every request, and can bury the relevant details in the middle where they receive less attention, making the useful information harder to use effectively"], "correct": [3], "explanation": "Extra context is not free: it adds latency and cost to every request, and when the added material is mostly irrelevant, it can dilute attention on the details that actually matter rather than helping, since content in the middle of a large context tends to be attended to less than content at the beginning or end. This directly contradicts the claim that more context can only help. It's an overstatement to say large contexts always fail outright (the more common and pervasive problem is degraded quality and added cost), and framing the only downside as dollar cost ignores the latency and attention-dilution costs entirely."}, {"id": "P-D3-B2-30", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "medium", "question": "A solution architect's design doc for a new integration proposes: a small top-k retrieval for the common case with a second, broader retrieval triggered only when the model's first answer looks under-supported; prompt caching for the static portions of the prompt; and a batch-processing approach for a nightly reconciliation job. Which of the following correctly describe why these are sound, defensible choices? (Select all that apply.)", "options": ["The tiered retrieval approach keeps typical-case latency low while still allowing extra effort for the harder cases most likely to need it, instead of paying the broader retrieval's cost on every request", "Enabling prompt caching for the static portions of the prompt cuts latency and cost on repeated requests without removing any content the agent has access to", "Using a batch-processing approach for the nightly reconciliation job takes advantage of its cost savings precisely because that job has no one waiting on a real-time response", "All four choices should also be applied to the live customer-chat feature, since the same configuration is always optimal across every feature in the product", "The tiered retrieval approach guarantees the agent will never produce an under-supported answer, which is why the broader retrieval step is unneeded in practice"], "correct": [0, 1, 2], "explanation": "Each of the three design choices is defensible on its own terms: tiering retrieval effort to the difficulty of the case keeps the common path fast while still reaching for more when it's likely needed, caching the static prefix removes redundant reprocessing without cutting any content the agent can use, and a batch-processing approach captures real savings specifically because the reconciliation job has no live user waiting on it. Applying the same configuration everywhere contradicts the very tiering logic being justified, since a live chat feature cannot absorb batch-style delays or an always-broad retrieval without breaking its latency requirement. And the broader retrieval step is a mitigation for the under-supported case, not a guarantee against it: if it were unnecessary, the design wouldn't include it at all."}, {"id": "P-D3-B2-31", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A travel-booking company's identity-verification step calls a third-party KYC (know-your-customer) vendor's REST API, and this check must run on literally every booking regardless of what the customer is asking about. The team is debating whether to keep calling the vendor's API directly from backend orchestration code, or expose it as an MCP tool to their booking agent. Which approach best fits, and why?", "options": ["Call the KYC vendor's REST API directly from the orchestration code outside the agent's tool-calling loop, since the check is unconditional on every booking and doesn't need the model's judgment to decide whether to invoke it", "Expose it as an MCP tool and rely on the system prompt to instruct the agent to always call the KYC check first", "Build a dedicated KYC subagent that the booking agent consults via agent-to-agent messaging on every request", "Have staff run a command to verify identity manually before each booking conversation begins"], "correct": [0], "explanation": "Because the check is unconditional (it must happen on every single booking with no judgment call about whether to invoke it), calling the vendor's API directly from orchestration code guarantees it always runs, rather than depending on the model to decide to call it. Relying on a system-prompt instruction turns a compliance-critical, universal step into a probabilistic behavior the model could occasionally skip, which is the wrong trade for something that must never be skipped. A dedicated subagent adds a second reasoning loop's overhead to a step that only ever fetches one deterministic outcome, and a manual staff step defeats the purpose of an automated, unconditional check built into the booking flow."}, {"id": "P-D3-B2-32", "cert": "CCAR-P", "domain": "Integration", "type": "multiple", "difficulty": "hard", "question": "An architect is documenting the trade-offs of progressive discovery versus monolithic context for a new team. Which of the following statements correctly describe this trade-off? (Select all that apply.)", "options": ["Progressive discovery generally lowers the latency and token cost of the common, narrow query, at the expense of extra round trips and a risk of missing information the agent didn't know to look for", "Monolithic context reduces the risk of missing scattered or non-obviously-relevant information, but pays for that benefit with higher upfront latency and cost even on narrow queries", "The better default for a given feature depends on the query pattern and the cost of a miss, not on a universal rule that one approach is always superior", "Progressive discovery is strictly more accurate than monolithic context in every case, since it lets the agent choose exactly what it needs", "Monolithic context eliminates the need for the agent to ever make a follow-up tool call, regardless of the task"], "correct": [0, 1, 2], "explanation": "The accurate framing is a genuine trade-off: progressive discovery typically saves latency and cost on the common narrow query but carries extra round trips and a real risk of missing something unsearched-for, monolithic context reduces that miss risk but pays a latency and cost premium even when a query didn't need the full picture, and the right default depends on the specific query pattern and how costly a miss would be rather than a universal rule. Claiming progressive discovery is strictly more accurate in every case ignores exactly the miss risk described in the trade-off itself. And monolithic context does not guarantee an agent will never need a follow-up call: the loaded context might still be incomplete relative to some other source, so that claim overstates the benefit."}, {"id": "P-D3-B3-01", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A platform team built a coordinator agent for an internal operations assistant. The coordinator currently has 25 tools registered, spanning HR lookups, deployment triggers, financial reporting, and incident management, and by default every subagent it spawns inherits the entire tool list whether or not the subagent's task needs it. A security review flags this as a capability-bloat risk. What is the most effective change to make?", "options": ["Explicitly scope each subagent's allowed tools to only the subset its specific task requires, rather than inheriting the coordinator's full list", "Leave the tool list as-is but add a system-prompt section describing when each of the 25 tools should and should not be used", "Combine the 25 tools into a single generic \"execute_action\" tool that accepts a free-text description of the desired action", "Upgrade the coordinator and all subagents to a higher-capability model tier so tool selection improves despite the larger list"], "correct": [0], "explanation": "Restricting each subagent's available tools to only what its task role needs is the direct fix for capability bloat and follows least privilege, and it also keeps tool selection accurate since the agent isn't choosing among tools irrelevant to its job. A larger model does not fix an architectural over-provisioning problem and adds cost without addressing the root cause. Detailed prompt guidance about 25 tools is probabilistic and still leaves every dangerous tool reachable if the model misreads the instructions. Collapsing distinct, well-scoped tools into one free-text \"do anything\" tool removes the safety benefit of purpose-built tools and makes permissioning and auditing harder, not easier."}, {"id": "P-D3-B3-02", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A team's project-level .mcp.json file, which is committed to the shared repository, contains a vendor API key written directly as a plaintext string so that every teammate's Claude Code session can authenticate to the vendor's MCP server. A new engineer notices the key is visible to anyone with read access to the repository. What should the team do?", "options": ["Reference the key through environment-variable expansion in the shared configuration file, with the actual value supplied outside version control", "Encrypt the whole repository at rest so the key is unreadable to outside attackers", "Add a comment above the key in the file warning teammates not to share it outside the company", "Move the entire .mcp.json file into a private branch that is never merged into the main branch"], "correct": [0], "explanation": "Project-level MCP configuration supports environment-variable expansion specifically so secrets can be referenced without being committed in plaintext, which keeps the shared, version-controlled file safe while still letting every teammate's agent authenticate. A warning comment does not stop the key from being readable by anyone with repo access. Hiding the file in an unmerged branch still leaves the plaintext key sitting in that branch's history and defeats the purpose of a shared config. Encrypting the whole repository at rest protects against a different threat, such as disk theft, and does nothing about the key being visible in plaintext to every developer who clones and reads the file."}, {"id": "P-D3-B3-03", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "An enterprise support assistant's monitoring dashboard reports a 98% overall task success rate, and leadership considers the rollout healthy. A deeper analysis by the architecture team finds that for one customer segment using a specific legacy integration, the success rate is actually only 60%, a gap the blended, org-wide number completely hides. What should the monitoring strategy change to?", "options": ["Report the overall success rate only to leadership and keep the segment-level detail internal to engineering", "Recompute the same overall success rate more frequently, such as hourly instead of daily", "Track and alert on success rate broken out per segment and integration, in addition to the overall aggregate figure", "Replace the success-rate metric with the model's self-reported confidence for each conversation"], "correct": [2], "explanation": "A single blended metric can hide a serious failure concentrated in one segment, so the fix is to add per-segment, stratified monitoring alongside the aggregate so the 60% failure rate becomes visible and actionable. Recomputing the same aggregate number more often doesn't reveal the segment it is hiding. The model's self-reported confidence is an unreliable proxy for actual task success and would not have surfaced this real, measurable failure rate either. Restricting the segment detail to engineering doesn't fix the observability gap, since it was leadership's blended view of health that was wrong, and the underlying monitoring needs the breakdown regardless of who sees it."}, {"id": "P-D3-B3-04", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A customer-support agent's only job is to look up and read back a ticket's current status. When the team connected the support-desk MCP server, they granted the agent the entire tool set, including close_ticket, refund_order, and delete_customer, alongside the read-only status lookup it actually uses. What is the most appropriate least-privilege fix?", "options": ["Replace the human support team's escalation process with this agent, since it already has the tools needed to resolve tickets directly", "Keep all the tools available but require a confirmation dialog before any tool call executes", "Remove the close_ticket, refund_order, and delete_customer tools from this agent's allowed tools, leaving only the read-only status lookup", "Keep all the tools available but add a system-prompt instruction telling the agent to only read ticket status"], "correct": [2], "explanation": "Granting access to only the tool this agent's role actually needs, a read-only status lookup, is least privilege in practice; the destructive and financial tools should simply not be reachable by an agent whose job is read-only lookups. A prompt instruction is a probabilistic control that can be bypassed or misread, whereas removing the tools is a deterministic guarantee. A confirmation dialog is a reasonable control for tools that must remain available, but it doesn't address the fact that this agent has no legitimate need for close_ticket, refund_order, or delete_customer at all. Expanding the agent's scope to replace human escalation is unrelated to fixing the capability-bloat finding and moves in the wrong direction."}, {"id": "P-D3-B3-05", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A senior engineer's personal, highly privileged production API token is placed inside the project-level .mcp.json file that is shared by the entire team, so that every teammate's local Claude Code session ends up authenticating to production systems as that engineer. What is the best way to correct this?", "options": ["Restrict repository write access to senior engineers only, so junior developers cannot modify the file", "Add a note in the team wiki asking developers to use the shared token only for non-production testing", "Rotate the senior engineer's token every week so any leaked copies expire quickly", "Move the credential out of the shared project file into user-level configuration or a per-developer environment variable, so each developer authenticates with their own appropriately scoped credential"], "correct": [3], "explanation": "Personal credentials belong in per-developer, user-level configuration rather than a shared, project-level file, so that each teammate authenticates as themselves with a credential scoped to their own access, and no one is silently acting as the senior engineer in production. Frequent rotation reduces the exposure window but does not stop every developer from currently running production actions under one person's identity. A wiki note relies on everyone reading and honoring it and does nothing to technically prevent misuse. Restricting who can edit the file doesn't change the fact that everyone who reads the file, which is the whole team by design, still obtains the same over-privileged production token."}, {"id": "P-D3-B3-06", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A hub-and-spoke multi-agent system routes a customer request through a coordinator and three subagents. Each subagent currently writes to its own independent log stream with no shared identifiers. After the coordinator returns an incorrect answer, engineers spend hours manually guessing which subagent's output caused the error because the logs cannot be lined up. What should be added to the architecture?", "options": ["A rule that subagents summarize their reasoning in natural language at the end of each run for engineers to read", "A nightly batch process that emails the day's log files to the engineering team", "A requirement that each subagent write a longer, more detailed log entry for every action it takes", "A consistent trace or session identifier attached to the coordinator's request and propagated through every subagent and tool call, so related log entries can be correlated"], "correct": [3], "explanation": "A shared trace or correlation identifier that flows from the coordinator into every subagent and tool call is what lets engineers reconstruct the full path a request took across an isolated, multi-agent system, which is the standard fix for the observability gap described. Making individual log entries longer doesn't help if there's still no way to tell which subagent's entries belong to which end-user request. Emailing daily log dumps doesn't solve correlation and adds latency to incident response instead of enabling real-time debugging. Natural-language self-summaries are an unreliable, unstructured substitute for a real, queryable correlation key across systems."}, {"id": "P-D3-B3-07", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A support bot's tool-selection accuracy was 92% when it had 5 well-scoped tools. After the team merged in a new MCP server, the bot now has 30 tools available and tool-selection accuracy has fallen to 74%, with the bot frequently invoking the wrong tool for a given request. What is the most effective response?", "options": ["Curate and scope the tool list per agent role so each agent is only offered the small subset of tools relevant to its job, instead of exposing all 30 tools to every agent", "Increase the maximum number of tokens the model is allowed to generate per response", "Add several few-shot examples demonstrating correct usage for each of the 30 tools", "Switch the bot to a larger, more capable model tier to compensate for the larger tool list"], "correct": [0], "explanation": "Tool-selection accuracy degrades as the number of available tools grows, so the most effective fix is architectural: scope each agent's tool list down to what its role actually needs rather than exposing the full, merged catalog to every agent. A bigger model can partially compensate but doesn't address the root cause and adds cost and latency for what is fundamentally a configuration problem. Raising the output token limit has no bearing on which tool gets selected. Writing few-shot examples for all 30 tools treats the symptom with an ever-growing prompt rather than fixing the underlying over-provisioning, and it doesn't scale as more tools are added later."}, {"id": "P-D3-B3-08", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "A ticket-summarization agent connects to the ticketing system's MCP server using an OAuth token scoped for full read and write access, even though the agent only ever reads ticket content to generate summaries and never modifies tickets. What is the appropriate fix?", "options": ["Keep the read/write token but add a prompt instruction telling the agent not to write to tickets", "Require a human to manually approve every read call the agent makes before it executes", "Request or issue a read-only scoped token that matches what the agent actually does, replacing the broader read/write token", "Keep the read/write token and set up an after-the-fact alert if any write call is ever observed"], "correct": [2], "explanation": "The token's scope should match the agent's actual needs; since it only reads, a read-only scoped token removes the unnecessary write capability entirely, which is a deterministic fix. A prompt instruction not to write is probabilistic and leaves the write capability live if the model is ever manipulated or errs. An after-the-fact alert is a detective control that notices misuse only after it has already happened, rather than a preventive one that makes misuse impossible. Requiring human approval for every routine read call is disproportionate friction for a low-risk, read-only operation and doesn't address the actual gap, which is the unnecessary write scope."}, {"id": "P-D3-B3-09", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A production integration handles several million tool calls per day. To help with debugging, the team logs the complete request and response payload for every single call, including customer names, account numbers, and other PII. Storage costs have grown sharply and the security team has flagged the practice as a compliance exposure. What is the best change to make?", "options": ["Log full payloads only for calls that return an error response", "Continue logging full payloads for every call, but only compress the log files before writing them to storage", "Stop logging tool calls entirely to eliminate the storage cost and exposure", "Log structured metadata such as tool name, latency, error category, and trace id for every call, and sample and redact full payloads instead of capturing everything verbatim"], "correct": [3], "explanation": "At this volume, structured metadata gives engineers what they need to monitor and debug most issues cheaply, while sampling and redacting full payloads limits both storage growth and PII exposure, balancing observability needs against cost and compliance risk. Turning off logging entirely removes the compliance exposure but also removes the team's ability to diagnose production issues, which is an overcorrection. Compressing full, unredacted payloads reduces storage size somewhat but does nothing about the PII exposure the security team flagged. Logging full payloads only on errors would miss the payload detail needed to investigate near-misses or intermittent issues that don't surface as an outright error, and it still doesn't address PII handling for the errors it does capture."}, {"id": "P-D3-B3-10", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "easy", "question": "An architect reviewing a customer-order chatbot finds it uses a single generic run_sql tool that can execute arbitrary SQL statements against the production database. In practice, the agent only ever uses this tool to look up an order's shipping status by order ID. What change best follows least privilege here?", "options": ["Replace run_sql with a narrowly scoped, purpose-built tool such as get_order_status that accepts only an order ID and returns shipping status", "Keep run_sql available but require a manager to approve every call before it executes", "Keep run_sql available but log every SQL statement the agent executes for later review", "Keep run_sql available but add a prompt instruction telling the agent to only run SELECT statements"], "correct": [0], "explanation": "Replacing a generic, high-capability tool with a constrained, purpose-specific one that can only do the one thing the agent actually needs, looking up shipping status by order ID, removes the possibility of misuse entirely, which is the essence of least privilege. A prompt instruction restricting the agent to SELECT statements is probabilistic and doesn't prevent a manipulated or malfunctioning call from running destructive SQL. Logging every statement is a detective control that only reveals a problem after it has already occurred. Requiring manager approval for every call adds friction to a simple, high-frequency lookup without removing the underlying excess capability, and it doesn't scale operationally."}, {"id": "P-D3-B3-11", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "During an architecture review, an architect discovers that a customer-facing support chatbot authenticates to the company database using the exact same credential used by the internal employee administration panel. The credential has full administrative privileges because the admin panel needs them. If the chatbot were ever compromised or manipulated through a crafted user message, the attacker would inherit full administrative database access. What should the architect recommend first?", "options": ["Deploy a web application firewall in front of the chatbot's public endpoint", "Rotate the shared credential on a monthly schedule", "Add rate limiting to the number of database queries the chatbot can issue per minute", "Issue the chatbot a separate, narrowly scoped credential distinct from the admin panel's, so the two systems no longer share a trust boundary"], "correct": [3], "explanation": "The core problem is that two systems with very different trust levels, a public-facing chatbot and an internal admin tool, share one over-privileged credential, so a compromise of the lower-trust system grants full administrative access. Issuing the chatbot its own credential scoped to only what it needs breaks that shared trust boundary at the root. Rate limiting might slow down abuse but does nothing to reduce the blast radius if the chatbot is manipulated into issuing a small number of highly damaging administrative queries. Rotating the shared credential periodically doesn't change the fact that, between rotations, the chatbot still holds full administrative power it doesn't need, and a web application firewall can filter some malicious traffic patterns but doesn't address prompt-level manipulation of the chatbot itself, which is the realistic attack path here."}, {"id": "P-D3-B3-12", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An on-call rotation configured alerting to fire whenever the raw count of tool-call errors exceeds 50 in a 5-minute window. During normal daily traffic peaks, this threshold is crossed constantly even though the error proportion is unremarkable, paging the on-call engineer dozens of times a day. Meanwhile, a real regression that occurred during a quiet overnight period, where error counts never reached 50, went completely undetected for two days. What should the alerting strategy change to?", "options": ["Raise the fixed threshold high enough that peak-traffic periods stop triggering the alert", "Disable alerting during the known daily peak-traffic windows", "Alert based on the error rate relative to traffic volume, a percentage or ratio, rather than a fixed absolute error count", "Move all error alerting to a single daily digest email instead of real-time paging"], "correct": [2], "explanation": "A rate-based threshold scales with traffic, so it stays meaningful during both high-volume peaks and quiet overnight periods, catching the low-traffic regression that the count-based approach missed while no longer over-alerting during normal peaks. Simply raising the fixed threshold would stop the peak-time noise but would make the overnight regression, which involves far fewer absolute errors, even harder to detect. Moving to a daily digest trades real-time incident response for a delayed report, which is the wrong direction for production alerting. Disabling alerting during peak windows removes visibility exactly when the system is under the most load and most likely to have real problems."}, {"id": "P-D3-B3-13", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "hard", "question": "A finance-reconciliation agent has two tools available: read_payment_history and approve_payment. Its job is only to read payment history for reconciliation reports; it should never approve a payment. The team's system prompt already states, in bold, \"Never call approve_payment unless the user is a verified finance manager.\" Despite this, an incident occurred where the agent approved a payment based on a cleverly worded request. What is the most effective additional step?", "options": ["Trust that the model's built-in training will increasingly resist this kind of manipulation over time", "Add a second agent that reviews approved payments after the fact and flags any that look suspicious", "Remove the approve_payment tool from this agent's allowed toolset entirely, since the role never legitimately needs it", "Rewrite the prompt instruction to be even more emphatic, repeating the warning multiple times in the system prompt"], "correct": [2], "explanation": "Since this agent's role never legitimately needs to approve payments, the deterministic fix is to remove approve_payment from its allowed tools entirely; an unavailable tool cannot be invoked no matter how the request is worded, whereas prompt instructions are probabilistic and had already been shown to fail. Making the same style of instruction more emphatic is still a probabilistic control, and the incident already demonstrated that wording alone isn't reliable. A second agent reviewing approvals after the fact is a detective control that catches the problem only after an unauthorized payment has already been approved, not before. Relying on general model improvement over time is not an architectural control at all and leaves the same exposure in place today."}, {"id": "P-D3-B3-14", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "An MCP tool integration currently returns a bare isError: true with no further detail whenever a call fails, for any reason. Support engineers cannot tell, from the response alone, whether a customer genuinely has zero matching records or whether the agent's credentials were rejected for lacking permission to view that customer's data. What should the integration provide instead?", "options": ["A generic retry of the failed call, repeated automatically until it eventually succeeds", "Structured error metadata, such as an errorCategory field that distinguishes a permission failure from a valid empty result, alongside the isError flag", "Suppression of the error and a return of an empty result list so the agent's response stays simple", "Treatment of every isError response as a permission problem, with automatic escalation to a human reviewer"], "correct": [1], "explanation": "Adding structured error metadata that categorizes failures, distinguishing a permission or access failure from a legitimate empty result, is exactly what lets callers and monitoring tell these two very different situations apart, closing both the security-visibility gap and the debugging gap. Automatically retrying every failure is inappropriate for a permission error, since retrying with the same insufficient credentials will simply fail again. Treating every error as a permission problem is inaccurate and would misroute genuine transient or validation failures to unnecessary human escalation. Silently converting an access failure into an empty result actively hides the security-relevant fact that a permission check failed, which is the opposite of what's needed here."}, {"id": "P-D3-B3-15", "cert": "CCAR-P", "domain": "Integration", "type": "single", "difficulty": "medium", "question": "A team's observability dashboard for a production agent reports only mean response latency, which has stayed steady around 900 milliseconds for months. Despite this, customers increasingly report that the assistant \"hangs\" or \"freezes\" for long stretches. Investigation shows a small but growing fraction of requests take 15+ seconds due to a s
