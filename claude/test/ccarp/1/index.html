Genuine conflicts in stakeholder feedback are best resolved by making the trade-off explicit, checking whether an architectural distinction (like topic-specific guardrail strictness) can satisfy both needs, and escalating to a named decision-owner if agreement still isn't reached. Picking whichever request happened to arrive last treats recency as a proxy for importance, which it isn't. Deciding unilaterally and informing stakeholders afterward skips the alignment process entirely and risks eroding trust with whichever side feels overridden, especially on a compliance-sensitive topic like regulated loan language."}, {"id": "P-D6-B2-08", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A team building a university registrar chatbot defers all documentation to the final week before handoff. When writing it, they realize several key design decisions from months earlier, like why a particular retrieval strategy was chosen over a simpler keyword search, are only half-remembered, and the original rationale is effectively lost. What should the team do differently on future projects?", "options": ["Continue deferring documentation to the end of the project, since it doesn't affect the system's functionality either way.", "Assign a single team member to write all documentation from memory immediately before each future launch.", "Document key decisions, such as lightweight rationale for major architecture and design choices, as they are made throughout the project rather than reconstructing them from memory at the end.", "Skip documenting decisions that were later revisited, since only the final design matters."], "correct": [2], "explanation": "Capturing the reasoning behind decisions close to when they're made, even briefly, avoids the memory decay and lost context that shows up when documentation is deferred to the end. Continuing to defer documentation guarantees the same problem recurs on the next project. Relying on one person's memory just before launch is exactly the failure mode that occurred here, only shifted to a different individual. Skipping the rationale for decisions that were later revisited actually removes some of the most useful context, since knowing why an earlier approach was rejected helps prevent the same idea from being proposed again without cause."}, {"id": "P-D6-B2-09", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A manufacturing company's predictive-maintenance assistant team completes two pieces of work in the same month: patching a dependency with a known vulnerability and fixing a broken monitoring alert that had stopped firing, and separately, analyzing three months of production logs to redesign the retrieval chunking strategy for better failure-prediction accuracy. How should these two efforts be classified within the system's lifecycle?", "options": ["Both efforts are maintenance, since they both involve changing an already-deployed system.", "The dependency patch and alert fix are continuous improvement, while the chunking redesign is maintenance.", "Both efforts are continuous improvement, since they both required engineering effort after go-live.", "The dependency patch and alert fix are maintenance, keeping the current system healthy and reliable, while the chunking redesign driven by production data analysis is continuous improvement, proactively enhancing capability based on evidence."], "correct": [3], "explanation": "Maintenance is about keeping the current system healthy and working as designed, which describes patching a known vulnerability and restoring a broken alert. Continuous improvement is about proactively enhancing the system's capability based on evidence, which describes redesigning the chunking strategy after analyzing production data to improve accuracy. Labeling both as the same category collapses a distinction that matters for planning and resourcing, and swapping the two labels mischaracterizes which work is reactive versus proactive."}, {"id": "P-D6-B2-10", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "During UAT for a nonprofit's client-intake assistant, case workers submit dozens of pieces of feedback through a shared form. Three months after launch, the architect realizes case workers have stopped submitting feedback through the form and instead complain informally to their supervisors, because they never heard what happened to what they submitted. What should the architect have done differently?", "options": ["Regularly report back to the case workers on which feedback was incorporated, deferred, or declined and why, so they can see the process is working and stay engaged with it.", "Send out a longer, more detailed feedback survey to re-engage the case workers.", "Stop collecting feedback altogether, since the case workers appear to have lost interest.", "Commit to implementing every piece of submitted feedback so no case worker ever feels ignored."], "correct": [0], "explanation": "Feedback loops break down when contributors never learn what happened to their input, so closing the loop by reporting back on what was incorporated, deferred, or declined is what sustains engagement and trust in the process. A longer survey adds more input without solving the underlying transparency gap. Stopping collection entirely abandons a valuable channel instead of fixing why it went quiet. Promising to implement every piece of feedback is neither realistic nor good practice, since feedback still needs to be prioritized against impact, effort, and scope."}, {"id": "P-D6-B2-11", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An architect presents a new technical-assistant system to an aviation maintenance-and-repair company's executive steering committee using the same detailed sequence diagram, including every tool-call parameter, that the engineering team uses. The executives disengage partway through the meeting. What should the architect do differently for this audience?", "options": ["Use the identical detailed diagram for every audience going forward, since consistency is more important than tailoring.", "Prepare a high-level view showing the system's inputs, processing, outputs, and business value for the executive audience, and reserve the detailed sequence and component diagrams as a separate reference for engineers.", "Remove all diagrams from every future presentation and rely on prose descriptions only.", "Stop preparing architecture materials for executive audiences, since they don't need to understand the system's design."], "correct": [1], "explanation": "Different audiences need different levels of detail: executives are generally best served by a high-level view connecting the system to business outcomes, while engineers need the detailed component and sequence views to do their jobs. Using the same highly technical diagram for both audiences is what caused the disengagement in the first place. Removing diagrams entirely overcorrects and loses a useful communication tool for the engineering audience. Executives still benefit from understanding architecture at an appropriate level, since they're often the ones approving trade-offs and budget."}, {"id": "P-D6-B2-12", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "An architect is designing the ongoing operating model for a SaaS project-management tool's AI assistant after it goes live. Which elements should be part of a repeatable continuous-improvement loop? Select three.", "options": ["Freeze the system immediately after launch so that no further changes can introduce new risk.", "Continuously feed production monitoring signals, such as accuracy, latency, and escalation patterns, into a recurring analysis process.", "Maintain a prioritized improvement backlog informed by both monitoring data and stakeholder feedback.", "Base every improvement decision on whichever stakeholder escalates most frequently, since frequency reliably indicates importance.", "Re-run the evaluation suite against proposed changes before redeploying them to production."], "correct": [1, 2, 4], "explanation": "A working continuous-improvement loop routes production signals into recurring analysis, keeps a prioritized backlog that blends data and stakeholder input, and re-validates changes against the evaluation suite before they reach production again. Freezing the system after launch eliminates the very changes that continuous improvement is meant to enable, and effectively abandons the lifecycle phases that come after handoff. Treating escalation frequency as a reliable importance signal rewards whoever complains most rather than what actually has the greatest business impact."}, {"id": "P-D6-B2-13", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A property management company's tenant-support assistant has been live for two months. One particularly vocal tenant repeatedly emails the architect's team with complaints, and in response, the team has made three rounds of prompt tweaks specifically targeting that tenant's phrasing patterns. Aggregate production metrics across all tenants haven't moved. What is the issue, and what should the architect do?", "options": ["Continue prioritizing the vocal tenant's complaints, since a tenant who complains that often is clearly experiencing a serious problem.", "Stop responding to the vocal tenant's emails entirely to avoid being influenced by a single data point.", "The team has been reacting to a single vocal stakeholder's anecdotes instead of examining a representative sample of production interactions; the architect should pull a broader, stratified sample before deciding whether a systemic change is warranted.", "Assume the tenant's complaints are unfounded, since aggregate metrics show no overall problem."], "correct": [2], "explanation": "Repeatedly tuning the system around one vocal stakeholder's anecdotes, while aggregate metrics show no movement, is a sign of chasing a squeaky wheel rather than a representative issue; pulling a broader, stratified sample of production interactions is the right way to check whether the complaint reflects a real, wider pattern before making further changes. Continuing to prioritize the loudest tenant without that check risks over-fitting to one person's phrasing at the expense of everyone else. Ignoring the tenant outright discards a channel that might still contain a genuine signal, and assuming the complaints are unfounded based only on an aggregate metric could mask a real problem affecting a narrow segment that the aggregate number hides."}, {"id": "P-D6-B2-14", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "Six months after a biotech company's lab-data assistant was handed off to a new engineering team, a new team member wants to grant the assistant a tool that can delete experiment records, reasoning that 'it seems useful for cleanup.' The handoff documentation lists which tools the assistant has access to, but says nothing about why write and delete capabilities were deliberately excluded during the original design. What was missing from the handoff documentation, and why does it matter?", "options": ["Nothing was missing; new team members should simply contact the original architect whenever a question like this comes up.", "The documentation should have granted broad permissions from the start so questions like this would never arise.", "The documentation only needed to list the tools granted, since the reasoning behind exclusions isn't relevant once the system is in production.", "The documentation should have recorded the least-privilege rationale behind each granted and withheld permission, so future teams understand why delete-capable tools were excluded and don't unknowingly reintroduce that risk."], "correct": [3], "explanation": "Recording the reasoning behind access decisions, not just the resulting list of permissions, is what lets a future team evaluate a proposed change like adding a delete-capable tool against the original risk analysis instead of re-deciding it from scratch, or worse, not realizing a deliberate decision is being reversed. Relying on the original architect doesn't scale once they're unavailable or have moved on, which is a common situation well within a system's lifecycle. Granting broad permissions upfront to sidestep the question directly violates least-privilege practice and increases risk rather than reducing it. Listing only the tools without the rationale is precisely the gap that let this risky proposal go unchallenged."}, {"id": "P-D6-B2-15", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "During discovery for a government benefits-eligibility assistant, stakeholders establish a hard requirement: the system must never autonomously issue a denial decision without human review. During design, the team builds an agentic workflow that can autonomously finalize denials to reduce case backlogs, and the conflict is only caught during a pre-launch review. What does this indicate went wrong, and what should have happened?", "options": ["The hard constraint captured during discovery should have directly shaped the architecture selected during design, and the design should have been validated against discovery outputs before significant build work began.", "Discovery and design are independent phases handled by separate teams, so this kind of conflict is unavoidable and not worth trying to prevent.", "Constraints identified during discovery are only preliminary suggestions that the design team is free to override without revisiting them with stakeholders.", "The fix is simply to use a more capable model so the autonomous denial decisions become more accurate."], "correct": [0], "explanation": "Discovery outputs, especially hard constraints like a no-autonomous-denial rule, are meant to directly shape architectural choices during design, and checking the emerging design against those constraints early would have caught this conflict long before a pre-launch review. Treating discovery and design as disconnected phases is exactly the failure mode on display here, not an acceptable norm. Treating a stakeholder-mandated hard constraint as a mere suggestion ignores why structured discovery is done in the first place. A more capable model doesn't address the underlying issue, since the problem is that the workflow autonomously finalizes a decision that was required to have human review, regardless of how accurate that decision is."}, {"id": "P-D6-B2-16", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "Two weeks after a minor system-prompt update, an online brokerage's trading-support operations lead tells the architect the assistant 'feels less accurate' than before. The full regression evaluation suite, run immediately after the update, showed no measurable change in aggregate accuracy. What is the best next step?", "options": ["Immediately revert the prompt change, since a stakeholder's dissatisfaction should override the evaluation results.", "Investigate with a segment-level analysis of recent production interactions, for example by query type, account tier, or time of day, to check for a localized issue the aggregate evaluation score could be masking.", "Tell the operations lead that the evaluation suite is authoritative and that the perception must be mistaken, and take no further action.", "Set up a system that tracks the operations lead's future sentiment about the assistant as the primary metric for whether the prompt update was safe."], "correct": [1], "explanation": "An aggregate evaluation score can look unchanged while a real regression affects a specific segment, such as one query type or account tier, so a segment-level breakdown of recent production data is the right way to check whether the perception reflects a genuine, localized issue. Reverting immediately without evidence treats an anecdote as proof and could undo a beneficial change for no verified reason. Dismissing the stakeholder outright risks ignoring a real signal that the aggregate metric is masking. Tracking a stakeholder's sentiment going forward as the primary safety metric relies on a subjective, unreliable proxy instead of the structured, segment-aware data analysis that would actually confirm or rule out a problem."}, {"id": "P-D6-B2-17", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "An architect is preparing to transition ownership of an energy utility's outage-support assistant from the build team to the operations team. Which items belong on the handoff checklist that must be complete before the transition is considered done? Select three.", "options": ["Monitoring dashboards are live and have been validated against real production traffic, not just staging data.", "The system prompt has remained completely unchanged since the very first draft written during design.", "Every historical design decision has been individually re-approved in writing by every stakeholder who ever attended a project meeting.", "The on-call/support team has walked through common failure modes and the rollback procedure at least once before go-live.", "An escalation path and a named decision-owner for post-launch issues are documented and agreed with stakeholders."], "correct": [0, 3, 4], "explanation": "A meaningful handoff gate confirms that monitoring actually works against real traffic, that the team taking over operational responsibility has practiced the failure and rollback procedures, and that everyone agrees who owns escalations after go-live; without these, the receiving team inherits a system it can't safely operate. Whether the system prompt changed during design is irrelevant to operational readiness, since prompts are expected to evolve as the team refines behavior before launch. Requiring every past attendee to re-approve every historical decision in writing is unnecessary bureaucracy that has nothing to do with whether operations can actually run and support the system."}, {"id": "P-D6-B2-18", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "An automotive OEM plans to replace its legacy rules-based dealer-support tool with a new agentic assistant. The current plan is to shut off the legacy tool the same day the new assistant goes live. What is missing from this lifecycle plan?", "options": ["Nothing; an immediate cutover the day the replacement goes live is the standard, low-risk approach for decommissioning a system.", "Decommissioning only requires deleting the legacy tool's source code repository once the new assistant is confirmed to work.", "A decommissioning plan that includes migrating or archiving historical logs and evaluation data, notifying any downstream integrations that depend on the legacy tool, and allowing for a transition period or fallback rather than an abrupt simultaneous cutover.", "Nothing further is needed, since the new assistant's go-live automatically handles decommissioning the old one."], "correct": [2], "explanation": "A responsible decommissioning plan preserves historical data that may still be needed for audits or comparisons, checks for and notifies any downstream systems still integrated with the legacy tool, and builds in a transition window or fallback in case the new assistant needs adjustment, rather than betting everything on a same-day simultaneous cutover. Treating an abrupt cutover as standard practice ignores the real risk of breaking dependencies nobody remembered were there. Deleting the source code is at most a small part of decommissioning and ignores the data and integration concerns. A new system going live doesn't automatically handle any of the retirement steps for the old one; those have to be planned and executed deliberately."}, {"id": "P-D6-B2-19", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A global consumer electronics retailer's US support-team lead insists the support assistant's tone must stay strictly formal, while the EU support-team lead insists it must be casual and conversational, for what both describe as the same global assistant. Each treats their region's preference as non-negotiable. What structural fix should the architect propose?", "options": ["Implement whichever region's request was submitted first, since that better reflects the original project timeline.", "Build two entirely separate, independently maintained assistants, one per region, without first assessing whether configuration within a single system could resolve the conflict.", "Let the engineering team decide based on whichever tone is technically simpler to implement, regardless of the underlying business need.", "Establish a clear decision-making structure for cross-regional requests, such as a single accountable product owner who weighs both inputs and either makes a global call or defines documented region-specific configuration where a genuine business need for regional variation exists."], "correct": [3], "explanation": "Cross-regional conflicts like this usually reflect a missing decision-making structure rather than an unsolvable technical problem, so establishing a single accountable owner, or documented and justified regional configuration, gives the project a repeatable way to resolve this and future disagreements. Picking whichever request arrived first treats sequencing as the deciding factor instead of the actual business need. Building and maintaining two fully separate systems is a heavyweight, costly response that skips checking whether a single configurable system could satisfy both regions. Letting engineering decide based on implementation ease substitutes a technical convenience for a business and user-experience decision that stakeholders should own."}, {"id": "P-D6-B2-20", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "A media and publishing company's research-assistant platform uses a coordinator agent that delegates to several specialized subagents, each of which runs with its own isolated context. As the architect prepares documentation for handoff to the platform team, which elements are essential to include, given how the system actually operates? Select three.", "options": ["Full verbatim chat transcripts of every user session the system has ever processed.", "The orchestration pattern showing which subagent the coordinator calls, in what sequence, and under what conditions.", "What context is explicitly passed into each subagent's prompt, since subagents do not automatically inherit the coordinator's conversation history.", "How each subagent's output is routed back through the coordinator, to preserve observability into what the overall system is doing.", "The personal contact information of everyone who attended design meetings during the project."], "correct": [1, 2, 3], "explanation": "Because subagents run with isolated context and don't automatically inherit the coordinator's history, the handoff documentation needs to make the orchestration sequence explicit, spell out exactly what context is deliberately passed into each subagent, and describe how results are routed back through the coordinator so the platform team can observe and debug the system. An archive of every raw user transcript isn't architecture documentation and would be an unnecessary, unwieldy, and likely sensitive data dump. Meeting attendees' personal contact information has no bearing on how the system operates and doesn't belong in technical handoff documentation."}, {"id": "P-D6-B2-21", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "A payment-processing company's fraud-review assistant incorrectly clears a transaction that should have been flagged. The on-call engineer manually reverses the transaction and closes the ticket without further action. What is missing from a mature lifecycle response to this incident?", "options": ["A blameless post-incident review that identifies the root cause, updates the relevant guardrail or programmatic check to prevent recurrence, and feeds the finding into the evaluation suite and continuous-improvement backlog.", "Nothing further is needed once the affected transaction has been reversed; the immediate symptom has been resolved.", "The incident should be kept confidential from business stakeholders so it doesn't alarm them unnecessarily.", "The on-call engineer who handled the ticket should be formally reprimanded to deter similar oversights in the future."], "correct": [0], "explanation": "Reversing the transaction only addresses the immediate symptom; a mature response also investigates why the failure happened, strengthens the system, such as adding a programmatic check the incorrect clearance should have failed, and captures the lesson in the eval suite and improvement backlog so the same failure mode is tested for going forward. Treating the reversal as the end of the process misses the opportunity to prevent recurrence. Withholding the incident from stakeholders undermines the transparency needed to maintain trust and informed oversight of a financial system. Reprimanding the individual engineer misdiagnoses a systemic gap as a personal failing and does nothing to fix the underlying process."}, {"id": "P-D6-B2-22", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "Before launching a hospital system's pre-visit assistant, the architect shares the evaluation results with the business sponsor, including the sampled accuracy rate on realistic patient questions and a list of known failure modes, rather than presenting the system as fully solved. What is the primary benefit of doing this?", "options": ["It removes the need for any post-launch monitoring, since the evaluation already covers everything that matters.", "It calibrates the sponsor's expectations to the system's real, measured performance and known limitations before launch, reducing the risk of a trust breakdown when imperfect outputs inevitably occur in production.", "It guarantees the sponsor will approve moving forward with the project.", "It shifts legal responsibility for any future errors entirely onto the sponsor."], "correct": [1], "explanation": "Sharing measured performance and known limitations before launch sets a realistic baseline for the sponsor, so when imperfect outputs occur in production, they're recognized as an expected, already-discussed characteristic of the system rather than a surprise that undermines trust. Evaluation results don't eliminate the need for ongoing production monitoring, since real-world usage patterns can differ from the evaluation set. Sharing honest results doesn't guarantee approval, and it may even prompt further questions, which is a legitimate part of an informed decision. Sharing evaluation data is a communication practice, not a legal mechanism for reassigning responsibility for future errors."}, {"id": "P-D6-B2-23", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A home insurance company's claims-intake assistant handoff documentation describes only the happy path: how the assistant handles a standard, well-formed claim. Three weeks after launch, the claims support team keeps escalating unusual cases, like claims involving multiple properties or disputed ownership, unsure whether the assistant's odd behavior on these is a bug or an expected boundary. What should the documentation have included?", "options": ["Instructions telling support staff to treat every unusual case as a confirmed bug requiring an emergency fix, regardless of whether it was ever in scope.", "Nothing different; the evaluation suite used during design already covers this, so the operational documentation doesn't need to repeat it.", "An explicit description of known limitations and out-of-scope scenarios alongside the happy-path behavior, so support staff can distinguish expected boundaries from genuine defects.", "A requirement to expand the assistant's scope before launch so that it could correctly handle every conceivable claim variation."], "correct": [2], "explanation": "Support staff need documentation that names the system's known boundaries and out-of-scope scenarios, not just its intended happy path, so they can tell the difference between an expected limitation and an actual defect without escalating every ambiguous case. Treating every unusual case as an emergency bug wastes effort investigating things that were never in scope. An evaluation suite used during design isn't accessible or structured for day-to-day operational triage, so it doesn't substitute for documentation support staff can actually use. Expanding scope to cover every conceivable case before launch is impractical; the fix here is clearer documentation of the boundaries that already exist, not eliminating them entirely."}, {"id": "P-D6-B2-24", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "A national parcel delivery company's internal logistics assistant has run in production for a full year without a single reported incident. The sponsor asks whether the quarterly evaluation and review cadence can be dropped, since the system is clearly stable. Which of the following are valid reasons to keep some form of periodic review even without any incidents? Select three.", "options": ["Underlying model versions and platform behavior can change over time even when the application's own code doesn't, so periodic re-evaluation can catch drift introduced upstream.", "Real-world usage patterns and query types tend to shift over time, so a workload that passed evaluation a year ago may no longer represent current traffic.", "A full year without any reported incident is a reliable guarantee that no future review will ever surface an issue.", "Only highly agentic architectures benefit from periodic review, so a simpler workflow-based system like this one can safely stop reviewing once it's stable.", "Business requirements, policies, or the regulatory environment surrounding the use case can change even without the system ever failing outright."], "correct": [0, 1, 4], "explanation": "Periodic review remains valuable even for an incident-free system because the model, the traffic it sees, and the business or regulatory context it operates in can all shift silently over time, none of which would necessarily produce a visible incident before being caught by a scheduled review. Treating a year of stability as a guarantee of future safety confuses an absence of evidence with evidence of no risk, since the very drift that periodic review is meant to catch is often silent by nature. The idea that only highly agentic systems benefit from ongoing review is a false distinction; workflow-based systems are just as exposed to model, traffic, and policy drift as agentic ones, so both benefit from periodic re-evaluation."}, {"id": "P-D6-B2-25", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "During the maintenance phase of a commercial real-estate leasing assistant, a stakeholder submits a ticket labeled 'urgent bug fix' asking the assistant to also generate lease-renewal offer letters, a capability it was never designed or scoped to perform. Which actions should the architect take? Select three.", "options": ["Treat it as a same-day bug fix and patch it directly into production without any scoping, since the stakeholder labeled it urgent.", "Ignore the request entirely on the grounds that it wasn't part of the original discovery scope, without any further communication.", "Clarify with the stakeholder that this is a new capability request rather than a defect in the current scope, so it can be evaluated and prioritized on its own terms instead of as an emergency patch.", "Run a lightweight scoping exercise proportionate to the size of the request, covering requirements, risk, and success metrics, before committing to build the new capability.", "Communicate the distinction and a realistic timeline or effort estimate back to the stakeholder so their expectations are reset around what 'urgent bug fix' actually requires."], "correct": [2, 3, 4], "explanation": "The core issue is a mislabeled request: what's framed as an urgent bug fix is actually a new capability outside the system's original scope, so the right response is to name that distinction clearly, run scoping proportionate to the request's size, and reset the stakeholder's expectations with a realistic timeline. Rushing it into production as an emergency patch skips the risk and requirements analysis a new capability deserves, regardless of how it was labeled. Silently ignoring the request also fails the stakeholder, since it leaves a legitimate business need unaddressed and uncommunicated instead of routing it through a proper process."}, {"id": "P-D6-B2-26", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "A subscription box company's support assistant has design notes scattered across old chat threads, a partially updated wiki page, and someone's local notes file, with the wiki and notes disagreeing on which fallback behavior is currently correct. A stakeholder asks the architect for 'the real documentation.' What should the architect do?", "options": ["Point the stakeholder to the chat threads, since they contain the most recent discussion.", "Tell the stakeholder that no single source of truth is realistic for a system this actively developed.", "Merge all three sources verbatim into one long file without resolving the contradictions between them.", "Consolidate the accurate, current information into a single canonical architecture and operations document, and treat the scattered sources as historical context rather than ongoing references."], "correct": [3], "explanation": "When documentation has fragmented into conflicting sources, the fix is to consolidate the current, accurate information into one canonical document that becomes the reference going forward, while the old threads and notes remain useful only as historical background. Pointing to chat threads perpetuates the fragmentation instead of resolving it. Claiming a single source of truth isn't realistic gives up on a solvable documentation problem. Simply merging all three sources without resolving their contradictions would hand the stakeholder a document that still contains the same conflicting fallback-behavior claims, solving nothing."}, {"id": "P-D6-B2-27", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An architect is building the project plan for a warehouse robotics control assistant at a logistics company. Which sequence correctly reflects where in the lifecycle each activity belongs: gathering throughput and safety requirements from the operations team, selecting the workflow-versus-agentic architecture pattern, and training the floor-support team to operate and escalate issues with the live system?", "options": ["Gathering requirements belongs to discovery, selecting the architecture pattern belongs to design, and training the floor-support team belongs to handoff.", "All three activities belong to the design phase, since they all happen before the system is technically complete.", "Gathering requirements belongs to handoff, selecting the architecture pattern belongs to discovery, and training the floor-support team belongs to design.", "Training the floor-support team should happen before requirements are gathered, so operators can help shape what gets built."], "correct": [0], "explanation": "This is the standard lifecycle sequence: discovery is where requirements like throughput and safety needs are gathered, design is where an architecture pattern is selected based on those requirements, and handoff is where the team that will operate the live system is trained to run and escalate issues with it. Lumping all three into design ignores that requirements gathering logically precedes architecture selection, and operational training only makes sense once there's a working system to train people on. Reversing the order, so requirements arrive at handoff and training happens before design, would mean building an architecture before knowing what it needs to satisfy and training people to operate a system that doesn't exist yet."}, {"id": "P-D6-B2-28", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A veterinary clinic chain's scheduling assistant project has a phase-1 scope agreed during discovery, but as the launch date nears, the clinic operations director says she'll consider the phase 'done' once the assistant 'handles scheduling well,' without further specifics. What should the architect do to align expectations before launch?", "options": ["Proceed with the current understanding, since 'handles scheduling well' is clear enough for engineering purposes.", "Work with the operations director to translate that phrase into specific, measurable success criteria, such as target booking-accuracy and no-show-reduction rates, and confirm both sides agree those criteria define phase-1 completion.", "Postpone launch indefinitely until the operations director independently produces a fully detailed specification on her own.", "Define success criteria unilaterally without further stakeholder input, since the architect has more technical expertise."], "correct": [1], "explanation": "A vague phrase like 'handles scheduling well' isn't a usable definition of done, so the architect needs to work with the stakeholder to turn it into specific, measurable criteria that both sides agree constitute phase-1 completion, closing the gap before launch rather than discovering a mismatch after it. Proceeding on the vague phrasing as-is invites a dispute later about whether the phase is actually complete. Waiting indefinitely for the stakeholder to independently produce a full specification stalls the project and misplaces a task that benefits from the architect's collaborative involvement. Defining criteria unilaterally risks setting a bar the stakeholder never actually agreed to, which defeats the purpose of aligning expectations in the first place."}, {"id": "P-D6-B2-29", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A semiconductor manufacturer's internal engineering assistant is handed off to a platform operations team. Six weeks later, the operations team wants to update the system prompt to address a recurring complaint, but they have no way to check whether the change breaks previously working behavior other than manually trying a handful of queries and eyeballing the responses. What should the original handoff have included to prevent this?", "options": ["A verbal walkthrough of the system's behavior, delivered once during the transition meeting.", "A rule that the operations team is never allowed to modify the system prompt after handoff.", "The evaluation datasets and baseline results used during design, so the operations team can re-run structured regression testing against any proposed change instead of relying on ad hoc manual spot-checks.", "A larger model tier, so future changes are less likely to introduce regressions."], "correct": [2], "explanation": "Handing off the evaluation datasets and baseline results lets the operations team re-run structured, repeatable regression testing against any proposed change, rather than relying on a handful of manually spot-checked queries that can easily miss a regression elsewhere in the system's behavior. A one-time verbal walkthrough doesn't leave the team with a durable, reusable tool for testing future changes. Forbidding the operations team from ever changing the prompt would block the legitimate maintenance and continuous-improvement work they're expected to do. A larger model tier doesn't provide any way to verify whether a specific change introduced a regression; that requires a test process, not a bigger model."}, {"id": "P-D6-B2-30", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "A national grocery chain piloted an AI assistant for shelf-replenishment queries with a single store for six weeks and now wants to roll it out to all 400 stores next month. Which activities should happen before the broader rollout, given that pilot-scale results don't automatically confirm production-scale readiness? Select three.", "options": ["Re-run the evaluation suite against a dataset that reflects the full-scale, production-representative range of stores and query patterns, not just the pilot store's narrower sample.", "Load- and latency-test the system at the request volume expected across all 400 stores, since pilot-scale performance may not hold at that scale.", "Skip further evaluation, since the six-week pilot already proved the system works and additional testing would only delay the rollout.", "Finalize and validate monitoring dashboards and alert thresholds before the wider store base is exposed to the system.", "Roll out to all stores first and rely on early complaints from store managers as the primary signal for whether the system is ready."], "correct": [0, 1, 3], "explanation": "Scaling from a single-store pilot to a 400-store rollout is a real change in query diversity and volume, so re-evaluating against a production-representative dataset, load-testing at the expected full-scale volume, and having monitoring and alerting validated in advance are all necessary to catch problems that a small pilot wouldn't reveal. Treating the pilot as sufficient proof skips exactly the scale-related risks that differ between one store and four hundred. Rolling out broadly first and using store managers' complaints as the primary readiness signal turns the entire rollout into an uncontrolled experiment, discovering problems only after they've already affected the full store base instead of catching them beforehand."}, {"id": "P-D6-B2-31", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "A municipal 311 citizen-services assistant receives a growing volume of stakeholder feedback after launch, more than the team can act on immediately. Which criteria should inform how the architect prioritizes this feedback into a backlog? Select three.", "options": ["The business impact of addressing the feedback, such as how many citizen requests or which service categories it affects.", "Whichever stakeholder holds the most senior title, regardless of the feedback's business impact or feasibility.", "The effort and risk involved in implementing the change, including any impact on existing guardrails or agreed service commitments.", "The order in which feedback happened to arrive, addressed strictly first-in-first-out regardless of impact.", "How well the feedback aligns with the assistant's agreed scope and success metrics from discovery."], "correct": [0, 2, 4], "explanation": "A sound prioritization approach weighs business impact, implementation effort and risk, and alignment with the system's agreed scope and success metrics, since these together indicate where effort will produce the most value without introducing disproportionate risk. Deferring to whoever holds the most senior title turns prioritization into a function of organizational hierarchy rather than actual impact or feasibility. Processing feedback strictly in arrival order ignores that some early-arriving items may be low-impact while later ones could be urgent and high-value, so a rigid first-in-first-out approach produces worse outcomes than impact-based prioritization."}, {"id": "P-D6-B2-32", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A university's IT helpdesk assistant was designed around the assumption that it would only ever need to support students and staff already authenticated through the campus single sign-on system. Two years later, a new team wants to expose the same assistant to unauthenticated prospective-student inquiries and is surprised to find several downstream tools break because they assumed an authenticated identity was always available. What should the original documentation have captured to prevent this confusion?", "options": ["A blanket restriction preventing the system from ever being used for any purpose beyond its original scope.", "Nothing; new teams should always assume that a several-year-old system can be extended to any new use case without checking anything.", "Detailed source code comments only, without any higher-level explanation of the assumptions those comments implement.", "The design assumptions and constraints the architecture was built around, such as the reliance on an authenticated identity, so future teams can see which conditions any proposed expansion would need to address."], "correct": [3], "explanation": "Documenting the assumptions and constraints a design was built around, such as always having an authenticated identity available, gives future teams a clear list of conditions they need to address before extending the system to a new context, rather than discovering the gap through broken tools in production. A blanket restriction against any future extension is overly rigid and blocks legitimate evolution of the system. Assuming an older system can absorb any new use case without verification is precisely the mistake that led to the breakage described. Source code comments alone are too granular and scattered for a new team to reconstruct the overall design assumptions from, compared to a clear, higher-level statement of them."}, {"id": "P-D6-B2-33", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "A global law firm's knowledge-management assistant has been running for 18 months. The architect who designed it and has been running its quarterly evaluation reviews is rotating to a new project, and no one else on the team has ever run that review process end to end. What is the best way to ensure lifecycle continuity?", "options": ["Before the transition, document the review process, including where the evaluation datasets live, how results are interpreted, and how findings feed the improvement backlog, and have at least one other team member run it alongside the departing architect at least once.", "Cancel the quarterly review process, since the architect who created it is no longer available to run it.", "Wait until the next quarterly review is due and let whoever is available at that time figure out the process from scratch.", "Conclude that a well-designed AI system does not require any consistent long-term ownership process once it has been stable for over a year."], "correct": [0], "explanation": "Lifecycle continuity depends on process knowledge surviving personnel changes, so documenting exactly how the review is run and having someone else perform it alongside the departing architect at least once turns tribal knowledge into a repeatable, transferable process before the handoff gap opens up. Canceling the review discards a control that has presumably been catching drift and driving improvement for 18 months, for a reason unrelated to whether the review itself is still valuable. Waiting until the next review is due and hoping someone figures it out risks a rushed, incomplete review or a missed cycle entirely. Concluding that a stable system needs no consistent ownership process ignores that the review process itself, not just the system's stability, is what has been keeping it stable."}, {"id": "P-D6-B2-34", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "A national pharmacy chain's prescription-refill assistant project is midway through design when the original executive sponsor leaves the company. The new sponsor arrives with different priorities, focusing heavily on reducing call-center volume rather than the original goal of reducing refill turnaround time, and assumes the project is already aligned with her priorities. What should the architect do?", "options": ["Continue executing against the original discovery outputs without involving the new sponsor, since the project scope was already agreed before she joined.", "Re-baseline with the new sponsor: walk her through the original discovery outputs and current design, surface the gap between her priorities and the original goals, and jointly agree on any needed scope or success-metric changes before continuing.", "Quietly shift the project's internal priorities to match her stated interests without formally updating the documented scope or success metrics.", "Tell the new sponsor that priorities cannot change once a project has entered the design phase."], "correct": [1], "explanation": "A sponsor change mid-project is a natural trigger to re-baseline: walking the new sponsor through what was agreed and built so far, surfacing the gap against her stated priorities, and jointly deciding on any scope or metric changes keeps the project aligned with whoever now owns its outcomes. Continuing silently on the original plan risks building toward goals the new decision-maker doesn't actually value. Shifting priorities informally without updating the documented scope creates exactly the kind of misalignment between stated goals and actual work that structured discovery and design artifacts are meant to prevent. Telling the sponsor priorities are frozen regardless of who's accountable for the outcome ignores that legitimate business changes, like a change in leadership, can appropriately trigger a scope conversation."}, {"id": "P-D6-B2-35", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "A managed IT services provider is preparing to hand off a client-facing support assistant to its 24/7 operations team. Which elements should be included in the monitoring and alerting documentation as part of the handoff package? Select three.", "options": ["The complete source-code history of every experimental branch tried during design, regardless of whether it ever reached production.", "The specific metrics and thresholds that define a healthy versus a degraded state, such as sampled accuracy falling below an agreed baseline or latency exceeding a set target.", "A guarantee that alerts will never produce a false positive, so on-call staff can treat every alert as a confirmed incident requiring escalation.", "Clear, step-by-step instructions for what an on-call engineer should do when each alert fires, including who to escalate to if the issue can't be resolved at the first tier.", "The rollback procedure, such as reverting to a previous system prompt or model configuration, including any data or state considerations involved."], "correct": [1, 3, 4], "explanation": "Useful monitoring and alerting documentation defines what healthy versus degraded actually means in measurable terms, gives on-call staff concrete steps and an escalation path for when an alert fires, and includes a tested rollback procedure so a response doesn't have to be improvised under pressure. A full history of every experimental branch from design has no operational value to an on-call engineer responding to a live alert. Promising that alerts will never be false positives is not a realistic or achievable claim for a production system, and encouraging staff to treat every alert as automatically confirmed without judgment would work against efficient triage rather than support it."}, {"id": "P-D7-B1-01", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "A platform engineering lead wants every engineer's Claude Code session on the payments repository to automatically load the team's style guide and PR checklist, while still letting individual engineers keep personal aliases and shortcuts that don't affect their teammates. Which configuration approach best achieves this?", "options": ["Put the team style guide and PR checklist in the project's CLAUDE.md (checked into the repo) and let each engineer keep personal preferences in their own user-level CLAUDE.md.", "Ask every engineer to paste the style guide into the chat at the start of each session.", "Store the style guide only in each engineer's personal user-level CLAUDE.md and have them copy it to one another manually.", "Put both the team checklist and each engineer's personal shortcuts into the same root CLAUDE.md file."], "correct": [0], "explanation": "Project-level CLAUDE.md is checked into the repo, so it loads automatically for anyone working in that project and stays version-controlled and consistent team-wide, while the personal user-level file layers individual preferences on top without affecting teammates. Pasting instructions manually each session is repetitive and easy to skip. Keeping the guide only in personal config means teammates never receive it automatically. Mixing personal shortcuts into the shared root file pollutes the team-wide config with content relevant to only one engineer."}, {"id": "P-D7-B1-02", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A monorepo's root CLAUDE.md has grown to include unrelated conventions for the billing, search, and notifications services all in one file, making it hard to maintain and forcing engineers on one service to scroll past guidance meant for the others. What is the best way to fix this?", "options": ["Delete the root CLAUDE.md and require each engineer to keep the relevant conventions in their own personal user-level CLAUDE.md.", "Split the service-specific conventions into separate files and reference them from the root CLAUDE.md using @import.", "Keep everything in the single root file but add more comments to make it easier to scroll through.", "Move all the content into one directory-level CLAUDE.md inside the most frequently changed service's folder."], "correct": [1], "explanation": "@import lets a root CLAUDE.md pull in modular, service-specific files, keeping the shared entry point organized while each module stays independently maintainable. Removing the root file and pushing everything into personal config loses team-wide consistency for shared conventions. Adding comments doesn't resolve the underlying scale and relevance problem. Consolidating into one service's directory-level file misapplies directory scoping and still leaves unrelated content mixed together for the other services."}, {"id": "P-D7-B1-03", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A full-stack team wants React component files to automatically load frontend accessibility and styling conventions, and Python service files to load separate backend conventions, no matter which of the repo's many directories they live in. Duplicating a CLAUDE.md in every directory has already led to copies drifting out of sync. What should they use instead?", "options": ["A single directory-level CLAUDE.md placed at the repository root only.", "A /memory command run manually before editing each file type.", ".claude/rules/*.md files with YAML frontmatter paths globs matching the relevant file types, loaded automatically when matching files are edited.", "One shared user-level CLAUDE.md per engineer, manually kept identical by convention."], "correct": [2], "explanation": "Path-specific rules match file-type conventions by glob pattern across every directory at once, which is exactly why they are a better fit than a per-directory CLAUDE.md for this case. A single root-level file cannot apply different rules to different file types across directories. /memory only displays what is already loaded; it does not define new scoped conventions. Personal user-level files kept identical by convention is precisely the manual-drift problem the team is already experiencing."}, {"id": "P-D7-B1-04", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "Two engineers on the same team each built their own version of a /deploy-checklist slash command with slightly different steps, and both versions live only in their personal command folders. Which change would make the checklist consistent for the whole team going forward?", "options": ["Have both engineers keep refining their own personal versions independently.", "Rename both personal commands so they no longer conflict with each other.", "Ask engineers to memorize the correct steps instead of using a slash command.", "Move a single, agreed-upon version into the project's .claude/commands/ directory so it is version-controlled and shared by everyone working in the repo."], "correct": [3], "explanation": "Project-level slash commands are version-controlled and team-wide, so everyone runs the same up-to-date steps automatically. Letting each engineer keep an independent personal copy preserves the exact drift causing the problem. Renaming to avoid conflicts does nothing to unify the steps themselves. Dropping the command in favor of memorization removes the productivity benefit and reintroduces the human error the checklist was meant to prevent."}, {"id": "P-D7-B1-05", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A team packages its multi-step release process (changelog compilation, version bump, tag creation) as a Claude Code Skill. The skill needs to explore several files and run intermediate checks, but the team doesn't want that exploration cluttering the main conversation an engineer is using to plan other work. Which Skill configuration addresses this?", "options": ["Set the skill's frontmatter context to fork so the skill runs in an isolated context.", "Set argument-hint to describe the expected release version format.", "Grant the skill allowed-tools access to every tool in the repository.", "Rename the skill file so it sorts first alphabetically in .claude/skills/."], "correct": [0], "explanation": "Setting context to fork runs the skill in an isolated context, so its internal exploration and intermediate steps don't pollute the main session's conversation. argument-hint only documents expected arguments and does not isolate execution. Granting broad tool access increases risk without addressing context pollution, and it also works against least-privilege practice. File naming or sort order has no effect on execution isolation."}, {"id": "P-D7-B1-06", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "A team wants to add a shared PostgreSQL MCP server so every engineer's Claude Code session on the analytics repo can query the staging database, without committing the database password to the repository. Where and how should this be configured?", "options": ["In each engineer's personal user-level MCP config, with the literal password typed directly into the file.", "In the project's .mcp.json, referencing the password through environment-variable expansion rather than a literal value, so the file can be safely checked in.", "In the project's .mcp.json, with the literal password typed directly into the file for simplicity.", "Skip committing any MCP configuration and have each engineer configure the server from memory."], "correct": [1], "explanation": "Project-level .mcp.json is the shared, version-controlled scope for team-wide servers, and its support for environment-variable expansion lets the file be committed without embedding the literal secret. Putting it in personal per-engineer config defeats the goal of a shared team server and still risks a hardcoded literal secret. Hardcoding the literal password directly in a checked-in file exposes the credential to everyone with repo access. Leaving it unconfigured and relying on memory reintroduces exactly the inconsistency the team is trying to avoid."}, {"id": "P-D7-B1-07", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "An on-call debugging assistant is configured with about 18 tools, including several unrelated to its job, such as production deploy, database admin, and infrastructure teardown actions. The team notices it sometimes calls the wrong tool for a simple log-lookup request. What is the most effective fix?", "options": ["Add a more detailed system prompt asking it to be more careful about which tool it picks.", "Switch to a larger model tier so it reasons better about which of the 18 tools to use.", "Reduce the assistant's tool set to only the read-only diagnostic tools its debugging role actually needs.", "Leave the tool set as is, since more tools give the assistant more flexibility for any future task."], "correct": [2], "explanation": "Too many tools measurably degrades tool selection, and giving an agent only the tools its role needs fixes both the selection-accuracy problem and the unnecessary access to destructive production actions. Adding prompt guidance is a probabilistic nudge, not a fix for an architectural tool-bloat problem. A bigger model does not resolve a selection problem rooted in having too many overlapping or irrelevant tools available. Keeping every tool for flexibility is the over-engineered choice that caused the problem in the first place."}, {"id": "P-D7-B1-08", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "hard", "question": "During production debugging sessions, engineers occasionally ask Claude Code to run shell commands to help diagnose an issue. The security team wants a guarantee that destructive commands, such as dropping a table or force-deleting files, can never execute during these sessions, even if an engineer explicitly requests one. Which two changes actually provide that guarantee? (Select two.)", "options": ["Add a strongly worded instruction in the project CLAUDE.md telling Claude to never run destructive commands.", "Configure a hook that intercepts tool calls and programmatically blocks any command matching a destructive pattern before it can run.", "Ask Claude to double-check with itself and confirm the command is safe before running it.", "Remove destructive-capable commands from what the debugging session's shell access can reach in the first place, rather than relying on the assistant to decline.", "Switch to a larger model tier, which is less likely to make this kind of mistake."], "correct": [1, 3], "explanation": "A tool-call-intercepting hook enforces the block programmatically and deterministically, and restricting what destructive actions the session's tool access can even reach removes the possibility entirely; both are enforcement mechanisms rather than requests. Strongly worded prompt instructions remain probabilistic and carry a non-zero failure rate no matter how firmly they are worded. Having the model confirm with itself is still same-session self-checking, not an independent or deterministic control. A larger model may follow instructions somewhat better, but that is still probabilistic compliance rather than a guarantee."}, {"id": "P-D7-B1-09", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "medium", "question": "A team wants a CI pipeline to invoke Claude Code to generate a pull-request summary and have a downstream script reliably extract a risk-level field from the result. Which two practices should the pipeline use? (Select two.)", "options": ["Run Claude Code interactively so a human can review and manually retype the summary into the pipeline.", "Rely on the default text output and have the downstream script regex-match the risk-level value out of the prose.", "Run Claude Code non-interactively using the print flag.", "Choose a larger model tier and trust it will format its prose consistently enough to parse.", "Request structured JSON output, constrained by a schema, instead of relying on free-text output."], "correct": [2, 4], "explanation": "Running non-interactively enables scriptable, unattended execution suited to a pipeline, and requesting structured, schema-constrained output gives the downstream script a reliable field to parse instead of scraping prose. Interactive review is not automatable and defeats the purpose of a CI step. Regex-matching free text is fragile and breaks whenever phrasing shifts. A larger model may write cleaner prose, but that still is not a guarantee of a parseable structure."}, {"id": "P-D7-B1-10", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "An engineer used a Claude Code session to write a fix for a subtle authentication-bypass bug. Wanting a safety check before opening a pull request, they ask the same session, 'review your fix again and make sure it is correct.' What is the most effective way to get a meaningful review?", "options": ["Repeat the same question to the same session a few more times until the answers stop changing.", "Increase the verbosity of the original session's explanation of its own reasoning.", "Trust the original answer, since the session that wrote the fix best understands its own intent.", "Have an independent Claude Code session or instance, without the original conversation's history, review the fix fresh."], "correct": [3], "explanation": "A session tends to be weaker at reviewing its own output because it retains its own prior reasoning and is less likely to question it; an independent instance with fresh context provides a genuinely separate check, which matters especially for a security-sensitive fix like an authentication bypass. Re-asking the same session repeatedly does not introduce a new perspective, since it is still self-review. Asking for a more verbose self-explanation does not add independent scrutiny either. Trusting the original session's self-assessment risks missing the same blind spot that produced the bug in the first place."}, {"id": "P-D7-B1-11", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "An SRE spends Monday afternoon using Claude Code to investigate an intermittent latency spike, gathering log excerpts and ruling out several causes, but has to stop before finding the root cause. On Tuesday morning, they want to continue from exactly where they left off, with all of Monday's findings still in context, instead of re-explaining the investigation from scratch. What should they do?", "options": ["Resume the prior session using the resume flag with the saved session name.", "Start a brand-new session and manually retype a summary of Monday's findings.", "Add Monday's findings to the project CLAUDE.md so any new session loads them as static config.", "Paste Monday's entire raw transcript into the system prompt of a new session."], "correct": [0], "explanation": "Resuming a prior session continues it with its full context intact, which is exactly what is needed to pick the investigation back up without re-establishing everything. Manually retyping a summary risks losing detail and wastes time reconstructing state. CLAUDE.md is meant for durable, static team or project conventions, not for logging a single investigation's evolving findings. Pasting a full raw transcript into a new session's system prompt is a clumsy manual substitute for resuming and bloats context unnecessarily."}, {"id": "P-D7-B1-12", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "Partway through triaging an incident, an engineer has gathered shared context pointing to two plausible root causes: a cache-invalidation bug and connection-pool exhaustion. They want to investigate both hypotheses in depth without the findings for one contaminating the other, but without losing the triage context already gathered. What should they do?", "options": ["Continue in the same session, switching between hypotheses turn by turn.", "Use fork_session to create two independent branches from the current session, and investigate one hypothesis in each.", "Open two completely new sessions with no context, and re-explain the incident from scratch in each.", "Pick whichever hypothesis seems more likely and investigate only that one to avoid extra effort."], "correct": [1], "explanation": "fork_session creates independent branches from a shared baseline, so both hypotheses can be explored separately while retaining everything already gathered, with neither line of investigation muddying the other. Switching hypotheses within one session risks mixing findings together and losing clarity as context grows. Starting fresh sessions with no context discards the triage work already done. Arbitrarily picking one hypothesis to save effort risks missing the actual root cause if the guess is wrong."}, {"id": "P-D7-B1-13", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "hard", "question": "A production debugging session has run for hours, pulling in large log excerpts on nearly every turn. Context usage is approaching the limit, and the root cause still hasn't been found. An engineer wants to reclaim context by running /compact, but is worried about losing the exact error code and timestamp found two hours ago. What is the best next step?", "options": ["Run /compact immediately and trust that summarization will retain the important details.", "Avoid /compact entirely and keep working until the session hits its context limit.", "Extract the key facts, such as the exact error code, timestamp, and affected component, into a short persistent note, then run /compact.", "Abandon the session and start a brand-new one, discarding everything found so far."], "correct": [2], "explanation": "Progressive summarization can silently drop specific numbers, dates, and other exact details, so pulling the critical facts into a persistent note before compacting preserves them regardless of what summarization discards. Compacting immediately without that safeguard risks losing the very details the engineer is worried about. Refusing to compact at all just delays hitting the same context ceiling later. Starting over discards hours of legitimate progress instead of preserving it."}, {"id": "P-D7-B1-14", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "Before proposing a fix, an engineer needs to find every call site of a deprecated internal auth function across a 2,000-file monorepo. They want the search performed without dozens of raw search results cluttering the main conversation they are using to plan the actual fix. What should they do?", "options": ["Run the searches directly in the main session, then manually delete the results from the transcript afterward.", "Switch the main session to a larger model tier so it can hold more raw search results without losing focus.", "Run /compact immediately after each search to hide the raw results from view.", "Delegate the search to the Explore subagent, which isolates the verbose discovery and returns a concise result back to the main session."], "correct": [3], "explanation": "The Explore subagent is built for exactly this: isolating verbose discovery work so the main session only receives a concise, usable summary instead of raw noise. Deleting results after the fact still means the main session was cluttered while the search happened. A larger model tier increases capacity but does not stop irrelevant noise from crowding out the fix-planning conversation. Compacting after each search is a repeated workaround rather than isolating the discovery work in the first place, and it still burns context temporarily."}, {"id": "P-D7-B1-15", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "medium", "question": "A tech lead is writing guidance for when engineers should use Claude Code's plan mode versus proceeding with direct execution. Which two of the following tasks are the best fit for plan mode? (Select two.)", "options": ["Redesigning the data-access layer to support a new multi-region failover architecture spanning a dozen services.", "Bumping a single dependency's patch version in one manifest file.", "Migrating the primary datastore from a relational database to a distributed NoSQL store, where multiple viable approaches exist.", "Renaming one unused local variable in a single file.", "Fixing an obviously incorrect string in a single log message."], "correct": [0, 2], "explanation": "Plan mode fits complex, architectural, multi-approach work where safe exploration before committing to a direction pays off, which describes both the multi-region failover redesign and the datastore migration with multiple viable approaches. The dependency version bump, the unused-variable rename, and the log-message fix are all simple, well-scoped changes better handled with direct execution, where planning overhead would add friction without meaningfully improving the outcome."}, {"id": "P-D7-B1-16", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A team wants to auto-generate missing docstrings across roughly 500 files. The work is not time-sensitive; it can run overnight and doesn't need to finish before anyone is waiting on it. Currently, an engineer manually runs Claude Code interactively file by file, which consumes a lot of attended time. What change would best fit this workload?", "options": ["Submit the 500 files as a single Message Batches API job, using custom_id values to correlate each file with its result, and pick up the results the next morning.", "Keep running each file interactively, but ask a second engineer to help split up the manual work.", "Switch to a larger model tier so each interactive run finishes faster.", "Have one engineer stay late to babysit an overnight interactive session covering all 500 files."], "correct": [0], "explanation": "This workload is latency-tolerant and non-blocking, which is exactly what the Message Batches API is for, and custom_id lets each file's request be matched back to its response, at roughly half the cost of synchronous calls. Splitting manual work across two engineers still consumes attended interactive time instead of eliminating it. A larger model does not address the actual problem, which is that the work is being run attended and one file at a time. Staying late to babysit an interactive session keeps a human tied to non-urgent work that doesn't require anyone to be present at all."}, {"id": "P-D7-B1-17", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "hard", "question": "To cut costs, an engineering manager proposes routing questions from a live incident-bridge chat, where engineers need answers within seconds while actively resolving an outage, through the Message Batches API, citing its roughly 50% savings. Why is this the wrong fit?", "options": ["The Message Batches API is more expensive than synchronous calls for short prompts.", "The Message Batches API has no latency SLA and can take up to 24 hours, making it unsuitable for a blocking, time-sensitive interaction like a live incident bridge.", "The Message Batches API cannot be used for any debugging-related request.", "The Message Batches API requires a larger model tier than synchronous calls."], "correct": [1], "explanation": "Batch processing trades a latency guarantee for cost savings and can take up to 24 hours to return results, so it is a poor fit for a blocking interaction where humans are actively waiting during an active outage; that work belongs on synchronous, interactive calls, with batch processing reserved for non-blocking tasks like generating a report across many past incidents afterward. The cost claim is backwards, since batch processing is cheaper, not more expensive, which is exactly why it is tempting here despite being the wrong fit. It isn't categorically barred from debugging-related content; the issue is the live, blocking nature of this particular use. Model tier is unrelated to why it doesn't fit a blocking, time-sensitive request."}, {"id": "P-D7-B1-18", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "After two recent incidents were traced back to engineers skipping steps in their own personal versions of a deploy checklist, an engineering manager wants to prevent this from recurring. What is the most effective fix?", "options": ["Ask each engineer to double check their personal checklist against their memory of the correct process before deploying.", "Have engineers email their personal checklist to a shared wiki page for reference.", "Consolidate the checklist into a single canonical slash command in the project's .claude/commands/ directory so everyone runs the identical, current steps.", "Remove slash commands from the deploy process entirely and require every step to be typed out manually each time."], "correct": [2], "explanation": "A single, version-controlled project-level command removes the drift between personal variants by giving the whole team one shared, current source of truth for the checklist. Asking engineers to rely on memory is exactly the probabilistic, error-prone pattern that caused the missed steps. Emailing personal checklists to a wiki still leaves multiple versions in circulation with no enforcement that any one of them is followed. Removing automation and going fully manual increases the chance of skipped steps rather than reducing it."}, {"id": "P-D7-B1-19", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "diffic
