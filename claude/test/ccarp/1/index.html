<style>
.wrap{max-width:900px;margin:0 auto;padding:22px 18px 80px}
h1,h2,h3{line-height:1.25;margin:0}
button{font-family:inherit;cursor:pointer}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.hidden{display:none!important}

/* top bar */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);margin-bottom:22px}
.topbar-in{max-width:900px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:650;letter-spacing:-.01em}
.brand .dot{width:16px;height:16px;border-radius:5px;background:var(--accent)}
.brand small{font-weight:500;color:var(--muted)}
.spacer{flex:1}
.timer{font-weight:650;padding:5px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);letter-spacing:.02em}
.timer.warn{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.pill{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-weight:550}
.back-link{font-size:13px;font-weight:600;color:var(--faint);text-decoration:none;white-space:nowrap}
.back-link:hover{color:var(--accent-ink)}

/* cards & buttons */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.btn{border:1px solid var(--border-2);background:var(--surface);color:var(--ink);border-radius:10px;padding:11px 18px;font-weight:600;font-size:15px;transition:.15s}
.btn:hover{border-color:var(--faint)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.lg{padding:14px 26px;font-size:16px}

/* HOME */
.hero{padding:30px 30px 26px}
.hero h1{font-size:27px;letter-spacing:-.02em}
.hero p.sub{color:var(--muted);margin:9px 0 0;font-size:15.5px}
.section-label{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:26px 4px 11px}
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cert-card{padding:18px 18px 16px;text-align:left;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius);transition:.15s;position:relative}
.cert-card:hover{border-color:var(--accent-d)}
.cert-card.sel{border-color:var(--accent);box-shadow:0 0 0 3px #cc7a5c22}
.cert-card .code{font-weight:750;font-size:15px}
.cert-card .full{font-size:13.5px;color:var(--muted);margin-top:2px}
.cert-card .meta{font-size:13px;color:var(--faint);margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:650;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--muted)}
.len-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.len-card{padding:16px;text-align:center;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius);transition:.15s}
.len-card:hover{border-color:var(--accent-d)}
.len-card.sel{border-color:var(--accent);box-shadow:0 0 0 3px #cc7a5c22}
.len-card .n{font-size:23px;font-weight:750;letter-spacing:-.02em}
.len-card .l{font-size:13px;color:var(--muted);margin-top:2px}
.start-row{display:flex;align-items:center;gap:16px;margin-top:26px}
.disclaimer{font-size:12.5px;color:var(--faint);margin-top:24px;line-height:1.5}
.domain-list{margin-top:10px;font-size:13.5px;color:var(--muted)}
.domain-list div{display:flex;justify-content:space-between;padding:5px 2px;border-bottom:1px dashed var(--border)}
.domain-list div:last-child{border-bottom:0}

/* QUIZ */
.qtop{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.progress{flex:1;min-width:160px;height:8px;background:var(--border);border-radius:20px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
.qcount{font-size:13.5px;color:var(--muted);font-weight:600;white-space:nowrap}
.qcard{padding:26px 26px 22px}
.qbadges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{font-size:11.5px;font-weight:650;border-radius:6px;padding:3px 9px;border:1px solid var(--border)}
.badge.dom{background:#f2eef8;border-color:#e0d6ef;color:#6b4ba0}
.badge.type{background:#eef4f2;border-color:#cfe4dc;color:#2f7a52}
.badge.diff-easy{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.badge.diff-medium{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.badge.diff-hard{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.qtext{font-size:18px;line-height:1.5;font-weight:550;letter-spacing:-.01em;white-space:pre-wrap}
.hint{font-size:13px;color:var(--accent-ink);font-weight:600;margin:12px 0 0}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1.5px solid var(--border);border-radius:11px;background:var(--surface);transition:.12s;text-align:left;width:100%}
.opt:hover{border-color:var(--accent-d);background:var(--surface-2)}
.opt.chosen{border-color:var(--accent);background:#cc7a5c12}
.opt .box{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;margin-top:1px}
.opt.radio .box{border-radius:50%}
.opt.chosen .box{background:var(--accent);border-color:var(--accent)}
.opt .txt{flex:1;font-size:15.5px;line-height:1.5}
.qnav{display:flex;gap:10px;margin-top:22px;align-items:center;flex-wrap:wrap}
.flagbtn{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--border-2);border-radius:9px;padding:9px 14px}
.flagbtn.on{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}

/* navigator */
.navigator{margin-top:16px;padding:16px 18px}
.navigator h3{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.grid-nums{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:8px}
.gn{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-weight:650;font-size:13.5px;color:var(--muted);position:relative}
.gn:hover{border-color:var(--faint)}
.gn.answered{background:#cc7a5c18;border-color:var(--accent-d);color:var(--accent-ink)}
.gn.current{outline:2px solid var(--accent);outline-offset:1px}
.gn.flagged::after{content:"";position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--amber);border:1.5px solid #fff}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:14px}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(30,25,20,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{max-width:460px;width:100%;padding:24px;border-radius:16px;background:var(--surface);box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{font-size:19px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14.5px;margin:0 0 8px}
.modal .stats{display:flex;gap:10px;margin:16px 0 20px}
.modal .stats > div{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 6px}
.modal .stats b{display:block;font-size:20px}
.modal .stats small{font-size:11.5px;color:var(--muted)}
.modal-row{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* RESULTS */
.res-hero{padding:28px 30px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.ring{flex:none}
.res-head h2{font-size:22px;letter-spacing:-.02em}
.res-head .verdict{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:6px 14px;border-radius:20px;margin-top:10px}
.res-head .verdict.pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.res-head .verdict.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.res-head .sub{color:var(--muted);font-size:14px;margin-top:10px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.stat{padding:15px 16px}
.stat .k{font-size:12px;color:var(--faint);font-weight:650;text-transform:uppercase;letter-spacing:.05em}
.stat .v{font-size:22px;font-weight:750;letter-spacing:-.02em;margin-top:3px}
.dom-break{padding:20px 22px;margin-top:16px}
.dom-break h3{font-size:16px;margin-bottom:4px}
.dom-break .cap{color:var(--muted);font-size:13.5px;margin-bottom:16px}
.dbar{margin:13px 0}
.dbar .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;gap:10px}
.dbar .top b{font-weight:600}
.dbar .top .sc{font-weight:700;white-space:nowrap}
.track{height:10px;background:var(--border);border-radius:20px;overflow:hidden}
.track > i{display:block;height:100%;border-radius:20px;transition:width .5s}

/* review */
.rev-tools{display:flex;gap:9px;align-items:center;margin:22px 2px 12px;flex-wrap:wrap}
.filterbtn{font-size:13.5px;font-weight:600;border:1px solid var(--border-2);background:var(--surface);border-radius:20px;padding:7px 15px;color:var(--muted)}
.filterbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
.rev{padding:22px 24px;margin-bottom:14px}
.rev .rq{font-size:16.5px;font-weight:550;line-height:1.5;margin:12px 0 16px;white-space:pre-wrap}
.rev-opt{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:9px;font-size:15px;line-height:1.5}
.rev-opt .ic{flex:none;font-weight:800;width:20px;text-align:center;margin-top:1px}
.rev-opt.correct{background:var(--green-bg);border-color:var(--green-bd)}
.rev-opt.correct .ic{color:var(--green)}
.rev-opt.wrong{background:var(--red-bg);border-color:var(--red-bd)}
.rev-opt.wrong .ic{color:var(--red)}
.rev-opt .lab{font-size:11.5px;font-weight:700;margin-left:8px;padding:1px 7px;border-radius:5px;white-space:nowrap}
.rev-opt.correct .lab{background:var(--green);color:#fff}
.rev-opt.wrong .lab{background:var(--red);color:#fff}
.expl{margin-top:14px;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:14.5px;line-height:1.6}
.expl b{color:var(--accent-ink)}
.rev-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.outcome{font-size:12.5px;font-weight:750;padding:3px 10px;border-radius:20px;white-space:nowrap}
.outcome.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.outcome.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.footer-actions{display:flex;gap:12px;justify-content:center;margin:30px 0 10px;flex-wrap:wrap}

@media(max-width:640px){
  .cert-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr}
  .hero{padding:24px 20px}
  .qcard,.rev{padding:20px 18px}
  .res-hero{padding:22px 20px}
}

<script id="qbank" type="application/json">[{"id": "P-D1-B1-01", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A regional bank's contact center has an average handle time (AHT) of 9 minutes per call. Leadership tells the solution architect, 'Use AI to make agents faster,' and the architect is drafting the outcome statement for the initial Claude-based agent-assist proposal. Which framing of the proposed outcome would best support a credible, trackable business case?", "options": ["Deploy a Claude-based agent-assist tool to reduce average handle time from 9 minutes to 6 minutes within two quarters, tracked through the existing call-timing dashboard.", "Deploy a Claude-based agent-assist tool so agents feel more confident and supported during calls.", "Deploy the most capable model tier available so call quality is maximized regardless of handle time.", "Deploy a five-subagent orchestration system so every aspect of the call transcript is analyzed in parallel."], "correct": [0], "explanation": "Stating a specific baseline (9 minutes), a target (6 minutes), a timeframe (two quarters), and an existing tracking mechanism is what turns a vague mandate into a business case leadership can approve and later verify. Framing the outcome around agents 'feeling more confident' is a subjective sentiment with no way to measure success or ROI. Maximizing model capability regardless of handle time ignores the stated business objective and adds cost without addressing the metric leadership actually cares about. Committing to a five-subagent architecture before the problem is even quantified is over-engineering that adds complexity the stated problem does not justify."}, {"id": "P-D1-B1-02", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A regional insurer's claims adjusters each close an average of 14 claims per week. Leadership will not add headcount but wants a Claude-based claims-summarization and drafting assistant so each adjuster can close more claims per week; the underlying review and approval steps stay the same. Which business value pillar does this initiative primarily target?", "options": ["Cost reduction", "Productivity", "Transformation", "Performance/SLA improvement"], "correct": [1], "explanation": "The stated goal is more output (claims closed) from the same existing workforce doing the same job, which is the definition of a productivity gain. No dollar-spend target is given, so cost reduction is not the primary framing even though flat headcount may be a secondary side effect. Transformation would require a new capability or business model, not the same claims process executed faster. Performance/SLA improvement would require a stated customer-facing latency, turnaround, or uptime commitment, which is not mentioned here."}, {"id": "P-D1-B1-03", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A bank is launching a Claude-based buy-now-pay-later underwriting product that did not previously exist in its portfolio, using Claude to interpret unstructured applicant data and draft underwriting narratives for a customer segment the bank has never served. Which pillar best characterizes this initiative, and how does it differ from simply speeding up the bank's existing personal-loan underwriting process?", "options": ["Efficiency, because it removes manual data-entry steps from underwriting", "Productivity, because underwriters will process more applications per day", "Transformation, because it creates a new product and revenue line rather than optimizing a workflow that already exists", "Cost, because underwriting labor spend will decrease"], "correct": [2], "explanation": "Entering a new market segment with a product the bank never offered before is a new business capability, which is the hallmark of transformation rather than optimization of an existing process. Efficiency and productivity both describe doing the current job with less waste or higher throughput, but this initiative is not accelerating the existing personal-loan process: it is creating one that did not exist. A cost framing would require the initiative to be justified primarily by underwriting labor savings, but the scenario is about a new capability and market, not trimming existing spend."}, {"id": "P-D1-B1-04", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A corporate legal department wants a Claude-based first-pass contract review assistant. The solution architect is preparing the measurable-outcome section of the business case for the General Counsel and CFO. Which three elements should that section include?", "options": ["A commitment to use the largest available model tier regardless of cost, to guarantee maximum output quality", "The current average time and cost to complete a first-pass review of a standard contract (the baseline)", "The target reduction in review time or cost, with a delivery timeframe", "A requirement that the tool eventually replace the entire contract review function", "A defined method for measuring the metric after deployment, such as timestamps already captured in the contract management system"], "correct": [1, 2, 4], "explanation": "A defensible measurable-outcome section needs a baseline to compare against, a specific target with a timeframe, and a concrete way to measure progress after launch: without these three, the CFO has no way to evaluate whether the initiative delivered value. Mandating the largest model regardless of cost is a technology-first commitment that has nothing to do with defining a measurable outcome and works against the cost side of the business case. Promising eventual replacement of the entire review function overstates scope and turns a measurable pilot into an unfounded headcount claim the data collected so far cannot support."}, {"id": "P-D1-B1-05", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "An e-commerce company's support chat carries a contractual SLA of sub-2-second p95 response time and 99.9% monthly uptime with its enterprise customers. The engineering lead proposes routing every query (including simple order-status lookups) through the company's most capable and slowest model tier, arguing this 'guarantees the best possible answer every time.' What is the most significant risk this proposal creates relative to the company's stated business goals?", "options": ["It produces answers that are too short for enterprise customers to find useful", "It removes the need for any post-launch monitoring of the chat system", "It eliminates the possibility of prompt injection in customer messages", "It optimizes for peak answer quality on every request while risking the contractual latency SLA and inflating cost on requests that do not need that level of reasoning"], "correct": [3], "explanation": "Routing every request through the slowest, most expensive tier regardless of complexity trades away the latency SLA the company is contractually bound to and drives up cost on simple lookups that never needed deep reasoning: a mismatch between the solution and the stated performance/SLA and cost pillars. Answer length is not implied by model tier and is not the risk described. Model choice has no bearing on whether monitoring is still required after launch, and it does nothing to reduce prompt injection risk, which is a separate security concern unrelated to which tier answers a query."}, {"id": "P-D1-B1-06", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A VP of Operations tells the solution architect, 'Our support team is overwhelmed; go build something with Claude to fix it,' without further detail. What should the architect do first, before proposing an architecture?", "options": ["Quantify the current state (ticket volume, handle time, backlog, cost per ticket) and agree on a measurable target with the VP", "Draft a multi-agent architecture diagram to present at the next steering committee meeting", "Select the most capable model tier available so the solution is future-proofed", "Write the system prompt and guardrails, then work out afterward what problem they solve"], "correct": [0], "explanation": "A vague mandate has to be translated into numbers before any architecture decision makes sense: without a baseline and an agreed target, there is no way to design a proportionate solution or later prove it worked. Producing an architecture diagram before the problem is quantified risks designing for the wrong problem or the wrong scale. Picking the most capable model 'to be safe' is a technology-first decision made before any requirement justifies it. Writing prompts and guardrails before the target outcome is defined means the artifacts have no measurable objective to be built against."}, {"id": "P-D1-B1-07", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "A logistics company's transformation office is deciding which of five proposed Claude-based initiatives should be funded from the transformation budget rather than the continuous-improvement budget used for efficiency, productivity, and cost projects. Select the two initiatives that belong in the transformation budget.", "options": ["Auto-filling routine dispatcher paperwork fields to shave two minutes off each shipment intake", "A new Claude-powered dynamic-pricing and capacity-brokering product offered to shippers, a service the company has never sold before", "Summarizing driver check-in call transcripts so dispatchers can process more check-ins per hour", "A conversational freight-matching marketplace that lets shippers describe loads in natural language, opening a revenue channel the company has never offered", "Shortening an existing routing prompt's token footprint to reduce model spend"], "correct": [1, 3], "explanation": "The dynamic-pricing and capacity-brokering product and the conversational freight-matching marketplace both create offerings and revenue channels that did not exist in the company's portfolio before, which is what distinguishes transformation from optimizing current operations. Auto-filling paperwork fields is a small efficiency gain on an existing intake step, not a new capability. Summarizing call transcripts to process more check-ins per hour increases throughput on an unchanged task, which is a productivity gain. Trimming a prompt's token footprint to cut spend is a cost optimization on infrastructure that already exists, not a new business capability."}, {"id": "P-D1-B1-08", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A hospital network wants a Claude-based tool to help nurses draft encounter documentation. The initiative must cut average documentation time per encounter, reduce the overtime pay currently required to finish notes, and meet a state-mandated requirement that charts be completed within 24 hours of the encounter. The clinical workflow itself (what nurses assess and document) does not change. Select the three business value pillars this initiative simultaneously advances.", "options": ["Transformation", "Efficiency", "Productivity", "Cost", "Performance/SLA"], "correct": [1, 3, 4], "explanation": "Cutting documentation time per encounter without changing the clinical workflow removes waste from an existing process, which is efficiency. Reducing overtime pay is a direct dollar-spend reduction, which is cost. Meeting the 24-hour chart-completion deadline is a compliance-linked service-level target, which is performance/SLA. Transformation does not apply because no new clinical capability or business model is introduced: the same documentation task is simply done faster and cheaper. Productivity is not the best fit either, since the goal as stated is reducing time and cost per existing encounter rather than increasing the number of encounters or notes each nurse produces."}, {"id": "P-D1-B1-09", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A financial services firm's five-person compliance team currently reviews a fixed monthly volume of regulatory filings by hand, spending significant time on repetitive verification steps. Leadership wants the same five-person team to review a larger volume of filings each month using a Claude-based review assistant, with no change to the required verification steps themselves and no stated dollar or latency target. Select the two business value pillars this initiative primarily advances.", "options": ["Cost", "Transformation", "Productivity", "Performance/SLA", "Efficiency"], "correct": [2, 4], "explanation": "Reviewing a larger volume of filings with the same five people increases output per worker, which is productivity, while removing time spent on repetitive verification steps reduces waste in the existing process, which is efficiency: both apply because the scenario combines higher throughput with less per-filing effort. There is no stated dollar savings target, so cost is not the primary pillar here even though it may be a downstream effect. The review function and its required steps are unchanged, so this is not transformation. No latency, turnaround, or uptime commitment is mentioned, so performance/SLA is not supported by the scenario."}, {"id": "P-D1-B1-10", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A telecom's IT helpdesk resolves 40,000 tier-1 tickets per month at an average cost of $12 per ticket. The architect proposes a Claude-based assistant projected to deflect 25% of tickets to self-service at a fully loaded cost of $2 per deflected interaction. Which outcome statement most directly demonstrates business value using the numbers already given?", "options": ["The helpdesk will feel more modern and responsive to employees.", "Deflecting 10,000 tickets per month at $2 instead of $12 each saves roughly $100,000 per month in support cost.", "Ticket deflection will free the team to pursue other unspecified initiatives.", "Using Claude for helpdesk tickets is inherently more cost-effective than any human-staffed process."], "correct": [1], "explanation": "Multiplying the deflected ticket volume (25% of 40,000 = 10,000) by the per-ticket cost difference ($12 minus $2) produces a concrete monthly savings figure that leadership can verify against actual invoices, which is exactly what a cost-pillar business case needs. Describing the helpdesk as 'feeling more modern' is a subjective impression, not a measurable outcome. Pointing to freed-up time for unspecified future initiatives does not quantify any value from this project. Claiming Claude is inherently more cost-effective than any human process is an unsupported generalization that ignores the specific numbers already available in the scenario."}, {"id": "P-D1-B1-11", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A manufacturer's supply-chain team manually reviews shipment exceptions (delays, damaged-goods reports, customs holds), a process that takes an analyst 20 minutes per exception today. A Claude-based assistant is proposed to draft the initial exception assessment and recommended next step for the analyst to approve, cutting review time to an estimated 7 minutes without changing who has authority to resolve the exception. Which pillar does this initiative primarily target, and why is it not transformation?", "options": ["Transformation, because it introduces AI into a process that previously had none", "Performance/SLA, because it introduces a formal customer-facing response-time commitment", "Efficiency, because it removes time and manual effort from an existing exception-handling process without changing the process or who performs it", "Productivity, because analysts will resolve more exceptions per shift"], "correct": [2], "explanation": "Cutting review time per exception on a process whose steps and decision authority stay the same is a textbook efficiency gain: waste is removed from an existing workflow. Introducing AI into a previously manual step does not by itself make something transformation; transformation requires a new capability or business model, not a new tool applied to an old task. Productivity is a plausible secondary effect if throughput per analyst rises, but the scenario frames the change around time per exception, which is efficiency, not a stated increase in exceptions resolved per shift. No customer-facing SLA commitment is described, so performance/SLA does not apply."}, {"id": "P-D1-B1-12", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A law firm's litigation support team manually reviews discovery documents for relevance, completing roughly 150 documents per reviewer per day. The firm wants a Claude-based first-pass relevance triage tool so reviewers can focus only on documents flagged as likely relevant. Which metric would best define a measurable productivity outcome for this initiative?", "options": ["The number of distinct prompt templates created for the triage tool", "The total number of documents stored in the discovery database", "Whether the legal team feels the tool is easy to use", "Documents triaged to final relevance determination per reviewer per day, before and after deployment"], "correct": [3], "explanation": "Comparing documents brought to a relevance determination per reviewer per day before and after deployment directly measures the throughput gain the initiative is meant to produce, which is the definition of a productivity metric. The number of prompt templates built is an implementation detail, not a business outcome. The total size of the discovery database is a fixed fact about the case, not something the tool changes or that reflects reviewer output. Ease-of-use sentiment may be useful qualitative feedback, but it is not a measurable productivity outcome on its own."}, {"id": "P-D1-B1-13", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A retail chain's VP of Customer Experience says, 'I want AI to transform our returns process.' Returns currently take 4 days on average from customer request to refund issuance, at a support cost of $6 per return. Which outcome statement should the architect propose back to the VP to make the initiative measurable?", "options": ["Reduce average return-to-refund time from 4 days to 1 day and support cost per return from $6 to $3, tracked through the existing returns platform, within one quarter.", "Transform the returns experience using the most advanced AI available.", "Make customers happier about returns.", "Automate returns completely so no human ever needs to be involved."], "correct": [0], "explanation": "Converting the VP's vague language into specific baseline and target figures for both time and cost, with a timeframe and an existing tracking system, is what makes the initiative measurable and approvable. 'Using the most advanced AI available' is a technology commitment, not an outcome, and says nothing about what will actually improve. 'Making customers happier' has no defined measurement and cannot be tied to ROI. Promising full automation with zero human involvement overcommits to a scope the current numbers do not require and removes any human check on refund decisions."}, {"id": "P-D1-B1-14", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "During major weather disruptions, an airline's rebooking call volume spikes 6x within hours, and its contractual SLA with a fare-partner network requires rebooking confirmations within 15 minutes of a cancellation. The architect must design a Claude-based rebooking assistant that keeps this SLA intact during disruption spikes. Which consideration is most critical to the business goal?", "options": ["The solution should use the largest model tier at all times so answers are as thorough as possible", "The solution must maintain the 15-minute confirmation SLA under peak disruption load, not just under normal daily volume", "The solution should prioritize minimizing token usage above all other goals", "The solution should be redesigned only after the next disruption event reveals problems"], "correct": [1], "explanation": "An SLA that is only tested and met under normal volume is not actually validated against the business commitment; the whole point of this SLA is that it must hold during the 6x spike, so capacity and performance under peak load are the critical design constraint. Defaulting to the largest model tier at all times does not address load handling and adds latency and cost that could threaten the very SLA it claims to protect. Minimizing token usage above every other goal subordinates the SLA to a cost concern the business did not prioritize. Waiting for the next real disruption to discover problems is a reactive approach that risks breaching a contractual SLA that was foreseeable and should be designed and load-tested for in advance."}, {"id": "P-D1-B1-15", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "An HR team currently spends significant staff time answering repetitive new-hire questions (benefits enrollment deadlines, IT setup steps, policy lookups) by email, without a formal SLA for reply time. A Claude-based onboarding assistant is proposed to answer these questions instantly. The HR director wants the pillar framing to be accurate for a leadership readout. Which framing is most accurate?", "options": ["Cost reduction: the initiative directly lowers the HR department's budget line", "Performance/SLA: the initiative is designed to meet a newly signed contractual reply-time commitment", "Efficiency: the initiative removes repetitive manual work from an existing process rather than reducing net headcount cost or creating a new HR capability", "Transformation: the initiative creates an entirely new onboarding function that did not exist before"], "correct": [2], "explanation": "Removing repetitive manual answering from an existing onboarding process, without a stated budget reduction target, new capability, or contractual commitment, is best framed as efficiency. Calling it cost reduction overstates the case, since no budget-line target was given: the value here is staff time redirected, which is efficiency, not a proven dollar savings. It is not transformation, because onboarding as a function already existed and is only being made faster, not reinvented. There is no SLA mentioned in the scenario, so framing it as an SLA initiative invents a commitment that was never stated."}, {"id": "P-D1-B1-16", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A pharmaceutical company currently spends 8 weeks per product per market drafting the narrative sections of regulatory submissions by hand, a process bottleneck that delays market entry. The company proposes a Claude-based drafting assistant to compress this to 3 weeks, enabling it to file in markets it previously could not prioritize due to staffing limits, expanding its addressable launch markets. Which framing best captures the primary business value, and why does 'efficiency' understate it?", "options": ["Efficiency, because it only reduces the time spent on an existing task", "Productivity, because writers will draft more submissions per week", "Cost, because fewer regulatory writers will be required", "Transformation, because faster drafting removes a staffing bottleneck that was constraining which markets the company could enter at all, expanding what the business can do rather than just how fast it does today's work"], "correct": [3], "explanation": "When compressing a task's duration removes a hard constraint on which markets the company can even attempt to enter, the value goes beyond doing the same work faster: it expands business reach, which is the hallmark of transformation. Calling it efficiency captures the time reduction but misses the stated consequence of unlocking previously unreachable markets. Productivity would apply if the goal were simply more submissions drafted per writer per week, but the scenario emphasizes market access, not raw throughput. A cost framing centered on headcount reduction is not supported by the scenario, which describes reallocating capacity toward new markets rather than cutting staff."}, {"id": "P-D1-B1-17", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A utility's outage-reporting call volume can spike from a normal 500 calls/day to over 15,000 calls/day during a major storm, and state regulations require customers to receive an estimated restoration time within 5 minutes of reporting an outage. Leadership asks the architect to prioritize the pillar most at risk during storm events. Which pillar should be the primary design driver for this initiative?", "options": ["Performance/SLA, because the regulatory response-time commitment must hold at 30x normal volume, not just on a typical day", "Cost, because storm events are rare and the primary concern should be minimizing average daily spend", "Productivity, because the goal is for call center staff to handle more calls per hour during a storm", "Transformation, because outage reporting is a new capability for the utility"], "correct": [0], "explanation": "The regulatory 5-minute commitment is the binding constraint precisely when volume surges 30x, so designing for peak-load performance against that SLA is the primary driver: a solution that only works at normal volume fails the actual business requirement. Optimizing for average daily cost ignores that the storm scenario, not the typical day, is when the commitment is tested and at risk of being breached. Productivity framed as calls handled per staff-hour is a secondary lever, not the primary constraint, since the regulatory clock applies regardless of staffing levels. Outage reporting is an existing utility function, not a new one, so transformation does not apply."}, {"id": "P-D1-B1-18", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A marketing team currently has copywriters produce 20 social captions per day each, and a Claude-based drafting assistant is proposed so each copywriter can produce 60 first-draft captions per day for human review and edit, with no change to the review/approval process or budget. Which pillar does this best align to, and which pillar would be incorrect to claim without further evidence?", "options": ["Cost reduction is the accurate claim; productivity would be incorrect since output volume does not matter", "Productivity is the accurate claim; cost reduction would be incorrect without a stated budget or headcount change", "Transformation is the accurate claim; productivity would be incorrect since the review process is unchanged", "Performance/SLA is the accurate claim; productivity would be incorrect since no throughput metric was given"], "correct": [1], "explanation": "Tripling first-draft output per copywriter with the review process and budget unchanged is a direct throughput gain, which is productivity; claiming a cost reduction would be unsupported because no budget line or headcount change was described. It would be inaccurate to call this transformation, since captioning is an existing marketing function only being made faster, not a new capability. It would also be inaccurate to call this performance/SLA, since no latency, uptime, or contractual response-time commitment is part of the scenario: a specific throughput number (20 to 60 drafts per day) was given, which is precisely a productivity metric, not the absence of one."}, {"id": "P-D1-B1-19", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A procurement department currently pays $4.50 per invoice for manual three-way matching (invoice, purchase order, receipt) across 200,000 invoices per year, with an estimated 3% error rate leading to overpayments. A Claude-based matching assistant is projected to cut the manual cost to $1.20 per invoice and reduce the error rate to 0.5%. Which outcome statement best translates this into a business case leadership can approve?", "options": ["The initiative will make the procurement department more data-driven.", "The initiative will allow the procurement team to stop reviewing invoices altogether.", "The initiative is projected to save roughly $660,000 per year in processing cost and reduce overpayment risk by cutting the error rate from 3% to 0.5% across 200,000 invoices.", "The initiative should proceed because automation is generally cheaper than manual review."], "correct": [2], "explanation": "Computing the processing cost savings (200,000 times the $3.30 per-invoice difference) and stating the error-rate improvement gives leadership two concrete, verifiable figures tied directly to cost and risk, which is what a business case needs. 'More data-driven' is a vague characterization with no measurable content. Claiming the team can stop reviewing invoices altogether overstates the scope implied by an error-rate reduction to 0.5%, which still requires oversight, not zero review. 'Automation is generally cheaper' is a generic claim that ignores the specific numbers already available and would not survive scrutiny from a finance stakeholder."}, {"id": "P-D1-B1-20", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "A government agency currently requires citizens to renew a business license only in person, a process that takes an average of 45 minutes per visit and creates a backlog during peak season. The agency is launching a Claude-based conversational service that lets citizens renew licenses online for the first time, must complete each renewal within a state-mandated 5-business-day processing window, and is also expected to clear the existing seasonal backlog faster than staff can today. Select the three business value pillars this modernization program simultaneously advances.", "options": ["Cost", "Performance/SLA", "Productivity", "Transformation", "Efficiency"], "correct": [1, 3, 4], "explanation": "Offering online renewal for a service that previously required an in-person visit creates a channel and capability the agency never had, which is transformation. Clearing the existing backlog faster than current staff can shows waste being removed from the existing renewal process, which is efficiency. Meeting the state-mandated 5-business-day processing window is a compliance-linked service commitment, which is performance/SLA. No budget or staffing cost target is stated, so cost is not directly supported by the scenario. Productivity is not the best fit either, since the scenario does not state that the same staff will process a higher volume per person: it describes a new channel and a backlog being cleared, not a stated per-worker throughput target."}, {"id": "P-D1-B1-21", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A wealth management firm's advisors spend roughly 45 minutes before each client meeting manually compiling portfolio performance, recent transactions, and relevant market news into briefing notes. A Claude-based assistant is proposed to auto-generate a first-draft briefing so advisors can review and personalize it in 10 minutes instead. Which pillar does this initiative most directly serve?", "options": ["Transformation", "Performance/SLA", "Governance", "Productivity"], "correct": [3], "explanation": "Cutting the prep time per meeting so each advisor can complete more meeting preparation in less time increases the output advisors can produce in a given period, which is productivity. It is not transformation, since meeting preparation is an existing advisor task being accelerated, not a new capability or offering. No client-facing latency, uptime, or contractual commitment is described, so performance/SLA does not apply. Governance is not a business value pillar in this framework at all: it describes risk and compliance controls, not a measurable business outcome."}, {"id": "P-D1-B1-22", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A regional health plan's prior-authorization requests currently take an average of 6 business days to resolve, and providers have escalated complaints about delayed patient care. The health plan commits to a new internal service target of resolving 90% of routine prior-authorization requests within 24 hours using a Claude-based triage and drafting assistant for reviewers. Which pillar framing and success metric pairing is most appropriate for this initiative?", "options": ["Performance/SLA, measured as the percentage of routine requests resolved within the 24-hour target each month", "Cost, measured as the total software licensing spend on the new assistant", "Transformation, measured as the number of new product lines launched", "Productivity, measured as the number of prompt iterations completed during development"], "correct": [0], "explanation": "A stated turnaround-time commitment (90% within 24 hours) is precisely a service-level target, so tracking the percentage of requests meeting that window each month is the correct performance/SLA metric directly tied to the stated goal. Licensing spend is an input cost, not a measure of whether the turnaround commitment is being met. No new product line is being introduced, so transformation and a product-count metric do not fit. Counting prompt iterations during development measures build effort, not a business outcome, and is unrelated to whether patients and providers are experiencing faster resolutions."}, {"id": "P-D1-B1-23", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A sales organization wants Claude-generated first-draft proposals for every inbound RFP. Finance wants per-proposal generation cost minimized, while the sales VP wants every proposal available within minutes of an RFP arriving so reps can respond before competitors. The architect must design one solution that best balances both stated priorities. Which approach best balances the cost and performance/SLA pillars in tension here?", "options": ["Use the most capable and slowest model tier for every RFP to maximize proposal quality, and address Finance's concern separately later", "Use a faster, lower-cost model tier for the majority of routine RFPs and reserve a slower, more expensive tier only for unusually complex proposals that clearly need deeper reasoning", "Use the fastest, cheapest model tier for every RFP regardless of complexity to guarantee minutes-level turnaround at the lowest possible cost", "Batch all RFP responses overnight using the Message Batches API so cost is minimized and quality is maximized"], "correct": [1], "explanation": "Matching model tier to task complexity (fast and inexpensive for routine RFPs, more capable only where genuinely needed) directly serves both stated priorities: most proposals stay cheap and most stay fast, while quality is preserved where complexity actually requires it. Defaulting to the most capable tier for everything ignores Finance's cost priority and treats it as an afterthought rather than a design input. Defaulting to the cheapest, fastest tier for everything risks quality on genuinely complex RFPs, which could cost the business the deal the speed was meant to help win. Batch processing has no latency guarantee and can take hours, which directly conflicts with the sales VP's minutes-level turnaround requirement: it is the wrong mechanism whenever a human is waiting on the result."}, {"id": "P-D1-B1-24", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A CIO tells the architect, 'I want us to be innovative; put Claude on our roadmap for next year,' with no specific process, metric, or budget mentioned. Which response best serves both the business and the eventual success of the initiative?", "options": ["Agree immediately and begin drafting a multi-agent architecture so the roadmap slide is ready for the next board meeting", "Decline to proceed until the CIO provides a fully specified technical architecture", "Ask the CIO to identify one or two specific business processes and their current pain points, then jointly define measurable targets before scoping any solution", "Select the most capable model tier across the board so the roadmap can claim maximum innovation"], "correct": [2], "explanation": "Turning a vague innovation mandate into one or two concrete processes with agreed measurable targets is what makes the eventual solution scoped, fundable, and provable: it is the necessary translation step between a business aspiration and an architecture decision. Jumping straight to a multi-agent architecture before any process or metric is identified risks building an over-engineered solution to an undefined problem just to have something to present. Refusing to proceed until the CIO produces a full technical architecture misunderstands the architect's own role: translating business intent into a scoped solution is the architect's job, not the CIO's. Selecting the most capable model tier as a proxy for 'innovation' is a technology-first decision disconnected from any business outcome."}, {"id": "P-D1-B1-25", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A manufacturer's quality team drafts a business case for a Claude-based tool that summarizes inspection-line camera logs into daily defect reports, currently a 2-hour manual task per shift. Five candidate outcome statements are proposed for the executive summary. Select the two statements that are well-formed, measurable outcomes suitable for that summary.", "options": ["Improve overall quality culture across the plant.", "Reduce daily defect-report drafting time from 2 hours to 20 minutes per shift, verified by timestamps in the shift-log system, within one quarter.", "Leverage cutting-edge AI to modernize the inspection process.", "Give supervisors more visibility into what is happening on the line.", "Cut the defect-report false-negative rate (missed defects) from an estimated 4% to under 1%, validated against a sampled audit of 200 reports per month."], "correct": [1, 4], "explanation": "The drafting-time statement and the false-negative-rate statement each specify a baseline, a numeric target, and a concrete way to verify the result after deployment, which is exactly what makes an outcome measurable and defensible to an executive audience. 'Improve overall quality culture' has no defined metric or measurement method and cannot be tracked. 'Leverage cutting-edge AI to modernize' describes a technology aspiration, not a business outcome. 'Give supervisors more visibility' is a plausible-sounding benefit but, as written, has no baseline or number attached to show whether it was achieved."}, {"id": "P-D1-B1-26", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A media company currently subtitles 200 hours of video content per week using human translators, at a pace that limits how many titles it can localize into secondary languages before release. A Claude-based first-pass subtitling and translation assistant is proposed so the same translator team can review and finalize subtitles for 500 hours per week. Which outcome statement best reflects a measurable pillar-aligned result?", "options": ["Make the localization team feel more empowered by modern tooling.", "Ensure translators never have to review AI-generated subtitles.", "Use the largest available model for every language pair regardless of volume or deadline.", "Increase weekly subtitle throughput per translator team from 200 to 500 hours of finalized content, tracked through the existing localization pipeline."], "correct": [3], "explanation": "Stating the current throughput (200 hours/week), the target (500 hours/week), and an existing tracking mechanism directly measures the productivity gain the initiative is meant to produce for the same team. Team sentiment about feeling empowered is not a measurable business outcome. Requiring translators to never review AI output contradicts the stated design (translators review and finalize) and would remove the quality check the business needs. Mandating the largest model regardless of volume or deadline is a technology-first commitment unrelated to the stated throughput goal and would work against cost and turnaround."}, {"id": "P-D1-B1-27", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A public company's finance team drafts narrative sections (MD&A commentary) for quarterly filings, a process where a single material error could trigger restatement risk and regulatory scrutiny. A Claude-based drafting assistant is proposed to accelerate this work. The architect must decide how proportionate the accuracy investment (model tier, review depth, verification steps) should be relative to a routine internal weekly sales summary the same team also produces. Which approach is most appropriate?", "options": ["Invest more heavily in the higher-accuracy configuration and human review for the quarterly filing narrative than for the routine weekly sales summary, proportionate to each task's business and regulatory stakes", "Apply the identical model tier, review depth, and verification steps to both the quarterly filing narrative and the weekly sales summary for consistency", "Minimize cost and review depth on the quarterly filing narrative first, since it is produced less frequently than the weekly summary", "Apply the same minimal review to both, since Claude-generated drafts are always reviewed by a human before publication regardless of task"], "correct": [0], "explanation": "Matching the level of accuracy investment (model capability, review depth, verification) to what is actually at stake is the proportionate, business-aligned choice: a quarterly filing with restatement and regulatory risk warrants materially more rigor than a routine internal summary. Applying identical treatment to both tasks 'for consistency' ignores that their business stakes are not equal and either over-invests in the low-stakes summary or under-invests in the high-stakes filing. Minimizing review specifically on the filing because it happens less often inverts the risk logic: frequency is not the same as stakes, and this is the highest-risk artifact in the scenario. Assuming a human review step alone is sufficient regardless of task ignores that review depth and rigor still need to scale with the artifact's consequences; a light review is not equivalent to a rigorous one."}, {"id": "P-D1-B1-28", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A company's security operations center (SOC) currently takes a median of 35 minutes to triage a new alert, and the SOC's internal mean-time-to-respond (MTTR) target (tied to a cyber-insurance requirement) is 15 minutes for high-severity alerts. A Claude-based triage assistant is proposed to draft an initial severity assessment and recommended next action for the analyst on duty. Which measurable outcome framing best aligns this initiative to the pillar actually at risk?", "options": ["Cost: reduce the SOC's software licensing budget by the largest amount possible", "Performance/SLA: reduce median high-severity alert triage time from 35 to under 15 minutes, tracked in the existing SOC ticketing system, to meet the insurance-linked MTTR requirement", "Transformation: replace the SOC function entirely with an autonomous triage system", "Productivity: increase the number of low-severity alerts closed per analyst per shift"], "correct": [1], "explanation": "The scenario explicitly ties a contractual, insurance-linked time requirement to high-severity alert triage, so the measurable outcome that matters is closing the gap between the current 35-minute median and the 15-minute MTTR target, which is a performance/SLA framing. Minimizing licensing cost is not the stated driver and could work against getting triage time down if it means a weaker tool. Full replacement of the SOC function is a scope far beyond what is described: the assistant drafts an assessment for the analyst, who remains in the loop. Framing this around low-severity alert volume misses the point entirely, since the stated business risk is specifically about high-severity MTTR, not general alert throughput."}, {"id": "P-D1-B1-29", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "An enterprise AI center of excellence is reviewing five pilot proposals and the business-value pillar each proposal claims to advance, before approving funding. Select the pilots whose stated pillar is correctly justified by the pilot's own description.", "options": ["A pilot that shortens the existing expense-report approval workflow from 3 days to 1 day for the same finance team, claiming the transformation pillar", "A pilot that lets a mid-size retailer offer a new AI-driven personal styling subscription service it has never sold before, claiming the transformation pillar", "A pilot that lets each existing support agent close 20% more tickets per day with no process change, claiming the cost pillar", "A pilot that reduces cloud inference spend on an existing chatbot by consolidating redundant system-prompt content and enabling prompt caching, claiming the cost pillar", "A pilot that must sustain 99.95% uptime for a customer-facing checkout assistant under a signed enterprise SLA, claiming the performance/SLA pillar"], "correct": [1, 3, 4], "explanation": "The new AI-driven styling subscription is a genuinely new offering, so its transformation claim holds; the pilot that reduces cloud inference spend through prompt consolidation and caching correctly claims the cost pillar, since it cuts existing infrastructure spend; and the checkout assistant's signed uptime commitment is a textbook performance/SLA claim. The expense-report pilot only accelerates an unchanged workflow for the same team: that is efficiency, not transformation, so its pillar claim is mismatched. The support-ticket pilot increases output per existing agent with no process change, which is productivity, not cost, so that pillar claim is also mismatched despite the pilot itself being reasonable."}, {"id": "P-D1-B2-01", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A finance operations team at a mid-size insurer processes 40,000 vendor invoices per day through the same four steps every time: extract line items, validate totals against the purchase order, apply a fixed approval-routing rule, and post to the ERP system. The steps and their order never change, and the team needs predictable, auditable behavior. Which architectural pattern best fits this system?", "options": ["An autonomous agent that decides at runtime which of the four steps to perform and in what order", "A multi-agent system with a coordinator dispatching each step to an isolated-context subagent", "A deterministic workflow that chains the four steps in a fixed, predefined order", "A single augmented LLM call that attempts extraction, validation, routing, and posting all at once with full tool access and no structural guardrails"], "correct": [2], "explanation": "Since the four steps and their order are fixed and never vary, a deterministic workflow gives the predictability, testability, and auditability this high-volume finance process needs, at the lowest cost and latency. Letting an autonomous agent choose its own step order adds unpredictability and risk with no corresponding benefit, since there is no decision to make. Splitting the four tightly coupled, sequential steps across isolated-context subagents adds coordination overhead without any parallelizable or independent work to justify it. Collapsing extraction, validation, routing, and posting into one unstructured call removes the ability to verify each step independently, which is exactly the guarantee this process needs."}, {"id": "P-D1-B2-02", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A furniture retailer's website chatbot answers shopper questions like 'what's the maximum weight this desk holds' by retrieving the relevant spec-sheet passage and generating an answer in a single response. No follow-up tool calls, multi-step research, or coordination with other systems is required. Which pattern is the best fit?", "options": ["A single LLM call augmented with retrieval of the relevant spec content, with no autonomous multi-step loop", "An autonomous agent that plans and executes an open-ended sequence of tool calls for each question", "A multi-agent system with separate subagents for retrieval, reasoning, and response formatting", "A deterministic workflow with a fixed chain of five specialized processing stages"], "correct": [0], "explanation": "The task is answerable in one enhanced call, retrieve the relevant passage and generate the answer, so an augmented LLM call is the simplest pattern that fully meets the need, minimizing cost and latency. An autonomous agent's open-ended planning loop adds latency and unpredictability for a question that never actually requires multiple dependent steps. Splitting retrieval, reasoning, and formatting into isolated-context subagents multiplies token cost and coordination overhead for a task no more complex than a single well-crafted prompt. A five-stage deterministic pipeline is unnecessary machinery for what is fundamentally a one-shot question-answering task."}, {"id": "P-D1-B2-03", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A platform engineering team is building a tool to help on-call engineers investigate production incidents. The number and choice of systems to query (logs, metrics, deploy history, dependency graphs) can't be known in advance; it depends entirely on what the investigation turns up at each step, and a false lead in one system often determines which system is checked next. Which architectural pattern best supports this?", "options": ["A deterministic workflow that queries all four systems in a fixed order for every incident", "A single augmented LLM call that is given all four systems' current data upfront and asked to reason over it once", "A multi-agent system where four subagents each independently investigate one system with no visibility into the others' findings", "An autonomous agent that dynamically selects and sequences tool calls based on what each result reveals"], "correct": [3], "explanation": "Because the sequence of investigative steps genuinely depends on intermediate findings and can't be predetermined, an autonomous agent that adapts its next tool call based on the previous result is the right fit. A fixed-order workflow can't skip irrelevant systems or follow up on an unexpected lead, so it would waste time on dead ends and miss adaptive follow-ups. Dumping all four systems' data into one call upfront doesn't reflect how investigations really unfold, and may exceed what's useful in a single pass since most incidents don't need all four systems checked. Isolating each system behind its own subagent with no shared visibility defeats the point of an investigation where a finding in one system determines what to check next."}, {"id": "P-D1-B2-04", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A corporate strategy team needs a competitive-intelligence report covering 20 competitors, each requiring deep, independent research (pricing pages, hiring trends, product releases, funding history) that doesn't depend on findings about any other competitor. The report is due in a few hours. The architect proposes a coordinator that spawns one subagent per competitor, each running with its own isolated context. Which of the following are valid reasons this multi-agent design fits the task? (Select all that apply.)", "options": ["The 20 research subtasks are independent and can run concurrently, which shortens wall-clock time under the deadline", "This design uses fewer total tokens than having one agent research all 20 competitors sequentially", "Each competitor's research is context-heavy enough that giving it a dedicated context window avoids crowding out other competitors' findings", "Routing each subagent's output back through the coordinator keeps the research observable and lets the coordinator assemble the final report", "This design guarantees every subagent produces a factually correct summary"], "correct": [0, 2, 3], "explanation": "The 20 subtasks are independent, so running them concurrently is exactly the situation multi-agent parallelism is built for, and it directly addresses the tight deadline. Giving each competitor its own isolated context avoids one competitor's data crowding out another's within a single limited context window. Having subagents report through the coordinator rather than communicating peer-to-peer preserves observability and gives the coordinator a single place to assemble the final report. This design generally uses more total tokens than sequential single-agent research, not fewer, because each isolated subagent context is established independently; and no architecture guarantees factual correctness, since that depends on the underlying research and grounding, not the orchestration pattern."}, {"id": "P-D1-B2-05", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A logistics company built a shipment-status-update system as a multi-agent architecture: a coordinator dispatches four subagents, one to fetch carrier tracking data, one to reconcile it against the order record, one to draft the customer-facing message, and one to send it. After launch, the team finds the system costs six times more per shipment than projected, P95 latency more than doubled, and debugging a stuck update requires tracing messages across all five agents. The four steps always run in the same order for every shipment with no branching. What should the architect do?", "options": ["Keep the multi-agent design but add a fifth subagent dedicated to monitoring the other four", "Replace the multi-agent design with a single deterministic workflow that runs the four steps in sequence within one process", "Give the coordinator a larger context window so it can track all four subagents' state more easily", "Convert each subagent into a fully autonomous agent that independently decides when to run"], "correct": [1], "explanation": "Since the four steps always run in the same fixed order with no independent or parallelizable work and no branching, this task never needed agent isolation in the first place; a single deterministic workflow removes the per-step coordination overhead, cuts token cost by not re-establishing four separate contexts, and makes a stuck update traceable in one place. Adding a fifth monitoring subagent treats the symptom of poor observability while leaving the root cause, unnecessary decomposition of a fixed sequential task, in place. A larger coordinator context window doesn't address why four isolated agents were needed for a task with no independent subtasks. Making each subagent fully autonomous would add more unpredictability and cost to a process that benefits from having none."}, {"id": "P-D1-B2-06", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "An insurance carrier's claims-triage system handles a mix of claims: about 60% are simple and resolved after one policy lookup, while the rest require a variable number of follow-up checks, fraud screening, medical record review, or prior-claim history, chosen based on what the initial lookup and each subsequent check reveal. Which pattern should govern the triage logic for the full claim population?", "options": ["A deterministic workflow that always performs the same fixed set of checks on every claim", "A single augmented LLM call that is given the policy record and asked to output a final triage decision in one pass", "An autonomous agent that selects and sequences follow-up checks based on each claim's evolving findings", "A multi-agent system where fraud screening, medical review, and claim history each run as a permanently active subagent for every claim"], "correct": [2], "explanation": "Because the number and choice of follow-up checks genuinely depends on what earlier checks reveal, and that path can't be known before the claim is examined, an autonomous agent that adapts its next check to the evolving findings is the right fit. A fixed workflow that runs every check on every claim would waste effort on the 60% of simple claims and still couldn't adapt if a genuinely novel combination of findings arose. A single one-pass call can't perform the conditional multi-step lookups that fraud screening or medical review require before a decision is reachable. Running every specialized check as an always-on subagent for every claim wastes cost on claims that never needed fraud screening or medical review at all."}, {"id": "P-D1-B2-07", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A bank's regulatory reporting team must produce a quarterly filing by applying the same eleven calculation steps, in the same order, to the same source data, every quarter, and must be able to show an auditor exactly which step produced which number if ever questioned. Which architectural pattern best serves this requirement?", "options": ["A deterministic workflow with the eleven steps hard-coded in a fixed sequence", "An autonomous agent that reasons through the filing and decides which calculations to apply", "A multi-agent system where each of the eleven steps is delegated to its own independently reasoning subagent", "A single augmented LLM call asked to produce the completed filing directly from the source data"], "correct": [0], "explanation": "A fixed, hard-coded sequence gives exactly the reproducibility and step-by-step traceability an auditor needs, since the same input always produces the same steps in the same order. An autonomous agent's model-driven reasoning about which calculations to apply introduces exactly the kind of run-to-run variability this filing process cannot tolerate. Delegating each step to an independently reasoning subagent still leaves each step's output subject to model judgment rather than a fixed calculation, and adds coordination overhead the task doesn't need. Asking a single call to produce the whole filing directly skips the step-by-step trail an auditor would need to verify."}, {"id": "P-D1-B2-08", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "An online education platform's data pipeline processes 2 million student-progress-record updates per day. Each update requires the same three deterministic operations: normalize the field format, check it against a fixed set of validation rules, and write it to the student-records index. Leadership wants the lowest sustainable cost per update without sacrificing correctness. Which of the following are valid reasons to implement this as a deterministic workflow rather than an autonomous agent? (Select all that apply.)", "options": ["A workflow is better than an agent at handling validation rules that change unpredictably from one update to the next", "Per-update cost stays predictable because there's no open-ended reasoning or variable number of tool calls", "A workflow always uses fewer tokens than any equivalent agentic implementation, regardless of task shape", "Consistent step latency at this volume is easier to guarantee without a model deciding what to do next each time", "Workflows remove the need for any pre-deployment testing, since the steps are fixed"], "correct": [1, 3], "explanation": "Because the three operations never vary, a workflow's per-update cost stays predictable with no open-ended reasoning to drive it up, which matters directly at 2 million updates a day. Removing model-driven decisions from the execution path is also what keeps step latency consistent at this volume, rather than varying with how much reasoning a model does on a given update. The claim about unpredictably changing validation rules actually favors an agent or a dynamic rule lookup, not a fixed workflow, since a hard-coded workflow struggles precisely when rules shift in ways it wasn't built to handle. Token usage depends on task shape, so claiming a workflow always uses fewer tokens than any agentic alternative overgeneralizes; and fixed steps still need testing to confirm they produce correct output, so skipping pre-deployment testing would be a mistake regardless of architecture."}, {"id": "P-D1-B2-09", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A retailer's product-question chatbot was originally a single retrieval-augmented LLM call: look up the relevant spec passage, answer the question. A new architect redesigns it as a multi-agent shopping assistant with a coordinator and separate subagents for spec lookup, price comparison, inventory check, and response drafting, even though 95% of real questions are simple spec lookups like the original design handled. Post-launch, median response latency triples and per-question cost rises sharply with no measurable increase in answer quality for the common case. What is the most likely explanation and best fix?", "options": ["The subagents need larger individual context windows to reduce their response time", "The coordinator should be replaced with a second, higher-capacity coordinator to reduce dispatch latency", "The four subagents should be merged into a single autonomous agent that keeps all four tools and decides which to call", "The multi-agent redesign over-engineered the common case; reverting simple spec-lookup questions to a single augmented LLM call and reserving extra steps only for genuinely multi-part questions would restore performance"], "correct": [3], "explanation": "Since 95% of questions never needed price comparison, inventory checks, or multi-step coordination, forcing every question through the full multi-agent pipeline explains both the latency and cost increase without any quality gain; the fix is to route the common, simple case back to the cheaper single-call pattern it originally used and reserve the extra machinery for the minority of questions that actually need it. Larger context windows don't address why four coordinated agents are running for a lookup that needs none of them. Adding a second coordinator only makes the oversized architecture faster, not right-sized. Merging the four tools into one autonomous agent still runs a full reasoning loop with tool-selection overhead for questions that a single retrieval call already answered adequately."}, {"id": "P-D1-B2-10", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "An architect is deciding whether a new document-review feature should be built as a deterministic workflow or an autonomous agent. Which of the following factors, if true of the task, would justify choosing an autonomous agent over a deterministic workflow? (Select all that apply.)", "options": ["The business requires a strict, low-variance per-document turnaround time", "The number and order of review steps needed cannot be determined until the document is partially reviewed", "The output must be reproducible so the same document always yields the exact same review trail for audit purposes", "Which follow-up checks to run depends on findings from earlier checks in a way that can't be enumerated in advance", "The task is exploratory: reviewers currently handle it case by case with no single repeatable procedure"], "correct": [1, 3, 4], "explanation": "When the number and order of steps can't be known ahead of time, when later checks depend on what earlier ones find in ways too varied to enumerate, and when the task is genuinely case by case with no single fixed procedure, a deterministic workflow can't represent the task and an autonomous agent's ability to adapt its own path is what's actually needed. A strict, low-variance turnaround requirement points the other way, toward a workflow, because an agent's variable step count and reasoning time make turnaround less predictable. Needing an exactly reproducible review trail for the same document also favors a workflow, since a workflow's fixed path reproduces the same trail every time while an agent's model-driven path can vary between runs."}, {"id": "P-D1-B2-11", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A law firm's document-review team must check 40 independent commercial contracts against a 25-point compliance checklist before a filing deadline in six hours. Each contract has different clauses and structure, and no contract's review depends on another's findings. Reviewing them one at a time with a single agent is projected to take eleven hours. Which architecture best meets the deadline without sacrificing per-contract thoroughness?", "options": ["A single autonomous agent that works through the 40 contracts sequentially but is given a larger tool budget per contract", "A coordinator that spawns one subagent per contract (or small batch), each working in its own isolated context, with results routed back through the coordinator", "A deterministic workflow that applies the same 25 fixed checklist steps to all 40 contracts in one combined pass", "A single augmented LLM call given the text of all 40 contracts at once and asked to return 40 sets of findings"], "correct": [1], "explanation": "Because the 40 contracts are independent and each needs deep, dedicated attention, dispatching them to isolated-context subagents that run concurrently is what actually shortens wall-clock time to fit the deadline, while routing results through the coordinator keeps the process observable and assemblable into one report. A single agent working sequentially, even with a bigger tool budget per contract, is still bounded by one contract at a time and won't close an eleven-hour gap against a six-hour deadline. A workflow applying the same fixed steps to all 40 in one combined pass doesn't reflect that each contract has different clauses and structure r
