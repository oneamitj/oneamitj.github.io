ulty": "medium", "question": "A production-debugging agent currently authenticates with the same full administrative database credential used by the deployment system, so it can run any diagnostic query without hitting permission errors. Which two changes best align this with least-privilege practice? (Select two.)", "options": ["Keep the full administrative credential, but add a comment in the config explaining it is only meant for debugging.", "Issue the debugging agent a scoped, read-only credential covering only the tables and views it needs for diagnostics.", "Remove the agent's database access entirely so it can never query anything, even for legitimate diagnostics.", "Grant the debugging agent broader access than it currently has, so it never has to request additional scopes later.", "Separate the debugging agent's credential from the deployment system's credential so a compromise or mistake in one doesn't grant the other's privileges."], "correct": [1, 4], "explanation": "A scoped, read-only credential limits the agent to exactly what diagnostics require, and separating its credential from the deployment system's prevents a mistake or compromise in one from cascading into the other's privileges; both are concrete least-privilege changes. Keeping full admin access with just an explanatory comment changes nothing about the actual risk, since comments are not access controls. Removing all access is an overcorrection that breaks the agent's legitimate diagnostic purpose. Preemptively granting even broader access moves further from least privilege, not toward it."}, {"id": "P-D7-B1-20", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "During an active data-corruption incident, a proposed remediation lets Claude Code generate and immediately apply a schema migration to production without any approval step, on the reasoning that speed matters most. What is the most significant risk with this approach, and what should happen instead?", "options": ["It's fine as designed; during an active incident, speed should always take priority over review.", "The model should simply be asked to double-check its own migration once more immediately before applying it.", "The migration should only be blocked from running outside business hours, since that's when review is available.", "The migration is high-impact and its correctness is uncertain under incident pressure, so a human should review and approve it before it is applied to production."], "correct": [3], "explanation": "A high-impact, uncertain-correctness action like a live schema change during an active incident is exactly the case that calls for human-in-the-loop validation before it's applied, even under time pressure, since an incorrect migration could deepen the corruption it's meant to fix. Treating speed as always paramount ignores the asymmetric downside of getting an irreversible production change wrong. Having the model re-check its own work is still same-session self-review, not genuine independent oversight. Restricting execution to business hours doesn't add any actual review step; it's an unrelated scheduling constraint."}, {"id": "P-D7-B1-21", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "hard", "question": "While debugging a production issue, an engineer is about to paste a large raw log dump, including customer names, emails, and full payment details, into a Claude Code session to get help identifying the failure. Which two practices should govern this? (Select two.)", "options": ["Paste the complete, unredacted log dump, since more raw detail always improves diagnostic accuracy.", "Turn off all application logging going forward so this type of data is never captured again.", "Redact or mask direct customer identifiers and payment details from the log excerpt before sharing it, keeping only what's needed to diagnose the failure.", "Limit who has access to logs and sessions containing production data to those who need it for this investigation.", "Ask the assistant, once it has the raw log dump, to simply avoid repeating the sensitive fields back in its answer."], "correct": [2, 3], "explanation": "Redacting direct identifiers and payment details before sharing removes the sensitive-data-exposure risk while typically preserving what's actually needed to diagnose the failure, and restricting access to those who need it for the investigation limits the blast radius of any exposure. Pasting the complete unredacted dump treats accuracy as an excuse to ignore a real sensitive-data-exposure risk, one of the top LLM risk categories. Disabling all logging is a drastic overcorrection that removes visibility teams need for future diagnosis. Asking the assistant not to repeat sensitive fields back doesn't undo the fact that the sensitive data has already been exposed to the session and anything logging or storing it."}, {"id": "P-D7-B1-22", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "A platform team wants API reference docs regenerated the same way every time a pull request changes a public interface, without depending on any individual engineer remembering to run the process correctly. What should they build?", "options": ["A shared skill or slash command, checked into the project's config, that performs the doc-generation steps identically every time it is invoked.", "A reminder in the pull-request template asking engineers to update docs if they remember.", "A personal prompt one senior engineer keeps in their own notes and runs when they think of it.", "A periodic manual audit that checks a few months later whether docs fell out of date."], "correct": [0], "explanation": "A shared, version-controlled skill or command performs the same steps every time regardless of who invokes it, which is exactly the repeatable, consistent workflow the team wants. A reminder that depends on an engineer remembering is probabilistic and exactly the failure mode they're trying to eliminate. A personal prompt kept in one engineer's notes isn't shared or discoverable by the rest of the team. A periodic audit is a detective control that finds staleness after the fact rather than preventing it."}, {"id": "P-D7-B1-23", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A backend team uses a specific test fixture and mocking convention. When engineers ask Claude Code to write new tests, the generated tests are inconsistent, sometimes reaching for a different mocking library the team doesn't use. The conventions have never been written down anywhere. What is the most effective fix?", "options": ["Have a senior engineer manually rewrite each generated test to match team conventions after the fact.", "Document the testing conventions in the project CLAUDE.md, or in a .claude/rules/*.md file scoped to test file paths, so they load automatically whenever test files are edited.", "Ask engineers to re-paste the conventions into the prompt every time they request new tests.", "Switch to a larger model tier, expecting it to infer the team's unstated preferences correctly."], "correct": [1], "explanation": "The conventions have simply never been documented anywhere Claude Code can load them, so capturing them in project config, or a path-scoped rule for test files, provides consistent guidance automatically on every relevant edit. Manually rewriting tests after the fact is a repeated detective fix, not a systemic one. Re-pasting instructions every time is repetitive and easy to forget, which is exactly the inconsistency already being observed. A larger model can't reliably infer team-specific, unstated preferences that were never written down anywhere."}, {"id": "P-D7-B1-24", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "Release notes are compiled monthly by whichever engineer happens to be on rotation. Format, thoroughness, and which changes get included vary noticeably depending on who wrote them, and key changes have been missed in some months. What change would make this most repeatable regardless of who is on rotation?", "options": ["Restrict the task to only the single most senior engineer every month going forward.", "Write a long descriptive document explaining the ideal process, without automating any of the steps.", "Build a slash command or skill that encodes the exact steps and sources, such as which PR labels to include and how to structure the notes, checked into the project.", "Use a larger model each month, expecting output quality to become more consistent regardless of who runs it."], "correct": [2], "explanation": "Encoding the exact steps and sources in a shared, version-controlled command or skill produces the same repeatable output regardless of who is on rotation, directly targeting the inconsistency described. Restricting the task to one person doesn't scale, creates a single point of failure, and doesn't make the process itself repeatable; it just narrows who executes an unspecified process. A descriptive document without automation still leaves execution manual and inconsistent. A larger model doesn't fix an underdefined process, since the inconsistency comes from the process being unspecified, not from model capability."}, {"id": "P-D7-B1-25", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "hard", "question": "A support-debugging agent makes five or six exploratory tool calls at the start of every ticket just to learn what log files and services exist before it can begin real diagnosis, adding noticeable latency to each response. What change would most directly reduce this overhead?", "options": ["Give the agent additional tools so it can explore the available logs and services more quickly.", "Switch the agent to a larger model tier so it reasons through the exploratory calls faster.", "Raise the maximum number of tool-call iterations allowed per ticket.", "Expose the available logs and services as MCP resources, a content catalog the agent can consult, instead of requiring exploratory tool calls to discover them each time."], "correct": [3], "explanation": "MCP resources expose a content catalog up front, so the agent doesn't need repeated exploratory tool calls just to learn what's available, removing the round-trips causing the latency rather than trying to speed them up. Adding more tools increases the set the agent must reason over, worsening tool-selection difficulty rather than removing the need to explore. A larger model still has to make the same number of exploratory round-trips; it doesn't eliminate them. Raising the iteration cap accommodates more exploratory calls instead of removing the need for them, treating a symptom rather than the cause."}, {"id": "P-D7-B1-26", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "An incident-triage assistant is supposed to file tickets with consistent severity, affected-service, and suspected-root-cause fields into a ticketing system's API. The automated filer keeps breaking because the assistant's free-text summaries don't always follow the expected structure. What change would most reliably fix this?", "options": ["Define a JSON schema for the ticket fields and force the corresponding tool call, guaranteeing schema-valid structured output.", "Add a firmer instruction telling the assistant to always format its answer as JSON.", "Post-process the free-text summary with a set of regular expressions to pull out the fields.", "Switch to a larger model tier, expecting more consistent natural-language formatting."], "correct": [0], "explanation": "Defining a JSON schema and forcing the corresponding tool call guarantees schema-valid structured output, directly solving the filer's parsing problem instead of hoping the model complies. A firmer prompt instruction is still a probabilistic nudge with a non-zero failure rate, exactly the kind of inconsistency already being observed. Regex post-processing is fragile and breaks again the moment phrasing drifts, the same failure mode as today. A larger model may produce cleaner prose, but that still isn't a structural guarantee of a parseable format."}, {"id": "P-D7-B1-27", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "medium", "question": "New hires currently spend their first few days manually configuring Claude Code tool permissions, commands, and conventions from scratch, and each ends up with a slightly different setup. Which two changes would give new hires a consistent, reproducible environment faster? (Select two.)", "options": ["Commit the team's shared project-level CLAUDE.md, .claude/commands/, and .claude/rules/ config to the repository so a new checkout reproduces the same environment.", "Have each new hire build their configuration independently, reasoning that fresh eyes might catch outdated conventions.", "Rely on existing engineers to verbally walk new hires through the setup from memory each time.", "Document the intended setup steps alongside the checked-in project config so new hires understand what's already provided.", "Wait until a new hire's first incident to identify what configuration they're missing."], "correct": [0, 3], "explanation": "Checking the shared project-level configuration into the repository means a new checkout reproduces the identical, current team environment automatically, and pairing it with setup documentation helps new hires understand and trust what's already provided. Having each new hire build their own configuration from scratch is exactly what's producing the inconsistency described. Relying on verbal walkthroughs from memory is probabilistic and inconsistent across whoever happens to do the onboarding. Waiting for an incident to reveal configuration gaps is a reactive, detective approach rather than preventing the inconsistency up front."}, {"id": "P-D7-B1-28", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "hard", "question": "Several hours into a production debugging session, an engineer has been pasting entire multi-thousand-line log dumps into Claude Code every time they re-check status. The assistant's answers have grown noticeably less useful, and it now seems to have lost track of a specific error code identified early in the investigation. What is the best way to address this?", "options": ["Switch to a larger model tier, expecting it to retain the early error code despite the growing volume of raw log pastes.", "Trim or summarize verbose log output before it accumulates each turn, and keep the key facts already found, like the specific error code, in a persistent note near the top rather than buried in a growing transcript.", "Keep pasting full logs each time, since more raw data always helps the assistant reason better.", "Stop referencing anything from earlier in the session and focus only on the most recent log paste."], "correct": [1], "explanation": "Trimming verbose output before it accumulates prevents the context from being dominated by raw noise, and pinning already-discovered key facts near the top counters the effect where beginnings and ends of a transcript get more attention than content buried in the middle. A larger model doesn't fix a context-management problem caused by repeatedly dumping raw, unsummarized logs. Continuing to paste full logs every turn is exactly what's degrading the session's usefulness. Ignoring everything earlier in the session would also discard other legitimate findings, not just noise, and doesn't address why the error code was lost in the first place."}, {"id": "P-D7-B1-29", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "medium", "question": "Two automation scripts using Claude Code-powered dev tooling were accidentally committed last quarter with individual engineers' personal API keys hardcoded inside. Which of the following would best prevent this going forward? (Select all that apply.)", "options": ["Have every engineer share one single key pasted into the team chat, so there's only one key to track.", "Reference API keys and other secrets through environment variables rather than embedding literal values in scripts or config.", "Centralize credential issuance so engineers aren't each maintaining their own ad hoc personal key copies for shared automation.", "Grant the automation's credential full administrative access up front, so it never hits a permission error on any future task.", "Keep the shared project tooling configuration version-controlled so the whole team wires in credentials the same, current way."], "correct": [1, 2, 4], "explanation": "Referencing secrets through environment variables instead of literal values prevents exactly the kind of accidental commit that occurred, centralizing issuance removes the incentive for engineers to keep personal ad hoc copies embedded in scripts, and keeping the shared tooling configuration version-controlled ensures everyone wires credentials in the same safe way instead of improvising individually. Sharing one key over team chat multiplies exposure and makes rotation and accountability harder, not easier. Granting broad administrative access preemptively to avoid permission errors is the excessive-permissions mistake, not a fix; credentials should be scoped to least privilege, not maximized in advance."}, {"id": "P-D7-B1-30", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "hard", "question": "An auto-remediation agent connected to Claude Code has standing production infrastructure permissions, including restart, scale, and delete actions, and executes them automatically whenever it judges an alert warrants it, with no review step. Which two changes would most directly reduce the risk here? (Select two.)", "options": ["Switch the agent to a larger model tier so its judgment about when to act is more sophisticated.", "Grant the agent additional infrastructure tools so it has more remediation options available in any situation.", "Scope the agent's infrastructure permissions to only the specific actions its remediation role actually requires, removing standing access to unrelated destructive operations.", "Require human approval before the agent executes any destructive or high-impact action, rather than acting automatically.", "Keep automatic execution, but log every action taken so it can be reviewed after the fact."], "correct": [2, 3], "explanation": "Scoping permissions to only what the remediation role actually needs directly addresses excessive permissions, one of the top LLM risk categories, and requiring human approval before high-impact or destructive actions adds the human-in-the-loop validation that uncertain, consequential decisions call for. A larger model may reason better, but it doesn't shrink the standing permissions or add a review step, so the underlying risk is unchanged. Granting even more tools expands the risk surface further rather than reducing it. After-the-fact logging is a detective control that helps explain what already happened, but does nothing to prevent a wrong destructive action from executing in the first place."}, {"id": "P-D7-B1-31", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "easy", "question": "A team wants to auto-generate a short, plain-language summary for every commit pushed to a large monorepo, a simple, high-volume, low-complexity task running many times per day. Which model tier best fits this workload?", "options": ["Opus, for its deep reasoning capability.", "Whichever tier is currently newest, regardless of task characteristics.", "Haiku, for its speed and low cost on high-volume, simple tasks.", "Sonnet, reserved only for tasks requiring careful multi-step planning."], "correct": [2], "explanation": "Haiku is the fastest and cheapest tier, best suited to exactly this kind of high-volume, simple, well-scoped task where deep reasoning isn't required. Opus is the most capable and most expensive and slowest tier, better reserved for tasks needing deep reasoning, and would be wasteful on cost and latency here. Picking a tier just because it's newest ignores the actual task characteristics that should drive the decision. Sonnet balances capability, speed, and cost for more complex work; this task doesn't need that level of capability at that cost."}, {"id": "P-D7-B1-32", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A distributed system incident involves correlating logs and metrics across a dozen interacting services to find a subtle root cause, with no single obvious failure point. This is a one-off, high-stakes investigation rather than a high-volume repeated task. Which model tier is the best fit for this specific investigation?", "options": ["Haiku, to get through the large volume of logs as quickly and cheaply as possible.", "Whichever tier has the shortest average response time, regardless of reasoning depth.", "Sonnet, because balanced tiers are always the correct default regardless of task complexity.", "Opus, for its deeper reasoning capability on a complex, high-stakes, low-volume investigation."], "correct": [3], "explanation": "Opus's deeper reasoning capability fits a complex, high-stakes, one-off investigation where correlating subtle cross-service signals matters more than raw throughput or cost. Haiku is optimized for speed and cost on simple, high-volume tasks, not the deep multi-signal reasoning this investigation requires. Optimizing purely for response time ignores that a shallow but fast answer could miss the actual root cause in a complex case like this. Sonnet is a reasonable general default, but treating it as always correct regardless of complexity ignores the trade-off analysis the scenario calls for, since a genuinely complex, high-stakes case can justify a higher-reasoning tier."}, {"id": "P-D7-B1-33", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "medium", "question": "A repo has nearly identical CLAUDE.md files duplicated across a dozen directories to convey the same file-type conventions, and several copies have already drifted out of sync with each other after recent edits. What is the best long-term fix?", "options": ["Replace the duplicated directory-level files with a .claude/rules/*.md file using a paths glob that matches the relevant file type across all directories.", "Set up a recurring manual audit to catch drift between the duplicated files after it happens.", "Add a comment at the top of each duplicated file reminding engineers to keep them in sync.", "Consolidate everything into a single personal user-level CLAUDE.md shared by copying it between engineers."], "correct": [0], "explanation": "A single path-scoped rule file applies the same convention across every matching directory from one source of truth, eliminating the duplication that caused the drift in the first place; this is precisely why path-specific rules are a better fit than per-directory CLAUDE.md files for file-type conventions. A recurring manual audit is a detective control that finds drift after it has already happened rather than preventing it. A reminder comment relies on engineers manually remembering to update every copy, the same failure mode already observed. Personal user-level config isn't the right scope for project-wide, file-type conventions, and manually copying it between engineers reproduces the same duplication problem in a different location."}, {"id": "P-D7-B1-34", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "multiple", "difficulty": "hard", "question": "A team needs to rename a widely used internal function across 40 independent files as part of a refactor, where each file's change can be made without depending on the others. They want to use Claude Code's multi-agent capability to parallelize the work. Which of the following are consistent with how this orchestration actually works? (Select all that apply.)", "options": ["Emit multiple Task tool calls in a single response to spawn several subagents working in parallel, with allowedTools including the Task tool.", "Assume every subagent automatically has the full coordinator conversation history available, so no extra context needs to be passed.", "Explicitly pass each subagent the specific file scope and context it needs in its prompt, since subagents run with isolated context and don't automatically inherit the coordinator's history.", "Let each subagent communicate directly with the others to coordinate, bypassing the coordinator, to save time.", "Route subagent results back through the coordinator rather than having them act independently outside its awareness."], "correct": [0, 2, 4], "explanation": "Spawning multiple Task calls within one response is how parallel subagents are launched, and it requires allowedTools to include the Task tool; since subagents don't inherit the coordinator's history, each needs its file scope and context passed explicitly in its prompt. Routing results back through the coordinator, rather than having subagents coordinate directly with each other, preserves observability into what each subagent did. Letting subagents talk to each other directly bypasses the coordinator and removes that observability. Assuming subagents automatically have the full coordinator history contradicts how isolated subagent context actually works and would leave them missing the file-specific scope they need."}, {"id": "P-D7-B1-35", "cert": "CCAR-P", "domain": "Developer Productivity & Operational Enablement", "type": "single", "difficulty": "hard", "question": "During an incident, an on-call automation's call to an internal deployment-status MCP tool fails. The structured response sets isError to true, with an errorCategory of transient_network and isRetryable set to true. What should the automation do?", "options": ["Treat the failure as a valid empty result and proceed as if no deployment issues were found.", "Automatically retry the call, since the error is explicitly flagged as transient and retryable.", "Immediately escalate to a human, since any isError response should always be treated as unrecoverable.", "Abandon the entire diagnostic workflow, since the tool call failed once."], "correct": [1], "explanation": "The structured error metadata explicitly categorizes this failure as transient and retryable, so an automatic retry is the appropriate response rather than treating it as more serious than it is. Treating an access or execution failure as a valid empty result conflates two situations the structured metadata is specifically designed to distinguish. Escalating every flagged error regardless of its category ignores the purpose of providing category and retryability metadata in the first place, since some errors, like permission or validation failures, do warrant escalation, but this one doesn't. Abandoning the entire workflow over a single transient, retryable failure discards a diagnostic effort unnecessarily when a simple retry is indicated."}]</script>
<script>
"use strict";
document.getElementById('themeBtn').addEventListener('click',function(){
  var h=document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark');
});
const QBANK = JSON.parse(document.getElementById('qbank').textContent);
const CERTS = {
  "CCAR-P":{code:"CCAR-P",name:"Claude Certified Architect: Professional",fullLen:63,examMin:120,passPct:72,
    tagline:"Enterprise architecture, RAG, evaluation, governance, lifecycle"}
};
const app = document.getElementById('app');
const topRight = document.getElementById('topRight');
const brandSub = document.getElementById('brandSub');

function bankStats(){
  const s={}; for(const c in CERTS) s[c]={total:0,domains:{}};
  QBANK.forEach(q=>{s[q.cert].total++; s[q.cert].domains[q.domain]=(s[q.cert].domains[q.domain]||0)+1;});
  return s;
}
const STATS = bankStats();
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmtTime(sec){sec=Math.max(0,Math.round(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?h+":"+String(m).padStart(2,"0"):m)+":"+String(s).padStart(2,"0");}

let sel={cert:"CCAR-P",length:10};
let S=null; // active session

/* ---------------- HOME ---------------- */
function renderHome(){
  brandSub.textContent="Practice Exams · CCAR-P";
  topRight.innerHTML="";
  const c=CERTS[sel.cert];
  const fullN=c.fullLen;
  const lenOpts=[{v:10,l:"Quick check"},{v:25,l:"Standard set"},{v:"full",l:"Full mock exam"}];
  app.innerHTML=`
  <div class="card hero">
    <h1>Practice the Claude Certified Architect: Professional exam</h1>
    <p class="sub">Original scenario-based questions written to the official CCAR-P exam blueprint. Pick a length, and every session is freshly shuffled with answer explanations at the end.</p>
  </div>

  <div class="section-label">1 · Choose a length</div>
  <div class="len-grid">
    ${lenOpts.map(o=>{const n=o.v==="full"?fullN:o.v;const label=o.v==="full"?`Full · ${fullN} Q`:`${o.v} questions`;
      const t=o.v==="full"?c.examMin:Math.round(n*2);
      return `<button class="len-card ${sel.length===o.v?'sel':''}" data-len="${o.v}">
        <div class="n">${o.v==="full"?fullN:o.v}</div><div class="l">${o.l}</div>
        <div class="l" style="margin-top:6px;color:var(--faint)">${t} min timer</div></button>`;}).join("")}
  </div>

  <div class="start-row">
    <button class="btn primary lg" id="startBtn">Start session →</button>
    <span style="font-size:13.5px;color:var(--muted)">${sel.length==="full"?fullN:sel.length} questions · ${sel.length==="full"?c.examMin:Math.round((sel.length)*2)} min · ${c.code}</span>
  </div>

  <div class="card" style="padding:18px 20px;margin-top:26px">
    <div class="section-label" style="margin:0 0 8px">${sel.cert} domain coverage</div>
    <div class="domain-list">
      ${Object.entries(STATS[sel.cert].domains).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<div><span>${esc(d)}</span><span class="mono" style="color:var(--faint)">${n}</span></div>`).join("")}
    </div>
  </div>

  <p class="disclaimer"><b>Unofficial study aid.</b> These are original practice questions written to the published exam guide for the Claude Certified Architect: Professional (CCAR-P) certification. They are not real exam questions and this tool is not affiliated with or endorsed by Anthropic. Pass/fail here uses an approximate 72% bar; the real exam uses scaled scoring (720/1000).</p>
  `;
  app.querySelectorAll("[data-len]").forEach(b=>b.onclick=()=>{sel.length=b.dataset.len==="full"?"full":+b.dataset.len;renderHome();});
  document.getElementById("startBtn").onclick=beginSession;
}

/* ---------------- SESSION ---------------- */
function beginSession(){
  const cert=sel.cert, c=CERTS[cert];
  const pool=QBANK.filter(q=>q.cert===cert);
  const n=sel.length==="full"?c.fullLen:sel.length;
  const chosen=shuffle(pool.slice()).slice(0,Math.min(n,pool.length));
  const questions=chosen.map(q=>{
    const order=shuffle(q.options.map((_,i)=>i));
    const options=order.map(i=>q.options[i]);
    const correct=[]; order.forEach((orig,ni)=>{if(q.correct.includes(orig))correct.push(ni);});
    return {id:q.id,domain:q.domain,type:q.type,difficulty:q.difficulty,question:q.question,explanation:q.explanation,options,correct};
  });
  const durationSec=(sel.length==="full"?c.examMin*60:n*120);
  S={cert,length:sel.length,questions,answers:questions.map(()=>[]),flagged:new Set(),current:0,
     durationSec,remaining:durationSec,timer:null,submitted:false};
  startTimer();
  renderQuiz();
}
function startTimer(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    S.remaining--;
    if(S.remaining<=0){S.remaining=0;paintTimer();finishExam(true);}
    else paintTimer();
  },1000);
}
function paintTimer(){
  const el=document.getElementById("timer");
  if(!el)return;
  el.textContent="⏱ "+fmtTime(S.remaining);
  el.classList.toggle("warn",S.remaining<=300);
}

function renderQuiz(){
  brandSub.textContent=CERTS[S.cert].code+" · "+(S.length==="full"?"Full mock":S.questions.length+" questions");
  topRight.innerHTML=`<div class="timer" id="timer">⏱ ${fmtTime(S.remaining)}</div>`;
  const i=S.current, q=S.questions[i];
  const chosen=S.answers[i];
  const answeredCount=S.answers.filter(a=>a.length).length;
  app.innerHTML=`
    <div class="qtop">
      <span class="qcount">Question ${i+1} of ${S.questions.length}</span>
      <div class="progress"><i style="width:${(answeredCount/S.questions.length)*100}%"></i></div>
      <span class="qcount">${answeredCount} answered</span>
    </div>
    <div class="card qcard">
      <div class="qbadges">
        <span class="badge dom">${esc(q.domain)}</span>
        <span class="badge type">${q.type==="multiple"?"Select all that apply":"Single answer"}</span>
        <span class="badge diff-${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="qtext">${esc(q.question)}</div>
      ${q.type==="multiple"?`<p class="hint">Select all that apply: ${q.correct.length} answers are correct.</p>`:""}
      <div class="opts" id="opts">
        ${q.options.map((o,oi)=>{
          const on=chosen.includes(oi);
          return `<button class="opt ${q.type==="multiple"?'check':'radio'} ${on?'chosen':''}" data-oi="${oi}">
            <span class="box">${on?(q.type==="multiple"?'✓':'●'):''}</span>
            <span class="txt">${esc(o)}</span></button>`;}).join("")}
      </div>
      <div class="qnav">
        <button class="btn" id="prevBtn" ${i===0?'disabled':''}>← Previous</button>
        <button class="flagbtn ${S.flagged.has(i)?'on':''}" id="flagBtn">⚑ ${S.flagged.has(i)?'Flagged':'Flag'}</button>
        ${i===S.questions.length-1?`<button class="btn primary" id="submitBtn">Review &amp; submit</button>`:`<button class="btn primary" id="nextBtn">Next →</button>`}
      </div>
    </div>

    <div class="card navigator">
      <h3>Question navigator</h3>
      <div class="grid-nums" id="nav">
        ${S.questions.map((_,k)=>`<button class="gn ${S.answers[k].length?'answered':''} ${k===i?'current':''} ${S.flagged.has(k)?'flagged':''}" data-k="${k}">${k+1}</button>`).join("")}
      </div>
      <div class="legend">
        <span><i style="background:#cc7a5c33;border:1.5px solid var(--accent-d)"></i> Answered</span>
        <span><i style="background:#fff;border:1.5px solid var(--border)"></i> Unanswered</span>
        <span><i style="background:var(--amber)"></i> Flagged</span>
      </div>
      <div style="margin-top:16px;text-align:right"><button class="btn ghost" id="submitBtn2">Review &amp; submit exam</button></div>
    </div>
  `;
  paintTimer();
  document.querySelectorAll("#opts .opt").forEach(b=>b.onclick=()=>choose(+b.dataset.oi));
  const prev=document.getElementById("prevBtn"); if(prev)prev.onclick=()=>{S.current--;renderQuiz();};
  const next=document.getElementById("nextBtn"); if(next)next.onclick=()=>{S.current++;renderQuiz();};
  document.getElementById("flagBtn").onclick=()=>{S.flagged.has(i)?S.flagged.delete(i):S.flagged.add(i);renderQuiz();};
  const sb=document.getElementById("submitBtn"); if(sb)sb.onclick=confirmSubmit;
  document.getElementById("submitBtn2").onclick=confirmSubmit;
  document.querySelectorAll("#nav .gn").forEach(b=>b.onclick=()=>{S.current=+b.dataset.k;renderQuiz();});
}
function choose(oi){
  const i=S.current,q=S.questions[i],a=S.answers[i];
  if(q.type==="multiple"){const p=a.indexOf(oi);p>=0?a.splice(p,1):a.push(oi);}
  else {S.answers[i]=[oi];}
  renderQuiz();
}

/* ---------------- SUBMIT CONFIRM ---------------- */
function confirmSubmit(){
  const answered=S.answers.filter(a=>a.length).length;
  const un=S.questions.length-answered;
  const ov=document.createElement("div");ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h3>Submit your exam?</h3>
    <p>Once you submit you'll see your score, a domain breakdown, and an explanation for every question.</p>
    <div class="stats">
      <div><b>${answered}</b><small>Answered</small></div>
      <div><b style="color:${un?'var(--red)':'inherit'}">${un}</b><small>Unanswered</small></div>
      <div><b>${S.flagged.size}</b><small>Flagged</small></div>
    </div>
    ${un?`<p style="color:var(--red)">${un} question${un>1?'s':''} still unanswered, they'll be marked incorrect.</p>`:""}
    <div class="modal-row">
      <button class="btn ghost" id="mCancel">Keep going</button>
      <button class="btn primary" id="mGo">Submit exam</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#mCancel").onclick=()=>ov.remove();
  ov.querySelector("#mGo").onclick=()=>{ov.remove();finishExam(false);};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

/* ---------------- RESULTS ---------------- */
function grade(){
  let correct=0;const dom={};
  S.questions.forEach((q,i)=>{
    const ch=[...S.answers[i]].sort((a,b)=>a-b),co=[...q.correct].sort((a,b)=>a-b);
    const ok=ch.length===co.length&&ch.every((v,k)=>v===co[k]);
    q._ok=ok;if(ok)correct++;
    dom[q.domain]=dom[q.domain]||{c:0,t:0};dom[q.domain].t++;if(ok)dom[q.domain].c++;
  });
  return {correct,total:S.questions.length,dom};
}
function bandColor(p){return p>=72?"var(--green)":p>=50?"var(--amber)":"var(--red)";}
function finishExam(auto){
  clearInterval(S.timer);S.submitted=true;
  const g=grade();const pct=Math.round(g.correct/g.total*100);
  const pass=pct>=CERTS[S.cert].passPct;
  const used=S.durationSec-S.remaining;
  const R=2*Math.PI*52;const off=R*(1-pct/100);
  brandSub.textContent=CERTS[S.cert].code+" · Results";
  topRight.innerHTML="";
  S._filter="all";
  app.innerHTML=`
    <div class="card res-hero">
      <div class="ring">
        <svg width="128" height="128" viewBox="0 0 128 128">
          <circle cx="64" cy="64" r="52" fill="none" stroke="var(--border)" stroke-width="12"/>
          <circle cx="64" cy="64" r="52" fill="none" stroke="${bandColor(pct)}" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${R.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 64 64)"/>
          <text x="64" y="60" text-anchor="middle" font-size="30" font-weight="750" fill="var(--ink)">${pct}%</text>
          <text x="64" y="80" text-anchor="middle" font-size="13" fill="var(--muted)">${g.correct}/${g.total}</text>
        </svg>
      </div>
      <div class="res-head" style="flex:1;min-width:220px">
        <h2>${auto?"Time's up. ":""}You scored ${g.correct} / ${g.total}</h2>
        <span class="verdict ${pass?'pass':'fail'}">${pass?'✓ Above the pass bar':'✗ Below the pass bar'}</span>
        <div class="sub">${CERTS[S.cert].name}${auto?" · exam auto-submitted when the timer ran out":""}. Pass bar ≈ ${CERTS[S.cert].passPct}% (approximate: real exam scales to 720/1000).</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="card stat"><div class="k">Score</div><div class="v">${pct}%</div></div>
      <div class="card stat"><div class="k">Correct</div><div class="v">${g.correct}<span style="font-size:15px;color:var(--muted)"> / ${g.total}</span></div></div>
      <div class="card stat"><div class="k">Time used</div><div class="v">${fmtTime(used)}</div></div>
    </div>

    <div class="card dom-break">
      <h3>Performance by domain</h3>
      <div class="cap">Where your points came from. Target the low bars before your next attempt.</div>
      ${Object.entries(g.dom).sort((a,b)=>(a[1].c/a[1].t)-(b[1].c/b[1].t)).map(([d,o])=>{
        const p=Math.round(o.c/o.t*100);
        return `<div class="dbar"><div class="top"><b>${esc(d)}</b><span class="sc" style="color:${bandColor(p)}">${o.c}/${o.t} · ${p}%</span></div>
          <div class="track"><i style="width:${p}%;background:${bandColor(p)}"></i></div></div>`;}).join("")}
    </div>

    <div class="rev-tools">
      <span style="font-weight:650;font-size:14px;margin-right:4px">Review answers</span>
      <button class="filterbtn on" data-f="all">All (${g.total})</button>
      <button class="filterbtn" data-f="wrong">Incorrect (${g.total-g.correct})</button>
      <button class="filterbtn" data-f="flag">Flagged (${S.flagged.size})</button>
    </div>
    <div id="reviewList"></div>

    <div class="footer-actions">
      <button class="btn primary lg" id="retake">↻ New ${S.length==="full"?"full":S.length+"-question"} session</button>
      <button class="btn lg" id="home">Change length</button>
    </div>
  `;
  app.querySelectorAll(".filterbtn").forEach(b=>b.onclick=()=>{
    app.querySelectorAll(".filterbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");
    S._filter=b.dataset.f;paintReview();});
  document.getElementById("retake").onclick=()=>{sel.cert=S.cert;sel.length=S.length;beginSession();};
  document.getElementById("home").onclick=renderHome;
  paintReview();
  window.scrollTo(0,0);
}
function paintReview(){
  const list=document.getElementById("reviewList");
  const items=S.questions.map((q,i)=>({q,i})).filter(({q,i})=>{
    if(S._filter==="wrong")return !q._ok;
    if(S._filter==="flag")return S.flagged.has(i);
    return true;});
  if(!items.length){list.innerHTML=`<div class="card" style="padding:24px;text-align:center;color:var(--muted)">Nothing to show in this filter.</div>`;return;}
  list.innerHTML=items.map(({q,i})=>{
    const ua=S.answers[i];
    return `<div class="card rev">
      <div class="rev-head">
        <div class="qbadges" style="margin:0">
          <span class="badge dom">${esc(q.domain)}</span>
          <span class="badge diff-${q.difficulty}">${q.difficulty}</span>
          ${S.flagged.has(i)?`<span class="badge" style="background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)">⚑ flagged</span>`:""}
        </div>
        <span class="outcome ${q._ok?'ok':'no'}">${q._ok?'✓ Correct':(ua.length?'✗ Incorrect':'○ Skipped')}</span>
      </div>
      <div class="rq">${esc(i+1)}. ${esc(q.question)}</div>
      ${q.options.map((o,oi)=>{
        const isC=q.correct.includes(oi),isU=ua.includes(oi);
        let cls="",ic="",lab="";
        if(isC){cls="correct";ic="✓";lab="Correct answer";}
        else if(isU){cls="wrong";ic="✗";lab="Your answer";}
        else{ic="";}
        return `<div class="rev-opt ${cls}"><span class="ic">${ic}</span><span style="flex:1">${esc(o)}</span>${lab?`<span class="lab">${lab}${isC&&isU?" · you":""}</span>`:""}</div>`;
      }).join("")}
      <div class="expl"><b>Why:</b> ${esc(q.explanation)}</div>
    </div>`;}).join("");
}

renderHome();
</script>
</body>
</html>
