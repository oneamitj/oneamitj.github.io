equiring individualized judgment, not just checklist execution. Cramming all 40 contracts into a single call risks exceeding what can be reliably attended to in one pass and loses the isolation that keeps one contract's findings from bleeding into another's."}, {"id": "P-D1-B2-12", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "An HR technology team automates new-hire onboarding: create the account, assign the standard training modules, and notify the hiring manager. These three steps are identical for every hire and always run in the same order. A vendor proposes a multi-agent system with a coordinator and three specialized subagents to 'future-proof' the process. What is the most appropriate response?", "options": ["Accept the proposal, since more agents generally make a system more scalable", "Accept the proposal, but reduce it to two subagents instead of three", "Decline the multi-agent proposal; a simple deterministic workflow already fits this fixed, three-step process", "Accept the proposal and additionally give each subagent full access to the HR system's entire toolset for flexibility"], "correct": [2], "explanation": "Since the three onboarding steps are identical and fixed in order for every hire, a deterministic workflow already delivers everything the process needs at lower cost and complexity; there is no independent or unpredictable work here for separate agents to justify. Adding more agents doesn't inherently add scalability, it adds coordination overhead and cost for a task whose actual bottleneck, if any, isn't decision-making. Trimming to two subagents keeps the same unnecessary coordination machinery instead of removing it. Broadening each subagent's tool access makes the over-engineered design riskier by widening the blast radius of a mistake, without addressing why agents were introduced at all."}, {"id": "P-D1-B2-13", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A manufacturer's predictive-maintenance system investigates equipment anomalies. A single anomaly investigation typically needs 2 to 15 follow-up sensor queries, and which sensor to check next depends entirely on the pattern found in the previous query; the investigation is one continuous line of reasoning, not separable into independent parts. An architect proposes splitting the investigation across five subagents, one per sensor category, each investigating in isolation and reporting back to a coordinator. What is the main problem with this proposal?", "options": ["The investigation is a single coherent reasoning thread where each step depends on the last, so splitting it across isolated-context subagents fragments the shared context the investigation actually needs, while adding coordination overhead with no independent work to parallelize", "Five subagents will always be slower than a single agent regardless of task structure", "Isolated-context subagents cannot query sensors at all", "A coordinator can only dispatch work to subagents that share full context with each other by default"], "correct": [0], "explanation": "Because which sensor to check next depends on what the previous query revealed, the investigation is fundamentally one continuous thread of reasoning; splitting it across subagents that don't share context breaks exactly the continuity the task depends on, and since there's no independent work to run concurrently, the coordination overhead buys nothing in return. A single autonomous agent that adapts its own next query based on the last result is the better fit here. The claim that five subagents are always slower than one regardless of task structure is too broad, since for genuinely independent, parallelizable work multi-agent can be faster; the problem here is specific to this task's tightly coupled structure. Isolated subagents can query tools just fine; the issue is losing shared context between steps, not tool access. And subagents in this coordinator pattern do not share context with each other by default, that isolation is the norm, not an exception, which is precisely why it's a poor fit for a single continuous investigation."}, {"id": "P-D1-B2-14", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A payments team runs a fraud-check step as a deterministic workflow that reliably meets a 300ms P95 latency SLA. An engineer proposes replacing it with an autonomous agent that can 'reason more flexibly' about each transaction, arguing it will be more future-proof. No new requirement has emerged that the current workflow fails to handle. What is the most likely consequence of adopting the proposal as described, and what should the team do?", "options": ["The agent will always be faster than the workflow because it can skip unnecessary steps", "The team should adopt the agent immediately, since flexibility is always more valuable than predictability", "The team should adopt the agent but disable its ability to call tools to keep latency low", "An agent's variable number of reasoning and tool-call steps would put the 300ms SLA at risk for no corresponding capability gain, so the team should keep the current workflow until a concrete requirement demands more flexibility"], "correct": [3], "explanation": "An autonomous agent's step count and reasoning time vary per transaction, which works against a strict, tight latency SLA the current fixed-step workflow already meets reliably; without a concrete unmet requirement, this trade is pure downside. Claiming the agent will always be faster ignores that reasoning and tool-selection overhead typically add latency compared to a fixed sequence, not remove it. Treating flexibility as always more valuable than predictability ignores that this task's actual requirement is a hard latency bound, not adaptability. An agent with tool-calling disabled to preserve latency is no longer functioning as an agent at all; at that point it isn't providing any capability the current workflow doesn't already have, while still carrying the SLA risk of variable reasoning time."}, {"id": "P-D1-B2-15", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "Which scenario best describes a task that is appropriately handled by a single augmented LLM call rather than a multi-step autonomous agent or a multi-agent system?", "options": ["Completing a task whose number of required steps depends on intermediate results that can't be known beforehand", "Answering a user's question by retrieving one relevant document passage and generating a response in a single pass, with no further tool calls needed", "Coordinating ten independent, context-heavy subtasks that must run concurrently to meet a deadline", "Executing a task that must run the exact same ten hard-coded steps in the same order for every input"], "correct": [1], "explanation": "An augmented LLM call, one enhanced generation informed by retrieved context or a tool result, is the right fit precisely when a single pass is enough to produce the answer, as in retrieving one passage and generating a response. A task whose step count depends on results only known partway through needs an autonomous agent that can adapt as it goes, not a single call. Coordinating many independent, context-heavy subtasks concurrently is what multi-agent orchestration is for, not a single call. Running the same fixed sequence of steps every time is the signature of a deterministic workflow, not a single augmented call."}, {"id": "P-D1-B2-16", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A team is evaluating whether to convert a working single-workflow document-summarization tool into a multi-agent system with a coordinator and three subagents, even though the task has no independent or parallelizable subtasks. Which of the following are realistic risks of making this change? (Select all that apply.)", "options": ["Faster end-to-end response, since three subagents can each focus on a smaller piece of the problem", "Higher total token cost, since each isolated subagent re-establishes its own context rather than sharing one", "Improved reproducibility, since multi-agent systems always produce more consistent output than a single workflow", "Increased coordination and observability overhead from tracking state and messages across the coordinator and subagents", "Lower total token cost, because splitting work across subagents reduces how much any single agent has to process"], "correct": [1, 3], "explanation": "Splitting a task with no independent subtasks into isolated subagents means each one re-establishes its own context rather than sharing the single workflow's context, which typically raises total token cost. The added coordinator-subagent messaging also creates more state and hand-offs to track than a single workflow has, which is real coordination and observability overhead. Because the summarization subtasks aren't actually independent, splitting them doesn't create genuine parallelism; the added hand-offs between agents are more likely to slow the response down than speed it up. Multi-agent systems don't inherently improve reproducibility, since more model-driven components generally introduce more run-to-run variability, not less; and because there's no independent work to divide here, splitting the task raises total token usage rather than lowering it."}, {"id": "P-D1-B2-17", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A corporate travel assistant needs to search flights, apply the traveler's company travel policy, check real-time fare rules that change availability mid-search, and sometimes rebook when a preferred option disappears before confirmation, all in an order that depends on what each search and policy check returns. Which pattern fits this task?", "options": ["A deterministic workflow that always searches, checks policy, and books in the same three fixed steps", "A single augmented LLM call given a snapshot of current fares and asked to output a final itinerary in one pass", "An autonomous agent that selects and sequences its next tool call based on the outcome of the previous one", "A multi-agent system where search, policy-check, and booking each run as a subagent with no visibility into what the others found"], "correct": [2], "explanation": "Because fare availability changes mid-search and the right next action, re-search, re-check policy, or rebook, depends on what just happened, an autonomous agent that adapts its next tool call to the latest result is the pattern built for this. A fixed three-step workflow has no way to react when a fare disappears mid-process or a policy check fails unexpectedly. A single call working from a fare snapshot can't account for availability that changes after that snapshot was taken. Splitting search, policy, and booking into subagents with no shared visibility would leave the booking step unaware of policy constraints or search context it needs to make a correct decision."}, {"id": "P-D1-B2-18", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "An enterprise IT team is building an internal assistant that fields requests spanning HR, finance, and IT support. A single generalist agent with all 22 tools across these domains shows a measurable drop in correct tool selection as more tools are added, and the team expects to add more departments and tools over time. An alternative design uses a top-level coordinator that routes each request to one of several specialized subagents, each holding only the 5 or so tools relevant to its domain. Which consideration most strongly favors the specialized multi-agent design here?", "options": ["Scoping each subagent to a small, domain-relevant toolset avoids the tool-selection degradation seen with one generalist agent, and the design scales by adding subagents rather than growing one agent's toolset indefinitely", "Multi-agent systems always cost less per request than a single generalist agent", "A coordinator eliminates the need for any least-privilege tool scoping within subagents", "Specialized subagents remove the need for the coordinator to route requests at all"], "correct": [0], "explanation": "Since tool-selection accuracy measurably degrades as one agent's toolset grows, keeping each subagent's toolset small and domain-relevant directly addresses the observed problem, and adding new departments becomes adding a new scoped subagent rather than further bloating a single agent's tool list. Multi-agent systems typically cost more per request than a single call, not less, because of duplicated context and coordination overhead; the benefit here is tool-selection accuracy and scalable growth, not raw cost. Using a coordinator doesn't eliminate the need for least-privilege scoping within each subagent, each subagent should still hold only the tools its role needs. And the coordinator's routing role is exactly what directs each request to the right specialized subagent, removing routing would defeat the design."}, {"id": "P-D1-B2-19", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A SaaS company's support team routes every incoming email, regardless of complexity, through a six-tool autonomous agent that can search order history, issue refunds, escalate to a human, and more. Analysis shows 90% of emails are simple requests (order status, return label) that are fully resolved by one templated, retrieval-informed reply with no tool calls needed. The remaining 10% genuinely need the agent's multi-step capabilities. What change would most improve cost and latency without reducing capability where it's needed?", "options": ["Reduce the agent's tool count from six to three so it runs faster on every email", "Keep every email on the full agent path, but cache the system prompt to reduce cost", "Move the entire triage system to a multi-agent architecture so simple and complex emails can be handled by separate coordinator-dispatched subagents", "Route the simple 90% of emails to a single augmented LLM call that retrieves the relevant order info and drafts the reply, and reserve the six-tool agent for the 10% that need multi-step handling"], "correct": [3], "explanation": "Since 90% of emails never need tool calls at all, routing them to a single retrieval-informed call and reserving the full agent for the 10% that genuinely need multi-step handling removes the wasted reasoning and tool-selection overhead from the common case while keeping full capability where it's actually required. Trimming the agent's tools to three would degrade its ability to handle the complex 10% without fixing why the simple 90% needed an agent at all. Prompt caching reduces cost per call but does nothing about the wasted reasoning loop running on every simple email. Moving to a coordinator-dispatched multi-agent design adds more machinery, and more cost and latency from cross-agent coordination, than the problem needs, when a simple two-tier split between a single call and the existing agent already solves it."}, {"id": "P-D1-B2-20", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A media company's content-moderation system is a deterministic workflow: classify the content, route it to one of three fixed actions (approve, reject, escalate to human) based on the classification score. Product now wants the system to also handle borderline cases by pulling additional context, related posts, account history, prior moderation decisions, and deciding for itself what else to check, with the number of checks varying case by case. What is the most appropriate architectural change?", "options": ["Add more fixed classification thresholds to the existing workflow so borderline cases are caught earlier", "Keep the deterministic workflow for the clear-cut majority of cases, and introduce an autonomous agent step specifically for the borderline cases where the number and choice of additional checks can't be fixed in advance", "Replace the entire system with a multi-agent architecture so every piece of content is investigated by several subagents in parallel", "Keep the workflow unchanged and instruct human moderators to manually check the additional context themselves"], "correct": [1], "explanation": "The clear-cut majority still fits a fixed classify-then-route workflow, but the new borderline-case requirement, an unpredictable, evolving set of follow-up checks, is exactly what a deterministic workflow structurally cannot represent, so introducing an autonomous agent for that sub-path is the appropriate escalation in complexity, applied only where the task now demands it. Adding more fixed thresholds still can't adapt to case-by-case investigation needs; it only shifts where the same rigid boundary sits. Routing every piece of content, including the easy majority, through a multi-agent investigation applies unnecessary machinery to cases that were already handled well by the simple workflow. Pushing the new requirement onto manual human review abandons automation for the borderline cases instead of addressing the architecture gap."}, {"id": "P-D1-B2-21", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "Which of the following characteristics of a task make it a good fit for a deterministic workflow rather than an autonomous agent? (Select all that apply.)", "options": ["The steps required and their order are known and fixed in advance", "The task must adapt its approach to genuinely novel input patterns the designers didn't anticipate", "The business needs reproducible, testable output where the same input always produces the same steps", "The subtasks are independent of each other and benefit from running in separate, isolated contexts", "The task benefits from a model dynamically deciding, case by case, which of several tools to call next"], "correct": [0, 2], "explanation": "When the steps and their order are already known, a workflow can encode them directly without needing a model to rediscover the right path on every run. Reproducible, testable output, the same input always yielding the same steps, is a natural strength of a fixed sequence, since nothing about the path depends on model judgment. Needing to adapt to genuinely novel, unanticipated input patterns is the opposite case, since that flexibility is what an autonomous agent provides and a fixed workflow structurally cannot. Independent subtasks that benefit from isolated contexts point toward multi-agent decomposition rather than a single deterministic workflow. And a task that benefits from a model dynamically deciding which tool to call next is, by definition, better suited to an agent than to a workflow with no such decision point."}, {"id": "P-D1-B2-22", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "An energy utility's outage-response system currently sends every detected outage through a full autonomous agent that can query grid sensors, weather data, crew schedules, and customer records, even though roughly 80% of outages are routine and fully explained by a single sensor reading. Which elements would make the redesigned architecture proportionate to the actual task mix? (Select all that apply.)", "options": ["Use a deterministic workflow to handle the routine 80% of outages that are fully explained by one sensor reading", "Reserve the autonomous agent's multi-system investigation for the remaining outages where the cause isn't immediately clear", "Route every outage through the full autonomous agent regardless of cause, to keep the handling logic uniform", "Scope the agent's tool access to only the diagnostic systems relevant to unclear-cause investigations", "Replace the agent entirely with a multi-agent swarm so multiple systems are always queried in parallel for every outage"], "correct": [0, 1, 3], "explanation": "Handling the routine, single-reading-explained 80% with a deterministic workflow matches the fixed, well-understood nature of those cases and avoids paying for an investigation they don't need. Reserving the autonomous agent for outages whose cause isn't immediately clear puts the adaptive, multi-system investigation exactly where it's actually needed. Scoping the agent's tools to relevant diagnostic systems keeps it from carrying access it doesn't need for that job, consistent with least privilege. Routing every outage through the full agent for the sake of uniformity is the over-engineering this redesign is meant to fix, not a benefit, since uniformity isn't valuable if it means paying investigation costs on cases that never needed one. Replacing the agent with a multi-agent swarm that always queries everything in parallel adds cost and coordination overhead without addressing that most outages never needed multi-system investigation in the first place."}, {"id": "P-D1-B2-23", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "An architect is scoping a new feature: given a customer's uploaded receipt image and a short question about it, extract the relevant amount and answer the question. A single well-crafted prompt with the receipt content and the question reliably produces correct answers in early testing. Which principle should guide the initial architecture decision?", "options": ["Build the full autonomous multi-tool agent from the start, since it will be needed eventually as the product grows", "Default to a multi-agent design so the architecture doesn't need to change later", "Start with the simplest pattern that meets the requirement, here, a single augmented LLM call, and only add agentic or multi-agent complexity if a concrete limitation shows up", "Build a deterministic ten-step workflow to cover every possible receipt format in advance"], "correct": [2], "explanation": "When a single enhanced call already reliably meets the requirement in testing, starting there keeps cost and complexity proportionate to the actual need, and additional architecture can be added later if a specific, observed limitation demands it. Building the full autonomous agent from the start pays the cost and complexity of flexibility the current requirement doesn't yet need, on the assumption of future growth that may not materialize as expected. Defaulting to multi-agent for a single-call task adds coordination overhead with no independent subtasks to justify it. A ten-step workflow built to anticipate every possible format up front is speculative complexity for a requirement that a single call is already satisfying."}, {"id": "P-D1-B2-24", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A telecom's churn-prevention system looks up a customer's account, then checks one of three known system paths depending on account type: postpaid accounts check payment history, prepaid accounts check recent top-up patterns, and enterprise accounts check contract renewal status. Every account falls into exactly one of these three types, and the path for each type never changes. An architect is deciding between a deterministic workflow with conditional routing by account type and a fully autonomous agent that decides what to check on its own. Which should they choose, and why?", "options": ["A deterministic workflow with conditional routing, because the three possible paths are fully known and enumerable in advance, even though the system does branch", "An autonomous agent, because any branching logic requires a model to decide the next step", "A multi-agent system, because there are three account types and each deserves its own subagent", "A single augmented LLM call, because the account type can be determined from context alone"], "correct": [0], "explanation": "Branching by itself doesn't require an agent; what matters is whether the possible paths are known in advance, and here there are exactly three enumerable paths tied directly to account type, which a workflow's conditional routing handles with full predictability and lower cost. An agent is suited to paths that can't be enumerated ahead of time, not to branching in general; treating every branch as agent-worthy overuses a more expensive, less predictable pattern where a simple routing rule already works. Three account types don't by themselves justify three subagents, since nothing about the task is independent or parallelizable across types, as each customer only ever takes one path. A single call could determine the account type but still couldn't perform the type-specific follow-up lookups a workflow's conditional branch is built to run before producing a churn-risk output."}, {"id": "P-D1-B2-25", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A healthcare software team automates clinical note summarization from a single patient encounter transcript: extract symptoms, medications, and diagnosis, then format them into a structured note. All three extractions read from the exact same transcript and must stay consistent with each other in the final note. An architect proposes a multi-agent design with a coordinator and three subagents, one per extraction type, each working in an isolated context, plus a fourth subagent to format the result. Is this multi-agent design justified?", "options": ["Yes, separating extraction types into subagents is always more accurate than a single call, regardless of how coupled the subtasks are", "Yes, four subagents provide better fault isolation, which matters more than cost or latency in every healthcare use case", "No, but only because healthcare data should never be processed by more than one agent for compliance reasons", "No, the three extractions share the same source transcript and need to stay mutually consistent, so isolating them into separate contexts duplicates the transcript three times over and adds coordination overhead with no independent work to parallelize; a single augmented LLM call or a short two-step workflow fits better"], "correct": [3], "explanation": "Because all three extractions read from the same transcript and must remain consistent with one another in the final note, splitting them into isolated-context subagents means paying to duplicate that transcript three times over while gaining no independent, parallelizable work, since the subtasks are tightly coupled, not separable. A single augmented LLM call, or at most a short workflow of a couple of chained calls, keeps the extractions grounded in the same shared context and naturally consistent, at far lower cost and complexity. There's no general rule that splitting a task into more subagents improves accuracy; accuracy depends on whether the subtasks are actually independent, which these are not. Fault isolation and compliance are separate concerns from this architectural question, and neither is the actual reason the multi-agent design is a poor fit here, the reason is the tight coupling between the three extractions."}, {"id": "P-D1-B2-26", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "An architect is choosing between a single autonomous agent and a multi-agent coordinator-subagent design for a complex research task. Which of the following statements about this choice are accurate? (Select all that apply.)", "options": ["If the subtasks are independent and can run concurrently with their own large contexts, a multi-agent design can reduce wall-clock time even though it uses more total tokens", "A multi-agent design always produces more accurate results than a single agent on the same task", "If each step depends on the full accumulated context of every prior step, a single agent avoids the cost of re-establishing that context across isolated subagents", "Routing subagent results through the coordinator rather than allowing ad hoc peer-to-peer messaging preserves observability into what each subagent found", "A multi-agent design generally reduces total token consumption compared to a single agent handling the same task"], "correct": [0, 2, 3], "explanation": "For genuinely independent subtasks that can run concurrently, distributing them across subagents with their own contexts can shorten wall-clock time, at the cost of higher total token usage, a trade-off worth making under a deadline. When each step depends on everything accumulated so far, keeping that in one agent's context avoids paying to re-establish it in isolated subagents that don't share history, so a single agent is the more efficient fit there. Having subagents report through the coordinator rather than messaging each other directly keeps their findings visible in one place, which is what makes the process observable and auditable. Neither of the last two claims holds in general: accuracy depends on whether the task actually decomposes into independent parts, not on agent count, and multi-agent designs typically increase total token consumption rather than reduce it because of duplicated, isolated contexts."}, {"id": "P-D1-B2-27", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A government contractor is building a benefits-eligibility case processor. The review procedure specifies a fixed sequence of nine checks that must run in exactly the same order for every case, with no step skipped or reordered under any circumstance. Leadership asks for 'an AI agent' to handle this. Which architectural response best fits the actual requirement?", "options": ["Build an autonomous agent and instruct it in the prompt to always follow the nine steps in order", "Explain that the fixed, mandated step order is best implemented as a deterministic workflow, since an agent's freedom to choose its own path works against a requirement that step order never varies", "Build a multi-agent system with nine subagents, one per check, coordinated to run in sequence", "Build a single augmented LLM call that performs all nine checks at once and returns a final eligibility decision"], "correct": [1], "explanation": "Since the nine-step order is fixed and must never vary, a deterministic workflow enforces that order structurally, which is a better match than any pattern that relies on a model choosing to follow it. Instructing an autonomous agent to always follow the steps in its prompt only achieves probabilistic compliance, not the guarantee the 'never reordered under any circumstance' requirement calls for. Nine coordinated subagents running in forced sequence add coordination overhead while still ultimately just re-implementing a fixed order that a workflow already provides directly and more cheaply. A single call performing all nine checks at once loses the ability to verify that each check actually ran in the mandated order, which is central to the requirement."}, {"id": "P-D1-B2-28", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A startup's internal tool takes raw meeting-notes text and returns a short list of action items, a single, self-contained transformation with no external lookups or dependent steps. A newly hired architect redesigns it as a multi-agent system with a coordinator and three subagents (summarizer, action-item extractor, formatter), citing a need to 'scale for the future.' Six weeks later, the tool costs far more per run and takes noticeably longer, while output quality is unchanged. What should the architect do?", "options": ["Keep the multi-agent design, since more agents will make the tool easier to scale once usage grows", "Add a fourth subagent to monitor the cost and latency of the other three", "Revert to a single augmented LLM call (or at most a short two-step workflow) that produces the action items directly, since the task has no independent subtasks that ever justified the multi-agent split", "Merge the three subagents into one autonomous agent that retains all three tools and decides which to call itself"], "correct": [2], "explanation": "Because turning meeting notes into action items is a single, self-contained transformation with no independent subtasks or external dependent steps, the original single-call design already matched the task, and reverting to it removes the coordination overhead and duplicated context that the multi-agent split added for no quality benefit. Keeping the design on the assumption that more agents ease future scaling ignores that nothing about this task's volume or complexity has actually changed to justify that cost today. Adding a fourth subagent to monitor cost and latency treats a symptom of the over-engineered design rather than its cause. Merging the three into one autonomous agent still runs a tool-selection reasoning loop for a task that never needed tool selection at all, since it's a single direct transformation."}, {"id": "P-D1-B3-01", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "An insurance company's claims-processing architecture takes a scanned claim form and adjuster notes as input, extracts fields and applies business rules during processing, and outputs an approval or denial with rationale. Leadership wants the design to include a way for the system to keep improving from real operational outcomes over time. Which addition best closes the feedback loop in this architecture?", "options": ["Store every claim transcript in a data warehouse for quarterly business reporting.", "Capture adjuster overrides and their correction reasons in a structured log, and periodically feed that data into the evaluation dataset and prompt-refinement cycle.", "Add a second LLM call that re-summarizes the first call's output before it reaches the adjuster.", "Raise the model tier used for every claim so fewer claims require an adjuster override."], "correct": [1], "explanation": "A feedback loop only exists when real-world corrections are captured and routed back into improving the system, so logging overrides with their reasons and feeding them into evaluation and prompt updates directly closes that loop. Warehousing transcripts for quarterly reporting is passive reporting, not something that feeds back into the system's behavior. Re-summarizing output only adds another processing step and captures no ground truth about what was wrong. Jumping to a more capable model guesses at a fix without ever learning what the actual failure pattern is, which is a slower and more expensive substitute for closing the loop."}, {"id": "P-D1-B3-02", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A team builds a multi-agent system that drafts software release notes. The coordinator spawns a changelog-writer subagent and passes it only the current git diff. The subagent's draft references 'the customer escalation from Tuesday's incident,' a detail that was discussed earlier in the coordinator's conversation but was never given to the subagent. What is the most likely root cause, and what should change?", "options": ["The coordinator must explicitly include the relevant incident context in the subagent's prompt, since subagents do not inherit the coordinator's conversation history.", "Switch the changelog-writer subagent to a more capable model tier so it reasons more carefully before writing.", "Add a post-hoc fact-checking subagent that reviews the changelog after it has already been written.", "Merge the coordinator and subagent into a single agent to simplify the architecture."], "correct": [0], "explanation": "Subagents run with isolated context and do not automatically inherit the coordinator's history, so any detail the subagent needs, like the Tuesday incident, must be passed explicitly in its prompt; that is exactly what produced the hallucinated reference here. A more capable model does not fix a missing-context problem, since the subagent has no way to know about an incident it was never told about. A fact-checking pass is a detective control that catches the error after the fact rather than preventing it. Collapsing the architecture into one agent removes the isolation and specialization benefits multi-agent design was chosen for, rather than fixing how context is passed."}, {"id": "P-D1-B3-03", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "An employee-onboarding agent handles account provisioning, equipment ordering, training scheduling, and HR policy questions from a single system prompt wired to more than 20 tools. It frequently calls the wrong tool for a given request. The four jobs have no dependencies on one another. Which redesign best matches the structure of this problem?", "options": ["Give the single agent a routing step that calls all 20 tools on every request and filters the results afterward.", "Split the work into role-specific subagents, covering provisioning, equipment, training, and policy Q&A, each scoped to only the few tools its task needs, coordinated by a coordinator.", "Keep a single agent but lengthen the system prompt to more explicitly explain when to use each tool.", "Replace the single agent with one general-purpose subagent per request that dynamically decides which of the 20 tools to load."], "correct": [1], "explanation": "Because the four jobs are independent, splitting them into role-specific subagents that each carry only the tools relevant to their task directly fixes the tool-selection problem by keeping each agent's tool set small and focused. Calling every tool on every request and filtering afterward wastes cost and latency without improving selection accuracy. A longer system prompt is a probabilistic nudge that does not remove the underlying capability bloat causing misselection. A single general-purpose subagent that still dynamically loads from the same 20 tools keeps the same bloated tool set in play and does not decompose by role at all."}, {"id": "P-D1-B3-04", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A bank scores every transaction for fraud in under 300ms at the 95th percentile. Every request sends the full 9,000-token policy manual as part of the prompt and uses the most capable, most expensive model tier for every transaction, including routine ones. Latency is close to the SLA ceiling and the API bill is high. Which change most directly reduces cost and latency without weakening the reasoning applied to genuinely ambiguous cases?", "options": ["Cache the policy manual as a fixed prompt prefix, and reserve the most capable model tier for the minority of transactions flagged as ambiguous while scoring routine transactions on a faster, cheaper tier.", "Increase the per-transaction timeout so the current model has more time to finish reasoning before the SLA is breached.", "Keep the most capable tier for every transaction, but move the policy manual into a retrieval step that fetches only likely-relevant clauses each time.", "Add more compute nodes running the same model tier in parallel to reduce queueing delay under load."], "correct": [0], "explanation": "Caching the repeated policy manual as a stable prefix cuts the dominant token cost and reduces time-to-first-token, and routing only ambiguous transactions to the most capable tier removes the biggest remaining cost driver, paying for expensive reasoning on routine cases, without touching accuracy where it matters. Loosening the timeout treats the SLA as the problem instead of the architecture, and a slower response is still a worse outcome for the business. Retrieving only relevant clauses can reduce tokens somewhat but keeps the most expensive tier on 100% of transactions, so cost and latency stay close to the ceiling. Adding more parallel nodes is infrastructure spending that raises cost further while leaving the actual per-transaction expense and prompt size untouched."}, {"id": "P-D1-B3-05", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A customer-support architecture takes a customer message and account context as input, calls CRM and order-system tools during processing, drafts a reply for review as output, and needs a feedback loop for cases that get escalated. Which of the following are sound design choices for making this input-to-feedback loop robust?", "options": ["Persist a structured 'case facts' block, such as account ID, stated expectations, and key dates, that survives context summarization across the conversation.", "Use the agent's own sentiment analysis of the customer's message as the primary signal for whether to escalate to a human.", "Route conversations to a human when the customer explicitly asks for one, when there is a policy gap or exception, or when the agent genuinely cannot progress.", "Rely on the assistant's closing remark, such as 'I've resolved this issue,' as the signal to end the loop and close the ticket.", "Place the most important extracted findings, such as order status and prior commitments, near the top of the assembled context rather than deep in a long transcript."], "correct": [0, 2, 4], "explanation": "A persistent case-facts block protects numbers, dates, and commitments from being silently dropped by summarization; escalating on explicit requests, policy gaps, and genuine inability to progress are the valid triggers for routing to a human; and surfacing key findings near the top of the context accounts for models attending less to the middle of long inputs. Sentiment analysis is an unreliable proxy for escalation decisions, so building the loop around it risks both over- and under-escalating. Treating the assistant's own closing sentence as a completion signal is the same anti-pattern as parsing prose to decide when a loop is done; it should be a structured, verifiable condition, not generated text."}, {"id": "P-D1-B3-06", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "An architecture team is building a multi-agent research assistant: a coordinator delegates to four subagents, one per competitor, followed by a synthesis agent. Which of the following are correct orchestration practices for this design?", "options": ["Spawn the four research subagents in parallel by emitting multiple Task tool calls within a single coordinator response, since their research tasks are independent of one another.", "Have each research subagent report its findings back through the coordinator rather than directly to each other, so the coordinator retains full observability into the process.", "Let each research subagent automatically inherit the coordinator's full conversation history, so it has context on the other three competitors being researched.", "Run the four research subagents sequentially, one after another, to guarantee they cannot interfere with each other's context.", "Have the four research subagents communicate directly with one another to divide up competitors, without involving the coordinator."], "correct": [0, 1], "explanation": "Because the four competitor research tasks are independent, emitting multiple Task calls in a single response lets them run in parallel, and routing every subagent's findings back through the coordinator keeps a single observable point over the whole process. Subagents do not automatically inherit the coordinator's history; each one only has what its own prompt explicitly includes, so assuming shared context is wrong. Running them sequentially trades away the latency benefit of parallelism for a guarantee that isolated context already provides for free. Letting subagents talk directly to each other bypasses the coordinator and removes the observability that hub-and-spoke communication is meant to preserve."}, {"id": "P-D1-B3-07", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A single Claude call is asked to research a market, draft an analysis, fact-check its own draft, and format the final report, all in one prompt. The team observes inconsistent quality across these four jobs. What change best addresses this?", "options": ["Increase the max output length so the single call has more room to complete all four jobs.", "Break the single call into a sequence of smaller calls, one each for research, drafting, fact-checking, and formatting, passing each stage's output forward to the next.", "Add more few-shot examples of complete, polished reports to the same single prompt.", "Switch the single call to a more capable model tier to raise quality across all four jobs at once."], "correct": [1], "explanation": "Decomposing the work into a sequence of focused calls gives each job a clear, checkable output and lets fact-checking actually verify a completed draft instead of happening inside the same pass that produced it. Giving the same monolithic call more room to write does not address why quality is inconsistent across four different jobs crammed into one pass. More examples can help formatting or tone but cannot substitute for separating genuinely distinct jobs like research and fact-checking. A more capable model may raise the ceiling somewhat but leaves the same structural problem, one call doing four jobs, fully in place."}, {"id": "P-D1-B3-08", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "A pipeline summarizes 2 million archived documents overnight; nobody is waiting on the results, and the output only needs to be ready before the next morning's search-index refresh. Which combination of decisions best balances cost, performance, and maintainability for this specific workload?", "options": ["Submit the summarization requests through the Message Batches API, since the workload is latency-tolerant and the cost savings at this volume are substantial.", "Use the most capable model tier for all 2 million documents to guarantee the highest possible summary quality, since cost is secondary for a nightly batch job.", "Use a smaller, faster model tier for the summarization step, reserving the more expensive high-reasoning tier only for documents that fail an automated quality check.", "Process the documents synchronously through the standard low-latency API path so the nightly job finishes as quickly as possible.", "Keep the summarization prompt and formatting rules in one modular, versioned template so future format changes only need to be updated in one place."], "correct": [0, 2, 4], "explanation": "This workload is defined by having no one waiting on results, which is exactly the profile the Message Batches API is built for, and combining that with a cheaper default model tier, escalating only quality-check failures to the stronger tier, captures most of the available cost savings without sacrificing accuracy where it's actually needed. A single modular prompt template also keeps future formatting changes cheap to make and low-risk to roll out. Using the most expensive tier for every document treats cost as unimportant when the scenario specifically calls it out as a concern at this volume. Rushing the job through a low-latency synchronous path optimizes for speed nobody asked for, at a cost premium the batch-tolerant workload doesn't need to pay."}, {"id": "P-D1-B3-09", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "An internal IT helpdesk agent classifies an employee's ticket, retrieves relevant knowledge-base articles, and drafts resolution steps, then either auto-closes the ticket or escalates it. Which output-stage design most directly prevents an unresolved ticket from silently being marked closed?", "options": ["Instruct the agent, in its system prompt, to always double-check that the issue is resolved before closing the ticket.", "Add a programmatic check that only allows a ticket to transition to 'closed' when a required resolution-confirmation field has been populated.", "Add a nightly report listing tickets closed without confirmation, for a manager to review the next morning.", "Instruct the agent to write 'RESOLVED' in capital letters at the end of any ticket it considers closed."], "correct": [1], "explanation": "A programmatic gate that requires a confirmation field before the status can change to closed is a deterministic, preventive control; the ticket simply cannot close in an unconfirmed state, regardless of what the model generates. A system-prompt instruction to double-check is a probabilistic nudge with a non-zero failure rate on exactly the cases that matter. A next-morning report is a detective control that only surfaces the problem after tickets have already closed incorrectly. Having the agent print a keyword in its output relies on parsing generated text as a completion signal, which is unreliable for the same reason parsing assistant prose to decide loop termination is unreliable."}, {"id": "P-D1-B3-10", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A legal-tech company's contract-review system has a coordinator agent that needs to explore three independent negotiation strategies starting from the same shared conversation baseline, without redoing the shared setup work each time. Which mechanism should the architect use?", "options": ["Re-run the entire coordinator conversation three times from scratch with the same initial prompt.", "Use fork_session to create three independent branches from the shared baseline conversation.", "Spawn three subagents via Task calls and have each one automatically inherit the coordinator's full history.", "Use a single long-running session and switch between three different system prompts mid-conversation."], "correct": [1], "explanation": "fork_session is designed exactly for this case, creating independent branches from a shared baseline so each strategy can be explored separately without repeating the setup work. Re-running the whole conversation from scratch three times wastes the already-completed shared setup that forking is meant to preserve. Subagents do not automatically inherit the coordinator's history, so treating Task delegation as a branching mechanism is a factual mismatch as well as the wrong tool for the job. Switching system prompts inside one linear session keeps a single shared history across all three strategies, letting each one leak into the others instead of remaining independent."}, {"id": "P-D1-B3-11", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A financial due-diligence workflow has four subtasks: risk-scoring, which needs the completed output of entity-extraction; entity-extraction itself; a regulatory-filings lookup; and a news-sentiment scan. The filings lookup and sentiment scan depend on nothing else in the workflow. Which decomposition strategy correctly matches execution pattern to problem structure?", "options": ["Run all four subtasks in parallel to minimize total latency, then reconcile any inconsistencies in a final merge step.", "Chain entity-extraction and risk-scoring sequentially so risk-scoring always receives extraction's completed output, while running the filings lookup and sentiment scan in parallel since neither depends on the other steps.", "Chain all four subtasks sequentially in a fixed pipeline to keep the architecture simple and easy to reason about.", "Assign all four subtasks to a single generalist agent so no explicit dependency management between subtasks is needed."], "correct": [1], "explanation": "Risk-scoring genuinely depends on entity-extraction's output, so those two must run in sequence, while the filings lookup and sentiment scan have no dependency on anything else and gain nothing from waiting; the correct design chains exactly the pair that needs it and parallelizes the rest. Running all four in parallel would let risk-scoring start on extraction results that don't exist yet, producing a correctness bug that a later merge step cannot reliably repair. Serializing all four steps is simpler to draw but needlessly delays two subtasks that have no reason to wait, costing latency for no benefit. Handing everything to one generalist agent avoids the dependency question entirely but reintroduces the reliability and tool-bloat problems that decomposition is meant to solve."}, {"id": "P-D1-B3-12", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A production system has six specialized subagents, each wired to a handful of tools. A new engineer proposes consolidating all of them into one 'mega-agent' carrying all 30 tools, arguing it will cut infrastructure overhead and simplify the codebase. What is the best response?", "options": ["Adopt the consolidation, since fewer agents is always cheaper and easier to maintain regardless of tool count.", "Keep the specialized subagents: consolidating into one agent with 30 tools would degrade tool-selection reliability and violate least privilege, which outweighs the modest infrastructure and maintainability savings the consolidation promises.", "Adopt the consolidation, but compensate by switching the mega-agent to the most capable model tier so it can handle the larger tool set reliably.", "Reject the consolidation and instead split into a seventh subagent so each existing subagent has even fewer tools."], "correct": [1], "explanation": "Keeping the specialized subagents is correct because a single agent carrying 30 tools is well past the point where tool selection reliably degrades, and the resulting cost of wrong or wasted tool calls outweighs the modest infrastructure and maintainability savings consolidation promises. Treating fewer agents as automatically cheaper and easier to maintain ignores the documented reliability cost of capability bloat on tool selection. Compensating with a more capable, more expensive model tier raises cost to paper over an architectural problem instead of fixing it, undermining the very infrastructure-cost argument used to propose the change. Splitting into a seventh subagent isn't justified by anything in the scenario; it adds coordination overhead to solve a problem that was never described."}, {"id": "P-D1-B3-13", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "An expense-report approval agent classifies each submitted expense against policy and flags exceptions, and the team wants to know when a human auditor later overturns one of its flags. Which addition best creates a usable feedback loop?", "options": ["Have the agent re-run its own decision a second time and treat agreement between the two runs as evidence the original decision was correct.", "Log every case where a human auditor overturns the agent's flag, tagged with the reason, and route that data into periodic accuracy review.", "Rely on the agent's stated confidence in its own flag decision as the signal for whether the policy needs updating.", "Send a summary email to finance leadership once a quarter listing total expenses processed."], "correct": [1], "explanation": "Logging overturned flags with the auditor's stated reason creates real ground truth the system can learn from, which is what a feedback loop requires. Having the agent check itself twice never involves a human judgment or real-world outcome, so agreement between two runs proves nothing about correctness. The model's self-reported confidence is an unreliable proxy for whether anything actually needs to change. A quarterly volume summary is aggregate reporting that contains no information about which specific decisions were wrong or why."}, {"id": "P-D1-B3-14", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A research coordinator agent spawns three regional-analysis subagents. Even though the coordinator already discussed the client's industry and target region with the user, that information must be explicitly restated in each subagent's prompt. Why?", "options": ["Because the Task tool truncates any prompt longer than a fixed length, so repetition is required to avoid losing the original instructions.", "Because subagents run in isolated context and do not automatically inherit the coordinator's conversation history, so any context they need must be passed explicitly.", "Because subagents only default to the most capable model tier when given a full restatement of context.", "Because the coordinator's history is deleted as soon as a subagent is spawned."], "correct": [1], "explanation": "Subagents run with isolated context by design, so nothing from the coordinator's conversation reaches them unless it is explicitly written into their prompt. There is no length-based truncation rule governing this behavior; that is not how the isolation works. Model tier selection is unrelated to how much context is restated in a prompt. The coordinator's own history is not deleted when a subagent is spawned; it simply isn't shared with the subagent in the first place."}, {"id": "P-D1-B3-15", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "An architect is decomposing an insurance-underwriting problem into subtasks: applicant identity verification, risk-factor extraction, and premium calculation, where premium calculation needs the outputs of both other steps. Which of the following decomposition decisions are sound?", "options": ["Split subtasks along clear functional boundaries, identity verification, risk-factor extraction, and premium calculation, so each piece has a narrow, testable responsibility.", "Decompose the problem into as many single-purpose micro-agents as possible, on the theory that smaller scope is always better regardless of orchestration overhead.", "Route identity verification and risk-factor extraction to run in parallel since neither needs the other's output, while premium calculation waits for both to finish.", "Keep underwriting as one monolithic call so the model can see the entire context at once and no hand-off format between steps is needed.", "Run premium calculation in parallel with identity verification and risk-factor extraction to save time, then adjust the premium afterward if the other two steps surface new information."], "correct": [0, 2], "explanation": "Splitting along functional boundaries gives each subtask a narrow, testable job, and running identity verification and risk-factor extraction in parallel while premium calculation waits for both correctly reflects the real dependency in this problem. Decomposing into as many micro-agents as possible ignores that orchestration overhead is a real cost, not a free way to shrink scope. Keeping everything as one monolithic call reintroduces the reliability and tool-selection problems that motivated decomposing the problem in the first place. Starting premium calculation before its two dependencies finish and patching it afterward risks producing an initially wrong number and reworking it, rather than simply respecting the dependency that already exists."}, {"id": "P-D1-B3-16", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "A telecom's network-anomaly triage agent must respond to on-call engineers in under a second, the API bill from 50,000 daily events is a growing concern, and the on-call team says the current single prompt, containing all triage logic, every runbook, and every past incident example, is hard to update without breaking something whenever a new failure mode appears. Which redesign best balances performance, cost, and maintainability together?", "options": ["Keep the single prompt but upgrade to the most capable model tier so it can reason through all runbooks and examples more reliably in one pass.", "Split the single prompt into a lean routing step on a fast, cheap model tier that classifies the anomaly type, followed by a focused, cacheable prompt containing only the runbook and examples relevant to that type.", "Split the single prompt into one dedicated agent per known failure mode today, with each runbook hard-coded directly into that agent's prompt.", "Leave the architecture as is, but add a caching layer in front of the API to serve repeated anomaly queries from cache."], "correct": [1], "explanation": "Routing first on a cheap, fast tier keeps the common path quick and inexpensive, and narrowing the following prompt to only the relevant runbook, as a cacheable, focused block, improves latency, cost, and maintainability together, since updating one failure mode's runbook no longer risks the entire prompt. Upgrading the model tier raises cost and does nothing to fix the maintainability problem the on-call team actually complained about. Hard-coding one agent per known failure mode creates the same maintainability trap in a different shape, since every new failure mode still requires writing and wiring up a whole new agent. A generic caching layer doesn't fit a workload where each anomaly is likely to be distinct, so it neither reliably reduces cost nor addresses the prompt bloat driving the maintainability complaint."}, {"id": "P-D1-B3-17", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "hard", "question": "An internal engineering knowledge-base assistant retrieves relevant documents before answering questions about deployment protocols. A production review finds that when the retrieval step returns zero matching documents, the assistant still generates a confident, detailed answer citing a 'standard protocol' that does not exist anywhere in the knowledge base. Which architecture change most directly fixes this failure mode at the right stage?", "options": ["Fine-tune the model on more examples of the knowledge-base content so it memorizes the protocols directly.", "Add an explicit branch in the processing stage: when retrieval returns zero relevant documents, route to a distinct 'insufficient information' response instead of passing empty context into the same generation prompt.", "Add a disclaimer sentence to the system prompt instructing the model to say when it is unsure.", "Increase the number of documents retrieved per query so the retrieval step is less likely to return zero results."], "correct": [1], "explanation": "The failure happens specifically at the boundary between retrieval and generation, so a deterministic branch that detects zero relevant documents and routes to a distinct response is a preventive, structural fix placed exactly where the problem occurs. Fine-tuning targets the wrong layer entirely and does nothing for future gaps the knowledge base doesn't yet cover. A system-prompt disclaimer is a probabilistic nudge, and this is precisely the kind of business-critical behavior that needs deterministic enforcement rather than a request the model might not follow. Retrieving more documents per query can mask some zero-result cases but doesn't handle genuine gaps in the knowledge base, and it adds irrelevant context and cost to every other query in the process."}, {"id": "P-D1-B3-18", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A coordinator delegates code-review subtasks to five subagents, one per microservice, running in parallel, then aggregates their findings into a report for a human reviewer. An engineer proposes letting each subagent post its findings directly into the team's shared chat channel as soon as it finishes, instead of returning them to the coordinator, to save a step. What is the issue with this proposal?", "options": ["There is no issue; posting directly is strictly faster since it removes a hop through the coordinator.", "Findings should be routed back through the coordinator rather than posted directly, so the coordinator retains full observability into all subagent outputs before anything becomes externally visible.", "The subagents should instead be merged into the coordinator itself so only one agent ever posts to chat.", "Each subagent should first ask the human reviewer for permission before posting anything."], "correct": [1], "explanation": "Routing findings through the coordinator preserves a single observable point over everything the subagents produce, which matters for catching problems before five independent, unreviewed messages land in a shared channel. Removing that hop may shave a small amount of time but trades away the observability the hub-and-spoke design exists to provide. Merging all five subagents into the coordinator throws away the specialization and parallel review that motivated using subagents per microservice in the first place. Requiring a permission step from the human reviewer for an internal aggregation flow adds friction that the observability concern doesn't call for."}, {"id": "P-D1-B3-19", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A junior engineer asks when a task should be split into a multi-step pipeline versus handled as a single call, using a simple example: classifying a support ticket into one of five categories. What is the best guidance?", "options": ["Always decompose every task into at least three subagents regardless of complexity, since more structure is inherently more reliable.", "A single, focused call is appropriate here; decomposition adds coordination overhead that isn't justified for a simple, single-step classification task.", "Decompose the classification task into five separate subagents, one per category, that each vote on whether the ticket belongs to them.", "Route the classification task through a full retrieval pipeline with document chunking and indexing before classifying."], "correct": [1], "explanation": "A single-step classification into five categories is exactly the kind of simple, well-bounded task where one focused call is the right amount of architecture, since decomposition only pays for itself when it reduces real complexity or dependency problems. Splitting every task into multiple subagents regardless of complexity adds coordination overhead without any corresponding benefit here. Assigning one subagent per category to vote turns a simple classification into an unnecessarily expensive multi-agent process. Building a full retrieval pipeline for a task that doesn't involve searching a document set is machinery the problem doesn't call for."}, {"id": "P-D1-B3-20", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "easy", "question": "A marketing team's campaign-editor tool sends the same 6,000-token style guide and brand-voice instructions with every one of 40,000 daily copy-generation requests, and must return generated copy within seconds while a user is actively working in the editor. Which change most directly reduces both cost and latency without reducing output quality?", "options": ["Shorten the style guide to 500 tokens by removing detail, even though some nuance will be lost.", "Place the style guide and brand-voice instructions as a stable prefix and enable prompt caching, so the reused prefix isn't reprocessed at full cost on every request.", "Switch every request to the most capable model tier so each generation needs fewer retries.", "Batch all 40,000 requests into a single overnight run using the Message Batches API."], "correct": [1], "explanation": "The style guide is identical on every request, so placing it as a stable prefix and enabling prompt caching directly cuts both the reprocessing cost and time-to-first-token without dropping any of the guide's content. Shortening the guide trades away quality to solve a cost problem that caching solves without any such trade-off. A more capable model tier does not address the actual cost driver, which is reprocessing the same 6,000 tokens on every request. Batch processing is built for latency-tolerant work, but users in this scenario are waiting seconds for copy while actively editing, so an overnight turnaround does not fit the workload at all."}, {"id": "P-D1-B3-21", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "A DevOps incident-response agent investigates alerts through a loop of tool calls before producing a remediation step or escalating. Which of the following implementation choices correctly follow the recommended agentic loop pattern?", "options": ["Terminate the tool-use loop by checking the API response's stop_reason field for end_turn, rather than scanning the assistant's generated text for phrases like 'I'm done.'", "When stop_reason is tool_use, execute the requested tool call(s), append the results to the conversation history, and send the updated conversation back to continue the loop.", "Design the termination logic around the model's structured stop signal rather than an arbitrary fixed number of iterations, so a genuinely complex incident isn't cut off mid-investigation.", "Parse the assistant's natural-language explanation of its plan to decide whether the investigation is finished.", "Hard-code a maximum of three tool calls per incident as the primary mechanism for ending the loop, regardless of stop_reason."], "correct": [0, 1, 2], "explanation": "Checking stop_reason for end_turn, executing tool calls and looping again whenever stop_reason is tool_use, and basing termination on that structured signal rather than an arbitrary cap are exactly the mechanics of the recommended agentic loop. Parsing the assistant's prose to judge whether the work is finished is the named anti-pattern of reading generated text as a completion signal, which is unreliable because nothing guarantees the wording will be consistent or accurate. Making a fixed count of three tool calls the primary way the loop ends is the other named anti-pattern, an arbitrary cap that will cut off legitimately complex incidents before they're resolved, regardless of what the model's actual stop signal says."}, {"id": "P-D1-B3-22", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "hard", "question": "A quarterly-report system has a coordinator, four parallel data-gathering subagents, one per business unit, and a synthesis agent that writes the executive summary once all four are done. The design must pass a strict least-privilege security review. Which combination of decisions is correct?", "options": ["Grant each data-gathering subagent read access only to its own business unit's data sources, not the other three, even though the coordinator has broader access.", "Have the synthesis agent wait until all four data-gathering subagents return their results to the coordinator, since its output depends on all four.", "Configure the coordinator's allowedTools to include the Task tool so it can spawn the four subagents, while each subagent's own tool list stays limited to what its data-gathering role needs.", "Grant every subagent the same full tool access as the coordinator, so any subagent could take over if another one fails.", "Let the synthesis agent begin drafting the executive summary as soon as the first business unit's subagent returns, patching in the remaining three units' data as it arrives."], "correct": [0, 1, 2], "explanation": "Scoping each data-gathering subagent to only its own business unit's sources satisfies least privilege even though the coordinator itself has broader access, waiting for all four results before synthesis correctly reflects that the executive summary genuinely depends on every unit's data, and giving the coordinator delegation access while keeping each subagent's own tools narrow combines correct orchestration mechanics with least privilege. Giving every subagent the same full access as the coordinator is exactly the kind of excess permission a least-privilege security review exists to catch, and 'in case another one fails' does not justify it. Starting the executive summary before all four units have reported risks an incomplete or misleading document built on partial data, which is a real correctness risk the scenario gives no reason to accept for a marginal latency gain."}, {"id": "P-D1-B3-23", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A logistics company's shipment-exception agent currently classifies the exception type, looks up shipment and carrier data, and drafts a customer-facing explanation, all in one call. Quality is fine on the first two jobs but suffers specifically on drafting tone for high-value enterprise customers versus standard ones. What is the best decomposition fix?", "options": ["Redo the entire pipeline as three fully independent parallel calls, including having the drafting call independently re-look-up the shipment and carrier data.", "Keep classification and data lookup as they are, but split drafting into its own call with tone and context specific to the customer tier, fed by the outputs of the first two steps.", "Fix the drafting quality by adding many more tone instructions to the single combined prompt.", "Replace the single call with a more expensive model tier, keeping the same combined three-part prompt."], "correct": [1], "explanation": "Since the problem is isolated to one of three jobs, splitting only the drafting step into its own call, fed by classification and lookup's already-reliable outputs, targets the actual weak point without disturbing the two jobs that already work well. Making all three calls independent and parallel would have drafting redundantly re-fetch data it could simply receive from the lookup step, and drafting genuinely depends on that data, so parallelizing it is a structural mismatch. Piling more tone instructions into the same combined prompt doesn't address that drafting is competing for attention with two unrelated jobs in the same call. A more expensive model keeps the same structural problem in place and pays more for a fix that decomposition achieves directly."}, {"id": "P-D1-B3-24", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "multiple", "difficulty": "medium", "question": "An internal coding assistant has grown into a single agent with 22 tools. Most requests only need file read, search, and edit; a small number occasionally need deploy or database-migration actions. The team wants lower cost and better maintainability without hurting performance on the common case. Which changes should the architect recommend?", "options": ["Split the deploy and database-migration tools into a separate, narrowly scoped subagent invoked only for those specific requests, leaving the everyday agent with a small, focused tool set.", "Reserve the more expensive, high-reasoning model tier for the subagent handling deploy and migration actions, and use a faster, cheaper tier for the everyday file read, search, and edit agent.", "Leave all 22 tools on the single agent, but add a note at the top of the system prompt saying deploy and migration tools should only be used when explicitly asked.", "Remove the deploy and database-migration tools entirely so the agent can never perform those actions, and have engineers run them manually outside the assistant.", "Move all 22 tools, including deploy and migration, onto the most expensive model tier so no request is ever at risk of a reasoning failure."], "correct": [0, 1], "explanation": "Carving the deploy and migration tools into their own narrowly scoped subagent shrinks the everyday agent's tool set, which helps both selection reliability and cost, and pairing a cheaper tier with the common-case agent while reserving the expensive tier for the higher-stakes subagent matches model cost to task complexity. A prompt note asking the model to only use certain tools when explicitly asked is a probabilistic nudge that doesn't reduce the everyday agent's tool-selection burden or its cost. Removing the tools entirely throws away real functionality the team still needs, rather than scoping it properly into a separate, appropriately restricted subagent. Putting every request, including the simple common-case ones, on the most expensive tier raises cost across the board, which is the opposite of what the team asked for."}, {"id": "P-D1-B3-25", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A supply-chain replenishment agent forecasts demand and drafts purchase orders for buyer approval. Buyers approve 95% of drafts unchanged, but the system has no way to learn from the 5% of cases where a buyer edits the draft before approving it. What is the best feedback-loop addition?", "options": ["Require every purchase order to be manually re-typed by a buyer from scratch, regardless of the agent's draft, to guarantee human oversight.", "Diff each approved purchase order against the agent's original draft, and periodically feed the pattern of buyer edits back into the forecasting prompt and examples.", "Increase the forecast horizon the agent uses so it generates purchase orders further in advance.", "Add a monthly dashboard showing the total dollar value of purchase orders generated."], "correct": [1], "explanation": "Diffing approved orders against the original drafts surfaces exactly what buyers changed, and feeding recurring correction patterns back into the forecasting prompt and examples is what stops the same edits from recurring, a real, targeted feedback loop. Requiring manual re-typing of every order removes the efficiency the system exists to provide and captures no more information than the diff approach would, at a much higher ongoing cost. Extending the forecast horizon doesn't address the actual gap described, which is that edit patterns aren't being captured or used at all. A dashboard of total dollar value is aggregate reporting that says nothing about which specific corrections buyers are making or why."}, {"id": "P-D1-B3-26", "cert": "CCAR-P", "domain": "Solution Design & Architecture", "type": "single", "difficulty": "medium", "question": "A media company's content-localization coordinator spawns one translate subagent per target language for 8 languages, and each language's regional-compliance-check subagent must run only after that language's translation completes. An engineer proposes launching all 16 subagents, 8 translate and 8 compliance, as parallel Task calls in the coordinator's very first response. What is wrong with this plan?", "options": ["Nothing is wrong; launching all 16 in one response is fastest, and subagent context isolation guarantees correctness regardless of ordering.", "Each compliance-check subagent depends on its corresponding translation's output, so launching all 16 at once would let compliance c
