sum of money", "The user explicitly asks to speak with or be handled by a human", "The output is flagged by a calibrated confidence signal, such as a low retrieval-match score against verified source documents", "The model's own end-of-response statement claims a high confidence level in its answer", "An automated sentiment classifier scores the user's message as calm rather than frustrated"], "correct": [0, 1, 2], "explanation": "High-impact or hard-to-reverse actions, an explicit human request, and calibrated, independently verifiable confidence signals are all recognized, reliable triggers for routing to a human before an action executes. A model's self-reported confidence is an unreliable proxy for actual correctness and shouldn't be trusted as a signal on its own, and sentiment classification is similarly unreliable and, in this case, would actively suppress escalation rather than trigger it, which is backwards for a safety gate."}, {"id": "P-D5-B2-26", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "multiple", "difficulty": "medium", "question": "An architect is designing access controls for an agent that can query and update records in a hospital's EHR system. Which practices satisfy HIPAA-aligned access governance for this agent? (Select all that apply.)", "options": ["Maintain per-record access logs that capture which identity or agent session accessed or modified which record and when", "Scope the agent's tool permissions to only the record operations its specific role requires, following least privilege", "Grant the agent broad read and write access to the entire EHR system to avoid permission errors interrupting clinical workflows", "Rely on the agent to state in its final response which records it accessed during the session", "Log only failed access attempts, since successful, permitted accesses don't need to be recorded"], "correct": [0, 1], "explanation": "HIPAA-aligned access governance requires an actual audit trail of who or what accessed each record and permissions scoped to least privilege, both of which are enforceable, verifiable controls. Granting broad access to avoid friction is the opposite of least privilege and expands the system's exposure to PHI far beyond what's needed, relying on the agent's self-reported summary of what it accessed is an unverifiable substitute for a real access log, and logging only failures would miss the audit trail needed for successful PHI access as well."}, {"id": "P-D5-B2-27", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "multiple", "difficulty": "medium", "question": "A team is defining data-handling practices for a new Claude-based feature that processes customer-submitted documents. Which practices reflect responsible, ethical data use? (Select all that apply.)", "options": ["Collect and retain only the data fields actually needed to perform the feature's task", "Clearly inform users how their submitted data will be used and stored before they submit it", "Provide a reasonable opt-out or alternative path for users who don't want their data used for this feature", "Collect the broadest possible set of data fields up front in case future features need them later", "Use inferred demographic attributes to silently vary service quality between users without disclosure"], "correct": [0, 1, 2], "explanation": "Data minimization, clear disclosure of intended use, and giving users a genuine choice are core responsible-data-use practices that respect user autonomy and limit unnecessary exposure. Collecting broad data just in case violates data minimization and increases risk without a defined current purpose, and silently varying service quality by inferred demographic attributes without disclosure is both an ethical violation and a fairness problem, not an acceptable practice."}, {"id": "P-D5-B2-28", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "single", "difficulty": "medium", "question": "An internal Claude-based agent has permissions to directly modify production IAM policies to fix access issues reported by engineers. Currently, changes apply immediately and are logged for a weekly retrospective review. After an incorrectly broadened IAM policy caused a security exposure, what should the architect change?", "options": ["Require a blocking human approval step before any IAM policy change executes, given how high-impact and hard to reverse such changes can be", "Keep the current workflow but shorten the retrospective review cycle from weekly to daily", "Keep the current workflow but require the agent to log a written justification alongside each change", "Restrict the agent to only reading IAM policies and require engineers to manually apply all changes going forward, eliminating the agent's write capability entirely"], "correct": [0], "explanation": "Given how high-impact and potentially hard to reverse an incorrect IAM change can be, the right fix is a preventive, blocking approval gate before the change executes, not a faster or better-documented after-the-fact review. Shortening the review cycle or adding justification text are still detective controls that only catch problems after they've already taken effect. Removing the agent's write capability entirely is a bigger step back in capability than needed when a proportionate pre-execution gate solves the actual problem."}, {"id": "P-D5-B2-29", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "single", "difficulty": "hard", "question": "A company plans to deploy a Claude-based system that automatically scores and shortlists job applicants at scale for hundreds of open roles across the EU. Before deployment, what should the architect ensure happens first?", "options": ["Conduct a Data Protection Impact Assessment to evaluate and mitigate the risks this large-scale automated profiling poses to applicants' rights", "Deploy the system with a carefully worded system prompt instructing the model to be fair to all applicants", "Deploy the system and begin monitoring for complaints from rejected applicants after launch", "Rely on the AI vendor's general compliance certification as sufficient evidence the deployment is compliant"], "correct": [0], "explanation": "Large-scale automated profiling of individuals, such as scoring and shortlisting job applicants at scale, is a high-risk processing activity under GDPR that calls for a Data Protection Impact Assessment before deployment to identify and mitigate risks to applicants. A well-worded fairness prompt is a probabilistic mitigation, not a substitute for a structured risk assessment, launching and waiting for complaints is reactive rather than the required preventive step, and a vendor's general compliance certification doesn't assess the specific risks of this particular high-risk use case."}, {"id": "P-D5-B2-30", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "multiple", "difficulty": "hard", "question": "A lending platform monitors its Claude-based underwriting assistant after launch. Which of the following observations indicate a genuine fairness problem that warrants architectural intervention, rather than being dismissed as normal statistical noise? (Select all that apply.)", "options": ["Approval rates differ significantly by a protected demographic attribute even after controlling for the financially relevant factors the underwriting policy is supposed to weigh", "Complaint volume and reported errors cluster disproportionately around applications from one demographic group", "A held-out fairness audit shows a consistently higher false-decline rate for one demographic group across multiple evaluation cycles", "The platform's overall approval rate shifted by half a percentage point between two consecutive months with no demographic pattern behind it", "Two applicants from different demographic groups received different decisions, but their applications also differed in other legitimate financial factors relevant to the policy"], "correct": [0, 1, 2], "explanation": "A demographic disparity that persists after controlling for legitimate factors, a complaint pattern clustered by demographic group, and a consistently elevated false-decline rate for one group across repeated audits are all concrete signals of a real fairness problem needing architectural attention, such as targeted evaluation and mitigation. A small overall rate shift with no demographic pattern is ordinary month-to-month variation, and two applicants with genuinely different legitimate financial factors receiving different decisions is expected behavior, not evidence of bias; the concerning case is a disparity that remains after those legitimate factors are accounted for."}, {"id": "P-D5-B2-31", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "multiple", "difficulty": "medium", "question": "A company is designing its human-review strategy for a Claude-based agent that handles thousands of daily transactions. One proposal is to route every single output to a human reviewer to be maximally safe; another is to route none and rely fully on automation for speed. Which practices reflect a well-calibrated, proportionate alternative? (Select all that apply.)", "options": ["Auto-approve outputs that are both low-impact and backed by high-confidence, verifiable signals, without a human step", "Route outputs that are high-impact, low-confidence, or explicitly flagged by the user to a human reviewer before the action executes", "Periodically audit a sample of auto-approved outputs to confirm the confidence calibration is still holding up over time", "Route every output to human review regardless of impact or confidence, and treat throughput as a secondary concern", "Remove human review entirely once the model's aggregate accuracy on a benchmark exceeds 95%"], "correct": [0, 1, 2], "explanation": "A proportionate strategy auto-approves genuinely low-risk, well-supported cases, routes high-impact or uncertain cases to a human, and periodically audits the auto-approved population to make sure the calibration hasn't drifted. Reviewing everything doesn't scale and defeats the purpose of automation, while removing review entirely based on an aggregate benchmark score ignores that aggregate accuracy can mask high-impact failures and per-segment weaknesses that still need a safety net."}, {"id": "P-D5-B2-32", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "multiple", "difficulty": "medium", "question": "An architect is briefing a new team on which compliance control belongs to which regulatory regime. Which of the following pairings are correct? (Select all that apply.)", "options": ["FedRAMP governs the authorization of cloud environments used to process US government data, requiring authorization at an appropriate impact level", "HIPAA requires a Business Associate Agreement with vendors that handle US protected health information", "GDPR requires a lawful basis for processing and supports rights like erasure and access for EU personal data", "FedRAMP is the appropriate framework for governing an EU citizen's personal profile data processed by a private company", "GDPR requires the AI vendor to sign a Business Associate Agreement before processing any personal data"], "correct": [0, 1, 2], "explanation": "Each pairing correctly matches a regime to its actual domain: FedRAMP to US government cloud authorization, HIPAA to US protected health information and Business Associate Agreements, and GDPR to EU personal data with lawful-basis and data-subject-rights requirements. FedRAMP has no bearing on an EU citizen's personal data processed by a private company, and the Business Associate Agreement mechanism belongs to HIPAA, not GDPR, which instead relies on lawful bases, data processing agreements, and transfer safeguards."}, {"id": "P-D5-B2-33", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "single", "difficulty": "medium", "question": "A content moderation platform must let creators appeal decisions to remove their posts. One proposed architecture is a highly accurate but opaque classification pipeline with no interpretable signal; another is a retrieval-augmented approach that cites the specific policy clause and matching content excerpt behind each decision, at a marginally lower benchmark accuracy. Given the appeals requirement, which should the architect prioritize?", "options": ["The retrieval-augmented approach, because its traceable citations let both moderators and creators understand and evaluate the basis for a decision during an appeal", "The opaque pipeline, because marginally higher benchmark accuracy should always take priority over interpretability", "The opaque pipeline, because appeals can be handled by re-running the same model a second time on the same input", "Whichever approach is cheaper to run per request, since both meet the minimum accuracy bar"], "correct": [0], "explanation": "Because the platform must support meaningful appeals, an architecture that produces traceable evidence, such as the specific policy clause and matching excerpt, is necessary so a human can actually evaluate whether the original decision was correct, even at a small accuracy cost. Defaulting to whichever option scores marginally higher on a benchmark ignores the explicit appeal and explainability requirement the use case demands. Re-running an opaque model a second time produces the same uninterpretable kind of output and gives a moderator or creator nothing new to evaluate, and choosing purely on cost ignores the transparency requirement entirely."}, {"id": "P-D5-B2-34", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "single", "difficulty": "easy", "question": "An insurance claims copilot auto-processes claims under $1,000 when the policy documents clearly support the claim, and routes claims to a licensed adjuster when the claim amount is high, the policy language is ambiguous, or supporting documents conflict with each other. What principle does this design reflect?", "options": ["Risk-based human-in-the-loop review, where review effort is concentrated on the highest-impact and most uncertain cases", "A detective control, since problems are only caught after the claim has already been paid out", "Model self-review, since the copilot is deciding for itself which claims to escalate without any defined criteria", "A data minimization control, since it limits how much claim data the copilot processes"], "correct": [0], "explanation": "Concentrating human review on high-dollar, ambiguous, or conflicting-evidence claims while auto-processing clear, low-risk ones is a textbook risk-based, proportionate human-in-the-loop design. It is a preventive control, not a detective one, since the routing decision happens before a high-risk claim is paid out, not after. It isn't model self-review because the escalation criteria are defined rules the system applies, not the model unilaterally deciding for itself, and it isn't a data minimization control since it doesn't change what claim data is processed, only who makes the final call."}, {"id": "P-D5-B2-35", "cert": "CCAR-P", "domain": "Governance, Safety & Risk Management", "type": "single", "difficulty": "easy", "question": "A hospital's data science team wants to prototype a new Claude-based feature quickly using a general-purpose tier that has no signed Business Associate Agreement in place. What is the compliant way to proceed with the prototype?", "options": ["Fully de-identify the data per HIPAA de-identification standards before using it in any environment that lacks a signed BAA, or move the work to a HIPAA-eligible environment with a BAA in place", "Proceed with real patient data as long as the prototype's outputs are never shown to anyone outside the data science team", "Proceed with real patient data as long as it is labeled clearly as a test or prototype environment", "Replace patient names with pseudonyms in the data and proceed without further changes"], "correct": [0], "explanation": "Without a signed BAA, an environment isn't authorized to receive PHI at all, so the compliant path is either genuine de-identification meeting HIPAA's standard or moving the work to an environment that has a BAA in place. Restricting who sees the outputs doesn't change the fact that PHI was transmitted to an unauthorized environment, labeling something a test environment carries no legal weight under HIPAA, and replacing only names leaves other identifying details in place, which does not meet the bar for de-identification."}, {"id": "P-D6-B1-01", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An e-commerce VP of Customer Experience opens a kickoff meeting by saying the team wants an AI system like ChatGPT for support, with no specific goals, metrics, or scope mentioned yet. What is the architect's best first step in this discovery conversation?", "options": ["Ask the VP what specific business outcomes and success metrics, such as reduced average handle time or ticket deflection rate, the system needs to achieve before proposing an architecture.", "Begin prototyping a general-purpose conversational assistant using the most capable model tier available to match the reference to a well-known consumer chatbot.", "Draft a full technical architecture document and present it at the next steering committee meeting for approval.", "Tell the VP that the comparison is not technically precise and ask them to submit a formal written requirements document before any further discussion."], "correct": [0], "explanation": "Vague references to consumer products are not requirements; the discovery step is to convert them into measurable business outcomes the architecture can later be judged against. Jumping straight to prototyping or a full architecture document skips discovery entirely, and refusing to engage until a formal document arrives abandons the collaborative discovery process the stakeholder needs help with."}, {"id": "P-D6-B1-02", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "During discovery interviews for an insurance claims platform, the claims operations manager wants full automation of straightforward claim approvals to cut cycle time, while the compliance officer insists every claim decision must have human sign-off for audit reasons. Which actions should the architect take to move discovery forward productively? Select three.", "options": ["Document both requirements explicitly and bring the two stakeholders together to define which claim categories or thresholds qualify for automation versus mandatory human review.", "Silently prioritize the compliance officer's requirement since regulatory risk outweighs efficiency, and inform operations only after the design is finalized.", "Propose a tiered design where low-value, low-complexity claims can be auto-approved within defined guardrails while higher-risk claims route to a human adjuster, then validate the thresholds with both stakeholders.", "Capture the conflict as an open requirements risk in the discovery notes and assign an owner and target date to resolve it before design sign-off.", "Build two parallel prototypes, one fully automated and one fully manual, and let the stakeholders pick whichever they prefer after seeing both running in production."], "correct": [0, 2, 3], "explanation": "Effective discovery surfaces conflicting requirements and resolves them collaboratively and visibly, rather than silently picking a side, which undermines trust and invites rework once the other stakeholder finds out. A tiered, threshold-based design plus an explicitly tracked, owned risk keeps both requirements honored and traceable. Building two full parallel prototypes just to let stakeholders choose is wasteful and never resolves the underlying policy question they actually disagree on."}, {"id": "P-D6-B1-03", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A hospital system's stakeholder describes a desired clinical documentation assistant purely in terms of features: voice input and template auto-fill. During discovery, the architect wants to surface non-functional requirements. Which question best does this?", "options": ["What's the maximum acceptable time between a clinician finishing a note and the summary being available, and where must patient data be stored or processed given the hospital's data residency policies?", "Which color scheme should the interface use to match the hospital's branding guidelines?", "Do you want the assistant to support both English and Spanish input?", "Should the system default to a dark mode display theme?"], "correct": [0], "explanation": "Latency expectations and data residency or storage constraints are classic non-functional requirements that directly shape the architecture, such as regional deployment or encryption approach, and are easy to miss when a stakeholder speaks only in feature terms. Interface color, dark mode, and language support are legitimate follow-up questions but don't surface the architecture-defining constraints this discovery step is aimed at."}, {"id": "P-D6-B1-04", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "A SaaS company's product manager opens a discovery meeting with a request to build a retrieval-augmented chatbot for their documentation. What is the best first response from the architect?", "options": ["Immediately begin comparing chunking strategies and embedding models, since the technology choice has already been specified.", "Ask what problem users are having today, such as high support ticket volume or slow onboarding, and what measurable improvement would define success, before committing to that architecture.", "Schedule a follow-up in three months once the product manager has written a full technical specification.", "Recommend the largest available model tier so the chatbot can handle any documentation question without further discovery."], "correct": [1], "explanation": "The product manager named a solution, not a business problem; good discovery re-anchors on the underlying problem and success measure before locking in an architecture, since a different pattern might serve the actual need more simply and cheaply. Diving straight into implementation details or defaulting to the biggest model without understanding the problem risks over-engineering, and delaying three months abandons the discovery role entirely."}, {"id": "P-D6-B1-05", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "A logistics dispatch team wants an agentic system to automatically reroute shipments during disruptions. Before designing the agent, the architect spends a session watching how dispatchers currently make rerouting decisions manually. What is the primary value of this step?", "options": ["It satisfies a procurement requirement that vendors observe operations before submitting a bid.", "It reveals the actual decision points, exception cases, and handoffs in the current process, which the future architecture must handle or deliberately simplify.", "It allows the architect to estimate the compute budget needed for the largest available model tier.", "It replaces the need for any further stakeholder interviews later in the project."], "correct": [1], "explanation": "Mapping the current-state process surfaces the real decision logic, exceptions, and human judgment calls that an automated or agentic workflow needs to account for; skipping this risks designing a system that looks correct on paper but fails on real edge cases. The observation session is not primarily about procurement, sizing compute, or eliminating the need for further discovery, which continues iteratively."}, {"id": "P-D6-B1-06", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "At a legal services firm, five stakeholders each want their preferred feature in phase 1 of a contract-review assistant: redlining, clause extraction, risk scoring, precedent search, and email drafting. Budget and timeline only support two features initially. Which facilitation techniques would help the architect drive a productive prioritization decision? Select two.", "options": ["Run a structured prioritization exercise, such as scoring each feature on business value versus implementation effort, with the stakeholders in the room.", "Let the most senior stakeholder in the room unilaterally decide, since seniority typically reflects the best judgment about user needs.", "Tie the prioritization discussion back to the original business outcome, such as reducing contract turnaround time, and ask which two features move that metric most.", "Add all five features to the phase 1 scope and quietly plan to cut two later if the schedule slips.", "Avoid the conflict entirely by deferring the project until the stakeholders reach informal agreement outside the meeting."], "correct": [0, 2], "explanation": "Structured value-versus-effort scoring and re-anchoring the discussion on the original business outcome give stakeholders a shared, defensible basis for a trade-off decision. Deferring to seniority alone ignores actual user impact, silently overcommitting scope invites schedule failure and later distrust, and simply avoiding the conversation only delays an inevitable and harder conflict."}, {"id": "P-D6-B1-07", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "Midway through design for a government contractor's document-processing assistant, the compliance team reveals a data-handling requirement that invalidates the storage architecture already agreed with engineering, costing several weeks of rework. What should the architect change about the discovery process for future engagements to prevent this?", "options": ["Skip compliance stakeholders in early discovery, since their requirements rarely affect architecture and tend to slow the process down.", "Include compliance and legal representatives as required participants in initial discovery sessions, rather than as a downstream review gate.", "Require compliance to sign off only after the full system is built, so their feedback doesn't interrupt design momentum.", "Have engineering independently infer likely compliance requirements from public regulations rather than involving compliance stakeholders directly."], "correct": [1], "explanation": "Constraints from compliance and legal, such as data residency, retention, or access controls, directly shape which architectures are even viable, so those stakeholders belong in discovery from the start rather than as a late gate. Skipping compliance, deferring their input to the end, or having engineering guess at regulations all recreate the same risk of expensive, late-stage rework."}, {"id": "P-D6-B1-08", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A wealth management firm's discovery document lists reducing time-to-first-response for client emails as a business requirement. During design, the architect chooses prompt caching and a smaller model tier for initial triage. A steering committee member who wasn't in the original sessions later asks why that specific technical choice was made. What discovery-phase practice makes this connection easy to answer?", "options": ["Maintaining a requirements-traceability record that links each business requirement to the architecture decisions and rationale that address it.", "Relying on the architect's memory of the discovery sessions to reconstruct the reasoning when asked.", "Keeping requirements and architecture decisions in separate documents owned by different teams to preserve independence.", "Waiting until the post-launch retrospective to document why the decisions were made."], "correct": [0], "explanation": "An explicit link between requirements and the architecture decisions made to satisfy them lets anyone, including stakeholders who missed the original sessions, see why a technical choice like model tier or caching exists. Relying on memory, deliberately separating the artifacts, or documenting only after the fact all make that connection hard to reconstruct under stakeholder questioning."}, {"id": "P-D6-B1-09", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "An architect designing a telecom customer-care assistant runs discovery sessions directly with frontline agents rather than only their manager. Which benefits does this bring to requirements gathering? Select three.", "options": ["Frontline agents surface real edge cases and exceptions, such as unusual billing disputes, that a manager's summary would likely omit.", "Frontline agents can describe today's actual workarounds and pain points, which is useful ground truth for defining success criteria and evaluation scenarios.", "Talking to agents guarantees the resulting system will need no further evaluation once it is built.", "Involving frontline staff early increases buy-in and reduces resistance when the new system is eventually rolled out.", "Frontline agents' input can replace the need to define any measurable success metrics with the accountable manager."], "correct": [0, 1, 3], "explanation": "Direct frontline input surfaces realistic edge cases, provides concrete ground truth for defining evaluation scenarios, and builds change-management buy-in ahead of rollout, all genuine benefits of talking to the people doing the work today. It does not eliminate the need for a formal evaluation program once the system exists, nor does it substitute for agreeing on measurable success metrics with the stakeholders who own the outcome."}, {"id": "P-D6-B1-10", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An airline's customer service director states in a discovery meeting that the new assistant must be accurate, with nothing else specified. What should the architect do next?", "options": ["Accept the requirement as stated and proceed to design, since accuracy is self-explanatory.", "Work with the director to define measurable, testable acceptance criteria, such as an acceptable error rate on a defined set of query types and how accuracy will be measured after launch.", "Substitute the requirement with an industry benchmark accuracy figure without checking whether it fits this specific use case.", "Postpone all further discovery until the director provides a written accuracy specification unprompted."], "correct": [1], "explanation": "A bare statement that the system must be accurate isn't measurable or testable; good discovery collaborates with the stakeholder to translate vague quality language into concrete, testable acceptance criteria tied to real query types and a measurement plan. Proceeding on the vague statement, substituting an unrelated benchmark, or passively waiting all fail to move the requirement toward something the team can actually design and evaluate against."}, {"id": "P-D6-B1-11", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An automotive dealer network stakeholder assumes the new assistant will already know the full current vehicle inventory and pricing because it is AI. During discovery, how should the architect address this?", "options": ["Let the assumption stand, since correcting it might make the stakeholder lose confidence in the project.", "Explain that the model has no built-in knowledge of the dealer's proprietary, frequently changing inventory, and that this requires a data-integration or retrieval component to keep the system grounded in live data.", "Recommend switching to the most capable available model tier, since a stronger model would already contain the dealer's inventory data.", "Note the misunderstanding internally but avoid raising it until the assistant fails during a live demo."], "correct": [1], "explanation": "Correcting misconceptions about what a model does and doesn't know is a core discovery task; it surfaces the real need for a retrieval or integration layer against live inventory data, not a bigger model, since model size does not grant access to a private, constantly changing dataset. Letting the assumption stand or waiting for a public failure damages trust and wastes the chance to set correct expectations early."}, {"id": "P-D6-B1-12", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "During discovery for an internal HR help-desk assistant, the benefits team wants policy-lookup answers only, the IT team wants password-reset automation bundled in, and legal wants strict logging of every interaction. Each team assumes their version is the project. What should the architect do?", "options": ["Build each team's version as a separate, independent project to avoid conflict.", "Convene the three stakeholder groups together to align on a single shared scope, priorities, and success criteria before design begins.", "Default to whichever team requested the project first, since first movers should set the requirements.", "Design the broadest possible system that includes every request from every team so nobody is disappointed."], "correct": [1], "explanation": "When multiple stakeholders each assume ownership of a divergent scope, the architect's job is to bring them together for explicit alignment on one shared scope and priority order, rather than fragmenting into parallel efforts, picking a winner arbitrarily, or scope-creeping into an unbounded system that tries to satisfy every wish list item at once."}, {"id": "P-D6-B1-13", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A regional bank's CFO asks why the fraud-review assistant doesn't use the most capable, most expensive model tier for every request. How should the architect explain the decision?", "options": ["State that a more expensive model is always better and the choice was purely a budget constraint imposed by finance.", "Explain that most fraud-review requests are routine classification tasks where a faster, cheaper model tier meets the accuracy bar, while the smaller share of complex or ambiguous cases are routed to the stronger tier, balancing cost against the marginal quality gain where it actually matters.", "Avoid the cost discussion and focus only on describing the model's technical architecture.", "Explain that model tier choice has no real effect on either cost or output quality, so the decision was arbitrary."], "correct": [1], "explanation": "Translating a technical routing decision into business terms, cost versus marginal quality gain applied selectively where complexity warrants it, directly answers the CFO's real question. Claiming bigger is always better ignores diminishing returns and cost, dodging the cost question fails to communicate in the audience's own terms, and claiming there is no cost or quality relationship is simply inaccurate."}, {"id": "P-D6-B1-14", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "An architect recommends a predefined-workflow design over a fully agentic design for a manufacturing quality-inspection assistant. The engineering team wants full agentic autonomy for flexibility, while the operations sponsor mainly wants assurance it will work reliably. How should the architect present this trade-off to both audiences in one document?", "options": ["Write two entirely separate documents with contradictory conclusions, one favoring each audience's preference.", "Present the reliability and predictability benefits of the workflow approach and the flexibility being given up, framed first in terms of operational impact such as consistent inspection outcomes, then backed by the technical reasoning around deterministic step sequencing versus autonomous planning.", "Omit the trade-off entirely and simply state the workflow approach was chosen because it is simpler to build.", "Present only the technical reasoning in detail and let each audience extract the business implications on their own."], "correct": [1], "explanation": "A single well-structured document can serve both audiences by leading with the business-relevant impact, reliability of outcomes, and layering in the technical rationale for readers who want it, rather than fragmenting the message, hiding the trade-off, or leaving non-technical readers to translate jargon themselves."}, {"id": "P-D6-B1-15", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An architect must explain a new retrieval-augmented parent-support pipeline to a school district's non-technical administrators. Which explanation best fits this audience?", "options": ["The system chunks source documents, generates vector embeddings, and performs similarity search against an index before augmenting the prompt.", "The system retrieves the most relevant passages from the district's own approved policies before generating an answer, so responses are grounded in your documentation instead of the model's general knowledge, which should reduce incorrect statements.", "The architecture uses a transformer-based large language model with retrieval-augmented generation over a vector database.", "The architecture is proprietary and too technical to explain in this meeting."], "correct": [1], "explanation": "For a non-technical audience, describing the outcome and business benefit, grounding answers in the district's own approved policies to reduce incorrect statements, communicates the same design decision without requiring familiarity with chunking, embeddings, or vector databases. The jargon-heavy explanations and the refusal to explain both fail to inform this audience."}, {"id": "P-D6-B1-16", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "An architect must brief an insurance company's compliance and business stakeholders, who have no machine learning background, on hallucination risk in a claims-summary assistant before they approve rollout. Which points should the briefing include? Select three.", "options": ["A plain-language explanation that the model can generate plausible-sounding but incorrect statements, especially on details not present in the source documents.", "A description of the specific mitigations in place, such as grounding answers in retrieved claim documents and requiring human review before any claim-affecting decision is finalized.", "A claim that hallucination has been fully eliminated through prompt engineering, so no further monitoring is required.", "The metric and process that will be used after launch to keep measuring and catching incorrect outputs over time, such as sampled human review or quality audits.", "A recommendation to disable all logging of model outputs so stakeholders aren't overwhelmed with technical detail."], "correct": [0, 1, 3], "explanation": "A responsible briefing plainly names the risk, explains the concrete mitigations already in place, and commits to an ongoing measurement process, which together let non-technical stakeholders make an informed approval decision. Claiming hallucination has been fully eliminated is false and sets an unmeetable expectation, and disabling output logging removes the very visibility needed to catch and manage the risk going forward."}, {"id": "P-D6-B1-17", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "An e-commerce product owner insists the new support assistant must be simultaneously the fastest, cheapest, and most accurate option available, and is frustrated that the architect won't commit to all three at once. What is the most effective way for the architect to communicate this trade-off?", "options": ["Pick whichever option seems easiest to defend politically and avoid discussing the other two dimensions.", "Explain the cost, latency, and accuracy relationship concretely using the product owner's own scenarios, for example showing how routing simple questions to a faster, cheaper model preserves speed and cost while reserving the stronger model for complex questions keeps accuracy where it matters most.", "Tell the product owner that trade-offs are a purely technical concern that doesn't need to be discussed with business stakeholders.", "Verbally commit to all three targets to keep the meeting positive, and plan to renegotiate scope quietly later if reality doesn't match."], "correct": [1], "explanation": "Making the cost, latency, and accuracy trade-off concrete using the stakeholder's own use cases, such as tiered routing by complexity, is far more persuasive and actionable than an abstract statement that they can't have everything. Picking one dimension silently, declaring trade-offs off-limits to business stakeholders, or over-promising and quietly walking it back later all damage trust and planning."}, {"id": "P-D6-B1-18", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "An architect is writing an architecture decision record for a SaaS company's choice of a multi-agent design over a single augmented-LLM design, intended for both current engineers and future hires. What should the record include? Select three.", "options": ["The business or technical driver that made the decision necessary.", "The alternatives that were considered and why they were rejected.", "Only the final decision, with no supporting reasoning, to keep the document short.", "The consequences and trade-offs accepted by choosing this option, such as added orchestration complexity and cost.", "A promise that the decision will never be revisited regardless of future evidence."], "correct": [0, 1, 3], "explanation": "A useful decision record captures the driving context, the alternatives that were weighed and why they lost, and the consequences accepted, which is what lets future readers understand and, if needed, responsibly revisit the decision. Recording only the conclusion strips away the reasoning that makes the record useful, and declaring a decision permanently closed contradicts the entire point of documenting trade-offs for future reassessment."}, {"id": "P-D6-B1-19", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An architect presents the same architecture decision twice in one week: once to the engineering team, once to the executive steering committee. What is the best approach?", "options": ["Deliver the identical slide deck and level of technical detail to both audiences to ensure consistency.", "Keep the underlying decision and rationale consistent, but adjust the level of technical detail and framing, going deeper on implementation for engineering and focusing on business impact and trade-offs for the steering committee.", "Tell the steering committee only the parts of the trade-off that reflect positively on the architecture, saving the risks for the engineering discussion.", "Let the engineering team decide what, if anything, gets communicated to the steering committee."], "correct": [1], "explanation": "Consistent substance with audience-appropriate framing and depth is standard practice; the steering committee still needs to hear the real trade-offs and risks, just expressed in business-impact terms rather than implementation detail. Using one identical deck for both ignores audience needs, selectively hiding risks from executives is a governance problem, and leaving communication to engineering's discretion abdicates the architect's stakeholder-management responsibility."}, {"id": "P-D6-B1-20", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "A legal services partner is skeptical of a proposed agentic contract-review design, saying they don't trust software making autonomous decisions on client documents. How should the architect respond?", "options": ["Reassure the partner verbally that the system will be fine, without describing any specific controls.", "Explain the specific deterministic guardrails in place, for example a programmatic check that blocks an action like sending a document externally until a required verification step completes, so the partner can see exactly where enforcement is guaranteed rather than left to the model's judgment.", "Agree that agentic systems cannot be trusted and switch to a fully manual process instead.", "Suggest the partner simply avoid using the system if they're uncomfortable with it."], "correct": [1], "explanation": "Skepticism about autonomy is best addressed by showing concrete, deterministic controls, programmatic gates that constrain what the system can do unsupervised, rather than a vague verbal reassurance. Abandoning the agentic approach entirely or telling the stakeholder to opt out both fail to engage with the legitimate underlying concern or find a workable path forward."}, {"id": "P-D6-B1-21", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A utility company's budget-conscious sponsor asks why the proposed outage-support system needs multiple agents coordinating instead of one simple assistant. How should the architect explain the added cost and complexity?", "options": ["Say multi-agent designs are always more advanced and therefore automatically the right choice for any serious project.", "Explain that the outage-support workflow spans genuinely distinct subtasks, such as diagnosing the outage cause, checking crew availability, and drafting customer notifications, that benefit from separation of concerns and isolated context, and that a single-agent design was evaluated but risks context overload and mixed responsibilities at this scope.", "Avoid justifying the added cost and instead emphasize that the engineering team prefers building multi-agent systems.", "Agree to remove the multi-agent design immediately without evaluating whether the added coordination is actually needed for this workload."], "correct": [1], "explanation": "Justifying architectural complexity to a cost-conscious sponsor means tying it to a concrete need, distinct subtasks and context isolation, and showing that the simpler alternative was genuinely considered, rather than asserting multi-agent designs are inherently superior or citing engineering preference. Caving immediately without re-evaluating the actual workload risks under-building a system that can't handle the real task complexity."}, {"id": "P-D6-B1-22", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "An architect is preparing materials to explain a new agentic pipeline for an airline's customer service system. Which pairing of visuals best fits the executive steering committee versus the engineering team?", "options": ["A high-level flow diagram showing inputs, key decision points, and outcomes for the executives; a detailed sequence diagram showing tool calls, data flow, and error handling for the engineers.", "The identical low-level sequence diagram with full tool-call detail presented to both audiences.", "No visuals for either audience, relying on text-only descriptions for both.", "A marketing-style infographic with no architectural content for the engineering team, and a detailed sequence diagram for the executives."], "correct": [0], "explanation": "Matching visual complexity to audience need, a simplified flow for executives and a detailed technical diagram for engineers, communicates effectively to each group. Using identical low-level diagrams for executives, skipping visuals altogether, or swapping the appropriate diagrams between audiences all reduce comprehension for at least one group."}, {"id": "P-D6-B1-23", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "To meet a tight budget, the architect selects a cheaper model tier for an online brokerage platform's client-facing assistant, projecting the error rate on complex questions will rise from 2% to 6%. The business sponsor was not told about this quality impact before approving the budget change. What should the architect have done?", "options": ["Nothing further; the model tier is a technical implementation detail that doesn't require business sponsor visibility.", "Proactively communicate the projected accuracy impact and what it could mean in business terms, such as more escalations to human advisors, to the sponsor before or alongside the budget decision, so they can knowingly weigh the trade-off.", "Make the change and wait to see if anyone notices the increased error rate before deciding whether to disclose it.", "Refuse to make any cost-driven changes to model tier under any circumstances."], "correct": [1], "explanation": "When a technical choice has a material, quantifiable effect on a business outcome, the architect's responsibility is to surface that connection proactively so the sponsor makes an informed trade-off decision, not to treat it as purely technical or wait to see if the impact goes unnoticed. Refusing all cost-driven changes ignores that cost-quality trade-offs are often legitimate once the sponsor understands and accepts them."}, {"id": "P-D6-B1-24", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A public transit agency's program manager, facing a launch deadline, asks the architect to skip the planned evaluation phase for a rider-facing disruption-alert assistant and go straight to production to save two weeks. How should the architect respond?", "options": ["Comply immediately since meeting the deadline is the top priority, and evaluation can be added after launch if needed.", "Explain concretely what skipping evaluation risks, such as undetected failure modes reaching real riders, versus the two weeks saved, and offer a scoped-down evaluation plan or phased rollout as a middle path if the deadline is truly fixed.", "Refuse outright and offer no alternative path to meet any part of the deadline.", "Quietly run a partial evaluation without telling the program manager, and say nothing if problems are found later."], "correct": [1], "explanation": "The architect's job is to make the risk of skipping evaluation concrete and business-relevant, then offer a workable alternative such as a reduced-scope evaluation or a phased rollout, rather than simply complying, flatly refusing without options, or hiding a compromise from the stakeholder who owns the deadline decision."}, {"id": "P-D6-B1-25", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "A health insurer's project sponsor states in the kickoff meeting that the new claims-summary assistant needs to be 100% accurate, with no exceptions. How should the architect handle this in the SLA discussion?", "options": ["Agree to the 100% accuracy target to keep the sponsor satisfied, and address the gap later if it becomes a problem.", "Explain that LLM-based systems are probabilistic and that a 100% accuracy guarantee isn't realistic, then work with the sponsor to define an achievable accuracy target, a human-review process for high-stakes cases, and a plan to monitor and improve over time.", "Tell the sponsor accuracy targets aren't something architects can discuss and defer the topic entirely to engineering.", "Propose the system flag every single output for human review so accuracy is never in question, regardless of cost or throughput impact."], "correct": [1], "explanation": "Setting realistic expectations upfront is central to a healthy SLA discussion; explaining the probabilistic nature of LLM outputs and negotiating an achievable target with review processes for high-stakes cases avoids setting the project up for a commitment that is guaranteed to fail. Silently agreeing to an impossible target, refusing to engage, or defaulting to reviewing every single output, which may be neither necessary nor affordable, all avoid the real conversation."}, {"id": "P-D6-B1-26", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "A commercial lending firm's initial SLA draft for a loan-document review assistant only specifies 99.9% system uptime. Which additional elements should the architect push to include in the SLA before sign-off? Select three.", "options": ["A defined accuracy or quality threshold for model outputs, along with how it will be measured, such as sampled review against a labeled set.", "An agreed escalation path and response time for when outputs fall below the quality threshold or a high-risk case is flagged.", "A commitment that the model will never change or be updated for the life of the contract, to avoid any behavior drift.", "A review cadence, such as monthly, for revisiting SLA targets as usage patterns and business needs evolve.", "A clause guaranteeing zero false positives and zero false negatives in document review."], "correct": [0, 1, 3], "explanation": "Uptime alone doesn't capture whether the system is doing its job well; a meaningful SLA also needs a measurable quality threshold, an escalation path for when results fall outside that threshold, and a cadence to revisit targets as the system and business evolve. Freezing the model forever prevents legitimate improvement and bug fixes, and a zero-error guarantee is not achievable for a probabilistic system and would set the SLA up to fail immediately."}, {"id": "P-D6-B1-27", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "An e-commerce operations lead wants a new agentic order-support assistant, which calls multiple backend tools per request, to guarantee sub-second response times just like their existing rules-based system. How should the architect handle this during SLA discussions?", "options": ["Commit to the sub-second target without changes, and figure out how to hit it after the contract is signed.", "Explain that a multi-tool agentic workflow has inherently different latency characteristics than a rules-based lookup, propose a realistic latency target based on the actual tool-call chain, and offer options such as progressive status updates or a narrower agent scope for the use cases that most need speed.", "Tell the operations lead that latency targets are not something the business side should weigh in on.", "Recommend replacing the agentic design entirely with the old rules-based system so the original latency target can be met."], "correct": [1], "explanation": "Setting realistic latency expectations upfront, grounded in the actual architecture's characteristics, and offering concrete options such as UX mitigations or a scoped fast path gives the stakeholder informed choices instead of an unmeetable promise. Committing blindly sets up a guaranteed SLA breach, excluding the business from latency discussions ignores that latency is a real business and user-experience concern, and reverting to the old system abandons the project's goals rather than negotiating the trade-off."}, {"id": "P-D6-B1-28", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A telecom customer-care stakeholder wants a contractual guarantee that the assistant's responses will always be returned in a specific structured format that a downstream ticketing system can parse. What should the architect propose as the technical basis for this commitment, and how should it be framed in the SLA conversation?", "options": ["Promise the format will be followed because the system prompt will clearly instruct the model to always use that format.", "Propose enforcing the structured format programmatically, such as a schema-constrained output mechanism, so format compliance is a guaranteed system property, and frame the SLA commitment around that mechanism rather than a prompt-based promise.", "Tell the stakeholder that reliably parseable output cannot be guaranteed and remove the requirement from scope.", "Commit to manually reviewing every response before it reaches the ticketing system to guarantee correct formatting."], "correct": [1], "explanation": "Format compliance guaranteed only by prompt instructions is probabilistic and can fail; framing the SLA commitment around a programmatic, schema-enforced output mechanism gives a genuinely deterministic guarantee to stand behind. Declaring it impossible abandons a solvable requirement, and manually reviewing every response doesn't scale and isn't what the stakeholder actually needs."}, {"id": "P-D6-B1-29", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "While defining the SLA and expectations for an insurance claims assistant, the architect works with stakeholders to agree on escalation triggers before go-live. Which of the following are appropriate escalation triggers to formalize upfront? Select three.", "options": ["The claimant explicitly asks to speak with a human adjuster.", "The case falls into a scenario the policy doesn't clearly address, a genuine policy gap or ambiguous exception.", "The assistant's own self-reported confidence score is high, since high self-reported confidence reliably indicates a correct outcome.", "The system reaches a genuine dead end and cannot make further progress on the claim with the information and tools available.", "The customer's message contains a negative sentiment score above a fixed threshold, since negative sentiment reliably predicts a wrong or unsatisfactory answer."], "correct": [0, 1, 3], "explanation": "Well-established, valid escalation triggers are an explicit human request, a genuine policy gap or ambiguous exception, and a real inability to make progress; these are documented upfront during SLA and expectation-setting so everyone agrees on when a human handoff happens. Self-reported model confidence scores and sentiment analysis are both unreliable proxies for correctness and shouldn't be relied on as escalation triggers."}, {"id": "P-D6-B1-30", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "hard", "question": "Three weeks into a fixed-scope, fixed-timeline project for a legal services firm, a stakeholder asks the architect to add a new capability, automated clause redlining, that wasn't in the original discovery scope or SLA. The architect believes it's technically feasible. What is the best way to handle this?", "options": ["Quietly add the feature into the existing timeline and budget to keep the stakeholder happy, absorbing the extra work.", "Refuse to discuss the new capability at all until the current contract fully ends.", "Formalize it as a change request: document the new requirement, assess its impact on timeline, budget, and existing SLA commitments, and get explicit stakeholder agreement before adding it to scope.", "Add the feature but quietly drop an existing committed feature of similar size without telling the stakeholder."], "correct": [2], "explanation": "Managing expectations through a visible, agreed change-request process protects both the timeline and budget and the relationship, since everyone sees and accepts the trade-off. Silently absorbing new scope or silently dropping other committed work both erode trust once discovered, and refusing to discuss the request at all is uncollaborative when it may be a legitimate, negotiable addition."}, {"id": "P-D6-B1-31", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A logistics company wants two things from the same underlying system: a nightly report summarizing all delivery exceptions with no user waiting live, and a live dispatcher chat assistant answering questions in real time. During SLA discussions, how should the architect frame turnaround expectations for these two workloads?", "options": ["Promise identical near-real-time turnaround for both, since they use the same underlying model and pipeline.", "Explain that the nightly report is latency-tolerant and well suited to asynchronous batch processing with up to a day's turnaround and materially lower cost, while the live dispatcher chat needs synchronous, low-latency handling, and set separate SLA targets for each.", "Insist both workloads must use the same synchronous processing path to keep the architecture simple, regardless of cost.", "Tell the logistics company that only one of the two workloads can be supported by the same underlying platform."], "correct": [1], "explanation": "Matching processing mode to workload characteristics, asynchronous and cost-efficient batch processing for the non-blocking nightly report versus synchronous low-latency handling for the live chat, and setting distinct SLA targets for each avoids both overpaying for the report and under-serving the live use case. Promising identical real-time turnaround for both ignores the report's tolerance for delay and its cost-saving opportunity, and claiming only one workload can be supported is simply incorrect."}, {"id": "P-D6-B1-32", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "As part of setting expectations before launch, the architect proposes a recurring cadence of meetings: a weekly working session with the engineering and operations team, and a monthly review with the executive sponsor. What is the primary benefit of agreeing to this cadence upfront, before go-live?", "options": ["It guarantees the system will never need any SLA renegotiation later.", "It gives stakeholders a predictable, agreed forum to review performance, raise issues, and adjust expectations over time, instead of relying on ad hoc, frustration-driven escalations.", "It replaces the need for any ongoing monitoring or logging of the system in production.", "It shifts all responsibility for the system's performance from the architect's team to the stakeholders attending the meetings."], "correct": [1], "explanation": "Agreeing on a review cadence upfront gives everyone a structured, predictable channel for feedback and course correction, a core part of managing expectations over the system's lifecycle, rather than relying on reactive escalations driven by frustration. It doesn't eliminate the need for renegotiation, monitoring, or shared accountability; it creates the forum where those things happen productively."}, {"id": "P-D6-B1-33", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "A hotel chain's reservations team wants both a fixed monthly cost cap and a commitment that the assistant will support 3x guest-inquiry volume growth over the next year without an SLA renegotiation. Which elements should the architect insist on documenting in the SLA to make this workable? Select three.", "options": ["The token-usage and request-volume assumptions the cost cap is based on, stated explicitly.", "A defined trigger, such as usage exceeding the stated assumptions by some margin, that requires revisiting the cost cap or SLA terms rather than silently breaching them.", "A blanket promise that costs will never increase regardless of how usage actually grows.", "What happens operationally if usage grows faster than the documented assumptions, such as a degraded model tier, request throttling, or renegotiation, rather than leaving it undefined.", "A requirement that the hotel chain freeze guest-inquiry growth at current levels to avoid ever exceeding the cost cap."], "correct": [0, 1, 3], "explanation": "Making a cost cap durable under growth requires stating the volume assumptions it's based on, defining a clear trigger for revisiting terms if reality departs from those assumptions, and specifying what happens operationally if growth outpaces them, turning an ambiguous promise into a workable agreement. An unconditional promise that costs never increase ignores that usage-driven cost is a real constraint, and asking the client to freeze their own growth to fit the SLA gets the relationship between business needs and technical constraints backwards."}, {"id": "P-D6-B1-34", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A consumer electronics manufacturer's IT director compares the new customer-service assistant's SLA to a traditional software SLA and asks why it includes an ongoing accuracy monitoring and improvement commitment instead of just a bug-fix guarantee. How should the architect explain this difference?", "options": ["Traditional software and LLM-based systems should have identical SLA structures, so the extra commitment is unnecessary.", "Unlike a deterministic bug in traditional software that gets fixed once, an LLM-based system's output quality can drift with changing inputs and usage patterns, so ongoing monitoring, sampled evaluation, and iterative improvement are part of maintaining quality over the system's lifecycle, not a one-time fix.", "The accuracy commitment exists only to justify a higher price and has no real functional purpose.", "Ongoing monitoring is only needed during the first month after launch and can be dropped afterward."], "correct": [1], "explanation": "Explaining that LLM-based system quality isn't a one-time deterministic fix but something that needs continuous measurement and improvement as inputs and usage evolve helps the stakeholder understand why the SLA structure differs from traditional software. Treating the two as identical, dismissing the commitment as a pricing gimmick, or assuming monitoring is only needed briefly after launch all misrepresent why ongoing evaluation matters for a probabilistic system."}, {"id": "P-D6-B1-35", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "hard", "question": "A payment processing company's procurement stakeholder wants the SLA to contractually guarantee zero risk of prompt injection for a new customer-facing assistant before they'll approve the contract. How should the architect frame the realistic risk posture in this SLA conversation? Select three.", "options": ["Explain that prompt injection is a known class of risk that can be substantially mitigated through layered controls but cannot be contractually reduced to zero for any LLM-based system.", "Describe the specific layered mitigations in place, such as input handling safeguards, least-privilege tool access, and monitoring for anomalous behavior, rather than pointing to a single silver-bullet fix.", "Agree to the zero-risk guarantee in the contract, since refusing might cause the deal to fall through.", "Propose measurable security-relevant commitments instead, such as monitoring coverage, incident response time, and a periodic security review cadence.", "Tell the stakeholder that prompt injection is not a real risk for enterprise deployments and the concern is unfounded."], "correct": [0, 1, 3], "explanation": "The honest and durable path is naming prompt injection as a real, mitigable but not eliminable risk, describing the actual layered defenses in place, and substituting measurable operational commitments such as monitoring, incident response, and review cadence for an unachievable zero-risk promise. Signing a zero-risk guarantee to close the deal creates a contractual obligation that can never be honored, and dismissing the risk as unfounded is factually wrong and would seriously mislead a stakeholder relying on that assessment."}, {"id": "P-D6-B2-01", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "Eight months after a subscriber-support assistant for a streaming media company went live, the operations team holds a weekly meeting to review dashboards tracking response accuracy, latency, and escalation rate against the original evaluation baseline, and to flag any metric drifting out of range. Which lifecycle phase does this activity primarily represent?", "options": ["Monitoring, since the team is tracking the live system's performance against an established baseline.", "Discovery, since the team is still gathering requirements for the assistant.", "Design, since the team is still selecting the architecture pattern for the assistant.", "Handoff, since the team is transferring ownership of the system to a new group."], "correct": [0], "explanation": "Regularly reviewing live-system dashboards against an established baseline to catch drift is the defining activity of the monitoring phase, which follows handoff and feeds maintenance and continuous-improvement work. Gathering requirements and selecting an architecture happen earlier, during discovery and design, before there's a production system to monitor. Transferring ownership to a new team is the one-time handoff event itself, not the ongoing weekly review that follows it."}, {"id": "P-D6-B2-02", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "During a beta pilot of a retail bank's mobile-app assistant, several testers describe the responses as 'too robotic' and 'not friendly enough,' but none can point to a specific message that was wrong. Before making any prompt changes, what should the architect do first?", "options": ["Immediately rewrite the system prompt's tone instructions based on the architect's own judgment of what sounds friendlier.", "Work with the testers to define concrete examples of tone that does and doesn't meet the bar, turning the vague impression into a testable rubric before changing anything.", "Disregard the feedback since tone is subjective and cannot be evaluated systematically.", "Tell the testers the issue is a display problem in the app rather than something the assistant's responses control."], "correct": [1], "explanation": "Vague feedback like 'too robotic' isn't actionable until it's translated into concrete, testable criteria, so working with the testers to produce example exchanges and a rubric is the necessary first step before any change is made. Rewriting the prompt on the architect's own judgment risks optimizing for the wrong thing without stakeholder validation. Dismissing subjective feedback throws away a real signal instead of operationalizing it, and blaming the interface when testers are describing the assistant's wording deflects rather than investigates."}, {"id": "P-D6-B2-03", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "easy", "question": "A security operations center's alert-triage assistant was built with a multi-agent design instead of a single agent, and the architect wrote a decision record documenting the alternatives considered and why the multi-agent approach won. A year later, a new engineer proposes collapsing it back to a single agent to 'simplify things.' What is the primary value the decision record provides in this moment?", "options": ["It legally prevents the team from ever changing the architecture in the future.", "It replaces the need for the new engineer to understand how the current system actually works.", "It gives the new engineer the original context, trade-offs, and reasons the alternative was rejected, so the team can evaluate whether anything has actually changed rather than re-litigating the decision from scratch.", "It is primarily a compliance artifact with no practical use once the initial decision meeting has ended."], "correct": [2], "explanation": "A decision record's main ongoing value is preserving the original context and trade-offs so future engineers can judge whether circumstances have changed, instead of re-debating a decision with none of the original reasoning available. It doesn't lock the architecture in place forever; good decision records are revisited when conditions change. It also isn't a substitute for understanding the current implementation, and treating it as a one-time compliance artifact ignores the ongoing reference value it provides long after the meeting ends."}, {"id": "P-D6-B2-04", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "A pharmaceutical company's head of regulatory affairs watches a polished demo of a phase-1 assistant that drafts responses to health-authority information requests for three approved therapeutic areas. Afterward, she tells her team the new system 'can now handle all of our regulatory correspondence.' What should the architect do?", "options": ["Let the comment stand, since correcting an enthusiastic executive right after a successful demo could dampen support for the project.", "Quietly expand the assistant's scope to cover all therapeutic areas immediately so her statement becomes accurate.", "Avoid giving further demos to executives so this kind of scope confusion doesn't happen again.", "Proactively clarify in writing what the demo covered versus the full scope, and lay out the remaining therapeutic areas and capabilities still on the roadmap with target timing."], "correct": [3], "explanation": "Demo excitement outrunning actual scope is a common expectation-alignment risk, and the right response is to promptly and explicitly restate what was actually delivered versus what remains, in writing, so the misunderstanding doesn't propagate. Letting it stand risks a credibility problem later when gaps surface in production. Silently expanding scope to match an offhand comment turns an uncontrolled remark into uncontrolled scope creep without proper evaluation, and refusing to demo to executives removes a valuable communication tool instead of fixing how it's framed."}, {"id": "P-D6-B2-05", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "At 2 a.m., a freight carrier's automated dispatch assistant starts giving drivers inconsistent routing instructions. The on-call engineer has no documentation showing how to check the assistant's recent tool-call history, identify what changed, or safely roll back to a known-good configuration, and spends two hours guessing before escalating. What should have been part of the handoff package to prevent this?", "options": ["An operational runbook covering common failure modes, how to inspect recent tool-call and configuration history, and a tested rollback procedure.", "A marketing summary of the assistant's capabilities for the sales team.", "A record of every internal chat message exchanged by the build team during development.", "A guarantee from the model provider that this failure mode cannot occur."], "correct": [0], "explanation": "The gap here is operational: without a runbook describing common failure modes, how to inspect what changed, and how to roll back safely, an on-call engineer has no way to act quickly on an unfamiliar system. A capabilities summary for sales serves a completely different audience and purpose. A raw archive of internal chat messages isn't structured, actionable guidance, and no vendor can guarantee an LLM-based system will never misbehave, which is exactly why operational runbooks and rollback procedures are necessary in the first place."}, {"id": "P-D6-B2-06", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "single", "difficulty": "medium", "question": "An agtech company's crop-advisory assistant relies on a specific Claude model tier. The architect learns the provider is deprecating that exact model tier in 90 days. What is the appropriate lifecycle response?", "options": ["Wait until the deprecation takes effect and address any resulting failures reactively.", "Treat the announcement as a trigger to re-run the evaluation suite against candidate replacement tiers well before the deadline, and switch only after confirming acceptable accuracy, cost, and latency.", "Switch immediately to the largest available model tier without re-testing, since a more capable model cannot perform worse.", "Ignore the announcement, since model tier changes rarely affect a system that has been stable in production."], "correct": [1], "explanation": "A pending deprecation is a scheduled, foreseeable event that should trigger proactive re-evaluation against candidate replacements well before the cutover, so the switch is evidence-based rather than reactive. Waiting until the deadline turns a plannable transition into an outage risk. Assuming a larger model can't perform worse skips the verification step entirely; prompts and pipelines tuned for one model tier don't automatically transfer their performance to another. Dismissing the announcement ignores a hard deadline that will affect the system regardless of past stability."}, {"id": "P-D6-B2-07", "cert": "CCAR-P", "domain": "Stakeholder Communication & Lifecycle Management", "type": "multiple", "difficulty": "medium", "question": "After a pilot of a credit union's member-service assistant, the sales team's feedback asks for more flexible, persuasive language to cross-sell products, while the compliance team's feedback insists on strictly scripted, pre-approved language for anything related to loan products. Both stakeholders mark their feedback as urgent. Which actions should the architect take? Select three.", "options": ["Document the conflict explicitly and bring both stakeholders together with the executive sponsor to make an informed prioritization decision.", "Implement whichever team's feedback arrived most recently, since that best reflects current priorities.", "Investigate whether an architectural solution, such as different guardrail strictness for general product discussion versus regulated loan topics, can satisfy both needs rather than assuming it's all-or-nothing.", "If the stakeholders can't reach agreement, escalate to identify a single accountable decision-maker so the conflict doesn't stall the project.", "Make the call unilaterally based on the architect's personal preference and inform both stakeholders after the change ships."], "correct": [0, 2, 3], "explanation": "
